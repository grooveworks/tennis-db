  } catch { return _emptyFilters(); }
};

// ラケット候補: 大会/練習/試打の racketName + 試合 match.racketName の union
// S11 で trials も含めるよう拡張 (種類フィルタで「試打」選択時にもラケット絞り込みが効く)
const _extractRackets = (tournaments, practices, trials) => {
  const s = new Set();
  tournaments.forEach(t => {
    if (t.racketName) s.add(t.racketName);
    (Array.isArray(t.matches) ? t.matches : []).forEach(m => { if (m && m.racketName) s.add(m.racketName); });
  });
  practices.forEach(p => { if (p.racketName) s.add(p.racketName); });
  (trials || []).forEach(tr => { if (tr.racketName) s.add(tr.racketName); });
  return [...s].sort((a, b) => a.localeCompare(b, "ja"));
};

// 対戦相手候補: matches[].opponent / opponent2 の union (大会のみ)
const _extractOpponents = (tournaments) => {
  const s = new Set();
  tournaments.forEach(t => {
    (Array.isArray(t.matches) ? t.matches : []).forEach(m => {
      if (m && m.opponent)  s.add(m.opponent);
      if (m && m.opponent2) s.add(m.opponent2);
    });
  });
  return [...s].sort((a, b) => a.localeCompare(b, "ja"));
};

// 1 件のエントリから取り得るラケット名を配列で返す
const _entryRackets = (entry) => {
  const it = entry.item;
  const out = [];
  if (it.racketName) out.push(it.racketName);
  if (entry.type === "tournament") {
    (Array.isArray(it.matches) ? it.matches : []).forEach(m => { if (m && m.racketName) out.push(m.racketName); });
  }
  return out;
};

// 1 件のエントリから取り得る対戦相手名を配列で返す (大会のみ、練習は空)
const _entryOpponents = (entry) => {
  if (entry.type !== "tournament") return [];
  const out = [];
  (Array.isArray(entry.item.matches) ? entry.item.matches : []).forEach(m => {
    if (m && m.opponent)  out.push(m.opponent);
    if (m && m.opponent2) out.push(m.opponent2);
  });
  return out;
};

// 検索語 (q) がエントリのどこかに含まれるか (部分一致、大小英字無視)
const _matchesSearch = (entry, q) => {
  const trimmed = (q || "").trim();
  if (!trimmed) return true;
  const lower = trimmed.toLowerCase();
  const hit = (s) => !!s && String(s).toLowerCase().includes(lower);
  const it = entry.item;
  if (entry.type === "tournament") {
    if (hit(it.name) || hit(it.venue) || hit(it.generalNote)) return true;
    const matches = Array.isArray(it.matches) ? it.matches : [];
    for (const m of matches) {
      if (!m) continue;
      if (hit(m.opponent) || hit(m.opponent2) || hit(m.opponentNote) || hit(m.mentalNote) || hit(m.techNote) || hit(m.note)) return true;
    }
    return false;
  }
  if (entry.type === "practice") {
    return hit(it.title) || hit(it.venue) || hit(it.coachNote) || hit(it.goodNote) || hit(it.improveNote) || hit(it.generalNote);
  }
  if (entry.type === "trial") {
    return hit(it.racketName) || hit(it.stringMain) || hit(it.stringCross) || hit(it.venue)
        || hit(it.strokeNote) || hit(it.serveNote) || hit(it.volleyNote) || hit(it.generalNote);
  }
  return false;
};

// 各絞り込み軸の判定 (全て AND、同一軸の複数値は OR)
const _matchesFilters = (entry, filters) => {
  // S16 完了 (Phase 4-C): 試打は記録タブに独立カードとして出さない (機材タブ Recent Trials に集約)
  if (entry.type === "trial") return false;
  if (filters.type.length > 0) {
    const label = entry.type === "tournament" ? "大会"
                : entry.type === "practice"   ? "練習"
                : "";
    if (!filters.type.includes(label)) return false;
  }
  if (filters.racket.length > 0) {
    const rs = _entryRackets(entry);
    if (!filters.racket.some(r => rs.includes(r))) return false;
  }
  if (filters.opponent.length > 0) {
    const ops = _entryOpponents(entry);
    if (!filters.opponent.some(o => ops.includes(o))) return false;
  }
  if (filters.result.length > 0) {
    if (entry.type !== "tournament") return false;
    if (!filters.result.includes(entry.item.overallResult)) return false;
  }
  return true;
};

const _hasAnyFilter = (filters, search) => {
  if ((search || "").trim().length > 0) return true;
  return FILTER_AXES.some(k => (filters[k] || []).length > 0);
};

// ── 本体
function SessionsTab({ tournaments = [], practices = [], trials = [], loading = false, onCardClick, onFabClick, filterFromHome, onBackToHome, onUserChangedFilter }) {
  const [collapsedYears, setCollapsedYears] = useState(() => {
    try { return JSON.parse(localStorage.getItem("v4-sessions-collapsed-years") || "{}"); }
    catch { return {}; }
  });
  const toggleYear = (key) => {
    setCollapsedYears(prev => {
      // undefined を折り畳みとして扱う (初期状態は折り畳み)
      const currentlyCollapsed = prev[key] !== false;
      const next = { ...prev, [key]: currentlyCollapsed ? false : true };
      try { localStorage.setItem("v4-sessions-collapsed-years", JSON.stringify(next)); } catch {}
      return next;
    });
  };
  // 予定セクションの折り畳み状態 (既定は折り畳み、明示展開時のみ false)
  const [futureCollapsed, setFutureCollapsed] = useState(() => {
    try {
      const v = localStorage.getItem("v4-sessions-future-collapsed");
      return v === null ? true : JSON.parse(v);
    } catch { return true; }
  });
  const toggleFuture = () => {
    setFutureCollapsed(prev => {
      const next = !prev;
      try { localStorage.setItem("v4-sessions-future-collapsed", JSON.stringify(next)); } catch {}
      return next;
    });
  };

  // S7: 検索・絞り込み state (localStorage 永続化)
  const [search, setSearch] = useState(_loadSearch);
  const [filters, setFilters] = useState(_loadFilters);
  const [openDrawerAxis, setOpenDrawerAxis] = useState(null); // "type"|"racket"|"opponent"|"result"|null
  // S13.5: 検索欄の展開状態 (デフォルト閉じる、検索語があれば強制展開)
  const [searchOpen, setSearchOpen] = useState(_loadSearchOpen);
  useEffect(() => { try { localStorage.setItem(LS_SEARCH, search || ""); } catch {} }, [search]);
  useEffect(() => { try { localStorage.setItem(LS_FILTERS, JSON.stringify(filters)); } catch {} }, [filters]);
  useEffect(() => { try { localStorage.setItem(LS_SEARCH_OPEN, String(searchOpen)); } catch {} }, [searchOpen]);
  // S18 Issue 1: filterFromHome 状態でユーザーが filter を変更したら、永続化扱いに切替 (フラグ false)
  //   mount 時の filters を ref で保持、現在 filters が異なれば user 操作扱い
  const _initialFiltersRef = useRef(filters);
  useEffect(() => {
    if (filterFromHome && JSON.stringify(filters) !== JSON.stringify(_initialFiltersRef.current)) {
      onUserChangedFilter && onUserChangedFilter();
    }
  }, [filters, filterFromHome, onUserChangedFilter]);
  // 検索語がある時は強制展開
  const showSearch = searchOpen || (search || "").trim().length > 0;

  // S8-S9: 表示モード切替 (list / calendar / year、localStorage 永続化)
  const [viewMode, setViewMode] = useState(_loadViewMode);
  useEffect(() => { try { localStorage.setItem(LS_VIEWMODE, viewMode); } catch {} }, [viewMode]);
  // S8-S9: カレンダー/年間 mode で DayPanel が開いているか (FAB を退避させる)
  const [dayPanelOpen, setDayPanelOpen] = useState(false);
  // mode 切替で DayPanel state をリセット (list mode には DayPanel が無いため取り残し防止)
  useEffect(() => { setDayPanelOpen(false); }, [viewMode]);

  // 全アイテムを {type, item} にまとめて date desc ソート
  // 試打 (trial) は基本は付随活動 (バッジ表示) だが、S11 暫定で type フィルタ「試打」選択時のみ
  // 独立カードとして表示するため、allItems には含める。フィルタ判定 (_matchesFilters) で除外/許可。
  // S16 (Gear タブ) 完成で暫定削除予定。
  const allItems = useMemo(() => {
    const list = [];
    tournaments.forEach(it => list.push({ type: "tournament", item: it }));
    practices.forEach(it => list.push({ type: "practice", item: it }));
    trials.forEach(it => list.push({ type: "trial", item: it }));
    list.sort((a, b) => normDate(b.item.date).localeCompare(normDate(a.item.date)));
    return list;
  }, [tournaments, practices, trials]);

  // S7: 絞り込み軸の候補 (元データから動的抽出)
  const racketOptions   = useMemo(() => _extractRackets(tournaments, practices, trials), [tournaments, practices, trials]);
  const opponentOptions = useMemo(() => _extractOpponents(tournaments), [tournaments]);

  // S7: 検索 + 絞り込み適用後のアイテム
  const filteredItems = useMemo(
    () => allItems.filter(e => _matchesSearch(e, search) && _matchesFilters(e, filters)),
    [allItems, search, filters]
  );
  const filterActive = _hasAnyFilter(filters, search);

  // 試打の紐付き Set (元データ基準でバッジ判定、絞り込みには影響しない)
  const trialLinks = useMemo(() => _buildTrialLinkedSets(tournaments, practices, trials), [tournaments, practices, trials]);

  // 時間軸密度でグループ化 (未来/週/月/年の 4 バケット、週はカレンダー通り日曜始まり)
  const grouped = useMemo(() => {
    const now = new Date();
    now.setHours(0, 0, 0, 0);
    const currentWeekStart = _getSundayOfWeek(now); // 今週の日曜
    const currentWeekEnd = new Date(currentWeekStart);
    currentWeekEnd.setDate(currentWeekEnd.getDate() + 6);
    currentWeekEnd.setHours(23, 59, 59, 999); // 今週の土曜夜
    const fourWeeksBefore = new Date(currentWeekStart);
    fourWeeksBefore.setDate(fourWeeksBefore.getDate() - 28); // 4 週前の日曜
    const oneYearAgo = new Date(now); oneYearAgo.setFullYear(oneYearAgo.getFullYear() - 1);

    const future = [];                         // 今週の土曜より後
    const weeks = {}, months = {}, years = {};
    const weekOrder = [], monthOrder = [], yearOrder = [];

    filteredItems.forEach((entry) => {
      const nd = normDate(entry.item.date);
      const m = nd.match(/^(\d{4})-(\d{2})-(\d{2})/);
      if (!m) return;
      const date = new Date(nd + "T00:00:00");
      if (isNaN(date)) return;

      if (date > currentWeekEnd) {
        // 来週以降の予定
        future.push(entry);
      } else if (date >= fourWeeksBefore) {
        // 今週含む直近 4 週 (今週の未来日も同じ週に含める)
        const sunday = _getSundayOfWeek(date);
        const key = _toDateISO(sunday);
        if (!weeks[key]) { weeks[key] = []; weekOrder.push(key); }
        weeks[key].push(entry);
      } else if (date >= oneYearAgo) {
        const key = `${m[1]}-${m[2]}`;
        if (!months[key]) { months[key] = []; monthOrder.push(key); }
        months[key].push(entry);
      } else {
        const yKey = m[1], mKey = `${m[1]}-${m[2]}`;
        if (!years[yKey]) { years[yKey] = { total: 0, months: {}, monthOrder: [] }; yearOrder.push(yKey); }
        if (!years[yKey].months[mKey]) { years[yKey].months[mKey] = []; years[yKey].monthOrder.push(mKey); }
        years[yKey].months[mKey].push(entry);
        years[yKey].total++;
      }
    });

    weekOrder.sort((a, b) => b.localeCompare(a));
    monthOrder.sort((a, b) => b.localeCompare(a));
    yearOrder.sort((a, b) => b.localeCompare(a));
    future.sort((a, b) => normDate(a.item.date).localeCompare(normDate(b.item.date)));

    return { future, weeks, weekOrder, months, monthOrder, years, yearOrder, now };
  }, [filteredItems]);

  const renderCard = (entry, i) => {
    const props = _buildCardProps(entry.type, entry.item);
    // その日に紐付いた試打がある場合はリンクバッジを付与
    const id = entry.item.id;
    const hasTrialLink =
      (entry.type === "tournament" && trialLinks.linkedTournamentIds.has(id)) ||
      (entry.type === "practice"   && trialLinks.linkedPracticeIds.has(id));
    if (hasTrialLink) props.trialBadge = TRIAL_BADGE;
    return (
      <SessionCard
        key={`${entry.type}-${id || i}`}
        {...props}
        onClick={onCardClick ? () => onCardClick(entry.type, entry.item) : undefined}
      />
    );
  };

  const hasAny = grouped.future.length > 0 || grouped.weekOrder.length > 0 || grouped.monthOrder.length > 0 || grouped.yearOrder.length > 0;

  // S7: Drawer が現在開いている軸の選択肢
  const axisOptions =
    openDrawerAxis === "type"     ? TYPE_OPTIONS     :
    openDrawerAxis === "racket"   ? racketOptions    :
    openDrawerAxis === "opponent" ? opponentOptions  :
    openDrawerAxis === "result"   ? RESULT_OPTIONS   : [];
  const clearAxis = (axis) => setFilters(prev => ({ ...prev, [axis]: [] }));

  return (
    <div style={{ display: "flex", flexDirection: "column", flex: 1, minHeight: 0 }}>
      {/* S18 Issue 1: ホームから飛んだフィルターのバナー (Home起源時のみ表示)
          タップでホームに戻る (フィルターは app.jsx tab change useEffect で自動解除) */}
      {filterFromHome && onBackToHome && (
        <button
          type="button"
          onClick={onBackToHome}
          style={{
            display: "flex", alignItems: "center", gap: 8,
            background: C.primaryLight, color: C.primary,
            border: "none", borderBottom: `1px solid ${C.divider}`,
            padding: "10px 16px",
            fontSize: 13, fontWeight: 600, fontFamily: font,
            cursor: "pointer",
            width: "100%", textAlign: "left",
          }}
          aria-label="ホームに戻る"
        >
          <Icon name="arrow-left" size={16} color={C.primary} />
          <span>ホームに戻る</span>
          <span style={{ marginLeft: "auto", fontSize: 11, fontWeight: 500, color: C.primaryHover }}>
            主力ラケットフィルター中
          </span>
        </button>
      )}

      <SummaryHeader
        tournaments={tournaments}
        practices={practices}
        filtered={filterActive}
        filteredCount={filteredItems.length}
        totalCount={allItems.length}
        viewMode={viewMode}
        onViewModeChange={setViewMode}
      />

      {/* メイン領域: mode で list / calendar / year を切替 */}
      {viewMode === "calendar" ? (
        loading ? (
          <div style={{ flex: 1, textAlign: "center", padding: 40, color: C.textMuted, fontSize: 13 }}>
            読み込み中...
          </div>
        ) : (
          <CalendarView
            items={filteredItems}
            trialLinks={trialLinks}
            onCardClick={onCardClick}
            onPanelStateChange={setDayPanelOpen}
          />
        )
      ) : viewMode === "year" ? (
        loading ? (
          <div style={{ flex: 1, textAlign: "center", padding: 40, color: C.textMuted, fontSize: 13 }}>
            読み込み中...
          </div>
        ) : (
          <YearHeatmap
            items={filteredItems}
            trialLinks={trialLinks}
            onCardClick={onCardClick}
            onPanelStateChange={setDayPanelOpen}
          />
        )
      ) : (
      /* リスト mode (S7 までの内容) */
      <div style={{ flex: 1, overflow: "auto", padding: "12px 16px 12px" }}>
        {loading ? (
          <div style={{ textAlign: "center", padding: 40, color: C.textMuted, fontSize: 13 }}>
            読み込み中...
          </div>
        ) : !hasAny ? (
          <div style={{ textAlign: "center", padding: 40, color: C.textMuted, fontSize: 13 }}>
            {filterActive ? "条件に合う記録がありません" : "データがありません"}
          </div>
        ) : (
          <>
            {/* 未来の予定 (既定で折り畳み、今週を画面上部に出すため) */}
            {grouped.future.length > 0 && (
              <div>
                <TimeGroupHeader
                  level="month"
                  label="予定（未来）"
                  count={grouped.future.length}
                  collapsible={true}
                  collapsed={futureCollapsed}
                  onToggle={toggleFuture}
                />
                {!futureCollapsed && grouped.future.map(renderCard)}
              </div>
            )}

            {/* 直近 4 週 (週ごと) */}
            {grouped.weekOrder.map((wk) => (
              <div key={`w-${wk}`}>
                <TimeGroupHeader level="week" label={_weekLabel(wk, grouped.now)} />
                {grouped.weeks[wk].map(renderCard)}
              </div>
            ))}

            {/* 4 週 〜 1 年 (月ごと) */}
            {grouped.monthOrder.map((mo) => (
              <div key={`m-${mo}`}>
                <TimeGroupHeader level="month" label={_monthLabel(mo)} count={grouped.months[mo].length} />
                {grouped.months[mo].map(renderCard)}
              </div>
            ))}

            {/* 1 年以上前 (年ごと、既定で折り畳み) */}
            {grouped.yearOrder.map((y) => {
              const yr = grouped.years[y];
              // デフォルト動作: 未設定 = 折り畳み (true)、明示的に展開された時だけ false
              const collapsed = collapsedYears[y] !== false;
              return (
                <div key={`y-${y}`}>
                  <TimeGroupHeader
                    level="year"
                    label={_yearLabel(y)}
                    count={yr.total}
                    collapsible={true}
                    collapsed={collapsed}
                    onToggle={() => toggleYear(y)}
                  />
                  {!collapsed && yr.monthOrder.map((mo) => (
                    <div key={`y-${y}-m-${mo}`}>
                      <TimeGroupHeader level="month" label={_monthLabel(mo)} count={yr.months[mo].length} />
                      {yr.months[mo].map(renderCard)}
                    </div>
                  ))}
                </div>
              );
            })}
          </>
        )}
      </div>
      )}

      {/* S7: 操作帯 (画面下、TabBar 直上) — タップした直上に Drawer がせり上がる導線
          S13.5: 検索欄を collapsible 化 (デフォルト閉、🔍 ボタンで開閉、検索語あれば強制展開) */}
      <div style={{
        borderTop: `1px solid ${C.divider}`,
        background: C.bg,
        flexShrink: 0,
      }}>
        {/* 絞り込みチップ行 + 検索トグル (横スクロール) */}
        <div style={{
          display: "flex", gap: 8,
          padding: "8px 16px",
          overflowX: "auto",
          alignItems: "center",
        }}>
          {FILTER_AXES.map(axis => (
            <FilterChip
              key={axis}
              label={FILTER_CHIP_LABEL[axis]}
              selectedValues={filters[axis]}
              onOpen={() => setOpenDrawerAxis(axis)}
              onClear={filters[axis].length > 0 ? () => clearAxis(axis) : undefined}
            />
          ))}
          {/* S13.5: 検索トグルボタン (アイコン only)。アクティブ時は primaryLight bg で展開状態を視覚化 */}
          <button
            onClick={() => setSearchOpen(prev => !prev)}
            aria-label={showSearch ? "検索を閉じる" : "検索を開く"}
            aria-pressed={showSearch}
            style={{
              flexShrink: 0,
              width: 32, height: 32,
              display: "flex", alignItems: "center", justifyContent: "center",
              border: `1px solid ${showSearch ? C.primary : C.border}`,
              borderRadius: 16,
              background: showSearch ? C.primaryLight : C.panel,
              color: showSearch ? C.primary : C.textSecondary,
              cursor: "pointer",
              padding: 0,
              transition: "background 150ms, border-color 150ms",
              fontFamily: font,
            }}
          >
            <Icon name="search" size={16} color={showSearch ? C.primary : C.textSecondary} />
          </button>
        </div>
        {/* 検索行 (条件描画: searchOpen=true or search 語あり) */}
        {showSearch && (
          <div style={{ padding: "0 16px 8px", animation: "dayPanelSlideUp 200ms ease-out" }}>
            <SearchBar value={search} onChange={setSearch} />
          </div>
        )}
      </div>

      {/* FAB + ミニメニュー (S12): タップで大会/練習の 2 択ポップオーバー。
          試打は S14 Home 3 ボタンに集約 (DECISIONS_v4.md S12)。
          カレンダー/年間 mode で DayPanel が開いている時は非表示 (パネルを閉じれば再表示) */}
      {!((viewMode === "calendar" || viewMode === "year") && dayPanelOpen) && (
        <QuickAddFab onSelect={onFabClick} ariaLabel="記録を追加" bottom={180} />
      )}

      {/* S7: 絞り込みドロワー (画面下シート) */}
      <FilterDrawer
        open={!!openDrawerAxis}
        title={openDrawerAxis ? FILTER_DRAWER_TITLE[openDrawerAxis] : ""}
        options={axisOptions}
        selected={openDrawerAxis ? (filters[openDrawerAxis] || []) : []}
        onApply={(newSel) => {
          if (openDrawerAxis) setFilters(prev => ({ ...prev, [openDrawerAxis]: newSel }));
          setOpenDrawerAxis(null);
        }}
        onClose={() => setOpenDrawerAxis(null)}
      />
    </div>
  );
}

// === src/ui/sessions/SummaryHeader.jsx ===
// SummaryHeader — Sessions タブ上部のサマリー帯 (DESIGN_SYSTEM §8.5.4)
// props:
//   tournaments, practices, trials: 各配列
//   filtered: 絞り込み中フラグ
//   filteredCount, totalCount: 絞り込み中の件数 (filtered=true の時)
//   viewMode, onViewModeChange: S8 で追加 ("list"|"calendar"、右端トグル)
//
// 通常: 「今月: 18件（練15 / 大2）・直近10試合 7勝3敗」
// 絞り込み中: 「絞り込み結果: 12件 / 950件」
// 右端: ViewModeSwitcher (リスト/カレンダー)

function _formatMonthCounts(tournaments, practices) {
  // 試打は大会/練習に付随する活動なのでセッション総数には数えない
  const now = new Date();
  const thisMonth = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}`;
  const inThisMonth = (item) => normDate(item.date).startsWith(thisMonth);
  const t = tournaments.filter(inThisMonth).length;
  const p = practices.filter(inThisMonth).length;
  return { total: t + p, t, p };
}

function _formatRecentRecord(tournaments) {
  // H-9 (Phase A 監査): _normalizeMatchResult で表記揺れ吸収 (勝/負/win/loss/勝利/敗北)
  const sorted = [...tournaments].sort((a, b) => normDate(b.date).localeCompare(normDate(a.date)));
  const recentMatches = [];
  for (const t of sorted) {
    const matches = Array.isArray(t.matches) ? t.matches : [];
    for (const m of matches) {
      if (m && m.result) recentMatches.push(_normalizeMatchResult(m.result));
      if (recentMatches.length >= 10) break;
    }
    if (recentMatches.length >= 10) break;
  }
  const wins = recentMatches.filter(r => r === "win").length;
  const losses = recentMatches.filter(r => r === "loss").length;
  return { count: recentMatches.length, wins, losses };
}

function SummaryHeader({ tournaments = [], practices = [], filtered = false, filteredCount = 0, totalCount = 0, viewMode = "list", onViewModeChange }) {
  const monthStats = useMemo(() => _formatMonthCounts(tournaments, practices), [tournaments, practices]);
  const recent = useMemo(() => _formatRecentRecord(tournaments), [tournaments]);
  // S13.5 (2026-04-27): text タップで詳細 Modal を開く。
  //   サマリー帯が幅狭で省略されていた問題への対応。最小情報 (件数 + 勝敗) のみ、将来 Insights 統合時にリッチ化可能。
  const [summaryOpen, setSummaryOpen] = useState(false);

  const wrapStyle = {
    padding: "8px 16px",
    background: C.primaryLight,
    color: C.primary,
    fontSize: 13,
    fontWeight: 500,
    borderTop: `1px solid ${C.divider}`,
    borderBottom: `1px solid ${C.divider}`,
    display: "flex",
    alignItems: "center",
    justifyContent: "space-between",
    gap: 8,
  };
  const textStyle = {
    flex: 1,
    minWidth: 0,
    overflow: "hidden",
    textOverflow: "ellipsis",
    whiteSpace: "nowrap",
    cursor: filtered ? "default" : "pointer",
    // タップ領域確保のための padding (clickable な時のみ visual hint)
    padding: filtered ? 0 : "2px 4px",
    margin: filtered ? 0 : "-2px -4px",
    borderRadius: 4,
    transition: "background 150ms",
  };

  // 絞り込み中は count 表示で完結、Modal 不要 (S13.5: 詳細は今月数値のみ表示)
  const handleTextClick = filtered ? undefined : () => setSummaryOpen(true);

  let textNode;
  if (filtered) {
    textNode = <div style={textStyle}>絞り込み結果: {filteredCount}件 / {totalCount}件</div>;
  } else {
    const parts = [];
    parts.push(`今月: ${monthStats.total}件`);
    if (monthStats.total > 0) parts.push(`（練${monthStats.p} / 大${monthStats.t}）`);
    const line1 = parts.join("");
    const line2 = recent.count > 0 ? `直近${recent.count}試合 ${recent.wins}勝${recent.losses}敗` : "";
    textNode = (
      <div
        style={textStyle}
        onClick={handleTextClick}
        role={handleTextClick ? "button" : undefined}
        tabIndex={handleTextClick ? 0 : undefined}
        aria-label={handleTextClick ? "今月のサマリー詳細を開く" : undefined}
        onKeyDown={handleTextClick ? (e) => {
          if (e.key === "Enter" || e.key === " ") { e.preventDefault(); handleTextClick(); }
        } : undefined}
      >
        {line1}{line2 && ` ・ ${line2}`}
      </div>
    );
  }

  // S13.5: 勝率計算 (Modal 内で表示)
  const winRate = recent.wins + recent.losses > 0
    ? Math.round((recent.wins / (recent.wins + recent.losses)) * 100)
    : null;

  return (
    <>
      <div style={wrapStyle}>
        {textNode}
        {onViewModeChange && (
          <ViewModeSwitcher value={viewMode} onChange={onViewModeChange} />
        )}
      </div>

      {/* S13.5: 今月のサマリー詳細 Modal (text タップで開く)
          最小情報のみ。将来リッチ化候補 (主力ラケット / 平均練習時間 / 月次推移) は Insights タブ完成後に統合 */}
      <Modal open={summaryOpen} onClose={() => setSummaryOpen(false)} title="今月のサマリー">
        <div style={{ padding: "4px 4px 8px", fontSize: 14, color: C.text }}>
          <div style={{ marginBottom: 14 }}>
            <div style={{ fontSize: 15, fontWeight: 700, marginBottom: 6 }}>
              活動: {monthStats.total} 件
            </div>
            <div style={{ paddingLeft: 14, color: C.textSecondary, fontSize: 13, lineHeight: 1.8 }}>
              練習 {monthStats.p} 回 / 大会 {monthStats.t} 回
            </div>
          </div>
          {recent.count > 0 && (
            <div>
              <div style={{ fontSize: 15, fontWeight: 700, marginBottom: 6 }}>
                直近 {recent.count} 試合: {recent.wins} 勝 {recent.losses} 敗
              </div>
              <div style={{ paddingLeft: 14, color: C.textSecondary, fontSize: 13, lineHeight: 1.8 }}>
                勝率 {winRate}%
              </div>
            </div>
          )}
          {monthStats.total === 0 && recent.count === 0 && (
            <div style={{ color: C.textMuted, fontSize: 13, textAlign: "center", padding: "12px 0" }}>
              今月のデータはまだありません
            </div>
          )}
        </div>
      </Modal>
    </>
  );
}

// === src/ui/sessions/TimeGroupHeader.jsx ===
// TimeGroupHeader — Sessions リストの時間軸見出し (DESIGN_SYSTEM §8.5.6)
// props:
//   level: "week" | "month" | "year"
//   label: 表示文字列 (例: "今週 (4/15-4/21)" / "2026年3月" / "2025年")
//   count: アイテム数 (省略可、省略時は件数表示なし)
//   collapsible: 折り畳み可能か (year/month は true、week は false)
//   collapsed: 折り畳み状態
//   onToggle: 折り畳み切替コールバック (collapsible=true の時)
//
// sticky: 親要素の scroll に追従、top 0 で固定

const LEVEL_STYLES = {
  week:  { fontSize: 12, fontWeight: 700, color: C.textSecondary, marginTop: 12 },
  month: { fontSize: 13, fontWeight: 700, color: C.textSecondary, marginTop: 16 },
  year:  { fontSize: 14, fontWeight: 700, color: C.text,          marginTop: 20 },
};

function TimeGroupHeader({ level = "month", label, count, collapsible = false, collapsed = false, onToggle }) {
  const s = LEVEL_STYLES[level] || LEVEL_STYLES.month;
  const clickable = collapsible;
  return (
    <div
      onClick={clickable ? onToggle : undefined}
      role={clickable ? "button" : undefined}
      tabIndex={clickable ? 0 : undefined}
      aria-expanded={clickable ? !collapsed : undefined}
      onKeyDown={clickable ? (e) => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); onToggle(e); } } : undefined}
      style={{
        ...s,
        display: "flex",
        alignItems: "center",
        justifyContent: "space-between",
        marginBottom: 6,
        padding: "4px 2px",
        position: "sticky",
        top: 0,
        background: C.bg,
        zIndex: 1,
        cursor: clickable ? "pointer" : "default",
      }}
    >
      <span>
        {label}
        {typeof count === "number" && count > 0 && (
          <span style={{ fontWeight: 500, color: C.textMuted, marginLeft: 6 }}>({count}件)</span>
        )}
      </span>
      {clickable && (
        <Icon
          name={collapsed ? "chevron-down" : "chevron-up"}
          size={level === "year" ? 20 : 18}
          color={C.textMuted}
          ariaLabel={collapsed ? "展開" : "折り畳み"}
        />
      )}
    </div>
  );
}

// === src/ui/sessions/TournamentDetail.jsx ===
// TournamentDetail — 大会セッション詳細の body セクション群
// SessionDetailView から session prop を受け取り、Header/ActionBar は呼び出し側で描画
// 共通 helper (_dvSection / _dvInfoCell / _dvResultBadgeProps / _dvTournamentHighlight)
// は SessionDetailView.jsx で定義 (関数宣言なので巻き上げで見える)
// リクエスト 30-a: onAddMatch を受け取って「+ 試合を追加」ボタンを表示。
//   タップで編集モードを経由せず直接 MatchEditModal を開ける (3 → 2 タップ)。
function TournamentDetail({ session, onMatchClick, onAddMatch }) {
  const t = session || {};
  const hl = _dvTournamentHighlight(t.overallResult);
  const resultBadge = _dvTournamentResultBadgeProps(t.overallResult);
  const typeBadge = _dvTournamentTypeBadgeProps(t.type);
  const matches = Array.isArray(t.matches) ? t.matches : [];
  const wins = matches.filter(m => m.result === "勝利").length;
  const losses = matches.filter(m => m.result === "敗北" || m.result === "棄権").length;

  return (
    <>
      {/* Title (優勝 gold highlight) */}
      <_dvSection variant={hl}>
        {(resultBadge || typeBadge) && (
          <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 8 }}>
            {resultBadge && <Badge variant={resultBadge.variant} icon={resultBadge.icon}>{resultBadge.label}</Badge>}
            {typeBadge && <Badge variant={typeBadge.variant} icon={typeBadge.icon}>{typeBadge.label}</Badge>}
          </div>
        )}
        <div style={{ fontSize: 17, fontWeight: hl ? 700 : 600, color: C.text, lineHeight: 1.4, marginBottom: 4 }}>
          {t.name || "(無題の大会)"}
        </div>
        {matches.length > 0 && (
          <div style={{ fontSize: 13, color: C.textSecondary }}>
            {wins}勝{losses}敗 ・ {matches.length}試合
          </div>
        )}
      </_dvSection>

      {/* 会場 / 気象 */}
      {(t.venue || t.temp || t.weather) && (
        <_dvSection title="会場 / 気象">
          <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr 1fr", gap: 8 }}>
            <_dvInfoCell label="会場" value={t.venue} />
            <_dvInfoCell label="気温" value={t.temp ? t.temp + "℃" : ""} />
            <_dvInfoCell label="天気" value={t.weather} />
          </div>
        </_dvSection>
      )}

      {/* 機材 */}
      {(t.racketName || t.stringMain || t.stringCross || t.tensionMain || t.tensionCross) && (
        <_dvSection title="機材">
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 6 }}>
            <_dvInfoCell label="ラケット" value={t.racketName} />
            <_dvInfoCell label="テンション" value={_dvFmtTension(t.tensionMain, t.tensionCross)} />
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
            <_dvInfoCell label="縦糸" value={t.stringMain} />
            <_dvInfoCell label="横糸" value={t.stringCross} />
          </div>
        </_dvSection>
      )}

      {/* 試合記録 (リク 30-a: 試合 0 件でも常時表示し、末尾に + 試合を追加 ボタンを置く) */}
      {(matches.length > 0 || onAddMatch) && (
        <_dvSection title={matches.length > 0 ? `試合記録 (${matches.length}試合)` : "試合記録"}>
          {matches.map((m, i) => (
            <div
              key={m.id || i}
              onClick={() => onMatchClick && onMatchClick(m)}
              style={{
                background: C.bg,
                borderRadius: 8,
                padding: "10px 12px",
                marginBottom: 6,
                display: "flex",
                alignItems: "center",
                gap: 10,
                cursor: onMatchClick ? "pointer" : "default",
                transition: "background 150ms ease-out",
                minHeight: 44,
              }}
              onMouseEnter={(e) => onMatchClick && (e.currentTarget.style.background = C.panel2)}
              onMouseLeave={(e) => onMatchClick && (e.currentTarget.style.background = C.bg)}
            >
              <span style={{ fontSize: 11, color: C.textSecondary, minWidth: 36, fontWeight: 600 }}>{m.round || "—"}</span>
              <span style={{ flex: 1, fontSize: 13, fontWeight: 500, color: C.text }}>
                {m.opponent || "(対戦相手 未入力)"}{m.opponent2 ? " / " + m.opponent2 : ""}
              </span>
              <span style={{ fontSize: 12, color: C.textSecondary, fontVariantNumeric: "tabular-nums" }}>
                {Array.isArray(m.setScores) ? m.setScores.filter(Boolean).join(" ") : ""}
              </span>
              <span style={{ fontSize: 13, fontWeight: 700, color: m.result === "勝利" ? C.practiceAccent : m.result === "敗北" ? C.error : C.textMuted }}>
                {m.result === "勝利" ? "勝" : m.result === "敗北" ? "負" : m.result === "棄権" ? "棄" : "—"}
              </span>
              {onMatchClick && <Icon name="chevron-right" size={14} color={C.textMuted} />}
            </div>
          ))}
          {onAddMatch && (
            <button
              type="button"
              onClick={onAddMatch}
              style={{
                width: "100%", minHeight: 44, padding: 10,
                borderRadius: 8, border: `1px dashed ${C.primary}`, background: C.primaryLight, color: C.primary,
                fontSize: 13, fontWeight: 600, cursor: "pointer",
                display: "flex", alignItems: "center", justifyContent: "center", gap: 6, fontFamily: font,
              }}
            >
              <Icon name="plus" size={16} color={C.primary} />試合を追加
            </button>
          )}
        </_dvSection>
      )}

      {/* 総括メモ */}
      {t.generalNote && (
        <_dvSection title="総括メモ">
          <_dvMemoItem label="大会総括" text={t.generalNote} summary={t.memoSummaries?.generalNote} />
        </_dvSection>
      )}
    </>
  );
}

// === src/ui/sessions/TournamentEditForm.jsx ===
// TournamentEditForm — 大会編集フォーム
// 統一フォーマット (preview_s11 §1):
//   ① 基本情報: 日付* / 大会名* / 形式 / クラス / 結果 / 開始-終了時刻
//   ② 会場 / 気象: 会場 / 気温 / 天気 (3 列)
//   ③ 機材: ラケット / テンション / 縦糸 / 横糸 (2x2)
//   ④ 試合記録: matches[] リスト + 追加ボタン → MatchEditModal
//   ⑤ メモ: 大会総括
//   ⑥ 公開設定: visibility (public/private)
//
// props:
//   form: 編集中の tournament (state は親 SessionEditView が持つ)
//   errors: バリデーションエラー (validation.js の getRequiredErrors 結果)
//   onChange(form): form 全体を返す
//   confirm: useConfirm() ({ ask })
//   toast: useToast() ({ show })

const _TYPE_OPTS    = [{ value: "singles", label: "シングルス" }, { value: "doubles", label: "ダブルス" }, { value: "mixed", label: "ミックス" }];
const _RESULT_OPTS  = [
  { value: "",         label: "— 未定 —" },
  { value: "優勝",     label: "優勝" },
  { value: "準優勝",   label: "準優勝" },
  { value: "3位",      label: "3位" },
  { value: "ベスト8",  label: "ベスト8" },
  { value: "ベスト16", label: "ベスト16" },
  { value: "予選突破", label: "予選突破" },
  { value: "敗退",     label: "敗退" },
  { value: "予選敗退", label: "予選敗退" },
];
const _WEATHER_OPTS = [{ value: "", label: "—" }, { value: "晴", label: "晴" }, { value: "曇", label: "曇" }, { value: "雨", label: "雨" }, { value: "屋内", label: "屋内" }];

// ── 番号付きセクション見出し
function _sectionHead({ num, label }) {
  return (
    <div style={{ fontSize: 11, color: C.textMuted, fontWeight: 600, letterSpacing: 0.5, marginBottom: 10, textTransform: "uppercase", display: "flex", alignItems: "center", gap: 5 }}>
      <span style={{
        display: "inline-flex", alignItems: "center", justifyContent: "center",
        width: 18, height: 18, borderRadius: "50%", background: C.primary, color: "#fff",
        fontSize: 10, fontWeight: 700,
      }}>{num}</span>
      {label}
    </div>
  );
}

// ── 公開トグル (v3 VisibilityToggle 移植 + v4 デザイン)
function _visibilityToggle({ value, onChange }) {
  const cur = value || "public";
  const opts = [
    { v: "public",  label: "🌐 公開",   note: "プライマリ Cal" },
    { v: "private", label: "🔒 非公開", note: "仕事関係 Cal" },
  ];
  return (
    <div style={{ display: "flex", gap: 8 }}>
      {opts.map(o => {
        const on = cur === o.v;
        return (
          <button
            key={o.v}
            type="button"
            onClick={() => onChange(o.v)}
            style={{
              flex: 1, minHeight: 44, padding: "8px 12px",
              borderRadius: 8, border: `1px solid ${on ? C.primary : C.border}`,
              background: on ? C.primaryLight : C.panel,
              color: on ? C.primary : C.textSecondary,
              fontSize: 13, fontWeight: 600, cursor: "pointer",
              display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 2,
              fontFamily: font,
            }}
          >
            <div>{o.label}</div>
            <div style={{ fontSize: 10, opacity: 0.75 }}>{o.note}</div>
          </button>
        );
      })}
    </div>
  );
}

function TournamentEditForm({ form, errors = {}, onChange, confirm, toast, racketNames = [], stringNames = [], venueNames = [], opponentNames = [], levelNames = [], trials = [], tournaments = [], practices = [] }) {
  const set = (k, v) => onChange({ ...form, [k]: v });
  const matches = Array.isArray(form.matches) ? form.matches : [];
  const wins = matches.filter(m => m.result === "勝利").length;
  const losses = matches.filter(m => m.result === "敗北" || m.result === "棄権").length;

  // S16.11 UX5: 履歴セット picker 用に直近 setup を計算
  const recentSetups = useMemo(
    () => _computeRecentSetups(tournaments, practices, trials),
    [tournaments, practices, trials]
  );
  const applySetup = (s) => {
    if (!s) return;
    onChange({
      ...form,
      racketName:   s.racketName   || "",
      stringMain:   s.stringMain   || "",
      stringCross:  s.stringCross  || "",
      tensionMain:  s.tensionMain  || "",
      tensionCross: s.tensionCross || "",
    });
  };

  // Match Modal state (新規 / 編集)
  const [matchModalState, setMatchModalState] = useState(null); // { match, isNew }

  // S16.11 UX5: 試合追加時のデフォルト機材を「直前の試合」優先 (大会レベル form フォールバック)
  const handleAddMatch = () => {
    const lastMatch = matches.length > 0 ? matches[matches.length - 1] : null;
    setMatchModalState({ match: blankMatch(matches.length, lastMatch || form), isNew: true });
  };
  const handleEditMatch = (m) => {
    setMatchModalState({ match: m, isNew: false });
  };
  const handleSaveMatch = (newMatch) => {
    const exists = matches.find(m => m.id === newMatch.id);
    const newMatches = exists
      ? matches.map(m => m.id === newMatch.id ? newMatch : m)
      : [...matches, newMatch];
    onChange({ ...form, matches: newMatches });
    setMatchModalState(null);
  };
  const handleDeleteMatch = (id) => {
    // S13: 削除対象の match に linkedMatchId で紐付く試打件数をプレビュー (実 cascade は保存時、app.jsx handleSave)
    const cascade = computeCascade({ type: "match", item: { id }, trials });
    const desc = describeCascadeMessage("match", cascade.count);
    const messageNode = (
      <span style={{ display: "inline-block" }}>
        {desc.body}
        {desc.note && (<><br/><span style={{ fontSize: 12, color: C.textMuted }}>{desc.note}</span></>)}
        <br/><span style={{ fontSize: 12, color: C.textMuted }}>{desc.warn}</span>
      </span>
    );
    confirm.ask(
      messageNode,
      () => onChange({ ...form, matches: matches.filter(m => m.id !== id) }),
      { title: desc.title, yesLabel: "削除する", yesVariant: "danger", icon: "trash-2" }
    );
  };

  return (
    <>
      {/* ① 基本情報 */}
      <div style={{ background: C.panel, border: `1px solid ${C.divider}`, borderRadius: 12, padding: 12, marginBottom: 10 }}>
        <_sectionHead num="1" label="基本情報" />
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0 10px" }}>
          <Input type="date" label="日付" required value={form.date || ""} onChange={(v) => set("date", v)} error={errors.date} />
          <Input label="大会名" required value={form.name || ""} onChange={(v) => set("name", v)} placeholder="例: 所沢ベテラン大会" error={errors.name} />
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0 10px" }}>
          <Select label="形式" value={form.type || "singles"} onChange={(v) => set("type", v)} options={_TYPE_OPTS} />
          <MasterField label="クラス" value={form.level || ""} onChange={(v) => set("level", v)} masterValues={levelNames} placeholder="-- クラスを選択 --" />
        </div>
        <Select label="結果" value={form.overallResult || ""} onChange={(v) => set("overallResult", v)} options={_RESULT_OPTS} />
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0 10px" }}>
          {/* リク 30-* (S18) Wheel picker 全画面適用 */}
          <TimeWheel label="開始時刻" value={form.startTime || ""} onChange={(v) => set("startTime", v)} />
          <TimeWheel label="終了時刻" value={form.endTime || ""} onChange={(v) => set("endTime", v)} />
        </div>
      </div>

      {/* ② 会場 / 気象 */}
      <div style={{ background: C.panel, border: `1px solid ${C.divider}`, borderRadius: 12, padding: 12, marginBottom: 10 }}>
        <_sectionHead num="2" label="会場 / 気象" />
        <MasterField label="会場" value={form.venue || ""} onChange={(v) => set("venue", v)} masterValues={venueNames} placeholder="-- 会場を選択 --" />
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0 10px" }}>
          <NumWheel label="気温(℃)" value={form.temp || ""} min={-5} max={40} step={1} onChange={(v) => set("temp", v)} />
          <Select label="天気" value={form.weather || ""} onChange={(v) => set("weather", v)} options={_WEATHER_OPTS} />
        </div>
      </div>

      {/* ③ 機材 — ラケット 1 行 / 縦糸+横糸 / テンション縦+横 */}
      <div style={{ background: C.panel, border: `1px solid ${C.divider}`, borderRadius: 12, padding: 12, marginBottom: 10 }}>
        <_sectionHead num="3" label="機材" />
        <MasterField label="ラケット" value={form.racketName || ""} onChange={(v) => set("racketName", v)} masterValues={racketNames} placeholder="-- ラケットを選択 --" />
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0 10px" }}>
          <MasterField label="縦糸" value={form.stringMain || ""} onChange={(v) => set("stringMain", v)} masterValues={stringNames} placeholder="-- 縦糸を選択 --" />
          <MasterField label="横糸" value={form.stringCross || ""} onChange={(v) => set("stringCross", v)} masterValues={stringNames} placeholder="-- 同じなら空欄 --" />
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0 10px" }}>
          <NumWheel label="テンション縦" value={form.tensionMain || ""} min={35} max={55} step={1} onChange={(v) => set("tensionMain", v)} />
          <NumWheel label="テンション横" value={form.tensionCross || ""} min={35} max={55} step={1} onChange={(v) => set("tensionCross", v)} />
        </div>
        {/* S16.11 UX5: 履歴セット picker (5 フィールド一括入力) */}
        <_SetupPickerButton recent={recentSetups} current={form} onApply={applySetup} />
      </div>

      {/* ④ 試合形式 (リク 30-e S18: 大会のデフォルト試合形式)
          1set / 3set / 6game / 4game の 4 プリセット + 3set 時の 1-1 10pt TB トグル */}
      <div style={{ background: C.panel, border: `1px solid ${C.divider}`, borderRadius: 12, padding: 12, marginBottom: 10 }}>
        <_sectionHead num="4" label="試合形式" />
        <div style={{ fontSize: 11, color: C.textMuted, lineHeight: 1.5, marginBottom: 10 }}>
          各試合のセット数や勝敗条件のデフォルト。試合ごとに上書きも可。
        </div>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 8 }}>
          {[
            { v: "1set",  l: "1セット" },
            { v: "3set",  l: "3セット" },
            { v: "6game", l: "6ゲーム先取" },
            { v: "4game", l: "4ゲーム先取" },
          ].map(opt => {
            const cur = form.matchFormat?.preset || "3set";
            const active = cur === opt.v;
            return (
              <button
                key={opt.v}
                type="button"
                onClick={() => {
                  const finalSetMode = form.matchFormat?.finalSetMode || "normal";
                  set("matchFormat", formatFromPreset(opt.v, finalSetMode, form.matchFormat?.noAd || false));
                }}
                style={{
                  flex: "1 1 auto", minHeight: 40, padding: "8px 12px",
                  borderRadius: 8,
                  border: `1px solid ${active ? C.primary : C.border}`,
                  background: active ? C.primary : C.panel,
                  color: active ? "#fff" : C.text,
                  fontSize: 13, fontWeight: 600,
                  cursor: "pointer", fontFamily: font,
                }}
              >
                {opt.l}
              </button>
            );
          })}
        </div>
        {/* 3set 選択時のみ: 1-1 で 10pt TB トグル */}
        {(form.matchFormat?.preset || "3set") === "3set" && (
          <label style={{
            display: "flex", alignItems: "center", gap: 8,
            padding: "10px 12px",
            background: C.primaryLight, border: `1px solid ${C.primary}`,
            borderRadius: 8, cursor: "pointer", marginBottom: 8,
          }}>
            <input
              type="checkbox"
              checked={form.matchFormat?.finalSetMode === "matchTiebreak10"}
              onChange={(e) => {
                const next = formatFromPreset("3set", e.target.checked ? "matchTiebreak10" : "normal", form.matchFormat?.noAd || false);
                set("matchFormat", next);
              }}
              style={{ width: 18, height: 18, accentColor: C.primary, margin: 0 }}
            />
            <span style={{ fontSize: 13, color: C.text, fontWeight: 500 }}>
              最終セット (1-1) は 10 ポイントマッチタイブレークで決着
            </span>
          </label>
        )}
        <div style={{
          fontSize: 11, color: C.textSecondary, lineHeight: 1.6,
          background: C.bg, border: `1px solid ${C.divider}`,
          borderRadius: 6, padding: "6px 10px",
        }}>
          <strong style={{ color: C.text, marginRight: 4 }}>{formatLabel(form.matchFormat || DEFAULT_MATCH_FORMAT)}:</strong>
          {formatRuleSummary(form.matchFormat || DEFAULT_MATCH_FORMAT)}
        </div>
      </div>

      {/* ⑤ 試合記録 */}
      <div style={{ background: C.panel, border: `1px solid ${C.divider}`, borderRadius: 12, padding: 12, marginBottom: 10 }}>
        <_sectionHead num="5" label={`試合記録${matches.length > 0 ? ` (${wins}勝${losses}敗 ・ ${matches.length}試合)` : ""}`} />
        {matches.length === 0 ? (
          <div style={{ padding: "12px 14px", background: C.bg, borderRadius: 8, border: `1px dashed ${C.border}`, fontSize: 12, color: C.textMuted, textAlign: "center", marginBottom: 8 }}>
            「+ 試合を追加」から各試合を記録できます
          </div>
        ) : matches.map((m, i) => (
          // H-19 (Phase A 監査、preview_h19_p2.html 案 C 承認済):
          //   - 編集/削除ボタンを 24×24 → 44×44 (iOS HIG 準拠、削除誤押下リスク低減)
          //   - 行内 gap を 8 → 4 に詰めて対戦相手の表示幅 (~100px) を確保
          //   - 行高 64px / 対戦相手 minWidth: 0 で flexbox truncation を保証
          <div key={m.id || i} style={{
            background: C.bg, borderRadius: 8, padding: "10px 12px", marginBottom: 6,
            display: "flex", alignItems: "center", gap: 4, minHeight: 44,
          }}>
            <span style={{ fontSize: 11, color: C.textSecondary, minWidth: 42, fontWeight: 600, flexShrink: 0 }}>{m.round || "—"}</span>
            <span style={{ flex: 1, minWidth: 0, fontSize: 13, fontWeight: 500, color: C.text, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
              {m.opponent || "(対戦相手未入力)"}
              {m.opponent2 && <span style={{ color: C.textSecondary, fontWeight: 400 }}> / {m.opponent2}</span>}
            </span>
            <span style={{ fontSize: 13, fontWeight: 700, flexShrink: 0, color: m.result === "勝利" ? "#0a5b35" : m.result === "敗北" ? "#a31511" : C.textMuted }}>
              {m.result === "勝利" ? "○" : m.result === "敗北" ? "×" : m.result === "棄権" ? "棄" : "—"}
            </span>
            <span style={{ fontSize: 11, color: C.textSecondary, fontVariantNumeric: "tabular-nums", flexShrink: 0 }}>
              {Array.isArray(m.setScores) ? m.setScores.join(", ") : ""}
            </span>
            <button
              type="button"
              onClick={() => handleEditMatch(m)}
              aria-label="試合を編集"
              style={{
                background: "none", border: "none", color: C.primary, cursor: "pointer",
                width: 44, height: 44, display: "flex", alignItems: "center", justifyContent: "center",
                borderRadius: 8, flexShrink: 0,
              }}
            >
              <Icon name="pencil" size={16} color={C.primary} />
            </button>
            <button
              type="button"
              onClick={() => handleDeleteMatch(m.id)}
              aria-label="試合を削除"
              style={{
                background: "none", border: "none", color: C.error, cursor: "pointer",
                width: 44, height: 44, display: "flex", alignItems: "center", justifyContent: "center",
                borderRadius: 8, flexShrink: 0,
              }}
            >
              <Icon name="trash-2" size={16} color={C.error} />
            </button>
          </div>
        ))}
        <button
          type="button"
          onClick={handleAddMatch}
          style={{
            width: "100%", minHeight: 44, padding: 10,
            borderRadius: 8, border: `1px dashed ${C.primary}`, background: C.primaryLight, color: C.primary,
            fontSize: 13, fontWeight: 600, cursor: "pointer",
            display: "flex", alignItems: "center", justifyContent: "center", gap: 6, fontFamily: font,
          }}
        >
          <Icon name="plus" size={16} color={C.primary} />試合を追加
        </button>
      </div>

      {/* ⑤ メモ */}
      <div style={{ background: C.panel, border: `1px solid ${C.divider}`, borderRadius: 12, padding: 12, marginBottom: 10 }}>
        <_sectionHead num="6" label="メモ" />
        <Textarea label="大会総括" value={form.generalNote || ""} onChange={(v) => set("generalNote", v)} placeholder="その日の大会を通じての気づき..." />
      </div>

      {/* ⑥ 公開設定 */}
      <div style={{ background: C.panel, border: `1px solid ${C.divider}`, borderRadius: 12, padding: 12, marginBottom: 10 }}>
        <_sectionHead num="7" label="公開設定" />
        <_visibilityToggle value={form.visibility} onChange={(v) => set("visibility", v)} />
      </div>

      {/* Match Modal */}
      <MatchEditModal
        open={!!matchModalState}
        match={matchModalState?.match}
        trnType={form.type}
        tournament={form}
        racketNames={racketNames}
        stringNames={stringNames}
        opponentNames={opponentNames}
        recentSetups={recentSetups}
        confirm={confirm}
        onSave={handleSaveMatch}
        onClose={() => setMatchModalState(null)}
      />
    </>
  );
}

// === src/ui/sessions/TrialDetail.jsx ===
// TrialDetail — 試打セッション詳細 (v5, 2026-04-24 更新)
// 統一レイアウト: 会場/気象 3 列 + 機材 2x2 (大会・練習と同じ)
// 評価: 打感評価 6 項目 + 平均 / 特性 2 項目 / ショット別 8 項目 / 安心感 1 項目 (v3 踏襲)
// 評価項目は Lucide マッピング未登録につきアイコンなし、ラベル+バー+数値で構成
function TrialDetail({ session, linkedPractice, onLinkedPracticeClick, onCreateCard }) {
  const t = session || {};
  const judgmentBadge = _dvTrialJudgmentBadgeProps(t.judgment);

  // 打感評価 6 項目
  const ratings = [
    { key: "spin",         label: "スピン",       v: t.spin },
    { key: "power",        label: "推進力",       v: t.power },
    { key: "control",      label: "コントロール", v: t.control },
    { key: "info",         label: "打感情報",     v: t.info },
    { key: "maneuver",     label: "操作性",       v: t.maneuver },
    { key: "swingThrough", label: "振り抜き",     v: t.swingThrough },
  ];
  const ratingVals = ratings.map(r => r.v).filter(v => v > 0);
  const avg = ratingVals.length > 0
    ? (ratingVals.reduce((s, v) => s + v, 0) / ratingVals.length).toFixed(1)
    : null;
  const avgColor = avg ? _dvScColor(parseFloat(avg)) : C.textMuted;

  const hasFeatures = !!(t.trajectory || t.stiffness);

  const shots = [
    { label: "フォア攻撃", v: t.shotForeAtk },
    { label: "フォア守備", v: t.shotForeDef },
    { label: "バック攻撃", v: t.shotBackAtk },
    { label: "バック守備", v: t.shotBackDef },
    { label: "サーブ",     v: t.shotServe },
    { label: "リターン",   v: t.shotReturn },
    { label: "ボレー",     v: t.shotVolley },
    { label: "スライス",   v: t.shotSlice },
  ];
  const hasShots = shots.some(s => s.v);

  return (
    <>
      {/* Title (判定バッジ + ラケット + ストリング) */}
      <_dvSection>
        {judgmentBadge && (
          <div style={{ marginBottom: 8 }}>
            <Badge variant={judgmentBadge.variant} icon={judgmentBadge.icon}>{judgmentBadge.label}</Badge>
          </div>
        )}
        <div style={{ fontSize: 16, fontWeight: 700, color: C.text, lineHeight: 1.4, marginBottom: 4 }}>
          {t.racketName || ""}{t.stringMain ? ` / ${t.stringMain}` : ""}{t.stringCross ? ` / ${t.stringCross}` : ""}
        </div>
        {_dvFmtTension(t.tensionMain, t.tensionCross) && (
          <div style={{ fontSize: 12, color: C.textSecondary }}>
            {_dvFmtTension(t.tensionMain, t.tensionCross)}
          </div>
        )}
      </_dvSection>

      {/* 統一: 会場 / 気象 3 列 (試打では venue/temp のみ、weather は "—") */}
      <_dvSection title="会場 / 気象">
        <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr 1fr", gap: 6 }}>
          <_dvInfoCell label="場所" value={t.venue} />
          <_dvInfoCell label="気温" value={t.temp ? t.temp + "℃" : ""} />
          <_dvInfoCell label="天気" value="" />
        </div>
      </_dvSection>

      {/* 統一: 機材 2x2 */}
      <_dvSection title="機材">
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6, marginBottom: 6 }}>
          <_dvInfoCell label="ラケット" value={t.racketName} />
          <_dvInfoCell label="テンション" value={_dvFmtTension(t.tensionMain, t.tensionCross)} />
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6 }}>
          <_dvInfoCell label="縦糸" value={t.stringMain} />
          <_dvInfoCell label="横糸" value={t.stringCross} />
        </div>
        {/* S15.5: この設定を試打カードに 1 タップ複製 (主役は試打閲覧、これは補助 CTA) */}
        {onCreateCard && t.racketName && (
          <button
            onClick={onCreateCard}
            style={{
              width: "100%", marginTop: 12,
              background: "transparent", border: `1px solid ${C.border}`,
              borderRadius: 10, padding: "10px 14px",
              fontSize: 13, fontWeight: 500, color: C.primary,
              cursor: "pointer", fontFamily: "inherit", minHeight: 44,
              display: "inline-flex", alignItems: "center", justifyContent: "center", gap: 6,
            }}
          >
            <Icon name="plus-circle" size={16} color={C.primary} /> 試打カードに追加
          </button>
        )}
      </_dvSection>

      {/* 打感評価 6 項目 + 平均 */}
      {ratingVals.length > 0 && (
        <_dvSection
          title="打感評価"
          titleRight={<span style={{ fontSize: 12, fontWeight: 700, color: avgColor, fontVariantNumeric: "tabular-nums" }}>平均 {avg} / 5</span>}
        >
          {ratings.map(r => r.v ? <_dvRatingRow key={r.key} label={r.label} value={r.v} /> : null)}
        </_dvSection>
      )}

      {/* 特性 (1↔5) */}
      {hasFeatures && (
        <_dvSection title="特性 (1 ↔ 5)">
          {t.trajectory ? <_dvRatingRow label="弾道" sub="低↔高" value={t.trajectory} /> : null}
          {t.stiffness  ? <_dvRatingRow label="打感" sub="柔↔硬" value={t.stiffness} /> : null}
        </_dvSection>
      )}

      {/* ショット別 8 項目 */}
      {hasShots && (
        <_dvSection title="ショット別">
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "8px 14px" }}>
            {shots.map((s, i) => s.v ? (
              <div key={i}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 4, fontSize: 12 }}>
                  <span style={{ color: C.text, fontWeight: 500 }}>{s.label}</span>
                  <span style={{ color: _dvScColor(s.v), fontSize: 11, fontVariantNumeric: "tabular-nums", fontWeight: 700 }}>{s.v}</span>
                </div>
                <div style={{ background: C.divider, borderRadius: 4, height: 10, overflow: "hidden" }}>
                  <div style={{ width: `${s.v * 20}%`, height: "100%", background: _dvScColor(s.v), borderRadius: 4 }} />
                </div>
              </div>
            ) : null)}
          </div>
        </_dvSection>
      )}

      {/* 安心感 */}
      {t.confidence ? (
        <_dvSection title="安心感">
          <_dvRatingRow label="振り切れるか" value={t.confidence} />
        </_dvSection>
      ) : null}

      {/* メモ */}
      {(t.strokeNote || t.serveNote || t.volleyNote || t.generalNote) && (
        <_dvSection title="メモ">
          {t.strokeNote  && <_dvMemoItem label="ストローク" text={t.strokeNote}  summary={t.memoSummaries?.strokeNote} />}
          {t.serveNote   && <_dvMemoItem label="サーブ"     text={t.serveNote}   summary={t.memoSummaries?.serveNote} />}
          {t.volleyNote  && <_dvMemoItem label="ボレー"     text={t.volleyNote}  summary={t.memoSummaries?.volleyNote} />}
          {t.generalNote && <_dvMemoItem label="総括"       text={t.generalNote} summary={t.memoSummaries?.generalNote} />}
        </_dvSection>
      )}

      {/* 連携練習 (タップで練習詳細へ) */}
      {linkedPractice && (
        <_dvSection title="連携練習">
          <_dvLinkCard
            kind="practice"
            title={linkedPractice.title || linkedPractice.venue || "(無題の練習)"}
            meta={`${linkedPractice.type || "練習"} ・ ${linkedPractice.date}`}
            onClick={onLinkedPracticeClick ? () => onLinkedPracticeClick(linkedPractice) : null}
          />
        </_dvSection>
      )}
    </>
  );
}

const _TRIAL_WEATHER = [{ value: "", label: "—" }, { value: "晴", label: "晴" }, { value: "曇", label: "曇" }, { value: "雨", label: "雨" }, { value: "屋内", label: "屋内" }];

function _teSectionHead({ num, label, right }) {
  return (
    <div style={{ fontSize: 11, color: C.textMuted, fontWeight: 600, letterSpacing: 0.5, marginBottom: 10, textTransform: "uppercase", display: "flex", alignItems: "center", justifyContent: "space-between" }}>

        {label}

// 試打評価用 5 ボタン

    <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 8, flexWrap: "wrap" }}>

// 判定 3 連大ボタン (採用候補=緑 / 保留=黄 / 却下=赤)

function TrialEditForm({ form, errors = {}, onChange, practices, tournaments, trials = [], racketNames = [], stringNames = [], venueNames = [] }) {

  // S16.11 UX5: 履歴セット picker
  const recentSetups = useMemo(
    () => _computeRecentSetups(tournaments, practices, trials),
    [tournaments, practices, trials]
  );
  const applySetup = (s) => {
    if (!s) return;
    onChange({
      ...form,
      racketName: s.racketName || "",
      stringMain: s.stringMain || "",
      stringCross: s.stringCross || "",
      tensionMain: s.tensionMain || "",
      tensionCross: s.tensionCross || "",
    });
  };

  // 打感評価 6 項目
  const ratings = [
    { key: "spin",         label: "スピン" },
    { key: "power",        label: "推進力" },
    { key: "control",      label: "コントロール" },
    { key: "info",         label: "打感情報" },
    { key: "maneuver",     label: "操作性" },
    { key: "swingThrough", label: "振り抜き" },
  ];

  const avg = ratingVals.length > 0 ? (ratingVals.reduce((s, v) => s + v, 0) / ratingVals.length).toFixed(1) : null;

  // ショット別 8 項目
  const shots = [

    { key: "shotForeDef", label: "フォア守備" },
    { key: "shotBackAtk", label: "バック攻撃" },
    { key: "shotBackDef", label: "バック守備" },
    { key: "shotServe",   label: "サーブ" },
    { key: "shotReturn",  label: "リターン" },
    { key: "shotVolley",  label: "ボレー" },

      </div>

      {/* ④c ショット別 */}
      <div style={{ background: C.panel, border: `1px solid ${C.divider}`, borderRadius: 12, padding: 12, marginBottom: 10 }}>

        {shots.map(s => (

        ))}
      </div>

      {/* ④d 安心感 */}
      <div style={{ background: C.panel, border: `1px solid ${C.divider}`, borderRadius: 12, padding: 12, marginBottom: 10 }}>

        <_teSectionHead num="4e" label="連携先（任意）" />
        <LinkedSessionPicker
          linkedPracticeId={form.linkedPracticeId || ""}
          linkedMatchId={form.linkedMatchId || ""}
          practices={practices}
          tournaments={tournaments}
          onChange={(next) => onChange({
            ...form,
            linkedPracticeId: next.linkedPracticeId,

      {/* ⑤ メモ */}
