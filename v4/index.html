// 今週日曜から N 日後 (Sessions CalendarView と同じ日曜始まり方針、ChatGPT 指摘で統一)
const _twcSundayPlusDays = (n) => {
  const d = new Date();
  d.setDate(d.getDate() - d.getDay() + n); // 今週日曜から n 日
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
};

// 「M/D 〜 M/D」表記
const _twcRangeLabel = (startIso, endIso) => {
  const s = startIso.match(/(\d{4})-(\d{2})-(\d{2})/);
  const e = endIso.match(/(\d{4})-(\d{2})-(\d{2})/);
  if (!s || !e) return "";
  return `${parseInt(s[2])}/${parseInt(s[3])} 〜 ${parseInt(e[2])}/${parseInt(e[3])}`;
};

function TwoWeekCalendar({ tournaments = [], practices = [], trials = [], onDayTap }) {
  const todayIso = today();

  // 14 日分のセル状態を構築 (日曜始まり、今週日曜 〜 来週土曜の 2 週間固定)
  const cells = useMemo(() => {
    const arr = [];
    for (let i = 0; i < 14; i++) {
      const iso = _twcSundayPlusDays(i);
      const d = new Date(iso);
      const isPast = iso < todayIso;
      arr.push({
        iso,
        dayNum: d.getDate(),
        dow: d.getDay(),
        isPast,
        practiceCount: 0,
        practiceMin: 0,
        tournament: null,
        hasTrial: false,
      });
    }

    const idx = {};
    arr.forEach((c, i) => { idx[c.iso] = i; });

    (practices || []).forEach(p => {
      if (!p || !p.date) return;
      const i = idx[normDate(p.date)];
      if (i === undefined) return;
      arr[i].practiceCount += 1;
      const n = parseInt(p.duration, 10);
      if (!isNaN(n) && n > 0) arr[i].practiceMin += n;
    });
    (tournaments || []).forEach(t => {
      if (!t || !t.date) return;
      const i = idx[normDate(t.date)];
      if (i === undefined) return;
      if (!arr[i].tournament) arr[i].tournament = t;
    });
    (trials || []).forEach(tr => {
      if (!tr || !tr.date) return;
      const i = idx[normDate(tr.date)];
      if (i === undefined) return;
      arr[i].hasTrial = true;
    });

    return arr;
  }, [tournaments, practices, trials, todayIso]);

  const startIso = cells[0] ? cells[0].iso : todayIso;
  const endIso = cells[13] ? cells[13].iso : todayIso;

  // セル背景 / 文字色決定
  const cellStyle = (c) => {
    // 今日より前のセル (今週日曜含む過去日): 薄グレー背景塗り + 数字 textMuted
    // 他セル (今日=青塗 / 大会=橙塗 / 練習=緑塗 / 未来空白=白) と同じ「背景色で意味」一貫体系に統一
    if (c.isPast) {
      return {
        aspectRatio: "1 / 1",
        borderRadius: 10,
        background: "#F8F9FA",
        color: C.textMuted,
        cursor: "default",
        fontSize: 11,
        position: "relative",
        display: "flex",
        flexDirection: "column",
        alignItems: "center",
        justifyContent: "center",
        fontWeight: 500,
      };
    }

    let bg = "transparent";
    let fg = C.text;
    let fontWeight = 500;

    if (c.iso === todayIso) {
      bg = C.primary;
      fg = "#fff";
      fontWeight = 700;
    } else if (c.tournament) {
      bg = "#FFE6BD";
      fg = "#7E4F00";
    } else if (c.practiceMin >= 90) {
      bg = "#34C759";
      fg = "#fff";
    } else if (c.practiceMin >= 60) {
      bg = "#B7E1C9";
    } else if (c.practiceCount > 0) {
      bg = "#E6F4EA";
    }

    return {
      aspectRatio: "1 / 1",
      borderRadius: 10,
      background: bg,
      color: fg,
      fontWeight,
      display: "flex",
      flexDirection: "column",
      alignItems: "center",
      justifyContent: "center",
      fontSize: 11,
      position: "relative",
      cursor: "pointer",
    };
  };

  const numColor = (c) => {
    if (c.isPast) return undefined; // 過去セル: cellStyle の C.appleGray4 を継承
    if (c.iso === todayIso) return "#fff";
    if (c.tournament) return "#7E4F00";  // 大会セル: 数字も橙茶
    if (c.practiceMin >= 90) return "#fff"; // 濃緑セル: 白文字
    if (c.dow === 0) return "#FF3B30";
    if (c.dow === 6) return C.primary;
    return undefined;
  };

  return (
    <div style={{ background: C.panel, borderRadius: RADIUS.card, padding: 16, marginBottom: 8 }}>
      {/* ヘッダ */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
        <div style={{ fontSize: 14, fontWeight: 700, color: C.text }}>カレンダー</div>
        <div style={{
          fontSize: 10, color: C.textMuted, fontWeight: 600,
          background: C.bg, padding: "3px 8px", borderRadius: 6,
        }}>{_twcRangeLabel(startIso, endIso)} · 2 週間</div>
      </div>

      {/* 曜日見出し (日曜始まり固定、Sessions CalendarView と統一) */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 3, marginBottom: 4 }}>
        {_TWC_DOW_LABELS.map((lbl, i) => (
          <div key={i} style={{
            fontSize: 9, fontWeight: 600,
            color: _TWC_DOW_COLORS[i],
            textAlign: "center", padding: "2px 0",
          }}>{lbl}</div>
        ))}
      </div>

      {/* 14 セル grid (日曜始まり、過去セルは empty) */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 3 }}>
        {cells.map((c, i) => (
          <div
            key={i}
            onClick={() => !c.isPast && onDayTap && onDayTap(c.iso, c)}
            style={cellStyle(c)}
          >
            {!c.isPast && c.tournament && (
              <span style={{ position: "absolute", top: 2, right: 2, lineHeight: 0 }}>
                <Icon name="trophy" size={10} color="#FF9500" />
              </span>
            )}
            <span style={{ color: numColor(c) || "inherit", lineHeight: 1.1 }}>
              {c.dayNum}
            </span>
            {!c.isPast && c.hasTrial && (
              <div style={{
                position: "absolute", bottom: 3,
                width: 5, height: 5, borderRadius: "50%",
                background: "#9334E0",
              }} />
            )}
          </div>
        ))}
      </div>

      {/* フッタ */}
      <div style={{
        fontSize: 10, color: C.textMuted, textAlign: "center",
        marginTop: 8, paddingTop: 8, borderTop: `1px solid ${C.bg}`,
      }}>
        日付タップ → 詳細パネル展開 (色の意味も表示)
      </div>
    </div>
  );
}

// === src/ui/home/WeeklySummary.jsx ===
// WeeklySummary — Home タブ「今週サマリー」カード (S14 / P1 本実装)
//
// preview_s13.5.html FINAL L245-270 / DECISIONS_v4.md S13.5 + ChatGPT 採用案準拠
//
// 4 統計 (Display tier 大数字 34px、tabular-nums):
//   - 練習: 直近 7 日の練習回数 (緑 #34C759)
//   - 大会: 直近 7 日の大会数 (橙 #FF9500)
//   - 平均/回: 直近 7 日 練習 duration の平均 (Apple Blue) + 「分」単位
//   - 直近: 全 matches の最新 10 試合 N勝N敗 (Apple Blue)
//
// フッタ: 「主力 X · 試合勝率 N%」 (主力 = 直近 30 日最多ラケット、勝率 = 全 matches)
//
// props: tournaments, practices

const _WS_DAY_MS = 1000 * 60 * 60 * 24;

// ISO YYYY-MM-DD で N 日前
const _wsDaysAgo = (n) => {
  const d = new Date();
  d.setDate(d.getDate() - n);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
};

function _WSStat({ num, unit, label, color }) {
  return (
    <div style={{ flex: 1, textAlign: "center", position: "relative" }}>
      <div style={{
        fontSize: 34, fontWeight: 800, color: color || C.primary,
        lineHeight: 1, fontFeatureSettings: '"tnum"',
      }}>
        {num}
        {unit && (
          <span style={{ fontSize: 13, fontWeight: 700, marginLeft: 1, color: "inherit" }}>{unit}</span>
        )}
      </div>
      <div style={{
        fontSize: 10, color: C.textMuted, fontWeight: 600,
        letterSpacing: 0.4, textTransform: "uppercase", marginTop: 4,
      }}>{label}</div>
    </div>
  );
}

// 縦区切り (a-stat::before の代替)
function _WSDivider() {
  return (
    <div style={{
      width: 1, alignSelf: "stretch", margin: "8px 0",
      background: C.bg,
    }} />
  );
}

function WeeklySummary({ tournaments = [], practices = [] }) {
  const todayIso = today();
  const weekStart = _wsDaysAgo(6); // 今日含む 7 日 = -6 日前から

  // 練習回数 / 平均/回
  const weekP = useMemo(() =>
    (practices || []).filter(p => {
      if (!p || !p.date) return false;
      const nd = normDate(p.date);
      return nd >= weekStart && nd <= todayIso;
    }), [practices, weekStart, todayIso]);

  // 大会数
  const weekT = useMemo(() =>
    (tournaments || []).filter(t => {
      if (!t || !t.date) return false;
      const nd = normDate(t.date);
      return nd >= weekStart && nd <= todayIso;
    }), [tournaments, weekStart, todayIso]);

  // 平均/回 (duration あり練習の平均)
  const avgMin = useMemo(() => {
    let total = 0, cnt = 0;
    weekP.forEach(p => {
      const n = parseInt(p.duration, 10);
      if (!isNaN(n) && n > 0) { total += n; cnt += 1; }
    });
    return cnt > 0 ? Math.round(total / cnt) : 0;
  }, [weekP]);

  // 直近 10 試合 N勝N敗 + 全試合勝率
  // H-9 (Phase A 監査): _normalizeMatchResult で勝敗表記揺れを統一吸収
  //   旧: "勝利"/"敗北" のみ拾い、V2 互換 "勝"/"win" 等が集計から漏れて勝率が低く出ていた
  //   新: "win"/"loss" に正規化してから集計
  const matchStats = useMemo(() => {
    const all = [];
    [...(tournaments || [])]
      .sort((a, b) => (normDate(b.date) || "").localeCompare(normDate(a.date) || ""))
      .forEach(t => {
        if (Array.isArray(t.matches)) {
          t.matches.forEach(m => {
            if (!m) return;
            const norm = _normalizeMatchResult(m.result);
            if (norm === "win" || norm === "loss") all.push(norm);
          });
        }
      });
    const last10 = all.slice(0, 10);
    const wins10 = last10.filter(r => r === "win").length;
    const loses10 = last10.filter(r => r === "loss").length;
    const winsAll = all.filter(r => r === "win").length;
    const losesAll = all.filter(r => r === "loss").length;
    const totalAll = winsAll + losesAll;
    const winRate = totalAll > 0 ? Math.round((winsAll * 100) / totalAll) : 0;
    return { wins10, loses10, winsAll, losesAll, winRate, hasMatches: totalAll > 0 };
  }, [tournaments]);

  // 主力ラケット (直近 30 日)
  // H-10 (Phase A 監査): tournament.matches[].racketName も含めて集計
  //   旧: tournament トップ階の racketName しか見ず、match 単位で変えた場合に集計漏れ
  //   新: matches[] 内の racketName も 1 試合 1 票で tally
  const mainRacketName = useMemo(() => {
    const cutoff = (() => {
      const d = new Date();
      d.setDate(d.getDate() - 30);
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
    })();
    const counts = {};
    const inRange = (date) => {
      const nd = normDate(date);
      return nd >= cutoff && nd <= todayIso;
    };
    const tally = (name) => {
      if (!name) return;
      counts[name] = (counts[name] || 0) + 1;
    };
    (practices || []).forEach(p => {
      if (p && p.racketName && inRange(p.date)) tally(p.racketName);
    });
    (tournaments || []).forEach(t => {
      if (!t || !inRange(t.date)) return;
      if (t.racketName) tally(t.racketName);
      if (Array.isArray(t.matches)) {
        t.matches.forEach(m => { if (m && m.racketName) tally(m.racketName); });
      }
    });
    const top = Object.entries(counts).sort((a, b) => b[1] - a[1])[0];
    return top ? top[0] : null;
  }, [practices, tournaments, todayIso]);

  return (
    <div style={{ background: C.panel, borderRadius: RADIUS.card, padding: 16, marginBottom: 8 }}>
      {/* ヘッダ */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
        <div style={{ fontSize: 14, fontWeight: 700, color: C.text }}>今週サマリー</div>
        <div style={{
          fontSize: 10, color: C.textMuted, fontWeight: 600,
          background: C.bg, padding: "3px 8px", borderRadius: 6,
        }}>直近 7 日</div>
      </div>

      {/* 4 統計 (横 4 等分、区切り線) */}
      <div style={{ display: "flex", alignItems: "flex-end", padding: "6px 0 4px" }}>
        <_WSStat num={weekP.length} label="練習" color="#34C759" />
        <_WSDivider />
        <_WSStat num={weekT.length} label="大会" color="#FF9500" />
        <_WSDivider />
        <_WSStat num={avgMin} unit="分" label="平均/回" color={C.primary} />
        <_WSDivider />
        {matchStats.hasMatches ? (
          <div style={{ flex: 1, textAlign: "center" }}>
            <div style={{
              fontSize: 34, fontWeight: 800, color: C.primary,
              lineHeight: 1, fontFeatureSettings: '"tnum"',
            }}>
              {matchStats.wins10}
              <span style={{ fontSize: 13, fontWeight: 700, color: C.textMuted, marginLeft: 1 }}>勝</span>
              {matchStats.loses10}
              <span style={{ fontSize: 13, fontWeight: 700, color: C.textMuted, marginLeft: 1 }}>敗</span>
            </div>
            <div style={{
              fontSize: 10, color: C.textMuted, fontWeight: 600,
              letterSpacing: 0.4, textTransform: "uppercase", marginTop: 4,
            }}>直近</div>
          </div>
        ) : (
          <_WSStat num="—" label="直近" color={C.textMuted} />
        )}
      </div>

      {/* フッタ: 主力 + 勝率 */}
      <div style={{
        fontSize: 11, color: C.textSecondary, textAlign: "center",
        marginTop: 8, paddingTop: 8, borderTop: `1px solid ${C.bg}`,
        fontWeight: 500,
      }}>
        {mainRacketName ? (
          <>主力 <b style={{ color: C.primary, fontWeight: 700 }}>{mainRacketName}</b>{matchStats.hasMatches ? <> · 試合勝率 <b style={{ color: C.primary, fontWeight: 700 }}>{matchStats.winRate}%</b></> : null}</>
        ) : (
          matchStats.hasMatches ? <>試合勝率 <b style={{ color: C.primary, fontWeight: 700 }}>{matchStats.winRate}%</b></> : "データなし"
        )}
      </div>
    </div>
  );
}

// === src/ui/insights/InsightsTab.jsx ===
// InsightsTab — 分析タブ (S18 初実装)
//
// 役割 (REQUIREMENTS_v4 F5):
//   F5.1 スタッツ集計 (勝率、種別別、期間別)
//   F5.2 メンタル・フィジカルの推移
//
// 構成 (上から順):
//   1. 期間チップ (今月 / 直近3ヶ月 / 全期間)
//   2. 全体サマリー (大会数 / 試合数 / 勝率 / 練習回数)
//   3. メンタル / フィジカル平均 (試合 mental・physical の avg)
//   4. 機材別勝率 (ラケット top 5、勝/負/勝率)
//   5. 対戦相手別戦績 (top 5 対戦数順、N勝 N敗)
//
// 設計方針:
//   - 純関数で集計 (useMemo で期間 / data 変化のみ再計算)
//   - 試合 (match) は tournaments[].matches[] から flat に走査
//   - 勝率は win/(win+loss)、棄権・null は除外
//   - 期間フィルタは tournament.date を基準 (matches に個別 date がないため)

const _IS_DAY_MS = 1000 * 60 * 60 * 24;
const _isToday = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
};
const _isDaysAgo = (n) => {
  const d = new Date();
  d.setDate(d.getDate() - n);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
};
const _isMonthStart = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-01`;
};

const _IS_PERIODS = [
  { v: "month",   label: "今月" },
  { v: "90d",     label: "直近 3 ヶ月" },
  { v: "all",     label: "全期間" },
];

// 期間範囲 [from, to] (両端 inclusive、ISO YYYY-MM-DD)
const _isPeriodRange = (period) => {
  const to = _isToday();
  if (period === "month") return [_isMonthStart(), to];
  if (period === "90d")   return [_isDaysAgo(89),  to];
  return ["0000-00-00", to]; // all
};

// 期間で session をフィルタ
const _isFilterByPeriod = (sessions, [from, to]) => {
  return (sessions || []).filter(s => {
    if (!s || !s.date) return false;
    const nd = normDate(s.date);
    return nd >= from && nd <= to;
  });
};

// 全試合を flat 配列で取得 (tournament の date を match に付与)
const _isFlattenMatches = (tournaments) => {
  const out = [];
  for (const t of (tournaments || [])) {
    if (!t || !Array.isArray(t.matches)) continue;
    for (const m of t.matches) {
      if (!m) continue;
      out.push({ ...m, _date: t.date, _tournamentName: t.name });
    }
  }
  return out;
};

// 勝率計算 (棄権 / null は除外)
const _isWinRate = (matches) => {
  let win = 0, loss = 0;
  for (const m of matches) {
    // H-9 (Phase A 監査): _normalizeMatchResult で表記揺れ吸収
    const _r = _normalizeMatchResult(m.result);
    if (_r === "win") win++;
    else if (_r === "loss") loss++;
  }
  const total = win + loss;
  return { win, loss, total, rate: total > 0 ? Math.round((win / total) * 100) : null };
};

// 平均値計算 (1-5 rating、無効値は除外)
const _isAvgRating = (items, key) => {
  let sum = 0, cnt = 0;
  for (const x of items) {
    const v = x && x[key];
    if (typeof v !== "number" || isNaN(v) || v < 1 || v > 5) continue;
    sum += v; cnt++;
  }
  return cnt > 0 ? (sum / cnt) : null;
};

// ── ラケット別集計 (試合数 ≥ 1)
const _isStatsByRacket = (matches) => {
  const map = new Map();
  for (const m of matches) {
    const name = (m.racketName || "").trim();
    if (!name) continue;
    let s = map.get(name);
    if (!s) { s = { name, win: 0, loss: 0 }; map.set(name, s); }
    // H-9 (Phase A 監査): _normalizeMatchResult で表記揺れ吸収
    const _r = _normalizeMatchResult(m.result);
    if (_r === "win") s.win++;
    else if (_r === "loss") s.loss++;
  }
  return [...map.values()]
    .map(s => ({ ...s, total: s.win + s.loss, rate: (s.win + s.loss) > 0 ? Math.round(s.win / (s.win + s.loss) * 100) : null }))
    .filter(s => s.total > 0)
    .sort((a, b) => b.total - a.total);
};

// ── 対戦相手別集計
const _isStatsByOpponent = (matches) => {
  const map = new Map();
  for (const m of matches) {
    const opps = [m.opponent, m.opponent2].map(o => (o || "").trim()).filter(Boolean);
    for (const name of opps) {
      let s = map.get(name);
      if (!s) { s = { name, win: 0, loss: 0, lastDate: null }; map.set(name, s); }
      // H-9 (Phase A 監査): _normalizeMatchResult で表記揺れ吸収
      const _r = _normalizeMatchResult(m.result);
      if (_r === "win") s.win++;
      else if (_r === "loss") s.loss++;
      else continue;
      if (m._date && (!s.lastDate || m._date > s.lastDate)) s.lastDate = m._date;
    }
  }
  return [...map.values()]
    .map(s => ({ ...s, total: s.win + s.loss, rate: (s.win + s.loss) > 0 ? Math.round(s.win / (s.win + s.loss) * 100) : null }))
    .filter(s => s.total > 0)
    .sort((a, b) => b.total - a.total);
};

// ── 月別勝率 (直近 6 ヶ月、棒グラフ用)
const _isMonthlyWinRate = (matches) => {
  const out = []; // [{ ym, win, loss, rate }]
  const now = new Date();
  for (let i = 5; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const ym = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
    let win = 0, loss = 0;
    for (const m of matches) {
      if (!m._date) continue;
      const md = normDate(m._date);
      if (!md || md.slice(0, 7) !== ym) continue;
      // H-9 (Phase A 監査): _normalizeMatchResult で表記揺れ吸収
      const _r = _normalizeMatchResult(m.result);
      if (_r === "win") win++;
      else if (_r === "loss") loss++;
    }
    const total = win + loss;
    out.push({
      ym, win, loss, total,
      rate: total > 0 ? Math.round(win / total * 100) : null,
      label: `${d.getMonth()+1}月`,
    });
  }
  return out;
};

// ── 共通: 大数字スタッツ
function _IsStatBox({ num, unit, label, color, sub }) {
  return (
    <div style={{ flex: 1, textAlign: "center", padding: "8px 4px" }}>
      <div style={{
        fontSize: 28, fontWeight: 800, color: color || C.text,

  const filteredPractices   = useMemo(() => _isFilterByPeriod(practices, range),   [practices, range]);
  const allMatches          = useMemo(() => _isFlattenMatches(filteredTournaments), [filteredTournaments]);

  const totalStats = useMemo(() => _isWinRate(allMatches), [allMatches]);
  const mentalAvg  = useMemo(() => _isAvgRating(allMatches, "mental"),    [allMatches]);
  const physicalAvg= useMemo(() => _isAvgRating(allMatches, "physical"),  [allMatches]);
  const practiceCnt = filteredPractices.length;
  const trialCnt    = useMemo(() => _isFilterByPeriod(trials, range).length, [trials, range]);

  const opponentStats = useMemo(() => _isStatsByOpponent(allMatches).slice(0, 5), [allMatches]);

          <_IsStatBox num={filteredTournaments.length} label="大会" color="#FF9500" />
          <div style={{ width: 1, background: C.bg, margin: "8px 0" }} />
          <_IsStatBox num={totalStats.total} label="試合" color={C.primary}

          <div style={{ width: 1, background: C.bg, margin: "8px 0" }} />

  );

// === src/ui/LoginScreen.jsx ===
// LoginScreen — 未ログイン時の画面 (Google ログイン)
// props:
//   onLogin: 成功時コールバック (省略可、onAuthStateChanged で検知するため必須ではない)
//   onError: エラーメッセージ文字列を通知 (省略可)
// v3 の signInWithPopup → signInWithRedirect フォールバックと同等
function LoginScreen({ onLogin, onError }) {
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");

  const handleLogin = async () => {
    setErr("");
    setBusy(true);
    try {
      const provider = new firebase.auth.GoogleAuthProvider();
      await fbAuth.signInWithPopup(provider);
      if (onLogin) onLogin();
    } catch (e) {
      if (e && e.code === "auth/popup-blocked") {
        try {
          await fbAuth.signInWithRedirect(new firebase.auth.GoogleAuthProvider());
          return;
        } catch (e2) {
          const msg = "ログイン失敗: " + (e2.message || String(e2));
          setErr(msg);
          if (onError) onError(msg);
        }
      } else {
        const msg = "ログイン失敗: " + ((e && e.message) || String(e));
        setErr(msg);
        if (onError) onError(msg);
      }
    } finally {
      setBusy(false);
    }
  };

  return (
    <div style={{
      flex: 1,
      display: "flex",
      flexDirection: "column",
      alignItems: "center",
      justifyContent: "center",
      padding: 40,
      background: C.bg,
      textAlign: "center",
    }}>
      <div style={{ fontSize: 48, marginBottom: 8 }}>🎾</div>
      <div style={{ fontSize: 24, fontWeight: 700, color: C.text, marginBottom: 4, letterSpacing: "-0.01em" }}>
        Tennis DB
      </div>
      <div style={{ fontSize: 13, color: C.textSecondary, marginBottom: 32 }}>
        v{APP_VERSION}
      </div>
      <div style={{ fontSize: 14, color: C.textSecondary, marginBottom: 24, maxWidth: 280, lineHeight: 1.6 }}>
        Google アカウントでログインすると、記録がクラウドに同期されます。
      </div>
      <Button variant="primary" icon="log-in" onClick={handleLogin} disabled={busy} style={{ minWidth: 220 }}>
        {busy ? "ログイン中..." : "Google でログイン"}
      </Button>
      {err && (
        <div role="alert" style={{ marginTop: 16, fontSize: 12, color: C.error, maxWidth: 320 }}>
          {err}
        </div>
      )}
      <div style={{ marginTop: 48, fontSize: 11, color: C.textMuted, lineHeight: 1.6, maxWidth: 320 }}>
        v3 と同じアカウントでログインすると、同じデータが表示されます。
      </div>
    </div>
  );
}

// PlanTab — 計画タブ (S17 初実装)
//
// 役割 (REQUIREMENTS_v4 F3):
//   F3.1 Next Actions: 短期 TODO + 優先度 + 期限。完了トグル / 編集 / 削除
//   F3.2 対戦相手管理: 名前 + 特徴 + 戦績 (戦績は tournaments[] から自動集計)
//   F3.3 試合・練習計画: 将来 (現 Stage では実装しない)
//
// データ:
//   - next   = [{ id, label, detail, category, priority, dueDate, done }]
//             (Home NextActions / GearTab Open Questions と共通 state)
//   - opponents = [{ id, name, hand?, style?, note? }]
//             (Master 候補としても tournaments の対戦相手 Select で参照)
//
// UX 方針 (CLAUDE.md R4):
//   - スマホ片手親指で完結 (新規追加 → モーダル → 一行ずつ快適入力)
//   - 進行中フィルタを default、完了/全件はチップ切替
//   - 優先度 dot は Home と同じ色ルール (赤=7日以内、橙=継続、灰=低/参考)

const _PLAN_PRIORITY_OPTIONS = [
  { v: "最高", color: "#FF3B30" },
  { v: "高",   color: "#FF9500" },
  { v: "中",   color: "#FFCC00" },
  { v: "低",   color: "#C7C7CC" },
  { v: "参考", color: "#8E8E93" },
];
const _PLAN_PRIORITY_ORDER = { "最高": 1, "高": 2, "中": 3, "低": 4, "参考": 5 };
const _PLAN_CATEGORY_OPTIONS = ["練習", "試合", "機材", "コンディション", "その他"];

// 優先度 dot 色 (NextActions.jsx と同ルール)
const _planDotColor = (n, todayIso) => {
  if (n.priority === "低" || n.category === "参考") return "#C7C7CC";
  if (n.dueDate) {
    const due = normDate(n.dueDate);
    if (due) {
      const a = new Date(due).getTime();
      const b = new Date(todayIso).getTime();
      const days = Math.round((a - b) / (1000 * 60 * 60 * 24));
      if (days < 0) return "#FF3B30"; // 期限切れ
      if (days <= 7) return "#FF3B30";
    }
  }
  if (n.priority === "最高") return "#FF3B30";
  return "#FF9500";
};

// 期限ラベル
const _planDueLabel = (dueDate, todayIso) => {
  if (!dueDate) return null;
  const due = normDate(dueDate);
  if (!due) return null;
  const a = new Date(due).getTime();
  const b = new Date(todayIso).getTime();
  const days = Math.round((a - b) / (1000 * 60 * 60 * 24));
  if (days < 0) return `${Math.abs(days)} 日超過`;
  if (days === 0) return "今日まで";
  if (days <= 7) return `${days} 日後まで`;
  return `${due} まで`;
};

// ── 対戦相手の戦績集計 (tournaments[].matches[].opponent と name で部分一致)
function _computeOpponentStats(name, tournaments) {
  const _name = (name || "").trim();
  if (!_name) return { win: 0, loss: 0, total: 0, lastDate: null };
  let win = 0, loss = 0, lastDate = null;
  for (const t of (tournaments || [])) {
    if (!t || !Array.isArray(t.matches)) continue;
    for (const m of t.matches) {
      if (!m) continue;
      const opp1 = (m.opponent || "").trim();
      const opp2 = (m.opponent2 || "").trim();
      if (opp1 !== _name && opp2 !== _name) continue;
      // H-9 (Phase A 監査): _normalizeMatchResult で表記揺れ吸収
      const _r = _normalizeMatchResult(m.result);
      if (_r === "win") win++;
      else if (_r === "loss") loss++;
      else continue;
      if (t.date && (!lastDate || t.date > lastDate)) lastDate = t.date;
    }
  }
  return { win, loss, total: win + loss, lastDate };
}

function PlanTab({
  next, opponents, tournaments,
  onNextUpdate, onOpponentsUpdate,
  toast, confirm,
}) {
  const todayIso = today();
  const [filter, setFilter] = useState("active"); // "active" | "done" | "all"
  const [editTarget, setEditTarget] = useState(null); // null=閉、{}=新規、{id,...}=編集
  const [oppEditTarget, setOppEditTarget] = useState(null);

  const allActions = next || [];
  const totalCount = allActions.length;
  const activeCount = allActions.filter(n => n && !n.done).length;
  const doneCount = totalCount - activeCount;

  const visibleActions = useMemo(() => {
    let list = allActions.slice();
    if (filter === "active") list = list.filter(n => n && !n.done);
    else if (filter === "done") list = list.filter(n => n && n.done);
    // 並び: done は末尾、active 内は priority → dueDate
    list.sort((a, b) => {
      const ad = a.done ? 1 : 0, bd = b.done ? 1 : 0;
      if (ad !== bd) return ad - bd;
      const ap = _PLAN_PRIORITY_ORDER[a.priority] || 99;
      const bp = _PLAN_PRIORITY_ORDER[b.priority] || 99;
      if (ap !== bp) return ap - bp;
      const adue = a.dueDate || "9999-99-99";
      const bdue = b.dueDate || "9999-99-99";
      if (adue !== bdue) return adue < bdue ? -1 : 1;
      return 0;
    });
    return list;
  }, [allActions, filter]);

  // 並び替え済 opponents (戦績件数で降順、未対戦は名前順)
  const sortedOpponents = useMemo(() => {
    return (opponents || []).slice().sort((a, b) => {
      const sa = _computeOpponentStats(a.name, tournaments);
      const sb = _computeOpponentStats(b.name, tournaments);
      if (sa.total !== sb.total) return sb.total - sa.total;
      return (a.name || "").localeCompare(b.name || "");
    });
  }, [opponents, tournaments]);

  const handleToggle = (id) => {
    const updated = allActions.map(n => n && n.id === id ? { ...n, done: !n.done } : n);
    onNextUpdate(updated);
  };
  const handleAddNew = () => setEditTarget({});
  const handleEdit = (item) => setEditTarget(item);
  const handleSave = (item, isNew) => {
    if (isNew) {
      const created = { id: genId(), priority: "中", done: false, ...item };
      onNextUpdate([...allActions, created]);
      toast.show("アクションを追加しました", "success");
    } else {
      const updated = allActions.map(n => n && n.id === item.id ? { ...n, ...item } : n);
      onNextUpdate(updated);
      toast.show("アクションを更新しました", "success");
    }
    setEditTarget(null);
  };
  const handleDelete = (item) => {
    confirm.ask(
      `「${item.label || "(無題)"}」を削除しますか？`,
      () => {
        onNextUpdate(allActions.filter(n => n && n.id !== item.id));
        toast.show("削除しました", "info");
      },
      { title: "アクションを削除", yesLabel: "削除", noLabel: "キャンセル", yesVariant: "danger" }
    );
  };

  const handleOppAdd = () => setOppEditTarget({});
  const handleOppEdit = (opp) => setOppEditTarget(opp);
  const handleOppSave = (item, isNew) => {
    if (isNew) {
      const created = { id: genId(), ...item };
      onOpponentsUpdate([...(opponents || []), created]);
      toast.show("対戦相手を追加しました", "success");
    } else {
      const updated = (opponents || []).map(o => o && o.id === item.id ? { ...o, ...item } : o);
      onOpponentsUpdate(updated);
      toast.show("対戦相手を更新しました", "success");
    }
    setOppEditTarget(null);
  };
  const handleOppDelete = (opp) => {
    confirm.ask(
      `「${opp.name}」を削除しますか？\n(過去の試合記録は残ります)`,
      () => {
        onOpponentsUpdate((opponents || []).filter(o => o && o.id !== opp.id));
        toast.show("削除しました", "info");
      },
      { title: "対戦相手を削除", yesLabel: "削除", noLabel: "キャンセル", yesVariant: "danger" }
    );
  };

  return (
    <div style={{ padding: "12px 14px 24px", overflow: "auto", flex: 1 }}>
      {/* === Section 1: Next Actions === */}
      <div style={{
        display: "flex", alignItems: "center", justifyContent: "space-between",
        marginBottom: 10,
      }}>
        <div style={{ fontSize: 15, fontWeight: 700, color: C.text, display: "inline-flex", alignItems: "center", gap: 6 }}>
          <Icon name="flag" size={18} color={C.textSecondary} />
          次のアクション
          <span style={{ fontSize: 11, color: C.textMuted, fontWeight: 400, marginLeft: 4 }}>
            {activeCount} / {totalCount}
          </span>
        </div>
        <button
          onClick={handleAddNew}
          aria-label="アクションを追加"
          style={{
            display: "flex", alignItems: "center", gap: 4,
            minHeight: 36, padding: "0 12px",
            background: C.primary, border: "none", borderRadius: 8,
            color: "#fff", fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: font,
          }}
        >
          <Icon name="plus" size={14} color="#fff" />
          追加
        </button>
      </div>

      {/* フィルタチップ */}
      <div style={{ display: "flex", gap: 6, marginBottom: 12, flexWrap: "wrap" }}>
        {[
          { v: "active", label: `進行中 ${activeCount}` },
          { v: "done",   label: `完了 ${doneCount}` },
          { v: "all",    label: `全件 ${totalCount}` },
        ].map(opt => {
          const active = filter === opt.v;
          return (
            <button
              key={opt.v}
              onClick={() => setFilter(opt.v)}
              style={{
                minHeight: 32, padding: "0 12px",
                background: active ? C.primary : C.panel,
                border: `1px solid ${active ? C.primary : C.border}`, borderRadius: 16,
                color: active ? "#fff" : C.textSecondary,
                fontSize: 12, fontWeight: 600,
                cursor: "pointer", fontFamily: font,
              }}
            >{opt.label}</button>
          );
        })}
      </div>

      {/* アクション一覧 */}
      {visibleActions.length === 0 ? (
        <div style={{
          background: C.panel, border: `1px dashed ${C.border}`, borderRadius: RADIUS.card,
          padding: "32px 14px", textAlign: "center", color: C.textMuted, fontSize: 13,
          marginBottom: 24,
        }}>
          {filter === "active" ? "進行中のアクションはありません" :
           filter === "done"   ? "完了したアクションはありません" :
                                 "アクションがまだありません。「追加」から始めましょう"}
        </div>
      ) : (
        <div style={{ marginBottom: 24 }}>
          {visibleActions.map(item => (
            <_PlanActionRow
              key={item.id}
              item={item}
              todayIso={todayIso}
              onToggle={handleToggle}
              onEdit={handleEdit}
              onDelete={handleDelete}
            />
          ))}
        </div>
      )}

      {/* === Section 2: 対戦相手 === */}
      <div style={{
        display: "flex", alignItems: "center", justifyContent: "space-between",
        marginBottom: 10, marginTop: 8,
      }}>
        <div style={{ fontSize: 15, fontWeight: 700, color: C.text, display: "inline-flex", alignItems: "center", gap: 6 }}>
          <Icon name="users" size={18} color={C.textSecondary} />
          対戦相手
          <span style={{ fontSize: 11, color: C.textMuted, fontWeight: 400, marginLeft: 4 }}>
            {(opponents || []).length}
          </span>
        </div>
        <button
          onClick={handleOppAdd}
          aria-label="対戦相手を追加"
          style={{
            display: "flex", alignItems: "center", gap: 4,
            minHeight: 36, padding: "0 12px",
            background: C.primary, border: "none", borderRadius: 8,
            color: "#fff", fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: font,
          }}
        >
          <Icon name="plus" size={14} color="#fff" />
          追加
        </button>
      </div>

      {sortedOpponents.length === 0 ? (
        <div style={{
          background: C.panel, border: `1px dashed ${C.border}`, borderRadius: RADIUS.card,
          padding: "24px 14px", textAlign: "center", color: C.textMuted, fontSize: 13,
        }}>
          対戦相手がまだ登録されていません
        </div>
      ) : (
        sortedOpponents.map(opp => (
          <_PlanOpponentRow
            key={opp.id}
            opponent={opp}
            stats={_computeOpponentStats(opp.name, tournaments)}
            onEdit={handleOppEdit}
            onDelete={handleOppDelete}
          />
        ))
      )}

      <_PlanActionEditModal
        open={!!editTarget}
        initial={editTarget}
        onSave={handleSave}
        onClose={() => setEditTarget(null)}
      />
      <_PlanOpponentEditModal
        open={!!oppEditTarget}
        initial={oppEditTarget}
        onSave={handleOppSave}
        onClose={() => setOppEditTarget(null)}
      />
    </div>
  );
}

// _NumWheel.jsx — Wheel picker components (S18 Phase B 復活、preview_s18_p10/p12 承認デザイン)
//
// 提供するコンポーネント (PracticeEditForm 等から使用):
//   TimeWheel       : 2 列ホイール (時 0-23 + 分 5 分刻み 0-55)、HH:MM 形式
//   DurationWheel   : 2 列ホイール (時間 0-12 + 分 5 分刻み 0-55)、startTime + duration から endTime 計算
//   NumWheel        : 1 列汎用 (テンション / 気温 / duration 単独 等)
//
// 内部コンポーネント (アンダースコア接頭):
//   _WheelButton    : Input.jsx 準拠のトリガー button (44px / 13px / ▾ + 保持バッジ)
//   _WheelSheet     : Bottom sheet コンテナ (FilterDrawer 準拠 + #fafafa 背景)

//
// 設計原則 (memory: feedback_data_destruction_2026_05_03.md 準拠):
//   ❌ 値変換ロジック禁止 (rounding/clamping を絶対に書き戻さない)
//   ❌ 暗黙確定禁止 (背景タップ・ESC・✕ = キャンセル、明示「完了」のみ)
//   ✅ 範囲外 / 非 5 分刻みの既存値は option 配列に追加して保持 (オレンジバッジ表示)
//   ✅ 完了時 draft === original なら No-op (onChange 呼ばない)
//
// preview 履歴:
//   p7 = button デザイン (Input 準拠)
//   p10 = Bottom sheet + v17 立体ホイール 融合

// ── _WheelButton (Input.jsx 準拠) ────────────────────────
//   props: label (string), displayValue (string|null), isPreserved (bool), onClick, error (string|null)
function _WheelButton({ label, displayValue, isPreserved, onClick, error, required }) {
  const hasError = !!error;

  return (
    <div style={{ marginBottom: 10 }}>

        <label style={{ display: "block", fontSize: 12, color: C.textSecondary, fontWeight: 500, marginBottom: 4 }}>

        type="button"
        onClick={onClick}
        aria-invalid={hasError}
        style={{
          width: "100%",
          boxSizing: "border-box",
          minHeight: 44,
          padding: "10px 12px",
          border: `1px solid ${borderColor}`,
          borderRadius: 8,
          fontFamily: font,
          fontSize: 13,
          color: C.text,
          background: C.panel,
          textAlign: "left",
          cursor: "pointer",

        <span style={{ fontSize: 13, fontWeight: 600, color: C.text, fontVariantNumeric: "tabular-nums", display: "flex", alignItems: "center" }}>
          {displayValue ? (
            <>
              <span>{displayValue}</span>

                <span style={{
                  display: "inline-block",

                  background: C.warningLight, color: "#875700",
