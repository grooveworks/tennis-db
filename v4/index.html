  { value: "フィジカル", label: "フィジカル" },
];

function QuickAddModal({ open, type, racketNames = [], stringNames = [], venueNames = [], levelNames = [], onSave, onClose }) {
  const trapRef = useFocusTrap(open); // Round 5: a11y focus trap
  const [form, setForm] = useState(null);

  // open / type 切替時に blank で再初期化 (前種別の値が残らないように)
  useEffect(() => {
    if (!open || !type) return;
    if (type === "tournament") setForm(blankTournament());
    else if (type === "practice") setForm(blankPractice());
    else if (type === "trial") setForm(blankTrial()); // S14: 試打 (Home 3 ボタン経由、preview_s14.html L575-)
    else setForm(null);
  }, [open, type]);

  // Esc で閉じる
  useEffect(() => {
    if (!open) return;
    const handler = (e) => { if (e.key === "Escape") onClose && onClose(); };
    document.addEventListener("keydown", handler);
    return () => document.removeEventListener("keydown", handler);
  }, [open, onClose]);

  if (!open || !form || !type) return null;

  // setter (練習の時刻入力で duration 自動計算 - v3:2471-2481 移植)
  // S16.11 F2 ガード: Apple Watch 取込み済 duration は時刻編集で上書きしない
  const set = (k, v) => {
    setForm((p) => {
      const n = { ...p, [k]: v };
      if (type === "practice" && (k === "startTime" || k === "endTime") && n.startTime && n.endTime) {
        const sParts = n.startTime.split(":").map(Number);
        const eParts = n.endTime.split(":").map(Number);
        if (!isNaN(sParts[0]) && !isNaN(eParts[0])) {
          const mins = (eParts[0] * 60 + (eParts[1] || 0)) - (sParts[0] * 60 + (sParts[1] || 0));
          if (mins > 0) {
            const isWatchDuration = !!(p.heartRateAvg || p.calories || p.totalCalories || p.hrZone1);
            if (!isWatchDuration) {
              n.duration = String(mins);
            }
          }
        }
      }
      return n;
    });
  };

  // バリデーション (SCHEMA 駆動)
  const errors = getRequiredErrors(type, form);
  const valid = Object.keys(errors).length === 0;

  const handleSaveClick = () => {
    if (!valid) return;
    onSave && onSave(form);
  };

  const titleText  = type === "tournament" ? "大会を追加" : type === "practice" ? "練習を追加" : "試打を追加";
  const titleColor = type === "tournament" ? "#a04f00"   : type === "practice"   ? "#0a5b35"   : "#6a25a8";
  const titleIcon  = type === "tournament" ? "trophy"    : type === "practice"   ? "person-standing" : "tennis";
  const hint = type === "tournament"
    ? "まず作成 → 結果 / 機材 / 試合記録は後から編集ボタンで追記。30 秒で記録できます。"
    : type === "practice"
      ? "機材 / 体調 / メモは後から編集で追記。練習時間は時刻から自動計算。"
      : "判定だけ決めて作成 → 評価 17 項目 (打感 / 特性 / ショット) と連携先 (大会内 match / 練習) は後から編集ボタンで追記。";

  return (
    <div
      role="dialog"
      aria-modal="true"
      aria-label={titleText}
      onClick={(e) => { if (e.target === e.currentTarget) onClose && onClose(); }}
      style={{
        position: "fixed", inset: 0, background: "rgba(0,0,0,0.4)", zIndex: 1000,
        display: "flex", alignItems: "flex-start", justifyContent: "center",
        padding: "20px 12px", overflowY: "auto",
      }}
    >
      <div ref={trapRef} style={{
        background: C.panel, borderRadius: 16, padding: 18,
        maxWidth: 420, width: "100%",
      }}>
        {/* ヘッダ */}
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
          <span style={{ fontSize: 14, fontWeight: 700, color: titleColor, display: "flex", alignItems: "center", gap: 6 }}>
            <Icon name={titleIcon} size={16} color={titleColor} />
            {titleText}
          </span>
          <button onClick={onClose} aria-label="閉じる" style={{ background: "none", border: "none", color: C.textSecondary, cursor: "pointer", padding: 4, display: "flex" }}>
            <Icon name="x" size={18} color={C.textSecondary} />
          </button>
        </div>

        {/* 大会フォーム */}
        {type === "tournament" && (
          <>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0 10px" }}>
              <Input type="date" label="日付" required value={form.date || ""} onChange={(v) => set("date", v)} error={errors.date} />
              <Input label="大会名" required value={form.name || ""} onChange={(v) => set("name", v)} placeholder="例: 所沢ベテラン" error={errors.name} />
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0 10px" }}>
              <Select label="形式" value={form.type || "singles"} onChange={(v) => set("type", v)} options={_QA_TOUR_TYPE_OPTS} />
              <MasterField label="クラス" value={form.level || ""} onChange={(v) => set("level", v)} masterValues={levelNames} placeholder="-- クラスを選択 --" />
            </div>
            <MasterField label="会場" value={form.venue || ""} onChange={(v) => set("venue", v)} masterValues={venueNames} placeholder="-- 会場を選択 --" />
            <div style={{ marginTop: 4 }}>
              <label style={{ display: "block", fontSize: 12, color: C.textSecondary, fontWeight: 500, marginBottom: 4 }}>公開設定</label>
              <_qaVisibility value={form.visibility} onChange={(v) => set("visibility", v)} />
            </div>
          </>
        )}

        {/* 練習フォーム */}
        {type === "practice" && (
          <>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0 10px" }}>
              <Input type="date" label="日付" required value={form.date || ""} onChange={(v) => set("date", v)} error={errors.date} />
              <Select label="種別" value={form.type || ""} onChange={(v) => set("type", v)} options={_QA_PRAC_TYPE_OPTS} />
            </div>
            <Input label="イベント名" value={form.title || ""} onChange={(v) => set("title", v)} placeholder="例: ナイターレッスン中上級" />
            <MasterField label="会場" value={form.venue || ""} onChange={(v) => set("venue", v)} masterValues={venueNames} placeholder="-- 会場を選択 --" />
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0 10px" }}>
              {/* リク 30-* (S18) Wheel picker 全画面適用 */}
              <TimeWheel label="開始時刻" value={form.startTime || ""} onChange={(v) => set("startTime", v)} />
              <TimeWheel label="終了時刻" value={form.endTime || ""} onChange={(v) => set("endTime", v)} />
            </div>
            <div style={{ marginTop: 4 }}>
              <label style={{ display: "block", fontSize: 12, color: C.textSecondary, fontWeight: 500, marginBottom: 4 }}>公開設定</label>
              <_qaVisibility value={form.visibility} onChange={(v) => set("visibility", v)} />
            </div>
          </>
        )}

        {/* 試打フォーム (S14、preview_s14.html L575-) */}
        {type === "trial" && (
          <>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0 10px" }}>
              <Input type="date" label="日付" required value={form.date || ""} onChange={(v) => set("date", v)} error={errors.date} />
              <MasterField label="会場" value={form.venue || ""} onChange={(v) => set("venue", v)} masterValues={venueNames} placeholder="-- 会場を選択 --" />
            </div>
            <MasterField label="ラケット" required value={form.racketName || ""} onChange={(v) => set("racketName", v)} masterValues={racketNames} placeholder="-- ラケットを選択 --" error={errors.racketName} />
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0 10px" }}>
              <MasterField label="縦糸" value={form.stringMain || ""} onChange={(v) => set("stringMain", v)} masterValues={stringNames} placeholder="-- 縦糸 --" />
              <MasterField label="横糸" value={form.stringCross || ""} onChange={(v) => set("stringCross", v)} masterValues={stringNames} placeholder="-- 横糸 --" />
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0 10px" }}>
              <NumWheel label="テンション 縦" value={form.tensionMain || ""} min={35} max={55} step={1} onChange={(v) => set("tensionMain", v)} />
              <NumWheel label="テンション 横" value={form.tensionCross || ""} min={35} max={55} step={1} onChange={(v) => set("tensionCross", v)} />
            </div>
            <_qaJudgment value={form.judgment} onChange={(v) => set("judgment", v)} />
          </>
        )}

        {/* ヒント */}
        <div style={{
          fontSize: 11, color: C.textSecondary, background: C.panel2,
          borderLeft: `2px solid ${C.primary}`, padding: "8px 10px",
          borderRadius: 4, marginTop: 10, marginBottom: 10, lineHeight: 1.6,
        }}>
          {hint}
        </div>

        {/* アクション */}
        <div style={{ display: "flex", gap: 8, justifyContent: "flex-end", marginTop: 4 }}>
          <button
            type="button"
            onClick={onClose}
            style={{
              minHeight: 44, padding: "10px 20px", borderRadius: 8,
              border: `1px solid ${C.border}`, background: C.panel, color: C.textSecondary,
              fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: font,
            }}
          >キャンセル</button>
          <button
            type="button"
            onClick={handleSaveClick}
            disabled={!valid}
            title={valid ? "作成" : "必須項目が未入力です"}
            style={{
              minHeight: 44, padding: "10px 20px", borderRadius: 8,
              border: "none",
              background: valid ? C.primary : C.border,
              color: valid ? "#fff" : C.textMuted,
              fontSize: 13, fontWeight: 700,
              cursor: valid ? "pointer" : "not-allowed",
              display: "inline-flex", alignItems: "center", gap: 6, fontFamily: font,
            }}
          >
            <Icon name="plus" size={16} color={valid ? "#fff" : C.textMuted} />作成
          </button>
        </div>
      </div>
    </div>
  );
}

// === src/ui/sessions/QuickTrialMode.jsx ===
// QuickTrialMode — 試打カード式 簡易記録モード (S15.5、V2 移植 + v4 デザイン)
//
// 役割:
//   - REQUIREMENTS_v4 F1.3 の試打記録を、カード式で素早く実行 (大会会場での 3-4 ラケット試打用)
//   - V2 から移植 (v2_index.html line 2809 〜 3003)、v4 DESIGN_SYSTEM 準拠で再構築
//   - ChatGPT レビュー反映 (preview_s15.5_p2): タイトル黒固定 / 評価色 primary 統一 / 進捗カウンタ / 自然な文言
//
// props:
//   open:         boolean
//   cards:        quickTrialCards 配列 (親管理)
//   setCards:     (newCards) => void  追加 / 削除 / eval 中間保存に使用 (lsSave + Firestore も親側で実施)
//   rackets:      master rackets 配列 (status 色判定用)
//   stringNames:  string 候補配列 (追加フォーム select)
//   onSaveTrial:  ({card, eval}) => void  保存時 (親が trial 生成 + auto-link + trials 追加 + カード削除 + toast)
//   onClose:      () => void   ✕ で閉じる
//   confirm:      useConfirm() の戻り値  カード削除確認に使用
//   toast:        useToast() の戻り値    補助通知 (主は親側)
//
// 内部ロジック:
//   - selected = null: カード一覧 view、selected = cardId: 評価入力 view
//   - eval_, touched (Set) は selected 切替時に当該カードの eval/touched に保存 → 復元
//   - 進捗 = 各セクションで touched.has(key) の数 / 総数

// ── 評価項目グループ (V2 互換、SCHEMA trial 17 項目)
const _QTM_GROUPS = [
  {
    title: "性能", desc: "高い方が良い", icon: "gauge",
    items: [
      { key: "spin",         label: "スピン",       low: "弱い",     high: "強い"   },
      { key: "power",        label: "推進力",       low: "飛ばない", high: "飛ぶ"   },
      { key: "control",      label: "コントロール", low: "散る",     high: "狙える" },
      { key: "info",         label: "打感情報",     low: "感じない", high: "クリア" },
      { key: "maneuver",     label: "操作性",       low: "重い",     high: "軽快"   },
      { key: "swingThrough", label: "振り抜き",     low: "悪い",     high: "良い"   },
    ],
  },
  {
    title: "特性", desc: "中央が基準", icon: "sliders-horizontal",
    items: [
      { key: "trajectory", label: "弾道の高さ", low: "低い",     high: "高い"   },
      { key: "stiffness",  label: "打感",       low: "柔らかい", high: "硬い"   },
    ],
  },
  {
    title: "ショット別", desc: "高い方が良い", icon: "tennis",
    items: [
      { key: "shotForeAtk", label: "フォア (攻撃)" },
      { key: "shotForeDef", label: "フォア (守備)" },
      { key: "shotBackAtk", label: "バック (攻撃)" },
      { key: "shotBackDef", label: "バック (守備)" },
      { key: "shotSlice",   label: "スライス" },
      { key: "shotServe",   label: "サーブ" },
      { key: "shotVolley",  label: "ボレー" },
      { key: "shotReturn",  label: "リターン" },
    ],
  },
  {
    title: "総合", desc: "", icon: "seal-check",
    items: [
      { key: "confidence", label: "安心感", low: "不安", high: "振り切れる" },
    ],
  },
];

// ── 評価初期値 (3 = neutral、V2 互換)
const _qtmFreshEval = () => ({
  spin: 3, power: 3, control: 3, info: 3, maneuver: 3, swingThrough: 3,
  trajectory: 3, stiffness: 3,
  shotForeAtk: 3, shotForeDef: 3, shotBackAtk: 3, shotBackDef: 3,
  shotSlice: 3, shotServe: 3, shotVolley: 3, shotReturn: 3,
  confidence: 3,
  memo: "",
});

// ── status 別の色 + 表示ラベル (preview_s15.5_p2 で確定)
const _qtmStatusInfo = {
  active:      { left: "#FF9500", chipBg: "rgba(255,149,0,0.12)", chipColor: "#FF9500", label: "主力" },
  candidate:   { left: "#007AFF", chipBg: "#E1F0FF",              chipColor: "#007AFF", label: "検討中" },
  considering: { left: "#C7C7CC", chipBg: "#f1f3f4",              chipColor: "#5f6368", label: "待機" },
  support:     { left: "#0f9d58", chipBg: "#e6f4ea",              chipColor: "#0f9d58", label: "補助" },
};
const _qtmStatusOf = (card, racketsByName) => {
  const r = racketsByName.get(card?.racket);
  return _qtmStatusInfo[r?.status] || _qtmStatusInfo.considering;
};

// ── 簡易ガット候補抽出 (空 + master 名)
const _qtmStringOpts = (stringNames) => {
  const opts = [{ value: "", label: "-- 縦糸 --" }];
  (stringNames || []).forEach(n => { if (n) opts.push({ value: n, label: n }); });
  return opts;
};

// ── 本体
function QuickTrialMode({ open, cards, setCards, rackets, stringNames, onSaveTrial, onClose, confirm, toast }) {
  const [selected, setSelected] = useState(null);
  const [adding, setAdding] = useState(false);
  const [addF, setAddF] = useState({ racket: "", stringMain: "", stringCross: "", tensionMain: "", tensionCross: "" });
  const [eval_, setEval] = useState(_qtmFreshEval);
  const [touched, setTouched] = useState(() => new Set());

  // S15.5.2 fix: popstate handler で eval_/touched の最新値を参照するため Ref で tracking
  const evalRef = useRef(eval_);
  const touchedRef = useRef(touched);
  useEffect(() => { evalRef.current = eval_; }, [eval_]);
  useEffect(() => { touchedRef.current = touched; }, [touched]);

  // S15.5.7: メモ textarea の auto-grow (内容に合わせて高さ自動拡張)
  const memoRef = useRef(null);
  useEffect(() => {
    const ta = memoRef.current;
    if (!ta) return;
    ta.style.height = "auto";
    ta.style.height = ta.scrollHeight + "px";
  }, [eval_.memo, selected]);

  // open 切替で内部 state リセット
  useEffect(() => {
    if (!open) {
      setSelected(null);
      setAdding(false);
      setAddF({ racket: "", stringMain: "", stringCross: "", tensionMain: "", tensionCross: "" });
      setEval(_qtmFreshEval());
      setTouched(new Set());
    }
  }, [open]);

  // S15.5.2 fix: open=true 時に history entry を 1 個積む (一覧 view 用)
  // これがないと iOS 左端スワイプ → history.back → 前のページ (Home) に飛ぶ問題
  useEffect(() => {
    if (!open) return;
    try { window.history.pushState({ tdb: "quickTrial-list" }, ""); } catch(_) {}
  }, [open]);

  // S15.5.2 fix: popstate (iOS 左端スワイプ / ブラウザ戻る) で内部 state 制御
  //   評価 view → 一覧 view、または 一覧 view → 閉じる
  //   eval/touched は Ref 経由で最新値を保存
  useEffect(() => {
    if (!open) return;
    const handler = () => {
      if (selected) {
        // 評価値を current selected カードに焼き付けてから一覧へ
        const sel = selected;
        const e = { ...evalRef.current };
        const t = [...touchedRef.current];
        setCards(prev =>
          (prev || []).map(c => c.id === sel ? { ...c, eval: e, touched: t } : c)
        );
        setSelected(null);
      } else {
        onClose && onClose();
      }
    };
    window.addEventListener("popstate", handler);
    return () => window.removeEventListener("popstate", handler);
  }, [open, selected, onClose, setCards]);

  // Esc で閉じる
  useEffect(() => {
    if (!open) return;
    const handler = (e) => { if (e.key === "Escape") {
      if (selected) backToList();
      else handleCloseClick();
    }};
    document.addEventListener("keydown", handler);
    return () => document.removeEventListener("keydown", handler);
  }, [open, selected]);

  if (!open) return null;

  // master rackets を name で索引化 (status 色判定)
  const racketsByName = new Map();
  (rackets || []).forEach(r => { if (r && r.name) racketsByName.set(r.name, r); });

  // 追加可能なラケット (retired を除外)
  const activeRackets = (rackets || []).filter(r => r && r.status !== "retired" && r.name);

  // 現在の eval/touched を card に書き戻す (関数形式で stale closure 回避)
  const persistCurrentEval = () => {
    if (!selected) return;
    const sel = selected;
    const e = { ...eval_ };
    const t = [...touched];
    setCards(prev =>
      (prev || []).map(c =>
        c.id === sel ? { ...c, eval: e, touched: t } : c
      )
    );
  };

  const selectCard = (id) => {
    persistCurrentEval();
    const card = (cards || []).find(c => c.id === id);
    setEval(card?.eval ? { ..._qtmFreshEval(), ...card.eval } : _qtmFreshEval());
    setTouched(new Set(card?.touched || []));
    // S15.5.2 fix: 評価 view 用 history entry を積む (戻ると popstate で 一覧 view へ)
    try { window.history.pushState({ tdb: "quickTrial-eval" }, ""); } catch(_) {}
    setSelected(id);
  };

  // S15.5.2 fix: backToList と handleCloseClick はどちらも history.back 経由に統一
  //   → popstate handler が selected/onClose を制御、ヘッダボタンも iOS 左端スワイプも同じ動作
  const backToList = () => {
    persistCurrentEval();
    try { window.history.back(); } catch(_) { setSelected(null); }
  };

  const handleCloseClick = () => {
    try { window.history.back(); } catch(_) { onClose && onClose(); }
  };

  const handleAddCard = () => {
    if (!addF.racket) {
      toast && toast.show("ラケットを選択してください", "warning");
      return;
    }
    const newCard = {
      id: genId(),
      racket: addF.racket,
      stringMain: addF.stringMain || "",
      stringCross: addF.stringCross || "",
      tensionMain: addF.tensionMain || "",
      tensionCross: addF.tensionCross || "",
    };
    setCards([...(cards || []), newCard]);
    setAddF({ racket: "", stringMain: "", stringCross: "", tensionMain: "", tensionCross: "" });
    setAdding(false);
  };

  const handleDeleteCard = (cardId) => {
    if (!confirm) return;
    confirm.ask(
      "このカードを削除しますか？",
      () => {
        setCards((cards || []).filter(c => c.id !== cardId));
      },
      { title: "カード削除の確認", yesLabel: "削除", yesVariant: "danger", icon: "trash-2" }
    );
  };

  const setRating = (key, val) => {
    setEval(prev => ({ ...prev, [key]: val }));
    setTouched(prev => {
      if (prev.has(key)) return prev;
      const next = new Set(prev);
      next.add(key);
      return next;
    });
  };

  const handleSaveTrial = () => {
    const card = (cards || []).find(c => c.id === selected);
    if (!card) return;
    onSaveTrial && onSaveTrial({ card, eval: { ...eval_ } });
    // H-18 (Phase A 監査): selectCard で積んだ "quickTrial-eval" history entry を消費する。
    //   旧: setSelected(null) のみ → entry が orphan で残り、後の左端スワイプで誤動作
    //   新: history.back() で entry を pop。popstate handler が evalRef を card に焼き付けて
    //        setSelected(null) を呼ぶので、ここで明示的に setSelected しないこと。
    //        また evalRef は既に最新値を持っているため popstate での焼き付けも問題なし。
    try { window.history.back(); } catch (_) { setSelected(null); }
    setEval(_qtmFreshEval());
    setTouched(new Set());
  };

  // ── 評価入力 view
  if (selected) {
    const card = (cards || []).find(c => c.id === selected);
    if (!card) {
      // 不正状態 → 一覧に戻す
      setSelected(null);
      return null;
    }
    const status = _qtmStatusOf(card, racketsByName);
    const stringInfo = [card.stringMain, card.stringCross].filter(Boolean).join(" / ");
    const tensionInfo = [card.tensionMain, card.tensionCross].filter(Boolean).join(" / ");

    return (
      <div
        role="dialog"
        aria-modal="true"
        aria-label="試打 評価入力"
        style={{
          position: "fixed", inset: 0, background: C.bg, zIndex: 200,
          display: "flex", flexDirection: "column",
        }}
      >
        {/* Header */}
        <div style={{
          height: 56, flex: "0 0 56px", display: "flex", alignItems: "center", gap: 8,
          padding: "0 12px", background: C.panel, borderBottom: `1px solid ${C.divider}`,
        }}>
          <button
            onClick={backToList}
            aria-label="一覧に戻る"
            style={{
              width: 44, height: 44, display: "flex", alignItems: "center", justifyContent: "center",
              background: "transparent", border: "none", cursor: "pointer", borderRadius: 8, color: C.primary,
            }}
          >
            <Icon name="arrow-left" size={24} ariaLabel="一覧に戻る" />
          </button>
          <div style={{ flex: 1, fontSize: 16, fontWeight: 600, color: C.text }}>試打ノート</div>
          <div style={{ fontSize: 12, color: C.textMuted }}>評価中</div>
        </div>

        {/* Body */}
        <div style={{ flex: 1, overflowY: "auto", padding: 14 }}>
          {/* ラケット見出し: タイトル黒固定 + 左帯 status 色 */}
          <div style={{
            background: C.panel, border: `1px solid ${C.border}`,
            borderLeft: `4px solid ${status.left}`,
            borderRadius: 14, padding: "14px 16px", marginBottom: 12,
          }}>
            <div style={{ fontSize: 17, fontWeight: 700, color: C.text }}>{card.racket}</div>
            <div style={{ fontSize: 12, color: C.textSecondary, marginTop: 2 }}>
              {stringInfo}{tensionInfo ? ` / ${tensionInfo}` : ""}
            </div>
          </div>

          {/* 進捗バー (4 セクション、表示のみ) */}
          <div style={{
            display: "grid", gridTemplateColumns: "repeat(4, 1fr)",
            gap: 6, marginBottom: 14,
          }}>
            {_QTM_GROUPS.map(g => {
              const total = g.items.length;
              const done = g.items.filter(it => touched.has(it.key)).length;
              const complete = done === total;
              return (
                <div key={g.title} style={{
                  background: complete ? C.successLight : C.panel,
                  border: `1px solid ${complete ? C.success : C.border}`,
                  borderRadius: 10, padding: "6px 6px", textAlign: "center",
                }}>
                  <div style={{ fontSize: 9, color: C.textMuted, textTransform: "uppercase", letterSpacing: "0.04em" }}>
                    {g.title}
                  </div>
                  <div style={{
                    fontSize: 13, fontWeight: 700, marginTop: 2,
                    color: complete ? C.success : C.text,
                    fontVariantNumeric: "tabular-nums",
                  }}>
                    {done}/{total}
                  </div>
                </div>
              );
            })}
          </div>

          {/* 評価セクション 4 個 */}
          {_QTM_GROUPS.map(g => (
            <div key={g.title} style={{ marginBottom: 18 }}>
              <div style={{
                display: "flex", alignItems: "center", gap: 6, marginBottom: 10,
                borderBottom: `1px solid ${C.divider}`, paddingBottom: 6,
              }}>
                <Icon name={g.icon} size={16} color={C.textMuted} />
                <span style={{ fontSize: 13, fontWeight: 700, color: C.text, flex: 1 }}>{g.title}</span>
                {g.desc && <span style={{ fontSize: 11, color: C.textMuted }}>{g.desc}</span>}
              </div>
              {g.items.map(it => (
                <div key={it.key} style={{ marginBottom: 14 }}>
                  <div style={{ fontSize: 13, fontWeight: 500, color: C.text, marginBottom: 6 }}>{it.label}</div>
                  <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
                    {it.low && (
                      <span style={{ fontSize: 10, color: C.textMuted, minWidth: 32, textAlign: "center", flexShrink: 0 }}>
                        {it.low}
                      </span>
                    )}
                    {[1,2,3,4,5].map(n => {
                      const sel = eval_[it.key] === n;
                      return (
                        <button
                          key={n}
                          onClick={() => setRating(it.key, n)}
                          style={{
                            flex: 1, height: 40, borderRadius: 8,
                            border: `1px solid ${sel ? C.primary : C.border}`,
                            background: sel ? C.primaryLight : C.panel,
                            color: sel ? C.primary : C.textSecondary,
                            fontSize: 14, fontWeight: 600, cursor: "pointer",
                            fontFamily: font,
                          }}
                        >
                          {n}
                        </button>
                      );
                    })}
                    {it.high && (
                      <span style={{ fontSize: 10, color: C.textMuted, minWidth: 32, textAlign: "center", flexShrink: 0 }}>
                        {it.high}
                      </span>
                    )}
                  </div>
                </div>
              ))}
            </div>
          ))}

          {/* メモ (S15.5.7: auto-grow + 文字サイズ scale 対応) */}
          <div style={{ marginBottom: 16 }}>
            <div style={{
              fontSize: 13, fontWeight: 600, color: C.text, marginBottom: 6,
              display: "flex", alignItems: "center", gap: 4,
            }}>
              <Icon name="note-pencil" size={14} color={C.textMuted} />
              <span>メモ</span>
            </div>
            <textarea
              ref={memoRef}
              value={eval_.memo}
              onChange={(e) => setEval(prev => ({ ...prev, memo: e.target.value }))}
              placeholder="気づいたことを一言..."
              rows={3}
              style={{
                width: "100%", borderRadius: 10, border: `1px solid ${C.border}`,
                padding: "12px",
                fontSize: "calc(16px * var(--memo-font-scale, 1))",
                lineHeight: 1.55,
                fontFamily: font,
                resize: "none", overflow: "hidden",
                color: C.text, background: C.panel,
                boxSizing: "border-box",
                minHeight: "calc(3 * 1.55em + 24px)",
                WebkitAppearance: "none", appearance: "none", outline: "none",
              }}
            />
          </div>

          {/* 保存 */}
          <button
            onClick={handleSaveTrial}
            style={{
              width: "100%", background: C.primary, border: "none", borderRadius: 12,
              padding: 14, fontSize: 15, fontWeight: 600, color: "#fff",
              cursor: "pointer", fontFamily: font, minHeight: 56,
              display: "inline-flex", alignItems: "center", justifyContent: "center", gap: 6,
            }}
          >
            <Icon name="circle-check" size={18} color="#fff" /> 評価を保存
          </button>
        </div>
      </div>
    );
  }

  // ── カード一覧 view
  return (
    <div
      role="dialog"
      aria-modal="true"
      aria-label="試打ノート"
      style={{
        position: "fixed", inset: 0, background: C.bg, zIndex: 200,
        display: "flex", flexDirection: "column",
      }}
    >
      {/* Header */}
      <div style={{
        height: 56, flex: "0 0 56px", display: "flex", alignItems: "center", gap: 8,
        padding: "0 12px", background: C.panel, borderBottom: `1px solid ${C.divider}`,
      }}>
        <button
          onClick={handleCloseClick}
          aria-label="閉じる"
          style={{
            width: 44, height: 44, display: "flex", alignItems: "center", justifyContent: "center",
            background: "transparent", border: "none", cursor: "pointer", borderRadius: 8, color: C.primary,
          }}
        >
          <Icon name="x" size={24} ariaLabel="閉じる" />
        </button>
        <div style={{ flex: 1, fontSize: 16, fontWeight: 600, color: C.text }}>試打ノート</div>
        <div style={{ fontSize: 12, color: C.textMuted }}>{(cards || []).length} 枚</div>
      </div>

      {/* Body */}
      <div style={{ flex: 1, overflowY: "auto", padding: 14 }}>
        {(cards || []).length === 0 && !adding && (
          <div style={{ textAlign: "center", padding: "40px 20px", color: C.textMuted, fontSize: 13, lineHeight: 1.6 }}>
            「+ 追加」で今日試打する<br />ラケット × セッティング を登録してください
          </div>
        )}

        {/* カード行 */}
        {(cards || []).map(card => {
          const status = _qtmStatusOf(card, racketsByName);
          const stringInfo = [card.stringMain, card.stringCross].filter(Boolean).join(" / ");
          const tensionInfo = [card.tensionMain, card.tensionCross].filter(Boolean).join(" / ");
          const meta = [stringInfo, tensionInfo].filter(Boolean).join(" / ");
          const evaluated = !!card.eval;
          return (
            <div
              key={card.id}
              onClick={() => selectCard(card.id)}
              role="button"
              tabIndex={0}
              style={{
                background: C.panel, border: `1px solid ${C.border}`,
                borderLeft: `4px solid ${status.left}`,
                borderRadius: 14, padding: "14px 16px", marginBottom: 10,
                cursor: "pointer", display: "grid",
                gridTemplateColumns: "1fr auto", gap: 8, alignItems: "start",
              }}
            >
              <div style={{ minWidth: 0 }}>
                <div style={{
                  fontSize: 16, fontWeight: 700, color: C.text, marginBottom: 4,
                  overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap",
                }}>{card.racket}</div>
                <div style={{ fontSize: 12, color: C.textSecondary }}>{meta || "—"}</div>
              </div>
              <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 6 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
                  <span style={{
                    fontSize: 10, fontWeight: 600,
                    padding: "2px 6px", borderRadius: 6, whiteSpace: "nowrap",
                    background: status.chipBg, color: status.chipColor,
                  }}>{status.label}</span>
                  <button
                    onClick={(e) => { e.stopPropagation(); handleDeleteCard(card.id); }}
                    aria-label="このカードを削除"
                    style={{
                      width: 28, height: 28, padding: 0, display: "inline-flex",
                      alignItems: "center", justifyContent: "center",
                      background: "transparent", border: "none", color: C.textMuted,
                      cursor: "pointer", borderRadius: 6,
                    }}
                  >
                    <Icon name="x" size={16} ariaLabel="削除" />
                  </button>
                </div>
                {evaluated && (
                  <span style={{
                    fontSize: 10, color: C.textMuted, fontWeight: 500,
                    display: "inline-flex", alignItems: "center", gap: 3,
                  }}>
                    <Icon name="circle-check" size={12} color={C.success} weight="fill" />
                    評価済
                  </span>
                )}
              </div>
            </div>
          );
        })}

        {/* 追加 (フォーム or ボタン) */}
        {!adding ? (
          <button
            onClick={() => setAdding(true)}
            style={{
              width: "100%", background: C.panel, border: `1px dashed ${C.border}`,
              borderRadius: 14, padding: 14, fontSize: 14, fontWeight: 500, color: C.textSecondary,
              cursor: "pointer", fontFamily: font, minHeight: 56,
              display: "inline-flex", alignItems: "center", justifyContent: "center", gap: 6,
            }}
          >
            <Icon name="plus" size={18} color={C.textSecondary} /> 追加
          </button>
        ) : (
          <div style={{
            background: C.panel, border: `1px solid ${C.border}`,
            borderRadius: 14, padding: 14,
          }}>
            <select
              value={addF.racket}
              onChange={(e) => setAddF(p => ({ ...p, racket: e.target.value }))}
              aria-label="ラケットを選択"
              style={_qtmInputStyle}
            >
              <option value="">-- ラケット --</option>
              {activeRackets.map(r => (
                <option key={r.id || r.name} value={r.name}>
                  {r.name}{r.status ? ` (${r.status})` : ""}
                </option>
              ))}
            </select>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 8 }}>
              <select
                value={addF.stringMain}
                onChange={(e) => setAddF(p => ({ ...p, stringMain: e.target.value }))}
                aria-label="縦糸"
                style={{ ..._qtmInputStyle, marginBottom: 0 }}
              >
                {_qtmStringOpts(stringNames).map(o => (
                  <option key={"sm-" + o.value} value={o.value}>{o.label}</option>
                ))}
              </select>
              <select
                value={addF.stringCross}
                onChange={(e) => setAddF(p => ({ ...p, stringCross: e.target.value }))}
                aria-label="横糸"
                style={{ ..._qtmInputStyle, marginBottom: 0 }}
              >
                <option value="">-- 横糸 (同じ) --</option>
                {(stringNames || []).map(n => n ? <option key={"sc-" + n} value={n}>{n}</option> : null)}
              </select>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 10 }}>
              <input
                value={addF.tensionMain}
                onChange={(e) => setAddF(p => ({ ...p, tensionMain: e.target.value }))}
                placeholder="縦テンション (例: 48)"
                inputMode="decimal"
                style={{ ..._qtmInputStyle, marginBottom: 0 }}
              />
              <input
                value={addF.tensionCross}
                onChange={(e) => setAddF(p => ({ ...p, tensionCross: e.target.value }))}
                placeholder="横テンション (同じなら空欄)"
                inputMode="decimal"
                style={{ ..._qtmInputStyle, marginBottom: 0 }}
              />
            </div>
            <div style={{ display: "flex", gap: 8 }}>
              <button
                onClick={() => { setAdding(false); setAddF({ racket: "", stringMain: "", stringCross: "", tensionMain: "", tensionCross: "" }); }}
                style={{
                  flex: 1, background: C.panel2, border: "none", borderRadius: 10,
                  padding: 10, fontSize: 13, fontWeight: 600, cursor: "pointer",
                  color: C.textSecondary, fontFamily: font, minHeight: 44,
                }}
              >
                キャンセル
              </button>
              <button
                onClick={handleAddCard}
                style={{
                  flex: 1, background: C.primary, border: "none", borderRadius: 10,
                  padding: 10, fontSize: 13, fontWeight: 600, cursor: "pointer",
                  color: "#fff", fontFamily: font, minHeight: 44,
                }}
              >
                追加
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// === src/ui/sessions/SessionCard.jsx ===
// SessionCard — Sessions 一覧の1枚カード (DESIGN_SYSTEM §8.5.5 準拠、S6 仕様)
// props:
//   type: "tournament" | "practice" (trial は一覧表示から除外、リンクバッジ経由で表示)
//   date: 日付文字列 (YYYY-MM-DD / YYYY/M/D 両対応、内部で normDate)
//   title: メイン見出し (例: 大会名/会場)
//   metaLine: サブ行 (例: "シングルス 3勝0敗")
//   highlight: 結果の階層表現 "gold" | "silver" | "bronze" | null (優勝/準優勝/3位)
//   resultBadge: 結果バッジ (優勝・ベスト8 等、省略可)
//   sideBadge: 補助バッジ (練習の種別等、省略可)
//   trialBadge: 試打リンクバッジ (同日に紐付いた試打がある場合、省略可)
//   onClick: タップ時 (S10 で画面遷移、S6 では placeholder toast)
//
// 結果階層:
//   gold (優勝)   → tournamentLight 背景 + 1.5px tournamentAccent 枠 + 淡い shadow
//   silver (準優勝) → primaryLight 背景 + 1.5px primary 枠
//   bronze (3位)  → trialLight 背景 + 1.5px trialAccent 枠
//   null        → 通常カード
//
// 使う色は C.tournamentAccent 等を経由 (独自スタイル禁止)
//
// S7 で残した拡張: 日付 span に minWidth (4 文字日付でも潰れない揃え)、
//                  Badge 呼び出しに minWidth を渡してカード間で右端を揃える

const SESSION_TYPE_ACCENT = {
  tournament: { accent: C.tournamentAccent, light: C.tournamentLight },
  practice:   { accent: C.practiceAccent,   light: C.practiceLight },
  trial:      { accent: C.trialAccent,      light: C.trialLight },
};

// S8.5: フラットデザイン原則 (DESIGN_SYSTEM §0 / §181) に合わせ gold の shadow を撤去。
// 優勝の視覚強調は tinted bg + 1.5px accent border + font-weight 700 (SessionCard のタイトル行) のみで表現。
const HIGHLIGHT_STYLES = {
  gold:   { bg: C.tournamentLight, border: C.tournamentAccent, shadow: "none" },
  silver: { bg: C.primaryLight,    border: C.primary,          shadow: "none" },
  bronze: { bg: C.trialLight,      border: C.trialAccent,      shadow: "none" },
};

function SessionCard({ type, date, title, metaLine, highlight, resultBadge, sideBadge, trialBadge, onClick }) {
  const accent = SESSION_TYPE_ACCENT[type] || SESSION_TYPE_ACCENT.tournament;
  const hl = highlight ? HIGHLIGHT_STYLES[highlight] : null;
  const [hover, setHover] = useState(false);
  const clickable = !!onClick;

  const bg = hl ? hl.bg : (clickable && hover ? C.panel2 : C.panel);
  const border = hl ? `1.5px solid ${hl.border}` : `1px solid ${C.border}`;
  const shadow = hl ? hl.shadow : "none";

  return (
    <div
      onClick={onClick}
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      role={clickable ? "button" : undefined}
      tabIndex={clickable ? 0 : undefined}
      onKeyDown={clickable ? (e) => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); onClick(e); } } : undefined}
      style={{
        position: "relative",
        background: bg,
        border,
        borderRadius: 12,
        padding: "10px 14px 10px 18px",
        marginBottom: 4,
        cursor: clickable ? "pointer" : "default",
        transition: "background 150ms ease-out, transform 150ms",
        boxShadow: shadow,
        overflow: "hidden",
      }}
    >
      {/* 左端 3px 色帯 */}
      <div style={{
        position: "absolute", left: 0, top: 0, bottom: 0,
        width: 3, background: accent.accent,
        borderTopLeftRadius: 12, borderBottomLeftRadius: 12,
      }} />

      {/* 1 行目: 日付 + カテゴリー (sideBadge) + 結果 (resultBadge) + 試打 (trialBadge) */}
      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 2, flexWrap: "wrap" }}>
        <span style={{
          fontSize: 13,
          fontWeight: 600,
          color: C.textSecondary,
          minWidth: 42,      // 「4/11」(4文字) でも潰れず、「4/8」(3文字) でも幅を確保
          flexShrink: 0,     // バッジ増えても日付が圧縮されない
        }}>
          {fmtDate(date)}
        </span>
        {/* minWidth は役割ごとに固定: 並んだカードでバッジ右端を揃えてリズムを作る */}
        {sideBadge && (
          <Badge variant={sideBadge.variant} icon={sideBadge.icon} minWidth={96}>{sideBadge.label}</Badge>
        )}
        {resultBadge && (
          <Badge variant={resultBadge.variant} icon={resultBadge.icon} minWidth={80}>{resultBadge.label}</Badge>
        )}
        {trialBadge && (
          <Badge variant={trialBadge.variant} icon={trialBadge.icon} minWidth={60}>{trialBadge.label}</Badge>
        )}
      </div>

      {/* 2 行目: タイトル (S8.5: 長 title の壁化防止のため 2 行で省略) */}
      <div style={{
        fontSize: 15,
        fontWeight: highlight ? 700 : 600,
        color: C.text,
        lineHeight: 1.3,
        marginBottom: metaLine ? 2 : 0,
        display: "-webkit-box",
        WebkitLineClamp: 2,
        WebkitBoxOrient: "vertical",
        overflow: "hidden",
        textOverflow: "ellipsis",
        wordBreak: "break-word",
      }}>
        {title || "(無題)"}
      </div>

      {/* 3 行目: メタ */}
      {metaLine && (
        <div style={{ fontSize: 12, color: C.textSecondary, lineHeight: 1.4 }}>
          {metaLine}
        </div>
      )}
    </div>
  );
}

// === src/ui/sessions/SessionDetailView.jsx ===
// SessionDetailView — Session 詳細画面 (DESIGN_SYSTEM §8.5.10 / ROADMAP S10)
// 役割:
//   - slide-in 250ms / slide-out 200ms overlay (position:fixed で親 SessionsTab を unmount しない → scrollTop 保持 §N1.2)
//   - Header (戻る + 画面名 + 日付), Body (type で TournamentDetail/PracticeDetail/TrialDetail 分岐), Action bar
//   - Claude コピー (§F8.1): formatXxxForClaude → copyToClipboard → toast
//   - 削除: 親 onDelete(type, session) 経由 (確認ダイアログ + Firestore 書き込みは親責務)
//   - 編集: onEdit があれば呼び出し、なければ placeholder toast
// 共通 helper (_dv...) は関数宣言で巻き上げ、TournamentDetail/PracticeDetail/TrialDetail から参照

// ── 共通 helper (純関数) ────────────────────────
function _dvScColor(v) {
  const n = Number(v) || 0;
  if (n >= 4) return C.practiceAccent;  // 緑
  if (n >= 3) return C.warning;          // 黄
  return C.error;                        // 赤
}

function _dvFmtTension(main, cross) {
  const m = main ? String(main).trim() : "";
  const c = cross ? String(cross).trim() : "";
  if (m && c && m !== c) return `${m} / ${c} lbs`;
  if (m) return `${m} lbs`;
  if (c) return `${c} lbs`;
  return "";
}

function _dvParseMin(s) {
  if (!s) return 0;
  const pp = String(s).split(":");
  return (parseInt(pp[0], 10) || 0) + (parseInt(pp[1], 10) || 0) / 60;
}

function _dvZoneTotalMin(zones) {
  return zones.reduce((sum, z) => sum + _dvParseMin(z.val), 0);
}

// ── Badge mapping helper ───────────────────────
function _dvTournamentResultBadgeProps(result) {
  if (!result) return null;
  const map = {
    "優勝":     { variant: "tournament", icon: "trophy", label: "優勝" },
    "準優勝":   { variant: "info",       icon: "medal",  label: "準優勝" },
    "3位":      { variant: "bronze",     icon: "award",  label: "3位" },
    "ベスト8":   { variant: "warning", label: "ベスト8" },
    "ベスト16":  { variant: "warning", label: "ベスト16" },
    "予選突破": { variant: "success", label: "予選突破" },
    "敗退":     { variant: "error",   label: "敗退" },
    "予選敗退": { variant: "error",   label: "予選敗退" },
  };
  return map[result] || { variant: "default", label: result };
}

function _dvTournamentTypeBadgeProps(t) {
  if (!t) return null;
  const map = {
    "singles": { variant: "tournament", icon: "user",  label: "シングルス" },
    "doubles": { variant: "tournament", icon: "users", label: "ダブルス" },
    "mixed":   { variant: "tournament", icon: "users", label: "ミックス" },
  };
  return map[t] || null;
}

function _dvTrialJudgmentBadgeProps(judgment) {
  if (!judgment) return null;
  const map = {
    "採用候補": { variant: "success", icon: "badge-check", label: "採用候補" },
    "保留":     { variant: "warning", label: "保留" },
    "却下":     { variant: "error",   label: "却下" },
  };
  return map[judgment] || { variant: "default", label: judgment };
}

function _dvPracticeTypeBadgeProps(t) {
  if (!t) return null;
  const iconMap = {
    "スクール":   "graduation-cap",
    "自主練":     "person-standing",
    "練習会":     "users",
    "ゲーム練習": "swords",
    "球出し":     "target",
    "練習試合":   "trophy",
    "フィジカル": "dumbbell",
  };
  return { variant: "practice", icon: iconMap[t], label: t };
}

function _dvTournamentHighlight(result) {
  const map = { "優勝": "gold", "準優勝": "silver", "3位": "bronze" };
  return map[result] || null;
}

// ── 共通 UI component ──────────────────────────
function _dvSection({ title, titleRight, variant, children, style }) {
  const bg = variant === "gold"   ? C.tournamentLight
           : variant === "silver" ? C.primaryLight
           : variant === "bronze" ? C.trialLight
           : C.panel;
  const border = variant === "gold"   ? `1.5px solid ${C.tournamentAccent}`
               : variant === "silver" ? `1.5px solid ${C.primary}`
               : variant === "bronze" ? `1.5px solid ${C.trialAccent}`
               : `1px solid ${C.divider}`;
  return (
    <div style={{ background: bg, border, borderRadius: 12, padding: 14, marginBottom: 12, ...(style || {}) }}>
      {(title || titleRight) && (
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 10 }}>
          {title && <div style={{ fontSize: 11, color: C.textMuted, fontWeight: 600, letterSpacing: 0.5, textTransform: "uppercase" }}>{title}</div>}
          {titleRight}
        </div>
      )}
      {children}
    </div>
  );
}

function _dvInfoCell({ label, value }) {
  return (
    <div style={{ background: C.bg, borderRadius: 8, padding: "8px 10px", minHeight: 48, display: "flex", flexDirection: "column", justifyContent: "center" }}>
      <div style={{ fontSize: 10, color: C.textSecondary, marginBottom: 3 }}>{label}</div>
      <div style={{ fontSize: 13, color: C.text, fontWeight: 500, lineHeight: 1.3, wordBreak: "break-all" }}>

      </div>

function _dvRatingRow({ label, sub, value }) {
  const v = Number(value) || 0;
  const c = _dvScColor(v);
  return (
    <div style={{ display: "grid", gridTemplateColumns: "100px 1fr 24px", gap: 10, alignItems: "center", marginBottom: 6, fontSize: 12 }}>
      <div style={{ color: C.text, fontWeight: 500 }}>
        {label}
        {sub && <span style={{ fontSize: 10, color: C.textMuted, marginLeft: 4, fontWeight: 400 }}>{sub}</span>}
      </div>
      <div style={{ background: C.divider, borderRadius: 4, height: 10, overflow: "hidden" }}>

      <span style={{ fontSize: 12, fontWeight: 700, textAlign: "right", fontVariantNumeric: "tabular-nums", color: c }}>{v || "—"}</span>
    </div>

}

function _dvLinkCard({ kind, title, meta, onClick }) {
  const bg = kind === "trial" ? C.trialLight : C.practiceLight;
  const borderCol = kind === "trial" ? "rgba(147,52,224,0.35)" : "rgba(15,157,88,0.35)";
  const iconColor = kind === "trial" ? C.trialAccent : C.practiceAccent;
  const iconName = kind === "trial" ? "badge-check" : "person-standing";
  return (
    <div
      onClick={onClick || undefined}
      role={onClick ? "button" : undefined}
      tabIndex={onClick ? 0 : undefined}
      onKeyDown={onClick ? (e) => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); onClick(e); } } : undefined}
      style={{
        background: bg, border: `1px solid ${borderCol}`, borderRadius: 10,
        padding: "10px 12px", display: "flex", alignItems: "center", gap: 10,
        cursor: onClick ? "pointer" : "default", minHeight: 44,
        transition: "background 150ms ease-out",
      }}
    >
      <Icon name={iconName} size={20} color={iconColor} />
      <div style={{ flex: 1 }}>
        <div style={{ fontSize: 13, fontWeight: 600, color: C.text, marginBottom: 2, wordBreak: "break-all" }}>{title}</div>
        <div style={{ fontSize: 11, color: C.textSecondary }}>{meta}</div>
      </div>
      {onClick && <Icon name="chevron-right" size={16} color={C.textMuted} />}
    </div>
  );

// ── メインコンポーネント ────────────────────────
// S11: mode prop で Detail (既定) と Edit (編集モード) を切替。
//      Edit モード時は SessionEditView で置換し、slide-in overlay は維持 (再 mount せず scrollTop 保持)
function SessionDetailView({ type, session, mode = "detail", tournaments, trials, practices, racketNames, stringNames, venueNames, opponentNames, levelNames, onClose, onEdit, onEditCancel, onSave, onDelete, onMerge, onCreateCard, onOpenLinkedSession, toast, confirm }) {
  const [visible, setVisible] = useState(false);
  const [closing, setClosing] = useState(false);
  // リク 30-a: 大会詳細から直接「+ 試合を追加」する用の Match Modal state
  //   { match: blankMatch+defaults } | null
  const [addMatchState, setAddMatchState] = useState(null);
  const reduced = typeof window !== "undefined" && window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  // リク 30-a: 履歴セット picker 用 (TournamentEditForm と同じロジック)
  const recentSetups = useMemo(
    () => _computeRecentSetups(tournaments, practices, trials),
    [tournaments, practices, trials]
  );

  // enter アニメ: mount 後 1 frame で translateX(100%) → translateX(0)
  useEffect(() => {
    if (reduced) { setVisible(true); return; }
    const id = requestAnimationFrame(() => setVisible(true));
    return () => cancelAnimationFrame(id);
  }, [reduced]);

  const handleClose = useCallback(() => {
    if (reduced) { onClose && onClose(); return; }
    setClosing(true);
    setTimeout(() => { onClose && onClose(); }, 200);
  }, [onClose, reduced]);

  // Esc で閉じる (キーボード操作 §N1a.4)
  useEffect(() => {
    const onKey = (e) => { if (e.key === "Escape") handleClose(); };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [handleClose]);

  // S13: 自作スワイプを削除。ブラウザの左端スワイプ (popstate) を app.jsx で受けて閉じる
  // → iOS Safari OS レベルのスワイプ動作と競合しなくなる

  const handleClaudeCopy = async () => {
    let text = "";
    if (type === "tournament")    text = formatTournamentAllForClaude(session);
    else if (type === "practice") text = formatPracticeForClaude(session);
    else if (type === "trial")    text = formatTrialForClaude(session);
    const ok = await copyToClipboard(text);
    if (ok) toast.show("Claude 用にコピーしました", "success");
    else toast.show("コピーに失敗しました", "error");
  };

  const handleDeleteClick = () => {
    if (onDelete) onDelete(type, session);
  };

  const handleEditClick = () => {
    if (onEdit) onEdit(type, session);
    else toast.show("編集ハンドラ未接続", "warning");
  };

  const handleMergeClick = () => {
    if (onMerge) onMerge(type, session);
    else toast.show("マージハンドラ未接続", "warning");
  };

  // リク 30-a: 詳細画面の「+ 試合を追加」ボタンから直接 MatchEditModal を開く
  //   blankMatch のデフォルト = 直前の試合 (あれば)、無ければ大会レベル機材
  const handleAddMatchClick = useCallback(() => {
    if (type !== "tournament" || !session) return;
    const matches = Array.isArray(session.matches) ? session.matches : [];
    const lastMatch = matches.length > 0 ? matches[matches.length - 1] : null;
    setAddMatchState({ match: blankMatch(matches.length, lastMatch || session) });
  }, [type, session]);

  // 保存: session.matches に append → 親 onSave で永続化、モーダル閉じる (詳細画面はそのまま残す)
  const handleAddMatchSave = useCallback((newMatch) => {
    if (!session) return;
    const updated = { ...session, matches: [...(Array.isArray(session.matches) ? session.matches : []), newMatch] };
    if (onSave) onSave(type, updated);
    setAddMatchState(null);
  }, [session, type, onSave]);

  // linked セッション算出
  const linkedTrials = (type === "practice" && session)
    ? (trials || []).filter(tr => tr.linkedPracticeId === session.id)
    : [];
  const linkedPractice = (type === "trial" && session && session.linkedPracticeId)
    ? (practices || []).find(p => p.id === session.linkedPracticeId)
    : null;

  const stripColor = type === "tournament" ? C.tournamentAccent
                   : type === "practice"   ? C.practiceAccent
                   : type === "trial"      ? C.trialAccent
                   : C.border;
  const screenTitle = type === "tournament" ? "大会詳細"
                    : type === "practice"   ? "練習詳細"
                    : type === "trial"      ? "試打詳細"
                    : "詳細";

  const slideTransform = (closing || !visible) ? "translateX(100%)" : "translateX(0)";
  const transitionStyle = reduced ? "none" : `transform ${closing ? 200 : 250}ms cubic-bezier(0.4,0,0.2,1)`;

  // S11: Edit モード時は overlay 内を SessionEditView で置換 (slide-in 共有、再 mount しない)
  if (mode === "edit") {
    return (
      <div
        role="dialog"
        aria-label={screenTitle + " (編集)"}
        style={{
          position: "fixed", inset: 0, background: C.bg, zIndex: 100,
          display: "flex", flexDirection: "column",
          transform: slideTransform, transition: transitionStyle,
        }}
      >
        <SessionEditView
          type={type}
          session={session}
          practices={practices}
          tournaments={tournaments}
          trials={trials}
          racketNames={racketNames}
          stringNames={stringNames}
          venueNames={venueNames}
          opponentNames={opponentNames}
          levelNames={levelNames}
          onCancel={onEditCancel}
          onSave={(updated) => onSave && onSave(type, updated)}
          confirm={confirm}
          toast={toast}
        />
      </div>
    );
  }

  return (
    <div
      role="dialog"
      aria-label={screenTitle}
      style={{
        position: "fixed", inset: 0, background: C.bg, zIndex: 100,
        display: "flex", flexDirection: "column",
        transform: slideTransform, transition: transitionStyle,
      }}
    >
      {/* 左端 3px 色帯 */}
      <div style={{ position: "absolute", left: 0, top: 56, bottom: 64, width: 3, background: stripColor, zIndex: 2, pointerEvents: "none" }} />

      {/* Header */}
      <div style={{ height: 56, flex: "0 0 56px", display: "flex", alignItems: "center", gap: 8, padding: "0 12px", background: C.panel, borderBottom: `1px solid ${C.divider}` }}>
        <button
          onClick={handleClose}
          aria-label="戻る"
          style={{ width: 44, height: 44, display: "flex", alignItems: "center", justifyContent: "center", background: "transparent", border: "none", cursor: "pointer", borderRadius: 8, color: C.text }}
        >
          <Icon name="arrow-left" size={24} ariaLabel="戻る" />
        </button>
        <div style={{ flex: 1, fontSize: 16, fontWeight: 600, color: C.text }}>
          {screenTitle}
          {session?.date && <span style={{ fontSize: 12, color: C.textSecondary, fontWeight: 400, marginLeft: 8 }}>{fmtDate(session.date)}</span>}
        </div>
      </div>

      {/* Body (scrollable) */}
      <div style={{ flex: 1, overflowY: "auto", padding: 16 }}>
        {type === "tournament" && (
          <TournamentDetail
            session={session}
            onMatchClick={() => toast.show("試合詳細は次 Stage で実装予定", "info")}
            onAddMatch={handleAddMatchClick}
          />
        )}
        {type === "practice" && (
          <PracticeDetail
            session={session}
            linkedTrials={linkedTrials}
            onLinkedTrialClick={(tr) => onOpenLinkedSession && onOpenLinkedSession("trial", tr)}
          />
        )}
        {type === "trial" && (
          <TrialDetail
            session={session}
            linkedPractice={linkedPractice}
            onLinkedPracticeClick={(pp) => onOpenLinkedSession && onOpenLinkedSession("practice", pp)}
            onCreateCard={onCreateCard ? () => onCreateCard(session) : null}
          />
        )}
      </div>

      {/* Action bar (S15 で 3 → 4 ボタン化: 編集 / マージ / Claude / 削除、危険度の昇順) */}
      <div style={{ flex: "0 0 64px", background: C.panel, borderTop: `1px solid ${C.divider}`, display: "flex", alignItems: "center", gap: 6, padding: "10px 12px" }}>
        <button
          onClick={handleEditClick}
          style={{ flex: 1, display: "inline-flex", alignItems: "center", justifyContent: "center", gap: 4, minHeight: 44, padding: "10px 6px", borderRadius: 8, border: `1px solid ${C.border}`, background: C.panel, color: C.text, fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}
        >
          <Icon name="pencil" size={16} /> 編集
        </button>
        <button
          onClick={handleMergeClick}
          style={{ flex: 1, display: "inline-flex", alignItems: "center", justifyContent: "center", gap: 4, minHeight: 44, padding: "10px 6px", borderRadius: 8, border: `1px solid ${C.border}`, background: C.panel, color: C.text, fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}
        >
          <Icon name="git-merge" size={16} /> マージ
        </button>
        <button
          onClick={handleClaudeCopy}
          aria-label={type === "tournament" ? "Claudeに全試合をコピー" : "Claudeにコピー"}
          style={{ display: "inline-flex", alignItems: "center", justifyContent: "center", minHeight: 44, minWidth: 44, padding: "10px 12px", borderRadius: 8, border: `1px solid rgba(147,52,224,0.5)`, background: C.trialLight, color: C.trialAccent, fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}
        >
          <Icon name="clipboard-copy" size={18} ariaLabel={type === "tournament" ? "Claudeに全試合をコピー" : "Claudeにコピー"} />
        </button>
        <button
          onClick={handleDeleteClick}
          aria-label="削除"
          style={{ display: "inline-flex", alignItems: "center", justifyContent: "center", minHeight: 44, minWidth: 44, padding: "10px 12px", borderRadius: 8, border: `1px solid rgba(217,48,37,0.5)`, background: C.errorLight, color: C.error, fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}
        >
          <Icon name="trash-2" size={18} ariaLabel="削除" />
        </button>
      </div>

      {/* リク 30-a: 詳細画面から直接「+ 試合を追加」する用の MatchEditModal */}
      {addMatchState && type === "tournament" && (
        <MatchEditModal
          open={true}
          match={addMatchState.match}
          trnType={session?.type}
          tournament={session}
          racketNames={racketNames}
          stringNames={stringNames}
          opponentNames={opponentNames}
          recentSetups={recentSetups}
          confirm={confirm}
          onSave={handleAddMatchSave}
          onClose={() => setAddMatchState(null)}
        />
      )}
    </div>
  );
}

// === src/ui/sessions/SessionEditView.jsx ===
// SessionEditView — 全画面編集モード (大会/練習/試打)
//
// 役割:
//   - SessionDetailView と同じ overlay 内で表示 (再 mount せず、Detail ↔ Edit toggle)
//   - Header: 戻る (未保存時は ConfirmDialog) / タイトル / 保存ボタン (必須未入力で disabled)
//   - Body: type に応じて TournamentEditForm / PracticeEditForm / TrialEditForm
//   - 必須バリデーション: SCHEMA REQUIRED_FIELDS 駆動 (validation.js)
//   - S15.5.9: localStorage 下書き auto-save (Safari 破棄 / 戻る誤操作からの救済)
//
// props:
//   type: "tournament" | "practice" | "trial"
//   session: 編集対象 (=initial form)
//   practices, tournaments: 試打の linkedXxx 候補生成用
//   trials: 大会編集 match 削除時の cascade 件数プレビュー用 (S13)
//   onCancel(): 編集破棄して Detail に戻る (= 親が detail mode に戻す)
//   onSave(updated): 保存ボタン (親が Firestore + state 更新)
//   confirm: useConfirm() ({ ask })
//   toast: useToast() ({ show })

// S15.5.9: 編集中の form を localStorage に下書き保存。type と id でユニーク。
const _sessionDraftKey = (type, id) => `${LS_PREFIX}session-draft-${type}-${id}-v1`;
const _loadSessionDraft = (type, id) => {
  if (!type || !id) return null;
  try {
    const v = localStorage.getItem(_sessionDraftKey(type, id));
    if (!v) return null;
    return JSON.parse(v);
  } catch (_) { return null; }
};
const _saveSessionDraft = (type, id, form) => {
  if (!type || !id) return;
  try { localStorage.setItem(_sessionDraftKey(type, id), JSON.stringify(form)); }
  catch (_) {}
};
const _clearSessionDraft = (type, id) => {
  if (!type || !id) return;
  try { localStorage.removeItem(_sessionDraftKey(type, id)); } catch (_) {}
};

function SessionEditView({ type, session, practices, tournaments, trials, racketNames, stringNames, venueNames, opponentNames, levelNames, onCancel, onSave, confirm, toast }) {
  // S15.5.9: 起動時に下書きがあれば優先 (Safari 破棄 / 戻る誤操作からの復元)
  const [form, setForm] = useState(() => {
    if (!session?.id) return { ...session };
    const draft = _loadSessionDraft(type, session.id);
    return draft || { ...session };
  });
  const [dirty, setDirty] = useState(() => session?.id ? _loadSessionDraft(type, session.id) !== null : false);
  const [restored, setRestored] = useState(() => session?.id ? _loadSessionDraft(type, session.id) !== null : false);

  // session id 変化時 (別セッションの編集に切替) は state リセット (下書き優先)
  useEffect(() => {
    if (!session?.id) return;
    const draft = _loadSessionDraft(type, session.id);
    if (draft) {
      setForm(draft);
      setDirty(true);
      setRestored(true);
    } else {
      setForm({ ...session });
      setDirty(false);
      setRestored(false);
    }
  }, [session?.id, type]);

  // S15.5.9: form 変化のたびに auto-save (dirty な間のみ)
  useEffect(() => {
    if (!form?.id || !dirty) return;
    _saveSessionDraft(type, form.id, form);
  }, [type, form, dirty]);

  const handleChange = (newForm) => {
    setForm(newForm);
    setDirty(true);
  };

  const errors = getRequiredErrors(type, form);
  const valid = Object.keys(errors).length === 0;

  // 戻るタップ: 未保存変更があれば確認 (S15.5.9: 確定で下書きクリア)
  // H-16 (Phase A 監査): useCallback で安定化、deps を完全宣言
  const handleBack = useCallback(() => {
    const clearDraft = () => { if (form?.id) _clearSessionDraft(type, form.id); };
    if (!dirty) { clearDraft(); onCancel && onCancel(); return; }
    confirm.ask(
      "編集内容が保存されていません。破棄してよろしいですか？",
      () => { clearDraft(); onCancel && onCancel(); },
      { title: "未保存の変更があります", yesLabel: "破棄する", noLabel: "編集に戻る", yesVariant: "danger", icon: "triangle-alert" }
    );
  }, [dirty, form?.id, type, onCancel, confirm]);

  // Esc で戻る (CLAUDE.md §N1a.4)
  // H-16: deps に handleBack を入れて lint exhaustive-deps 違反を解消
  useEffect(() => {
    const handler = (e) => { if (e.key === "Escape") handleBack(); };
    document.addEventListener("keydown", handler);
    return () => document.removeEventListener("keydown", handler);
  }, [handleBack]);

  const handleSaveClick = () => {
    if (!valid) {
      toast.show("必須項目が未入力です", "warning");
      return;
    }
    // S15.5.9: 保存確定で下書きクリア
    if (form?.id) _clearSessionDraft(type, form.id);
    onSave && onSave(form);
  };

  const screenTitle = type === "tournament" ? "大会を編集" : type === "practice" ? "練習を編集" : "試打を編集";
  const stripColor = type === "tournament" ? C.tournamentAccent : type === "practice" ? C.practiceAccent : C.trialAccent;

  return (
    <div style={{ position: "absolute", inset: 0, background: C.bg, display: "flex", flexDirection: "column", zIndex: 1 }}>
      {/* 左端 3px 色帯 (Detail と同じ) */}
      <div style={{ position: "absolute", left: 0, top: 56, bottom: 0, width: 3, background: stripColor, zIndex: 2, pointerEvents: "none" }} />

      {/* Header */}
      <div style={{ height: 56, flex: "0 0 56px", display: "flex", alignItems: "center", gap: 8, padding: "0 8px", background: C.panel, borderBottom: `1px solid ${C.divider}` }}>
        <button
          onClick={handleBack}
          aria-label="戻る (編集を破棄)"
          style={{ width: 44, height: 44, display: "flex", alignItems: "center", justifyContent: "center", background: "transparent", border: "none", cursor: "pointer", borderRadius: 8, color: C.text }}
        >
          <Icon name="arrow-left" size={24} ariaLabel="戻る" />
        </button>
        <div style={{ flex: 1, fontSize: 16, fontWeight: 600, color: C.text }}>
          {screenTitle}
          {form.date && <span style={{ fontSize: 11, color: C.textSecondary, fontWeight: 400, marginLeft: 8 }}>{fmtDate(form.date)}</span>}
        </div>
        <button
          onClick={handleSaveClick}
          aria-label="保存"
          disabled={!valid}
          title={valid ? "保存" : "必須項目が未入力です"}
          style={{
            width: 44, height: 44, display: "flex", alignItems: "center", justifyContent: "center",
            background: "transparent", border: "none", borderRadius: 8,
            color: valid ? C.primary : C.textMuted,
            cursor: valid ? "pointer" : "not-allowed",
          }}
        >
          <Icon name="save" size={24} color={valid ? C.primary : C.textMuted} />
        </button>
      </div>

      {/* S15.5.9: 下書き復元バナー (Safari 破棄 / 戻る誤操作後の再開時) */}
      {restored && (
        <div style={{
          background: C.warningLight, color: "#7e5d00",
          borderBottom: `1px solid ${C.warning}`,
          padding: "10px 14px",
          fontSize: 12, lineHeight: 1.5,
          display: "flex", alignItems: "flex-start", gap: 8,
        }}>
          <Icon name="info" size={14} color="#7e5d00" style={{ flexShrink: 0, marginTop: 2 }} />
          <div style={{ flex: 1 }}>
            <b>下書きを復元しました</b><br />
            前回の編集が保存されずに中断された内容です。続けるか、不要なら「戻る → 破棄する」で破棄してください。
          </div>
          <button
            onClick={() => setRestored(false)}
            aria-label="この通知を閉じる"
            style={{
              background: "none", border: "none", color: "#7e5d00",
              cursor: "pointer", padding: 2, flexShrink: 0,
            }}
          >
            <Icon name="x" size={14} color="#7e5d00" />
          </button>
        </div>
      )}

      {/* Body (scrollable) */}
      <div style={{ flex: 1, overflowY: "auto", padding: "14px 14px 80px" }}>
        {type === "tournament" && (
          <TournamentEditForm
            form={form} errors={errors} onChange={handleChange}
            racketNames={racketNames} stringNames={stringNames} venueNames={venueNames} opponentNames={opponentNames} levelNames={levelNames}
            trials={trials} tournaments={tournaments} practices={practices}
            confirm={confirm} toast={toast}
          />
        )}
        {type === "practice" && (
          <PracticeEditForm
            form={form} errors={errors} onChange={handleChange}
            racketNames={racketNames} stringNames={stringNames} venueNames={venueNames}
            opponentNames={opponentNames}
            tournaments={tournaments} practices={practices} trials={trials}
            confirm={confirm}
          />
        )}
        {type === "trial" && (
          <TrialEditForm
            form={form} errors={errors} onChange={handleChange}
            practices={practices} tournaments={tournaments} trials={trials}
            racketNames={racketNames} stringNames={stringNames} venueNames={venueNames}
          />
        )}
      </div>

      {/* 下部アクションバー (スマホで親指届く位置に保存・戻るを配置) */}
      <div style={{
        flex: "0 0 64px", height: 64,
        display: "flex", alignItems: "center", gap: 10, padding: "0 14px",
        background: C.panel, borderTop: `1px solid ${C.divider}`,
        boxShadow: "0 -2px 8px rgba(0,0,0,0.04)",
      }}>
        <button
          onClick={handleBack}
          aria-label="戻る (編集を破棄)"
          style={{
            flex: "0 0 96px", minHeight: 44, padding: "0 14px",
            background: C.panel, border: `1px solid ${C.border}`, borderRadius: 8,
            color: C.text, fontSize: 14, fontWeight: 600, cursor: "pointer", fontFamily: font,
            display: "flex", alignItems: "center", justifyContent: "center", gap: 4,
          }}
        >
          <Icon name="arrow-left" size={16} />
          戻る
        </button>
        <button
          onClick={handleSaveClick}
          aria-label="保存"
          disabled={!valid}
          title={valid ? "保存" : "必須項目が未入力です"}
          style={{
            flex: 1, minHeight: 44, padding: "0 14px",
            background: valid ? C.primary : C.panel2,
            border: `1px solid ${valid ? C.primary : C.border}`, borderRadius: 8,
            color: valid ? "#fff" : C.textMuted,
            fontSize: 15, fontWeight: 700,
            cursor: valid ? "pointer" : "not-allowed", fontFamily: font,
            display: "flex", alignItems: "center", justifyContent: "center", gap: 6,
          }}
        >
          <Icon name="save" size={18} color={valid ? "#fff" : C.textMuted} />
          保存
        </button>
      </div>
    </div>
  );
}

// ── 時間軸密度化ヘルパー (カレンダー通りの日曜始まり)
const _getSundayOfWeek = (d) => {
  const x = new Date(d);
  const day = x.getDay(); // 0=Sun, 6=Sat
  x.setDate(x.getDate() - day); // 同じ週の日曜へ
  x.setHours(0, 0, 0, 0);
  return x;
};
const _toDateISO = (d) => `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;

const _weekLabel = (weekStartISO, now) => {
  const start = new Date(weekStartISO + "T00:00:00");
  const end = new Date(start); end.setDate(end.getDate() + 6);
  const currentWeekStart = _getSundayOfWeek(now);
  const dayDiff = Math.round((currentWeekStart - start) / (1000 * 60 * 60 * 24));
  const weekOffset = Math.round(dayDiff / 7);
  const range = `${start.getMonth() + 1}/${start.getDate()}-${end.getMonth() + 1}/${end.getDate()}`;
  if (weekOffset === 0)  return `今週 (${range})`;
  if (weekOffset === 1)  return `先週 (${range})`;
  if (weekOffset === -1) return `来週 (${range})`;
  return range;
};
const _monthLabel = (key) => {
  const m = key.match(/^(\d{4})-(\d{2})$/);
  return m ? `${m[1]}年${Number(m[2])}月` : key;
};
const _yearLabel = (key) => `${key}年`;

// ── 大会の形式 (singles/doubles/mixed) → カテゴリーバッジ
// v3 line 2746-2747, 2764 から移植 (S6 で漏れていた)。練習の種別バッジと対称に「③ 何の種類」を伝える。
// 色は v4 DESIGN_SYSTEM §1.2 準拠の tournament variant (オレンジ系) で統一、区別はアイコンで。
const _mapTournamentType = (t) => {
  if (!t) return null;
  const map = {
    "singles": { variant: "tournament", icon: "user",  label: "シングルス" },
    "doubles": { variant: "tournament", icon: "users", label: "ダブルス" },
    "mixed":   { variant: "tournament", icon: "users", label: "ミックス" },
  };
  return map[t] || null;
};

// ── 結果 → Badge + highlight マッピング (大会のみ)
const _mapTournamentResult = (result) => {
  if (!result) return { badge: null, highlight: null };
  const map = {
    "優勝":     { badge: { variant: "tournament", icon: "trophy", label: "優勝" },   highlight: "gold" },
    "準優勝":   { badge: { variant: "info",       icon: "medal",  label: "準優勝" }, highlight: "silver" },
    "3位":      { badge: { variant: "bronze",     icon: "award",  label: "3位" },    highlight: "bronze" },
    "ベスト8":   { badge: { variant: "warning", label: "ベスト8" },   highlight: null },
    "ベスト16":  { badge: { variant: "warning", label: "ベスト16" },  highlight: null },
    "予選突破": { badge: { variant: "success", label: "予選突破" }, highlight: null },
    "敗退":     { badge: { variant: "error",   label: "敗退" },     highlight: null },
    "予選敗退": { badge: { variant: "error",   label: "予選敗退" }, highlight: null },
  };
  return map[result] || { badge: { variant: "default", label: result }, highlight: null };
};

// ── 試打 judgment → sideBadge マッピング (S6 残置、将来の試打一覧で再利用予定)
const _mapTrialJudgment = (judgment) => {
  if (!judgment) return null;
  const map = {
    "採用候補": { variant: "success", icon: "badge-check", label: "採用候補" },
    "保留":     { variant: "warning", label: "保留" },
    "却下":     { variant: "error",   label: "却下" },
  };
  return map[judgment] || { variant: "trial", label: judgment };
};

// ── 練習 type → カテゴリーバッジ (「③ 何の種類」の役割を担う)
// 左の緑帯でカテゴリーは「練習」と分かるが、どの種別 (スクール/自主練/練習試合 等) かは
// バッジで明示しないと 800 件のスクロール中に視線が情報を掴めない。
// S8.5: マップ未登録の type (v2 Apple Watch import 等でカテゴリ未指定の generic "練習" 等) は
//       null 返却してバッジ抑制。左の緑帯だけで「これは練習」は伝わるので情報重複を避ける。
const _PRACTICE_TYPE_ICONS = {
  "スクール":   "graduation-cap",
  "自主練":     "person-standing",
  "練習会":     "users",
  "ゲーム練習": "swords",
  "球出し":     "target",
  "練習試合":   "trophy",
  "フィジカル": "dumbbell",
};
const _mapPracticeType = (t) => {
  if (!t) return null;
  if (!(t in _PRACTICE_TYPE_ICONS)) return null;
  return { variant: "practice", icon: _PRACTICE_TYPE_ICONS[t], label: t };
};

const _joinMeta = (parts) => parts.filter(x => x).join(" / ");

// ── 1 件を SessionCard props に変換
const _buildCardProps = (type, item) => {
  if (type === "tournament") {
    const typeBadge = _mapTournamentType(item.type);  // 形式 (S/D/Mix) を category badge に
    const { badge, highlight } = _mapTournamentResult(item.overallResult);
    const matches = Array.isArray(item.matches) ? item.matches : [];
    // H-9 (Phase A 監査): _normalizeMatchResult で表記揺れ吸収
    const wins = matches.filter(m => _normalizeMatchResult(m.result) === "win").length;
    const losses = matches.filter(m => _normalizeMatchResult(m.result) === "loss").length;
    const parts = [];
    // 形式 (singles/doubles/mixed) は category badge に出すので meta からは除外
    if (matches.length > 0) parts.push(`${wins}勝${losses}敗`);
    if (item.startTime) parts.push(item.startTime);   // 開始時刻 (「いつやるか」は一次情報)
    if (item.venue) parts.push(item.venue);
    return {
      type, date: item.date,
      title: item.name || "(無題の大会)",
      metaLine: _joinMeta(parts),
      highlight,
      sideBadge: typeBadge,
      resultBadge: badge,
    };
  }
  if (type === "practice") {
    const typeBadge = _mapPracticeType(item.type);
    const parts = [];
    // 時間帯 (start-end) は「いつやるか」の一次情報、meta 先頭に出す (v3 line 2788 相当)
    if (item.startTime) {
      parts.push(item.endTime ? `${item.startTime}-${item.endTime}` : item.startTime);
    }
    if (item.duration) parts.push(`${item.duration}分`);
    if (item.heartRateAvg) parts.push(`心拍${item.heartRateAvg}`);
    if (item.venue && item.title !== item.venue) parts.push(item.venue);
    return {
      type, date: item.date,
      title: item.title || item.venue || "(無題の練習)",
      metaLine: _joinMeta(parts),
      sideBadge: typeBadge,
    };
  }
  // S11 暫定 (S16 まで): 試打を独立カードとして表示 (種類フィルタで明示選択時のみ呼ばれる)
  // S16 (Gear タブ完成) で削除予定
  if (type === "trial") {
    const judgmentBadge = _mapTrialJudgment(item.judgment);
    const ratings = ["spin", "power", "control", "info", "maneuver", "swingThrough"]
      .map(k => Number(item[k]) || 0).filter(v => v > 0);
    const avg = ratings.length > 0 ? (ratings.reduce((s, v) => s + v, 0) / ratings.length).toFixed(1) : null;
    const parts = [];
    if (item.spin)   parts.push(`スピン${item.spin}`);
    if (item.power)  parts.push(`推進${item.power}`);
    if (avg)         parts.push(`平均 ${avg}`);
    if (item.venue)  parts.push(item.venue);
    const stringInfo = [item.stringMain, item.stringCross].filter(Boolean).join(" / ");
    return {
      type, date: item.date,
      title: item.racketName ? (stringInfo ? `${item.racketName} / ${stringInfo}` : item.racketName) : "(ラケット未選択)",
      metaLine: _joinMeta(parts),
      sideBadge: judgmentBadge,
    };
  }
  return { type, date: item.date, title: "" };
};

// ── 試打の紐付きを逆引き: tournament.id / practice.id ごとに「この日に試打あり」を示す Set
const _buildTrialLinkedSets = (tournaments, practices, trials) => {
  const linkedTournamentIds = new Set();
  const linkedPracticeIds = new Set();
  // tournament の match id → tournament id の逆引きマップ
  const matchToTournament = new Map();
  tournaments.forEach(t => {
    const matches = Array.isArray(t.matches) ? t.matches : [];
    matches.forEach(m => { if (m.id) matchToTournament.set(m.id, t.id); });
  });
  // H-2 (Phase A 監査): UX4 で linkedMatchIds[] (配列) を導入したが、ここは旧 linkedMatchId のみ参照していた。
  //   複数試合連携した試打のバッジが大会カードに出ないバグ。配列と旧単数を両対応する。
  trials.forEach(tr => {
    const ids = Array.isArray(tr.linkedMatchIds) && tr.linkedMatchIds.length > 0
      ? tr.linkedMatchIds
      : (tr.linkedMatchId ? [tr.linkedMatchId] : []);
    ids.forEach(mid => {
      const tId = matchToTournament.get(mid);
      if (tId) linkedTournamentIds.add(tId);
    });
    if (tr.linkedPracticeId) {
      linkedPracticeIds.add(tr.linkedPracticeId);
    }
  });
  return { linkedTournamentIds, linkedPracticeIds };
};

const TRIAL_BADGE = { variant: "trial", icon: "badge-check", label: "試打" };

// ── S7: 検索・絞り込み / S8: 表示モード ─────────────────────────────────
// H-24 (Phase A 監査): キー文字列を core/01_constants.js LS_UI_KEYS に集約。

const LS_SEARCH       = LS_UI_KEYS.sessionsSearch;

// S13.5 (2026-04-27): 検索欄の展開状態を localStorage に永続化。

};
const FILTER_AXES = ["type", "racket", "opponent", "result"];
const RESULT_OPTIONS = ["優勝","準優勝","3位","ベスト8","ベスト16","予選突破","敗退","予選敗退"];
// S16 完了 (Phase 4-C): 試打は機材タブ Recent Trials に集約済。記録タブの絞り込みからも削除。

const FILTER_CHIP_LABEL    = { type: "種類",        racket: "ラケット",        opponent: "対戦相手",        result: "結果" };
const FILTER_DRAWER_TITLE  = { type: "種類で絞り込む", racket: "ラケットで絞り込む", opponent: "対戦相手で絞り込む", result: "結果で絞り込む" };

const _emptyFilters = () => ({ type: [], racket: [], opponent: [], result: [] });
const _loadSearch = () => { try { return localStorage.getItem(LS_SEARCH) || ""; } catch { return ""; } };
const _loadSearchOpen = () => { try { return localStorage.getItem(LS_SEARCH_OPEN) === "true"; } catch { return false; } };
const _loadFilters = () => {

    const raw = localStorage.getItem(LS_FILTERS);
    if (!raw) return _emptyFilters();
    const obj = JSON.parse(raw);
    const base = _emptyFilters();
    FILTER_AXES.forEach(k => {
      if (Array.isArray(obj[k])) base[k] = obj[k].filter(v => typeof v === "string" && v.length > 0);
    });
