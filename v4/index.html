      </button>
      {hasError && (
        <div style={{ fontSize: 12, color: C.error, marginTop: 4 }}>{error}</div>
      )}
    </div>
  );
}

// ── _WheelSheet (Bottom sheet コンテナ、FilterDrawer 準拠) ────────────────────────
//   props: open, title, hint, onClose (背景タップ/ESC/✕/キャンセル), onConfirm (完了)
function _WheelSheet({ open, title, hint, onClose, onConfirm, children }) {
  const trapRef = useFocusTrap(open);
  // ESC = キャンセル
  useEffect(() => {
    if (!open) return;
    const h = (e) => { if (e.key === "Escape") onClose && onClose(); };
    document.addEventListener("keydown", h);
    return () => document.removeEventListener("keydown", h);
  }, [open, onClose]);
  if (!open) return null;
  return (
    <div
      role="dialog"
      aria-modal="true"
      aria-label={title || "ピッカー"}
      // 背景タップ = キャンセル (絶対 onConfirm 呼ばない)
      onClick={(e) => { if (e.target === e.currentTarget) onClose && onClose(); }}
      style={{
        position: "fixed", inset: 0,
        background: "rgba(0,0,0,0.4)",
        zIndex: 1300,
        display: "flex",
        alignItems: "flex-end",
        justifyContent: "center",
      }}
    >
      <div
        ref={trapRef}
        style={{
          background: "#fafafa", // panel-soft (v17 由来、浮かせ感)
          borderRadius: "16px 16px 0 0",
          width: "100%",
          maxWidth: 500,
          display: "flex",
          flexDirection: "column",
          animation: "drawerEnter 250ms ease-out",
        }}
      >
        {/* ドラッグハンドル (視覚のみ) */}
        <div style={{
          width: 40, height: 4,
          background: C.border, borderRadius: 2,
          margin: "8px auto 4px",
        }} />

        {/* ヘッダ */}
        <div style={{
          display: "flex", alignItems: "center",
          padding: "8px 8px 8px 16px",
          borderBottom: `1px solid ${C.divider}`,
        }}>
          <div style={{ flex: 1, fontSize: 15, fontWeight: 600, color: C.text }}>{title}</div>
          <button
            type="button"
            onClick={onClose}
            aria-label="閉じる"
            style={{
              width: 40, height: 40,
              display: "inline-flex", alignItems: "center", justifyContent: "center",
              border: "none", background: "transparent", cursor: "pointer",
              color: C.textSecondary, padding: 0, borderRadius: 8,
            }}
          >
            <Icon name="x" size={22} color={C.textSecondary} />
          </button>
        </div>

        {/* コンテンツ (Wheel 列) */}
        <div style={{ padding: "8px 16px 4px" }}>
          {children}
        </div>

        {/* ヒント */}
        {hint && (
          <div style={{
            fontSize: 11, color: C.textSecondary,
            textAlign: "center",
            padding: "6px 14px",
          }}>
            {hint}
          </div>
        )}

        {/* フッター: キャンセル + 完了 */}
        <div style={{
          display: "flex", gap: 8,
          padding: "10px 14px 14px",
          borderTop: `1px solid ${C.divider}`,
        }}>
          <button
            type="button"
            onClick={onClose}
            style={{
              flex: 1, minHeight: 44,
              border: `1px solid ${C.border}`, borderRadius: 8,
              background: C.panel, color: C.textSecondary,
              fontFamily: font, fontSize: 14, fontWeight: 500,
              cursor: "pointer",
            }}
          >
            キャンセル
          </button>
          <button
            type="button"
            onClick={onConfirm}
            style={{
              flex: 2, minHeight: 44,
              border: "none", borderRadius: 8,
              background: C.primary, color: "#fff",
              fontFamily: font, fontSize: 14, fontWeight: 600,
              cursor: "pointer",
              boxShadow: "0 1px 3px rgba(0,122,255,0.3)",
            }}
          >
            完了
          </button>
        </div>
      </div>
    </div>
  );
}

// ── _WheelColumn (scroll + snap + 3D 立体 depth) ────────────────────────
//   props: items [{value, label, preserved?}], value (current), onChange(newValue)
//   scroll-snap で各項目に snap、center は font-size 32px regular、周辺は rotateX/scale/blur で奥行
function _WheelColumn({ items, value, onChange }) {
  const ref = useRef(null);
  const tmRef = useRef(null);
  const initialIdx = useMemo(() => {
    const i = items.findIndex(it => String(it.value) === String(value));
    return i >= 0 ? i : 0;
  }, [items, value]);
  const [centerIdx, setCenterIdx] = useState(initialIdx);

  // 初期スクロール位置 (open のたびに value 位置へ)
  useEffect(() => {
    if (ref.current) {
      ref.current.scrollTop = initialIdx * _WHEEL_ITEM_H;
      setCenterIdx(initialIdx);
    }
  }, [initialIdx]);

  // スクロール中: centerIdx 更新 + 停止後 snap + 親通知
  const handleScroll = () => {
    const el = ref.current;
    if (!el) return;
    const idx = Math.round(el.scrollTop / _WHEEL_ITEM_H);
    const clamped = Math.max(0, Math.min(items.length - 1, idx));
    setCenterIdx(clamped);
    if (tmRef.current) clearTimeout(tmRef.current);
    tmRef.current = setTimeout(() => {
      const target = clamped * _WHEEL_ITEM_H;
      if (Math.abs(el.scrollTop - target) > 0.5) el.scrollTop = target;
      const newVal = items[clamped]?.value;
      if (newVal !== undefined && String(newVal) !== String(value)) {
        onChange(newVal);
      }
    }, 100);
  };

  // 距離別スタイル (v17 spec、F 案: center weight 400)
  const itemStyle = (dist, isPreserved) => {
    const base = {
      flex: `0 0 ${_WHEEL_ITEM_H}px`,
      lineHeight: `${_WHEEL_ITEM_H}px`,
      fontFamily: font,
      fontVariantNumeric: "tabular-nums",
      color: C.text,
      userSelect: "none",
      transformOrigin: "center",
      backfaceVisibility: "hidden",
      textAlign: "center",
      width: "100%",
      scrollSnapAlign: "center",
    };
    if (dist === 0) {
      // center: 拡大 + regular weight + 保持時オレンジ
      const c = {
        ...base,
        fontSize: _WHEEL_FONT_C,
        fontWeight: _WHEEL_WEIGHT, // F 案: 400
        opacity: 1,
      };
      if (isPreserved) {
        return {
          ...c,
          color: "#875700",
          background: "rgba(251,188,4,0.18)",
          borderRadius: 8,
        };
      }
      return c;
    }
    // 周辺: rotateX + scale + blur (上=正、下=負)
    const sign = dist < 0 ? 1 : -1; // 上にあるなら正回転
    const abs = Math.abs(dist);
    const map = {
      1: { opacity: 0.75, scale: 0.92, deg: 20, blur: 0.3 },
      2: { opacity: 0.45, scale: 0.82, deg: 40, blur: 0.7 },
      3: { opacity: 0.20, scale: 0.70, deg: 60, blur: 1.2 },
    };
    const m = map[abs];
    if (m) {
      return {
        ...base,
        fontSize: _WHEEL_FONT_E,
        fontWeight: 400,
        opacity: m.opacity,
        transform: `rotateX(${sign * m.deg}deg) scale(${m.scale})`,
        filter: `blur(${m.blur}px)`,
      };
    }
    // それ以遠は非表示 (mask-image でフェードするのでこれは保険)
    return { ...base, fontSize: _WHEEL_FONT_E, opacity: 0 };
  };

  return (
    <div
      ref={ref}
      onScroll={handleScroll}
      className="wheel-col-scroll"
      style={{
        height: _WHEEL_AREA_H,
        overflowY: "auto",
        overflowX: "hidden",
        scrollSnapType: "y mandatory",
        WebkitOverflowScrolling: "touch",
        WebkitMaskImage: "linear-gradient(to bottom, transparent 0%, #000 12%, #000 88%, transparent 100%)",
        maskImage: "linear-gradient(to bottom, transparent 0%, #000 12%, #000 88%, transparent 100%)",
        position: "relative",
        // 修正: perspective を outer (visible viewport) に移動 → 消失点を viewport 中心に固定
        //   旧: 長い inner div (5000px+) に付けていたので消失点がズレ、項目位置によって見え方が非対称になっていた
        perspective: "1000px",
        perspectiveOrigin: "50% 50%",
      }}
    >
      <div style={{
        paddingTop: _WHEEL_PAD,
        paddingBottom: _WHEEL_PAD,
        display: "flex",
        flexDirection: "column",
        alignItems: "center",
        transformStyle: "preserve-3d",
      }}>
        {items.map((item, i) => (
          <div key={`${item.value}-${i}`} style={itemStyle(i - centerIdx, item.preserved)}>
            {item.label}
          </div>
        ))}
      </div>
    </div>
  );
}

// ── _WheelColsContainer: 1 列 / 2 列共通の中央ガラス帯付きラッパー ────────────────────────
function _WheelColsContainer({ cols, children }) {
  return (
    <div style={{
      position: "relative",
      display: "grid",
      gridTemplateColumns: cols === 2 ? "1fr 1fr" : "1fr",
      gap: 0,
    }}>
      {children}
      {/* ガラス帯 (F 案 0.18) */}
      <div style={{
        position: "absolute",
        left: 8, right: 8,
        top: "calc(50% - 22px)",
        height: 44,
        background: _WHEEL_BAR_BG,
        borderRadius: 10,
        pointerEvents: "none",
        zIndex: 2,
      }} />
    </div>
  );
}

// ── TimeWheel (時 + 分、HH:MM) ────────────────────────
//   props: label, value (HH:MM or ""), onChange (HH:MM)
//   範囲外 hour / 非 5 分刻み min は option に追加して保持
function TimeWheel({ label, value, onChange, error, required }) {
  const [open, setOpen] = useState(false);
  const cur = (value || "").trim();

  // 元値をパース (NaN なら null)
  const [origH, origM] = useMemo(() => {
    const parts = cur.split(":");
    const hh = parseInt(parts[0], 10);
    const mm = parseInt(parts[1], 10);
    return [
      isNaN(hh) ? null : hh,
      isNaN(mm) ? null : mm,
    ];
  }, [cur]);

  // draft state — 開いたときに元値で初期化
  const [draftH, setDraftH] = useState(origH ?? 10);
  const [draftM, setDraftM] = useState(origM ?? 0);

  const handleOpen = () => {
    setDraftH(origH ?? 10);
    setDraftM(origM ?? 0);
    setOpen(true);
  };

  // option 配列 — 範囲外/非 5 分刻みの既存値は option に追加して保持 (preserved=true)
  const hourItems = useMemo(() => {
    const arr = [];
    for (let i = 0; i <= 23; i++) arr.push({ value: i, label: String(i) });
    if (origH !== null && origH !== undefined && (origH < 0 || origH > 23)) {
      arr.push({ value: origH, label: String(origH), preserved: true });
      arr.sort((a, b) => a.value - b.value);
    }
    return arr;
  }, [origH]);

  const minItems = useMemo(() => {
    const arr = [];
    for (let i = 0; i <= 55; i += 5) arr.push({ value: i, label: String(i).padStart(2, "0") });
    if (origM !== null && origM !== undefined && (origM < 0 || origM > 55 || origM % 5 !== 0)) {
      arr.push({ value: origM, label: String(origM).padStart(2, "0"), preserved: true });
      arr.sort((a, b) => a.value - b.value);
    }
    return arr;
  }, [origM]);

  // 完了: draft === original なら No-op
  const handleConfirm = () => {
    if (draftH === origH && draftM === origM) {
      setOpen(false);
      return;
    }
    const out = `${String(draftH).padStart(2, "0")}:${String(draftM).padStart(2, "0")}`;
    onChange(out);
    setOpen(false);
  };

  const display = cur;
  const isPreserved = origM !== null && origM !== undefined && origM % 5 !== 0;

  return (
    <>
      <_WheelButton label={label} displayValue={display} isPreserved={isPreserved} onClick={handleOpen} error={error} required={required} />
      <_WheelSheet
        open={open}
        title={label || "時刻"}
        hint="背景タップ = キャンセル / 触らず完了 = 値変更なし"
        onClose={() => setOpen(false)}
        onConfirm={handleConfirm}
      >
        <_WheelColsContainer cols={2}>
          <_WheelColumn items={hourItems} value={draftH} onChange={setDraftH} />
          <_WheelColumn items={minItems} value={draftM} onChange={setDraftM} />
        </_WheelColsContainer>
      </_WheelSheet>
    </>
  );
}

// ── DurationWheel (時間 + 分、startTime + duration → endTime) ────────────────────────
//   props: label, startTime (HH:MM 必須)、value (現在の endTime HH:MM)、onChange (新 endTime)
//   既存 endTime と startTime から duration を計算、範囲外 (>12h) はそのまま保持
function DurationWheel({ label, startTime, value, onChange, error, required }) {
  const [open, setOpen] = useState(false);

  const computeDuration = (start, end) => {
    if (!start || !end) return [null, null];
    const [sh, sm] = start.split(":").map(n => parseInt(n, 10));
    const [eh, em] = end.split(":").map(n => parseInt(n, 10));
    if (isNaN(sh) || isNaN(eh)) return [null, null];
    let mins = (eh * 60 + (em || 0)) - (sh * 60 + (sm || 0));
    if (mins < 0) mins += 24 * 60; // 日跨ぎ
    return [Math.floor(mins / 60), mins % 60];
  };

  const [origH, origM] = useMemo(() => computeDuration(startTime, value), [startTime, value]);
  const [draftH, setDraftH] = useState(origH ?? 1);
  const [draftM, setDraftM] = useState(origM ?? 30);

  const handleOpen = () => {
    setDraftH(origH ?? 1);
    setDraftM(origM ?? 30);
    setOpen(true);
  };

  // 時間 0..12 + 既存値が範囲外なら追加保持
  const hourItems = useMemo(() => {
    const arr = [];
    for (let i = 0; i <= 12; i++) arr.push({ value: i, label: String(i) });
    if (origH !== null && origH !== undefined && origH > 12) {
      arr.push({ value: origH, label: String(origH), preserved: true });
    }
    return arr;
  }, [origH]);

  // 分 5 分刻み + 非 5 分刻み既存値は追加保持
  const minItems = useMemo(() => {
    const arr = [];
    for (let i = 0; i <= 55; i += 5) arr.push({ value: i, label: String(i).padStart(2, "0") });
    if (origM !== null && origM !== undefined && (origM < 0 || origM > 55 || origM % 5 !== 0)) {
      arr.push({ value: origM, label: String(origM).padStart(2, "0"), preserved: true });
      arr.sort((a, b) => a.value - b.value);
    }
    return arr;
  }, [origM]);

  const handleConfirm = () => {
    if (draftH === origH && draftM === origM) {
      setOpen(false);
      return;
    }
    if (!startTime) {
      // startTime が無いと endTime 計算不可、何もしない
      setOpen(false);
      return;
    }
    const [sh, sm] = startTime.split(":").map(n => parseInt(n, 10));
    let total = (sh * 60 + (sm || 0)) + (draftH * 60 + draftM);
    total = total % (24 * 60);
    const out = `${String(Math.floor(total / 60)).padStart(2, "0")}:${String(total % 60).padStart(2, "0")}`;
    onChange(out);
    setOpen(false);
  };

  const display = (() => {
    if (origH === null || origM === null) return "";
    if (origH === 0 && origM === 0) return "0 分";
    if (origH === 0) return `${origM} 分`;
    if (origM === 0) return `${origH} 時間`;
    return `${origH} 時間 ${origM} 分`;
  })();

  const isPreserved = (origH !== null && origH > 12) || (origM !== null && origM % 5 !== 0);

  return (
    <>
      <_WheelButton label={label} displayValue={display} isPreserved={isPreserved} onClick={handleOpen} error={error} required={required} />
      <_WheelSheet
        open={open}
        title={label || "時間"}
        hint={`基準 startTime: ${startTime || "(未設定)"}`}
        onClose={() => setOpen(false)}
        onConfirm={handleConfirm}
      >
        <_WheelColsContainer cols={2}>
          <_WheelColumn items={hourItems} value={draftH} onChange={setDraftH} />
          <_WheelColumn items={minItems} value={draftM} onChange={setDraftM} />
        </_WheelColsContainer>
      </_WheelSheet>
    </>
  );
}

// ── NumWheel (1 列汎用、テンション/気温/duration 単独 等) ────────────────────────
//   props: label, value, min, max, step (default 1), unit (表示単位)、onChange
//   範囲外/step 非整合の既存値は option に追加して保持
function NumWheel({ label, value, min, max, step = 1, unit = "", onChange, error, required }) {
  const [open, setOpen] = useState(false);
  const cur = (value === null || value === undefined ? "" : String(value)).trim();

  const items = useMemo(() => {
    const arr = [];
    for (let i = min; i <= max; i += step) arr.push({ value: String(i), label: String(i) });
    if (cur && !arr.find(a => a.value === cur)) {
      // 範囲外既存値を保持
      arr.push({ value: cur, label: cur, preserved: true });
      arr.sort((a, b) => Number(a.value) - Number(b.value));
    }
    return arr;
  }, [min, max, step, cur]);

  const [draft, setDraft] = useState(cur);
  const orig = cur;

  const handleOpen = () => {
    setDraft(cur);
    setOpen(true);
  };

  const handleConfirm = () => {
    if (draft === orig) {
      setOpen(false);
      return;
    }
    onChange(draft);
    setOpen(false);
  };

  const display = cur ? `${cur}${unit}` : "";
  // preserved 判定: 範囲外 or step 非整合
  const numCur = parseInt(cur, 10);
  const isPreserved = !!cur && (
    isNaN(numCur) || numCur < min || numCur > max || (numCur - min) % step !== 0
  );

  return (
    <>
      <_WheelButton label={label} displayValue={display} isPreserved={isPreserved} onClick={handleOpen} error={error} required={required} />
      <_WheelSheet
        open={open}
        title={label || "数値"}
        hint={`範囲 ${min} 〜 ${max}${unit ? ` (${unit.trim()})` : ""}`}
        onClose={() => setOpen(false)}
        onConfirm={handleConfirm}
      >
        <_WheelColsContainer cols={1}>
          <_WheelColumn items={items} value={draft} onChange={setDraft} />
        </_WheelColsContainer>
      </_WheelSheet>
    </>
  );
}

// === src/ui/sessions/_SetupPicker.jsx ===
// _SetupPicker — 履歴セット bottom sheet ピッカー (S16.11 UX5)
//
// 機能: 過去の (racket + stringMain + stringCross + tensionMain + tensionCross) 5-tuple を
//       タップ 1 回で 5 フィールド一括入力。試合中の 90 秒チェンジオーバー対策。
//
// 仕様 (preview_s17_p7.html、ユーザー承認済):
//   - 機材セクション最下部の小ボタン: "🔁 履歴セットから選ぶ (N 件)"
//   - タップ → 下から bottom sheet (絞り込み入力 + リスト)
//   - 各項目: 上=ラケット名 (太字、フル名)、下=ストリング縦糸/横糸 · テンション縦/横
//   - 直近 1 件は「前回」バッジ
//   - タップで 5 フィールド一括反映 + シート閉じる
//   - × ボタン or 背景タップで キャンセル (値変更なし)
//   - 「個別に入力」項目は廃止 (背景タップで同等動作)
//   - データ無破壊: 元の値を一切変換しない、フル名そのまま表示

// 直近 setup を計算 (date 降順、racket 必須、5-tuple で dedupe)
const _computeRecentSetups = (tournaments = [], practices = [], trials = []) => {
  const items = [];
  const push = (date, src) => {
    if (!src || !src.racketName) return;
    items.push({
      date: date || "",
      racketName:   src.racketName   || "",
      stringMain:   src.stringMain   || "",
      stringCross:  src.stringCross  || "",
      tensionMain:  src.tensionMain  || "",
      tensionCross: src.tensionCross || "",
    });
  };
  (tournaments || []).forEach(t => {
    if (!t) return;
    push(t.date, t);
    (t.matches || []).forEach(m => push(t.date, m));
  });
  (practices || []).forEach(p => push(p?.date, p));
  (trials || []).forEach(tr => push(tr?.date, tr));
  items.sort((a, b) => (b.date || "").localeCompare(a.date || ""));
  const seen = new Set();
  const unique = [];
  for (const it of items) {
    const k = _setupKey(it);
    if (seen.has(k)) continue;
    seen.add(k);
    unique.push(it);
  }
  return unique;
};

const _setupKey = (s) => {
  if (!s) return "";
  return [s.racketName || "", s.stringMain || "", s.stringCross || "", s.tensionMain || "", s.tensionCross || ""].join("|");
};

// シート項目の 2 行目: ストリング縦/横 · テンション縦/横
const _setupSubLabel = (s) => {
  const strs = [s.stringMain, s.stringCross].map(v => (v == null ? "" : String(v).trim())).filter(Boolean).join(" / ");
  const tens = [s.tensionMain, s.tensionCross].map(v => (v == null ? "" : String(v).trim())).filter(Boolean).join("/");
  if (!strs && !tens) return "";
  if (!strs) return tens;
  if (!tens) return strs;
  return `${strs} · ${tens}`;
};

// ── ボタン (機材セクション最下部に配置)
function _SetupPickerButton({ recent = [], current, onApply }) {
  const [open, setOpen] = useState(false);
  if (!Array.isArray(recent) || recent.length === 0) return null;
  return (
    <>
      <button
        type="button"
        onClick={() => setOpen(true)}
        style={{
          width: "100%", minHeight: 36, padding: "6px 10px",
          border: `1px dashed ${C.primary}`, borderRadius: 6,
          background: C.primaryLight, color: C.primary,
          fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: font,
          display: "flex", alignItems: "center", justifyContent: "center", gap: 6,
          marginTop: 4,
        }}
      >
        <Icon name="clock-counter-clockwise" size={14} color={C.primary} />
        履歴セットから選ぶ ({recent.length} 件)
      </button>
      <_SetupPickerSheet
        open={open}
        recent={recent}
        current={current}
        onApply={onApply}
        onClose={() => setOpen(false)}
      />
    </>
  );
}

// ── ボトムシート
function _SetupPickerSheet({ open, recent = [], current, onApply, onClose }) {
  const [search, setSearch] = useState("");

  useEffect(() => {
    if (open) setSearch("");
  }, [open]);

  useEffect(() => {
    if (!open) return;
    const handler = (e) => { if (e.key === "Escape") onClose(); };
    document.addEventListener("keydown", handler);
    return () => document.removeEventListener("keydown", handler);
  }, [open, onClose]);

  const trapRef = useFocusTrap(open); // Round 5 a11y: focus trap (再点検追加)

  if (!open) return null;

  const curKey = _setupKey(current);
  const firstKey = recent[0] ? _setupKey(recent[0]) : "";
  const q = search.trim().toLowerCase();
  const filtered = !q
    ? recent
    : recent.filter(s => {
        const fullText = [s.racketName, s.stringMain, s.stringCross, s.tensionMain, s.tensionCross]
          .filter(Boolean).join(" ").toLowerCase();
        return fullText.includes(q);
      });

  return (
    <div
      role="dialog"
      aria-modal="true"
      aria-label="履歴セットから選ぶ"
      onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}
      style={{
        position: "fixed", inset: 0,
        background: "rgba(0,0,0,0.4)",
        display: "flex", alignItems: "flex-end",
        zIndex: 1200,
      }}
    >
      <div ref={trapRef} style={{
        background: C.panel,
        borderRadius: "16px 16px 0 0",
        width: "100%", maxWidth: 480, margin: "0 auto",
        maxHeight: "75vh",
        display: "flex", flexDirection: "column",
        animation: "modalEnter 250ms ease-out",
      }}>
        {/* head */}
        <div style={{
          padding: "12px 14px",
          borderBottom: `1px solid ${C.divider}`,
          display: "flex", justifyContent: "space-between", alignItems: "center",
        }}>
          <span style={{ fontSize: 13, fontWeight: 700, color: C.text }}>
            履歴セットから選ぶ ({recent.length} 件)
          </span>
          <button
            onClick={onClose}
            aria-label="閉じる"
            style={{
              background: "none", border: "none", cursor: "pointer",
              padding: 4, display: "flex",
            }}
          >
            <Icon name="x" size={18} color={C.textSecondary} />
          </button>
        </div>

        {/* search */}
        <div style={{ padding: "8px 14px", borderBottom: `1px solid ${C.divider}` }}>
          <input
            type="text"
            value={search}
            onChange={(e) => setSearch(e.target.value)}
            placeholder="絞り込み (ラケット名・数字など)"
            style={{
              width: "100%", minHeight: 36, padding: "6px 10px",
              border: `1px solid ${C.border}`, borderRadius: 6,
              fontSize: 13, fontFamily: font, background: C.bg,
              color: C.text,
            }}
          />
        </div>

        {/* body */}
        <div style={{ flex: 1, overflowY: "auto", padding: 0 }}>
          {filtered.length === 0 ? (
            <div style={{
              padding: "20px 14px", color: C.textMuted,
              textAlign: "center", fontSize: 12,
            }}>
              該当なし
            </div>
          ) : filtered.map((s, i) => {
            const k = _setupKey(s);
            const isCurrent = k === curKey;
            const isFirst = k === firstKey;
            const sub = _setupSubLabel(s);
            return (
              <button
                key={k + ":" + i}
                type="button"
                onClick={() => {
                  if (onApply) onApply(s);
                  onClose();
                }}
                style={{
                  width: "100%", padding: "10px 14px",
                  background: isCurrent ? C.primaryLight : "transparent",
                  border: "none",
                  borderBottom: `1px solid ${C.divider}`,
                  textAlign: "left", cursor: "pointer", fontFamily: font,
                  display: "flex", alignItems: "center", gap: 10,
                }}
              >
                <span style={{
                  width: 16, flexShrink: 0,
                  color: C.primary, fontSize: 14, textAlign: "center",
                }}>
                  {isCurrent ? "✓" : ""}
                </span>
                <div style={{ flex: 1, minWidth: 0, lineHeight: 1.4 }}>
                  <div style={{
                    fontSize: 14, fontWeight: 600, color: C.text,
                    wordBreak: "break-word",
                  }}>
                    {s.racketName}
                    {isFirst && (
                      <span style={{
                        display: "inline-block",
                        fontSize: 9, fontWeight: 700,
                        padding: "1px 5px", borderRadius: 3,
                        background: C.primary, color: "#fff",
                        marginLeft: 6, letterSpacing: 0.04, verticalAlign: 1,
                      }}>前回</span>
                    )}
                  </div>
                  {sub && (
                    <div style={{
                      fontSize: 12, color: C.textSecondary,
                      wordBreak: "break-word", marginTop: 2,
                    }}>
                      {sub}
                    </div>
                  )}
                </div>
              </button>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// === src/ui/sessions/CalendarDayCell.jsx ===
// CalendarDayCell — カレンダー 1 マス (DESIGN_SYSTEM §8.5.7)
// props:
//   day:      日 (1-31)
//   dow:      曜日 (0=日, 6=土)
//   isOutside: 月外マス (前月末 / 翌月頭)
//   isToday:   今日マス (2px primary border)
//   isSelected: 選択中マス (外周リング)
//   tournaments: 当日の大会 entry 配列 (entry={type:"tournament",item})
//   practices:   当日の練習 entry 配列
//   hasTrial:   当日のいずれかが試打にリンクされているか
//   onClick:    タップ時 (day を渡す、isOutside の場合は無効)

// 練習の合計分から濃度バケツを決める
const _practiceDensity = (practices) => {
  const total = practices.reduce((s, e) => s + (Number(e.item.duration) || 0), 0);
  if (total <= 0) return null;
  if (total < 30) return "light";
  if (total <= 60) return "mid";
  return "accent";
};

function CalendarDayCell({
  day,
  dow = 0,
  isOutside = false,
  isToday = false,
  isSelected = false,
  tournaments = [],
  practices = [],
  hasTrial = false,
  onClick,
}) {
  // 共通スタイル
  const baseStyle = {
    aspectRatio: "1 / 1.05",
    minHeight: 44,
    borderRadius: 8,
    padding: isToday ? 3 : 4,
    border: isToday ? `2px solid ${C.primary}` : `1px solid ${C.divider}`,
    boxShadow: isSelected ? `0 0 0 2px ${C.primary}, 0 4px 8px rgba(26,115,232,0.18)` : "none",
    display: "flex",
    flexDirection: "column",
    position: "relative",
    cursor: isOutside ? "default" : "pointer",
    transition: "transform 150ms",
    background: C.panel,
    zIndex: isSelected ? 1 : "auto",
  };

  // 月外マス
  if (isOutside) {
    return (
      <div
        style={{ ...baseStyle, background: C.panel2, cursor: "default", border: `1px solid ${C.divider}` }}
        aria-hidden="true"
      >
        <div style={{ fontSize: 12, color: C.textMuted, lineHeight: 1.1 }}>{day}</div>
      </div>
    );
  }

  // 大会日: 全面 tournamentLight + 右上 trophy
  const hasTournament = tournaments.length > 0;
  const density = _practiceDensity(practices);

  let bg = C.panel;
  let dayColor;
  if (hasTournament) {
    bg = C.tournamentLight;
  } else if (density === "light")  bg = C.practiceLight;
  else if (density === "mid")     bg = C.practiceMid;
  else if (density === "accent")  { bg = C.practiceAccent; dayColor = "#ffffff"; }

  // 日付文字色: 練習濃 (白) > 曜日色 > 通常
  if (!dayColor) {
    if (dow === 0)      dayColor = "#dc2626";
    else if (dow === 6) dayColor = C.primary;
    else                dayColor = C.text;
  }

  // 下部ドット (大会日に練習が重なる時 + 試打リンク時)
  const dots = [];
  if (hasTournament && practices.length > 0) {
    dots.push({ key: "prac", color: C.practiceAccent });
  }
  if (hasTrial) {
    dots.push({ key: "trial", color: C.trialAccent });
  }

  // 件数 (a11y 用)
  const count = tournaments.length + practices.length;
  const aria = count > 0 ? `${day}日 ${count}件` : `${day}日`;

  return (
    <div
      role="button"
      tabIndex={0}
      aria-label={aria}
      aria-pressed={isSelected}
      onClick={() => onClick && onClick(day)}
      onKeyDown={(e) => {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          onClick && onClick(day);
        }
      }}
      style={{ ...baseStyle, background: bg }}
      onMouseDown={(e) => { e.currentTarget.style.transform = "scale(0.95)"; }}
      onMouseUp={(e)   => { e.currentTarget.style.transform = "scale(1)"; }}
      onMouseLeave={(e)=> { e.currentTarget.style.transform = "scale(1)"; }}
    >
      <div style={{ fontSize: 12, fontWeight: 500, lineHeight: 1.1, color: dayColor }}>{day}</div>
      {hasTournament && (
        <div style={{ position: "absolute", top: 2, right: 2, color: C.tournamentAccent, lineHeight: 0 }}>
          <Icon name="trophy" size={14} color={C.tournamentAccent} />
        </div>
      )}
      {dots.length > 0 && (
        <div style={{ position: "absolute", bottom: 3, left: 0, right: 0, display: "flex", justifyContent: "center", gap: 3 }}>
          {dots.map(d => (
            <span key={d.key} style={{ width: 5, height: 5, borderRadius: "50%", background: d.color }} />
          ))}
        </div>
      )}
    </div>
  );
}

// === src/ui/sessions/CalendarView.jsx ===
// CalendarView — Sessions タブ カレンダー mode (DESIGN_SYSTEM §8.5.7 / WIREFRAMES §2.2.2)
// props:
//   items:       絞り込み済みエントリ配列 [{type:"tournament"|"practice", item}]
//                試打 (trial) は item に直接含まれず、trialLinks 経由でドット表示。
//   trialLinks:  {linkedTournamentIds:Set, linkedPracticeIds:Set}
//   onCardClick: (type, item) => void  日詳細パネルのミニ行タップ時 (S10 で詳細画面に接続)
//   onPanelStateChange: (open:boolean) => void  DayPanel 開閉を親に通知 (FAB 退避制御に使う)
//
// やること:
//   - 月のマス目 (日曜始まり)、前月/次月/今月ナビ、今日強調、選択中外周リング
//   - 当日タップで CalendarGrid 直下に DayPanel を表示 (B 版、§8.5.7.1)
//   - 同じ日の再タップで閉じる、月切替時は選択解除
// やらないこと:
//   - 詳細画面遷移 (S10) — onCardClick で親に委譲
//   - 試打のみの日のセル描画 (試打は付随活動として大会/練習にリンク表示)

const _DOW_LABELS_FULL = ["日","月","火","水","木","金","土"];

// "YYYY-MM-DD" フォーマット
const _toISO = (y, m1, d) =>
  `${y}-${String(m1).padStart(2, "0")}-${String(d).padStart(2, "0")}`;

// 月オブジェクト (y, m=0-11) からその月の日数 / 1日の曜日を求める
const _monthMeta = (y, m) => ({
  daysInMonth: new Date(y, m + 1, 0).getDate(),
  firstDow: new Date(y, m, 1).getDay(),  // 0=日, 6=土
});

// 今日 ISO (ローカル日付)
const _todayISO = () => {
  const d = new Date();
  return _toISO(d.getFullYear(), d.getMonth() + 1, d.getDate());
};

function CalendarView({ items = [], trialLinks = { linkedTournamentIds: new Set(), linkedPracticeIds: new Set() }, onCardClick, onPanelStateChange }) {
  const [month, setMonth] = useState(() => {
    const d = new Date();
    return { y: d.getFullYear(), m: d.getMonth() };
  });
  const [selectedDay, setSelectedDay] = useState(null); // 1-31 (現在表示中の月内の日付)
  // H-14 (Phase A 監査): DayPanel に渡す onClose を useCallback で安定化 (ESC リスナー再登録防止)
  const handleDayPanelClose = useCallback(() => setSelectedDay(null), []);
  // パネル開閉を親に通知 (FAB 表示制御)
  useEffect(() => {
    if (onPanelStateChange) onPanelStateChange(!!selectedDay);
  }, [selectedDay, onPanelStateChange]);

  // 当月の日付プレフィックス (YYYY-MM)
  const monthPrefix = `${month.y}-${String(month.m + 1).padStart(2, "0")}`;
  const monthLabel = `${month.y}年${month.m + 1}月`;
  const todayISO = _todayISO();

  // 月切替で選択解除
  const goPrev = () => { setSelectedDay(null); setMonth(p => p.m === 0 ? { y: p.y - 1, m: 11 } : { y: p.y, m: p.m - 1 }); };
  const goNext = () => { setSelectedDay(null); setMonth(p => p.m === 11 ? { y: p.y + 1, m: 0 } : { y: p.y, m: p.m + 1 }); };
  const goToday = () => {
    const d = new Date();
    setSelectedDay(null);
    setMonth({ y: d.getFullYear(), m: d.getMonth() });
  };
  const isCurrentMonth = (() => {
    const d = new Date();
    return d.getFullYear() === month.y && d.getMonth() === month.m;
  })();

  // 当月の日 → entry 配列 のマップを構築
  const dayMap = useMemo(() => {
    const map = {};  // { day(1-31): { tournaments:[], practices:[] } }
    items.forEach(entry => {
      const nd = normDate(entry.item.date);
      if (!nd.startsWith(monthPrefix + "-")) return;
      const dayMatch = nd.match(/-(\d{2})$/);
      if (!dayMatch) return;
      const day = Number(dayMatch[1]);
      if (!map[day]) map[day] = { tournaments: [], practices: [] };
      if (entry.type === "tournament") map[day].tournaments.push(entry);
      else if (entry.type === "practice") map[day].practices.push(entry);
    });
    return map;
  }, [items, monthPrefix]);

  // 各日に試打リンクがあるか (大会/練習いずれかが trialLinks に含まれるか)
  const hasTrialOnDay = (day) => {
    const slot = dayMap[day];
    if (!slot) return false;
    if (slot.tournaments.some(e => trialLinks.linkedTournamentIds.has(e.item.id))) return true;
    if (slot.practices.some(e => trialLinks.linkedPracticeIds.has(e.item.id))) return true;
    return false;
  };

  const { daysInMonth, firstDow } = _monthMeta(month.y, month.m);

  // 月外マス (前月末) を含めたセル配列を構築
  const cells = [];
  const prevLast = new Date(month.y, month.m, 0).getDate();
  for (let i = firstDow; i > 0; i--) {
    cells.push({ kind: "outside", day: prevLast - i + 1 });
  }
  for (let d = 1; d <= daysInMonth; d++) {
    cells.push({ kind: "in", day: d });
  }
  while (cells.length % 7 !== 0) {
    const after = cells.length - daysInMonth - firstDow + 1;
    cells.push({ kind: "outside", day: after });
  }

  const handleCellClick = (day) => {
    setSelectedDay(prev => prev === day ? null : day);
  };

  // 選択日の dateISO + 当日 entries (DayPanel に渡す)
  const selectedISO = selectedDay ? _toISO(month.y, month.m + 1, selectedDay) : null;
  const selectedSlot = selectedDay ? (dayMap[selectedDay] || { tournaments: [], practices: [] }) : null;

  // S13.5 (2026-04-27 修正): DayPanel が absolute overlay になったので、親に position: relative が必要。
  //   旧構造の Fragment + flex sibling → 単一 div コンテナに統合。
  return (
    <div style={{ flex: 1, overflow: "auto", padding: "8px 12px 12px", background: C.bg, minHeight: 0, position: "relative" }}>
        {/* 月ヘッダ + 前後ナビ + 今日へジャンプ */}
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "6px 4px 10px" }}>
          <button
            onClick={goPrev}
            aria-label="前月"
            style={{ width: 40, height: 40, border: "none", background: "transparent", color: C.textSecondary, borderRadius: 8, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}
          >
            <Icon name="chevron-left" size={22} color={C.textSecondary} />
          </button>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <div style={{ fontSize: 15, fontWeight: 700, color: C.text }}>{monthLabel}</div>
            {!isCurrentMonth && (
              <button
                onClick={goToday}
                style={{
                  fontSize: 11, padding: "3px 8px", borderRadius: 12,
                  border: `1px solid ${C.primary}`,
                  background: "transparent", color: C.primary,
                  cursor: "pointer",
                }}
              >
                今日
              </button>
            )}
          </div>
          <button
            onClick={goNext}
            aria-label="次月"
            style={{ width: 40, height: 40, border: "none", background: "transparent", color: C.textSecondary, borderRadius: 8, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}
          >
            <Icon name="chevron-right" size={22} color={C.textSecondary} />
          </button>
        </div>

        {/* 曜日ヘッダ */}
        <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 4, padding: "0 0 4px" }}>
          {_DOW_LABELS_FULL.map((d, i) => (
            <div
              key={d}
              style={{
                textAlign: "center",
                fontSize: 10, fontWeight: 600,
                padding: "2px 0",
                color: i === 0 ? "#dc2626" : i === 6 ? C.primary : C.textMuted,
              }}
            >
              {d}
            </div>
          ))}
        </div>

        {/* グリッド本体 */}
        <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 4 }}>
          {cells.map((cell, i) => {
            const dow = i % 7;
            if (cell.kind === "outside") {
              return (
                <CalendarDayCell
                  key={`out-${i}`}
                  day={cell.day}
                  dow={dow}
                  isOutside={true}
                />
              );
            }
            const slot = dayMap[cell.day] || { tournaments: [], practices: [] };
            const dayISO = _toISO(month.y, month.m + 1, cell.day);
            return (
              <CalendarDayCell
                key={`in-${cell.day}`}
                day={cell.day}
                dow={dow}
                isToday={dayISO === todayISO}
                isSelected={selectedDay === cell.day}
                tournaments={slot.tournaments}
                practices={slot.practices}
                hasTrial={hasTrialOnDay(cell.day)}
                onClick={handleCellClick}
              />
            );
          })}
        </div>

      {/* 選択中の日詳細パネル (S13.5: absolute overlay でカレンダーグリッドを覆う) */}
      {selectedDay && selectedISO && selectedSlot && (
        <DayPanel
          dateISO={selectedISO}
          tournaments={selectedSlot.tournaments}
          practices={selectedSlot.practices}
          onClose={handleDayPanelClose}
          onCardClick={onCardClick}
        />
      )}
    </div>
  );
}

// === src/ui/sessions/DayPanel.jsx ===
// DayPanel — CalendarGrid 直下の選択日詳細パネル (DESIGN_SYSTEM §8.5.7.1)
// props:
//   dateISO:      "YYYY-MM-DD" (この日のセッションを表示)
//   tournaments:  当日の大会 entry 配列 (entry={type,item})
//   practices:    当日の練習 entry 配列
//   trialLinks:   {linkedTournamentIds:Set, linkedPracticeIds:Set} (試打バッジ判定用、現状ミニ行では未使用だが将来用)
//   onClose:      ✕ ボタン or ESC で呼ばれる
//   onCardClick:  ミニ行タップ時 (type, item) を渡す (S10 で詳細画面に接続)

const _DOW_LABELS = ["日","月","火","水","木","金","土"];

const _formatDateLabel = (dateISO) => {
  const m = String(dateISO || "").match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if (!m) return dateISO;
  const [, y, mo, d] = m;
  const dt = new Date(Number(y), Number(mo) - 1, Number(d));
  return `${Number(mo)}月${Number(d)}日 (${_DOW_LABELS[dt.getDay()]})`;
};

// 大会の結果 → 結果バッジ用 (variant + label)。SessionsTab._mapTournamentResult と整合。
const _resultBadgeProps = (result) => {
  if (!result) return null;
  const map = {
    "優勝":     { variant: "tournament", label: "優勝" },
    "準優勝":   { variant: "info",       label: "準優勝" },
    "3位":      { variant: "bronze",     label: "3位" },
    "ベスト8":  { variant: "warning",    label: "ベスト8" },
    "ベスト16": { variant: "warning",    label: "ベスト16" },
    "予選突破": { variant: "success",    label: "予選突破" },
    "敗退":     { variant: "error",      label: "敗退" },
    "予選敗退": { variant: "error",      label: "予選敗退" },
  };
  return map[result] || { variant: "default", label: result };
};

// 大会の meta 行: 開始時刻 / 形式 / 勝敗
const _tournamentMeta = (item) => {
  const parts = [];
  if (item.startTime) parts.push(item.startTime);
  const typeLabel = { singles: "シングルス", doubles: "ダブルス", mixed: "ミックス" }[item.type];
  if (typeLabel) parts.push(typeLabel);
  const matches = Array.isArray(item.matches) ? item.matches : [];
  if (matches.length > 0) {
    // H-9 (Phase A 監査): _normalizeMatchResult で表記揺れ吸収 (勝/負/win/loss 等を含む)
    const wins = matches.filter(m => _normalizeMatchResult(m.result) === "win").length;
    const losses = matches.filter(m => _normalizeMatchResult(m.result) === "loss").length;
    parts.push(`${wins}勝${losses}敗`);
  }
  return parts.join(" / ");
};

// 練習の meta 行: 時間帯 / 分 / 心拍 / 会場
const _practiceMeta = (item) => {
  const parts = [];
  if (item.startTime) parts.push(item.endTime ? `${item.startTime}-${item.endTime}` : item.startTime);
  if (item.duration) parts.push(`${item.duration}分`);
  if (item.heartRateAvg) parts.push(`心拍${item.heartRateAvg}`);
  return parts.join(" / ");
};

const DayPanelMiniRow = ({ entry, onClick }) => {
  const isTournament = entry.type === "tournament";
  const it = entry.item;
  const sideColor = isTournament ? C.tournamentAccent : C.practiceAccent;
  const title = isTournament
    ? (it.name || "(無題の大会)")
    : (it.title || it.venue || "(無題の練習)");
  const meta = isTournament ? _tournamentMeta(it) : _practiceMeta(it);
  const resultBadge = isTournament ? _resultBadgeProps(it.overallResult) : null;

  return (
    <div
      role="button"
      tabIndex={0}
      onClick={() => onClick && onClick(entry.type, it)}
      onKeyDown={(e) => {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          onClick && onClick(entry.type, it);
        }
      }}
      onMouseEnter={(e) => { e.currentTarget.style.background = C.panel2; }}
      onMouseLeave={(e) => { e.currentTarget.style.background = "transparent"; }}
      style={{
        display: "flex",
        alignItems: "center",
        gap: 8,
        padding: 6,
        borderRadius: 8,
        cursor: "pointer",
        background: "transparent",
      }}
    >
      <div style={{ width: 4, height: 36, borderRadius: 2, background: sideColor, flexShrink: 0 }} />
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{
          fontSize: 13, fontWeight: 600, color: C.text,
          overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap",
        }}>
          {title}
        </div>
        {meta && (
          <div style={{
            fontSize: 11, color: C.textMuted, marginTop: 2,
            overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap",
          }}>
            {meta}
          </div>
        )}
      </div>
      {resultBadge && (
        <Badge variant={resultBadge.variant}>{resultBadge.label}</Badge>
      )}
      <Icon name="chevron-right" size={16} color={C.textMuted} />
    </div>
  );
};

function DayPanel({ dateISO, tournaments = [], practices = [], onClose, onCardClick }) {
  // 並び順: 大会 → 練習 (大会内は startTime 昇順、練習も startTime 昇順)
  const ordered = useMemo(() => {
    const t = [...tournaments].sort((a, b) => String(a.item.startTime || "").localeCompare(String(b.item.startTime || "")));
    const p = [...practices].sort((a, b) => String(a.item.startTime || "").localeCompare(String(b.item.startTime || "")));
    return [...t, ...p];
  }, [tournaments, practices]);

  // ESC で閉じる
  useEffect(() => {
    const handler = (e) => { if (e.key === "Escape") onClose && onClose(); };
    document.addEventListener("keydown", handler);
    return () => document.removeEventListener("keydown", handler);
  }, [onClose]);

  const count = ordered.length;
  const label = _formatDateLabel(dateISO);

  // S13.5 (2026-04-27 修正): flex sibling → 親 (CalendarView container) の position: absolute オーバーレイ化。
  //   理由: 旧仕様ではカレンダーグリッドを縦に押し縮めていた。半透明 glass で重ねる形に変更。
  return (
    <div
      style={{
        position: "absolute",
        bottom: 0,
        left: 0,
        right: 0,
        maxHeight: 220,
        background: "rgba(255,255,255,0.78)",
        backdropFilter: "saturate(180%) blur(28px)",
        WebkitBackdropFilter: "saturate(180%) blur(28px)",
        borderTop: "1px solid rgba(255,255,255,0.5)",
        borderRadius: "16px 16px 0 0",
        boxShadow: "0 -4px 20px rgba(0,0,0,0.08)",
        display: "flex",
        flexDirection: "column",
        animation: "dayPanelSlideUp 200ms ease-out",
        zIndex: 30,
      }}
    >
      {/* ヘッダ */}
      <div style={{
        display: "flex", alignItems: "center", justifyContent: "space-between",
        padding: "8px 16px",
        borderBottom: `1px solid ${C.divider}`,
        flexShrink: 0,
      }}>
        <div style={{ fontSize: 13, fontWeight: 700, color: C.text }}>
          {label}
          <span style={{ color: C.textMuted, fontWeight: 500, marginLeft: 6, fontSize: 12 }}>{count}件</span>
        </div>
        <button
          onClick={onClose}
          aria-label="閉じる"
          style={{
            width: 28, height: 28,
            border: "none", background: "transparent", color: C.textMuted,
            cursor: "pointer", borderRadius: 6,
            display: "flex", alignItems: "center", justifyContent: "center",
          }}
        >
          <Icon name="x" size={18} color={C.textMuted} />
        </button>
      </div>
      {/* 本体 (スクロール) */}
      <div style={{ flex: 1, overflowY: "auto", padding: "6px 12px 8px", minHeight: 0 }}>
        {count === 0 ? (
          <div style={{ textAlign: "center", padding: 16, color: C.textMuted, fontSize: 12 }}>
            この日のセッションはありません
          </div>
        ) : (
          ordered.map((entry, i) => (
            <DayPanelMiniRow key={`${entry.type}-${entry.item.id || i}`} entry={entry} onClick={onCardClick} />
          ))
        )}
      </div>
    </div>
  );
}

// === src/ui/sessions/FilterChip.jsx ===
// FilterChip — Sessions 絞り込みチップ (DESIGN_SYSTEM §8.5.2)
// props:
//   label: 軸ラベル (例: "種類", "ラケット", "対戦相手", "結果")
//   selectedValues: string[] (この軸で選択中の値、0件なら「未選択」表示)
//   onOpen: タップで Drawer を開くコールバック
//   onClear: 選択済み時のクリア (× ボタンから通知、省略可)
// 仕様:
//   - 高さ 32, pill (border-radius 16)
//   - 未選択: panel 背景 / textSecondary / border 1px
//   - 選択中: primaryLight 背景 / primary / border 1px primary
//   - 選択中の表示: 「ラケット: Ezone98」, 2件以上は「ラケット: Ezone98 +1」
//   - tap: scale(0.98) 150ms

function FilterChip({ label, selectedValues = [], onOpen, onClear }) {
  const [press, setPress] = useState(false);
  const selected = selectedValues.length > 0;
  const bg = selected ? C.primaryLight : C.panel;
  const fg = selected ? C.primary : C.textSecondary;
  const bd = selected ? C.primary : C.border;

  let display = label;
  if (selected) {
    if (selectedValues.length === 1) display = `${label}: ${selectedValues[0]}`;
    else display = `${label}: ${selectedValues[0]} +${selectedValues.length - 1}`;
  }

  return (
    <div
      role="button"
      tabIndex={0}
      onClick={onOpen}
      onKeyDown={(e) => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); onOpen && onOpen(); } }}
      onMouseDown={() => setPress(true)}
      onMouseUp={() => setPress(false)}
      onMouseLeave={() => setPress(false)}
      onTouchStart={() => setPress(true)}
      onTouchEnd={() => setPress(false)}
      aria-pressed={selected}
      aria-label={selected ? `${label} (${selectedValues.length}件選択中)` : `${label} を絞り込む`}
      style={{
        display: "inline-flex",
        alignItems: "center",
        gap: 4,
        height: 32,
        paddingLeft: 12,
        paddingRight: selected && onClear ? 4 : 12,
        border: `1px solid ${bd}`,
        borderRadius: 16,
        background: bg,
        color: fg,
        fontSize: 13,
        fontWeight: selected ? 600 : 500,
        fontFamily: font,
        cursor: "pointer",
        whiteSpace: "nowrap",
        userSelect: "none",
        transition: "background 150ms, border 150ms, transform 150ms",
        transform: press ? "scale(0.98)" : "scale(1)",
      }}
    >
      <span>{display}</span>
      {selected && onClear ? (
        <button
          onClick={(e) => { e.stopPropagation(); onClear(); }}
          aria-label={`${label} の絞り込みをクリア`}
          style={{
            width: 22, height: 22,
            display: "inline-flex", alignItems: "center", justifyContent: "center",
            border: "none", background: "transparent",
            color: C.primary, cursor: "pointer",
            padding: 0, borderRadius: 11,
          }}
        >
          <Icon name="x" size={14} color={C.primary} />
        </button>
      ) : (
        <Icon name="chevron-down" size={14} color={fg} />
      )}
    </div>
  );
}

// === src/ui/sessions/FilterDrawer.jsx ===
// FilterDrawer — 画面下からせり上がる候補選択シート (DESIGN_SYSTEM §8.5.2 補助)
// props:
//   open: boolean
//   title: シート見出し (例: 「ラケットで絞り込む」)
//   options: string[] (選択肢)
//   selected: string[] (現在選択中)
//   onApply: 新しい選択配列を親に通知
//   onClose: シートを閉じる
// 挙動:
//   - 開くと下から 250ms でスライドイン (drawerEnter キーフレーム)
//   - チェックリスト (複数選択可)、タップでトグル
//   - 下部に「クリア」「適用 (N)」ボタン
//   - オーバーレイタップ / Esc / × で閉じる (draft は破棄)

function FilterDrawer({ open, title, options = [], selected = [], onApply, onClose }) {
  const [draft, setDraft] = useState(selected);
  const trapRef = useFocusTrap(open); // Round 5: a11y focus trap

  // open のたびに最新の selected を draft に取り込む (親が外で変えても追従)
  useEffect(() => { if (open) setDraft(selected); }, [open]);

  useEffect(() => {
    if (!open) return;
    const handler = (e) => { if (e.key === "Escape") onClose && onClose(); };
    document.addEventListener("keydown", handler);
    return () => document.removeEventListener("keydown", handler);
  }, [open, onClose]);

  if (!open) return null;

  const toggle = (v) => {
    setDraft(d => d.includes(v) ? d.filter(x => x !== v) : [...d, v]);
  };

  return (
    <div
      role="dialog"
      aria-modal="true"
      aria-label={title}
      onClick={(e) => { if (e.target === e.currentTarget) onClose && onClose(); }}
      style={{
        position: "fixed",
        inset: 0,
        background: "rgba(0,0,0,0.4)",
        zIndex: 1000,
        display: "flex",
        alignItems: "flex-end",
        justifyContent: "center",
      }}
    >
      <div
        ref={trapRef}
        style={{
          background: C.panel,
          borderRadius: "16px 16px 0 0",
          width: "100%",
          maxWidth: 500,
          maxHeight: "70vh",
          display: "flex",
          flexDirection: "column",
          animation: "drawerEnter 250ms ease-out",
        }}
      >
        {/* ドラッグハンドル (視覚のみ) */}
        <div style={{
          width: 40, height: 4,
          background: C.border, borderRadius: 2,
          margin: "8px auto 4px",
        }} />

        {/* ヘッダ */}
        <div style={{
          display: "flex", alignItems: "center",
          padding: "8px 8px 8px 16px",
          borderBottom: `1px solid ${C.divider}`,
        }}>
          <div style={{ flex: 1, fontSize: 15, fontWeight: 600, color: C.text }}>{title}</div>
          <button
            onClick={onClose}
            aria-label="閉じる"
            style={{
              width: 40, height: 40,
              display: "inline-flex", alignItems: "center", justifyContent: "center",
              border: "none", background: "transparent", cursor: "pointer",
              color: C.textSecondary, padding: 0, borderRadius: 8,
            }}
          >
            <Icon name="x" size={22} color={C.textSecondary} />
          </button>
        </div>

        {/* 候補リスト */}
        <div style={{ flex: 1, overflow: "auto", padding: "4px 0" }}>
          {options.length === 0 ? (
            <div style={{ padding: "24px 16px", textAlign: "center", fontSize: 13, color: C.textMuted }}>
              候補がありません
            </div>
          ) : options.map((opt) => {
            const on = draft.includes(opt);
            return (
              <div
                key={opt}
                role="checkbox"
                aria-checked={on}
                tabIndex={0}
                onClick={() => toggle(opt)}
                onKeyDown={(e) => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); toggle(opt); } }}
                style={{
                  display: "flex", alignItems: "center", gap: 12,
                  padding: "10px 16px",
                  minHeight: 44,
                  cursor: "pointer",
                  color: on ? C.primary : C.text,
                  fontWeight: on ? 600 : 400,
                  fontSize: 14,
                  background: on ? C.primaryLight : "transparent",
                  transition: "background 120ms",
                }}
              >
                <Icon name={on ? "check-square" : "square"} size={20} color={on ? C.primary : C.textSecondary} />
                <span style={{ flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{opt}</span>
              </div>
            );
          })}
        </div>

        {/* フッタ */}
        <div style={{
          display: "flex", gap: 8,
          padding: 12,
          borderTop: `1px solid ${C.divider}`,
        }}>
          <button
            onClick={() => setDraft([])}
            style={{
              flex: 1, minHeight: 44,
              border: `1px solid ${C.border}`,
              borderRadius: 8,
              background: C.panel,
              color: C.textSecondary,
              fontSize: 14,
              fontWeight: 500,
              cursor: "pointer",
              fontFamily: font,
            }}
          >
            クリア
          </button>
          <button
            onClick={() => onApply && onApply(draft)}
            style={{
              flex: 2, minHeight: 44,
              border: "none",
              borderRadius: 8,
              background: C.primary,
              color: "#fff",
              fontSize: 14,
              fontWeight: 600,
              cursor: "pointer",
              fontFamily: font,
            }}
          >
            適用{draft.length > 0 ? ` (${draft.length})` : ""}
          </button>
        </div>
      </div>
    </div>
  );
}

// GameTracker — F1.4.1「ゲーム単位スコア + 状況メモ」(v2 移植 + v4 強化)
//
// 仕様:
//   - 私 +1 / 相手 +1 / ↩ ボタンでゲーム単位記録

}

// ── メインコンポーネント
//   リク 30-e Phase A (S18): matchEnded prop で試合終了状態を受け取る (computeAutoMatchResult 結果)
//     - 試合終了バナー表示 (✓ 試合終了 + 自動セットスコア)
//     - 「次のゲーム」+ ボタンを隠す (誤入力防止)
//     - 「続けて記録する」展開で再開可能 (試合形式変更等の例外ケース対応)
//   リク 30-e Phase B (S18): format prop で試合形式を受け取る → TB 状態を検知して TB 入力 banner 表示
//     - 通常 TB (6-6): 7 ポイント先取・差 2、勝者 + 負けた側ポイント を入力
//     - マッチ TB (1-1 で 10pt): 10 ポイント先取、同上
//     - 入力された loser ポイントは tbDetails に保存し、setScores の表示を装飾 ("7-6(5)" / "10-7")
function GameTracker({ match, onChange, confirm, matchEnded, format }) {
  const games = Array.isArray(match.games) ? match.games : [];
  const changeovers = Array.isArray(match.changeovers) ? match.changeovers : [];
  const setScores = Array.isArray(match.setScores) ? match.setScores : [];
  const score = computeRunningScore(games);

  // pending CO (新規発動): 奇数ゲーム後に自動で立ち上がる
  const [pending, setPending] = useState(null);
  // edit CO (既存タップ): 既存値プリフィルで開く
  const [editing, setEditing] = useState(null);
  // ゲーム log 行タップで開く編集ポップオーバー (index)
  const [gameEditIndex, setGameEditIndex] = useState(null);
  // リク 30-e Phase A: 試合終了後に「続けて記録する」を押した展開状態
  const [expandedAfterEnd, setExpandedAfterEnd] = useState(false);
  // リク 30-e Phase B: TB 入力 banner の loser ポイント state
  //   selectedPreset: number | null (プリセットボタン選択時の値)
  //   otherText: string (その他テキスト入力)
  const [tbSelectedPreset, setTbSelectedPreset] = useState(null);
  const [tbOtherText, setTbOtherText] = useState("");
  // 別 match の編集に切替時にリセット
  useEffect(() => { if (!matchEnded) setExpandedAfterEnd(false); }, [matchEnded]);
  // matchEnded で pending CO が立ち上がってる場合は自動 skip (バナー表示優先)
  useEffect(() => {
    if (matchEnded && !expandedAfterEnd && pending) setPending(null);
  }, [matchEnded, expandedAfterEnd, pending]);

  // リク 30-e Phase B: TB 状態の検知 (format 必須、未指定なら null = TB 状態なし扱い)
  const tbState = useMemo(
    () => format ? computeTbState(games, format) : { type: null, isInTB: false, setIndex: 0 },
    [games, format]
  );
  // TB 状態が変わったら入力 state クリア (前セットの値を引きずらない)
  useEffect(() => {
    if (!tbState.isInTB) {
      setTbSelectedPreset(null);
      setTbOtherText("");
    }
  }, [tbState.isInTB, tbState.setIndex]);

  // ゲーム追加 (奇数ゲーム後で自動 CO 発動 — TENNIS_RULES.md §2.1)
  const handleAddGame = (winner) => {
    const { match: next, promptAfterGame } = addGame(match, winner);
    onChange(next);
    if (promptAfterGame !== null) {
      setPending({ afterGame: promptAfterGame, mental: 3, physical: 3, note: "" });
    }
  };

  // リク 30-e Phase B: TB banner からの送信 (勝者 + loser ポイント)
  //   loser は preset 優先、無ければ otherText を数値解釈、空なら null (詳細なし)
  const handleTbSubmit = (winner) => {
    let loser = null;
    if (typeof tbSelectedPreset === "number") {
      loser = tbSelectedPreset;
    } else if (tbOtherText.trim() !== "") {
      const n = parseInt(tbOtherText.trim(), 10);
      if (!isNaN(n) && n >= 0) loser = n;
    }
    // games に 1 ゲーム追加 (TB の勝敗を表す 1 ゲーム)
    const { match: next, promptAfterGame } = addGame(match, winner);
    // tbDetails の該当 setIndex に詳細を記録 (loser 入力時のみ、null なら装飾なし)
    if (loser !== null) {
      const td = Array.isArray(next.tbDetails) ? [...next.tbDetails] : [];
      while (td.length < tbState.setIndex) td.push(null);
      td[tbState.setIndex] = { type: tbState.type, winner, loser };
      onChange({ ...next, tbDetails: td });
    } else {
      onChange(next);
    }
    if (promptAfterGame !== null) {
      setPending({ afterGame: promptAfterGame, mental: 3, physical: 3, note: "" });
    }
    // 入力 state はクリア (useEffect で自動だが念のため)
    setTbSelectedPreset(null);
    setTbOtherText("");
  };

  // 直近撤回 (A 直近撤回): 直近ゲーム + 直後 CO を同時撤回
  const handleUndo = () => {
    if (games.length === 0) return;
    onChange(removeLastGame(match));
    // pending CO が立ち上がっていたらそれもキャンセル
    if (pending && pending.afterGame === games.length) setPending(null);
  };

  // pending CO 保存
  const handlePendingSave = (co) => {
    onChange(upsertChangeover(match, co));
    setPending(null);
  };
  const handlePendingSkip = () => setPending(null);

  // 既存 CO 編集モーダルから保存
  const handleEditSave = (co) => {
    onChange(upsertChangeover(match, co));
    setEditing(null);
  };
  const handleEditDelete = () => {
    if (!editing) return;
    onChange(removeChangeover(match, editing.afterGame));
    setEditing(null);
  };

  // ゲーム log 行: 私/相手切替
  const handleGameSwitch = (index, winner) => {
    onChange(replaceGameWinner(match, index, winner));
    setGameEditIndex(null);
  };
  // ゲーム log 行: 削除 (afterGame 再計算)
  const handleGameDelete = (index) => {
    onChange(removeGameAt(match, index));
    setGameEditIndex(null);
  };

  // 全消去 (D)
  const handleResetAll = () => {
    if (games.length === 0 && changeovers.length === 0) return;
    if (!confirm) {
      onChange(resetGameTracker(match));
      return;
    }
    confirm.ask(
      `この試合のゲーム記録（${games.length} ゲーム / CO ${changeovers.length} 件）をすべて削除します。この操作は取り消せません。`,
      () => onChange(resetGameTracker(match)),
      { title: "ゲーム記録を全消去", yesLabel: "全消去", yesVariant: "danger", icon: "trash-2" }
    );
  };

  // 表示行を組み立て: ゲーム N → (N が奇数なら) CO 行
  const rows = [];
  let running = { me: 0, opp: 0 };
  games.forEach((g, i) => {
    if (g.winner === "me") running = { ...running, me: running.me + 1 };
    else if (g.winner === "opp") running = { ...running, opp: running.opp + 1 };
    rows.push({ kind: "game", index: i, game: g, score: { ...running } });
    // 奇数ゲーム後 = i+1 が奇数 = (i+1) % 2 === 1
    if ((i + 1) % 2 === 1) {
      const co = changeovers.find(c => c.afterGame === i + 1) || null;
      rows.push({ kind: "co", afterGame: i + 1, co });
    }
  });

  return (
    <div style={{
      background: C.bg, border: `1px solid ${C.border}`,
      borderRadius: 10, padding: 12, marginTop: 6,
    }}>
      {/* ヘッダ: タイトル + 全消去ボタン */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
        <div style={{ fontSize: 12, color: C.primary, fontWeight: 700, display: "flex", alignItems: "center", gap: 6 }}>
          <Icon name="play-circle" size={14} color={C.primary} />
          ゲーム単位記録
        </div>
        {(games.length > 0 || changeovers.length > 0) && (
          <button
            type="button"
            onClick={handleResetAll}
            aria-label="ゲーム記録を全消去"
            title="全消去"
            style={{ background: "none", border: "none", color: C.error, cursor: "pointer", padding: 6, display: "flex", borderRadius: 6 }}
          >
            <Icon name="trash-2" size={16} color={C.error} />
          </button>
        )}
      </div>

      {/* リク 30-e Phase A (S18): 試合終了バナー + 「続けて記録する」展開ボタン
          matchEnded = true (computeAutoMatchResult で勝敗確定) の時に表示。
          展開後は警告色のバナーに切替えて、再 collapse で誤入力防止に戻れる */}
      {matchEnded && !expandedAfterEnd && (
        <div style={{
          background: C.successLight, border: `1px solid ${C.success}`,
          borderRadius: 8, padding: "10px 12px", marginBottom: 10,
          display: "flex", alignItems: "center", gap: 10,
        }}>
          <Icon name="check-circle" size={20} color={C.success} />
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: "#0a5b35" }}>試合終了</div>
            {setScores.length > 0 && (
              <div style={{ fontSize: 12, color: "#0a5b35", fontVariantNumeric: "tabular-nums" }}>
                {setScores.join(" / ")}
              </div>
            )}
          </div>
          <button
            type="button"
            onClick={() => setExpandedAfterEnd(true)}
            style={{
              fontSize: 11, padding: "6px 10px", borderRadius: 6,
              border: `1px solid ${C.success}`, background: C.panel, color: "#0a5b35",
              cursor: "pointer", fontFamily: font, fontWeight: 600, flexShrink: 0,
            }}
          >
            続けて記録する
          </button>
        </div>
      )}
      {matchEnded && expandedAfterEnd && (
        <div style={{
          background: C.warningLight, border: `1px solid ${C.warning}`,
          borderRadius: 8, padding: "8px 12px", marginBottom: 10,
          display: "flex", alignItems: "center", gap: 8,
        }}>
          <Icon name="info" size={14} color="#7e5d00" />
          <div style={{ flex: 1, fontSize: 12, color: "#7e5d00" }}>
            試合終了後の追加記録モード ({setScores.join(" / ")})
          </div>
          <button
            type="button"
            onClick={() => setExpandedAfterEnd(false)}
            style={{
              fontSize: 11, padding: "4px 10px", borderRadius: 6,
              border: `1px solid ${C.warning}`, background: C.panel, color: "#7e5d00",
              cursor: "pointer", fontFamily: font, fontWeight: 600, flexShrink: 0,
            }}
          >
            戻す
          </button>
        </div>
      )}

      {/* スコア表示 */}
      <div style={{
        display: "flex", alignItems: "center", justifyContent: "space-between",
        background: C.panel, border: `1px solid ${C.divider}`, borderRadius: 10,
        padding: "10px 14px", marginBottom: 10,
      }}>
        <div style={{ textAlign: "center", flex: "0 0 auto" }}>
          <div style={{ fontSize: 11, fontWeight: 600, color: "#0a5b35", marginBottom: 2 }}>私</div>
          <div style={{ fontSize: 28, fontWeight: 800, color: C.practiceAccent, fontVariantNumeric: "tabular-nums", lineHeight: 1 }}>{score.me}</div>
        </div>
        <div style={{ fontSize: 14, color: C.textMuted, fontWeight: 600 }}>—</div>
        <div style={{ textAlign: "center", flex: "0 0 auto" }}>
          <div style={{ fontSize: 11, fontWeight: 600, color: "#a31511", marginBottom: 2 }}>相手</div>
          <div style={{ fontSize: 28, fontWeight: 800, color: C.error, fontVariantNumeric: "tabular-nums", lineHeight: 1 }}>{score.opp}</div>
        </div>
        {games.length > 0 && (
          <div style={{ flex: 1, maxWidth: 108, marginLeft: 14 }}>
            <div style={{ fontSize: 11, color: C.textSecondary, marginBottom: 4 }}>推移</div>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 2 }}>
              {games.map((g, i) => (
                <div key={g.id || i} style={{
                  width: 16, height: 16, borderRadius: 3, color: "#fff",
                  fontSize: 9, fontWeight: 700, display: "flex", alignItems: "center", justifyContent: "center",
                  background: g.winner === "me" ? C.practiceAccent : C.error,
                }}>{i + 1}</div>
              ))}
            </div>
          </div>
        )}
      </div>

      {/* ゲーム log + CO 交互表示 */}
      {rows.length > 0 && (
        <div style={{ marginBottom: 10 }}>
          {rows.map((row, idx) => {
            if (row.kind === "game") {
              const editing = gameEditIndex === row.index;
              return (
                <React.Fragment key={`g-${row.game.id || row.index}`}>
                  <_gtGameLogRow
                    index={row.index}
                    game={row.game}
                    runningScore={row.score}
                    onEdit={() => setGameEditIndex(editing ? null : row.index)}
                  />
                  {editing && (
                    <_gtGameEditPopover
                      index={row.index}
                      current={row.game.winner}
                      onSwitchMe={() => handleGameSwitch(row.index, "me")}
                      onSwitchOpp={() => handleGameSwitch(row.index, "opp")}
                      onDelete={() => handleGameDelete(row.index)}
                      onClose={() => setGameEditIndex(null)}
                    />
                  )}
                </React.Fragment>
              );
            }
            // CO 行
            if (row.co) {
              return (
                <_gtChangeoverRow
                  key={`co-${row.afterGame}`}
                  co={row.co}
                  onEdit={() => setEditing({ ...row.co })}
                />
              );
            }
            // CO 未記録 (空行) — pending と重複しない時だけ薄く表示
            if (pending && pending.afterGame === row.afterGame) return null;
            return (
              <div
                key={`co-empty-${row.afterGame}`}
                onClick={() => setEditing({ afterGame: row.afterGame, mental: 3, physical: 3, note: "" })}
                role="button"
                tabIndex={0}
                onKeyDown={(e) => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); setEditing({ afterGame: row.afterGame, mental: 3, physical: 3, note: "" }); } }}
                style={{
                  padding: "6px 10px", background: C.panel, border: `1px dashed ${C.border}`,
                  borderRadius: 8, marginBottom: 4, cursor: "pointer", minHeight: 30,
                  fontSize: 11, color: C.textMuted, display: "flex", alignItems: "center", gap: 4,
                }}
                title="タップで CO を記録"
              >
                ⟳ チェンジオーバー（{row.afterGame} ゲーム後・未記録、タップで追加）
              </div>
            );
          })}
        </div>
      )}

      {/* リク 30-e Phase B: TB 入力 banner (通常 TB or マッチ TB)
          isInTB の時に通常の + ボタンを置き換える。loser ポイント (preset / その他) +
          勝者ボタン (私の勝ち / 相手の勝ち) で送信。 */}
      {!pending && !(matchEnded && !expandedAfterEnd) && tbState.isInTB && (() => {
        const isMatchTb = tbState.type === "match10";
        const presets = isMatchTb ? [5, 6, 7, 8] : [3, 4, 5, 6];
        const tbBg = isMatchTb ? "#FFF1D2" : C.tournamentLight;
        const tbBorder = isMatchTb ? C.warning : C.tournamentAccent;
        const tbColor = isMatchTb ? "#7e5d00" : "#875700";
        const title = isMatchTb
          ? "マッチタイブレーク (10 ポイント先取・差 2)"
          : "タイブレーク (7 ポイント先取・差 2)";
        const hint = isMatchTb
          ? "1-1 で第 3 セットの代わりに 10 ポイント TB。勝者を選び、負けた側のポイントを入力 (任意)"
          : "勝者を選び、負けた側のポイントを入力 (任意)";
        return (
          <div style={{
            background: tbBg, border: `1.5px solid ${tbBorder}`,
            borderRadius: 10, padding: 12, marginBottom: 4,
          }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: tbColor, display: "flex", alignItems: "center", gap: 6, marginBottom: 4 }}>
              <Icon name="trophy" size={14} color={tbColor} />
              {title}
            </div>
            <div style={{ fontSize: 11, color: C.textSecondary, marginBottom: 10, lineHeight: 1.5 }}>{hint}</div>

            {/* プリセット行 */}
            <div style={{ fontSize: 11, color: C.textSecondary, fontWeight: 600, marginBottom: 4 }}>負けた側のポイント</div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 6, marginBottom: 6 }}>
              {presets.map(p => {
                const active = tbSelectedPreset === p;
                return (
                  <button
                    key={p}
                    type="button"
                    onClick={() => { setTbSelectedPreset(p); setTbOtherText(""); }}
                    style={{
                      minHeight: 44, borderRadius: 8,
                      border: `1.5px solid ${C.primary}`,
                      background: active ? C.primary : C.panel,
                      color: active ? "#fff" : C.primary,
                      fontSize: 14, fontWeight: 700,
                      cursor: "pointer", fontFamily: font,
                    }}
                  >{p}</button>
                );
              })}
            </div>
            <input
              type="text"
              inputMode="numeric"
              value={tbOtherText}
              onChange={(e) => { setTbOtherText(e.target.value); setTbSelectedPreset(null); }}
              placeholder={isMatchTb ? "その他: 例 12 (デュース TB)" : "その他: 例 8 (デュース TB)"}
              style={{
                width: "100%", minHeight: 38, padding: "8px 10px",
                border: `1px solid ${C.border}`, borderRadius: 8,
                fontSize: 14, fontFamily: font, marginBottom: 10,
              }}
            />

            {/* 勝者ボタン (1 つで送信) */}
            <div style={{ fontSize: 11, color: C.textSecondary, fontWeight: 600, marginBottom: 4 }}>勝者を選んで記録</div>
            <div style={{ display: "flex", gap: 10 }}>
              <button
                type="button"
                onClick={() => handleTbSubmit("me")}
                style={{
                  flex: 1, minHeight: 54, borderRadius: 10,
                  border: `1.5px solid ${C.practiceAccent}`, background: C.practiceLight,
                  color: "#0a5b35", fontSize: 15, fontWeight: 800,
                  cursor: "pointer", fontFamily: font,
                  display: "flex", alignItems: "center", justifyContent: "center", gap: 6,
                }}
              >
                <Icon name="check" size={18} color="#0a5b35" />私の勝ち
              </button>
              <button
                type="button"
                onClick={() => handleTbSubmit("opp")}
                style={{
                  flex: 1, minHeight: 54, borderRadius: 10,
                  border: `1.5px solid ${C.error}`, background: C.errorLight,
                  color: "#a31511", fontSize: 15, fontWeight: 800,
                  cursor: "pointer", fontFamily: font,
                  display: "flex", alignItems: "center", justifyContent: "center", gap: 6,
                }}
              >
                <Icon name="check" size={18} color="#a31511" />相手の勝ち
              </button>
            </div>
          </div>
        );
      })()}

      {/* 次のゲーム入力 (ボタン 54px、間隙 10px、AAA)
          リク 30-e Phase A: 試合終了 (matchEnded) かつ非展開 (expandedAfterEnd=false) の時は + ボタンを隠す
          リク 30-e Phase B: TB 状態 (isInTB) の時も + ボタンを隠して TB banner に切替 */}
      {!pending && !(matchEnded && !expandedAfterEnd) && !tbState.isInTB && (
        <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
          <span style={{ fontSize: 12, color: C.textSecondary, minWidth: 84 }}>次のゲーム:</span>
          <button
            type="button"
            onClick={() => handleAddGame("me")}
            style={{
              flex: 1, minHeight: 54, borderRadius: 10,
              border: `1.5px solid ${C.practiceAccent}`, background: C.practiceLight,
              color: "#0a5b35", fontSize: 15, fontWeight: 800, cursor: "pointer",
              display: "flex", alignItems: "center", justifyContent: "center", gap: 6,
              fontFamily: font,
            }}
          >
            <Icon name="check" size={18} color="#0a5b35" /> 私 ✓
          </button>
          <button
            type="button"
            onClick={() => handleAddGame("opp")}
            style={{
              flex: 1, minHeight: 54, borderRadius: 10,
              border: `1.5px solid ${C.error}`, background: C.errorLight,
              color: "#a31511", fontSize: 15, fontWeight: 800, cursor: "pointer",
              display: "flex", alignItems: "center", justifyContent: "center", gap: 6,
              fontFamily: font,
            }}
          >
            <Icon name="check" size={18} color="#a31511" /> 相手 ✓
          </button>
          {games.length > 0 && (
            <button
              type="button"
              onClick={handleUndo}
              aria-label="直近のゲームを撤回"
              title="直近撤回"
              style={{
                minWidth: 54, minHeight: 54, borderRadius: 10,
                border: `1px solid ${C.border}`, background: C.panel,
                color: C.textSecondary, fontSize: 15, cursor: "pointer", fontFamily: font,
              }}
            >↩</button>
          )}
        </div>
      )}

      {/* 注釈: 奇数ゲーム後に CO 自動発動 */}
      <div style={{ fontSize: 10, color: C.textSecondary, lineHeight: 1.5, padding: "6px 8px", background: C.panel, borderRadius: 4, marginTop: 6 }}>
        CO は<b style={{ color: C.text }}>奇数ゲーム後</b>に自動発動（1, 3, 5, 7, 9, 11G）。各行タップで修正可。
      </div>

      {/* pending CO モーダル (奇数ゲーム後の自動発動) */}
      <_gtCOModal
        open={!!pending}
        initial={pending}
        onSave={handlePendingSave}
        onSkip={handlePendingSkip}
        onClose={handlePendingSkip}
        isEditMode={false}
      />

      {/* 既存 CO 編集モーダル (CO 行タップ) */}
      <_gtCOModal
        open={!!editing}
        initial={editing}
        onSave={handleEditSave}
        onDelete={handleEditDelete}
        onClose={() => setEditing(null)}
        isEditMode={true}
      />
    </div>
  );
}

// === src/ui/sessions/LinkedSessionPicker.jsx ===
// LinkedSessionPicker — 試打 (trial) の linkedPracticeId / linkedMatchId 張替セレクタ
//
// 役割:
//   - 試打編集画面で「連携先 (任意)」セクションに表示
//   - 既存リンクがある場合は紫カードで表示、× で解除
//   - 新規追加ボタンで全 practices / 全 tournament[].matches から候補を選択
//   - 誤った自動リンク (QuickTrial 同日マッチ判定) を手動修正できる動線
//
// props:
//   linkedPracticeId, linkedMatchId: 現在の値
//   practices: 全 practice 配列
//   tournaments: 全 tournament 配列 (matches[] 抽出に必要)
//   onChange({ linkedPracticeId, linkedMatchId }): 変更通知
//
// 罠:
//   - linkedMatchId は match.id 単位、tournament.id ではない (v3 互換)
//   - 1 試打に対して practice / match 同時リンクは可 (両方 set される運用も v3 にあった)

// 既存リンクを 1 件のオブジェクトに解決
function _lpResolveLink({ linkedPracticeId, linkedMatchId, practices, tournaments }) {
  const out = { practice: null, matchInfo: null };
  if (linkedPracticeId) {
    out.practice = (practices || []).find(p => p.id === linkedPracticeId) || null;
  }
  if (linkedMatchId) {
    for (const t of (tournaments || [])) {
      const matches = Array.isArray(t.matches) ? t.matches : [];
      const m = matches.find(mm => mm.id === linkedMatchId);
      if (m) {
        out.matchInfo = { tournament: t, match: m };
        break;
      }
    }
  }
  return out;
}

// 連携先選択シート (画面下からせり上がる)
function _lpPickerSheet({ open, mode, practices, tournaments, onPick, onClose }) {
  const trapRef = useFocusTrap(open); // Round 5 a11y: focus trap (再点検追加)
  if (!open) return null;
  // mode === "practice" or "match" でフィルタ
  let candidates = [];
  if (mode === "practice") {
    candidates = (practices || []).slice().sort((a, b) => normDate(b.date).localeCompare(normDate(a.date)));
    candidates = candidates.map(p => ({
      key: `p-${p.id}`,
      kind: "practice",
      label: p.title || p.venue || "(無題の練習)",
      sub: `${(p.type || "練習")} ・ ${fmtDate(p.date)} ・ ${p.venue || ""}`,
      pick: () => onPick({ practice: p }),
    }));
  } else if (mode === "match") {
    const list = [];
    (tournaments || []).forEach(t => {
      const matches = Array.isArray(t.matches) ? t.matches : [];
      matches.forEach(m => {
        list.push({
          key: `m-${m.id}`,
          kind: "match",
          label: `${t.name || "(無題の大会)"} - ${m.round || "試合"}`,
          sub: `${m.opponent ? "vs " + m.opponent : "対戦相手未入力"} ・ ${fmtDate(t.date)} ・ ${m.result || ""}`,
          pick: () => onPick({ matchInfo: { tournament: t, match: m } }),
        });
      });
    });
    list.sort((a, b) => 0); // 既にトーナメント単位、UI 単純化のため特に並び替えしない
    candidates = list;
  }

  return (
    <div
      role="dialog"
      aria-modal="true"
      aria-label="連携先を選択"
      onClick={(e) => { if (e.target === e.currentTarget) onClose && onClose(); }}
      style={{
        position: "fixed", inset: 0, background: "rgba(0,0,0,0.4)", zIndex: 1300,
        display: "flex", alignItems: "flex-end", justifyContent: "center",
      }}
    >
      <div ref={trapRef} style={{
        background: C.panel, borderRadius: "16px 16px 0 0",
        width: "100%", maxWidth: 500, maxHeight: "70vh",
        display: "flex", flexDirection: "column",
        animation: "drawerEnter 250ms ease-out",
      }}>
        <div style={{ width: 40, height: 4, background: C.border, borderRadius: 2, margin: "8px auto 4px" }} />
        <div style={{ display: "flex", alignItems: "center", padding: "8px 8px 8px 16px", borderBottom: `1px solid ${C.divider}` }}>
          <div style={{ flex: 1, fontSize: 15, fontWeight: 600, color: C.text }}>
            {mode === "practice" ? "連携練習を選択" : "連携試合を選択"}
          </div>
          <button onClick={onClose} aria-label="閉じる" style={{
            width: 40, height: 40, display: "inline-flex", alignItems: "center", justifyContent: "center",
            border: "none", background: "transparent", cursor: "pointer", color: C.textSecondary, padding: 0, borderRadius: 8,
          }}>
            <Icon name="x" size={22} color={C.textSecondary} />
          </button>
        </div>
        <div style={{ flex: 1, overflow: "auto" }}>
          {candidates.length === 0 ? (
            <div style={{ padding: "24px 16px", textAlign: "center", fontSize: 13, color: C.textMuted }}>
              候補がありません
            </div>
          ) : candidates.map(c => (
            <_lpCandidateRow key={c.key} kind={c.kind} label={c.label} sub={c.sub} onPick={c.pick} />
          ))}
        </div>
      </div>
    </div>
  );
}

// メイン: 既存リンク表示 + 解除 + 追加ボタン
// F-A4 (Phase A 監査): UX4 で linkedMatchId 単数 → linkedMatchIds[] 配列に移行したが、
//   onChange で配列を更新していなかったため cascade.js が古い配列を参照していた。
//   全 onChange で linkedMatchId と linkedMatchIds の両方を整合させる。
function LinkedSessionPicker({ linkedPracticeId, linkedMatchId, practices, tournaments, onChange }) {
  const [pickerMode, setPickerMode] = useState(null); // "practice" | "match" | null
  const { practice, matchInfo } = _lpResolveLink({ linkedPracticeId, linkedMatchId, practices, tournaments });

  // 単数 linkedMatchId から配列 linkedMatchIds を導出 (空文字なら空配列)
  const _toIds = (id) => id ? [id] : [];

  const handlePick = (picked) => {
    if (picked.practice) {
      onChange({ linkedPracticeId: picked.practice.id, linkedMatchId: linkedMatchId || "", linkedMatchIds: _toIds(linkedMatchId) });
    } else if (picked.matchInfo) {
      const newMatchId = picked.matchInfo.match.id;
      onChange({ linkedPracticeId: linkedPracticeId || "", linkedMatchId: newMatchId, linkedMatchIds: _toIds(newMatchId) });
    }
    setPickerMode(null);
  };

  const handleClearPractice = () => onChange({ linkedPracticeId: "", linkedMatchId: linkedMatchId || "", linkedMatchIds: _toIds(linkedMatchId) });
  const handleClearMatch = () => onChange({ linkedPracticeId: linkedPracticeId || "", linkedMatchId: "", linkedMatchIds: [] });

  return (
    <div>

        紐づける練習または試合を選択。誤リンクの張替も可能。
