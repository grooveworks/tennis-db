<!-- S17 code splitting 段階 1 (2026-05-10): heavy bundle on-demand loader -->
<!-- - Plan タブ初回表示時に PlanTabLoader (app.jsx) が window.loadHeavy() を呼ぶ -->
<!-- - Promise キャッシュで二重読込防止 -->
<!-- - cache busting: window.__TennisDBCore.APP_VERSION (= core 末尾 bridge で公開) を ?v= に付与 -->
<!-- - 失敗時は __loadHeavyPromise を null にリセットして再試行可能にする -->
<script>
window.__loadHeavyPromise = null;
window.loadHeavy = function() {
  if (window.__loadHeavyPromise) return window.__loadHeavyPromise;
  window.__loadHeavyPromise = new Promise(function(resolve, reject) {
    var v = (window.__TennisDBCore && window.__TennisDBCore.APP_VERSION) || "0";
    var s = document.createElement("script");
    s.src = "./bundle-heavy.js?v=" + encodeURIComponent(v);
    s.async = true;
    s.onload = function() {
      // S17 段階 2-1 (2026-05-10): heavy bundle に同梱される全 component を成功条件にする
      // 古い bundle-heavy.js キャッシュで部分 expose の場合に Loader が永久 placeholder ループするのを防ぐ
      // 将来 component を追加する場合は && 条件にも追加すること
      if (
        window.__TennisDBHeavy &&
        window.__TennisDBHeavy.PlanTab &&
        window.__TennisDBHeavy.InsightsTab &&
        window.__TennisDBHeavy.QuickTrialMode &&
        window.__TennisDBHeavy.MergeModal &&
        window.__TennisDBHeavy.MergePartnerPicker &&
        window.__TennisDBHeavy.RacketDetailView &&
        window.__TennisDBHeavy.PeriodDetailView &&
        window.__TennisDBHeavy.SettingsModal &&
        window.__TennisDBHeavy.TournamentEditForm &&
        window.__TennisDBHeavy.PracticeEditForm &&
        window.__TennisDBHeavy.TrialEditForm &&
        window.__TennisDBHeavy.MatchEditModal
      ) {
        resolve();
      } else {
        window.__loadHeavyPromise = null;
        reject(new Error("Heavy bundle loaded but required components are not exposed"));
      }
    };
    s.onerror = function() {
      window.__loadHeavyPromise = null;
      reject(new Error("Failed to load heavy bundle"));
    };
    document.head.appendChild(s);
  });
  return window.__loadHeavyPromise;
};
</script>
