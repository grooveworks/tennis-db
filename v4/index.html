      {/* 既存リンク (practice) */}
      {practice && (
        <div style={{
          background: C.practiceLight, border: `1px solid rgba(15,157,88,0.35)`, borderRadius: 10,
          padding: "10px 12px", display: "flex", alignItems: "center", gap: 10, marginBottom: 6,
        }}>
          <Icon name="person-standing" size={18} color={C.practiceAccent} />
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontSize: 13, fontWeight: 600, color: C.text, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
              {practice.title || practice.venue || "(無題の練習)"}
            </div>
            <div style={{ fontSize: 11, color: C.textSecondary }}>
              {(practice.type || "練習")} ・ {fmtDate(practice.date)} ・ {practice.venue || ""}
            </div>
          </div>
          <button onClick={handleClearPractice} aria-label="連携練習を解除" title="解除" style={{
            background: "none", border: "none", cursor: "pointer", padding: 6, display: "flex", borderRadius: 4,
          }}>
            <Icon name="x" size={16} color={C.error} />
          </button>
        </div>
      )}

      {/* 既存リンク (match) */}
      {matchInfo && (
        <div style={{
          background: C.tournamentLight, border: `1px solid rgba(249,171,0,0.35)`, borderRadius: 10,
          padding: "10px 12px", display: "flex", alignItems: "center", gap: 10, marginBottom: 6,
        }}>
          <Icon name="trophy" size={18} color={C.tournamentAccent} />
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontSize: 13, fontWeight: 600, color: C.text, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
              {matchInfo.tournament.name || "(無題の大会)"} - {matchInfo.match.round || "試合"}
            </div>
            <div style={{ fontSize: 11, color: C.textSecondary }}>
              {matchInfo.match.opponent ? "vs " + matchInfo.match.opponent : "対戦相手未入力"} ・ {fmtDate(matchInfo.tournament.date)}
            </div>
          </div>
          <button onClick={handleClearMatch} aria-label="連携試合を解除" title="解除" style={{
            background: "none", border: "none", cursor: "pointer", padding: 6, display: "flex", borderRadius: 4,
          }}>
            <Icon name="x" size={16} color={C.error} />
          </button>
        </div>
      )}

      {/* 追加ボタン (practice / match それぞれ) */}
      <div style={{ display: "flex", gap: 8 }}>
        {!practice && (
          <button
            type="button"
            onClick={() => setPickerMode("practice")}
            style={{
              flex: 1, minHeight: 44, padding: 10, borderRadius: 8,
              border: `1px dashed ${C.practiceAccent}`, background: C.panel, color: C.practiceAccent,
              fontSize: 13, fontWeight: 600, cursor: "pointer",

            }}

            <Icon name="link-2" size={14} color={C.practiceAccent} />連携練習を追加

        {!matchInfo && (
          <button

              flex: 1, minHeight: 44, padding: 10, borderRadius: 8,
              border: `1px dashed ${C.tournamentAccent}`, background: C.panel, color: C.tournamentAccent,
              fontSize: 13, fontWeight: 600, cursor: "pointer",

            }}

        practices={practices}
        tournaments={tournaments}
        onPick={handlePick}

  );
}

// S15.5.9: Match 編集中の auto-save (localStorage 下書き)
//   Safari バックグラウンド破棄や React レンダリングエラーで入力データロストする問題への対処。
//   form の変化のたびに localStorage に下書き保存、Modal 開く時に下書きあれば復元。
//   保存・破棄 (キャンセル) の確定操作で下書きクリア。
const _matchDraftKey = (id) => `${LS_PREFIX}match-draft-${id}-v1`;
const _loadMatchDraft = (id) => {
  if (!id) return null;
  try {
    const v = localStorage.getItem(_matchDraftKey(id));
    if (!v) return null;
    return JSON.parse(v);
  } catch (_) { return null; }
};
const _saveMatchDraft = (id, form) => {
  if (!id) return;
  try { localStorage.setItem(_matchDraftKey(id), JSON.stringify(form)); }
  catch (_) {}
};
const _clearMatchDraft = (id) => {
  if (!id) return;
  try { localStorage.removeItem(_matchDraftKey(id)); } catch (_) {}
};

function MatchEditModal({ open, match, trnType, tournament, racketNames = [], stringNames = [], opponentNames = [], recentSetups = [], confirm, onSave, onClose }) {
  const trapRef = useFocusTrap(open); // Round 5: a11y focus trap
  // リク 30-e (S18): 試合形式を解決 (form.format > tournament.matchFormat > default)
  //   form (state) を見ることで「変更」ボタン操作時に即座に効く。useMemo はキャッシュ。
  //   helpers が format に応じてセット完了判定 / 試合勝敗判定を変える。
  // 注: form は下で初期化されるため、ここでは関数内で参照するだけ (lexical scope)
  // S15.5.9: 起動時に下書きがあればそちらを優先
  const [form, setForm] = useState(() => {
    if (!match || !match.id) return match;
    const draft = _loadMatchDraft(match.id);
    return draft || match;
  });
  const [dirty, setDirty] = useState(() => match?.id ? _loadMatchDraft(match.id) !== null : false);
  const [restored, setRestored] = useState(() => match?.id ? _loadMatchDraft(match.id) !== null : false);

  // リク 30-e (S18): 試合形式の解決 (form.format > tournament.matchFormat > default)
  //   form を直接見るため、preset 切替・1-1 10pt TB トグルの影響が即座に反映
  const effectiveFormat = useMemo(
    () => resolveMatchFormat(form, tournament),
    [form?.format, tournament?.matchFormat]
  );

  // open のたびに最新の match を反映 (別 match を編集する時の対応、S15.5.9 で下書き優先)
  useEffect(() => {
    if (!open) return;
    const draft = match?.id ? _loadMatchDraft(match.id) : null;
    if (draft) {
      setForm(draft);
      setDirty(true);     // 下書きあり = 未保存とみなす (キャンセル時 confirm 経由)
      setRestored(true);
    } else {
      setForm(match);
      setDirty(false);
      setRestored(false);
    }
  }, [open, match?.id]);

  // S15.5.9: form 変化のたびに localStorage に auto-save (dirty な間のみ)
  //   debounce なし即時、Match の form は数 KB なので localStorage 書き込みは高速
  useEffect(() => {
    if (!open || !form || !form.id || !dirty) return;
    _saveMatchDraft(form.id, form);
  }, [open, form, dirty]);

  // 未保存変更がある時は閉じる前に確認 (S15.5.9: 確定で下書きクリア)
  const handleClose = useCallback(() => {
    const clearDraft = () => { if (form?.id) _clearMatchDraft(form.id); };
    if (!dirty) { clearDraft(); onClose && onClose(); return; }
    if (!confirm) { clearDraft(); onClose && onClose(); return; }
    confirm.ask(
      "編集内容が保存されていません。破棄してよろしいですか？",
      () => { clearDraft(); onClose && onClose(); },
      { title: "未保存の変更があります", yesLabel: "破棄する", noLabel: "編集に戻る", yesVariant: "danger", icon: "triangle-alert" }
    );
  }, [dirty, confirm, onClose, form]);

  // S15.5.9: 保存ボタン (下書きクリア + 親に渡す)
  // S16.11 F5: 必須項目 validation (空 form 保存防止) — opponent と result が必須
  //   - 空の場合は保存ボタン無効化 + toast 警告
  const _isMatchValid = (f) => {
    if (!f) return false;
    if (!(f.opponent || "").trim()) return false;
    if (!(f.result || "").trim()) return false;
    return true;
  };
  const handleSaveClick = useCallback(() => {
    if (!_isMatchValid(form)) {
      // toast がない場合は handleSaveClick を caller 側 (onSave 内) で警告するが、ここで disabled にしているので通常は到達しない
      return;
    }
    if (form?.id) _clearMatchDraft(form.id);
    onSave && onSave(form);
  }, [form, onSave]);

  // S15.5.9: GameTracker からの onChange を dirty 追跡 + auto-save 連動
  //   従来 onChange={setForm} で dirty が立たず auto-save も走らなかったバグの解消
  // H-17 (Phase A 監査): result 手動変更後の自動上書き抑止フラグを useRef で保持。
  //   useState/form に乗せると Firestore に永続化されてしまうため、UI-only の状態として ref で管理。
  //   open=true 切替 (新規モーダル起動) でリセット。
  const manualResultLockRef = useRef(false);
  useEffect(() => {
    if (open) manualResultLockRef.current = false; // モーダル起動時にクリア
  }, [open]);

  // S16.11 UX2/UX3: games[] 変化時に setScores と result を自動計算して反映
  //   - games から計算したセットスコアを setScores に同期 (重複入力撤廃)
  //   - 2 セット先取で result を自動 "勝利" / "敗北" 設定
  // H-17: manualResultLockRef.current が true なら自動上書きを完全に skip
  //   旧の `next.result === autoResult` 条件は、手動敗北→games で勝利に偏っても上書きされない
  //   という偶然動作。今は「手動で result を選んだ後は二度と自動上書きしない」明確な仕様。
  const handleGameTrackerChange = useCallback((next) => {
    const games = Array.isArray(next.games) ? next.games : [];
    // リク 30-e (S18): format 渡して、4ゲーム先取/6ゲーム先取/1セット/3セット+10ptTB の各形式に対応
    const baseSetScores = computeSetScoresFromGames(games, effectiveFormat);
    // リク 30-e Phase B (S18): tbDetails を適用して "7-6(5)" / "10-7" 等の詳細表記に変換
    const tbDetails = Array.isArray(next.tbDetails) ? next.tbDetails : [];
    const autoSetScores = applyTbDetails(baseSetScores, tbDetails);
    const autoResult = computeAutoMatchResult(games, effectiveFormat);
    const merged = { ...next, setScores: autoSetScores };
    if (autoResult && !manualResultLockRef.current) {
      merged.result = autoResult;
    }
    setForm(merged);
    setDirty(true);
  }, [effectiveFormat]);

  // リク 30-e Phase A (S18): GameTracker に渡す「試合終了」フラグ
  //   computeAutoMatchResult が "勝利" / "敗北" を返したら終了。
  //   棄権 (手動で result 設定) は対象外 (games による自動判定のみ)
  const matchEnded = useMemo(() => {
    if (!form?.games || form.games.length === 0) return false;
    const r = computeAutoMatchResult(form.games, effectiveFormat);
    return r === "勝利" || r === "敗北";
  }, [form?.games, effectiveFormat]);

  // Esc で閉じる (未保存確認経由)
  useEffect(() => {
    if (!open) return;
    const handler = (e) => { if (e.key === "Escape") handleClose(); };
    document.addEventListener("keydown", handler);
    return () => document.removeEventListener("keydown", handler);
  }, [open, handleClose]);

  if (!open || !form) return null;

  // setter で dirty フラグを立てる
  // H-17: result の手動変更時に manualResultLockRef を立てて自動上書きを抑止
  const set = (k, v) => {
    if (k === "result") manualResultLockRef.current = true;
    setForm(p => ({ ...p, [k]: v }));
    setDirty(true);
  };
  const setScoresInput = Array.isArray(form.setScores) ? form.setScores.join(", ") : (form.setScores || "");
  const isDouble = trnType === "doubles" || trnType === "mixed";
  const showOpponent2 = isDouble;

  // リク 30-e (S18): 試合形式 override UI 用 state
  //   form.format=null = 大会から継承、object = 試合ごとに上書き
  const isOverridden = !!form.format;
  const inheritedFormat = tournament?.matchFormat || DEFAULT_MATCH_FORMAT;
  const handleFormatPresetChange = (preset) => {
    if (!preset) {
      // 「大会に従う」= override 解除
      setForm(p => ({ ...p, format: null }));
      setDirty(true);
      return;
    }
    // 3set の finalSetMode は既存 form.format から引き継ぐ (既に override 中の場合)
    const finalSetMode = form.format?.finalSetMode || "normal";
    setForm(p => ({ ...p, format: formatFromPreset(preset, finalSetMode, p.format?.noAd || false) }));
    setDirty(true);
  };
  const handleFinalSetModeToggle = (checked) => {
    // 3set + match.format がある時だけ意味がある
    if (!form.format || form.format.preset !== "3set") return;
    const next = formatFromPreset("3set", checked ? "matchTiebreak10" : "normal", form.format.noAd || false);
    setForm(p => ({ ...p, format: next }));
    setDirty(true);
  };

  return (
    <div
      role="dialog"
      aria-modal="true"
      aria-label="試合を編集"
      onClick={(e) => { if (e.target === e.currentTarget) handleClose(); }}
      style={{
        position: "fixed", inset: 0, background: "rgba(0,0,0,0.4)", zIndex: 1100,
        display: "flex", alignItems: "flex-start", justifyContent: "center",
        padding: "20px 12px", overflowY: "auto",
      }}
    >
      <div ref={trapRef} style={{
        background: C.panel, borderRadius: 16, padding: 18,
        maxWidth: 480, width: "100%",
      }}>
        {/* ヘッダ */}
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
          <span style={{ fontSize: 14, fontWeight: 700, color: C.text }}>試合の詳細を記録</span>
          <button onClick={handleClose} aria-label="閉じる" style={{ background: "none", border: "none", color: C.textSecondary, cursor: "pointer", padding: 4, display: "flex" }}>
            <Icon name="x" size={18} color={C.textSecondary} />
          </button>
        </div>

        {/* S15.5.9: 下書き復元バナー (Safari 破棄/クラッシュ後の再開時) */}
        {restored && (
          <div style={{
            background: C.warningLight, color: "#7e5d00",
            border: `1px solid ${C.warning}`,
            padding: "8px 10px", borderRadius: 8,
            fontSize: 12, marginBottom: 12, lineHeight: 1.5,
            display: "flex", alignItems: "flex-start", gap: 8,
          }}>
            <Icon name="info" size={14} color="#7e5d00" style={{ flexShrink: 0, marginTop: 2 }} />
            <div style={{ flex: 1 }}>
              <b>下書きを復元しました</b><br />
              前回の編集が保存されずに中断された内容です。続けるか、不要なら「キャンセル」で破棄してください。
            </div>
            <button
              onClick={() => setRestored(false)}
              aria-label="この通知を閉じる"
              style={{
                background: "none", border: "none", color: "#7e5d00",
                cursor: "pointer", padding: 2, flexShrink: 0,
              }}
            >
              <Icon name="x" size={14} color="#7e5d00" />
            </button>
          </div>
        )}

        {/* リクエスト 30-c (preview_req30c_p1.html 案 X 承認済): 順序再配置
              ① 基本 → ② スコア (セットスコア + GameTracker をまとめる) →
              ③ コンディション (メンタル/フィジカル) → ④ 機材 → ⑤ メモ
            旧: スコアと GameTracker の間にメンタル/機材が挟まり情報分断 */}

        {/* ① 基本: ラウンド / 結果 / 対戦相手 */}
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0 10px" }}>
          <Select label="ラウンド" value={form.round || "1回戦"} onChange={(v) => set("round", v)} options={ROUND_OPTS} />
          <Select label="結果" value={form.result ?? ""} onChange={(v) => set("result", v)} options={RESULT_OPTS} />
        </div>
        <MasterField label="対戦相手" value={form.opponent || ""} onChange={(v) => set("opponent", v)} masterValues={opponentNames} placeholder="-- 対戦相手を選択 --" />
        {showOpponent2 && (
          <MasterField label="対戦相手 2 (ダブルス)" value={form.opponent2 || ""} onChange={(v) => set("opponent2", v)} masterValues={opponentNames} placeholder="-- 対戦相手 2 を選択 --" />
        )}

        {/* リク 30-e (S18): 試合形式 セクション (大会から継承 + 必要なら上書き)
            プリセット 4 つ + 「大会に従う」 + 3set 時の 1-1 10pt TB トグル */}
        <div style={{
          background: C.bg, border: `1px solid ${C.divider}`,
          borderRadius: 10, padding: "10px 12px", marginTop: 10, marginBottom: 10,
        }}>
          <div style={{
            display: "flex", alignItems: "center", justifyContent: "space-between",
            marginBottom: 8,
          }}>
            <div style={{
              fontSize: 11, fontWeight: 700, color: C.primary,
              display: "inline-flex", alignItems: "center", gap: 4,
            }}>
              <Icon name="trophy" size={13} color={C.primary} />試合形式
            </div>
            <span style={{
              fontSize: 10, fontWeight: 600,
              padding: "2px 6px", borderRadius: 4,
              background: isOverridden ? C.warningLight : C.primaryLight,
              color: isOverridden ? "#7e5d00" : C.primary,
            }}>
              {isOverridden ? "この試合のみ上書き" : "大会から継承"}
            </span>
          </div>
          <div style={{ fontSize: 13, fontWeight: 600, color: C.text, marginBottom: 2 }}>
            {formatLabel(effectiveFormat)}
          </div>
          <div style={{ fontSize: 11, color: C.textMuted, lineHeight: 1.5, marginBottom: 8 }}>
            {formatRuleSummary(effectiveFormat)}
          </div>
          {/* プリセットボタン行 */}
          <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
            {[
              { v: null,    l: "大会に従う" },
              { v: "1set",  l: "1セット" },
              { v: "3set",  l: "3セット" },
              { v: "6game", l: "6ゲーム先取" },
              { v: "4game", l: "4ゲーム先取" },
            ].map(opt => {
              const active = opt.v === null ? !isOverridden : (form.format?.preset === opt.v);
              return (
                <button
                  key={opt.l}
                  type="button"
                  onClick={() => handleFormatPresetChange(opt.v)}
                  style={{
                    minHeight: 36, padding: "6px 10px",
                    borderRadius: 8,
                    border: `1px solid ${active ? C.primary : C.border}`,
                    background: active ? C.primary : C.panel,
                    color: active ? "#fff" : C.text,
                    fontSize: 12, fontWeight: 600,
                    cursor: "pointer", fontFamily: font,
                  }}

          {/* 3set 上書き時のみ: 1-1 で 10pt TB トグル */}
          {isOverridden && form.format?.preset === "3set" && (
            <label style={{
              display: "flex", alignItems: "center", gap: 8,
              marginTop: 10, padding: "8px 10px",
              background: C.primaryLight, border: `1px solid ${C.primary}`,
              borderRadius: 8, cursor: "pointer",
            }}>
              <input
                type="checkbox"
                checked={form.format.finalSetMode === "matchTiebreak10"}
                onChange={(e) => handleFinalSetModeToggle(e.target.checked)}
                style={{ width: 18, height: 18, accentColor: C.primary, margin: 0 }}
              />
              <span style={{ fontSize: 12, color: C.text, fontWeight: 500 }}>
                最終セット (1-1) は 10 ポイントマッチタイブレークで決着
              </span>

        </div>

        {/* ② スコア (セットスコア + ゲーム単位記録) — 関連グループとして枠で囲う */}
        <div style={{
          background: C.bg, border: `1px solid ${C.divider}`,
          borderRadius: 10, padding: "10px 12px", marginTop: 10, marginBottom: 10,
        }}>
          <div style={{

            display: "inline-flex", alignItems: "center", gap: 4, marginBottom: 8,
          }}>
            <Icon name="trophy" size={13} color={C.primary} />スコア

          <Input
            label="セットスコア"
            value={setScoresInput}
            onChange={(v) => set("setScores", v.split(",").map(s => s.trim()).filter(Boolean))}
            placeholder="例: 6-3, 6-4"
          />
          {/* matchStats が CSV 取込済みの場合の注記 (S11 範囲外、表示のみ) */}
          {form.matchStats && form.matchStats.stats && (
            <div style={{
              fontSize: 11, color: "#7e5d00", background: C.warningLight,
              border: `1px solid ${C.warning}`, borderRadius: 6,
              padding: "6px 10px", marginBottom: 10,
              display: "flex", alignItems: "center", gap: 6,
            }}>
              <Icon name="bar-chart-3" size={13} color="#7e5d00" />
              <span><b>データテニス CSV 取込済み</b> ({form.matchStats?.points?.length || 0} ポイント)。スタッツ編集はスコープ外（CSV 再取込で更新）</span>
            </div>
          )}
          {/* ゲーム単位記録 (F1.4.1)、S15.5.9 で onChange を dirty 追跡型に変更
              リク 30-e Phase A: matchEnded prop で試合終了状態を伝達
              リク 30-e Phase B: format prop で TB 状態検知 (6-6 / 1-1) */}
          <GameTracker match={form} onChange={handleGameTrackerChange} confirm={confirm} matchEnded={matchEnded} format={effectiveFormat} />
        </div>

        {/* ③ コンディション (メンタル / フィジカル) */}
        <div style={{
          background: C.bg, border: `1px solid ${C.divider}`,
          borderRadius: 10, padding: "10px 12px", marginBottom: 10,
        }}>
          <div style={{
            fontSize: 11, fontWeight: 700, color: C.success,
            display: "inline-flex", alignItems: "center", gap: 4, marginBottom: 8,
          }}>
            <Icon name="pulse" size={13} color={C.success} />コンディション
          </div>
          <_meRatingRow label="メンタル" value={form.mental || 3} onChange={(n) => set("mental", n)} />
          <_meRatingRow label="フィジカル" value={form.physical || 3} onChange={(n) => set("physical", n)} />
        </div>

        {/* ④ 機材 — ラケット 1 行 / 縦糸+横糸 / テンション縦+横 */}
        <div style={{
          background: C.bg, border: `1px solid ${C.divider}`,
          borderRadius: 10, padding: "10px 12px", marginBottom: 10,
        }}>
          <div style={{
            fontSize: 11, fontWeight: 700, color: C.trialAccent,
            display: "inline-flex", alignItems: "center", gap: 4, marginBottom: 8,
          }}>
            <Icon name="backpack" size={13} color={C.trialAccent} />機材
          </div>
          <MasterField label="ラケット" value={form.racketName || ""} onChange={(v) => set("racketName", v)} masterValues={racketNames} placeholder="-- ラケットを選択 --" />
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0 10px" }}>
            <MasterField label="縦糸" value={form.stringMain || ""} onChange={(v) => set("stringMain", v)} masterValues={stringNames} placeholder="-- 縦糸を選択 --" />
            <MasterField label="横糸" value={form.stringCross || ""} onChange={(v) => set("stringCross", v)} masterValues={stringNames} placeholder="-- 同じなら空欄 --" />
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0 10px" }}>
            <Input label="テンション縦" value={form.tensionMain || ""} onChange={(v) => set("tensionMain", v)} placeholder="46" />
            <Input label="テンション横" value={form.tensionCross || ""} onChange={(v) => set("tensionCross", v)} placeholder="43" />
          </div>
          {/* S16.11 UX5: 履歴セット picker (5 フィールド一括入力で 90 秒チェンジオーバー対応) */}
          <_SetupPickerButton
            recent={recentSetups}
            current={form}
            onApply={(s) => {
              if (!s) return;
              setForm(prev => ({
                ...prev,
                racketName: s.racketName || "",
                stringMain: s.stringMain || "",
                stringCross: s.stringCross || "",
                tensionMain: s.tensionMain || "",
                tensionCross: s.tensionCross || "",
              }));
              setDirty(true);
            }}
          />
        </div>

        {/* ⑤ メモ */}
        <div style={{ fontSize: 11, color: C.textMuted, fontWeight: 600, letterSpacing: 0.5, textTransform: "uppercase", marginTop: 14, marginBottom: 4 }}>メモ</div>
        <Textarea label="メンタルメモ" value={form.mentalNote || ""} onChange={(v) => set("mentalNote", v)} placeholder="この試合でのメンタルの状態..." />
        <Textarea label="技術メモ" value={form.techNote || ""} onChange={(v) => set("techNote", v)} placeholder="フォーム、戦術、改善点..." />
        <Textarea label="相手メモ" value={form.opponentNote || ""} onChange={(v) => set("opponentNote", v)} placeholder="相手のスタイル、強かった点..." />
        <Textarea label="総括" value={form.note || ""} onChange={(v) => set("note", v)} placeholder="この試合で学んだこと..." />

        {/* アクション */}
        <div style={{ display: "flex", gap: 8, justifyContent: "flex-end", marginTop: 14 }}>
          <button
            type="button"
            onClick={handleClose}
            style={{
              minHeight: 44, padding: "10px 20px", borderRadius: 8,
              border: `1px solid ${C.border}`, background: C.panel, color: C.textSecondary,
              fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: font,
            }}
          >キャンセル</button>
          <button
            type="button"
            onClick={handleSaveClick}
            disabled={!_isMatchValid(form)}
            title={_isMatchValid(form) ? "保存" : "対戦相手と結果は必須です"}
            style={{
              minHeight: 44, padding: "10px 20px", borderRadius: 8,
              border: "none",
              background: _isMatchValid(form) ? C.primary : C.textMuted,
              color: "#fff",
              fontSize: 13, fontWeight: 700,
              cursor: _isMatchValid(form) ? "pointer" : "not-allowed",
              display: "inline-flex", alignItems: "center", gap: 6, fontFamily: font,
            }}
          >
            <Icon name="save" size={16} color="#fff" />保存
          </button>
        </div>
      </div>
    </div>
  );
}

// === src/ui/sessions/MergeModal.jsx ===
// MergeModal — セッションマージ確定モーダル (S15、2 ステップ式)
//
// 役割:
//   - REQUIREMENTS_v4 F1.10 — 同タイプ 2 件の統合 (A 残し B 削除)
//   - Step 1 (compare): 競合 (赤、ラジオ) → 補完 (緑、自動採用) → 一致/A のみ/両方空 (折り畳み)
//   - Step 2 (confirm): 削除される B / 統合後 A を 2 列で全フィールド比較 + 連携試打 N 件の付け替え通知
//
// props:
//   open:        boolean
//   type:        "tournament" | "practice" | "trial"
//   itemA:       残す側 (Detail で開いている方)
//   itemB:       削除される側 (MergePartnerPicker で選んだ方)
//   trials:      全試打配列 (relink 件数算出用)
//   onConfirm:   (mergedItem, removedItem, choices) => void
//   onCancel:    () => void
//
// 依存: domain/merge.js (computeMergeDiff / applyMerge / countRelinks)、SCHEMA、isEmptyVal

// ── ヘルパー: 値を表示文字列化 (空 / 配列 / オブジェクトを判別)
function _mergeFmtVal(v) {
  if (v === undefined || v === null || v === "") return "(空)";
  if (Array.isArray(v)) return `[${v.length} 件]`;
  if (typeof v === "object") {
    try { return JSON.stringify(v).slice(0, 60); }
    catch { return "(オブジェクト)"; }
  }
  return String(v);
}

// ── ヘルパー: type → 表示ラベル
function _mergeTypeLabel(type) {
  return type === "tournament" ? "大会"
       : type === "practice"   ? "練習"
       : type === "trial"      ? "試打"
       : "セッション";
}

// ── ヘルパー: item → ユーザーに見せる短い名称
function _mergeItemLabel(item, type) {
  if (!item) return "(不明)";
  if (type === "tournament") return item.name || "(無題の大会)";
  if (type === "practice")   return item.title || item.venue || "(無題の練習)";
  if (type === "trial")      return item.racketName || "(ラケット未指定)";
  return "(不明)";
}

// ── ステップインジケータ (1 比較 → 2 確認)
function _MergeStepDot({ active, done, num }) {
  const bg = done ? C.success : (active ? C.primary : C.panel2);
  const color = (done || active) ? "#fff" : C.textMuted;
  return (
    <span style={{
      width: 18, height: 18, borderRadius: "50%",
      background: bg, color: color, fontSize: 11, fontWeight: 700,
      display: "inline-flex", alignItems: "center", justifyContent: "center",
      flexShrink: 0,
    }}>
      {done ? <Icon name="check" size={11} color="#fff" /> : num}
    </span>
  );
}

// ── 競合行 (ラジオ A/B/結合)
function _MergeConflictRow({ conflict, choice, onChange }) {
  const c = conflict;
  return (
    <div style={{
      background: C.errorLight,
      padding: "8px 10px",
      borderRadius: RADIUS.btnSm,
      marginBottom: 4,
      fontSize: 12,
    }}>
      <div style={{ display: "grid", gridTemplateColumns: "84px 1fr 1fr", gap: 6, alignItems: "start" }}>
        <div style={{ fontSize: 11, fontWeight: 600, color: C.textSecondary, paddingTop: 2 }}>{c.label}</div>
        <div style={{ color: C.text, wordBreak: "break-all", lineHeight: 1.45 }}>{_mergeFmtVal(c.aValue)}</div>
        <div style={{ color: C.text, wordBreak: "break-all", lineHeight: 1.45 }}>{_mergeFmtVal(c.bValue)}</div>
      </div>
      <div style={{ marginTop: 8, display: "flex", gap: 6, fontSize: 11, flexWrap: "wrap" }}>
        <_MergeRadioOption name={`r-${c.key}`} checked={choice === "a"} onChange={() => onChange("a")} label="A 採用" />
        <_MergeRadioOption name={`r-${c.key}`} checked={choice === "b"} onChange={() => onChange("b")} label="B 採用" />
        {c.combinable && (
          <_MergeRadioOption name={`r-${c.key}`} checked={choice === "combined"} onChange={() => onChange("combined")} label="結合" />
        )}
      </div>
    </div>
  );
}

function _MergeRadioOption({ name, checked, onChange, label }) {
  return (
    <label style={{
      display: "inline-flex", alignItems: "center", gap: 4, cursor: "pointer",
      padding: "5px 10px", borderRadius: 8,
      border: `1px solid ${checked ? C.primary : C.border}`,
      background: checked ? C.primary : C.panel,
      color: checked ? "#fff" : C.text,
      minHeight: 32,
      fontFamily: font,
      fontSize: 11,
      fontWeight: 500,
    }}>
      <input
        type="radio" name={name} checked={checked} onChange={onChange}
        style={{ margin: 0, cursor: "pointer" }}
      />
      {label}
    </label>
  );
}

// ── 補完行 (B → A 自動採用、緑帯)
function _MergeComplementRow({ comp }) {
  return (
    <div style={{
      background: C.successLight,
      padding: "8px 10px",
      borderRadius: RADIUS.btnSm,
      marginBottom: 4,
      fontSize: 12,
    }}>
      <div style={{ display: "grid", gridTemplateColumns: "84px 1fr 1fr", gap: 6, alignItems: "start" }}>
        <div style={{ fontSize: 11, fontWeight: 600, color: C.textSecondary, paddingTop: 2 }}>{comp.label}</div>
        <div style={{ color: C.textMuted, fontStyle: "italic", lineHeight: 1.45 }}>(空)</div>
        <div style={{
          display: "inline-block",
          background: C.primary, color: "#fff",
          padding: "2px 6px", borderRadius: 6,
          wordBreak: "break-all", lineHeight: 1.45,
          fontWeight: 600,
        }}>{_mergeFmtVal(comp.value)} →</div>
      </div>
    </div>
  );
}

// ── 折り畳み行 (一致 / A のみ値 / 両方空)
function _MergeCollapsedRow({ keyName, label, itemA, itemB }) {
  const av = itemA ? itemA[keyName] : undefined;
  const bv = itemB ? itemB[keyName] : undefined;
  return (
    <div style={{
      background: C.panel2,
      padding: "6px 10px",
      borderRadius: RADIUS.btnSm,
      marginBottom: 3,
      fontSize: 11,
    }}>
      <div style={{ display: "grid", gridTemplateColumns: "84px 1fr 1fr", gap: 6, alignItems: "start" }}>
        <div style={{ fontSize: 10, color: C.textSecondary, paddingTop: 1 }}>{label}</div>
        <div style={{ color: isEmptyVal(av) ? C.textMuted : C.text, lineHeight: 1.4, fontStyle: isEmptyVal(av) ? "italic" : "normal" }}>{_mergeFmtVal(av)}</div>
        <div style={{ color: isEmptyVal(bv) ? C.textMuted : C.text, lineHeight: 1.4, fontStyle: isEmptyVal(bv) ? "italic" : "normal" }}>{_mergeFmtVal(bv)}</div>
      </div>
    </div>
  );
}

// ── 確認画面の片方カラム (削除される B / 統合後 A)
function _MergeFinalCol({ title, tone, item, type, highlightFromB, highlightConflictB }) {
  const isRemoved = tone === "removed";
  const fields = SCHEMA[type] || [];
  const fromBSet = new Set(highlightFromB || []);
  const conflictBSet = new Set(highlightConflictB || []);
  return (
    <div style={{
      borderRadius: RADIUS.row, padding: 10,
      border: `1px solid ${isRemoved ? C.error : C.primary}`,
      background: isRemoved ? "#fff5f5" : "#f5fbff",
    }}>
      <div style={{
        fontSize: 11, fontWeight: 700, marginBottom: 8,
        color: isRemoved ? C.error : C.primary,
        display: "flex", alignItems: "center", gap: 4,
      }}>
        <Icon name={isRemoved ? "trash" : "circle-check"} size={14} color={isRemoved ? C.error : C.primary} />
        {title}
      </div>
      <dl style={{ margin: 0, fontSize: 11 }}>
        {fields.map(f => {
          const v = item ? item[f.key] : undefined;
          if (f.key === "matches") {
            const cnt = Array.isArray(v) ? v.length : 0;
            return (
              <React.Fragment key={f.key}>
                <dt style={{ color: C.textSecondary, fontSize: 10, marginTop: 6, textTransform: "uppercase", letterSpacing: "0.04em" }}>{f.label}</dt>
                <dd style={{ margin: "1px 0 0", color: cnt === 0 ? C.textMuted : C.text, fontStyle: cnt === 0 ? "italic" : "normal" }}>
                  {cnt === 0 ? "(なし)" : `${cnt} 件`}
                </dd>
              </React.Fragment>
            );
          }
          const empty = isEmptyVal(v);
          let valColor = empty ? C.textMuted : C.text;
          let valWeight = "normal";
          if (!isRemoved && !empty) {
            if (fromBSet.has(f.key)) { valColor = C.success; valWeight = "bold"; }
            else if (conflictBSet.has(f.key)) { valColor = C.primary; valWeight = "bold"; }
          }
          return (
            <React.Fragment key={f.key}>
              <dt style={{ color: C.textSecondary, fontSize: 10, marginTop: 6, textTransform: "uppercase", letterSpacing: "0.04em" }}>{f.label}</dt>
              <dd style={{
                margin: "1px 0 0",
                color: valColor, fontWeight: valWeight,
                fontStyle: empty ? "italic" : "normal",
                wordBreak: "break-all",
                lineHeight: 1.4,
              }}>{_mergeFmtVal(v)}</dd>
            </React.Fragment>
          );
        })}
      </dl>
    </div>
  );
}

// ── 本体
function MergeModal({ open, type, itemA, itemB, trials, onConfirm, onCancel }) {
  const trapRef = useFocusTrap(open); // Round 5: a11y focus trap
  const [step, setStep] = useState("compare");
  const [choices, setChoices] = useState({});
  const [showCollapsed, setShowCollapsed] = useState(false);

  // open / itemB 切替時にリセット (競合のデフォルト = "a")
  useEffect(() => {
    if (open && itemA && itemB) {
      setStep("compare");
      const diff = computeMergeDiff(itemA, itemB, type);
      const init = {};
      diff.conflicts.forEach(c => { init[c.key] = "a"; });
      setChoices(init);
      setShowCollapsed(false);
    }
  }, [open, itemA && itemA.id, itemB && itemB.id, type]);

  // Esc キー
  useEffect(() => {
    if (!open) return;
    const handler = (e) => { if (e.key === "Escape") onCancel && onCancel(); };
    document.addEventListener("keydown", handler);
    return () => document.removeEventListener("keydown", handler);
  }, [open, onCancel]);

  // Round 5 Batch A: 重い計算を useMemo でキャッシュ (choices の radio 変化ごとの再計算回避)
  //   diff は itemA/itemB/type が変化しなければ再計算不要 (choices 変更で diff は変わらない)
  //   merged は choices も依存
  //   relinkCount は trials/itemB/type に依存
  const diff = useMemo(
    () => (open && itemA && itemB) ? computeMergeDiff(itemA, itemB, type) : null,
    [open, itemA?.id, itemB?.id, type]
  );
  const merged = useMemo(
    () => (open && itemA && itemB) ? applyMerge(itemA, itemB, choices, type) : null,
    [open, itemA?.id, itemB?.id, choices, type]
  );
  const relinkCount = useMemo(
    () => (open && itemB) ? countRelinks(trials || [], itemB, type) : 0,
    [open, trials, itemB?.id, type]
  );

  if (!open || !itemA || !itemB) return null;

  const typeLabel = _mergeTypeLabel(type);
  const removedLabel = _mergeItemLabel(itemB, type);
  const keptLabel = _mergeItemLabel(itemA, type);

  // 補完: B → A のみ表示。A のみ値あり (from=a) は折りたたみ行きへ
  const complementFromB = diff.complement.filter(c => c.from === "b");
  const collapsedItems = [
    ...diff.match.map(m => ({ key: m.key, label: m.label })),
    ...diff.complement.filter(c => c.from === "a").map(c => ({ key: c.key, label: c.label })),
  ];

  // ── Step 1: 比較ビュー
  const renderCompare = () => (
    <>
      <div style={{
        display: "grid", gridTemplateColumns: "84px 1fr 1fr", gap: 6,
        padding: "6px 10px", fontSize: 10, fontWeight: 700, color: C.textSecondary,
        borderBottom: `1px solid ${C.divider}`, marginBottom: 8,
        position: "sticky", top: 0, background: C.panel, zIndex: 1,
      }}>
        <div>項目</div>
        <div style={{ color: C.primary }}>A (残す)</div>
        <div style={{ color: C.error }}>B (削除)</div>
      </div>

      {/* 競合 */}
      {diff.conflicts.length > 0 && (
        <div style={{ marginBottom: 14 }}>
          <div style={{
            fontSize: 11, fontWeight: 700, color: C.error,
            marginBottom: 6, display: "flex", alignItems: "center", gap: 6,
            textTransform: "uppercase", letterSpacing: "0.04em",
          }}>
            <Icon name="warning" size={14} color={C.error} />
            競合 {diff.conflicts.length} 件 — 選択してください
          </div>
          {diff.conflicts.map(c => (
            <_MergeConflictRow
              key={c.key}
              conflict={c}
              choice={choices[c.key] || "a"}
              onChange={(val) => setChoices(prev => ({ ...prev, [c.key]: val }))}
            />
          ))}
        </div>
      )}

      {/* 補完 (B → A、自動) */}
      {complementFromB.length > 0 && (
        <div style={{ marginBottom: 14 }}>
          <div style={{
            fontSize: 11, fontWeight: 700, color: C.success,
            marginBottom: 6, display: "flex", alignItems: "center", gap: 6,
            textTransform: "uppercase", letterSpacing: "0.04em",
          }}>
            <Icon name="plus-circle" size={14} color={C.success} />
            補完 {complementFromB.length} 件 — 自動採用 (B → A)
          </div>
          {complementFromB.map(c => (
            <_MergeComplementRow key={c.key} comp={c} />
          ))}
        </div>
      )}

      {/* 折りたたみ */}
      {collapsedItems.length > 0 && (
        <div style={{ marginBottom: 14 }}>
          <button
            onClick={() => setShowCollapsed(prev => !prev)}
            style={{
              width: "100%", background: C.panel2,
              border: `1px dashed ${C.border}`,
              borderRadius: RADIUS.row, padding: "10px 12px",
              fontSize: 11, color: C.textSecondary, cursor: "pointer",
              textAlign: "center", fontFamily: font, minHeight: 40,
            }}
          >
            <Icon name={showCollapsed ? "chevron-down" : "chevron-right"} size={12} color={C.textSecondary} />
            {" "}一致 / A のみ値あり / 両方空 を {showCollapsed ? "折りたたむ" : "表示"} ({collapsedItems.length} 件)
          </button>
          {showCollapsed && (
            <div style={{ marginTop: 8 }}>
              {collapsedItems.map(item => (
                <_MergeCollapsedRow
                  key={item.key}
                  keyName={item.key}
                  label={item.label}
                  itemA={itemA}
                  itemB={itemB}
                />
              ))}
            </div>
          )}
        </div>
      )}

      {diff.conflicts.length === 0 && complementFromB.length === 0 && !showCollapsed && (
        <div style={{ padding: 24, textAlign: "center", color: C.textMuted, fontSize: 12 }}>
          選択が必要な競合も、自動補完も見つかりませんでした。<br />
          そのまま「次へ」で統合できます。
        </div>
      )}
    </>
  );

  // ── Step 2: 最終確認
  const renderConfirm = () => (
    <>
      <div style={{
        background: C.errorLight, borderRadius: RADIUS.row,
        padding: 12, marginBottom: 12,
        fontSize: 12, lineHeight: 1.55, color: "#a31511",
      }}>
        <div style={{ fontWeight: 700, color: C.error, marginBottom: 4 }}>
          <Icon name="warning" size={14} color={C.error} /> この操作は取り消せません
        </div>
        B「{removedLabel}」を削除して、A「{keptLabel}」に統合します。
      </div>

      {relinkCount > 0 && (
        <div style={{
          background: C.primaryLight, borderRadius: RADIUS.btnSm,
          padding: "10px 12px", marginBottom: 12,
          fontSize: 11, color: "#003a7a", lineHeight: 1.5,
          display: "flex", alignItems: "flex-start", gap: 6,
        }}>
          <Icon name="link" size={16} color={C.primary} />
          <div>
            連携している試打 <b>{relinkCount} 件</b> の参照先 (linkedXxx) が <b>B → A</b> に自動で付け替わります。試打自体は残ります。
          </div>
        </div>
      )}

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 12 }}>
        <_MergeFinalCol
          title="削除される B" tone="removed"
          item={itemB} type={type}
        />
        <_MergeFinalCol
          title="統合後 A" tone="kept"
          item={merged} type={type}
          highlightFromB={complementFromB.map(c => c.key)}
          highlightConflictB={Object.entries(choices).filter(([_, v]) => v === "b").map(([k]) => k)}
        />
      </div>

      <div style={{ fontSize: 10, color: C.textSecondary, textAlign: "center", lineHeight: 1.6 }}>
        <span style={{ color: C.primary, fontWeight: 700 }}>青字</span> = 競合で B を採用 /{" "}
        <span style={{ color: C.success, fontWeight: 700 }}>緑字</span> = B から補完
      </div>
    </>
  );

  return (
    <div
      role="dialog"
      aria-modal="true"
      aria-label={`${typeLabel}のマージ`}
      onClick={(e) => { if (e.target === e.currentTarget) onCancel && onCancel(); }}
      style={{
        position: "fixed", inset: 0, background: "rgba(0,0,0,0.4)",
        display: "flex", alignItems: "center", justifyContent: "center",
        padding: 20, zIndex: 1100,
      }}
    >
      <div ref={trapRef} style={{
        background: C.panel,
        borderRadius: RADIUS.card,
        width: "100%", maxWidth: 560,
        maxHeight: "90vh",
        overflow: "hidden",
        display: "flex", flexDirection: "column",
        animation: "modalEnter 250ms ease-out",
        boxShadow: "0 8px 32px rgba(0,0,0,0.16)",
      }}>
        {/* Header */}
        <div style={{ padding: "14px 18px 12px", borderBottom: `1px solid ${C.divider}`, flexShrink: 0 }}>
          <div style={{ fontSize: 16, fontWeight: 700, color: C.text }}>
            マージ ({typeLabel})
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 6, fontSize: 11, color: C.textSecondary }}>
            <_MergeStepDot active={step === "compare"} done={step === "confirm"} num={1} />
            <span>比較</span>
            <span style={{ color: C.textMuted }}>→</span>
            <_MergeStepDot active={step === "confirm"} done={false} num={2} />
            <span>確認</span>
          </div>
        </div>

        {/* Body (scroll) */}
        <div style={{ flex: 1, minHeight: 0, overflowY: "auto", padding: "12px 18px" }}>
          {step === "compare" ? renderCompare() : renderConfirm()}
        </div>

        {/* Footer */}
        <div style={{
          padding: "12px 18px 14px",
          borderTop: `1px solid ${C.divider}`,
          display: "flex", justifyContent: "space-between", gap: 8,
          flexShrink: 0,
        }}>
          {step === "compare" ? (
            <>
              <Button variant="ghost" onClick={onCancel}>キャンセル</Button>
              <Button variant="primary" onClick={() => setStep("confirm")}>
                次へ <Icon name="caret-right" size={16} color="#fff" />
              </Button>
            </>
          ) : (
            <>
              <Button variant="ghost" onClick={() => setStep("compare")}>
                <Icon name="caret-left" size={16} color={C.primary} /> 戻る
              </Button>
              <Button variant="danger" onClick={() => onConfirm && onConfirm(merged, itemB, choices)}>
                <Icon name="trash" size={16} color="#fff" /> 削除して統合
              </Button>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

// MergePartnerPicker — マージ相手 (B 候補) 選択モーダル (S15)
//
// 役割:
//   - REQUIREMENTS_v4 F1.10 セッションのマージ — 「同タイプの 2 件目を選ぶ」フェーズ
//   - SessionDetailView の「マージ」ボタンから起動
//   - 同タイプの全件から 1 件を選ぶ → onSelect で MergeModal へ橋渡し
//
// props:
//   open:        boolean
//   type:        "tournament" | "practice" | "trial"
//   sourceItem:  A (統合元、自身は候補から除外)
//   candidates:  同タイプ全件配列 (sourceItem を含むまま渡してよい、内部で除外)
//   onSelect:    (item) => void   候補選択時 (= B 確定)
//   onClose:     () => void       キャンセル
//
// UX:
//   - 検索 (タイトル / 会場 部分一致)
//   - 並び順: 日付差 0 (同日) 最上部 → 日付近い順
//   - 同日候補は primaryLight 背景 + primary border で強調
//   - 日付ずれ ≤ 7 日は黄色警告

function MergePartnerPicker({ open, type, sourceItem, candidates, onSelect, onClose }) {
  const [search, setSearch] = useState("");

  // open 切替時に検索リセット
  useEffect(() => {
    if (!open) setSearch("");
  }, [open]);

  if (!open || !sourceItem) return null;

  const typeLabel = type === "tournament" ? "大会"
                  : type === "practice"   ? "練習"
                  : type === "trial"      ? "試打"
                  : "セッション";

  const labelOf = (item) => {
    if (!item) return "(不明)";
    if (type === "tournament") return item.name || "(無題の大会)";
    if (type === "practice")   return item.title || item.venue || "(無題の練習)";
    if (type === "trial")      return item.racketName || "(ラケット未指定)";
    return "(不明)";
  };

  const metaOf = (item) => {
    if (!item) return "";
    const parts = [];
    parts.push(normDate(item.date) || "(日付なし)");
    if (item.startTime) parts.push(item.endTime ? `${item.startTime}-${item.endTime}` : item.startTime);
    if (item.venue && item.venue !== labelOf(item)) parts.push(item.venue);
    if (type === "practice" && item.heartRateAvg) parts.push(`心拍 ${item.heartRateAvg}`);
    return parts.join(" / ");
  };

  // 自分自身を除外
  const list = (candidates || []).filter(c => c && c.id && c.id !== sourceItem.id);

  // 検索フィルタ (タイトル + 会場)
  const lower = search.trim().toLowerCase();
  const filtered = lower
    ? list.filter(c =>
        labelOf(c).toLowerCase().includes(lower) ||
        (c.venue || "").toLowerCase().includes(lower)
      )
    : list;

  // 日付差でソート (同日 = 0、日付パース不可 = Infinity)
  const sourceDate = normDate(sourceItem.date);
  const daysDiff = (dateStr) => {
    const a = normDate(dateStr);
    if (!a || !sourceDate) return Infinity;
    const da = new Date(a + "T00:00:00");
    const ds = new Date(sourceDate + "T00:00:00");
    if (isNaN(da) || isNaN(ds)) return Infinity;
    return Math.abs(Math.round((da - ds) / (1000 * 60 * 60 * 24)));
  };

  const sorted = filtered
    .map(c => ({ item: c, diff: daysDiff(c.date) }))
    .sort((a, b) => a.diff - b.diff);

  const sourceLabel = labelOf(sourceItem);

  return (
    <Modal open={open} onClose={onClose} title={`マージ相手を選択 (${typeLabel})`}>
      <div style={{ fontSize: 12, color: C.textSecondary, marginBottom: 10, lineHeight: 1.5 }}>
        統合元: <b style={{ color: C.text }}>{sourceLabel}</b>
        <br />
        この{typeLabel}にまとめる相手を選んでください。
      </div>

      <input
        type="text"
        value={search}
        onChange={(e) => setSearch(e.target.value)}
        placeholder="🔍 タイトル / 会場で絞り込み"
        aria-label="候補を検索"
        style={{
          width: "100%",
          padding: "10px 12px",
          borderRadius: RADIUS.btnSm,
          border: `1px solid ${C.border}`,
          background: C.panel2,
          fontSize: 13,
          fontFamily: font,
          marginBottom: 8,
          boxSizing: "border-box",
          minHeight: 44,
          WebkitAppearance: "none",
          appearance: "none",
          color: C.text,
          outline: "none",
        }}
      />

      <div style={{ fontSize: 10, color: C.textMuted, marginBottom: 8 }}>
        全 {list.length} 件 / 表示 {sorted.length} 件 (日付近い順)
      </div>

      <div style={{ display: "flex", flexDirection: "column", gap: 6, maxHeight: "50vh", overflowY: "auto" }}>
        {sorted.length === 0 ? (
          <div style={{ padding: 20, textAlign: "center", color: C.textMuted, fontSize: 12 }}>
            {list.length === 0
              ? `他の${typeLabel}が見つかりません`
              : "検索条件に一致する候補がありません"}
          </div>
        ) : (
          sorted.map(({ item, diff }) => {
            const isSameDay = diff === 0;
            const isClose = diff > 0 && diff <= 7;
            return (
              <button
                key={item.id}
                onClick={() => onSelect && onSelect(item)}
                style={{
                  textAlign: "left",
                  padding: "10px 12px",
                  borderRadius: RADIUS.row,
                  background: isSameDay ? C.primaryLight : C.panel2,
                  border: `1px solid ${isSameDay ? C.primary : C.border}`,
                  cursor: "pointer",
                  fontFamily: font,
                  minHeight: 44,
                  width: "100%",
                  boxSizing: "border-box",
                }}
              >
                <div style={{ fontSize: 13, fontWeight: 600, color: C.text }}>{labelOf(item)}</div>
                <div style={{ fontSize: 11, color: C.textSecondary, marginTop: 2 }}>{metaOf(item)}</div>
                {!isSameDay && diff !== Infinity && (
                  <div style={{
                    fontSize: 11,
                    color: isClose ? "#7e5d00" : C.textMuted,
                    marginTop: 2,
                  }}>
                    {isClose ? "⚠ " : ""}日付が {diff} 日ずれ
                  </div>
                )}
              </button>
            );
          })
        )}
      </div>
    </Modal>
  );
}

// "52:03" (分:秒) → "52分3秒" / "52分"
function _pdToMinSecLabel(s) {
  if (!s) return "—";
  const pp = String(s).split(":");
  const m = parseInt(pp[0], 10) || 0;
  const sec = parseInt(pp[1], 10) || 0;
  return sec > 0 ? `${m}分${sec}秒` : `${m}分`;
}

function _pdParseMin(s) {
  if (!s) return 0;
  const pp = String(s).split(":");
  return (parseInt(pp[0], 10) || 0) + (parseInt(pp[1], 10) || 0) / 60;
}

      {/* Apple Watch (warning 色体系で強調 + V3 同等情報量) */}
      {(hasWatchSummary || hasZones) && (
        <div style={{ background: "#fef7e0", border: "1.5px solid #fbbc04", borderRadius: 12, padding: 12, marginBottom: 10 }}>
          {/* ヘッダ: watch + title + timeRange + location */}
          <div style={{ display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap", marginBottom: 10 }}>
            <Icon name="watch" size={15} color="#7e5d00" ariaLabel="Apple Watch" />
            <span style={{ fontSize: 13, color: "#7e5d00", fontWeight: 700 }}>Apple Watch</span>
            {p.timeRange && <span style={{ fontSize: 11, color: C.text, fontWeight: 600 }}>{p.timeRange}</span>}
            {p.workoutLocation && (
              <span style={{ display: "inline-flex", alignItems: "center", gap: 3, fontSize: 11, color: C.text, fontWeight: 600 }}>
                <Icon name="map-pin" size={12} color={C.text} />
                {p.workoutLocation}
              </span>
            )}
          </div>

          {/* 4 セル サマリー */}
          {hasWatchSummary && (
            <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 6, marginBottom: hasZones ? 10 : 0 }}>
              <_pdWatchSumCell icon="clock"       label="時間"   value={p.duration}      unit="分" valueColor={C.primary} />
              <_pdWatchSumCell icon="flame"       label="Active" value={p.calories}      valueColor="#c2410c" />
              <_pdWatchSumCell icon="heart-pulse" label="平均"   value={p.heartRateAvg}  valueColor={C.error} />
              <_pdWatchSumCell icon="flame"       label="合計"   value={p.totalCalories} valueColor="#c2410c" />
            </div>
          )}

          {/* 心拍ゾーン */}
          {hasZones && (
            <>
              <div style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12, color: "#7e5d00", fontWeight: 700, marginBottom: 8 }}>
                <Icon name="heart-pulse" size={14} color="#7e5d00" />
                心拍ゾーン
              </div>
              {/* 積層バー (5 色比率) */}
              <div style={{ display: "flex", height: 8, borderRadius: 4, overflow: "hidden", marginBottom: 10 }}>
                {zones.map((z, i) => {
                  const pct = (zoneMinutes[i] / totalMin) * 100;
                  return <div key={i} style={{ width: `${pct}%`, background: z.color, minWidth: zoneMinutes[i] > 0 ? 2 : 0 }} />;
                })}
              </div>
              {/* 5 ゾーン詳細行 */}
              {zones.map((z, i) => {
                const pct = (zoneMinutes[i] / totalMin) * 100;
                return (
                  <div key={i} style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 5, fontSize: 11 }}>
                    <div style={{ width: 10, height: 10, borderRadius: 2, background: z.color, flexShrink: 0 }} />
                    <div style={{ width: 72, color: C.text, fontWeight: 600, flexShrink: 0 }}>{z.label}</div>
                    <div style={{ width: 48, fontSize: 10, color: C.text, fontWeight: 600, flexShrink: 0 }}>{z.bpm}</div>
                    <div style={{ flex: 1, background: "#e5e7eb", borderRadius: 3, height: 16, overflow: "hidden", minWidth: 0 }}>
                      <div style={{ width: `${pct}%`, height: "100%", background: z.color, borderRadius: 3, minWidth: zoneMinutes[i] > 0 ? 3 : 0, display: "flex", alignItems: "center", justifyContent: "flex-end", paddingRight: 4 }}>
                        {pct > 12 && <span style={{ fontSize: 10, color: "#000", fontWeight: 700 }}>{Math.round(pct)}%</span>}
                      </div>
                    </div>
                    <div style={{ width: 56, fontSize: 10, color: z.color, fontWeight: 700, textAlign: "right", flexShrink: 0, fontVariantNumeric: "tabular-nums" }}>
                      {_pdToMinSecLabel(z.time)}
                    </div>
                  </div>
                );
              })}
              {/* 回復心拍 */}
              {p.recoveryHR && (
                <div style={{ marginTop: 8, fontSize: 11, color: C.text, fontWeight: 600, display: "flex", alignItems: "center", gap: 6 }}>
                  <Icon name="heart" size={12} color={C.text} />
                  回復心拍
                  <span style={{ color: C.practiceAccent, fontWeight: 700 }}>{p.recoveryHR}</span>
                  <span style={{ color: C.textSecondary }}>bpm</span>
                </div>
              )}
            </>
          )}
        </div>
      )}

      {/* 統一: 会場 / 気象 3 列 */}
      {(p.venue || p.temp || p.weather) && (
        <_dvSection title="会場 / 気象">
          <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr 1fr", gap: 6 }}>
            <_dvInfoCell label="会場" value={p.venue} />
            <_dvInfoCell label="気温" value={p.temp ? p.temp + "℃" : ""} />
            <_dvInfoCell label="天気" value={p.weather} />
          </div>
        </_dvSection>
      )}

      {/* 体調 (練習のみ、編集画面と同じ 5 ボタン表示) */}
      {p.physical ? (
        <_dvSection title="体調">
          <_pdRatingDisplay label="体調" value={Number(p.physical) || 0} />
        </_dvSection>
      ) : null}

      {/* 統一: 機材 2x2 */}
      {(p.racketName || p.stringMain || p.stringCross || p.tensionMain || p.tensionCross) && (
        <_dvSection title="機材">
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6, marginBottom: 6 }}>
            <_dvInfoCell label="ラケット" value={p.racketName} />
            <_dvInfoCell label="テンション" value={_dvFmtTension(p.tensionMain, p.tensionCross)} />
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6 }}>
            <_dvInfoCell label="縦糸" value={p.stringMain} />
            <_dvInfoCell label="横糸" value={p.stringCross} />
          </div>
        </_dvSection>
      )}

      {/* 紐づく試打 (タップで試打詳細へ) */}
      {trials.length > 0 && (
        <_dvSection title="紐づく試打">
          {trials.map(tr => (
            <_dvLinkCard
              key={tr.id}
              kind="trial"
              title={`${tr.racketName || ""}${tr.stringMain ? " / " + tr.stringMain : ""}${tr.stringCross ? " / " + tr.stringCross : ""}`}
              meta={`${tr.judgment || "試打"} ・ ${tr.date}`}
              onClick={onLinkedTrialClick ? () => onLinkedTrialClick(tr) : null}
            />
          ))}
        </_dvSection>
      )}

      {/* メモ (focus はテキスト = v2/v3 と同形式、文字列以外は表示しない = legacy 数値の防御) */}
      {((typeof p.focus === "string" && p.focus) || p.coachNote || p.goodNote || p.improveNote || p.generalNote) && (
        <_dvSection title="メモ">
          {typeof p.focus === "string" && p.focus && <_dvMemoItem label="フォーカス"  text={p.focus}       summary={p.memoSummaries?.focus} />}
          {p.coachNote   && <_dvMemoItem label="コーチメモ"  text={p.coachNote}   summary={p.memoSummaries?.coachNote} />}
          {p.goodNote    && <_dvMemoItem label="良かった点"  text={p.goodNote}    summary={p.memoSummaries?.goodNote} />}
          {p.improveNote && <_dvMemoItem label="改善点"      text={p.improveNote} summary={p.memoSummaries?.improveNote} />}
          {p.generalNote && <_dvMemoItem label="メモ"        text={p.generalNote} summary={p.memoSummaries?.generalNote} />}
        </_dvSection>
      )}

      {/* S18 Issue 2: 試合記録 (matches[] が 1 件以上の時のみ表示、read-only) */}
      {matches.length > 0 && (
        <_dvSection title={`試合記録 (${wins}勝${losses}敗 ・ ${matches.length}試合)`}>
          {matches.map((m, i) => (
            <div
              key={m.id || i}
              style={{
                background: C.bg, borderRadius: 8, padding: "10px 12px", marginBottom: 6,
                display: "flex", alignItems: "center", gap: 10, minHeight: 44,
              }}
            >
              <span style={{ fontSize: 11, color: C.textSecondary, minWidth: 36, fontWeight: 600 }}>{m.round || "—"}</span>
              <span style={{ flex: 1, fontSize: 13, fontWeight: 500, color: C.text, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                {m.opponent || "(対戦相手 未入力)"}{m.opponent2 ? " / " + m.opponent2 : ""}
              </span>
              <span style={{ fontSize: 12, color: C.textSecondary, fontVariantNumeric: "tabular-nums" }}>
                {Array.isArray(m.setScores) ? m.setScores.filter(Boolean).join(" ") : ""}
              </span>
              <span style={{ fontSize: 13, fontWeight: 700, color: m.result === "勝利" ? C.practiceAccent : m.result === "敗北" ? C.error : C.textMuted }}>
                {m.result === "勝利" ? "勝" : m.result === "敗北" ? "負" : m.result === "棄権" ? "棄" : "—"}
              </span>
            </div>
          ))}
        </_dvSection>
      )}
    </>
  );
}

function PracticeEditForm({ form, errors = {}, onChange, racketNames = [], stringNames = [], venueNames = [], opponentNames = [], tournaments = [], practices = [], trials = [], confirm }) {
  // S16.11 UX5: 履歴セット picker
  const recentSetups = useMemo(
    () => _computeRecentSetups(tournaments, practices, trials),
    [tournaments, practices, trials]
  );

  // S18 Issue 2: 練習にも matches[] を持たせる (案 3' 採用、preview_s18_p13 確定)
  //   練習試合 / ゲーム練習 など、type 不問でゲーム記録できるように
  //   matches[] が空 = メモ下に小さい + ボタン
  //   matches[] が 1 件以上 = ⑥ 試合記録 セクション展開
  const matches = Array.isArray(form.matches) ? form.matches : [];
  const wins = matches.filter(m => m.result === "勝利").length;
  const losses = matches.filter(m => m.result === "敗北" || m.result === "棄権").length;
  const [matchModalState, setMatchModalState] = useState(null);
  const handleAddMatch = () => {
    const lastMatch = matches.length > 0 ? matches[matches.length - 1] : null;
    setMatchModalState({ match: blankMatch(matches.length, lastMatch || form), isNew: true });
  };
  const handleEditMatch = (m) => {
    setMatchModalState({ match: m, isNew: false });
  };
  const handleSaveMatch = (newMatch) => {
    const exists = matches.find(m => m.id === newMatch.id);
    const newMatches = exists
      ? matches.map(m => m.id === newMatch.id ? newMatch : m)
      : [...matches, newMatch];
    onChange({ ...form, matches: newMatches });
    setMatchModalState(null);
  };
  const handleDeleteMatch = (id) => {
    if (!confirm) {
      onChange({ ...form, matches: matches.filter(m => m.id !== id) });
      return;
    }
    confirm.ask(
      "この試合記録を削除します。よろしいですか?",
      () => onChange({ ...form, matches: matches.filter(m => m.id !== id) }),
      { title: "試合記録を削除", yesLabel: "削除する", yesVariant: "danger", icon: "trash-2" }
    );
  };
  const applySetup = (s) => {
    if (!s) return;
    onChange({
      ...form,
      racketName: s.racketName || "",
      stringMain: s.stringMain || "",
      stringCross: s.stringCross || "",
      tensionMain: s.tensionMain || "",
      tensionCross: s.tensionCross || "",
    });
  };
  // 開始/終了時刻入力時に duration を自動計算 (v3:2471-2481 移植)
  // S16.11 F2 ガード: Apple Watch 取込み済 duration を時刻編集で上書きしない
  //   - form.duration が存在し、かつ form.heartRateAvg / calories 等の Watch 由来フィールドがあれば
  //     duration は Watch 実測値として保護、時刻計算で上書きしない
  //   - Watch 由来でない (手動入力) duration の場合は従来通り計算結果で更新
  const set = (k, v) => {
    const n = { ...form, [k]: v };
    if ((k === "startTime" || k === "endTime") && n.startTime && n.endTime) {
      const sParts = n.startTime.split(":").map(Number);
      const eParts = n.endTime.split(":").map(Number);
      if (!isNaN(sParts[0]) && !isNaN(eParts[0])) {
        const mins = (eParts[0] * 60 + (eParts[1] || 0)) - (sParts[0] * 60 + (sParts[1] || 0));
        if (mins > 0) {
          const isWatchDuration = !!(form.heartRateAvg || form.calories || form.totalCalories || form.hrZone1);
          if (!isWatchDuration) {
            n.duration = String(mins);
          }
          // Watch 由来 duration は保護、上書きしない
        }
      }
    }
    onChange(n);
  };

  return (
    <>
      {/* ① 基本情報 */}
      <div style={{ background: C.panel, border: `1px solid ${C.divider}`, borderRadius: 12, padding: 12, marginBottom: 10 }}>
        <_peSectionHead num="1" label="基本情報" />
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0 10px" }}>
          <Input type="date" label="日付" required value={form.date || ""} onChange={(v) => set("date", v)} error={errors.date} />
          <Select label="種別" value={form.type || ""} onChange={(v) => set("type", v)} options={_PRAC_TYPE_OPTS} />
        </div>
        <Input label="イベント名" value={form.title || ""} onChange={(v) => set("title", v)} placeholder="例: ナイターレッスン中上級" />
        {/* リク 30-* (S18 Phase B) Wheel picker 復活: 時刻 + 時間(分) を立体ホイール化
            既存値の rounding/clamping は禁止 (preserved で保持)、背景タップ/ESC = キャンセル */}
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: "0 8px" }}>
          <TimeWheel label="開始" value={form.startTime || ""} onChange={(v) => set("startTime", v)} />
          <TimeWheel label="終了" value={form.endTime || ""} onChange={(v) => set("endTime", v)} />
          <NumWheel label="時間(分)" value={form.duration || ""} min={0} max={720} step={5} onChange={(v) => set("duration", v)} />
        </div>
      </div>

      {/* ② 会場 / 気象 */}
      <div style={{ background: C.panel, border: `1px solid ${C.divider}`, borderRadius: 12, padding: 12, marginBottom: 10 }}>
        <_peSectionHead num="2" label="会場 / 気象" />
        <MasterField label="会場" value={form.venue || ""} onChange={(v) => set("venue", v)} masterValues={venueNames} placeholder="-- 会場を選択 --" />
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0 10px" }}>
          <NumWheel label="気温(℃)" value={form.temp || ""} min={-5} max={40} step={1} onChange={(v) => set("temp", v)} />
          <Select label="天気" value={form.weather || ""} onChange={(v) => set("weather", v)} options={_PRAC_WEATHER} />
        </div>
      </div>

      {/* ③ 機材 — ラケット 1 行 / 縦糸+横糸 / テンション縦+横 */}
      <div style={{ background: C.panel, border: `1px solid ${C.divider}`, borderRadius: 12, padding: 12, marginBottom: 10 }}>
        <_peSectionHead num="3" label="機材" />
        <MasterField label="ラケット" value={form.racketName || ""} onChange={(v) => set("racketName", v)} masterValues={racketNames} placeholder="-- ラケットを選択 --" />
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0 10px" }}>
          <MasterField label="縦糸" value={form.stringMain || ""} onChange={(v) => set("stringMain", v)} masterValues={stringNames} placeholder="-- 縦糸を選択 --" />
          <MasterField label="横糸" value={form.stringCross || ""} onChange={(v) => set("stringCross", v)} masterValues={stringNames} placeholder="-- 同じなら空欄 --" />
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0 10px" }}>
          <NumWheel label="テンション縦" value={form.tensionMain || ""} min={35} max={55} step={1} onChange={(v) => set("tensionMain", v)} />
          <NumWheel label="テンション横" value={form.tensionCross || ""} min={35} max={55} step={1} onChange={(v) => set("tensionCross", v)} />
        </div>
        {/* S16.11 UX5: 履歴セット picker */}
        <_SetupPickerButton recent={recentSetups} current={form} onApply={applySetup} />
      </div>

      {/* ④ 体調 + Apple Watch */}
      <div style={{ background: C.panel, border: `1px solid ${C.divider}`, borderRadius: 12, padding: 12, marginBottom: 10 }}>
        <_peSectionHead num="4" label="体調" />
        <_peRatingRow label="体調" value={Number(form.physical) || 0} onChange={(n) => onChange({ ...form, physical: n })} />
      </div>
      <_peAppleWatchPanel form={form} />

      {/* ⑤ メモ (focus はテキスト、v2/v3 と同じ「今日のテーマ」フィールド) */}
      <div style={{ background: C.panel, border: `1px solid ${C.divider}`, borderRadius: 12, padding: 12, marginBottom: 10 }}>
        <_peSectionHead num="5" label="メモ" />
        <Textarea
          label="フォーカス"
          value={typeof form.focus === "string" ? form.focus : ""}

const _QAF_ITEMS = [
  { type: "tournament", icon: "trophy",          label: "大会", color: "#f9ab00", textColor: "#a04f00" },
  { type: "practice",   icon: "person-standing", label: "練習", color: "#0f9d58", textColor: "#0a5b35" },
];

function QuickAddFab({ onSelect, bottom = 180, ariaLabel = "記録を追加" }) {
  const [menuOpen, setMenuOpen] = useState(false);

  const handleFabTap = () => setMenuOpen((v) => !v);
  const handleSelect = (type) => {
    setMenuOpen(false);
    onSelect && onSelect(type);
  };
  const handleBackdropClick = () => setMenuOpen(false);

  // Esc で閉じる
  useEffect(() => {
    if (!menuOpen) return;
    const handler = (e) => { if (e.key === "Escape") setMenuOpen(false); };
    document.addEventListener("keydown", handler);
    return () => document.removeEventListener("keydown", handler);
  }, [menuOpen]);

  return (
    <>
      {/* 背景透明オーバーレイ (menu 開いている時のみ、外側タップで閉じる) */}
      {menuOpen && (
        <div
          onClick={handleBackdropClick}
          style={{
            position: "fixed", inset: 0, background: "transparent", zIndex: 99,
          }}
        />
      )}

      {/* ミニメニュー (FAB の上に表示) */}
      {menuOpen && (
        <div
          role="menu"
          style={{
            position: "fixed",
            right: 16,
            bottom: bottom + 64, // FAB(56) + gap(8)
            background: C.panel,
            border: `1px solid ${C.border}`,
            borderRadius: 12,
            width: 200,
            overflow: "hidden",
            zIndex: 101,
            boxShadow: "0 4px 16px rgba(0,0,0,0.15)",
            animation: "drawerEnter 200ms ease-out",
          }}
        >
          {_QAF_ITEMS.map((item) => (
            <button
              key={item.type}
              role="menuitem"
              type="button"
              onClick={() => handleSelect(item.type)}
              style={{
                display: "flex",
                alignItems: "center",
                gap: 10,
                padding: "14px 16px",
                minHeight: 56,
                width: "100%",
                background: C.panel,
                border: "none",
                borderBottom: item.type === "tournament" ? `1px solid ${C.divider}` : "none",
                cursor: "pointer",
                fontSize: 14,
                fontWeight: 600,
                color: item.textColor,
                fontFamily: font,
                textAlign: "left",
              }}
              onMouseEnter={(e) => (e.currentTarget.style.background = C.panel2)}
              onMouseLeave={(e) => (e.currentTarget.style.background = C.panel)}
            >
              <Icon name={item.icon} size={20} color={item.color} />
              <span style={{ flex: 1 }}>{item.label}</span>
              <Icon name="chevron-right" size={16} color={C.textMuted} />
            </button>
          ))}
        </div>
      )}

      {/* FAB 本体 */}
      <button
        onClick={handleFabTap}
        aria-label={menuOpen ? "閉じる" : ariaLabel}
        aria-expanded={menuOpen}
        style={{
          position: "fixed",
          bottom,
          right: 16,
          width: 56,
          height: 56,
          borderRadius: 28,
          background: menuOpen ? C.textSecondary : C.primary,
          color: "#fff",
          display: "flex",
          alignItems: "center",
          justifyContent: "center",
          border: "none",
          cursor: "pointer",
          zIndex: 100,
          boxShadow: "0 2px 6px rgba(0,0,0,0.15), 0 4px 12px rgba(26,115,232,0.3)",
          transition: "background 150ms",
        }}
      >
        <Icon name={menuOpen ? "x" : "plus"} size={28} color="#fff" />
      </button>
    </>
  );
}

const _QA_PRAC_TYPE_OPTS = [
  { value: "スクール",   label: "スクール" },
  { value: "自主練",     label: "自主練" },
  { value: "練習会",     label: "練習会" },
  { value: "ゲーム練習", label: "ゲーム練習" },
  { value: "球出し",     label: "球出し" },
