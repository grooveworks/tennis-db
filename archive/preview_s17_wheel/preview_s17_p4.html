<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>S17 履歴セット (圧縮版)</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 14px;
    background: #F2F2F7;
    font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
    color: #202124;
    max-width: 480px; margin: 0 auto;
  }
  h2 { font-size: 14px; margin: 16px 0 8px; }
  h3 {
    font-size: 12px; margin: 14px 0 6px;
    padding: 4px 10px; border-radius: 6px;
    background: #fef7e0; color: #7e5d00;
  }
  .panel {
    background: #fff; border: 1px solid #e8eaed;
    border-radius: 12px; padding: 12px; margin-bottom: 10px;
  }
  .head {
    font-size: 11px; color: #80868b; font-weight: 600;
    letter-spacing: 0.5px; text-transform: uppercase;
    margin-bottom: 10px; display: flex; align-items: center; gap: 5px;
  }
  .head .num {
    width: 18px; height: 18px; border-radius: 50%;
    background: #007AFF; color: #fff;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700;
  }
  .field { margin-bottom: 8px; }
  .field label {
    display: block; font-size: 11px; color: #5f6368;
    font-weight: 500; margin-bottom: 4px;
  }
  .field select, .field input {
    width: 100%; min-height: 40px; padding: 8px 10px;
    border: 1px solid #dadce0; border-radius: 6px;
    background: #fff; font-size: 14px; color: #202124;
    font-family: inherit;
  }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0 10px; }

  .picker-btn-row {
    margin-bottom: 10px;
  }
  .picker-btn-row label {
    display: block; font-size: 11px; color: #5f6368;
    font-weight: 500; margin-bottom: 4px;
  }
  .picker-btn {
    width: 100%; min-height: 40px; padding: 8px 12px;
    border: 1px solid #007AFF; border-radius: 6px;
    background: #E1F0FF; color: #007AFF;
    font-size: 13px; font-weight: 600; cursor: pointer;
    font-family: inherit;
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
    text-align: left;
  }
  .picker-btn .chev { color: #007AFF; font-size: 16px; flex-shrink: 0; }
  .picker-btn .label-text {
    flex: 1; min-width: 0;
    overflow: hidden; text-overflow: ellipsis;
    white-space: normal; line-height: 1.35;
  }

  /* bottom sheet (圧縮版) */
  .sheet-head {
    padding: 10px 14px;
    border-bottom: 1px solid #e8eaed;
    display: flex; align-items: center; justify-content: space-between;
  }
  .sheet-head .title { font-size: 13px; font-weight: 700; color: #202124; }
  .sheet-head .close {
    background: none; border: none; cursor: pointer;
    color: #5f6368; font-size: 20px; padding: 0 4px;
  }
  .sheet-body {
    flex: 1; overflow-y: auto;
    padding: 0;
  }

  /* compact item: 2 lines, 8px vertical padding */
  .sheet-item {
    width: 100%; padding: 8px 12px;
    background: none; border: none;
    border-bottom: 1px solid #f1f3f4;
    text-align: left; cursor: pointer;
    font-family: inherit;
    display: flex; align-items: center; gap: 8px;
  }
  .sheet-item:last-child { border-bottom: none; }
  .sheet-item.current { background: #E1F0FF; }
  .sheet-item .check {
    width: 16px; flex-shrink: 0;
    color: #007AFF; font-size: 14px;
    text-align: center;
  }
  .sheet-item .body { flex: 1; min-width: 0; line-height: 1.35; }
  .sheet-item .top {
    font-size: 13px; font-weight: 600; color: #202124;
    word-break: break-word;
  }
  .sheet-item .sub {
    font-size: 11px; color: #5f6368;
    word-break: break-word;
    margin-top: 1px;
  }
  .sheet-item .badge-prev {
    display: inline-block; font-size: 9px; font-weight: 700;
    padding: 1px 5px; border-radius: 3px;
    background: #007AFF; color: #fff; margin-left: 5px;
    letter-spacing: 0.04em; vertical-align: 1px;
  }
  .sheet-item.individual .top { color: #80868b; font-style: italic; }

  .legend {
    background: #fff; border: 1px solid #e8eaed; border-radius: 8px;
    padding: 8px 12px; font-size: 11px; line-height: 1.5;
    margin-bottom: 10px; color: #5f6368;
  }
  .legend b { color: #202124; }
  .question {
    background: #fce8e6; color: #a31511; border: 1px solid #a31511;
    border-radius: 8px;
    padding: 10px 12px; font-size: 12px; line-height: 1.7;
    margin: 14px 0 4px;
  }
</style>
</head>
<body>

<h2>S17 圧縮版: 履歴セット ピッカー</h2>

<div class="legend">
  <b>p3 からの変更:</b><br>
  ・各項目を <b>2 行</b> に圧縮 (上=ラケット名、下=縦糸 / 横糸 · テンション縦/横)<br>
  ・パディング 12px → 8px<br>
  ・ラベル前置詞 (「縦:」「横:」) 廃止
</div>

<h3>状態 1: 閉じている</h3>

<div class="panel">
  <div class="head"><span class="num">3</span>機材</div>

  <div class="picker-btn-row">
    <label>履歴セット</label>
    <button class="picker-btn" type="button">
      <span class="label-text">— 個別に入力 —</span>
      <span class="chev">▾</span>
    </button>
  </div>

  <div class="field">
    <label>ラケット</label>
    <select><option>-- ラケットを選択 --</option></select>
  </div>
  <div class="grid2">
    <div class="field"><label>縦糸</label><select><option>-- 縦糸を選択 --</option></select></div>
    <div class="field"><label>横糸</label><select><option>-- 同じなら空欄 --</option></select></div>
  </div>
  <div class="grid2">
    <div class="field"><label>テンション縦</label><select><option>—</option></select></div>
    <div class="field"><label>テンション横</label><select><option>—</option></select></div>
  </div>
</div>

<h3>状態 2: bottom sheet が開いている</h3>

<div style="position: relative; height: 500px; border: 2px dashed #80868b; border-radius: 12px; overflow: hidden; background: #F2F2F7;">
  <div style="padding: 14px;">
    <div class="panel">
      <div class="head"><span class="num">3</span>機材</div>
      <div class="picker-btn-row">
        <label>履歴セット</label>
        <button class="picker-btn" type="button" style="background:#fff;">
          <span class="label-text">— 個別に入力 —</span>
          <span class="chev">▾</span>
        </button>
      </div>
    </div>
  </div>

  <div style="position: absolute; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: flex-end;">
    <div style="background:#fff; border-radius: 16px 16px 0 0; width: 100%; max-height: 70%; display: flex; flex-direction: column;">
      <div class="sheet-head">
        <span class="title">履歴セットを選択</span>
        <button class="close">×</button>
      </div>
      <div class="sheet-body">

        <button class="sheet-item current">
          <div class="check">✓</div>
          <div class="body">
            <div class="top">YONEX EZONE 100 TOUR<span class="badge-prev">前回</span></div>
            <div class="sub">Babolat Blast 1.25 / Yonex Poly Tour P · 46/43</div>
          </div>
        </button>

        <button class="sheet-item">
          <div class="check"></div>
          <div class="body">
            <div class="top">YONEX EZONE 100 TOUR</div>
            <div class="sub">Babolat Blast 1.25 / HEAD Hawk Touch 1.15 · 47/44</div>
          </div>
        </button>

        <button class="sheet-item">
          <div class="check"></div>
          <div class="body">
            <div class="top">YONEX EZONE 98</div>
            <div class="sub">Babolat Blast 1.25 / Yonex Poly Tour P · 48/45</div>
          </div>
        </button>

        <button class="sheet-item">
          <div class="check"></div>
          <div class="body">
            <div class="top">Prince TOUR 100 305g</div>
            <div class="sub">Phantom Spin 17 · 50</div>
          </div>
        </button>

        <button class="sheet-item">
          <div class="check"></div>
          <div class="body">
            <div class="top">YONEX EZONE 100 TOUR</div>
            <div class="sub">Phantom Spin 17 / Yonex Poly Tour P · 46/43</div>
          </div>
        </button>

        <button class="sheet-item individual">
          <div class="check"></div>
          <div class="body">
            <div class="top">— 個別に入力 —</div>
          </div>
        </button>

      </div>
    </div>
  </div>
</div>

<h3>状態 3: 選択後 (収納時、選んだ内容が要約表示)</h3>

<div class="panel">
  <div class="head"><span class="num">3</span>機材</div>

  <div class="picker-btn-row">
    <label>履歴セット</label>
    <button class="picker-btn" type="button">
      <span class="label-text">YONEX EZONE 100 TOUR · Blast 1.25 / Tour P · 46/43</span>
      <span class="chev">▾</span>
    </button>
  </div>

  <div class="field">
    <label>ラケット</label>
    <select><option selected>YONEX EZONE 100 TOUR</option></select>
  </div>
  <div class="grid2">
    <div class="field"><label>縦糸</label><select><option selected>Babolat Blast 1.25</option></select></div>
    <div class="field"><label>横糸</label><select><option selected>Yonex Poly Tour P</option></select></div>
  </div>
  <div class="grid2">
    <div class="field"><label>テンション縦</label><select><option selected>46</option></select></div>
    <div class="field"><label>テンション横</label><select><option selected>43</option></select></div>
  </div>
</div>

<div class="question">
  進めて良いか / ダメか だけ返してください。
</div>

</body>
</html>
