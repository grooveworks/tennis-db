<title>Tennis DB v4 tests</title>
<style>body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;background:#f2f2f7;color:#1a1a1a}</style>

<script>
// 簡易テストランナー（inline 版、外部依存なし）
window.__tests = [];
window.test = function(name, fn) { window.__tests.push({name: name, fn: fn}); };
window.assert = function(cond, msg) { if (!cond) throw new Error(msg || "assertion failed"); };
window.assertEqual = function(a, b, msg) {
  var sa = typeof a === "object" ? JSON.stringify(a) : String(a);
  var sb = typeof b === "object" ? JSON.stringify(b) : String(b);
  if (sa !== sb) throw new Error((msg || "assertEqual failed") + " — expected " + sb + ", got " + sa);
};
window.runAllTests = function() {
  var results = window.__tests.map(function(t) {
    try { t.fn(); return {name: t.name, ok: true}; }
    catch (e) { return {name: t.name, ok: false, err: e.message || String(e)}; }
  });
  var total = results.length;
  var failed = results.filter(function(r){return !r.ok;}).length;
  var ok = total - failed;
  var color = failed === 0 ? "green" : "red";
  var html = '<div style="font-family:-apple-system,sans-serif;padding:20px">';
  html += '<h1 style="color:' + color + ';margin-bottom:12px">' + total + ' tests, ' + ok + ' ok, ' + failed + ' failed</h1>';
  html += '<ul style="list-style:none;padding:0">';
  results.forEach(function(r){
    html += '<li style="padding:4px 0;color:' + (r.ok?'#080':'#c00') + '">' + (r.ok?'✓':'✗') + ' ' + r.name + (r.err?' <span style="color:#666">— '+r.err+'</span>':'') + '</li>';
  });
  html += '</ul></div>';
  document.body.innerHTML = html;
};
</script>

<script>
function computeCascade({ type, item, trials }) {
  const _trials = Array.isArray(trials) ? trials : [];
  if (!item || !item.id || !type) return { affectedTrials: [], count: 0 };
  if (type === "tournament") {
    const matchIds = new Set((Array.isArray(item.matches) ? item.matches : []).map(m => m && m.id).filter(Boolean));
    if (matchIds.size === 0) return { affectedTrials: [], count: 0 };
    const affected = _trials
      .filter(tr => tr && tr.linkedMatchId && matchIds.has(tr.linkedMatchId))
      .map(tr => ({ trial: tr, clearField: "linkedMatchId" }));
    return { affectedTrials: affected, count: affected.length };
  }
  if (type === "practice") {
    const affected = _trials
      .filter(tr => tr && tr.linkedPracticeId === item.id)
      .map(tr => ({ trial: tr, clearField: "linkedPracticeId" }));
    return { affectedTrials: affected, count: affected.length };
  }
  if (type === "match") {
    const affected = _trials
      .filter(tr => tr && tr.linkedMatchId === item.id)
      .map(tr => ({ trial: tr, clearField: "linkedMatchId" }));
    return { affectedTrials: affected, count: affected.length };
  }
  return { affectedTrials: [], count: 0 };
}
function applyCascadeToTrials(trials, affectedTrials) {
  const _trials = Array.isArray(trials) ? trials : [];
  const _affected = Array.isArray(affectedTrials) ? affectedTrials : [];
  if (_affected.length === 0) return _trials;
  const clearMap = new Map();
  for (const a of _affected) {
    if (a && a.trial && a.trial.id && a.clearField) {
      clearMap.set(a.trial.id, a.clearField);
    }
  }
  if (clearMap.size === 0) return _trials;
  return _trials.map(tr => {
    if (!tr || !tr.id || !clearMap.has(tr.id)) return tr;
    const field = clearMap.get(tr.id);
    return { ...tr, [field]: "" };
  });
}
function describeCascadeMessage(type, count) {
  const label = type === "tournament" ? "大会"
              : type === "practice"   ? "練習"
              : type === "match"      ? "試合"
              : type === "trial"      ? "試打"
              : "";
  if (!label) return { title: "削除の確認", body: "削除しますか？", warn: "この操作は取り消せません。" };
  const title = type === "match" ? "試合記録を削除" : `${label}を削除`;
  if (!count || count <= 0) {
    return {
      title,
      body: `この${label}を削除しますか？`,
      warn: "この操作は取り消せません。",
    };
  }
  return {
    title,
    body: `この${label}を削除すると、紐付いた試打 ${count} 件の連携情報が外れます。`,
    note: "(試打自体は残ります)",
    warn: "この操作は取り消せません。",
  };
}
</script>

<script>
function _isSameValue(a, b) {
  if (a === b) return true;
  if (a === null || b === null) return false;
  if (typeof a === "object" || typeof b === "object") {
    try { return JSON.stringify(a) === JSON.stringify(b); }
    catch { return false; }
  }
  return String(a) === String(b);
}
function computeMergeDiff(a, b, type) {
  const result = { match: [], complement: [], conflicts: [], unionKeys: [] };
  const keys = keysToInspect(a, b, type);
  result.unionKeys = keys;
  for (const key of keys) {
    if (key === "matches") continue;
    const av = a ? a[key] : undefined;
    const bv = b ? b[key] : undefined;
    const aE = isEmptyVal(av);
    const bE = isEmptyVal(bv);
    const label = labelFor(key, type);
    if (aE && bE) {
      result.match.push({ key, label, value: undefined });
    } else if (aE && !bE) {
      result.complement.push({ key, label, from: "b", value: bv });
    } else if (!aE && bE) {
      result.complement.push({ key, label, from: "a", value: av });
    } else if (_isSameValue(av, bv)) {
      result.match.push({ key, label, value: av });
    } else {
      result.conflicts.push({
        key, label,
        aValue: av, bValue: bv,
        combinable: COMBINABLE_FIELDS.has(key),
      });
    }
  }
  return result;
}
function applyMerge(a, b, choices, type) {
  const _a = a || {};
  const _b = b || {};
  const _choices = choices || {};
  const merged = { ..._a };
  const keys = keysToInspect(_a, _b, type);
  for (const key of keys) {
    if (key === "matches") continue;
    const av = _a[key], bv = _b[key];
    const aE = isEmptyVal(av), bE = isEmptyVal(bv);
    if (aE && bE) continue;
    if (aE && !bE) { merged[key] = bv; continue; }
    if (!aE && bE) { merged[key] = av; continue; }
    if (_isSameValue(av, bv)) { merged[key] = av; continue; }
    const ch = _choices[key] || "a";
    if (ch === "b") merged[key] = bv;
    else if (ch === "combined" && COMBINABLE_FIELDS.has(key)) {
      merged[key] = `${av} | ${bv}`;
    } else {
      merged[key] = av;
    }
  }
  if (type === "tournament") {
    merged.matches = mergeMatches(_a.matches, _b.matches);
  }
  merged.id = _a.id;
  return merged;
}
function mergeMatches(matchesA, matchesB) {
  const a = (Array.isArray(matchesA) ? matchesA : []).filter(m => m);
  const b = (Array.isArray(matchesB) ? matchesB : []).filter(m => m);
  const aIds = new Set();
  for (const m of a) { if (m.id) aIds.add(m.id); }
  const result = [...a];
  for (const m of b) {
    if (m.id && aIds.has(m.id)) continue;
    result.push(m);
  }
  return result;
}
function relinkAfterMerge(trials, removedItem, keptItem, type) {
  const _trials = Array.isArray(trials) ? trials : [];
  if (!removedItem || !removedItem.id || !keptItem || !keptItem.id) return _trials;
  if (type === "practice") {
    const removedId = removedItem.id;
    const keptId = keptItem.id;
    return _trials.map(tr => {
      if (!tr) return tr;
      if (tr.linkedPracticeId === removedId) {
        return { ...tr, linkedPracticeId: keptId };
      }
      return tr;
    });
  }
  return _trials;
}
function countRelinks(trials, removedItem, type) {
  const _trials = Array.isArray(trials) ? trials : [];
  if (!removedItem || !removedItem.id) return 0;
  if (type === "practice") {
    const removedId = removedItem.id;
    return _trials.filter(tr => tr && tr.linkedPracticeId === removedId).length;
  }
  return 0;
}
</script>

<!-- ── S13 cascade の unit test (REQUIREMENTS N3.5)─ -->
<script>
// テスト用フィクスチャ
function _fxTrials() {
  return [
    { id: "tr1", linkedMatchId: "m1",  linkedPracticeId: ""    },
    { id: "tr2", linkedMatchId: "m2",  linkedPracticeId: ""    },
    { id: "tr3", linkedMatchId: "",    linkedPracticeId: "p1"  },
    { id: "tr4", linkedMatchId: "m3",  linkedPracticeId: "p2"  },
    { id: "tr5", linkedMatchId: "",    linkedPracticeId: ""    }, // 連携なし
  ];
}

// ── computeCascade: tournament 削除 (matches[] 内の m1, m2, m3 を全 cascade)
test("computeCascade: tournament 削除 → matches[] 内 3 試合に紐付く試打 3 件", function() {
  var item = { id: "t1", matches: [{ id: "m1" }, { id: "m2" }, { id: "m3" }] };
  var r = computeCascade({ type: "tournament", item: item, trials: _fxTrials() });
  assertEqual(r.count, 3);
  var ids = r.affectedTrials.map(function(a){return a.trial.id;}).sort();
  assertEqual(ids, ["tr1", "tr2", "tr4"]);
  // 全て linkedMatchId クリア
  r.affectedTrials.forEach(function(a){ assertEqual(a.clearField, "linkedMatchId"); });
});

// ── computeCascade: tournament 削除 (matches[] 0 件 → 影響 0)
test("computeCascade: tournament 削除 で matches[] 空 → 0 件", function() {
  var item = { id: "t1", matches: [] };
  var r = computeCascade({ type: "tournament", item: item, trials: _fxTrials() });
  assertEqual(r.count, 0);
  assertEqual(r.affectedTrials, []);
});

// ── computeCascade: practice 削除 (linkedPracticeId 一致)
test("computeCascade: practice 削除 → linkedPracticeId 一致の試打 1 件", function() {
  var item = { id: "p1" };
  var r = computeCascade({ type: "practice", item: item, trials: _fxTrials() });
  assertEqual(r.count, 1);
  assertEqual(r.affectedTrials[0].trial.id, "tr3");
  assertEqual(r.affectedTrials[0].clearField, "linkedPracticeId");
});

// ── computeCascade: practice 削除 で 該当試打 0 件
test("computeCascade: practice 削除 で linkedPracticeId 一致なし → 0 件", function() {
  var item = { id: "p999" };
  var r = computeCascade({ type: "practice", item: item, trials: _fxTrials() });
  assertEqual(r.count, 0);
});

// ── computeCascade: match 単位削除 (linkedMatchId 一致)
test("computeCascade: match 単位削除 → linkedMatchId 一致の試打 1 件", function() {
  var item = { id: "m2" };
  var r = computeCascade({ type: "match", item: item, trials: _fxTrials() });
  assertEqual(r.count, 1);
  assertEqual(r.affectedTrials[0].trial.id, "tr2");
  assertEqual(r.affectedTrials[0].clearField, "linkedMatchId");
});

// ── computeCascade: trial 削除 → cascade 対象外
test("computeCascade: trial 削除 → 0 件 (cascade 対象外)", function() {
  var item = { id: "tr1" };
  var r = computeCascade({ type: "trial", item: item, trials: _fxTrials() });
  assertEqual(r.count, 0);
});

// ── computeCascade: 異常系 (item null / trials null / 不正 type)
test("computeCascade: item が null → 空結果", function() {
  var r = computeCascade({ type: "tournament", item: null, trials: _fxTrials() });
  assertEqual(r.count, 0);
});
test("computeCascade: trials が undefined → 空結果", function() {
  var r = computeCascade({ type: "practice", item: { id: "p1" } });
  assertEqual(r.count, 0);
});
test("computeCascade: 未知 type → 空結果", function() {
  var r = computeCascade({ type: "unknown", item: { id: "x1" }, trials: _fxTrials() });
  assertEqual(r.count, 0);
});

// ── applyCascadeToTrials: linkedMatchId クリア
test("applyCascadeToTrials: 該当 trial の linkedMatchId が空文字に", function() {
  var fx = _fxTrials();
  var affected = [{ trial: fx[0], clearField: "linkedMatchId" }, { trial: fx[1], clearField: "linkedMatchId" }];
  var out = applyCascadeToTrials(fx, affected);
  assertEqual(out[0].linkedMatchId, "");
  assertEqual(out[1].linkedMatchId, "");
  // 他は不変
  assertEqual(out[2].linkedPracticeId, "p1");
  assertEqual(out[3].linkedMatchId, "m3");
  assertEqual(out[3].linkedPracticeId, "p2");
});

// ── applyCascadeToTrials: linkedPracticeId クリア
test("applyCascadeToTrials: 該当 trial の linkedPracticeId が空文字に", function() {
  var fx = _fxTrials();
  var affected = [{ trial: fx[2], clearField: "linkedPracticeId" }];
  var out = applyCascadeToTrials(fx, affected);
  assertEqual(out[2].linkedPracticeId, "");
  // linkedMatchId は不変
  assertEqual(out[2].linkedMatchId, "");
});

// ── applyCascadeToTrials: 元配列を変更しない (immutability)
test("applyCascadeToTrials: 元配列・元オブジェクトは変更しない", function() {
  var fx = _fxTrials();
  var origLinked = fx[0].linkedMatchId;
  var affected = [{ trial: fx[0], clearField: "linkedMatchId" }];
  applyCascadeToTrials(fx, affected);
  assertEqual(fx[0].linkedMatchId, origLinked); // 元が m1 のまま
});

// ── applyCascadeToTrials: 影響 0 件 → 元配列を返す
test("applyCascadeToTrials: affected 空 → 元配列をそのまま返す", function() {
  var fx = _fxTrials();
  var out = applyCascadeToTrials(fx, []);
  assertEqual(out.length, fx.length);
  assertEqual(out[0].id, "tr1");
});

// ── 統合シナリオ: tournament 削除 → cascade 計算 → trials 適用
test("統合: tournament 削除で 3 件 cascade、適用後の trials 検証", function() {
  var trials = _fxTrials();
  var tour = { id: "t1", matches: [{ id: "m1" }, { id: "m2" }, { id: "m3" }] };
  var c = computeCascade({ type: "tournament", item: tour, trials: trials });
  var newTrials = applyCascadeToTrials(trials, c.affectedTrials);
  assertEqual(c.count, 3);
  // tr1, tr2, tr4 の linkedMatchId が空に
  var byId = {};
  newTrials.forEach(function(t){ byId[t.id] = t; });
  assertEqual(byId.tr1.linkedMatchId, "");
  assertEqual(byId.tr2.linkedMatchId, "");
  assertEqual(byId.tr4.linkedMatchId, "");
  // tr3 (practice 連携のみ) と tr5 は不変
  assertEqual(byId.tr3.linkedPracticeId, "p1");
  assertEqual(byId.tr5.linkedMatchId, "");
  // tr4 の linkedPracticeId は別連携なので残る
  assertEqual(byId.tr4.linkedPracticeId, "p2");
});

test("describeCascadeMessage: tournament 3 件 → cascade 文言 + note", function() {
  var d = describeCascadeMessage("tournament", 3);
  assert(d.body.indexOf("3 件") >= 0, "3 件が body に含まれる");
  assertEqual(d.note, "(試打自体は残ります)");
});
test("describeCascadeMessage: match 1 件 → タイトル '試合記録を削除'", function() {
  var d = describeCascadeMessage("match", 1);
  assertEqual(d.title, "試合記録を削除");
  assert(d.body.indexOf("1 件") >= 0);
});
</script>

<!-- ── S15 merge の unit test (REQUIREMENTS F1.10 / N3.5)─ -->
<script>
// テスト用フィクスチャ (practice 2 件: GCal vs AW のシナリオ)
function _fxPracticeA() {
  return {
    id: "pA", date: "2026-04-22", title: "火曜練習", venue: "インスピ", type: "スクール",
    startTime: "19:00", endTime: "21:00", duration: 120,
    racketName: "EZONE 98 2025", stringMain: "Hyper-G 1.25", tensionMain: "48",
    temp: 18, weather: "曇", physical: 4,
    focus: "リターン速度", coachNote: "腰の入れ方",
    goodNote: "ストロークの軌道安定", improveNote: "ボレー時の手首",
    generalNote: "明日も筋トレ",
  };
}
function _fxPracticeB() {
  return {
    id: "pB", date: "2026-04-22",
    startTime: "19:15", endTime: "20:48", duration: 93,
    heartRateAvg: 138, calories: 312, totalCalories: 412,
    recoveryHR: "112", workoutLocation: "屋内",
    hrZone1: "0:12", hrZone2: "0:24", hrZone3: "0:33", hrZone4: "0:18", hrZone5: "0:06",
    timeRange: "夜",
  };
}
function _fxTrialsForMerge() {
  return [
    { id: "tr1", linkedMatchId: "",   linkedPracticeId: "pB" }, // B を参照 (relink 対象)
    { id: "tr2", linkedMatchId: "",   linkedPracticeId: "pA" }, // A を参照 (不変)
    { id: "tr3", linkedMatchId: "m9", linkedPracticeId: ""   }, // 無関係
    { id: "tr4", linkedMatchId: "",   linkedPracticeId: "pB" }, // B を参照 (relink 対象)
  ];
}

// ── computeMergeDiff: practice 2 件の典型シナリオ
test("computeMergeDiff: practice → match/complement/conflicts に正しく分類", function() {
  var diff = computeMergeDiff(_fxPracticeA(), _fxPracticeB(), "practice");
  // date は両方一致
  var dateInMatch = diff.match.some(function(m){return m.key==="date";});
  assert(dateInMatch, "date は match に入る");
  // startTime / endTime / duration は競合
  var conflictKeys = diff.conflicts.map(function(c){return c.key;}).sort();
  assertEqual(conflictKeys.indexOf("startTime") >= 0, true);
  assertEqual(conflictKeys.indexOf("endTime") >= 0, true);
  assertEqual(conflictKeys.indexOf("duration") >= 0, true);
  // heartRateAvg / calories / totalCalories は B のみ → complement (from=b)
  var complementBKeys = diff.complement.filter(function(c){return c.from==="b";}).map(function(c){return c.key;});
  assert(complementBKeys.indexOf("heartRateAvg") >= 0, "heartRateAvg は B から補完");
  assert(complementBKeys.indexOf("calories") >= 0, "calories は B から補完");
  assert(complementBKeys.indexOf("totalCalories") >= 0, "totalCalories は B から補完");
  // title / venue / racketName は A のみ → complement (from=a)
  var complementAKeys = diff.complement.filter(function(c){return c.from==="a";}).map(function(c){return c.key;});
  assert(complementAKeys.indexOf("title") >= 0, "title は A から補完 (B 残し時用)");
  assert(complementAKeys.indexOf("venue") >= 0, "venue は A から補完");
});

// ── computeMergeDiff: combinable フィールドの conflict 検出
test("computeMergeDiff: combinable フィールドの conflict は combinable=true を持つ", function() {
  var a = { id: "a", date: "2026-04-22", generalNote: "メモ A" };
  var b = { id: "b", date: "2026-04-22", generalNote: "メモ B" };
  var diff = computeMergeDiff(a, b, "practice");
  var noteConflict = diff.conflicts.find(function(c){return c.key==="generalNote";});
  assert(noteConflict, "generalNote が conflicts に入る");
  assertEqual(noteConflict.combinable, true);
});

test("computeMergeDiff: 非 combinable フィールドの conflict は combinable=false", function() {
  var a = { id: "a", date: "2026-04-22", weather: "晴" };
  var b = { id: "b", date: "2026-04-22", weather: "曇" };
  var diff = computeMergeDiff(a, b, "practice");
  var weatherConflict = diff.conflicts.find(function(c){return c.key==="weather";});
  assert(weatherConflict, "weather が conflicts に入る");
  assertEqual(weatherConflict.combinable, false);
});

// ── computeMergeDiff: 両方空フィールドは match に value:undefined で入る
test("computeMergeDiff: 両方空フィールドは match に入る", function() {
  var a = { id: "a", date: "2026-04-22" };
  var b = { id: "b", date: "2026-04-22" };
  var diff = computeMergeDiff(a, b, "practice");
  var titleMatch = diff.match.find(function(m){return m.key==="title";});
  assert(titleMatch, "title は両方空 → match");
  assertEqual(titleMatch.value, undefined);
});

// ── computeMergeDiff: matches[] (tournament) は分類対象から除外
test("computeMergeDiff: matches[] (tournament) は分類対象外", function() {
  var a = { id: "a", date: "2026-04-22", name: "T A", matches: [{id:"m1"}] };
  var b = { id: "b", date: "2026-04-22", name: "T B", matches: [{id:"m2"}] };
  var diff = computeMergeDiff(a, b, "tournament");
  var hasMatchesKey = diff.unionKeys.indexOf("matches") >= 0; // unionKeys には含まれる
  assert(hasMatchesKey, "matches は unionKeys に含まれる");
  var inMatch = diff.match.some(function(m){return m.key==="matches";});
  var inComp = diff.complement.some(function(c){return c.key==="matches";});
  var inConf = diff.conflicts.some(function(c){return c.key==="matches";});
  assert(!inMatch && !inComp && !inConf, "matches はどの分類にも入らない");
});

// ── applyMerge: 補完は自動、競合は choices に従う
test("applyMerge: B の補完を A に取り込む、A の id 維持", function() {
  var a = _fxPracticeA(), b = _fxPracticeB();
  var merged = applyMerge(a, b, {}, "practice");
  assertEqual(merged.id, "pA");                  // id は A
  assertEqual(merged.title, "火曜練習");          // A 維持
  assertEqual(merged.heartRateAvg, 138);         // B から補完
  assertEqual(merged.calories, 312);             // B から補完
  assertEqual(merged.workoutLocation, "屋内");   // B から補完
});

test("applyMerge: choices なし → 競合は A 採用 (デフォルト)", function() {
  var a = _fxPracticeA(), b = _fxPracticeB();
  var merged = applyMerge(a, b, {}, "practice");
  assertEqual(merged.startTime, "19:00");        // A 採用 (デフォルト)
  assertEqual(merged.endTime, "21:00");
  assertEqual(merged.duration, 120);
});

test("applyMerge: choices で B 採用", function() {
  var a = _fxPracticeA(), b = _fxPracticeB();
  var merged = applyMerge(a, b, {endTime:"b", duration:"b"}, "practice");
  assertEqual(merged.startTime, "19:00"); // 未指定 → A
  assertEqual(merged.endTime, "20:48");   // B
  assertEqual(merged.duration, 93);       // B
});

test("applyMerge: combined は combinable フィールドのみ有効", function() {
  var a = { id: "a", date: "2026-04-22", generalNote: "メモ A", weather: "晴" };
  var b = { id: "b", date: "2026-04-22", generalNote: "メモ B", weather: "曇" };
  // generalNote は combinable、weather は非 combinable
  var merged = applyMerge(a, b, {generalNote:"combined", weather:"combined"}, "practice");
  assertEqual(merged.generalNote, "メモ A | メモ B"); // 結合
  assertEqual(merged.weather, "晴");                  // combined 無効 → A 採用 (フォールバック)
});

test("applyMerge: 元 a/b オブジェクトを変更しない (immutability)", function() {
  var a = _fxPracticeA(), b = _fxPracticeB();
  var origAStart = a.startTime, origBHr = b.heartRateAvg;
  applyMerge(a, b, {startTime:"b"}, "practice");
  assertEqual(a.startTime, origAStart); // a は不変
  assertEqual(b.heartRateAvg, origBHr); // b は不変
});

// ── applyMerge: tournament の matches[] が自動合算される
test("applyMerge: tournament の matches[] が自動合算 (id 重複は A 側残し)", function() {
  var a = { id: "tA", date: "2026-04-15", name: "大会 A", matches: [{id:"m1",result:"勝"},{id:"m2",result:"負"}] };
  var b = { id: "tB", date: "2026-04-15", name: "大会 B", matches: [{id:"m1",result:"X"},{id:"m4",result:"勝"}] };
  var merged = applyMerge(a, b, {}, "tournament");
  assertEqual(merged.id, "tA");
  assertEqual(merged.matches.length, 3); // m1, m2, m4
  // m1 は A 側 (result:"勝")、B 側 (result:"X") は破棄
  var m1 = merged.matches.find(function(m){return m.id==="m1";});
  assertEqual(m1.result, "勝");
  // m2 (A のみ) と m4 (B のみ) はそのまま
  assert(merged.matches.find(function(m){return m.id==="m2";}), "m2 残る");
  assert(merged.matches.find(function(m){return m.id==="m4";}), "m4 追加");
});

// ── mergeMatches: 直接呼び出しテスト
test("mergeMatches: 空配列同士 → 空配列", function() {
  assertEqual(mergeMatches([], []).length, 0);
});

test("mergeMatches: A のみ → A をそのまま返す", function() {
  var r = mergeMatches([{id:"m1"}], []);
  assertEqual(r.length, 1);
  assertEqual(r[0].id, "m1");
});

test("mergeMatches: B のみ → B をそのまま返す", function() {
  var r = mergeMatches([], [{id:"m1"}]);
  assertEqual(r.length, 1);
  assertEqual(r[0].id, "m1");
});

test("mergeMatches: 完全に重複 → A のみ残る", function() {

});

test("mergeMatches: id を持たない match (旧データ) はそのまま追加", function() {

  assertEqual(r.length, 2);
});

test("mergeMatches: null/undefined 要素はスキップ", function() {

});

// ── relinkAfterMerge: practice の linkedPracticeId 付け替え
test("relinkAfterMerge: practice → B の id を持つ trial が A の id に書き換わる", function() {
  var trials = _fxTrialsForMerge();
  var b = { id: "pB" }, a = { id: "pA" };
  var newTrials = relinkAfterMerge(trials, b, a, "practice");
  var byId = {};
  newTrials.forEach(function(t){ byId[t.id] = t; });
  assertEqual(byId.tr1.linkedPracticeId, "pA"); // 付け替え
  assertEqual(byId.tr2.linkedPracticeId, "pA"); // 元から A
  assertEqual(byId.tr3.linkedPracticeId, "");   // 無関係
  assertEqual(byId.tr4.linkedPracticeId, "pA"); // 付け替え
});

test("relinkAfterMerge: practice → 元配列を変更しない", function() {
  var trials = _fxTrialsForMerge();
  var origTr1Linked = trials[0].linkedPracticeId;
  relinkAfterMerge(trials, {id:"pB"}, {id:"pA"}, "practice");
  assertEqual(trials[0].linkedPracticeId, origTr1Linked); // 元は "pB" のまま
});

test("relinkAfterMerge: tournament → 何もしない (matches[] 合算で id 維持)", function() {
  var trials = [{id:"tr1", linkedMatchId:"m1", linkedPracticeId:""}];

});

test("relinkAfterMerge: trial → 何もしない (cascade 対象外)", function() {

});

});

test("countRelinks: practice → B の id 参照 trial 数", function() {

// ── 統合シナリオ: AW (B) を GCal (A) に統合
test("統合: practice AW(B) を GCal(A) に統合 → cascade trial.linkedPracticeId 付け替え", function() {
  var a = _fxPracticeA(), b = _fxPracticeB();
  var trials = _fxTrialsForMerge();
  // ユーザー選択: 時間系は B 採用 (実時間)
  var choices = { startTime:"a", endTime:"b", duration:"b" };
  var merged = applyMerge(a, b, choices, "practice");
  var newTrials = relinkAfterMerge(trials, b, a, "practice");
  // 統合結果検証
  assertEqual(merged.id, "pA");
  assertEqual(merged.title, "火曜練習");        // A 維持
  assertEqual(merged.endTime, "20:48");          // B 採用
  assertEqual(merged.heartRateAvg, 138);         // B 補完
  assertEqual(merged.calories, 312);             // B 補完
  // trial 付け替え検証
  var byId = {};
  newTrials.forEach(function(t){ byId[t.id] = t; });
  assertEqual(byId.tr1.linkedPracticeId, "pA"); // 付け替え済
  assertEqual(byId.tr4.linkedPracticeId, "pA"); // 付け替え済
});
