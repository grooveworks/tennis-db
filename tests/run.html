<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8">
<title>Tennis DB v4 tests</title>
<style>body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;background:#f2f2f7;color:#1a1a1a}</style>
</head><body>
<script>
// 簡易テストランナー（inline 版、外部依存なし）
window.__tests = [];
window.test = function(name, fn) { window.__tests.push({name: name, fn: fn}); };
window.assert = function(cond, msg) { if (!cond) throw new Error(msg || "assertion failed"); };
window.assertEqual = function(a, b, msg) {
  var sa = typeof a === "object" ? JSON.stringify(a) : String(a);
  var sb = typeof b === "object" ? JSON.stringify(b) : String(b);
  if (sa !== sb) throw new Error((msg || "assertEqual failed") + " — expected " + sb + ", got " + sa);
};
window.runAllTests = function() {
  var results = window.__tests.map(function(t) {
    try { t.fn(); return {name: t.name, ok: true}; }
    catch (e) { return {name: t.name, ok: false, err: e.message || String(e)}; }
  });
  var total = results.length;
  var failed = results.filter(function(r){return !r.ok;}).length;
  var ok = total - failed;
  var color = failed === 0 ? "green" : "red";
  var html = '<div style="font-family:-apple-system,sans-serif;padding:20px">';
  html += '<h1 style="color:' + color + ';margin-bottom:12px">' + total + ' tests, ' + ok + ' ok, ' + failed + ' failed</h1>';
  html += '<ul style="list-style:none;padding:0">';
  results.forEach(function(r){
    html += '<li style="padding:4px 0;color:' + (r.ok?'#080':'#c00') + '">' + (r.ok?'✓':'✗') + ' ' + r.name + (r.err?' <span style="color:#666">— '+r.err+'</span>':'') + '</li>';
  });
  html += '</ul></div>';
  document.body.innerHTML = html;
};
</script>

<!-- ===== src/domain/cascade.js (inline copy, S16.11 UX4 linkedMatchIds[] 対応) ===== -->
<script>
function computeCascade({ type, item, trials }) {
  const _trials = Array.isArray(trials) ? trials : [];
  if (!item || !item.id || !type) return { affectedTrials: [], count: 0 };
  const _trialMatchesId = (tr, mId) => {
    if (!tr || !mId) return false;
    if (tr.linkedMatchId === mId) return true;
    if (Array.isArray(tr.linkedMatchIds) && tr.linkedMatchIds.includes(mId)) return true;
    return false;
  };
  if (type === "tournament") {
    const matchIds = new Set((Array.isArray(item.matches) ? item.matches : []).map(m => m && m.id).filter(Boolean));
    if (matchIds.size === 0) return { affectedTrials: [], count: 0 };
    const affected = _trials
      .filter(tr => tr && [...matchIds].some(mId => _trialMatchesId(tr, mId)))
      .map(tr => ({ trial: tr, clearField: "linkedMatchId", removeMatchIds: [...matchIds].filter(mId => _trialMatchesId(tr, mId)) }));
    return { affectedTrials: affected, count: affected.length };
  }
  if (type === "practice") {
    const affected = _trials
      .filter(tr => tr && tr.linkedPracticeId === item.id)
      .map(tr => ({ trial: tr, clearField: "linkedPracticeId" }));
    return { affectedTrials: affected, count: affected.length };
  }
  if (type === "match") {
    const affected = _trials
      .filter(tr => tr && _trialMatchesId(tr, item.id))
      .map(tr => ({ trial: tr, clearField: "linkedMatchId", removeMatchIds: [item.id] }));
    return { affectedTrials: affected, count: affected.length };
  }
  return { affectedTrials: [], count: 0 };
}
function applyCascadeToTrials(trials, affectedTrials) {
  const _trials = Array.isArray(trials) ? trials : [];
  const _affected = Array.isArray(affectedTrials) ? affectedTrials : [];
  if (_affected.length === 0) return _trials;
  const updateMap = new Map();
  for (const a of _affected) {
    if (a && a.trial && a.trial.id) {
      updateMap.set(a.trial.id, { clearField: a.clearField, removeMatchIds: a.removeMatchIds });
    }
  }
  if (updateMap.size === 0) return _trials;
  return _trials.map(tr => {
    if (!tr || !tr.id || !updateMap.has(tr.id)) return tr;
    const { clearField, removeMatchIds } = updateMap.get(tr.id);
    let updated = { ...tr };
    if (clearField === "linkedMatchId" && Array.isArray(removeMatchIds)) {
      if (removeMatchIds.includes(updated.linkedMatchId)) {
        updated.linkedMatchId = "";
      }
    } else if (clearField) {
      updated[clearField] = "";
    }
    if (Array.isArray(removeMatchIds) && Array.isArray(updated.linkedMatchIds)) {
      updated.linkedMatchIds = updated.linkedMatchIds.filter(id => !removeMatchIds.includes(id));
    }
    return updated;
  });
}
function describeCascadeMessage(type, count) {
  const label = type === "tournament" ? "大会"
              : type === "practice"   ? "練習"
              : type === "match"      ? "試合"
              : type === "trial"      ? "試打"
              : "";
  if (!label) return { title: "削除の確認", body: "削除しますか？", warn: "この操作は取り消せません。" };
  const title = type === "match" ? "試合記録を削除" : `${label}を削除`;
  if (!count || count <= 0) {
    return {
      title,
      body: `この${label}を削除しますか？`,
      warn: "この操作は取り消せません。",
    };
  }
  return {
    title,
    body: `この${label}を削除すると、紐付いた試打 ${count} 件の連携情報が外れます。`,
    note: "(試打自体は残ります)",
    warn: "この操作は取り消せません。",
  };
}
</script>

<script>
function _isSameValue(a, b) {
  if (a === b) return true;
  if (a === null || b === null) return false;
  if (typeof a === "object" || typeof b === "object") {
    try { return JSON.stringify(a) === JSON.stringify(b); }
    catch { return false; }
  }
  return String(a) === String(b);
}
function computeMergeDiff(a, b, type) {
  const result = { match: [], complement: [], conflicts: [], unionKeys: [] };
  const keys = keysToInspect(a, b, type);
  result.unionKeys = keys;
  for (const key of keys) {
    if (key === "matches") continue;
    const av = a ? a[key] : undefined;
    const bv = b ? b[key] : undefined;
    const aE = isEmptyVal(av);
    const bE = isEmptyVal(bv);
    const label = labelFor(key, type);
    if (aE && bE) {
      result.match.push({ key, label, value: undefined });
    } else if (aE && !bE) {
      result.complement.push({ key, label, from: "b", value: bv });
    } else if (!aE && bE) {
      result.complement.push({ key, label, from: "a", value: av });
    } else if (_isSameValue(av, bv)) {
      result.match.push({ key, label, value: av });
    } else {
      result.conflicts.push({
        key, label,
        aValue: av, bValue: bv,
        combinable: COMBINABLE_FIELDS.has(key),
      });
    }
  }
  return result;
}
function applyMerge(a, b, choices, type) {
  const _a = a || {};
  const _b = b || {};
  const _choices = choices || {};
  const merged = { ..._a };
  const keys = keysToInspect(_a, _b, type);
  for (const key of keys) {
    if (key === "matches") continue;
    const av = _a[key], bv = _b[key];
    const aE = isEmptyVal(av), bE = isEmptyVal(bv);
    if (aE && bE) continue;
    if (aE && !bE) { merged[key] = bv; continue; }
    if (!aE && bE) { merged[key] = av; continue; }
    if (_isSameValue(av, bv)) { merged[key] = av; continue; }
    const ch = _choices[key] || "a";
    if (ch === "b") merged[key] = bv;
    else if (ch === "combined" && COMBINABLE_FIELDS.has(key)) {
      merged[key] = `${av} | ${bv}`;
    } else {
      merged[key] = av;
    }
  }
  if (type === "tournament") {
    merged.matches = mergeMatches(_a.matches, _b.matches);
  }
  merged.id = _a.id;
  return merged;
}
function mergeMatches(matchesA, matchesB) {
  const a = (Array.isArray(matchesA) ? matchesA : []).filter(m => m);
  const b = (Array.isArray(matchesB) ? matchesB : []).filter(m => m);
  const aIds = new Set();
  for (const m of a) { if (m.id) aIds.add(m.id); }
  const result = [...a];
  for (const m of b) {
    if (m.id && aIds.has(m.id)) continue;
    result.push(m);
  }
  return result;
}
function relinkAfterMerge(trials, removedItem, keptItem, type) {
  const _trials = Array.isArray(trials) ? trials : [];
  if (!removedItem || !removedItem.id || !keptItem || !keptItem.id) return _trials;
  if (type === "practice") {
    const removedId = removedItem.id;
    const keptId = keptItem.id;
    return _trials.map(tr => {
      if (!tr) return tr;
      if (tr.linkedPracticeId === removedId) {
        return { ...tr, linkedPracticeId: keptId };
      }
      return tr;
    });
  }
  return _trials;
}
function countRelinks(trials, removedItem, type) {
  const _trials = Array.isArray(trials) ? trials : [];
  if (!removedItem || !removedItem.id) return 0;
  if (type === "practice") {
    const removedId = removedItem.id;
    return _trials.filter(tr => tr && tr.linkedPracticeId === removedId).length;
  }
  return 0;
}
</script>

<script>
// テスト用フィクスチャ
function _fxTrials() {
  return [
    { id: "tr1", linkedMatchId: "m1",  linkedPracticeId: ""    },
    { id: "tr2", linkedMatchId: "m2",  linkedPracticeId: ""    },
    { id: "tr3", linkedMatchId: "",    linkedPracticeId: "p1"  },
    { id: "tr4", linkedMatchId: "m3",  linkedPracticeId: "p2"  },
    { id: "tr5", linkedMatchId: "",    linkedPracticeId: ""    }, // 連携なし
  ];
}

// ── computeCascade: tournament 削除 (matches[] 内の m1, m2, m3 を全 cascade)
test("computeCascade: tournament 削除 → matches[] 内 3 試合に紐付く試打 3 件", function() {
  var item = { id: "t1", matches: [{ id: "m1" }, { id: "m2" }, { id: "m3" }] };
  var r = computeCascade({ type: "tournament", item: item, trials: _fxTrials() });
  assertEqual(r.count, 3);
  var ids = r.affectedTrials.map(function(a){return a.trial.id;}).sort();
  assertEqual(ids, ["tr1", "tr2", "tr4"]);
  // 全て linkedMatchId クリア
  r.affectedTrials.forEach(function(a){ assertEqual(a.clearField, "linkedMatchId"); });
});

// ── computeCascade: tournament 削除 (matches[] 0 件 → 影響 0)
test("computeCascade: tournament 削除 で matches[] 空 → 0 件", function() {
  var item = { id: "t1", matches: [] };
  var r = computeCascade({ type: "tournament", item: item, trials: _fxTrials() });
  assertEqual(r.count, 0);
  assertEqual(r.affectedTrials, []);
});

  var item = { id: "p1" };
  var r = computeCascade({ type: "practice", item: item, trials: _fxTrials() });
  assertEqual(r.count, 1);
  assertEqual(r.affectedTrials[0].trial.id, "tr3");

  var item = { id: "p999" };
  var r = computeCascade({ type: "practice", item: item, trials: _fxTrials() });

});

// ── computeMergeDiff: practice 2 件の典型シナリオ
test("computeMergeDiff: practice → match/complement/conflicts に正しく分類", function() {
  var diff = computeMergeDiff(_fxPracticeA(), _fxPracticeB(), "practice");
  // date は両方一致
  var dateInMatch = diff.match.some(function(m){return m.key==="date";});
  assert(dateInMatch, "date は match に入る");
  // startTime / endTime / duration は競合
  var conflictKeys = diff.conflicts.map(function(c){return c.key;}).sort();
  assertEqual(conflictKeys.indexOf("startTime") >= 0, true);
  assertEqual(conflictKeys.indexOf("endTime") >= 0, true);
  assertEqual(conflictKeys.indexOf("duration") >= 0, true);
  // heartRateAvg / calories / totalCalories は B のみ → complement (from=b)
  var complementBKeys = diff.complement.filter(function(c){return c.from==="b";}).map(function(c){return c.key;});
  assert(complementBKeys.indexOf("heartRateAvg") >= 0, "heartRateAvg は B から補完");
  assert(complementBKeys.indexOf("calories") >= 0, "calories は B から補完");
  assert(complementBKeys.indexOf("totalCalories") >= 0, "totalCalories は B から補完");
  // title / venue / racketName は A のみ → complement (from=a)
  var complementAKeys = diff.complement.filter(function(c){return c.from==="a";}).map(function(c){return c.key;});
  assert(complementAKeys.indexOf("title") >= 0, "title は A から補完 (B 残し時用)");
  assert(complementAKeys.indexOf("venue") >= 0, "venue は A から補完");
});

  assert(noteConflict, "generalNote が conflicts に入る");
  assertEqual(noteConflict.combinable, true);
});

});

// ── computeMergeDiff: matches[] (tournament) は分類対象から除外
test("computeMergeDiff: matches[] (tournament) は分類対象外", function() {
  var a = { id: "a", date: "2026-04-22", name: "T A", matches: [{id:"m1"}] };
  var b = { id: "b", date: "2026-04-22", name: "T B", matches: [{id:"m2"}] };
  var diff = computeMergeDiff(a, b, "tournament");
  var hasMatchesKey = diff.unionKeys.indexOf("matches") >= 0; // unionKeys には含まれる
  assert(hasMatchesKey, "matches は unionKeys に含まれる");
  var inMatch = diff.match.some(function(m){return m.key==="matches";});
  var inComp = diff.complement.some(function(c){return c.key==="matches";});
  var inConf = diff.conflicts.some(function(c){return c.key==="matches";});
  assert(!inMatch && !inComp && !inConf, "matches はどの分類にも入らない");
});

<script>
const reorderItems=(list,fromIndex,toIndex)=>{
  if(!Array.isArray(list))return [];
  const len=list.length;
  if(fromIndex<0||fromIndex>=len)return [...list];
  if(toIndex<0||toIndex>=len)return [...list];
  if(fromIndex===toIndex)return list.map((item,i)=>({...item,order:i}));
  const result=[...list];
  const [moved]=result.splice(fromIndex,1);
  result.splice(toIndex,0,moved);
  return result.map((item,i)=>({...item,order:i}));
};
const moveItemUp=(list,fromIndex)=>{
  if(!Array.isArray(list)||fromIndex<=0||fromIndex>=list.length)return Array.isArray(list)?[...list]:[];
  return reorderItems(list,fromIndex,fromIndex-1);
};
const moveItemDown=(list,fromIndex)=>{
  if(!Array.isArray(list)||fromIndex<0||fromIndex>=list.length-1)return Array.isArray(list)?[...list]:[];
  return reorderItems(list,fromIndex,fromIndex+1);
};
const assignDefaultOrders=list=>{
  if(!Array.isArray(list))return [];
  return list.map((item,i)=>{
    if(item==null||typeof item!=="object")return item;
    if(typeof item.order==="number"&&!isNaN(item.order))return item;
    return {...item,order:i};
  });
};
const sortByStatusAndOrder=(list,statusPriority)=>{
  if(!Array.isArray(list))return [];
  const pri=statusPriority||{};
  const fallback=Math.max(...Object.values(pri),-1)+1;
  const getPri=s=>(s in pri)?pri[s]:fallback;
  return [...list].sort((a,b)=>{
    const pa=getPri(a&&a.status);
    const pb=getPri(b&&b.status);
    if(pa!==pb)return pa-pb;
    const oa=(a&&typeof a.order==="number"&&!isNaN(a.order))?a.order:Number.POSITIVE_INFINITY;
    const ob=(b&&typeof b.order==="number"&&!isNaN(b.order))?b.order:Number.POSITIVE_INFINITY;
    return oa-ob;
  });
};
const RACKET_STATUS_PRIORITY={active:0,sub:1,candidate:2,considering:3,support:4,retired:5};
const STRING_STATUS_PRIORITY={confirmed:0,good:1,testing:2,candidate:3,hold:4,rejected:5};
const SETUP_STATUS_PRIORITY={active:0,archived:1};
</script>

<script>
// genId stub: tests don't need real Firestore-safe id, just unique-ish
let _genIdCounter = 0;
function genId() { _genIdCounter++; return "id_" + _genIdCounter + "_" + Date.now().toString(36); }

const blankMatch = (matchCount, defaultsFromTournament) => {
  const t = defaultsFromTournament || {};
  return {
    id: genId(),
    round: `${matchCount + 1}回戦`,
    opponent: "", opponent2: "",
    racketName: t.racketName || "", stringMain: t.stringMain || "",
    stringCross: t.stringCross || "", tensionMain: t.tensionMain || "",
    tensionCross: t.tensionCross || "",
    result: "勝利", setScores: [], mental: 3, physical: 3,
    mentalNote: "", techNote: "", opponentNote: "", note: "",
    games: [], changeovers: [],
  };
};
const shouldPromptCO = (gamesLength) => gamesLength % 2 === 1;
const addGame = (match, winner) => {
  const games = Array.isArray(match.games) ? match.games : [];
  const newGames = [...games, { id: genId(), winner }];
  const next = { ...match, games: newGames };
  const promptAfterGame = shouldPromptCO(newGames.length) ? newGames.length : null;
  return { match: next, promptAfterGame };
};
const removeLastGame = (match) => {
  const games = Array.isArray(match.games) ? match.games : [];
  if (games.length === 0) return match;
  const removedAfterGame = games.length;
  const newGames = games.slice(0, -1);
  const cos = Array.isArray(match.changeovers) ? match.changeovers : [];
  const newCOs = cos.filter(co => co.afterGame !== removedAfterGame);
  return { ...match, games: newGames, changeovers: newCOs };
};
const removeGameAt = (match, index) => {
  const games = Array.isArray(match.games) ? match.games : [];
  if (index < 0 || index >= games.length) return match;
  const newGames = [...games.slice(0, index), ...games.slice(index + 1)];
  const removedAfterGame = index + 1;
  const cos = Array.isArray(match.changeovers) ? match.changeovers : [];
  const newCOs = cos
    .filter(co => co.afterGame !== removedAfterGame)
    .map(co => co.afterGame > removedAfterGame ? { ...co, afterGame: co.afterGame - 1 } : co);
  return { ...match, games: newGames, changeovers: newCOs };
};
const replaceGameWinner = (match, index, winner) => {
  const games = Array.isArray(match.games) ? match.games : [];
  if (index < 0 || index >= games.length) return match;
  const newGames = games.map((g, i) => i === index ? { ...g, winner } : g);
  return { ...match, games: newGames };
};
const upsertChangeover = (match, co) => {
  const cos = Array.isArray(match.changeovers) ? match.changeovers : [];
  const newCOs = [...cos.filter(c => c.afterGame !== co.afterGame), co];
  newCOs.sort((a, b) => a.afterGame - b.afterGame);
  return { ...match, changeovers: newCOs };
};
const removeChangeover = (match, afterGame) => {
  const cos = Array.isArray(match.changeovers) ? match.changeovers : [];
  return { ...match, changeovers: cos.filter(c => c.afterGame !== afterGame) };
};
const resetGameTracker = (match) => ({ ...match, games: [], changeovers: [] });
const computeRunningScore = (games) => {
  const list = Array.isArray(games) ? games : [];
  return list.reduce((acc, g) => {
    if (g.winner === "me") acc.me++;
    else if (g.winner === "opp") acc.opp++;
    return acc;
  }, { me: 0, opp: 0 });
};
const computeSetScoresFromGames = (games) => {
  const list = Array.isArray(games) ? games : [];
  if (list.length === 0) return [];
  const setScores = [];
  let me = 0, opp = 0;
  for (const g of list) {
    if (!g) continue;
    if (g.winner === "me") me++;
    else if (g.winner === "opp") opp++;
    else continue;
    const diff = Math.abs(me - opp);
    let setComplete = false;
    if (me >= 6 && diff >= 2) setComplete = true;
    else if (opp >= 6 && diff >= 2) setComplete = true;
    else if (me === 7 && opp === 5) setComplete = true;
    else if (opp === 7 && me === 5) setComplete = true;
    else if (me === 7 && opp === 6) setComplete = true;
    else if (opp === 7 && me === 6) setComplete = true;
    if (setComplete) {
      setScores.push(`${me}-${opp}`);
      me = 0; opp = 0;
    }
  }
  if (me > 0 || opp > 0) {
    setScores.push(`${me}-${opp}`);
  }
  return setScores;
};
const computeAutoMatchResult = (games) => {
  const sets = computeSetScoresFromGames(games);
  let mySetsWon = 0, oppSetsWon = 0;
  for (const s of sets) {
    const m = s.match(/^(\d+)-(\d+)$/);
    if (!m) continue;
    const me = parseInt(m[1], 10);
    const opp = parseInt(m[2], 10);
    if (isNaN(me) || isNaN(opp)) continue;
    const diff = Math.abs(me - opp);
    let setComplete = false;
    if (me >= 6 && diff >= 2) setComplete = true;
    else if (opp >= 6 && diff >= 2) setComplete = true;
    else if (me === 7 && opp === 5) setComplete = true;
    else if (opp === 7 && me === 5) setComplete = true;
    else if (me === 7 && opp === 6) setComplete = true;
    else if (opp === 7 && me === 6) setComplete = true;
    if (!setComplete) continue;
    if (me > opp) mySetsWon++;
    else oppSetsWon++;
  }
  if (mySetsWon >= 2) return "勝利";
  if (oppSetsWon >= 2) return "敗北";
  return null;
};
</script>

  assertEqual(r.changeovers[0].note, "new");
});
test("removeChangeover: afterGame 一致を削除", function() {

    games: _games("mommomm"),
    changeovers: [{afterGame:1},{afterGame:3},{afterGame:5}],
  };
  var r = removeChangeover(match, 3);
  assertEqual(r.changeovers.length, 2);
  assertEqual(r.changeovers.map(function(c){return c.afterGame;}), [1,5]);
});

// ── UX3: computeSetScoresFromGames (TENNIS_RULES §2.1, §6 準拠)
test("UX3: 6-0 ストレート勝ち → ['6-0']", function() {
  // 6 ゲーム連勝
  var games = _games("mmmmmm");
  assertEqual(computeSetScoresFromGames(games), ["6-0"]);
});
test("UX3: 6-4 通常勝ち (差 2) → ['6-4']", function() {
  // m-o 交互で 4-4 → me 2 連取で 6-4 (途中で early-break しない並び)
  // m,o,m,o,m,o,m,o,m,m → 1-0,1-1,2-1,2-2,3-2,3-3,4-3,4-4,5-4,6-4 → 10 games
  var games = _games("momomomomm");
  assertEqual(computeSetScoresFromGames(games), ["6-4"]);
});
test("UX3: 7-5 (5-5 後の延長で 7 取った) → ['7-5']", function() {
  // 5-5 から me が 2 連取 → 7-5
  // mmmmmoooooomm → me 5, opp 5, me 7, opp 5
  var games = _games("mmmmmooooommo"); // 怪しいので構築直し
  // 手で組み立て: 5-5 → me me で 7-5
  games = _games("mmmmm")  // 5-0
    .concat(_games("ooooo")) // 5-5
    .concat(_games("mm"));   // 7-5
  // me が m 5+2=7、opp が 5
  assertEqual(computeSetScoresFromGames(games), ["7-5"]);
});
test("UX3: 7-6 タイブレーク勝ち → ['7-6']", function() {
  // 交互で 6-6 まで持ち込んで me が TB 取る並び
  // momomomomomom (13G): 1-0,1-1,...,6-6,7-6 (early break 起きない)
  var games = _games("momomomomomom");
  assertEqual(computeSetScoresFromGames(games), ["7-6"]);
});
test("UX3: 6-2 + 6-1 完了 (2 セット連取) → ['6-2','6-1']", function() {
  // セット 1 (6-2): m,m,m,m,o,m,o,m → 4-1,5-1,5-2,6-2 → 8G で 6-2 完了
  var set1 = _games("mmmmomom");
  // セット 2 (6-1): m,m,m,m,m,o,m → 5-0,5-1,6-1 → 7G で 6-1 完了
  var set2 = _games("mmmmmom");
  var games = set1.concat(set2);
  assertEqual(computeSetScoresFromGames(games), ["6-2","6-1"]);
});
test("UX3: 6-2 完了 + 進行中 3-1 → ['6-2','3-1']", function() {
  var set1 = _games("mmmmomom");      // 6-2 完了

  var games = set1.concat(partial);
  assertEqual(computeSetScoresFromGames(games), ["6-2","3-1"]);
});
test("UX3: 1G のみ進行中 → ['1-0']", function() {
  var games = _games("m");
  assertEqual(computeSetScoresFromGames(games), ["1-0"]);
});
test("UX3: 0G → []", function() {
  assertEqual(computeSetScoresFromGames([]), []);
});
test("UX3: 5-5 → 5-5 進行中 (まだ 7 ではない)", function() {
  var games = _games("mmmmmooooo");
  assertEqual(computeSetScoresFromGames(games), ["5-5"]);
});
test("UX3: 6-5 → 6-5 進行中 (差 1、未完了)", function() {
  var games = _games("mmmmmoooom");
  // me=6, opp=5, diff=1 → not complete
  // 上のゲーム並び: m5 + o5 + 1 ?? 待った: mmmmmoooom = me m+m+m+m+m+o+o+o+o+o+m? → 11 文字必要
  games = _games("mmmmmoooomm"); // me 7, opp 4 → これは違う
  // 手動: me 6, opp 5 が欲しい
  games = [
    {id:"g1",winner:"me"}, {id:"g2",winner:"me"}, {id:"g3",winner:"me"},
    {id:"g4",winner:"me"}, {id:"g5",winner:"me"}, // 5-0
    {id:"g6",winner:"opp"},{id:"g7",winner:"opp"},{id:"g8",winner:"opp"},
    {id:"g9",winner:"opp"},{id:"g10",winner:"opp"}, // 5-5
    {id:"g11",winner:"me"}, // 6-5
  ];
  assertEqual(computeSetScoresFromGames(games), ["6-5"]);
});
test("UX3: 不明 winner はスキップ (set 計算に含めない)", function() {
  var games = [
    {id:"g1",winner:"me"}, {id:"g2",winner:""}, {id:"g3",winner:"me"},
  ];
  assertEqual(computeSetScoresFromGames(games), ["2-0"]);
});

// ── UX2: computeAutoMatchResult (TENNIS_RULES §6 / best of 3)
test("UX2: 6-2, 6-1 → '勝利' (2 セット先取)", function() {

});

  // mirror: 2-6 = ooomoomo + oo (opp 6 取り順) - シンプルに opp 視点で組む
  // 2-6: o,o,o,o,m,o,m,o → 4-1,5-1,5-2,6-2 (me=2, opp=6)
  var set1 = _games("oooomomo");      // 2-6
  var set2 = _games("ooooomo");       // 1-6
  var games = set1.concat(set2);
  assertEqual(computeSetScoresFromGames(games), ["2-6","1-6"]);

});

// ── UX2/UX3 統合: GameTracker 操作 → setScores 自動反映
test("UX2/UX3 統合: addGame 連続で setScores 自動更新シナリオ", function() {
  var match = blankMatch(0, {});
  // 6 ゲーム連取で 6-0 セット完了
  for (var i = 0; i < 6; i++) {
    var r = addGame(match, "me");
    match = r.match;
  }
  var sets = computeSetScoresFromGames(match.games);
  assertEqual(sets, ["6-0"]);
  var auto = computeAutoMatchResult(match.games);
  assertEqual(auto, null); // まだ 1 セット
  // 2 セット目も me 6 連取
  for (var j = 0; j < 6; j++) {
    var r2 = addGame(match, "me");
    match = r2.match;
  }
  assertEqual(computeSetScoresFromGames(match.games), ["6-0","6-0"]);
  assertEqual(computeAutoMatchResult(match.games), "勝利");
});

test("UX2/UX3 統合: removeGameAt でセット境界が動的に再計算", function() {
  // 6-0 完了 + 進行中 1-0 → セット 2 個
  var games = _games("mmmmmm").concat(_games("m"));
  assertEqual(computeSetScoresFromGames(games), ["6-0","1-0"]);
  // 1 ゲーム目 (g0) を削除 → 5+1=6 個 → me 6 で 6-0 完了 (進行中なし)
  // 注: 削除後の games は m,m,m,m,m,m (元の g1〜g6) → 6-0
  var match = { games: games, changeovers: [] };
  var r = removeGameAt(match, 0);
  assertEqual(computeSetScoresFromGames(r.games), ["6-0"]);
});
