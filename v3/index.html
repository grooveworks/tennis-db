// ── ERROR BOUNDARY ────────────────────────────────
class ErrorBoundary extends React.Component{
  constructor(p){super(p);this.state={hasError:false,error:null};}
  static getDerivedStateFromError(e){return{hasError:true,error:e};}
  render(){
    if(this.state.hasError)return<div style={{padding:20,textAlign:"center"}}>
      <div style={{fontSize:16,marginBottom:8}}>⚠️</div>
      <div style={{fontSize:13,color:C.red,fontWeight:600,marginBottom:4}}>{this.props.label}でエラーが発生しました</div>
      <div style={{fontSize:11,color:C.textMuted,marginBottom:12}}>{this.state.error?.message}</div>
      <button onClick={()=>this.setState({hasError:false,error:null})} style={{background:C.accent,border:"none",color:"#fff",borderRadius:6,padding:"8px 16px",fontSize:12,fontWeight:700,cursor:"pointer"}}>リトライ</button>
    </div>;
    return this.props.children;
  }
}

// ── MERGE & IMPORT ────────────────────────────────
const trnDup=(a,b)=>normDate(a.date)===normDate(b.date)&&a.name===b.name;
const pracDup=(a,b)=>normDate(a.date)===normDate(b.date)&&(a.venue||"")===(b.venue||"");
const mergeArr=(exist,incoming,isDup)=>{
  const merged=[...exist];
  (incoming||[]).forEach(item=>{
    if(!merged.find(e=>e.id===item.id||isDup(e,item)))merged.push(item);
  });
  return merged;
};
const mergeData=(current,incoming)=>{
  const r={...current};
  r.tournaments=mergeArr(current.tournaments||[],incoming.tournaments,trnDup);
  r.practices=mergeArr(current.practices||[],incoming.practices,pracDup);
  r.trials=mergeArr(current.trials||[],incoming.trials,(a,b)=>a.id===b.id);
  ["rackets","strings","measurements","mental","next","opponents","stringSetups","quickTrialCards"].forEach(k=>{
    if(incoming[k]){r[k]=mergeArr(current[k]||[],incoming[k],(a,b)=>a.id===b.id);}
  });
  if(incoming.venues){r.venues=[...new Set([...(current.venues||[]),...incoming.venues])];}
  if(incoming.profile&&!current.profile?.name){r.profile=incoming.profile;}
  return r;
};
const autoOpponents=(tournaments,opponents)=>{
  const existing=new Set((opponents||[]).map(o=>o.name));
  const newOpps=[];
  (tournaments||[]).forEach(t=>{
    (t.matches||[]).forEach(m=>{
      if(m.opponent&&!existing.has(m.opponent)&&!newOpps.find(n=>n.name===m.opponent)){
        newOpps.push({id:genId(),name:m.opponent,nickname:"",gender:"",style:"",strengths:"",weaknesses:"",note:""});
        existing.add(m.opponent);
      }
      if(m.opponent2&&!existing.has(m.opponent2)&&!newOpps.find(n=>n.name===m.opponent2)){
        newOpps.push({id:genId(),name:m.opponent2,nickname:"",gender:"",style:"",strengths:"",weaknesses:"",note:""});
        existing.add(m.opponent2);
      }
    });
  });
  return[...(opponents||[]),...newOpps];
};

// ── MIGRATION ─────────────────────────────────────
const migrateToV2=data=>{
  if(lsLoad("migrated_v2"))return data;
  console.log("🔄 v2 migration starting...");
  const r={...data};
  // Normalize trial fields
  (r.trials||[]).forEach(t=>{
    if(t.string&&!t.stringMain){t.stringMain=t.string;delete t.string;}
    if(t.tension&&!t.tensionMain){
      const m=String(t.tension).match(/(\d+)/);
      if(m){t.tensionMain=parseInt(m[1]);t.tensionCross=t.tensionCross||parseInt(m[1]);}
      delete t.tension;
    }
  });
  // Normalize practice/tournament fields
  [...(r.tournaments||[]),...(r.practices||[])].forEach(item=>{
    if(item.string&&!item.stringSetup){item.stringSetup=item.string;delete item.string;}
  });
  lsSave("migrated_v2",true);
  console.log("✅ v2 migration complete");
  return r;
};
const fixMeasurements=data=>{
  if(lsLoad("migrated_v2_measurements"))return data;
  const ms=data.measurements||[];
  if(ms.length===0){lsSave("migrated_v2_measurements",true);return data;}
  const rackets=data.rackets||[];
  ms.forEach(m=>{
    if(m.racket&&!m.racketId){
      const found=rackets.find(r=>r.name.includes(m.racket)||m.racket.includes(r.name));
      if(found)m.racketId=found.id;
    }
  });
  lsSave("migrated_v2_measurements",true);
  return data;
};

const formatMatchForClaude=(m,trn)=>{
  let s=`## 試合: ${trn?.name||""} ${m.round||""}\n`;
  s+=`日付: ${fmtDateFull(trn?.date)}\n`;
  s+=`対戦相手: ${m.opponent||"不明"}${m.opponent2?" / "+m.opponent2:""}\n`;
  s+=`結果: ${m.result||""} ${(m.setScores||[]).join(", ")}\n`;
  s+=`メンタル: ${m.mental||"-"}/5 (${MENTAL_LABELS[m.mental]||""}) / フィジカル: ${m.physical||"-"}/5 (${PHYSICAL_LABELS[m.physical]||""})\n`;
  if(m.note)s+=`メモ: ${m.note}\n`;
  if(m.games?.length){s+=`ゲーム推移: ${m.games.map(g=>g.winner==="me"?"●":"○").join("")}\n`;}
  if(m.changeovers?.length){
    s+="チェンジオーバー:\n";
    m.changeovers.forEach(co=>{s+=`  ${co.afterGame}G後: M${co.mental}/P${co.physical} ${co.note||""}\n`;});
  }
  return s;
};
const formatTournamentAllForClaude=trn=>{
  let s=`# 大会: ${trn.name} (${fmtDateFull(trn.date)})\n`;
  s+=`レベル: ${trn.level||""} / 種目: ${trn.type||""}\n`;
  s+=`結果: ${trn.overallResult||""}\n`;
  s+=`機材: ${trn.racketName||""} / ${trn.stringSetup||""} / ${trn.tension||""}\n`;
  if(trn.generalNote)s+=`総評: ${trn.generalNote}\n`;
  s+="\n";
  (trn.matches||[]).forEach(m=>{s+=formatMatchForClaude(m,trn)+"\n";});
  return s;
};
const formatPracticeForClaude=p=>{
  let s=`# 練習: ${fmtDateFull(p.date)} @ ${p.venue||""}\n`;
  s+=`種類: ${p.type||""} / 時間: ${p.duration||""}分\n`;
  if(p.racketName)s+=`機材: ${p.racketName} / ${p.stringSetup||""} / ${p.tension||""}\n`;
  if(p.focus)s+=`フォーカス: ${p.focus}\n`;
  if(p.coachNote)s+=`コーチメモ: ${p.coachNote}\n`;
  if(p.goodNote)s+=`良かった点: ${p.goodNote}\n`;
  if(p.improveNote)s+=`改善点: ${p.improveNote}\n`;
  if(p.generalNote)s+=`メモ: ${p.generalNote}\n`;
  return s;
};
const formatTrialForClaude=t=>{
  let s=`# 試打: ${t.racketName||""} / ${t.stringMain||""}${t.stringCross?" × "+t.stringCross:""}\n`;
  s+=`日付: ${fmtDateFull(t.date)} / テンション: ${t.tensionMain||t.tension||""}${t.tensionCross?"/"+t.tensionCross:""}p\n`;
  s+=`判定: ${t.judgment||""}\n`;
  const items=[["スピン",t.spin],["推進力",t.power],["コントロール",t.control],["打感情報",t.info],["操作性",t.maneuver],["振り抜き",t.swingThrough]];
  items.forEach(([l,v])=>{if(v)s+=`${l}: ${v}/5\n`;});
  if(t.strokeNote)s+=`ストローク: ${t.strokeNote}\n`;
  if(t.serveNote)s+=`サーブ: ${t.serveNote}\n`;
  if(t.volleyNote)s+=`ボレー: ${t.volleyNote}\n`;
  if(t.generalNote)s+=`総評: ${t.generalNote}\n`;
  return s;
};

const RESTORE_IDS=["trn01","trn02","trn03"];
const restoreIfMissing=(tournaments)=>{
  if(lsLoad("restored-trn-v225"))return tournaments;
  const missing=RESTORE_IDS.filter(id=>!tournaments.find(t=>t.id===id));
  if(missing.length===0){lsSave("restored-trn-v225",true);return tournaments;}
  const restored=[...tournaments];
  missing.forEach(id=>{const init=INIT.tournaments.find(t=>t.id===id);if(init)restored.push(init);});
  lsSave("restored-trn-v225",true);
  return ds(restored);
};

function ClaudeShareModal({onClose,data,toast}){
  const[tab,setTab]=useState("all");
  const tabs=[{id:"all",label:"全データ"},{id:"tournaments",label:"大会"},{id:"practices",label:"練習"},{id:"trials",label:"試打"},{id:"mental",label:"メンタル"},{id:"profile",label:"プロフィール"}];
  const getText=()=>{
    if(tab==="all"){
      let s="# Tennis DB エクスポート\n\n";
      s+="## 大会\n";(data.tournaments||[]).forEach(t=>{s+=formatTournamentAllForClaude(t)+"\n";});
      s+="## 練習\n";(data.practices||[]).forEach(p=>{s+=formatPracticeForClaude(p)+"\n";});
      s+="## 試打\n";(data.trials||[]).forEach(t=>{s+=formatTrialForClaude(t)+"\n";});
      return s;
    }
    if(tab==="tournaments")return(data.tournaments||[]).map(formatTournamentAllForClaude).join("\n");
    if(tab==="practices")return(data.practices||[]).map(formatPracticeForClaude).join("\n");
    if(tab==="trials")return(data.trials||[]).map(formatTrialForClaude).join("\n");
    if(tab==="mental")return(data.mental||[]).map(m=>`[${m.category}] ${m.title}: ${m.content}`).join("\n");
    if(tab==="profile"){const p=data.profile||{};return Object.entries(p).map(([k,v])=>Array.isArray(v)?`${k}: ${v.join(", ")}`:`${k}: ${v}`).join("\n");}
    return "";
  };
  const text=getText();
  const handleCopy=async()=>{await copyToClipboard(text);toast.show("📋 コピーしました");onClose();};
  return <div style={{position:"fixed",inset:0,background:"#0006",zIndex:400,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
    <div style={{background:C.panel,borderRadius:"16px 16px 0 0",width:"100%",maxHeight:"80vh",display:"flex",flexDirection:"column"}}>
      <div style={{padding:"16px 16px 8px",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:`1px solid ${C.border}`}}>
        <span style={{fontSize:15,fontWeight:700}}>📋 Claude共有</span>
        <button onClick={onClose} style={{background:"none",border:"none",fontSize:18,cursor:"pointer",color:C.textMuted}}>✕</button>
      </div>
      <div style={{display:"flex",gap:4,padding:"8px 16px",overflowX:"auto",flexShrink:0}}>
        {tabs.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{padding:"4px 10px",borderRadius:6,border:`1px solid ${tab===t.id?C.accent:C.border}`,background:tab===t.id?C.accentBg:C.panel2,color:tab===t.id?C.accent:C.textMuted,fontSize:11,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap"}}>{t.label}</button>)}
      </div>
      <div style={{padding:16,flex:1,overflowY:"auto"}}>
        <div style={{fontSize:11,color:C.textMuted,marginBottom:8}}>{text.length.toLocaleString()} 文字</div>
        <pre style={{fontSize:11,color:C.text,whiteSpace:"pre-wrap",wordBreak:"break-all",maxHeight:300,overflow:"auto",background:C.panel2,padding:10,borderRadius:6}}>{text.slice(0,2000)}{text.length>2000?"...":""}</pre>
      </div>
      <div style={{padding:16,borderTop:`1px solid ${C.border}`}}>
        <button onClick={handleCopy} style={{width:"100%",padding:12,borderRadius:8,background:C.accent,border:"none",color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer"}}>📋 コピー</button>
      </div>
    </div>
  </div>;
}

// ── GAME TRACKER ──────────────────────────────────
function GameTracker({match,onChange}){
  const games=match.games||[];
  const addGame=winner=>{const ng=[...games,{id:genId(),winner}];onChange({...match,games:ng});};
  const removeLast=()=>{if(games.length){onChange({...match,games:games.slice(0,-1)});}};
  const meCount=games.filter(g=>g.winner==="me").length;
  const oppCount=games.filter(g=>g.winner==="opp").length;
  return <div>
    <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:8}}>
      <span style={{fontSize:16,fontWeight:700,color:C.accent}}>{meCount}</span>
      <span style={{fontSize:12,color:C.textMuted}}>-</span>
      <span style={{fontSize:16,fontWeight:700,color:C.red}}>{oppCount}</span>
    </div>
    <div style={{display:"flex",gap:6,marginBottom:8}}>
      <button onClick={()=>addGame("me")} style={{flex:1,padding:10,borderRadius:8,background:C.accentBg,border:`1px solid ${C.accent}`,color:C.accent,fontSize:13,fontWeight:700,cursor:"pointer",minHeight:44}}>自分 +1</button>
      <button onClick={()=>addGame("opp")} style={{flex:1,padding:10,borderRadius:8,background:C.redBg,border:`1px solid ${C.red}`,color:C.red,fontSize:13,fontWeight:700,cursor:"pointer",minHeight:44}}>相手 +1</button>
      {games.length>0&&<button onClick={removeLast} style={{padding:10,borderRadius:8,background:C.panel2,border:`1px solid ${C.border}`,color:C.textMuted,fontSize:12,cursor:"pointer",minHeight:44}}>↩</button>}
    </div>
    {games.length>0&&<div style={{display:"flex",gap:1,flexWrap:"wrap"}}>
      {games.map((g,i)=><div key={g.id||i} style={{width:12,height:12,borderRadius:2,background:g.winner==="me"?C.accent:C.red}}/>)}
    </div>}
  </div>;
}
const GameBar=({games})=>{
  if(!games?.length)return null;
  return <div style={{display:"flex",gap:1}}>
    {games.map((g,i)=><div key={i} style={{width:8,height:8,borderRadius:1,background:g.winner==="me"?C.accent:C.red}}/>)}
  </div>;
};

// ── QUICK TRIAL MODE (v2-style: card registration + evaluation) ──
function QuickTrialMode({rackets,strings,trials,tournaments,practices,cards,setCards,onSaveTrial,onClose,toast}){
  const[selected,setSelected]=useState(null);
  const[adding,setAdding]=useState(false);
  const[addF,setAddF]=useState({racket:"",stringMain:"",stringCross:"",tensionMain:"",tensionCross:""});
  const[eval_,setEval]=useState({spin:3,power:3,control:3,info:3,maneuver:3,swingThrough:3,trajectory:3,stiffness:3,shotForeAtk:3,shotForeDef:3,shotBackAtk:3,shotBackDef:3,shotSlice:3,shotServe:3,shotVolley:3,shotReturn:3,confidence:3,memo:""});
  const persistCards=list=>{setCards(list);save(KEYS.quickTrialCards,list);};
  const activeRackets=(rackets||[]).filter(r=>r.status!=="retired");
  const rOpts=[{value:"",label:"-- ラケット --"},...activeRackets.map(r=>({value:r.name,label:r.name}))];
  const statusColor={active:C.red,candidate:C.blue,considering:C.textMuted,support:C.accent};

  const selectCard=id=>{
    if(selected){persistCards(cards.map(c=>c.id===selected?{...c,eval:{...eval_}}:c));}
    const card=cards.find(c=>c.id===id);
    if(card?.eval){setEval({spin:3,power:3,control:3,info:3,maneuver:3,swingThrough:3,trajectory:3,stiffness:3,shotForeAtk:3,shotForeDef:3,shotBackAtk:3,shotBackDef:3,shotSlice:3,shotServe:3,shotVolley:3,shotReturn:3,confidence:3,memo:"",...card.eval});}
    else{setEval({spin:3,power:3,control:3,info:3,maneuver:3,swingThrough:3,trajectory:3,stiffness:3,shotForeAtk:3,shotForeDef:3,shotBackAtk:3,shotBackDef:3,shotSlice:3,shotServe:3,shotVolley:3,shotReturn:3,confidence:3,memo:""});}
    setSelected(id);
  };
  const backToList=()=>{if(selected){persistCards(cards.map(c=>c.id===selected?{...c,eval:{...eval_}}:c));}setSelected(null);};
  const handleAddCard=()=>{
    if(!addF.racket){toast.show("ラケットを選択",C.red);return;}
    const r=activeRackets.find(x=>x.name===addF.racket);
    const sc=statusColor[r?.status]||C.textMuted;
    persistCards([...cards,{id:genId(),racket:addF.racket,stringMain:addF.stringMain,stringCross:addF.stringCross,tensionMain:addF.tensionMain,tensionCross:addF.tensionCross,color:sc}]);
    setAddF({racket:"",stringMain:"",stringCross:"",tensionMain:"",tensionCross:""});setAdding(false);
  };
  const handleSave=()=>{
    const card=cards.find(c=>c.id===selected);if(!card)return;
    const todayStr=today();
    const matchingPractice=(practices||[]).find(p=>normDate(p.date)===todayStr);
    let linkedMtchId="";
    (tournaments||[]).forEach(trn=>{if(normDate(trn.date)===todayStr){const last=(trn.matches||[]).slice(-1)[0];if(last)linkedMtchId=last.id;}});
    const trial={id:genId(),date:todayStr,racketName:card.racket,stringMain:card.stringMain||"",stringCross:card.stringCross||"",tensionMain:card.tensionMain||"",tensionCross:card.tensionCross||"",temp:matchingPractice?.temp||"",venue:matchingPractice?.venue||"",judgment:"保留",...eval_,generalNote:eval_.memo,strokeNote:"",serveNote:"",volleyNote:"",linkedPracticeId:matchingPractice?.id||"",linkedMatchId:linkedMtchId};
    onSaveTrial(trial);
    persistCards(cards.filter(c=>c.id!==selected));
    const linked=!!matchingPractice||!!linkedMtchId;
    const linkMsg=linkedMtchId&&matchingPractice?"練習+試合と紐づけ":linkedMtchId?"試合と紐づけ":matchingPractice?"練習と紐づけ":"";
    toast.show(linked?`✅ 試打を保存 → ${linkMsg}`:"✅ 試打を保存");
    setSelected(null);setEval({spin:3,power:3,control:3,info:3,maneuver:3,swingThrough:3,trajectory:3,stiffness:3,shotForeAtk:3,shotForeDef:3,shotBackAtk:3,shotBackDef:3,shotSlice:3,shotServe:3,shotVolley:3,shotReturn:3,confidence:3,memo:""});
  };
  const criteriaGroups=[
    {title:"性能評価",desc:"高い方が良い",items:[{key:"spin",label:"スピン",low:"弱い",high:"強い"},{key:"power",label:"推進力",low:"飛ばない",high:"飛ぶ"},{key:"control",label:"コントロール",low:"散る",high:"狙える"},{key:"info",label:"打感情報",low:"感じない",high:"クリア"},{key:"maneuver",label:"操作性",low:"重い",high:"軽快"},{key:"swingThrough",label:"振り抜き",low:"悪い",high:"良い"}]},
    {title:"特性",desc:"中央が基準",items:[{key:"trajectory",label:"弾道の高さ",low:"低い",high:"高い"},{key:"stiffness",label:"打感",low:"柔らかい",high:"硬い"}]},
    {title:"ショット別",desc:"高い方が良い",items:[{key:"shotForeAtk",label:"フォア（攻撃）"},{key:"shotForeDef",label:"フォア（守備）"},{key:"shotBackAtk",label:"バック（攻撃）"},{key:"shotBackDef",label:"バック（守備）"},{key:"shotSlice",label:"スライス"},{key:"shotServe",label:"サーブ"},{key:"shotVolley",label:"ボレー"},{key:"shotReturn",label:"リターン"}]},
    {title:"総合",desc:"",items:[{key:"confidence",label:"安心感",low:"不安",high:"振り切れる"}]},
  ];

  // Evaluation view
  if(selected){
    const card=cards.find(c=>c.id===selected);const sc=card?.color||C.textMuted;
    return <div style={{position:"fixed",inset:0,background:"#f5f0e8",zIndex:500,display:"flex",flexDirection:"column"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 16px",borderBottom:"1px solid #bbb",flexShrink:0}}>
        <button onClick={backToList} style={{background:"none",border:"none",fontSize:14,color:"#222",cursor:"pointer",fontWeight:600}}>← 一覧</button>
        <span style={{fontSize:13,color:"#444"}}>試打ノート</span>
        <div style={{width:40}}/>
      </div>
      <div style={{flex:1,overflowY:"auto"}}>
        <div style={{background:sc,borderRadius:12,margin:"12px 16px",padding:"16px 20px"}}>
          <div style={{fontSize:20,fontWeight:800,color:"#fff"}}>{card?.racket}</div>
          <div style={{fontSize:13,color:"rgba(255,255,255,0.8)",marginTop:4}}>{[card?.stringMain,card?.stringCross].filter(Boolean).join(" / ")}{card?.tensionMain?" / "+card.tensionMain+(card.tensionCross?"/"+card.tensionCross:"")+"p":""}</div>
        </div>
        <div style={{padding:"0 16px 20px"}}>
          {criteriaGroups.map(grp=><div key={grp.title} style={{marginBottom:16}}>
            <div style={{display:"flex",alignItems:"baseline",gap:8,marginBottom:10,borderBottom:"1px solid #bbb",paddingBottom:6}}>
              <span style={{fontSize:15,fontWeight:800,color:"#222"}}>{grp.title}</span>
              {grp.desc&&<span style={{fontSize:11,color:"#444"}}>{grp.desc}</span>}

              <div style={{fontSize:15,fontWeight:700,color:"#222",marginBottom:6}}>{c.label}</div>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                {c.low&&<span style={{fontSize:10,color:"#444",minWidth:44,textAlign:"right"}}>{c.low}</span>}
                {[1,2,3,4,5].map(n=><button key={n} onClick={()=>setEval(p=>({...p,[c.key]:n}))} style={{flex:1,height:44,borderRadius:8,border:`2px solid ${eval_[c.key]===n?sc:"#bbb"}`,background:eval_[c.key]===n?sc:"#fff",color:eval_[c.key]===n?"#fff":"#444",fontSize:17,fontWeight:700,cursor:"pointer"}}>{n}</button>)}
                {c.high&&<span style={{fontSize:10,color:"#444",minWidth:44}}>{c.high}</span>}
              </div>
            </div>)}
          </div>)}
          <div style={{marginBottom:20}}>
            <div style={{fontSize:16,fontWeight:700,color:"#222",marginBottom:8}}>メモ（一言）</div>
            <textarea value={eval_.memo} onChange={e=>setEval(p=>({...p,memo:e.target.value}))} placeholder="気づいたことを一言..." rows={3} style={{width:"100%",borderRadius:8,border:"1px solid #bbb",padding:12,fontSize:14,fontFamily:"inherit",resize:"vertical",color:"#222",background:"#fff"}}/>
          </div>
          <button onClick={handleSave} style={{width:"100%",background:sc,border:"none",borderRadius:10,padding:14,fontSize:16,fontWeight:700,color:"#fff",cursor:"pointer"}}>保存して試打タブに転送する</button>
        </div>
      </div>
    </div>;
  }

  // Card list view
  return <div style={{position:"fixed",inset:0,background:"#f5f0e8",zIndex:500,display:"flex",flexDirection:"column"}}>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 16px",borderBottom:"1px solid #bbb",flexShrink:0}}>
      <button onClick={onClose} style={{background:"none",border:"none",fontSize:20,color:"#222",cursor:"pointer"}}>✕</button>

    <div style={{flex:1,overflowY:"auto",padding:"12px 16px"}}>
      {cards.length===0&&!adding&&<div style={{textAlign:"center",padding:"30px 0",color:"#444",fontSize:13}}>「＋ 追加」で今日試打するラケット×セッティングを登録</div>}
      {cards.map(card=><button key={card.id} onClick={()=>selectCard(card.id)} style={{display:"block",width:"100%",textAlign:"left",background:"#fff",border:`2px solid ${card.color}30`,borderLeft:`4px solid ${card.color}`,borderRadius:10,padding:"16px 20px",marginBottom:10,cursor:"pointer"}}>

// ── MINI CALENDAR ────────────────────────────────
function MiniCalendar({tournaments,practices}){
  const[month,setMonth]=useState(()=>{const d=new Date();return{y:d.getFullYear(),m:d.getMonth()};});
  const[selectedDay,setSelectedDay]=useState(null);
  const todayStr=today();
  const daysInMonth=new Date(month.y,month.m+1,0).getDate();
  const firstDow=new Date(month.y,month.m,1).getDay();
  const monthLabel=`${month.y}年${month.m+1}月`;
  const prev=()=>setMonth(p=>p.m===0?{y:p.y-1,m:11}:{y:p.y,m:p.m-1});
  const next=()=>setMonth(p=>p.m===11?{y:p.y+1,m:0}:{y:p.y,m:p.m+1});

  // Build date→events map
  const eventMap=useMemo(()=>{
    const map={};
    const prefix=`${month.y}-${String(month.m+1).padStart(2,"0")}`;
    (tournaments||[]).forEach(t=>{const nd=normDate(t.date);if(nd.startsWith(prefix)){if(!map[nd])map[nd]=[];map[nd].push({type:"tournament",data:t});}});
    (practices||[]).forEach(p=>{const nd=normDate(p.date);if(nd.startsWith(prefix)){if(!map[nd])map[nd]=[];map[nd].push({type:"practice",data:p});}});
    return map;
  },[tournaments,practices,month]);

  const dayEvents=selectedDay?eventMap[selectedDay]||[]:[];

  return <Card>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
      <button onClick={prev} style={{background:"none",border:"none",fontSize:16,cursor:"pointer",color:C.textMuted,padding:"4px 8px"}}>◀</button>
      <span style={{fontSize:13,fontWeight:700,color:C.text}}>{monthLabel}</span>
      <button onClick={next} style={{background:"none",border:"none",fontSize:16,cursor:"pointer",color:C.textMuted,padding:"4px 8px"}}>▶</button>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,textAlign:"center"}}>
      {["日","月","火","水","木","金","土"].map((d,i)=><div key={d} style={{fontSize:10,fontWeight:600,color:i===0?"#dc2626":i===6?C.blue:C.textMuted,padding:"2px 0"}}>{d}</div>)}
      {Array.from({length:firstDow}).map((_,i)=><div key={"e"+i}/>)}
      {Array.from({length:daysInMonth}).map((_,i)=>{
        const day=i+1;
        const dateStr=`${month.y}-${String(month.m+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
        const events=eventMap[dateStr]||[];
        const hasTrn=events.some(e=>e.type==="tournament");
        const hasPrac=events.some(e=>e.type==="practice");
        const isToday=dateStr===todayStr;
        const isSelected=dateStr===selectedDay;
        const dow=(firstDow+i)%7;
        return <div key={day} onClick={()=>setSelectedDay(isSelected?null:dateStr)} style={{padding:"4px 0",cursor:events.length?"pointer":"default",borderRadius:6,background:isSelected?C.accentBg:"transparent",border:isToday?`2px solid ${C.accent}`:"2px solid transparent"}}>
          <div style={{fontSize:12,fontWeight:isToday?700:400,color:dow===0?"#dc2626":dow===6?C.blue:C.text}}>{day}</div>
          <div style={{display:"flex",justifyContent:"center",gap:2,minHeight:6}}>
            {hasTrn&&<div style={{width:5,height:5,borderRadius:"50%",background:C.accent}}/>}
            {hasPrac&&<div style={{width:5,height:5,borderRadius:"50%",background:C.blue}}/>}
          </div>
        </div>;
      })}
    </div>
    {selectedDay&&dayEvents.length>0&&<div style={{marginTop:8,borderTop:`1px solid ${C.border}`,paddingTop:8}}>
      <div style={{fontSize:11,color:C.textMuted,marginBottom:4}}>{parseInt(selectedDay.split("-")[1])}/{parseInt(selectedDay.split("-")[2])}</div>
      {dayEvents.map((ev,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:6,padding:"4px 0"}}>
        <span style={{fontSize:12}}>{ev.type==="tournament"?"🏆":"🏃"}</span>
        <span style={{fontSize:12,color:C.text,fontWeight:500}}>{ev.type==="tournament"?ev.data.name:(ev.data.type||"練習")+(ev.data.venue?" @ "+ev.data.venue:"")}</span>
        {ev.type==="tournament"&&ev.data.overallResult&&<Badge color={RESULT_BADGE[ev.data.overallResult]||"gray"} sm>{ev.data.overallResult}</Badge>}
      </div>)}
    </div>}
  </Card>;
}

// ── HOME TAB ──────────────────────────────────────
function HomeTab({next,setNext,tournaments,setTournaments,practices,setPractices,trials,setTrials,rackets,strings,stringSetups,venues,setVenues,quickTrialCards,setQuickTrialCards,daysSinceExport,lastExport,onExport,onGoToSessions,onGoToPlan,toast}){
  const[recordModal,setRecordModal]=useState(null);
  const[showQuickTrial,setShowQuickTrial]=useState(false);
  const undoRef=useRef(null);
  const todayStr=today();
  // Next Actions: top 3 undone
  const nextItems=useMemo(()=>(next||[]).filter(n=>!n.done).slice(0,3),[next]);
  const handleHomeRecord=type=>{
    if(type==="trials"){setShowQuickTrial(true);return;}
    setRecordModal(type);
  };
  const handleQuickTrialSave=form=>{
    const existing=(trials||[]).find(t=>t.id===form.id);
    const arr=ds(existing?(trials||[]).map(t=>t.id===form.id?form:t):[form,...(trials||[])]);
    setTrials(arr);save(KEYS.trials,arr);
    toast.show("🎾 試打を保存しました");
  };
  const handleHomeSave=(type,form)=>{
    if(type==="tournaments"){
      const arr=ds([form,...(tournaments||[])]);
      setTournaments(arr);save(KEYS.tournaments,arr);
    }else if(type==="practices"){
      const arr=ds([form,...(practices||[])]);
      setPractices(arr);save(KEYS.practices,arr);
    }else if(type==="trials"){
      const arr=ds([form,...(trials||[])]);
      setTrials(arr);save(KEYS.trials,arr);
    }
    setRecordModal(null);toast.show("💾 保存しました");
  };
  const toggleNext=id=>{
    const prev=[...(next||[])];
    undoRef.current=prev;
    const updated=prev.map(n=>n.id===id?{...n,done:true,doneAt:todayStr}:n);
    setNext(updated);save(KEYS.next,updated);
    toast.show("✅ 完了",C.accent,()=>{if(undoRef.current){setNext(undoRef.current);save(KEYS.next,undoRef.current);undoRef.current=null;}});
  };
  // Upcoming events: tournaments + practices within 1 month, max 5
  const upcomingItems=useMemo(()=>{
    const items=[];
    const oneMonth=new Date();oneMonth.setMonth(oneMonth.getMonth()+1);
    const oneMonthStr=`${oneMonth.getFullYear()}-${String(oneMonth.getMonth()+1).padStart(2,"0")}-${String(oneMonth.getDate()).padStart(2,"0")}`;
    (tournaments||[]).filter(t=>{const nd=normDate(t.date);return nd>=todayStr&&nd<=oneMonthStr;}).forEach(t=>items.push({type:"tournament",date:t.date,name:t.name,level:t.level,racketName:t.racketName,stringSetup:t.stringSetup,tension:t.tension}));
    (practices||[]).filter(p=>{const nd=normDate(p.date);return nd>=todayStr&&nd<=oneMonthStr;}).forEach(p=>items.push({type:"practice",date:p.date,name:p.type||"練習",venue:p.venue}));
    return items.sort((a,b)=>normDate(a.date).localeCompare(normDate(b.date)));
  },[tournaments,practices,todayStr]);
  const displayUpcoming=upcomingItems.slice(0,5);
  const overflowCount=upcomingItems.length-5;
  // Best results: top 5 good results (優勝→準優勝→予選突破 order, then by date)
  const GOOD_RESULTS=["優勝","準優勝","予選突破"];
  const bestTournaments=useMemo(()=>(tournaments||[]).filter(t=>GOOD_RESULTS.includes(t.overallResult)).sort((a,b)=>{const ai=GOOD_RESULTS.indexOf(a.overallResult),bi=GOOD_RESULTS.indexOf(b.overallResult);return ai!==bi?ai-bi:(normDate(b.date)||"").localeCompare(normDate(a.date)||"");}).slice(0,5),[tournaments]);

  return <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
    {/* Fixed top area: 3 Buttons + Next Actions */}
    <div style={{flexShrink:0,padding:"10px 10px 0"}}>
      {/* Big 3 Buttons */}
      <div style={{display:"flex",gap:8,marginBottom:10}}>
        {[["🏆","大会を記録","tournaments"],["🏃","練習を記録","practices"],["🎾","試打を記録","trials"]].map(([icon,label,type])=>
          <button key={type} onClick={()=>handleHomeRecord(type)} style={{flex:1,height:56,borderRadius:10,background:C.accent,border:"none",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2}}>
            <span style={{fontSize:18}}>{icon}</span><span>{label}</span>
          </button>
        )}
      </div>

      {/* Next Actions */}
      {nextItems.length>0&&<Card>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <span style={{fontSize:12,fontWeight:700,color:C.textMuted}}>▶ Next Actions</span>
          <button onClick={onGoToPlan} style={{background:"none",border:"none",color:C.accent,fontSize:11,fontWeight:600,cursor:"pointer"}}>全て見る →</button>
        </div>
        {nextItems.map(n=><div key={n.id} onClick={()=>toggleNext(n.id)} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 0",cursor:"pointer",borderBottom:`1px solid ${C.border}22`}}>
          <div style={{width:20,height:20,borderRadius:4,border:`2px solid ${C.accent}`,flexShrink:0}}/>
          <div style={{minWidth:0,flex:1}}>
            <div style={{fontSize:12,fontWeight:600,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{n.label}</div>
            {n.category&&<Badge color={n.priority==="最高"?"green":n.priority==="高"?"blue":"yellow"} sm>{n.category}</Badge>}
          </div>
        </div>)}
      </Card>}
    </div>

    {/* Scrollable content area */}
    <div style={{flex:1,overflowY:"auto",WebkitOverflowScrolling:"touch",padding:"0 10px 60px"}}>
      {/* Backup Warning */}
      {daysSinceExport>=3&&<div onClick={onExport} style={{background:C.redBg,border:`1px solid ${C.red}`,borderRadius:8,padding:10,marginBottom:10,cursor:"pointer"}}>
        <div style={{fontSize:12,fontWeight:700,color:C.red}}>⚠️ バックアップしてください（{daysSinceExport>=365?"未実施":`${daysSinceExport}日前`}）</div>
        <div style={{fontSize:11,color:"#fca5a5"}}>{lastExport?`最終: ${new Date(lastExport).toLocaleDateString("ja-JP")}`:"まだバックアップしていません"}（タップで📤）</div>
      </div>}

      {/* Mini Calendar */}
      <MiniCalendar tournaments={tournaments} practices={practices}/>

      {/* Upcoming Events */}
      {displayUpcoming.length>0&&<Card>
        <div style={{fontSize:12,fontWeight:700,color:C.textMuted,marginBottom:8}}>📅 今後の予定</div>
        {displayUpcoming.map((item,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 0",borderBottom:i<displayUpcoming.length-1?`1px solid ${C.border}22`:"none"}}>
          <span style={{fontSize:14}}>{item.type==="tournament"?"🏆":"🏃"}</span>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:12,fontWeight:600,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.name}{item.level?" ("+item.level+")":""}</div>
            <div style={{fontSize:10,color:C.textMuted}}>{fmtDateFull(item.date)}{item.venue?" · "+item.venue:""}</div>
            {item.racketName&&<div style={{fontSize:10,color:C.accent}}>🎾 {item.racketName}{item.stringSetup?" / "+item.stringSetup:""}{item.tension?" / "+item.tension:""}</div>}
          </div>
        </div>)}
        {overflowCount>0&&<button onClick={onGoToSessions} style={{background:"none",border:"none",color:C.accent,fontSize:11,fontWeight:600,cursor:"pointer",marginTop:6}}>他{overflowCount}件を見る → Sessions</button>}
      </Card>}

      {/* Recent Tournaments */}
      {bestTournaments.length>0&&<Card>
        <div style={{fontSize:12,fontWeight:700,color:C.textMuted,marginBottom:8}}>🏆 好成績</div>
        {bestTournaments.map(t=>{
          const isTop=t.overallResult==="優勝"||t.overallResult==="準優勝";
          const ic=t.overallResult==="優勝"?"🏆":t.overallResult==="準優勝"?"🥈":"✅";
          const c=t.overallResult==="優勝"?C.accent:t.overallResult==="準優勝"?C.blue:C.yellow;
          return <div key={t.id} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 0",borderBottom:`1px solid ${C.border}22`}}>
            <span style={{fontSize:isTop?16:13}}>{ic}</span>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:12,fontWeight:600,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.name}</div>
              <div style={{fontSize:10,color:C.textMuted}}>{fmtDateFull(t.date)}</div>
            </div>
            <span style={{fontSize:isTop?13:11,fontWeight:700,color:c}}>{t.overallResult}</span>
          </div>;
        })}
      </Card>}

      {/* Stats summary */}
      <Card style={{background:C.panel2}}>
        <div style={{display:"flex",justifyContent:"space-around",textAlign:"center"}}>
          {[["大会",(tournaments||[]).length,"🏆"],["練習",(practices||[]).length,"🏃"],["試打",(trials||[]).length,"🎾"]].map(([l,n,ic])=>
            <div key={l}><div style={{fontSize:18}}>{ic}</div><div style={{fontSize:16,fontWeight:700,color:C.accent}}>{n}</div><div style={{fontSize:10,color:C.textMuted}}>{l}</div></div>
          )}
        </div>
      </Card>
    </div>

    {recordModal==="tournaments"&&<QuickAddTournament onSave={form=>{handleHomeSave("tournaments",form);setRecordModal(null);}} onClose={()=>setRecordModal(null)} venues={venues} onAddVenue={v=>{const nv=[...(venues||[]),v];setVenues(nv);save(KEYS.venues,nv);}}/>}
    {recordModal==="practices"&&<QuickAddPractice onSave={form=>{handleHomeSave("practices",form);setRecordModal(null);}} onClose={()=>setRecordModal(null)} rackets={rackets} venues={venues} onAddVenue={v=>{const nv=[...(venues||[]),v];setVenues(nv);save(KEYS.venues,nv);}}/>}
    {showQuickTrial&&<QuickTrialMode rackets={rackets} strings={strings} trials={trials} tournaments={tournaments} practices={practices} cards={quickTrialCards} setCards={setQuickTrialCards} onSaveTrial={handleQuickTrialSave} onClose={()=>setShowQuickTrial(false)} toast={toast}/>}
  </div>;
}

// ── SESSIONS TAB (B+C: 3 months default + jump selector) ──
function SessionsTab({tournaments,setTournaments,practices,setPractices,trials,setTrials,rackets,strings,stringSetups,venues,setVenues,opponents,toast,pendingRecord,onPendingRecordDone}){
  const[filter,setFilter]=useState("all");
  const[modal,setModal]=useState(null);
  const[expandedMonths,setExpandedMonths]=useState(()=>{try{const v=localStorage.getItem("yuke-session-months");return v?JSON.parse(v):{};}catch{return{};}});
  const[expandedYears,setExpandedYears]=useState(()=>{try{const v=localStorage.getItem("yuke-session-years");return v?JSON.parse(v):{};}catch{return{};}});
  const[showAllMonths,setShowAllMonths]=useState(false);
  const[jumpTarget,setJumpTarget]=useState("");

  useEffect(()=>{
    if(pendingRecord){
      setModal({type:pendingRecord,isNew:true,data:pendingRecord==="tournaments"?{id:genId(),date:today(),name:"",level:"",type:"singles",venue:"",racketName:"",stringSetup:"",tension:"",temp:"",overallResult:"",generalNote:"",matches:[]}:pendingRecord==="practices"?{id:genId(),date:today(),type:"",venue:"",duration:"",racketName:"",stringSetup:"",tension:"",temp:"",focus:"",coachNote:"",goodNote:"",improveNote:"",generalNote:""}:{id:genId(),date:today(),racketName:"",stringMain:"",stringCross:"",tensionMain:"",tensionCross:"",temp:"",venue:"",judgment:"",spin:0,control:0,power:0,feel:0,info:0,maneuver:0,swingThrough:0,trajectory:0,stiffness:0,shotForeAtk:0,shotForeDef:0,shotBackAtk:0,shotBackDef:0,shotSlice:0,shotServe:0,shotVolley:0,shotReturn:0,confidence:0,generalNote:""}});
      onPendingRecordDone();
    }
  },[pendingRecord]);

  useEffect(()=>{try{localStorage.setItem("yuke-session-months",JSON.stringify(expandedMonths));}catch{}},[expandedMonths]);
  useEffect(()=>{try{localStorage.setItem("yuke-session-years",JSON.stringify(expandedYears));}catch{}},[expandedYears]);

  const toggleMonth=key=>{setExpandedMonths(prev=>({...prev,[key]:!prev[key]}));};
  const toggleYear=year=>{setExpandedYears(prev=>({...prev,[year]:!prev[year]}));};

  // Build all items
  const allItems=useMemo(()=>{
    let items=[];
    if(filter==="all"||filter==="tournaments")(tournaments||[]).forEach(t=>items.push({type:"tournament",id:t.id,date:t.date,data:t}));
    if(filter==="all"||filter==="practices")(practices||[]).forEach(p=>items.push({type:"practice",id:p.id,date:p.date,data:p}));
    if(filter==="all"||filter==="trials")(trials||[]).forEach(t=>items.push({type:"trial",id:t.id,date:t.date,data:t}));
    return items.sort((a,b)=>(normDate(b.date)||"").localeCompare(normDate(a.date)||""));
  },[tournaments,practices,trials,filter]);

  // Group by year-month
  const allMonths=useMemo(()=>{
    const monthMap={};
    allItems.forEach(item=>{
      const nd=normDate(item.date);const m=nd.match(/(\d{4})-(\d{2})/);if(!m)return;
      const ym=`${m[1]}-${m[2]}`;
      if(!monthMap[ym])monthMap[ym]={label:`${parseInt(m[1])}年${parseInt(m[2])}月`,items:[],key:ym};
      monthMap[ym].items.push(item);
    });
    return Object.values(monthMap).sort((a,b)=>b.key.localeCompare(a.key));
  },[allItems]);

  // B+C: Show only 3 most recent months by default, or all if toggled / jumped
  const recentMonths=allMonths.slice(0,3);
  const olderMonths=allMonths.slice(3);
  // Group older months by year for 2-level hierarchy
  const olderByYear=useMemo(()=>{
    const yearMap={};
    olderMonths.forEach(m=>{
      const year=m.key.split("-")[0];
      if(!yearMap[year])yearMap[year]={year,label:year+"年",months:[],totalItems:0};
      yearMap[year].months.push(m);
      yearMap[year].totalItems+=m.items.length;
    });
    return Object.values(yearMap).sort((a,b)=>b.year.localeCompare(a.year));
  },[olderMonths]);

  // Jump selector options
  const jumpOptions=useMemo(()=>[{value:"",label:"📅 月を選択してジャンプ"},...allMonths.map(m=>({value:m.key,label:`${m.label} (${m.items.length}件)`}))]
  ,[allMonths]);

  // Handle jump
  const handleJump=ym=>{
    if(!ym)return;
    const year=ym.split("-")[0];
    setShowAllMonths(true);
    setExpandedYears(prev=>({...prev,[year]:true}));
    setExpandedMonths(prev=>({...prev,[ym]:true}));
    setJumpTarget(ym);
    // Scroll to target after render
    setTimeout(()=>{
      const el=document.getElementById("month-"+ym);
      if(el)el.scrollIntoView({behavior:"smooth",block:"start"});
    },100);
  };

  const ResultBadge=({result})=>{
    if(!result)return null;
    const isHigh=result==="優勝"||result==="準優勝";
    if(isHigh){
      const ic=result==="優勝"?"🏆":"🥈";
      const c=result==="優勝"?C.accent:C.blue;
      const bg=result==="優勝"?C.accentBg:C.blueBg;
      return<span style={{display:"inline-flex",alignItems:"center",gap:4,fontSize:13,fontWeight:800,color:c,background:bg,border:`1.5px solid ${c}`,borderRadius:6,padding:"4px 10px",letterSpacing:"0.02em"}}>{ic} {result}</span>;
    }
    return<Badge color={RESULT_BADGE[result]||"gray"}>{result}</Badge>;
  };
  const TrialBadge=({judgment})=>{
    if(!judgment)return null;
    const c=judgment==="採用候補"?"green":judgment==="保留"?"yellow":"red";
    return<Badge color={c}>{judgment}</Badge>;
  };
  const renderItem=item=>{
    const d=item.data;
    const icon=item.type==="tournament"?"🏆":item.type==="practice"?"🏃":"🎾";
    const title=item.type==="tournament"?d.name:item.type==="practice"?(d.type||"練習")+(d.venue?" @ "+d.venue:""):`${d.racketName||""}${d.stringMain?" / "+d.stringMain:""}`;
    const sub=item.type==="tournament"?`${d.level||""} · ${(d.matches||[]).length}試合`:item.type==="practice"?`${d.duration?d.duration+"分":""}${d.focus?" · "+d.focus:""}`:d.judgment||"";
    return <div key={item.id} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 0",borderBottom:`1px solid ${C.border}22`}}>
      <span style={{fontSize:16,flexShrink:0}}>{icon}</span>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontSize:12,fontWeight:600,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{title}</div>
        <div style={{fontSize:10,color:C.textMuted}}>{fmtDate(item.date)} {sub}</div>
        {item.type==="tournament"&&d.matches?.length>0&&<GameBar games={d.matches[d.matches.length-1]?.games}/>}
      </div>
      {item.type==="tournament"&&<ResultBadge result={d.overallResult}/>}
      {item.type==="trial"&&<TrialBadge judgment={d.judgment}/>}
    </div>;
  };

  const handleSave=(type,form)=>{
    if(type==="tournaments"){
      const arr=ds(form.id&&tournaments.find(t=>t.id===form.id)?tournaments.map(t=>t.id===form.id?form:t):[form,...(tournaments||[])]);
      setTournaments(arr);save(KEYS.tournaments,arr);
    }else if(type==="practices"){
      const arr=ds(form.id&&practices.find(p=>p.id===form.id)?practices.map(p=>p.id===form.id?form:p):[form,...(practices||[])]);
      setPractices(arr);save(KEYS.practices,arr);
    }else if(type==="trials"){
      const arr=ds(form.id&&trials.find(t=>t.id===form.id)?trials.map(t=>t.id===form.id?form:t):[form,...(trials||[])]);
      setTrials(arr);save(KEYS.trials,arr);
    }
    setModal(null);toast.show("💾 保存しました");
  };

  return <div style={{padding:10}}>
    {/* Filter + Jump Selector */}
    <div style={{display:"flex",gap:4,marginBottom:6}}>
      {[["all","全て"],["tournaments","🏆 大会"],["practices","🏃 練習"],["trials","🎾 試打"]].map(([k,l])=>
        <button key={k} onClick={()=>setFilter(k)} style={{padding:"6px 10px",borderRadius:6,border:`1px solid ${filter===k?C.accent:C.border}`,background:filter===k?C.accentBg:C.panel,color:filter===k?C.accent:C.textMuted,fontSize:11,fontWeight:600,cursor:"pointer"}}>{l}</button>
      )}
    </div>
    <select value="" onChange={e=>handleJump(e.target.value)} style={{width:"100%",padding:"8px 10px",borderRadius:6,border:`1px solid ${C.border}`,background:C.panel,color:C.text,fontSize:12,marginBottom:8,cursor:"pointer",minHeight:40}}>
      {jumpOptions.map(o=><option key={o.value} value={o.value}>{o.label}</option>)}
    </select>

    {/* Recent months (flat, no year header) */}
    {recentMonths.map(month=><div key={month.key} id={"month-"+month.key} style={{marginBottom:4}}>
      <div onClick={()=>toggleMonth(month.key)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 10px",background:C.panel,borderRadius:8,cursor:"pointer",border:`1px solid ${C.border}`}}>
        <span style={{fontSize:13,fontWeight:600,color:C.text}}>{month.label}</span>
        <span style={{fontSize:11,color:C.textMuted}}>({month.items.length}件) {expandedMonths[month.key]?"▼":"▶"}</span>
      </div>
      {expandedMonths[month.key]&&<div style={{padding:"4px 8px"}}>{month.items.map(renderItem)}</div>}
    </div>)}

    {/* Show older / collapse */}
    {!showAllMonths&&olderMonths.length>0&&<button onClick={()=>setShowAllMonths(true)} style={{width:"100%",padding:12,borderRadius:8,background:C.panel2,border:`1px solid ${C.border}`,color:C.textMuted,fontSize:12,fontWeight:600,cursor:"pointer",marginTop:8}}>📂 過去のデータを表示（{olderMonths.length}ヶ月分）</button>}

    {/* Older months: year > month 2-level hierarchy */}
    {showAllMonths&&olderByYear.map(yearGroup=><div key={yearGroup.year} style={{marginBottom:6}}>
      <div onClick={()=>toggleYear(yearGroup.year)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 12px",background:C.panel2,borderRadius:8,cursor:"pointer",border:`1px solid ${C.border}`,marginBottom:4}}>
        <span style={{fontSize:14,fontWeight:700,color:C.text}}>{yearGroup.label}</span>
        <span style={{fontSize:11,color:C.textMuted}}>({yearGroup.totalItems}件) {expandedYears[yearGroup.year]?"▼":"▶"}</span>
      </div>
      {expandedYears[yearGroup.year]&&<div style={{paddingLeft:8}}>
        {yearGroup.months.map(month=><div key={month.key} id={"month-"+month.key} style={{marginBottom:4}}>
          <div onClick={()=>toggleMonth(month.key)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 10px",background:C.panel,borderRadius:8,cursor:"pointer",border:`1px solid ${C.border}`}}>
            <span style={{fontSize:13,fontWeight:600,color:C.text}}>{parseInt(month.key.split("-")[1])}月</span>
            <span style={{fontSize:11,color:C.textMuted}}>({month.items.length}件) {expandedMonths[month.key]?"▼":"▶"}</span>
          </div>
          {expandedMonths[month.key]&&<div style={{padding:"4px 8px"}}>{month.items.map(renderItem)}</div>}
        </div>)}
      </div>}
    </div>)}

    {showAllMonths&&olderMonths.length>0&&<button onClick={()=>setShowAllMonths(false)} style={{width:"100%",padding:10,borderRadius:8,background:"none",border:`1px solid ${C.border}`,color:C.textMuted,fontSize:11,cursor:"pointer",marginTop:8}}>▲ 直近3ヶ月のみ表示</button>}

    {allItems.length===0&&<div style={{textAlign:"center",padding:40,color:C.textMuted,fontSize:13}}>データがありません</div>}

    {modal&&<RecordModal type={modal.type} data={modal.data} isNew={modal.isNew} rackets={rackets} strings={strings} stringSetups={stringSetups} venues={venues} onAddVenue={v=>{const nv=[...(venues||[]),v];setVenues(nv);save(KEYS.venues,nv);}} onSave={form=>handleSave(modal.type,form)} onClose={()=>setModal(null)}/>}
  </div>;
}

// ── RECORD MODAL (unified) ────────────────────────
function RecordModal({type,data,isNew,rackets,strings,stringSetups,venues,onAddVenue,onSave,onClose}){
  const[f,setF]=useState({...data});
  const s=key=>val=>setF(prev=>({...prev,[key]:val}));
  const title=type==="tournaments"?"🏆 大会":type==="practices"?"🏃 練習":"🎾 試打";
  return <div style={{position:"fixed",inset:0,background:"#0008",zIndex:300,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
    <div style={{background:C.panel,borderRadius:"16px 16px 0 0",width:"100%",maxHeight:"85vh",overflowY:"auto",padding:16}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <span style={{fontSize:15,fontWeight:700}}>{title}{isNew?" 新規":"編集"}</span>
        <button onClick={onClose} style={{background:"none",border:"none",fontSize:18,cursor:"pointer",color:C.textMuted}}>✕</button>
      </div>
      <Field label="日付" value={f.date} onChange={s("date")} type="date"/>
      {type==="tournaments"&&<>
        <Field label="大会名" value={f.name||""} onChange={s("name")} placeholder="大会名"/>
        <FSelect label="レベル" value={f.level||""} onChange={s("level")} options={[{value:"",label:"--"},{value:"中級",label:"中級"},{value:"中上級",label:"中上級"},{value:"オープン",label:"オープン"},{value:"草トー",label:"草トー"},{value:"市民大会",label:"市民大会"},{value:"交流戦",label:"交流戦"}]}/>
        <FSelect label="種目" value={f.type||""} onChange={s("type")} options={[{value:"singles",label:"シングルス"},{value:"doubles",label:"ダブルス"},{value:"mixed",label:"ミックスダブルス"}]}/>
      </>}
      {type==="practices"&&<>
        <FSelect label="種類" value={f.type||""} onChange={s("type")} options={[{value:"",label:"--"},{value:"スクール",label:"スクール"},{value:"練習会",label:"練習会"},{value:"ゲーム練習",label:"ゲーム練習"},{value:"自主練",label:"自主練"}]}/>
        <Field label="時間（分）" value={f.duration||""} onChange={s("duration")} placeholder="120"/>
      </>}
      {type==="trials"&&<>
        <FSelect label="ラケット" value={f.racketName||""} onChange={s("racketName")} options={getRacketOpts(rackets)}/>
        <FSelect label="縦糸" value={f.stringMain||""} onChange={s("stringMain")} options={getStringOpts(strings)}/>
        <FSelect label="横糸" value={f.stringCross||""} onChange={s("stringCross")} options={[{value:"",label:"-- なし（単張り）--"},...getStringOpts(strings).slice(1)]}/>
        <div style={{display:"flex",gap:8}}>
          <Field label="縦テンション" value={f.tensionMain||""} onChange={s("tensionMain")} placeholder="43"/>
          <Field label="横テンション" value={f.tensionCross||""} onChange={s("tensionCross")} placeholder="43"/>
        </div>
      </>}
      {(type==="tournaments"||type==="practices")&&<>
        <VenueSelect label="会場" value={f.venue||""} onChange={s("venue")} venues={venues} onAddVenue={onAddVenue}/>
        <FSelect label="ラケット" value={f.racketName||""} onChange={s("racketName")} options={getRacketOpts(rackets)}/>
        <FSelect label="セッティング" value={f.stringSetup||""} onChange={s("stringSetup")} options={getSetupOpts(stringSetups,strings)}/>
        <Field label="テンション" value={f.tension||""} onChange={s("tension")} placeholder="43p"/>
      </>}
      <Field label="気温" value={f.temp||""} onChange={s("temp")} placeholder="18"/>
      {type==="tournaments"&&<FSelect label="結果" value={f.overallResult||""} onChange={s("overallResult")} options={[{value:"",label:"--"},{value:"優勝",label:"優勝"},{value:"準優勝",label:"準優勝"},{value:"決勝敗退",label:"決勝敗退"},{value:"準決勝敗退",label:"準決勝敗退"},{value:"敗退",label:"敗退"},{value:"予選敗退",label:"予選敗退"}]}/>}
      {type==="trials"&&<FSelect label="判定" value={f.judgment||""} onChange={s("judgment")} options={[{value:"",label:"--"},{value:"採用候補",label:"採用候補"},{value:"保留",label:"保留"},{value:"却下",label:"却下"}]}/>}
      {type==="practices"&&<Field label="フォーカス" value={f.focus||""} onChange={s("focus")} placeholder="今日の練習テーマ"/>}
      <Field label="メモ" value={f.generalNote||""} onChange={s("generalNote")} multiline placeholder="メモ"/>
      <button onClick={()=>onSave(f)} style={{width:"100%",padding:12,borderRadius:8,background:C.accent,border:"none",color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer",marginTop:8}}>💾 保存</button>
    </div>
  </div>;
}

// ── PLACEHOLDER TABS ──────────────────────────────
function PlaceholderTab({name,icon,count}){
  return <div style={{padding:40,textAlign:"center"}}>
    <div style={{fontSize:32,marginBottom:8}}>{icon}</div>
    <div style={{fontSize:16,fontWeight:700,color:C.text,marginBottom:4}}>{name}</div>
    <div style={{fontSize:13,color:C.textMuted}}>{count!=null?`${count}件のデータ`:"Phase 2で実装"}</div>
  </div>;
}

// ── TAB BAR ───────────────────────────────────────
function TabBar({tab,setTab}){
  const tabs=[{id:"home",icon:"🏠",label:"ホーム"},{id:"sessions",icon:"📋",label:"Sessions"},{id:"gear",icon:"🎾",label:"Gear"},{id:"plan",icon:"📝",label:"Plan"},{id:"insights",icon:"📊",label:"Insights"}];
  return <div style={{position:"fixed",bottom:0,left:0,right:0,background:C.panel,borderTop:`1px solid ${C.border}`,display:"flex",zIndex:100,paddingBottom:"env(safe-area-inset-bottom)"}}>
    {tabs.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,background:tab===t.id?C.accentBg:"transparent",border:"none",padding:"6px 0",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:1,minHeight:48}}>
      <span style={{fontSize:20}}>{t.icon}</span>
      <span style={{fontSize:10,fontWeight:tab===t.id?700:500,color:tab===t.id?C.accent:C.textMuted}}>{t.label}</span>
    </button>)}
  </div>;
}

// ── MAIN APP (v2-style: no login blocking) ────────
function TennisDB(){
  const toast=useToast();
  const cfm=useConfirm();
  const[ready,setReady]=useState(false);
  const[user,setUser]=useState(null);
  const[syncing,setSyncing]=useState(false);
  const[tab,setTab]=useState("home");
  const[large,setLarge]=useState(false);
  const[showDataMenu,setShowDataMenu]=useState(false);
  const[showClaudeShare,setShowClaudeShare]=useState(false);
  const[pasteImport,setPasteImport]=useState(false);
  const[pasteText,setPasteText]=useState("");
  const importSnapshot=useRef(null);
  const[pendingRecord,setPendingRecord]=useState(null);
  const[loginError,setLoginError]=useState("");

  const[tournaments,setTournaments]=useState([]);
  const[practices,setPractices]=useState([]);
  const[trials,setTrials]=useState([]);
  const[rackets,setRackets]=useState([]);
  const[strings,setStrings]=useState([]);
  const[stringSetups,setStringSetups]=useState([]);
  const[measurements,setMeasurements]=useState([]);
  const[mental,setMental]=useState([]);
  const[next,setNext]=useState([]);
  const[profile,setProfile]=useState({});
  const[venues,setVenues]=useState([]);
  const[opponents,setOpponents]=useState([]);
  const[quickTrialCards,setQuickTrialCards]=useState([]);
  const[lastExport,setLastExport]=useState(()=>{try{return localStorage.getItem("yuke-last-export")||"";}catch{return"";}});
  const daysSinceExport=lastExport?Math.floor((Date.now()-new Date(lastExport).getTime())/(1000*60*60*24)):999;

  const applyData=data=>{
    const sets={tournaments:setTournaments,practices:setPractices,trials:setTrials,rackets:setRackets,strings:setStrings,stringSetups:setStringSetups,measurements:setMeasurements,mental:setMental,next:setNext,venues:setVenues,opponents:setOpponents,quickTrialCards:setQuickTrialCards};
    Object.entries(sets).forEach(([k,setter])=>{
      if(data[k]){
        const val=data[k];
        if(Array.isArray(val)&&val[0]?.date)setter(ds(val));
        else setter(val);
      }
    });
    if(data.profile)setProfile(data.profile);
  };

  // Initial load: always from localStorage first (never blocks)
  useEffect(()=>{
    const raw={};
    Object.entries(KEYS).forEach(([name,key])=>{raw[name]=lsLoad(key)||INIT[name]||[];});
    raw.profile=lsLoad("profile")||INIT.profile;
    const migrated=fixMeasurements(migrateToV2(raw));
    migrated.tournaments=restoreIfMissing(migrated.tournaments||[]);
    applyData(migrated);
    setReady(true);
  },[]);

  // Auth listener: cloud sync when logged in
  useEffect(()=>{
    const unsub=fbAuth.onAuthStateChanged(async u=>{
      setUser(u);
      if(u){
        setSyncing(true);
        try{
          const cloud=await cloudLoadAll(u.uid);
          if(cloud&&Object.keys(cloud).length>0){
            const merged={};
            Object.entries(KEYS).forEach(([name,key])=>{
              if(cloud[key]){merged[name]=cloud[key];lsSave(key,cloud[key]);}
            });
            if(cloud.profile){merged.profile=cloud.profile;lsSave("profile",cloud.profile);}
            applyData(merged);
            toast.show("☁️ クラウドから同期しました");
          }else{
            // No cloud data → push local to cloud
            const allLocal={};
            Object.entries(KEYS).forEach(([name,key])=>{allLocal[key]=lsLoad(key);});
            allLocal.profile=lsLoad("profile");
            const hasLocal=Object.values(allLocal).some(v=>v!==null);
            if(hasLocal){
              await cloudSaveAll(u.uid,allLocal);
              toast.show("☁️ ローカルデータをクラウドに移行しました");
            }
          }
        }catch(e){
          console.error("Cloud sync error:",e);
          toast.show("⚠️ クラウド同期エラー（ローカルデータで動作中）",C.yellow);
        }
        setSyncing(false);
        // Realtime listener
        try{
          const dataRef=fbDb.collection("users").doc(u.uid).collection("data");
          dataRef.onSnapshot(snap=>{
            snap.docChanges().forEach(change=>{
              if(change.type==="modified"){
                const key=change.doc.id;const data=change.doc.data();const val=data.items||data.obj;
                if(!val)return;
                const name=Object.entries(KEYS).find(([,v])=>v===key)?.[0];
                if(!name)return;
                lsSave(key,val);
                const setters={tournaments:setTournaments,practices:setPractices,trials:setTrials,rackets:setRackets,strings:setStrings,stringSetups:setStringSetups,mental:setMental,next:setNext,venues:setVenues,opponents:setOpponents,measurements:setMeasurements,quickTrialCards:setQuickTrialCards};
                if(setters[name]){if(Array.isArray(val)&&val[0]?.date)setters[name](ds(val));else setters[name](val);}
              }
            });
          });
        }catch(e){console.error("Snapshot listener error:",e);}
        // Auto-opponents
        if(!lsLoad("auto-opponents-v227")){
          try{
            const updatedOpps=autoOpponents(tournaments,opponents);
            if(updatedOpps.length>(opponents||[]).length){setOpponents(updatedOpps);save(KEYS.opponents,updatedOpps);}
            lsSave("auto-opponents-v227",true);
          }catch(e){console.error("Auto-opponents error:",e);}
        }
      }
    });
    return()=>unsub();
  },[]);

  const handleExport=async()=>{
    const data={tournaments,practices,trials,rackets,strings,stringSetups,mental,next,profile,venues,opponents,measurements,quickTrialCards};
    const result=await exportAll(data);
    if(result!=="cancelled"){
      const now=new Date().toISOString();setLastExport(now);
      try{localStorage.setItem("yuke-last-export",now);}catch{}
      toast.show("📤 エクスポート完了");
    }
  };
  const handleImport=()=>{
    const inp=document.createElement("input");inp.type="file";inp.accept=".json";
    inp.onchange=async e=>{
      try{
        const text=await e.target.files[0].text();const data=JSON.parse(text);
        importSnapshot.current={tournaments,practices,trials,rackets,strings,stringSetups,mental,next,profile,venues,opponents,measurements,quickTrialCards};
        const current={tournaments,practices,trials,rackets,strings,stringSetups,mental,next,profile,venues,opponents,measurements,quickTrialCards};
        const merged=mergeData(current,data);applyData(merged);
        Object.entries(KEYS).forEach(([name,key])=>{if(merged[name])save(key,merged[name]);});
        if(merged.profile)save("profile",merged.profile);
        toast.show(`📥 インポート完了`,C.blue);
      }catch(err){toast.show("❌ インポートエラー: "+err.message,C.red);}
    };
    inp.click();
  };
  const handlePasteImport=()=>{
    try{
      const data=JSON.parse(pasteText);
      importSnapshot.current={tournaments,practices,trials,rackets,strings,stringSetups,mental,next,profile,venues,opponents,measurements,quickTrialCards};
      const current={tournaments,practices,trials,rackets,strings,stringSetups,mental,next,profile,venues,opponents,measurements,quickTrialCards};
      const merged=mergeData(current,data);applyData(merged);
      Object.entries(KEYS).forEach(([name,key])=>{if(merged[name])save(key,merged[name]);});
      if(merged.profile)save("profile",merged.profile);
      setPasteImport(false);setPasteText("");toast.show("📥 貼り付けインポート完了",C.blue);
    }catch(err){toast.show("❌ JSONエラー: "+err.message,C.red);}
  };
  const handleImportUndo=()=>{
    if(!importSnapshot.current)return;
    applyData(importSnapshot.current);
    Object.entries(KEYS).forEach(([name,key])=>{if(importSnapshot.current[name])save(key,importSnapshot.current[name]);});
    importSnapshot.current=null;toast.show("↩️ インポートを元に戻しました",C.yellow);
  };
  // handleRecord is no longer used for home 3-buttons (they open modal in HomeTab directly)
  // Kept for potential future use from other contexts
  const handleRecord=type=>{setPendingRecord(type);setTab("sessions");};
  const handleLogin=async()=>{
    setLoginError("");
    try{
      const provider=new firebase.auth.GoogleAuthProvider();
      await fbAuth.signInWithPopup(provider);
    }catch(e){
      if(e.code==="auth/popup-blocked"){
        try{await fbAuth.signInWithRedirect(new firebase.auth.GoogleAuthProvider());}
        catch(e2){setLoginError("ログイン失敗: "+e2.message);toast.show("❌ ログイン失敗",C.red);}
      }else{
        setLoginError("ログイン失敗: "+e.message);
        toast.show("❌ ログイン失敗: "+e.message,C.red);
      }
    }
  };
  const handleLogout=async()=>{await fbAuth.signOut();toast.show("ログアウトしました");};

  if(!ready)return<div style={{background:C.bg,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:C.textMuted}}>読み込み中...</div>;

  return <div style={{display:"flex",flexDirection:"column",minHeight:"100dvh",background:C.bg,zoom:large?1.22:1}}>
    {/* Header */}
    <div style={{background:C.panel,borderBottom:`1px solid ${C.border}`,padding:"8px 14px",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
      <div onClick={()=>setTab("home")} style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",userSelect:"none"}}>
        <span style={{fontSize:18}}>🎾</span>
        <span style={{fontSize:20,letterSpacing:"0.03em"}}><span style={{fontWeight:400,color:C.text}}>Tennis</span><span style={{fontWeight:800,color:C.accent,marginLeft:3}}>DB</span></span>
        <span style={{fontSize:9,color:C.textMuted,alignSelf:"flex-end",marginBottom:2}}>v{APP_VERSION}{syncing?" · 同期中...":user?" · ☁️":""}</span>
      </div>
      <div style={{display:"flex",gap:6}}>
        <button onClick={()=>setLarge(!large)} style={{background:"none",border:`1px solid ${large?C.accent:C.border}`,borderRadius:6,padding:"4px 8px",fontSize:11,color:large?C.accent:C.textMuted,cursor:"pointer",fontWeight:600}}>{large?"A↓":"A↑"}</button>
        <button onClick={()=>setShowDataMenu(!showDataMenu)} style={{background:"none",border:`1px solid ${C.border}`,borderRadius:6,padding:"4px 8px",fontSize:12,cursor:"pointer"}}>📤</button>
        {user?<button onClick={handleLogout} style={{background:"#f5f3ff",border:`1px solid ${C.purple}`,color:C.purple,borderRadius:6,padding:"4px 8px",fontSize:12,cursor:"pointer",fontWeight:600}}>👤</button>
        :<button onClick={handleLogin} style={{background:"#ecfdf5",border:`1px solid ${C.accent}`,color:C.accent,borderRadius:6,padding:"4px 8px",fontSize:12,cursor:"pointer",fontWeight:600}}>☁️</button>}
      </div>
    </div>

    {/* Login error banner */}
    {loginError&&<div style={{background:C.redBg,border:`1px solid ${C.red}`,padding:"8px 14px",display:"flex",alignItems:"center",gap:8}}>
      <span style={{fontSize:12,color:C.red,flex:1}}>{loginError}</span>
      <button onClick={()=>setLoginError("")} style={{background:"none",border:"none",color:C.red,cursor:"pointer",fontSize:14}}>✕</button>
    </div>}

    {/* Data Menu */}
    {showDataMenu&&<div style={{background:C.panel,borderBottom:`1px solid ${C.border}`,padding:10,display:"flex",gap:6,flexWrap:"wrap"}}>
      <button onClick={()=>{handleExport();setShowDataMenu(false);}} style={{padding:"6px 12px",borderRadius:6,background:C.accentBg,border:`1px solid ${C.accent}`,color:C.accent,fontSize:11,fontWeight:600,cursor:"pointer"}}>📤 エクスポート</button>
      <button onClick={()=>{handleImport();setShowDataMenu(false);}} style={{padding:"6px 12px",borderRadius:6,background:C.blueBg,border:`1px solid ${C.blue}`,color:C.blue,fontSize:11,fontWeight:600,cursor:"pointer"}}>📥 JSON</button>
      <button onClick={()=>{setPasteImport(true);setShowDataMenu(false);}} style={{padding:"6px 12px",borderRadius:6,background:C.purpleBg,border:`1px solid ${C.purple}`,color:C.purple,fontSize:11,fontWeight:600,cursor:"pointer"}}>📋→📥</button>
      <button onClick={()=>{setShowClaudeShare(true);setShowDataMenu(false);}} style={{padding:"6px 12px",borderRadius:6,background:C.yellowBg,border:`1px solid ${C.yellow}`,color:C.yellow,fontSize:11,fontWeight:600,cursor:"pointer"}}>📋 Claude</button>
      {importSnapshot.current&&<button onClick={()=>{handleImportUndo();setShowDataMenu(false);}} style={{padding:"6px 12px",borderRadius:6,background:C.redBg,border:`1px solid ${C.red}`,color:C.red,fontSize:11,fontWeight:600,cursor:"pointer"}}>↩️ 取消</button>}
    </div>}

    {/* Content */}
    <div style={{flex:1,overflowY:tab==="home"?"hidden":"auto",WebkitOverflowScrolling:"touch",paddingBottom:tab==="home"?0:60,display:"flex",flexDirection:"column"}}>
      <ErrorBoundary label="ホーム">
        {tab==="home"&&<HomeTab next={next} setNext={setNext} tournaments={tournaments} setTournaments={setTournaments} practices={practices} setPractices={setPractices} trials={trials} setTrials={setTrials} rackets={rackets} strings={strings} stringSetups={stringSetups} venues={venues} setVenues={setVenues} quickTrialCards={quickTrialCards} setQuickTrialCards={setQuickTrialCards} daysSinceExport={daysSinceExport} lastExport={lastExport} onExport={handleExport} onGoToSessions={()=>setTab("sessions")} onGoToPlan={()=>setTab("plan")} toast={toast}/>}
      </ErrorBoundary>
      <ErrorBoundary label="Sessions">
        {tab==="sessions"&&<SessionsTab tournaments={tournaments} setTournaments={setTournaments} practices={practices} setPractices={setPractices} trials={trials} setTrials={setTrials} rackets={rackets} strings={strings} stringSetups={stringSetups} venues={venues} setVenues={setVenues} opponents={opponents} toast={toast} pendingRecord={pendingRecord} onPendingRecordDone={()=>setPendingRecord(null)}/>}
      </ErrorBoundary>
      <ErrorBoundary label="Gear">
        {tab==="gear"&&<PlaceholderTab name="Gear" icon="🎾" count={(rackets||[]).length+(strings||[]).length}/>}
      </ErrorBoundary>
      <ErrorBoundary label="Plan">
        {tab==="plan"&&<PlaceholderTab name="Plan" icon="📝" count={(next||[]).length+(opponents||[]).length}/>}
      </ErrorBoundary>
      <ErrorBoundary label="Insights">
        {tab==="insights"&&<PlaceholderTab name="Insights" icon="📊"/>}
      </ErrorBoundary>
    </div>

    <TabBar tab={tab} setTab={setTab}/>

    {showClaudeShare&&<ClaudeShareModal onClose={()=>setShowClaudeShare(false)} data={{tournaments,practices,trials,rackets,strings,stringSetups,mental,next,profile,venues,opponents,measurements,quickTrialCards}} toast={toast}/>}
    {pasteImport&&<div style={{position:"fixed",inset:0,background:"#0008",zIndex:400,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:C.panel,borderRadius:12,padding:20,width:"100%",maxWidth:400}}>
        <div style={{fontSize:14,fontWeight:700,marginBottom:10}}>📋→📥 JSONを貼り付け</div>
        <textarea value={pasteText} onChange={e=>setPasteText(e.target.value)} placeholder='{"tournaments":[...],...}' rows={8} style={{width:"100%",fontSize:12,fontFamily:"monospace",padding:10,borderRadius:6,border:`1px solid ${C.border}`,background:C.panel2,color:C.text,outline:"none",resize:"vertical"}}/>
        <div style={{display:"flex",gap:8,marginTop:10}}>
          <button onClick={handlePasteImport} style={{flex:1,padding:10,borderRadius:6,background:C.accent,border:"none",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer"}}>📥 インポート</button>
          <button onClick={()=>{setPasteImport(false);setPasteText("");}} style={{padding:10,borderRadius:6,background:C.panel2,border:`1px solid ${C.border}`,color:C.textMuted,fontSize:13,cursor:"pointer"}}>キャンセル</button>
        </div>
      </div>
    </div>}
    {cfm.el}
    {toast.el}
  </div>;
}

// ── RENDER ────────────────────────────────────────
ReactDOM.createRoot(document.getElementById("root")).render(<TennisDB/>);
</script></body></html>
