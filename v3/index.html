const LS_PREFIX="yuke-";
const lsLoad=k=>{try{const v=localStorage.getItem(LS_PREFIX+k+"-v1");if(v)return JSON.parse(v);}catch(_){}return null;};

// Firestore互換: undefined除去 + matchStats.raw/pointsを除外（サイズ削減）
// raw/pointsはlocalStorageには残るが、Firestoreには送らない（stats集計結果だけで表示可能）
const cleanForFirestore=obj=>{
  if(obj===undefined)return null;
  if(obj===null||typeof obj!=="object")return obj;
  if(obj instanceof Date)return obj;
  if(Array.isArray(obj))return obj.map(cleanForFirestore);
  const r={};
  for(const k in obj){
    if(!Object.prototype.hasOwnProperty.call(obj,k))continue;
    if(obj[k]===undefined)continue;
    // matchStats内のraw/pointsはFirestoreに保存しない（サイズ対策・statsだけで表示可能）
    if((k==="raw"||k==="points")&&obj.source==="datatennis")continue;
    r[k]=cleanForFirestore(obj[k]);
  }
  return r;
};
// グローバルエラー通知（save失敗時にアプリ内に表示）
let _lastSaveError=null;
const _saveErrorListeners=[];

const notifySaveError=(key,err)=>{_lastSaveError={key,message:err.message||String(err),at:new Date().toISOString()};_saveErrorListeners.forEach(fn=>fn(_lastSaveError));};
const save=(k,d)=>{
  lsSave(k,d);

  if(_saveTimers[k])clearTimeout(_saveTimers[k]);

    const clean=cleanForFirestore(d);

    fbDb.collection("users").doc(user.uid).collection("data").doc(k).set(payload).then(()=>{console.log("Firestore saved ["+k+"]");}).catch(e=>{console.error("Firestore save error ["+k+"]:",e);notifySaveError(k,e);});

};

};
const cloudSaveAll=async(uid,data)=>{
  const batch=fbDb.batch();
  for(const[key,val]of Object.entries(data)){
    const ref=fbDb.collection("users").doc(uid).collection("data").doc(key);
    const clean=cleanForFirestore(val);
    batch.set(ref,{items:Array.isArray(clean)?clean:null,obj:Array.isArray(clean)?null:clean,updatedAt:firebase.firestore.FieldValue.serverTimestamp()});

// ── ERROR BOUNDARY ────────────────────────────────
class ErrorBoundary extends React.Component{
  constructor(p){super(p);this.state={hasError:false,error:null};}
  static getDerivedStateFromError(e){return{hasError:true,error:e};}
  render(){
    if(this.state.hasError)return<div style={{padding:20,textAlign:"center"}}>
      <div style={{fontSize:16,marginBottom:8}}>⚠️</div>
      <div style={{fontSize:13,color:C.red,fontWeight:600,marginBottom:4}}>{this.props.label}でエラーが発生しました</div>
      <div style={{fontSize:11,color:C.textMuted,marginBottom:12}}>{this.state.error?.message}</div>
      <button onClick={()=>this.setState({hasError:false,error:null})} style={{background:C.accent,border:"none",color:"#fff",borderRadius:6,padding:"8px 16px",fontSize:12,fontWeight:700,cursor:"pointer"}}>リトライ</button>
    </div>;
    return this.props.children;
  }
}

const trnDup=(a,b)=>normDate(a.date)===normDate(b.date)&&a.name===b.name;
// venue正規化: 表記揺れを吸収して重複判定を正確にする
const normalizeVenue=v=>{
  if(!v)return"";
  if(/イトマン/.test(v))return"イトマンテニス";
  if(/航空/.test(v))return"航空記念公園";
  if(/ベアーズ/.test(v))return"ベアーズテニス";
  if(/インスピ/.test(v))return"インスピ";
  if(/所沢.*総合/.test(v))return"所沢市総合運動場";
  if(/大泉.*希望/.test(v))return"大泉学園町希望が丘公園";
  if(/大宮.*けんぽ/.test(v))return"大宮けんぽグラウンド";
  return v;
};
const pracDup=(a,b)=>normDate(a.date)===normDate(b.date)&&normalizeVenue(a.venue)===normalizeVenue(b.venue);
const mergeArr=(exist,incoming,isDup)=>{
  const merged=[...exist];
  (incoming||[]).forEach(item=>{
    if(!merged.find(e=>e.id===item.id||isDup(e,item)))merged.push(item);
  });
  return merged;
};
// 補完候補を計算: existing が空で incoming に値がある項目をリストアップ
const COMPLEMENT_FIELDS={
  tournament:[["venue","会場"],["level","クラス"],["racketName","ラケット"],["stringMain","縦糸"],["stringCross","横糸"],["tensionMain","縦テンション"],["tensionCross","横テンション"],["weather","天気"],["temp","気温"],["generalNote","総括"]],
  practice:[["startTime","開始時刻"],["endTime","終了時刻"],["duration","時間"],["type","種別"],["venue","会場"],["racketName","ラケット"],["stringMain","縦糸"],["stringCross","横糸"],["weather","天気"],["temp","気温"]],
  trial:[["racketName","ラケット"],["stringMain","縦糸"],["stringCross","横糸"],["tensionMain","縦T"],["tensionCross","横T"],["temp","気温"],["venue","場所"]],
};
const computeComplement=(existing,incoming,type)=>{
  const fields=COMPLEMENT_FIELDS[type]||[];
  const r=[];
  fields.forEach(([key,label])=>{
    if(!existing[key]&&incoming[key])r.push({key,label,value:incoming[key]});
  });
  return r;
};
// インポートプレビュー用: 何が新規追加・何が重複スキップになるかを分析
const analyzeImport=(current,incoming)=>{
  const r={tournaments:{add:[],dup:[]},practices:{add:[],dup:[]},trials:{add:[],dup:[]}};
  (incoming.tournaments||[]).forEach(item=>{
    const dup=(current.tournaments||[]).find(e=>e.id===item.id||trnDup(e,item));
    if(dup)r.tournaments.dup.push({incoming:item,existing:dup,complement:computeComplement(dup,item,"tournament")});
    else r.tournaments.add.push(item);
  });
  (incoming.practices||[]).forEach(item=>{
    const dup=(current.practices||[]).find(e=>e.id===item.id||pracDup(e,item));
    if(dup)r.practices.dup.push({incoming:item,existing:dup,complement:computeComplement(dup,item,"practice")});
    else r.practices.add.push(item);
  });
  (incoming.trials||[]).forEach(item=>{
    const dup=(current.trials||[]).find(e=>e.id===item.id);
    if(dup)r.trials.dup.push({incoming:item,existing:dup,complement:computeComplement(dup,item,"trial")});
    else r.trials.add.push(item);
  });
  return r;
};
// 重複時のフィールド補完（既存値が空のフィールドのみ補完）
const mergeFields=(existing,incoming,fields)=>{
  const r={...existing};
  fields.forEach(f=>{if(!r[f]&&incoming[f])r[f]=incoming[f];});
  return r;
};
// 重複時の上書き（既存IDをそのまま、データのみ新規で置き換え）
const overwriteArr=(exist,incoming,isDup)=>{
  const merged=[...exist];
  (incoming||[]).forEach(item=>{
    const idx=merged.findIndex(e=>e.id===item.id||isDup(e,item));
    if(idx>=0)merged[idx]={...item,id:merged[idx].id};
    else merged.push(item);
  });
  return merged;
};
const mergeData=(current,incoming,mode="merge")=>{
  // mode: "skip"=重複は完全スキップ / "merge"=空フィールドのみ補完(デフォルト) / "overwrite"=重複を上書き
  const r={...current};
  if(mode==="overwrite"){
    r.tournaments=overwriteArr(current.tournaments||[],incoming.tournaments,trnDup);
    r.practices=overwriteArr(current.practices||[],incoming.practices,pracDup);
    r.trials=overwriteArr(current.trials||[],incoming.trials,(a,b)=>a.id===b.id);
  }else{
    r.tournaments=mergeArr(current.tournaments||[],incoming.tournaments,trnDup);
    r.practices=mergeArr(current.practices||[],incoming.practices,pracDup);
    r.trials=mergeArr(current.trials||[],incoming.trials,(a,b)=>a.id===b.id);
    if(mode==="merge"){
      // 重複した既存データの空フィールドを補完
      const tFields=COMPLEMENT_FIELDS.tournament.map(f=>f[0]);
      const pFields=COMPLEMENT_FIELDS.practice.map(f=>f[0]);
      const trFields=COMPLEMENT_FIELDS.trial.map(f=>f[0]);
      if(incoming.tournaments){
        r.tournaments=r.tournaments.map(t=>{
          const inc=(incoming.tournaments||[]).find(it=>trnDup(t,it));
          return inc?mergeFields(t,inc,tFields):t;
        });
      }
      if(incoming.practices){
        r.practices=r.practices.map(p=>{
          const inc=(incoming.practices||[]).find(ip=>pracDup(p,ip));
          return inc?mergeFields(p,inc,pFields):p;
        });
      }
      if(incoming.trials){
        r.trials=r.trials.map(t=>{
          const inc=(incoming.trials||[]).find(it=>it.id===t.id);
          return inc?mergeFields(t,inc,trFields):t;
        });
      }
    }
  }
  ["rackets","strings","measurements","mental","next","opponents","stringSetups","quickTrialCards"].forEach(k=>{
    if(incoming[k]){r[k]=mergeArr(current[k]||[],incoming[k],(a,b)=>a.id===b.id);}
  });
  if(incoming.venues){r.venues=[...new Set([...(current.venues||[]),...incoming.venues])];}
  if(incoming.profile&&!current.profile?.name){r.profile=incoming.profile;}
  return r;
};
const autoOpponents=(tournaments,opponents)=>{
  const existing=new Set((opponents||[]).map(o=>o.name));
  const newOpps=[];
  (tournaments||[]).forEach(t=>{
    (t.matches||[]).forEach(m=>{
      if(m.opponent&&!existing.has(m.opponent)&&!newOpps.find(n=>n.name===m.opponent)){
        newOpps.push({id:genId(),name:m.opponent,nickname:"",gender:"",style:"",strengths:"",weaknesses:"",note:""});
        existing.add(m.opponent);
      }
      if(m.opponent2&&!existing.has(m.opponent2)&&!newOpps.find(n=>n.name===m.opponent2)){
        newOpps.push({id:genId(),name:m.opponent2,nickname:"",gender:"",style:"",strengths:"",weaknesses:"",note:""});
        existing.add(m.opponent2);
      }
    });
  });
  return[...(opponents||[]),...newOpps];
};

const migrateToV2=data=>{
  if(lsLoad("migrated_v2"))return data;
  console.log("🔄 v2 migration starting...");
  const r={...data};
  // Normalize trial fields
  (r.trials||[]).forEach(t=>{
    if(t.string&&!t.stringMain){t.stringMain=t.string;delete t.string;}
    if(t.tension&&!t.tensionMain){
      const m=String(t.tension).match(/(\d+)/);
      if(m){t.tensionMain=parseInt(m[1]);t.tensionCross=t.tensionCross||parseInt(m[1]);}
      delete t.tension;
    }
  });
  // Normalize practice/tournament fields
  [...(r.tournaments||[]),...(r.practices||[])].forEach(item=>{
    if(item.string&&!item.stringSetup){item.stringSetup=item.string;delete item.string;}
  });
  lsSave("migrated_v2",true);
  console.log("✅ v2 migration complete");
  return r;
};
const fixMeasurements=data=>{
  if(lsLoad("migrated_v2_measurements"))return data;
  const ms=data.measurements||[];
  if(ms.length===0){lsSave("migrated_v2_measurements",true);return data;}
  const rackets=data.rackets||[];
  ms.forEach(m=>{
    if(m.racket&&!m.racketId){
      const found=rackets.find(r=>r.name.includes(m.racket)||m.racket.includes(r.name));
      if(found)m.racketId=found.id;
    }
  });
  lsSave("migrated_v2_measurements",true);
  return data;
};

const formatMatchForClaude=(m,trn)=>{
  let s=`## 試合: ${trn?.name||""} ${m.round||""}\n`;
  s+=`日付: ${fmtDateFull(trn?.date)}\n`;
  s+=`対戦相手: ${m.opponent||"不明"}${m.opponent2?" / "+m.opponent2:""}\n`;
  s+=`結果: ${m.result||""} ${(m.setScores||[]).join(", ")}\n`;
  s+=`メンタル: ${m.mental||"-"}/5 (${MENTAL_LABELS[m.mental]||""}) / フィジカル: ${m.physical||"-"}/5 (${PHYSICAL_LABELS[m.physical]||""})\n`;
  if(m.note)s+=`メモ: ${m.note}\n`;
  if(m.games?.length){s+=`ゲーム推移: ${m.games.map(g=>g.winner==="me"?"●":"○").join("")}\n`;}
  if(m.changeovers?.length){
    s+="チェンジオーバー:\n";
    m.changeovers.forEach(co=>{s+=`  ${co.afterGame}G後: M${co.mental}/P${co.physical} ${co.note||""}\n`;});
  }
  return s;
};
const formatTournamentAllForClaude=trn=>{
  let s=`# 大会: ${trn.name} (${fmtDateFull(trn.date)})\n`;
  s+=`レベル: ${trn.level||""} / 種目: ${trn.type||""}\n`;
  s+=`結果: ${trn.overallResult||""}\n`;
  s+=`機材: ${trn.racketName||""} / ${trn.stringSetup||""} / ${trn.tension||""}\n`;
  if(trn.generalNote)s+=`総評: ${trn.generalNote}\n`;
  s+="\n";
  (trn.matches||[]).forEach(m=>{s+=formatMatchForClaude(m,trn)+"\n";});
  return s;
};
const formatPracticeForClaude=p=>{
  let s=`# 練習: ${fmtDateFull(p.date)} @ ${p.venue||""}\n`;
  s+=`種類: ${p.type||""} / 時間: ${p.duration||""}分\n`;
  if(p.racketName)s+=`機材: ${p.racketName} / ${p.stringSetup||""} / ${p.tension||""}\n`;
  if(p.focus)s+=`フォーカス: ${p.focus}\n`;
  if(p.coachNote)s+=`コーチメモ: ${p.coachNote}\n`;
  if(p.goodNote)s+=`良かった点: ${p.goodNote}\n`;
  if(p.improveNote)s+=`改善点: ${p.improveNote}\n`;
  if(p.generalNote)s+=`メモ: ${p.generalNote}\n`;
  return s;
};
const formatTrialForClaude=t=>{
  let s=`# 試打: ${t.racketName||""} / ${t.stringMain||""}${t.stringCross?" × "+t.stringCross:""}\n`;
  s+=`日付: ${fmtDateFull(t.date)} / テンション: ${t.tensionMain||t.tension||""}${t.tensionCross?"/"+t.tensionCross:""}p\n`;
  s+=`判定: ${t.judgment||""}\n`;
  const items=[["スピン",t.spin],["推進力",t.power],["コントロール",t.control],["打感情報",t.info],["操作性",t.maneuver],["振り抜き",t.swingThrough]];
  items.forEach(([l,v])=>{if(v)s+=`${l}: ${v}/5\n`;});
  if(t.strokeNote)s+=`ストローク: ${t.strokeNote}\n`;
  if(t.serveNote)s+=`サーブ: ${t.serveNote}\n`;
  if(t.volleyNote)s+=`ボレー: ${t.volleyNote}\n`;
  if(t.generalNote)s+=`総評: ${t.generalNote}\n`;
  return s;
};

function GameTracker({match,onChange}){
  const games=match.games||[];
  const addGame=winner=>{const ng=[...games,{id:genId(),winner}];onChange({...match,games:ng});};
  const removeLast=()=>{if(games.length){onChange({...match,games:games.slice(0,-1)});}};
  const meCount=games.filter(g=>g.winner==="me").length;
  const oppCount=games.filter(g=>g.winner==="opp").length;
  return <div>

    if(selected){persistCards(cards.map(c=>c.id===selected?{...c,eval:{...eval_}}:c));}

    if(card?.eval){setEval({spin:3,power:3,control:3,info:3,maneuver:3,swingThrough:3,trajectory:3,stiffness:3,shotForeAtk:3,shotForeDef:3,shotBackAtk:3,shotBackDef:3,shotSlice:3,shotServe:3,shotVolley:3,shotReturn:3,confidence:3,memo:"",...card.eval});}

        <div style={{background:sc,borderRadius:12,margin:"12px 16px",padding:"16px 20px"}}>
          <div style={{fontSize:20,fontWeight:800,color:"#fff"}}>{card?.racket}</div>
          <div style={{fontSize:13,color:"rgba(255,255,255,0.8)",marginTop:4}}>{[card?.stringMain,card?.stringCross].filter(Boolean).join(" / ")}{card?.tensionMain?" / "+card.tensionMain+(card.tensionCross?"/"+card.tensionCross:"")+"p":""}</div>
        </div>
        <div style={{padding:"0 16px 20px"}}>
          {criteriaGroups.map(grp=><div key={grp.title} style={{marginBottom:16}}>
            <div style={{display:"flex",alignItems:"baseline",gap:8,marginBottom:10,borderBottom:"1px solid #bbb",paddingBottom:6}}>
              <span style={{fontSize:15,fontWeight:800,color:"#222"}}>{grp.title}</span>
              {grp.desc&&<span style={{fontSize:11,color:"#444"}}>{grp.desc}</span>}
            </div>
            {grp.items.map(c=><div key={c.key} style={{marginBottom:16}}>
              <div style={{fontSize:15,fontWeight:700,color:"#222",marginBottom:6}}>{c.label}</div>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                {c.low&&<span style={{fontSize:10,color:"#444",minWidth:44,textAlign:"right"}}>{c.low}</span>}
                {[1,2,3,4,5].map(n=><button key={n} onClick={()=>setEval(p=>({...p,[c.key]:n}))} style={{flex:1,height:44,borderRadius:8,border:`2px solid ${eval_[c.key]===n?sc:"#bbb"}`,background:eval_[c.key]===n?sc:"#fff",color:eval_[c.key]===n?"#fff":"#444",fontSize:17,fontWeight:700,cursor:"pointer"}}>{n}</button>)}
                {c.high&&<span style={{fontSize:10,color:"#444",minWidth:44}}>{c.high}</span>}
              </div>
            </div>)}
          </div>)}
          <div style={{marginBottom:20}}>
            <div style={{fontSize:16,fontWeight:700,color:"#222",marginBottom:8}}>メモ（一言）</div>
            <textarea value={eval_.memo} onChange={e=>setEval(p=>({...p,memo:e.target.value}))} placeholder="気づいたことを一言..." rows={3} style={{width:"100%",borderRadius:8,border:"1px solid #bbb",padding:12,fontSize:14,fontFamily:"inherit",resize:"vertical",color:"#222",background:"#fff"}}/>
          </div>
          <button onClick={handleSave} style={{width:"100%",background:sc,border:"none",borderRadius:10,padding:14,fontSize:16,fontWeight:700,color:"#fff",cursor:"pointer"}}>保存して試打タブに転送する</button>
        </div>
      </div>
    </div>;
  }

  // Card list view
  return <div style={{position:"fixed",inset:0,background:"#f5f0e8",zIndex:500,display:"flex",flexDirection:"column"}}>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 16px",borderBottom:"1px solid #bbb",flexShrink:0}}>
      <button onClick={onClose} style={{background:"none",border:"none",fontSize:20,color:"#222",cursor:"pointer"}}>✕</button>
      <span style={{fontSize:15,fontWeight:700,color:"#222"}}>試打ノート</span>
      <div style={{width:30}}/>
    </div>
    <div style={{flex:1,overflowY:"auto",padding:"12px 16px"}}>
      {cards.length===0&&!adding&&<div style={{textAlign:"center",padding:"30px 0",color:"#444",fontSize:13}}>「＋ 追加」で今日試打するラケット×セッティングを登録</div>}
      {cards.map(card=><div key={card.id} style={{position:"relative",marginBottom:10}}>
        <button onClick={()=>selectCard(card.id)} style={{display:"block",width:"100%",textAlign:"left",background:"#fff",border:`2px solid ${card.color}30`,borderLeft:`4px solid ${card.color}`,borderRadius:10,padding:"16px 20px",cursor:"pointer"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{fontSize:18,fontWeight:800,color:card.color}}>{card.racket}</div>
            {card.eval&&<span style={{fontSize:12,color:"#444",background:"#eee",padding:"2px 8px",borderRadius:4}}>評価済み</span>}
          </div>
          <div style={{fontSize:13,color:"#444",marginTop:4}}>{[card.stringMain,card.stringCross].filter(Boolean).join(" / ")}{card.tensionMain?" / "+card.tensionMain+(card.tensionCross?"/"+card.tensionCross:"")+"p":""}</div>
        </button>
        <button onClick={e=>{e.stopPropagation();persistCards(cards.filter(c=>c.id!==card.id));}} style={{position:"absolute",top:6,right:6,background:"#fff",border:"1px solid #ccc",borderRadius:"50%",width:24,height:24,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:12,color:"#999",padding:0}}>✕</button>
      </div>)}
      {!adding?<button onClick={()=>setAdding(true)} style={{width:"100%",background:"#fff",border:"2px dashed #bbb",borderRadius:10,padding:14,fontSize:14,color:"#444",cursor:"pointer",fontWeight:600}}>＋ 追加</button>
      :<div style={{background:"#fff",border:"1px solid #bbb",borderRadius:10,padding:16}}>
        <select value={addF.racket} onChange={e=>setAddF(p=>({...p,racket:e.target.value}))} style={{width:"100%",border:"1px solid #bbb",borderRadius:6,padding:10,fontSize:14,marginBottom:8,color:"#222",background:"#fff"}}>{rOpts.map(o=><option key={o.value} value={o.value}>{o.label}</option>)}</select>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
          <select value={addF.stringMain} onChange={e=>setAddF(p=>({...p,stringMain:e.target.value}))} style={{width:"100%",border:"1px solid #bbb",borderRadius:6,padding:10,fontSize:14,color:"#222",background:"#fff"}}>{getStringOpts(strings).map(o=><option key={o.value} value={o.value}>{o.label}</option>)}</select>
          <select value={addF.stringCross} onChange={e=>setAddF(p=>({...p,stringCross:e.target.value}))} style={{width:"100%",border:"1px solid #bbb",borderRadius:6,padding:10,fontSize:14,color:"#222",background:"#fff"}}>{[{value:"",label:"-- 横糸（同じ）--"},...getStringOpts(strings).slice(1)].map(o=><option key={o.value} value={o.value}>{o.label}</option>)}</select>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
          <input value={addF.tensionMain} onChange={e=>setAddF(p=>({...p,tensionMain:e.target.value}))} placeholder="縦テンション" style={{width:"100%",border:"1px solid #bbb",borderRadius:6,padding:10,fontSize:14,color:"#222",background:"#fff"}}/>
          <input value={addF.tensionCross} onChange={e=>setAddF(p=>({...p,tensionCross:e.target.value}))} placeholder="横テンション" style={{width:"100%",border:"1px solid #bbb",borderRadius:6,padding:10,fontSize:14,color:"#222",background:"#fff"}}/>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>setAdding(false)} style={{flex:1,background:"#eee",border:"none",borderRadius:6,padding:10,fontSize:13,cursor:"pointer",color:"#222"}}>キャンセル</button>
          <button onClick={handleAddCard} style={{flex:1,background:"#222",border:"none",borderRadius:6,padding:10,fontSize:13,color:"#fff",cursor:"pointer",fontWeight:700}}>追加</button>
        </div>
      </div>}
    </div>
  </div>;
}
// ── MINI CALENDAR ────────────────────────────────
function MiniCalendar({tournaments,practices,onNavigateDetail}){
  const[month,setMonth]=useState(()=>{const d=new Date();return{y:d.getFullYear(),m:d.getMonth()};});
  const[selectedDay,setSelectedDay]=useState(null);
  const todayStr=today();
  const daysInMonth=new Date(month.y,month.m+1,0).getDate();
  const firstDow=new Date(month.y,month.m,1).getDay();
  const monthLabel=`${month.y}年${month.m+1}月`;
  const prev=()=>setMonth(p=>p.m===0?{y:p.y-1,m:11}:{y:p.y,m:p.m-1});
  const next=()=>setMonth(p=>p.m===11?{y:p.y+1,m:0}:{y:p.y,m:p.m+1});

  // Build date→events map
  const eventMap=useMemo(()=>{
    const map={};
    const prefix=`${month.y}-${String(month.m+1).padStart(2,"0")}`;
    (tournaments||[]).forEach(t=>{const nd=normDate(t.date);if(nd.startsWith(prefix)){if(!map[nd])map[nd]=[];map[nd].push({type:"tournament",data:t});}});
    (practices||[]).forEach(p=>{const nd=normDate(p.date);if(nd.startsWith(prefix)){if(!map[nd])map[nd]=[];map[nd].push({type:"practice",data:p});}});
    return map;
  },[tournaments,practices,month]);

  const dayEvents=selectedDay?eventMap[selectedDay]||[]:[];

  return <Card>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
      <button onClick={prev} style={{background:"none",border:"none",fontSize:16,cursor:"pointer",color:C.textMuted,padding:"4px 8px"}}>◀</button>
      <span style={{fontSize:13,fontWeight:700,color:C.text}}>{monthLabel}</span>
      <button onClick={next} style={{background:"none",border:"none",fontSize:16,cursor:"pointer",color:C.textMuted,padding:"4px 8px"}}>▶</button>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,textAlign:"center"}}>
      {["日","月","火","水","木","金","土"].map((d,i)=><div key={d} style={{fontSize:10,fontWeight:600,color:i===0?"#dc2626":i===6?C.blue:C.textMuted,padding:"2px 0"}}>{d}</div>)}
      {Array.from({length:firstDow}).map((_,i)=><div key={"e"+i}/>)}
      {Array.from({length:daysInMonth}).map((_,i)=>{
        const day=i+1;
        const dateStr=`${month.y}-${String(month.m+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
        const events=eventMap[dateStr]||[];
        const hasTrn=events.some(e=>e.type==="tournament");
        const hasPrac=events.some(e=>e.type==="practice");
        const isToday=dateStr===todayStr;
        const isSelected=dateStr===selectedDay;
        const dow=(firstDow+i)%7;
        return <div key={day} onClick={()=>setSelectedDay(isSelected?null:dateStr)} style={{padding:"4px 0",cursor:events.length?"pointer":"default",borderRadius:6,background:isSelected?C.accentBg:"transparent",border:isToday?`2px solid ${C.accent}`:"2px solid transparent"}}>
          <div style={{fontSize:12,fontWeight:isToday?700:400,color:dow===0?"#dc2626":dow===6?C.blue:C.text}}>{day}</div>
          <div style={{display:"flex",justifyContent:"center",gap:2,minHeight:6}}>
            {hasTrn&&<div style={{width:5,height:5,borderRadius:"50%",background:C.accent}}/>}
            {hasPrac&&<div style={{width:5,height:5,borderRadius:"50%",background:C.blue}}/>}
          </div>
        </div>;
      })}
    </div>
    {selectedDay&&dayEvents.length>0&&<div style={{marginTop:8,borderTop:`1px solid ${C.border}`,paddingTop:8}}>
      <div style={{fontSize:11,color:C.textMuted,marginBottom:4}}>{parseInt(selectedDay.split("-")[1])}/{parseInt(selectedDay.split("-")[2])}</div>
      {dayEvents.map((ev,i)=>{
        const t=ev.type==="practice"&&ev.data.startTime?ev.data.startTime+(ev.data.endTime?"-"+ev.data.endTime:""):"";
        return <div key={i} onClick={()=>onNavigateDetail&&onNavigateDetail(ev.type,ev.data)} style={{display:"flex",alignItems:"center",gap:6,padding:"4px 0",cursor:"pointer"}}>
          <span style={{fontSize:12}}>{ev.type==="tournament"?"🏆":"🏃"}</span>
          {t&&<span style={{fontSize:11,color:C.textMuted,fontFamily:"monospace",minWidth:82}}>{t}</span>}
          <span style={{fontSize:12,color:C.accent,fontWeight:500,flex:1,minWidth:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{ev.type==="tournament"?ev.data.name:(ev.data.type||"練習")+(ev.data.venue?" @ "+ev.data.venue:"")}</span>
          {ev.type==="tournament"&&ev.data.overallResult&&<Badge color={RESULT_BADGE[ev.data.overallResult]||"gray"} sm>{ev.data.overallResult}</Badge>}
          <span style={{fontSize:11,color:C.textMuted}}>›</span>
        </div>;
      })}
    </div>}
  </Card>;
}

// ── HOME TAB ──────────────────────────────────────
function HomeTab({next,setNext,tournaments,setTournaments,practices,setPractices,trials,setTrials,rackets,strings,stringSetups,venues,setVenues,quickTrialCards,setQuickTrialCards,daysSinceExport,lastExport,onExport,onGoToSessions,onGoToPlan,onNavigateDetail,toast}){
  const[recordModal,setRecordModal]=useState(null);
  const[showQuickTrial,setShowQuickTrial]=useState(false);
  const undoRef=useRef(null);
  const todayStr=today();
  // Next Actions: top 3 undone
  const nextItems=useMemo(()=>(next||[]).filter(n=>!n.done).slice(0,3),[next]);
  const handleHomeRecord=type=>{
    if(type==="trials"){setShowQuickTrial(true);return;}
    setRecordModal(type);
  };
  const handleQuickTrialSave=form=>{
    const existing=(trials||[]).find(t=>t.id===form.id);
    const arr=ds(existing?(trials||[]).map(t=>t.id===form.id?form:t):[form,...(trials||[])]);
    setTrials(arr);save(KEYS.trials,arr);
    toast.show("🎾 試打を保存しました");
  };
  const handleHomeSave=(type,form)=>{
    if(type==="tournaments"){
      const arr=ds([form,...(tournaments||[])]);
      setTournaments(arr);save(KEYS.tournaments,arr);
    }else if(type==="practices"){
      const arr=ds([form,...(practices||[])]);
      setPractices(arr);save(KEYS.practices,arr);
    }else if(type==="trials"){
      const arr=ds([form,...(trials||[])]);
      setTrials(arr);save(KEYS.trials,arr);
    }
    setRecordModal(null);toast.show("💾 保存しました");
  };
  const toggleNext=id=>{
    const prev=[...(next||[])];
    undoRef.current=prev;
    const updated=prev.map(n=>n.id===id?{...n,done:true,doneAt:todayStr}:n);
    setNext(updated);save(KEYS.next,updated);
    toast.show("✅ 完了",C.accent,()=>{if(undoRef.current){setNext(undoRef.current);save(KEYS.next,undoRef.current);undoRef.current=null;}});
  };
  // Upcoming events: tournaments + practices within 1 month, max 5
  const upcomingItems=useMemo(()=>{
    const items=[];
    const oneMonth=new Date();oneMonth.setMonth(oneMonth.getMonth()+1);
    const oneMonthStr=`${oneMonth.getFullYear()}-${String(oneMonth.getMonth()+1).padStart(2,"0")}-${String(oneMonth.getDate()).padStart(2,"0")}`;
    (tournaments||[]).filter(t=>{const nd=normDate(t.date);return nd>=todayStr&&nd<=oneMonthStr;}).forEach(t=>items.push({type:"tournament",id:t.id,date:t.date,name:t.name,level:t.level,racketName:t.racketName,stringSetup:t.stringSetup,tension:t.tension,_src:t}));
    (practices||[]).filter(p=>{const nd=normDate(p.date);return nd>=todayStr&&nd<=oneMonthStr;}).forEach(p=>items.push({type:"practice",id:p.id,date:p.date,name:p.type||"練習",venue:p.venue,startTime:p.startTime,endTime:p.endTime,duration:p.duration,_src:p}));
    return items.sort((a,b)=>normDate(a.date).localeCompare(normDate(b.date)));
  },[tournaments,practices,todayStr]);
  const displayUpcoming=upcomingItems.slice(0,5);
  const overflowCount=upcomingItems.length-5;
  // Best results: top 5 good results (優勝→準優勝→予選突破 order, then by date)
  const GOOD_RESULTS=["優勝","準優勝","3位","予選突破"];
  const bestTournaments=useMemo(()=>(tournaments||[]).filter(t=>GOOD_RESULTS.includes(t.overallResult)).sort((a,b)=>{const ai=GOOD_RESULTS.indexOf(a.overallResult),bi=GOOD_RESULTS.indexOf(b.overallResult);return ai!==bi?ai-bi:(normDate(b.date)||"").localeCompare(normDate(a.date)||"");}).slice(0,5),[tournaments]);

  return <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
    {/* Fixed top area: 3 Buttons + Next Actions */}
    <div style={{flexShrink:0,padding:"10px 10px 0"}}>
      {/* Big 3 Buttons */}
      <div style={{display:"flex",gap:8,marginBottom:10}}>
        {[["🏆","大会を記録","tournaments"],["🏃","練習を記録","practices"],["🎾","試打を記録","trials"]].map(([icon,label,type])=>
          <button key={type} onClick={()=>handleHomeRecord(type)} style={{flex:1,height:56,borderRadius:10,background:C.accent,border:"none",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2}}>
            <span style={{fontSize:18}}>{icon}</span><span>{label}</span>
          </button>
        )}
      </div>

      {/* Next Actions */}
      {nextItems.length>0&&<Card>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <span style={{fontSize:12,fontWeight:700,color:C.textMuted}}>▶ Next Actions</span>
          <button onClick={onGoToPlan} style={{background:"none",border:"none",color:C.accent,fontSize:11,fontWeight:600,cursor:"pointer"}}>全て見る →</button>
        </div>
        {nextItems.map(n=><div key={n.id} onClick={()=>toggleNext(n.id)} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 0",cursor:"pointer",borderBottom:`1px solid ${C.border}22`}}>
          <div style={{width:20,height:20,borderRadius:4,border:`2px solid ${C.accent}`,flexShrink:0}}/>
          <div style={{minWidth:0,flex:1}}>
            <div style={{fontSize:12,fontWeight:600,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{n.label}</div>
            {n.category&&<Badge color={n.priority==="最高"?"green":n.priority==="高"?"blue":"yellow"} sm>{n.category}</Badge>}
          </div>
        </div>)}
      </Card>}
    </div>

    {/* Scrollable content area */}
    <div style={{flex:1,overflowY:"auto",WebkitOverflowScrolling:"touch",padding:"0 10px 60px"}}>
      {/* Backup Warning */}
      {daysSinceExport>=3&&<div onClick={onExport} style={{background:C.redBg,border:`1px solid ${C.red}`,borderRadius:8,padding:10,marginBottom:10,cursor:"pointer"}}>
        <div style={{fontSize:12,fontWeight:700,color:C.red}}>⚠️ バックアップしてください（{daysSinceExport>=365?"未実施":`${daysSinceExport}日前`}）</div>
        <div style={{fontSize:11,color:"#fca5a5"}}>{lastExport?`最終: ${new Date(lastExport).toLocaleDateString("ja-JP")}`:"まだバックアップしていません"}（タップで📤）</div>
      </div>}

      {/* Mini Calendar */}
      <MiniCalendar tournaments={tournaments} practices={practices} onNavigateDetail={onNavigateDetail}/>

      {/* Upcoming Events */}
      {displayUpcoming.length>0&&<Card>
        <div style={{fontSize:12,fontWeight:700,color:C.textMuted,marginBottom:8}}>📅 今後の予定</div>
        {displayUpcoming.map((item,i)=><div key={i} onClick={()=>onNavigateDetail&&onNavigateDetail(item.type,item._src)} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 0",borderBottom:i<displayUpcoming.length-1?`1px solid ${C.border}22`:"none",cursor:"pointer"}}>
          <span style={{fontSize:14}}>{item.type==="tournament"?"🏆":"🏃"}</span>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:12,fontWeight:600,color:C.accent,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.name}{item.level?" ("+item.level+")":""}</div>
            <div style={{fontSize:10,color:C.textMuted}}>{fmtDateFull(item.date)}{item.startTime?" "+item.startTime+(item.endTime?"-"+item.endTime:""):""}{item.venue?" · "+item.venue:""}</div>
            {item.racketName&&<div style={{fontSize:10,color:C.accent}}>🎾 {item.racketName}{item.stringSetup?" / "+item.stringSetup:""}{item.tension?" / "+item.tension:""}</div>}
          </div>
          <span style={{fontSize:11,color:C.textMuted}}>›</span>
        </div>)}
        {overflowCount>0&&<button onClick={onGoToSessions} style={{background:"none",border:"none",color:C.accent,fontSize:11,fontWeight:600,cursor:"pointer",marginTop:6}}>他{overflowCount}件を見る → Sessions</button>}
      </Card>}

      {/* Recent Tournaments */}
      {bestTournaments.length>0&&<Card>
        <div style={{fontSize:12,fontWeight:700,color:C.textMuted,marginBottom:8}}>🏆 好成績</div>
        {bestTournaments.map(t=>{
          const isTop=t.overallResult==="優勝"||t.overallResult==="準優勝";
          const ic=t.overallResult==="優勝"?"🏆":t.overallResult==="準優勝"?"🥈":"✅";
          const c=t.overallResult==="優勝"?C.accent:t.overallResult==="準優勝"?C.blue:C.yellow;
          return <div key={t.id} onClick={()=>onNavigateDetail&&onNavigateDetail("tournament",t)} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 0",borderBottom:`1px solid ${C.border}22`,cursor:"pointer"}}>
            <span style={{fontSize:isTop?16:13}}>{ic}</span>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:12,fontWeight:600,color:C.accent,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.name}</div>
              <div style={{fontSize:10,color:C.textMuted}}>{fmtDateFull(t.date)}</div>
            </div>
            <span style={{fontSize:isTop?13:11,fontWeight:700,color:c}}>{t.overallResult}</span>
            <span style={{fontSize:11,color:C.textMuted}}>›</span>
          </div>;
        })}
      </Card>}

      {/* Stats summary */}
      <Card style={{background:C.panel2}}>
        <div style={{display:"flex",justifyContent:"space-around",textAlign:"center"}}>
          {[["大会",(tournaments||[]).length,"🏆"],["練習",(practices||[]).length,"🏃"],["試打",(trials||[]).length,"🎾"]].map(([l,n,ic])=>
            <div key={l}><div style={{fontSize:18}}>{ic}</div><div style={{fontSize:16,fontWeight:700,color:C.accent}}>{n}</div><div style={{fontSize:10,color:C.textMuted}}>{l}</div></div>
          )}
        </div>
      </Card>
    </div>

    {recordModal==="tournaments"&&<QuickAddTournament onSave={form=>{handleHomeSave("tournaments",form);setRecordModal(null);}} onClose={()=>setRecordModal(null)} venues={venues} onAddVenue={v=>{const nv=[...(venues||[]),v];setVenues(nv);save(KEYS.venues,nv);}}/>}
    {recordModal==="practices"&&<QuickAddPractice onSave={form=>{handleHomeSave("practices",form);setRecordModal(null);}} onClose={()=>setRecordModal(null)} rackets={rackets} venues={venues} onAddVenue={v=>{const nv=[...(venues||[]),v];setVenues(nv);save(KEYS.venues,nv);}}/>}
    {showQuickTrial&&<QuickTrialMode rackets={rackets} strings={strings} trials={trials} tournaments={tournaments} practices={practices} cards={quickTrialCards} setCards={setQuickTrialCards} onSaveTrial={handleQuickTrialSave} onClose={()=>setShowQuickTrial(false)} toast={toast}/>}
  </div>;
}

// ── TOURNAMENT DETAIL (full-screen, matches + GameTracker) ──
// ── CSV STATS PARSER & CALCULATOR (ATP-style stats from datatennis CSV) ──
const parsePattern=code=>{
  if(!code)return null;
  if(code==="Ace")return{shotType:"Ace",result:"W",hand:null,forced:null};
  if(code==="DbF")return{shotType:"DbF",result:"L",hand:null,forced:null};
  const shotType=code.slice(0,2);
  const result=code[2]||null;
  const hand=code[3]||null;
  const forced=code[4]||null;
  return{shotType,result,hand,forced};
};
const parseScoreVal=s=>{
  if(s==="Bk"||s==="Kp")return"game";
  if(s==="0")return 0;if(s==="15")return 1;if(s==="30")return 2;if(s==="40")return 3;
  const n=parseInt(s);return isNaN(n)?0:n;
};
const parseStatsCSV=(text,myPlayerName)=>{
  const lines=text.replace(/\r/g,"").split("\n").filter(l=>l.trim());
  if(lines.length<2)throw new Error("CSVが空です");
  const header=lines[0].split(",").map(s=>s.trim());
  const rows=lines.slice(1).map(l=>{
    const cols=l.split(",");
    const obj={};header.forEach((h,i)=>{obj[h]=(cols[i]||"").trim();});
    return obj;
  });
  if(!rows[0].PlayerA||!rows[0].PlayerB)throw new Error("PlayerA/PlayerBカラムが見つかりません");
  const playerA=rows[0].PlayerA,playerB=rows[0].PlayerB;
  let myIsA;
  if(myPlayerName&&myPlayerName===playerA)myIsA=true;
  else if(myPlayerName&&myPlayerName===playerB)myIsA=false;
  else if(playerA==="古川"||playerA==="ゆっけ")myIsA=true;
  else if(playerB==="古川"||playerB==="ゆっけ")myIsA=false;
  else myIsA=true;
  const points=[];
  let gPtsA=0,gPtsB=0,curGame=0;
  rows.forEach(row=>{
    const g=parseInt(row.Game);
    if(g!==curGame){curGame=g;gPtsA=0;gPtsB=0;}
    const serverIsA=row.Server===playerA;
    const serverPts=serverIsA?gPtsA:gPtsB,returnerPts=serverIsA?gPtsB:gPtsA;
    const isBP=returnerPts>=3&&returnerPts>=serverPts;
    const totalPts=gPtsA+gPtsB;
    const side=totalPts%2===0?"deuce":"ad";
    const fault=row.Fault||"";
    const serveNum=(fault==="F"||fault==="DF")?2:1;
    const nextA=parseScoreVal(row.ScoreA),nextB=parseScoreVal(row.ScoreB);
    const aWon=(nextA==="game"&&(row.ScoreA==="Bk"||row.ScoreA==="Kp"))||(typeof nextA==="number"&&nextA===gPtsA+1);
    const winner=aWon?"A":"B";
    const pattern=parsePattern(row.PatternA||row.PatternB||"");
    const patternOwner=row.PatternA?"A":(row.PatternB?"B":null);
    points.push({
      num:parseInt(row.Num),game:g,
      server:serverIsA?"A":"B",
      serverIsMe:myIsA?serverIsA:!serverIsA,
      serveNum,isDoubleFault:fault==="DF",fault,
      side,isBreakPoint:isBP,
      winner,winnerIsMe:myIsA?(winner==="A"):(winner==="B"),
      pattern,patternOwner,
      gameEnd:nextA==="game"||nextB==="game",
      gameWonBy:nextA==="game"?"A":(nextB==="game"?"B":null),
    });
    if(aWon)gPtsA++;else gPtsB++;
  });
  return{points,playerA,playerB,myIsA,rows};
};

// Compute match stats (データテニス値に一致 + ATP準拠2項目 + Tennis DB独自分析)
const computeMatchStats=(parsed)=>{
  const{points,myIsA}=parsed;
  const meTag=myIsA?"A":"B",oppTag=myIsA?"B":"A";
  const fraq=(w,t)=>({won:w,total:t,pct:t>0?Math.round(100*w/t):0});

  // Service/Return splits
  const mySPts=points.filter(p=>p.server===meTag);
  const oppSPts=points.filter(p=>p.server===oppTag);
  const myRPts=points.filter(p=>p.server===oppTag);
  const oppRPts=points.filter(p=>p.server===meTag);
  // Side splits (server-side)
  const splitSide=(arr,s)=>arr.filter(p=>p.side===s);

  // Aces: 自分のサーブで、pattern.Ace & winner=me
  const countAces=(sp,tag)=>sp.filter(p=>p.pattern?.shotType==="Ace"&&p.patternOwner===tag&&p.winner===tag).length;
  const myAces=countAces(mySPts,meTag);
  const oppAces=countAces(oppSPts,oppTag);

  // Double faults
  const myDF=mySPts.filter(p=>p.isDoubleFault).length;
  const oppDF=oppSPts.filter(p=>p.isDoubleFault).length;

  // Helper: compute serve stats with side split (1st In / 1st Pts Won / 2nd Pts Won)
  const serveStats=(sp,tag)=>{
    const stat=(arr)=>{
      const first=arr.filter(p=>p.fault==="");
      const firstWon=first.filter(p=>p.winner===tag);
      const second=arr.filter(p=>p.fault==="F"||p.fault==="DF");
      const secondIn=second.filter(p=>!p.isDoubleFault);
      const secondWon=secondIn.filter(p=>p.winner===tag);
      return{
        firstIn:fraq(first.length,arr.length),
        firstWon:fraq(firstWon.length,first.length),
        secondWon:fraq(secondWon.length,second.length),
      };
    };
    return{
      total:stat(sp),
      deuce:stat(splitSide(sp,"deuce")),
      ad:stat(splitSide(sp,"ad")),
    };
  };

  // Helper: return-in rate (データテニス定義:相手のサーブがInでこちらがリターンをInできた率)
  // リターンInできない要因: 自分のリターンエラー + サーバーのAce（返球不能）
  const retInStats=(rp,meTag2)=>{
    const serverTag=meTag2==="A"?"B":"A";
    const notInFilter=p=>{
      const isAce=p.pattern?.shotType==="Ace"&&p.patternOwner===serverTag&&p.winner===serverTag;
      const isRetErr=p.pattern?.shotType==="Rt"&&p.pattern.result==="E"&&p.patternOwner===serverTag&&p.winner===serverTag;
      return isAce||isRetErr;
    };
    const stat=(arr)=>{
      const first=arr.filter(p=>p.fault==="");
      const firstNotIn=first.filter(notInFilter);
      const second=arr.filter(p=>p.fault==="F"||p.fault==="DF");
      const secondIn=second.filter(p=>!p.isDoubleFault);
      const secondNotIn=secondIn.filter(notInFilter);
      return{
        firstReturnIn:fraq(first.length-firstNotIn.length,first.length),
        secondReturnIn:fraq(secondIn.length-secondNotIn.length,secondIn.length),
      };
    };
    return{
      total:stat(rp),
      deuce:stat(splitSide(rp,"deuce")),
      ad:stat(splitSide(rp,"ad")),
    };
  };

  // Helper: return points won (ATP定義: DF除く)
  const retWonStats=(rp,tag)=>{
    const first=rp.filter(p=>p.fault==="");
    const firstWon=first.filter(p=>p.winner===tag);
    const second=rp.filter(p=>(p.fault==="F"||p.fault==="DF")&&!p.isDoubleFault);
    const secondWon=second.filter(p=>p.winner===tag);
    return{
      firstReturnWon:fraq(firstWon.length,first.length),
      secondReturnWon:fraq(secondWon.length,second.length),
    };
  };

  // Side split for アイド/デュース サーブイン率 (データテニス値: サイド別 1stサーブIN率)
  const my1stSide={deuce:fraq(splitSide(mySPts,"deuce").filter(p=>p.fault==="").length,splitSide(mySPts,"deuce").length),ad:fraq(splitSide(mySPts,"ad").filter(p=>p.fault==="").length,splitSide(mySPts,"ad").length)};
  const opp1stSide={deuce:fraq(splitSide(oppSPts,"deuce").filter(p=>p.fault==="").length,splitSide(oppSPts,"deuce").length),ad:fraq(splitSide(oppSPts,"ad").filter(p=>p.fault==="").length,splitSide(oppSPts,"ad").length)};

  const myServe=serveStats(mySPts,meTag);
  const oppServe=serveStats(oppSPts,oppTag);
  const myRetIn=retInStats(myRPts,meTag);
  const oppRetIn=retInStats(oppRPts,oppTag);
  const myRetWon=retWonStats(myRPts,meTag);
  const oppRetWon=retWonStats(oppRPts,oppTag);

  // Break Points
  const myBPFaced=mySPts.filter(p=>p.isBreakPoint);
  const oppBPFaced=oppSPts.filter(p=>p.isBreakPoint);
  const myBPSaved=myBPFaced.filter(p=>p.winner===meTag);
  const oppBPSaved=oppBPFaced.filter(p=>p.winner===oppTag);
  const myBPChances=myRPts.filter(p=>p.isBreakPoint);
  const oppBPChances=oppRPts.filter(p=>p.isBreakPoint);
  const myBPConv=myBPChances.filter(p=>p.winner===meTag);
  const oppBPConv=oppBPChances.filter(p=>p.winner===oppTag);

  // Games Won
  const gameEnds=points.filter(p=>p.gameEnd);
  const myServiceGames=gameEnds.filter(p=>p.server===meTag);
  const myServiceGamesWon=myServiceGames.filter(p=>p.gameWonBy===meTag);
  const oppServiceGames=gameEnds.filter(p=>p.server===oppTag);
  const oppServiceGamesWon=oppServiceGames.filter(p=>p.gameWonBy===oppTag);
  const myReturnGamesWon=oppServiceGames.filter(p=>p.gameWonBy===meTag);
  const oppReturnGamesWon=myServiceGames.filter(p=>p.gameWonBy===oppTag);

  // Winners (by shot type + forehand/backhand)
  const countWinners=tag=>{
    const shots=["Rt","St","Vl","Sm","Dr"];
    const r={total:0,fTotal:0,bTotal:0};
    shots.forEach(s=>{
      const arr=points.filter(p=>p.pattern?.shotType===s&&p.pattern.result==="W"&&p.patternOwner===tag&&p.winner===tag);
      const f=arr.filter(p=>p.pattern.hand==="f").length;
      const b=arr.filter(p=>p.pattern.hand==="b").length;
      r[s]={count:arr.length,f,b,fPct:arr.length>0?Math.round(100*f/arr.length):0,bPct:arr.length>0?Math.round(100*b/arr.length):0};
      r.total+=arr.length;r.fTotal+=f;r.bTotal+=b;
    });
    r.fPct=r.total>0?Math.round(100*r.fTotal/r.total):0;
    r.bPct=r.total>0?Math.round(100*r.bTotal/r.total):0;
    return r;
  };
  const countErrors=(tag,forced)=>{
    const shots=["Rt","St","Vl","Sm","Dr"];
    const r={total:0,fTotal:0,bTotal:0};
    const ownerOfError=tag===meTag?oppTag:meTag;
    shots.forEach(s=>{
      const arr=points.filter(p=>p.pattern?.shotType===s&&p.pattern.result==="E"&&p.pattern.forced===forced&&p.patternOwner===ownerOfError&&p.winner===ownerOfError);
      const f=arr.filter(p=>p.pattern.hand==="f").length;
      const b=arr.filter(p=>p.pattern.hand==="b").length;
      r[s]={count:arr.length,f,b,fPct:arr.length>0?Math.round(100*f/arr.length):0,bPct:arr.length>0?Math.round(100*b/arr.length):0};
      r.total+=arr.length;r.fTotal+=f;r.bTotal+=b;
    });
    r.fPct=r.total>0?Math.round(100*r.fTotal/r.total):0;
    r.bPct=r.total>0?Math.round(100*r.bTotal/r.total):0;
    return r;
  };
  const myWinners=countWinners(meTag),oppWinners=countWinners(oppTag);
  const myUE=countErrors(meTag,"U"),oppUE=countErrors(oppTag,"U");
  const myFE=countErrors(meTag,"F"),oppFE=countErrors(oppTag,"F");

  // Total points won
  const myTotalWon=points.filter(p=>p.winner===meTag).length;
  const oppTotalWon=points.filter(p=>p.winner===oppTag).length;

  // Net points (Vl/Sm/Dr = ネット系)
  const netShots=["Vl","Sm","Dr"];
  const myNetPts=points.filter(p=>p.pattern&&netShots.includes(p.pattern.shotType)&&p.patternOwner===meTag&&p.winner===meTag);
  const oppNetPts=points.filter(p=>p.pattern&&netShots.includes(p.pattern.shotType)&&p.patternOwner===oppTag&&p.winner===oppTag);

  // Tennis DB独自: W/UE, UE Rate, Winner Rate, Keep/Break Rate, Serve/Return Rating
  const div=(a,b)=>b>0?+(a/b).toFixed(2):null;
  const pct=(a,b)=>b>0?Math.round(100*a/b):0;
  const myWUE=div(myWinners.total,myUE.total);
  const oppWUE=div(oppWinners.total,oppUE.total);
  const myUERate=pct(myUE.total,points.length);
  const oppUERate=pct(oppUE.total,points.length);
  const myWinnerRate=pct(myWinners.total,points.length);
  const oppWinnerRate=pct(oppWinners.total,points.length);
  const myKeep=pct(myServiceGamesWon.length,myServiceGames.length);
  const oppKeep=pct(oppServiceGamesWon.length,oppServiceGames.length);
  const myBreak=pct(myReturnGamesWon.length,oppServiceGames.length);
  const oppBreak=pct(oppReturnGamesWon.length,myServiceGames.length);

  // Serve Rating = 1st% + 1stWon% + 2ndWon% + BPSaved% + SvcPtsWon%
  const myServePtsWon=fraq(mySPts.filter(p=>p.winner===meTag).length,mySPts.length);
  const oppServePtsWon=fraq(oppSPts.filter(p=>p.winner===oppTag).length,oppSPts.length);
  const myReturnPtsWon=fraq(myRPts.filter(p=>p.winner===meTag).length,myRPts.length);
  const oppReturnPtsWon=fraq(oppRPts.filter(p=>p.winner===oppTag).length,oppRPts.length);
  const myServeRating=myServe.total.firstIn.pct+myServe.total.firstWon.pct+myServe.total.secondWon.pct+(myBPFaced.length>0?pct(myBPSaved.length,myBPFaced.length):100)+myServePtsWon.pct;
  const oppServeRating=oppServe.total.firstIn.pct+oppServe.total.firstWon.pct+oppServe.total.secondWon.pct+(oppBPFaced.length>0?pct(oppBPSaved.length,oppBPFaced.length):100)+oppServePtsWon.pct;
  // Return Rating = 1stRetWon% + 2ndRetWon% + BPConv% + RetPtsWon%
  const myReturnRating=myRetWon.firstReturnWon.pct+myRetWon.secondReturnWon.pct+(myBPChances.length>0?pct(myBPConv.length,myBPChances.length):0)+myReturnPtsWon.pct;
  const oppReturnRating=oppRetWon.firstReturnWon.pct+oppRetWon.secondReturnWon.pct+(oppBPChances.length>0?pct(oppBPConv.length,oppBPChances.length):0)+oppReturnPtsWon.pct;

  // Games won & match winner
  const myGamesWon=gameEnds.filter(p=>p.gameWonBy===meTag).length;
  const oppGamesWon=gameEnds.filter(p=>p.gameWonBy===oppTag).length;
  const winner=myGamesWon>oppGamesWon?"me":(oppGamesWon>myGamesWon?"opp":null);

  return{
    match:{
      gamesWon:{me:myGamesWon,opp:oppGamesWon},
      winner,
      title:parsed.rows?.[0]?.Title||"",
    },
    service:{
      aces:{me:myAces,opp:oppAces},
      doubleFaults:{me:myDF,opp:oppDF},
      firstServeIn:{me:myServe.total.firstIn,opp:oppServe.total.firstIn,meDeuce:my1stSide.deuce,meAd:my1stSide.ad,oppDeuce:opp1stSide.deuce,oppAd:opp1stSide.ad},
      firstServeWon:{me:myServe.total.firstWon,opp:oppServe.total.firstWon,meDeuce:myServe.deuce.firstWon,meAd:myServe.ad.firstWon,oppDeuce:oppServe.deuce.firstWon,oppAd:oppServe.ad.firstWon},
      secondServeWon:{me:myServe.total.secondWon,opp:oppServe.total.secondWon,meDeuce:myServe.deuce.secondWon,meAd:myServe.ad.secondWon,oppDeuce:oppServe.deuce.secondWon,oppAd:oppServe.ad.secondWon},
      breakPointsSaved:{me:fraq(myBPSaved.length,myBPFaced.length),opp:fraq(oppBPSaved.length,oppBPFaced.length)},
      servicePointsWon:{me:myServePtsWon,opp:oppServePtsWon},
      serviceGamesWon:{me:fraq(myServiceGamesWon.length,myServiceGames.length),opp:fraq(oppServiceGamesWon.length,oppServiceGames.length)},
    },
    returnStats:{
      firstReturnIn:{me:myRetIn.total.firstReturnIn,opp:oppRetIn.total.firstReturnIn,meDeuce:myRetIn.deuce.firstReturnIn,meAd:myRetIn.ad.firstReturnIn,oppDeuce:oppRetIn.deuce.firstReturnIn,oppAd:oppRetIn.ad.firstReturnIn},
      secondReturnIn:{me:myRetIn.total.secondReturnIn,opp:oppRetIn.total.secondReturnIn,meDeuce:myRetIn.deuce.secondReturnIn,meAd:myRetIn.ad.secondReturnIn,oppDeuce:oppRetIn.deuce.secondReturnIn,oppAd:oppRetIn.ad.secondReturnIn},
      firstReturnWon:{me:myRetWon.firstReturnWon,opp:oppRetWon.firstReturnWon},
      secondReturnWon:{me:myRetWon.secondReturnWon,opp:oppRetWon.secondReturnWon},
      breakPointsConverted:{me:fraq(myBPConv.length,myBPChances.length),opp:fraq(oppBPConv.length,oppBPChances.length)},
      returnPointsWon:{me:myReturnPtsWon,opp:oppReturnPtsWon},
      returnGamesWon:{me:fraq(myReturnGamesWon.length,oppServiceGames.length),opp:fraq(oppReturnGamesWon.length,myServiceGames.length)},
    },
    pointsStats:{
      totalPointsWon:{me:fraq(myTotalWon,points.length),opp:fraq(oppTotalWon,points.length)},
      winners:{me:myWinners,opp:oppWinners},
      unforcedErrors:{me:myUE,opp:oppUE},
      forcedErrors:{me:myFE,opp:oppFE},
      netPointsWon:{me:fraq(myNetPts.length,points.filter(p=>p.pattern&&netShots.includes(p.pattern.shotType)&&p.patternOwner===meTag).length),opp:fraq(oppNetPts.length,points.filter(p=>p.pattern&&netShots.includes(p.pattern.shotType)&&p.patternOwner===oppTag).length)},
    },
    derived:{
      wueRatio:{me:myWUE,opp:oppWUE},
      ueRate:{me:myUERate,opp:oppUERate},
      winnerRate:{me:myWinnerRate,opp:oppWinnerRate},
      keepRate:{me:myKeep,opp:oppKeep},
      breakRate:{me:myBreak,opp:oppBreak},
      serveRating:{me:myServeRating,opp:oppServeRating},
      returnRating:{me:myReturnRating,opp:oppReturnRating},
    },
  };
};

// ── MATCH STATS DISPLAY (ATP-style 2-column comparison) ──
const fmtPct=v=>v==null?"—":v+"%";
const fmtFraq=f=>!f||f.total===0?"—":`${f.pct}%(${f.won}/${f.total})`;
const StatRow=({label,me,opp,higher="me",sub,fmt="fraq",small=false})=>{
  const pad=sub?"6px 10px":"10px 12px";

  const left=fmt==="fraq"?fmtFraq(me):fmt==="pct"?fmtPct(me):fmt==="num"?(me==null?"—":me):fmt==="ratio"?safeRatio(me):me;
  const right=fmt==="fraq"?fmtFraq(opp):fmt==="pct"?fmtPct(opp):fmt==="num"?(opp==null?"—":opp):fmt==="ratio"?safeRatio(opp):opp;
  const mePct=fmt==="fraq"?(me?.pct||0):fmt==="pct"?(me||0):0;
  const oppPct=fmt==="fraq"?(opp?.pct||0):fmt==="pct"?(opp||0):0;
  const meWin=fmt==="num"?(me>opp):fmt==="ratio"?(me>opp):(mePct>oppPct);
  const oppWin=fmt==="num"?(opp>me):fmt==="ratio"?(opp>me):(oppPct>mePct);

  return <div style={{display:"grid",gridTemplateColumns:"1fr auto 1fr",gap:8,padding:pad,borderBottom:`1px solid ${C.border}22`,alignItems:"center"}}>
    <div style={{textAlign:"right"}}>

    <div style={{fontSize:small?10:11,color:C.textMuted,fontWeight:sub?400:600,minWidth:90,textAlign:"center",padding:"0 4px"}}>{label}</div>
    <div style={{textAlign:"left"}}>
      <div style={{fontSize:small?11:13,fontWeight:oppWin?700:600,color:cOPP,fontFamily:"monospace"}}>{right}</div>
      {fmt==="fraq"&&opp?.total>0&&<div style={{height:3,background:C.border,borderRadius:2,marginTop:3,overflow:"hidden"}}>
        <div style={{width:`${barW(opp.pct)}%`,height:"100%",background:oppWin?C.accent:C.textMuted}}/>
      </div>}
    </div>
  </div>;
};
const shotFmt=v=>{if(!v)return"0";const c=v.count||0;return c===0?"0":`${c}(${v.fPct||0}%/${v.bPct||0}%)`;};
const totalFmt=v=>{if(!v)return"0";const t=v.total||0;return t===0?"0":`${t}(${v.fPct||0}%/${v.bPct||0}%)`;};
const ShotRow=({label,me,opp})=>{
  return <div style={{display:"grid",gridTemplateColumns:"1fr auto 1fr",gap:8,padding:"5px 10px",alignItems:"center"}}>

    <div style={{fontSize:10,color:C.textMuted,minWidth:90,textAlign:"center"}}>{label}</div>
    <div style={{fontSize:12,color:C.text,fontFamily:"monospace",textAlign:"left"}}>{shotFmt(opp)}</div>
  </div>;
};
const StatSection=({title,children})=><div style={{marginBottom:14}}>
  <div style={{fontSize:12,fontWeight:700,color:"#fff",background:C.blue,padding:"6px 12px",borderRadius:"6px 6px 0 0"}}>{title}</div>
  <div style={{background:C.panel,border:`1px solid ${C.border}`,borderTop:"none",borderRadius:"0 0 6px 6px"}}>{children}</div>
</div>;

function MatchStatsView({stats,playerA,playerB,myIsA}){
  if(!stats||!stats.service||!stats.returnStats||!stats.pointsStats||!stats.derived)return null;
  const meName=myIsA?playerA:playerB,oppName=myIsA?playerB:playerA;
  const s=stats.service,r=stats.returnStats,p=stats.pointsStats,d=stats.derived;
  const m=stats.match||{};
  const meWon=m.winner==="me",oppWon=m.winner==="opp";
  return <div style={{padding:"4px 0"}}>
    {/* タイトル */}
    {m.title&&<div style={{fontSize:12,fontWeight:700,color:"#fff",background:C.blue,padding:"6px 12px",borderRadius:"6px 6px 0 0",textAlign:"center"}}>{m.title}</div>}
    {/* プレイヤーヘッダー（勝者に王冠） */}

// インポート前のプレビューモーダル: 新規/重複の内訳と詳細を表示、モード選択
function ImportPreviewModal({analysis,incoming,onConfirm,onClose}){
  const t=analysis.tournaments,p=analysis.practices,tr=analysis.trials;
  const totalAdd=t.add.length+p.add.length+tr.add.length;
  const totalDup=t.dup.length+p.dup.length+tr.dup.length;
  const[mode,setMode]=useState("merge");
  const[expandedDup,setExpandedDup]=useState(new Set());
  const toggleExpand=key=>setExpandedDup(prev=>{const n=new Set(prev);if(n.has(key))n.delete(key);else n.add(key);return n;});
  const modeDesc={
    skip:"重複は完全スキップ（既存データそのまま、新規データ破棄）",
    merge:"既存の空フィールドのみ新規データで補完（心拍・メモ等は保持）",
    overwrite:"重複は新規データで上書き（既存データの内容は失われる）",
  };
  const Section=({title,icon,data,type,renderItem})=>{
    if(data.add.length===0&&data.dup.length===0)return null;
    return <div style={{marginBottom:14}}>
      <div style={{fontSize:12,fontWeight:700,color:C.text,marginBottom:6}}>{icon} {title}: <span style={{color:C.accent}}>新規{data.add.length}件</span> / <span style={{color:C.yellow}}>重複{data.dup.length}件</span></div>
      {data.add.length>0&&<div style={{marginBottom:6}}>
        <div style={{fontSize:11,color:C.accent,marginBottom:4}}>＋ 新規追加</div>
        <div style={{maxHeight:120,overflowY:"auto",background:C.accentBg,borderRadius:6,padding:"6px 10px"}}>
          {data.add.map((item,i)=><div key={i} style={{fontSize:11,color:C.text,padding:"2px 0"}}>{renderItem(item)}</div>)}
        </div>
      </div>}
      {data.dup.length>0&&<div>
        <div style={{fontSize:11,color:C.yellow,marginBottom:4}}>{mode==="overwrite"?"⚠ 重複は上書き":mode==="skip"?"= 重複スキップ":"= 重複（補完あり）"}</div>
        <div style={{maxHeight:200,overflowY:"auto",background:C.yellowBg,borderRadius:6,padding:"4px 8px"}}>
          {data.dup.map((d,i)=>{
            const key=`${type}-${i}`;
            const isOpen=expandedDup.has(key);
            const hasComplement=d.complement&&d.complement.length>0;
            return <div key={i} style={{borderBottom:i<data.dup.length-1?`1px solid ${C.yellow}30`:"none",padding:"3px 0"}}>
              <div onClick={()=>toggleExpand(key)} style={{display:"flex",alignItems:"center",gap:6,fontSize:11,color:C.text,cursor:"pointer"}}>
                <span style={{transform:isOpen?"rotate(90deg)":"none",transition:"transform 0.2s",fontSize:9,color:C.textMuted}}>▶</span>
                <span style={{flex:1}}>{renderItem(d.incoming)}</span>
                {mode==="merge"&&hasComplement&&<span style={{fontSize:10,color:C.accent,background:C.accentBg,padding:"1px 5px",borderRadius:3}}>+{d.complement.length}補完</span>}
              </div>
              {isOpen&&<div style={{marginLeft:18,marginTop:4,padding:"6px 8px",background:C.panel,borderRadius:4,fontSize:11}}>
                {mode==="merge"&&hasComplement?<>
                  <div style={{color:C.accent,fontWeight:600,marginBottom:3}}>補完される項目:</div>
                  {d.complement.map((c,j)=><div key={j} style={{color:C.text,paddingLeft:8}}>・{c.label}: <b>{c.value}</b></div>)}
                </>:mode==="merge"?<div style={{color:C.textMuted}}>補完項目なし（既存データに値あり or 新規データに値なし）</div>
                :mode==="overwrite"?<div style={{color:C.red}}>⚠ 全フィールドが新規データで上書きされます</div>
                :<div style={{color:C.textMuted}}>このアイテムは何も変更されません</div>}
              </div>}
            </div>;
          })}
        </div>
      </div>}
    </div>;
  };
  return <div style={{position:"fixed",inset:0,background:"#0006",zIndex:600,display:"flex",alignItems:"flex-start",justifyContent:"center",overflowY:"auto",padding:20}} onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:12,width:"100%",maxWidth:520,padding:20}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <span style={{fontSize:14,fontWeight:700,color:C.text}}>📥 インポート確認</span>
        <button onClick={onClose} style={{background:"none",border:"none",fontSize:18,cursor:"pointer",color:C.textMuted,padding:4}}>✕</button>
      </div>
      <div style={{fontSize:12,color:C.text,marginBottom:10,padding:"8px 10px",background:C.panel2,borderRadius:6}}>
        合計: <b style={{color:C.accent}}>新規{totalAdd}件</b> / <b style={{color:C.yellow}}>重複{totalDup}件</b>
      </div>
      {totalDup>0&&<div style={{marginBottom:14,padding:"10px 12px",background:C.panel2,borderRadius:6,border:`1px solid ${C.border}`}}>
        <div style={{fontSize:11,color:C.textMuted,marginBottom:6,fontWeight:700}}>重複時の動作</div>
        <div style={{display:"flex",gap:6,marginBottom:6}}>
          {[["skip","スキップ",C.textMuted],["merge","マージ",C.accent],["overwrite","上書き",C.red]].map(([v,l,c])=>
            <button key={v} onClick={()=>setMode(v)} style={{flex:1,padding:"6px 8px",borderRadius:6,background:mode===v?`${c}15`:C.panel,border:`1px solid ${mode===v?c:C.border}`,color:mode===v?c:C.textMuted,fontSize:11,fontWeight:700,cursor:"pointer"}}>{l}</button>
          )}
        </div>
        <div style={{fontSize:10,color:C.textMuted,lineHeight:1.5}}>{modeDesc[mode]}</div>
      </div>}
      <Section title="大会" icon="🏆" data={t} type="t" renderItem={item=>`${normDate(item.date)} ${item.name||"(名称なし)"}`}/>
      <Section title="練習" icon="🏃" data={p} type="p" renderItem={item=>`${normDate(item.date)} ${item.type||"練習"}${item.venue?" @ "+item.venue:""}${item.startTime?" "+item.startTime:""}`}/>
      <Section title="試打" icon="🎾" data={tr} type="tr" renderItem={item=>`${normDate(item.date)} ${item.racketName||"(ラケット未指定)"}`}/>
      {totalAdd===0&&totalDup===0&&<div style={{textAlign:"center",padding:20,color:C.textMuted,fontSize:12}}>インポート対象データがありません</div>}
      <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:14}}>
        <button onClick={onClose} style={{padding:"10px 20px",borderRadius:8,background:C.panel2,border:`1px solid ${C.border}`,color:C.textMuted,fontSize:13,fontWeight:600,cursor:"pointer"}}>キャンセル</button>
        <button onClick={()=>onConfirm(mode)} disabled={totalAdd===0&&totalDup===0} style={{padding:"10px 20px",borderRadius:8,background:(totalAdd===0&&totalDup===0)?C.panel2:(mode==="overwrite"?C.red:C.accent),border:"none",color:(totalAdd===0&&totalDup===0)?C.textMuted:"#fff",fontSize:13,fontWeight:700,cursor:(totalAdd===0&&totalDup===0)?"default":"pointer"}}>{mode==="overwrite"?"⚠ 上書き実行":"✅ インポート実行"}</button>
      </div>
    </div>
  </div>;
}

function CsvImportModal({onImport,onClose,myPlayerName,defaultOpponent}){
  const[parsed,setParsed]=useState(null);
  const[error,setError]=useState("");
  const[meName,setMeName]=useState(myPlayerName||"");
  const[oppName,setOppName]=useState(defaultOpponent||"");
  const[myIsA,setMyIsA]=useState(true);
  const meRef=useRef(null);
  const oppRef=useRef(null);
  const handleFile=e=>{
    const f=e.target.files[0];if(!f)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const p=parseStatsCSV(ev.target.result,myPlayerName);
        setParsed(p);setError("");setMyIsA(p.myIsA);
        // プロフィール名で判定。マッチしなければCSV原本の名前を使う
        let newMe;
        if(!myPlayerName||(p.playerA!==myPlayerName&&p.playerB!==myPlayerName)){
          newMe=p.myIsA?p.playerA:p.playerB;
        }else{newMe=myPlayerName;}
        const newOpp=defaultOpponent||(p.myIsA?p.playerB:p.playerA);
        setMeName(newMe);setOppName(newOpp);
      }catch(err){setError(err.message);setParsed(null);}
    };
    reader.readAsText(f);
  };
  // プレビュー用: myIsAが変わった時だけ再計算
  const previewStats=useMemo(()=>{
    if(!parsed)return null;
    return computeMatchStats({...parsed,myIsA});
  },[parsed,myIsA]);
  const handleImport=()=>{
    if(!parsed)return;
    // refから最新値取得（onBlur前でも安全）
    const me=meRef.current?.value||meName;
    const opp=oppRef.current?.value||oppName;
    const pA=myIsA?me:opp,pB=myIsA?opp:me;
    onImport({source:"datatennis",importedAt:new Date().toISOString(),raw:parsed.rows,points:parsed.points,stats:previewStats,playerA:pA,playerB:pB,myIsA});
  };
  return <div style={{position:"fixed",inset:0,background:"#0006",zIndex:600,display:"flex",alignItems:"flex-start",justifyContent:"center",overflowY:"auto",padding:20}} onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:12,width:"100%",maxWidth:500,padding:20}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <span style={{fontSize:14,fontWeight:700,color:C.text}}>📊 データテニスCSV取込</span>
        <button onClick={onClose} style={{background:"none",border:"none",fontSize:18,cursor:"pointer",color:C.textMuted,padding:4}}>✕</button>
      </div>
      <div style={{fontSize:12,color:C.textMuted,marginBottom:12,padding:"8px 10px",background:C.panel2,borderRadius:6,borderLeft:`2px solid ${C.accent}`}}>データテニスアプリから出力したCSVファイルを選択してください。</div>
      <input type="file" accept=".csv" onChange={handleFile} style={{width:"100%",padding:"10px",border:`1px dashed ${C.border}`,borderRadius:6,marginBottom:12,fontSize:12}}/>
      {error&&<div style={{fontSize:12,color:C.red,padding:"8px 10px",background:C.redBg,borderRadius:6,marginBottom:12}}>❌ {error}</div>}
      {parsed&&<>
        <div style={{fontSize:11,color:C.textMuted,marginBottom:6}}>CSVの選手名: <b>{parsed.playerA}</b> vs <b>{parsed.playerB}</b>（{parsed.points.length}ポイント）</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
          <div>
            <div style={{fontSize:11,color:C.textMuted,marginBottom:4}}>自分の名前</div>
            <input ref={meRef} key={`me-${meName}`} defaultValue={meName} onBlur={e=>setMeName(e.target.value)} style={{width:"100%",padding:"8px 10px",fontSize:12,border:`1px solid ${C.border}`,borderRadius:6,background:C.panel2}}/>
          </div>
          <div>
            <div style={{fontSize:11,color:C.textMuted,marginBottom:4}}>対戦相手の名前</div>
            <input ref={oppRef} key={`opp-${oppName}`} defaultValue={oppName} onBlur={e=>setOppName(e.target.value)} style={{width:"100%",padding:"8px 10px",fontSize:12,border:`1px solid ${C.border}`,borderRadius:6,background:C.panel2}}/>
          </div>
        </div>
        <div style={{fontSize:10,color:C.textMuted,marginBottom:6,fontStyle:"italic"}}>※ 入力はフォーカス外しで反映</div>
        <div style={{fontSize:11,color:C.textMuted,marginBottom:4}}>自分はCSVのどちら？</div>
        <div style={{display:"flex",gap:6,marginBottom:12}}>
          <button onClick={()=>setMyIsA(true)} style={{flex:1,padding:"8px",borderRadius:6,background:myIsA?C.accentBg:C.panel2,border:`1px solid ${myIsA?C.accent:C.border}`,color:myIsA?C.accent:C.textMuted,fontSize:11,fontWeight:600,cursor:"pointer"}}>PlayerA（{parsed.playerA}）</button>
          <button onClick={()=>setMyIsA(false)} style={{flex:1,padding:"8px",borderRadius:6,background:!myIsA?C.accentBg:C.panel2,border:`1px solid ${!myIsA?C.accent:C.border}`,color:!myIsA?C.accent:C.textMuted,fontSize:11,fontWeight:600,cursor:"pointer"}}>PlayerB（{parsed.playerB}）</button>
        </div>
        <div style={{maxHeight:300,overflowY:"auto",background:C.panel2,borderRadius:6,padding:10,marginBottom:12}}>
          <ErrorBoundary label="スタッツプレビュー"><MatchStatsView stats={previewStats} playerA={myIsA?meName:oppName} playerB={myIsA?oppName:meName} myIsA={myIsA}/></ErrorBoundary>
        </div>
      </>}
      <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
        <button onClick={onClose} style={{padding:"10px 20px",borderRadius:8,background:C.panel2,border:`1px solid ${C.border}`,color:C.textMuted,fontSize:13,fontWeight:600,cursor:"pointer"}}>キャンセル</button>
        <button onClick={handleImport} disabled={!parsed} style={{padding:"10px 20px",borderRadius:8,background:parsed?C.accent:C.panel2,border:"none",color:parsed?"#fff":C.textMuted,fontSize:13,fontWeight:700,cursor:parsed?"pointer":"default"}}>📥 インポート</button>
      </div>
    </div>
  </div>;
}

function NameEditModal({matchStats,onSave,onClose}){
  const meRef=useRef(null);
  const oppRef=useRef(null);
  const[myIsA,setMyIsA]=useState(matchStats.myIsA);
  const initMe=matchStats.myIsA?matchStats.playerA:matchStats.playerB;
  const initOpp=matchStats.myIsA?matchStats.playerB:matchStats.playerA;
  const handleSave=()=>{
    const me=meRef.current?.value||initMe;
    const opp=oppRef.current?.value||initOpp;
    onSave(me,opp,myIsA);

const InfoCell=({label,value})=><div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:6,padding:"6px 10px"}}>

</div>;
const PhysicalBar=({value})=>{

};
const TrialAvg=({trial})=>{
  const vals=[trial.spin,trial.power,trial.control,trial.info,trial.maneuver,trial.swingThrough].filter(v=>v>0);

  const avg=(vals.reduce((s,v)=>s+v,0)/vals.length).toFixed(1);

  return <span style={{fontSize:13,fontWeight:800,color:c,fontFamily:"monospace"}}>{avg}</span>;
};
const TrialRatingBar=({label,value})=>{

    </div>
    <span style={{fontSize:12,fontWeight:700,color:c,minWidth:16,textAlign:"right"}}>{v}</span>
  </div>;
};
const LinkedTrialCard=({trial})=>{
  const jc2={採用候補:C.accent,保留:C.yellow,却下:C.red};
  const avg=[trial.spin,trial.power,trial.control,trial.info,trial.maneuver,trial.swingThrough].filter(v=>v>0);

    </div>
  </div>;
}

function MatchRow({match,trn,opponents,profile,onUpdate,onEditMatch,onDeleteMatch}){
  const[expanded,setExpanded]=useState(false);
  const[showGames,setShowGames]=useState(false);
  const[showStats,setShowStats]=useState(false);
  const[csvModal,setCsvModal]=useState(false);
  const[nameModal,setNameModal]=useState(false);
  const myName=profile?.name||"";
  // match.opponent と matchStats.playerB の自動同期
  // 空文字/undefinedは除外し、実質的な値の変更がある場合のみonUpdate実行
  useEffect(()=>{
    if(!match.matchStats||!match.opponent||!match.opponent.trim())return;
    const ms=match.matchStats;
    const currentOppName=ms.myIsA?ms.playerB:ms.playerA;
    if(currentOppName===match.opponent)return;
    const updated={...ms};
    if(ms.myIsA)updated.playerB=match.opponent;
    else updated.playerA=match.opponent;
    onUpdate({...match,matchStats:updated});
  },[match.opponent]);
  const handleCsvImport=data=>{onUpdate({...match,matchStats:data});setCsvModal(false);setShowStats(true);};
  const handleStatsRemove=()=>{const{matchStats,...rest}=match;onUpdate(rest);};
  const handleNameSave=(meName,oppName,newMyIsA)=>{
    const ms={...match.matchStats};
    ms.myIsA=newMyIsA;
    if(newMyIsA){ms.playerA=meName;ms.playerB=oppName;}
    else{ms.playerA=oppName;ms.playerB=meName;}
    // スタッツ自体を再計算（myIsAが変わる場合に左右入れ替わる）
    const reparsed={points:ms.points,rows:ms.raw,playerA:ms.playerA,playerB:ms.playerB,myIsA:ms.myIsA};
    ms.stats=computeMatchStats(reparsed);
    const updated={...match,matchStats:ms};
    // match.opponent も同期
    if(oppName&&oppName!==match.opponent)updated.opponent=oppName;
    onUpdate(updated);setNameModal(false);
  };
  const games=match.games||[];
  const score=games.reduce((a,g)=>({me:a.me+(g.winner==="me"?1:0),opp:a.opp+(g.winner==="opp"?1:0)}),{me:0,opp:0});
  const mc=match.mental>=4?C.accent:match.mental>=3?C.yellow:C.red;
  const opp=(opponents||[]).find(o=>o.name===match.opponent);
  return <div style={{borderBottom:`1px solid ${C.border}`}}>
    <div onClick={()=>setExpanded(!expanded)} style={{display:"flex",alignItems:"center",gap:4,padding:"10px",background:expanded?C.panel2:"transparent",cursor:"pointer",borderLeft:expanded?`3px solid ${C.blue}`:"3px solid transparent",flexWrap:"wrap"}}>
      <Badge color={ROUND_COLOR[match.round]||"gray"} sm>{match.round}</Badge>
      <Badge color={match.result==="勝利"?"green":"red"} sm>{match.result==="勝利"?"勝利✓":match.result==="棄権"?"棄権":"敗北"}</Badge>
      <div style={{flex:1,minWidth:60,overflow:"hidden"}}>
        <span style={{fontSize:12,color:C.text,fontWeight:600,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",display:"flex",alignItems:"center",gap:3}}>
          {opp&&<OppIcon gender={opp.gender} size={14}/>}
          {match.opponent||"（相手未入力）"}
        </span>
      </div>
      <span style={{fontSize:11,color:C.textMuted,fontFamily:"monospace",whiteSpace:"nowrap"}}>{(match.setScores||[]).join(", ")||"—"}</span>
      <div style={{display:"flex",gap:1,flexShrink:0}}>
        {games.slice(0,10).map((g,gi)=><div key={gi} style={{width:5,height:8,borderRadius:1,background:g.winner==="me"?C.accent:C.red}}/>)}
      </div>
      {games.length>0&&<div style={{fontSize:11,fontFamily:"monospace",color:C.textMuted,textAlign:"right"}}>{score.me}-{score.opp}</div>}
      <div style={{display:"flex",gap:1,flexShrink:0}}>
        {[1,2,3,4,5].map(n=><div key={n} style={{width:2,height:10,borderRadius:1,background:n<=match.mental?mc:C.border}}/>)}
      </div>
      <div style={{color:C.textMuted,fontSize:12,transform:expanded?"rotate(90deg)":"none",transition:"transform 0.2s"}}>▶</div>
    </div>
    {expanded&&<div style={{padding:"12px 14px",background:C.panel2,borderTop:`1px solid ${C.border}`}}>
      {/* スコア & 情報 */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
        <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:6,padding:"8px 12px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:11,color:C.accent}}>私</div>
            <div style={{fontSize:22,fontWeight:800,color:C.accent,fontFamily:"monospace"}}>{score.me}</div>
          </div>
          <div style={{fontSize:12,color:C.textMuted}}>—</div>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:11,color:C.red}}>相手</div>
            <div style={{fontSize:22,fontWeight:800,color:C.red,fontFamily:"monospace"}}>{score.opp}</div>
          </div>
        </div>
        <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:6,padding:"8px 12px"}}>
          <div style={{fontSize:11,color:C.textMuted,marginBottom:4}}>セットスコア</div>
          <div style={{fontSize:14,color:C.text,fontWeight:700}}>{(match.setScores||[]).join(", ")||"—"}</div>
          {match.racketName&&<div style={{fontSize:11,color:C.accent,marginTop:4}}>🖊 {match.racketName}{[match.stringMain,match.stringCross].filter(Boolean).length?` / ${[match.stringMain,match.stringCross].filter(Boolean).join(" / ")}`:""}{(match.tensionMain||match.tensionCross)?` / ${fmtTensionV3(match.tensionMain,match.tensionCross)}p`:""}</div>}
        </div>
      </div>
      {/* メンタル/フィジカル */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
        {[["メンタル",match.mental],["フィジカル",match.physical]].map(([l,v])=>(
          <div key={l} style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:6,padding:"7px 10px"}}>
            <div style={{fontSize:11,color:C.textMuted,marginBottom:4}}>{l}</div>
            <div style={{display:"flex",gap:2,marginBottom:2}}>
              {[1,2,3,4,5].map(n=><div key={n} style={{flex:1,height:4,borderRadius:2,background:n<=v?scColor(v):C.border}}/>)}
            </div>
            <div style={{fontSize:11,color:scColor(v)}}>{v||0}/5 {["","×","△","普通","◎","完璧"][v||0]}</div>
          </div>
        ))}
      </div>
      {/* メモ群 */}
      {[["🧠 メンタル",match.mentalNote],["🎾 技術",match.techNote],["👤 相手",match.opponentNote],["📝 総括",match.note]].filter(([,v])=>v).map(([l,v])=>(
        <div key={l} style={{marginBottom:6}}>
          <div style={{fontSize:11,color:C.textMuted,marginBottom:2}}>{l}</div>
          <div style={{fontSize:12,color:C.text,lineHeight:1.6,background:C.panel,borderRadius:5,padding:"6px 10px",borderLeft:`2px solid ${C.border}`}}>{v}</div>
        </div>
      ))}
      {/* GameTracker */}
      <button onClick={()=>setShowGames(!showGames)} style={{width:"100%",background:showGames?C.blueBg:C.panel,border:`1px solid ${showGames?C.blue:C.border}`,color:showGames?C.blue:C.textMuted,borderRadius:6,padding:"8px",fontSize:12,cursor:"pointer",marginTop:8,fontWeight:600}}>
        {showGames?"▲ ゲーム記録を閉じる":`▼ ゲーム記録を開く（${games.length}ゲーム）`}
      </button>
      {showGames&&<div style={{marginTop:8,padding:10,background:C.panel,borderRadius:6,border:`1px solid ${C.border}`}}><GameTracker match={match} onChange={onUpdate}/></div>}
      {/* Stats Section */}
      {match.matchStats?<>
        <button onClick={()=>setShowStats(!showStats)} style={{width:"100%",background:showStats?C.purpleBg:C.panel,border:`1px solid ${showStats?C.purple:C.border}`,color:showStats?C.purple:C.textMuted,borderRadius:6,padding:"8px",fontSize:12,cursor:"pointer",marginTop:8,fontWeight:600}}>
          {showStats?"▲ スタッツを閉じる":`📊 スタッツを開く（${match.matchStats.points?.length||0}ポイント）`}
        </button>
        {showStats&&<div style={{marginTop:8,padding:10,background:C.panel,borderRadius:6,border:`1px solid ${C.border}`}}>
          <ErrorBoundary label="スタッツ"><MatchStatsView stats={match.matchStats.stats} playerA={match.matchStats.playerA} playerB={match.matchStats.playerB} myIsA={match.matchStats.myIsA}/></ErrorBoundary>
          <div style={{display:"flex",gap:8,marginTop:10}}>
            <button onClick={()=>setNameModal(true)} style={{flex:1,padding:8,borderRadius:6,background:C.purpleBg,border:`1px solid ${C.purple}`,color:C.purple,fontSize:11,fontWeight:600,cursor:"pointer"}}>✏️ 選手名編集</button>
            <button onClick={()=>setCsvModal(true)} style={{flex:1,padding:8,borderRadius:6,background:C.blueBg,border:`1px solid ${C.blue}`,color:C.blue,fontSize:11,fontWeight:600,cursor:"pointer"}}>🔄 CSV再取込</button>
            <button onClick={handleStatsRemove} style={{padding:"8px 12px",borderRadius:6,background:C.redBg,border:`1px solid ${C.red}`,color:C.red,fontSize:11,fontWeight:600,cursor:"pointer"}}>🗑</button>
          </div>
        </div>}
      </>:<button onClick={()=>setCsvModal(true)} style={{width:"100%",background:C.panel,border:`1px dashed ${C.border}`,color:C.textMuted,borderRadius:6,padding:"8px",fontSize:12,cursor:"pointer",marginTop:8,fontWeight:600}}>📊 データテニスCSV取込</button>}
      {/* アクション */}
      <div style={{display:"flex",gap:8,marginTop:10}}>
        <button onClick={onEditMatch} style={{flex:1,padding:10,borderRadius:6,background:C.panel,border:`1px solid ${C.border}`,color:C.text,fontSize:12,fontWeight:600,cursor:"pointer"}}>✏️ 編集</button>
        <button onClick={onDeleteMatch} style={{padding:"10px 16px",borderRadius:6,background:C.redBg,border:`1px solid ${C.red}`,color:C.red,fontSize:12,fontWeight:700,cursor:"pointer"}}>🗑</button>
      </div>
    </div>}
    {csvModal&&<CsvImportModal myPlayerName={myName} defaultOpponent={match.opponent||""} onImport={handleCsvImport} onClose={()=>setCsvModal(false)}/>}
    {nameModal&&<NameEditModal matchStats={match.matchStats} onSave={handleNameSave} onClose={()=>setNameModal(false)}/>}
  </div>;
}

function TournamentDetail({tournament,rackets,strings,stringSetups,venues,onAddVenue,opponents,profile,onSave,onDelete,onClose}){
  const[f,setF]=useState({...tournament});

  const cfm=useConfirm();
  const matches=f.matches||[];
  const wins=matches.filter(m=>m.result==="勝利").length;

  const blankMatch=()=>({id:genId(),round:`${matches.length+1}回戦`,opponent:"",opponent2:"",racketName:f.racketName||"",stringMain:f.stringMain||"",stringCross:f.stringCross||"",tensionMain:f.tensionMain||"",tensionCross:f.tensionCross||"",result:"勝利",setScores:[],mental:3,physical:3,mentalNote:"",techNote:"",opponentNote:"",note:"",games:[],changeovers:[]});

  const handleAddMatch=()=>setMatchModal({match:blankMatch()});
  const handleSaveMatch=form=>{
    const exists=matches.find(m=>m.id===form.id);
    const newMatches=exists?matches.map(m=>m.id===form.id?form:m):[...matches,form];
    setF(p=>({...p,matches:newMatches}));
    setMatchModal(null);
  };
  const handleUpdateMatch=updated=>{
    setF(p=>({...p,matches:matches.map(m=>m.id===updated.id?updated:m)}));
  };
  const handleDeleteMatch=id=>{
    cfm.ask("この試合記録を削除しますか？",()=>{
      setF(p=>({...p,matches:matches.filter(m=>m.id!==id)}));
