<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#f2f2f7">
<title>ゆっけ Tennis DB v3</title>
<link rel="manifest" href="manifest.json">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f2f2f7;color:#1a1a1a;-webkit-font-smoothing:antialiased;padding-bottom:60px}
  input,select,textarea,button{font-family:inherit}
</style>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback} = React;

const APP_VERSION="3.0.0-alpha.1";

// ── COLOR SYSTEM (v2 identical) ──────────────────
const C = {
  bg:"#f2f2f7", panel:"#ffffff", panel2:"#e8e8ed", panel3:"#dddde2",
  border:"#c7c7cc", accent:"#00b87a", accentDim:"#009963",
  text:"#1a1a1a", textMuted:"#374151", textDim:"#4b5563",
  red:"#dc2626", yellow:"#d97706", blue:"#2563eb", purple:"#7c3aed", orange:"#ea580c",
};

// ── FIREBASE (v2 identical) ──────────────────────
const firebaseConfig={apiKey:"AIzaSyAXWAtHjBOi31FoNXZiAwW-A7ywZcDY2mM",authDomain:"tennis-db-ca9ae.firebaseapp.com",projectId:"tennis-db-ca9ae",storageBucket:"tennis-db-ca9ae.firebasestorage.app",messagingSenderId:"1031131288345",appId:"1:1031131288345:web:2adcb9f2eeafa5801ceb88"};
const fbApp=firebase.initializeApp(firebaseConfig);
const fbAuth=firebase.auth();
const fbDb=firebase.firestore();
fbDb.enablePersistence({synchronizeTabs:true}).catch(()=>{});

// ── STORAGE (v2 identical) ───────────────────────
const KEYS={tournaments:"tournaments",practices:"practices",trials:"trials",rackets:"rackets",strings:"strings",measurements:"measurements",mental:"mental",next:"next",profile:"profile",venues:"venues",stringSetups:"stringSetups",quickTrialCards:"quickTrialCards",opponents:"opponents"};
const LS_PREFIX="yuke-";
const lsLoad=k=>{try{const v=localStorage.getItem(LS_PREFIX+k+"-v1");if(v)return JSON.parse(v);}catch(_){}return null;};
const lsSave=(k,d)=>{try{localStorage.setItem(LS_PREFIX+k+"-v1",JSON.stringify(d));}catch(_){}};
const _saveTimers={};
const save=(k,d)=>{
  lsSave(k,d);
  const user=fbAuth.currentUser;
  if(!user)return;
  if(_saveTimers[k])clearTimeout(_saveTimers[k]);
  _saveTimers[k]=setTimeout(()=>{
    fbDb.collection("users").doc(user.uid).collection("data").doc(k).set({items:Array.isArray(d)?d:null,obj:Array.isArray(d)?null:d,updatedAt:firebase.firestore.FieldValue.serverTimestamp()}).catch(e=>console.error("Firestore save error:",k,e));
  },800);
};
const cloudLoadAll=async(uid)=>{
  try{
    const snap=await fbDb.collection("users").doc(uid).collection("data").get();
    const result={};
    snap.forEach(doc=>{const d=doc.data();result[doc.id]=d.items||d.obj||null;});
    return result;
  }catch(e){console.error("Firestore load error:",e);return null;}
};
const today=()=>new Date().toLocaleDateString("ja-JP",{year:"numeric",month:"2-digit",day:"2-digit"});

// ── TOAST ────────────────────────────────────────
function useToast(){
  const [t,setT]=useState(null);
  const tRef=useRef(null);
  const show=(msg,color=C.accent,onUndo=null,duration=0)=>{if(tRef.current)clearTimeout(tRef.current);setT({msg,color,onUndo});tRef.current=setTimeout(()=>setT(null),duration||(onUndo?5000:2600));};
  const el=t?<div style={{position:"fixed",bottom:70,left:"50%",transform:"translateX(-50%)",background:C.panel,border:`1px solid ${t.color}`,color:t.color,borderRadius:8,padding:"10px 20px",fontSize:13,fontWeight:600,zIndex:600,boxShadow:"0 4px 20px #0008",display:"flex",alignItems:"center",gap:12,whiteSpace:"nowrap"}}>
    <span>{t.msg}</span>
    {t.onUndo&&<button onClick={()=>{t.onUndo();setT(null);}} style={{background:t.color,border:"none",color:"#fff",borderRadius:4,padding:"5px 12px",fontSize:12,fontWeight:700,cursor:"pointer"}}>元に戻す</button>}
  </div>:null;
  return {show,el};
}

// ── ERROR BOUNDARY ───────────────────────────────
class ErrorBoundary extends React.Component {
  constructor(props){super(props);this.state={hasError:false,error:null};}
  static getDerivedStateFromError(error){return {hasError:true,error};}
  componentDidCatch(error,info){console.error(`[ErrorBoundary:${this.props.name}]`,error,info);}
  render(){
    if(this.state.hasError){
      return (
        <div style={{padding:24,textAlign:"center",color:C.textMuted}}>
          <div style={{fontSize:28,marginBottom:12}}>⚠️</div>
          <div style={{fontSize:14,fontWeight:600,color:C.red,marginBottom:8}}>
            {this.props.name||"このセクション"}でエラーが発生しました
          </div>
          <div style={{fontSize:12,color:C.textMuted,marginBottom:16,lineHeight:1.6}}>
            他のタブは正常に動作しています
          </div>
          <button onClick={()=>this.setState({hasError:false,error:null})} style={{background:C.accent,border:"none",color:"#fff",borderRadius:6,padding:"10px 20px",fontSize:13,fontWeight:700,cursor:"pointer"}}>
            リトライ
          </button>
          <details style={{marginTop:12,fontSize:11,color:C.textMuted,textAlign:"left"}}>
            <summary style={{cursor:"pointer"}}>エラー詳細</summary>
            <pre style={{marginTop:6,padding:8,background:C.panel2,borderRadius:4,overflow:"auto",maxHeight:120,fontSize:10}}>{this.state.error?.toString()}</pre>
          </details>
        </div>
      );
    }
    return this.props.children;
  }
}

// ── TAB PLACEHOLDERS ─────────────────────────────
function HomeTab({tournaments,practices,trials,next}){
  const todayStr=today();
  const upcoming=(tournaments||[]).filter(t=>t.date>=todayStr).sort((a,b)=>a.date.localeCompare(b.date));
  const pending=(next||[]).filter(n=>!n.done).slice(0,5);
  return (
    <div style={{padding:"0 16px"}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:16}}>
        {[["🏆","大会を記録"],["🏃","練習を記録"],["🎾","試打を記録"]].map(([icon,label])=>(
          <button key={label} style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:10,padding:"20px 8px",textAlign:"center",cursor:"pointer"}}>
            <div style={{fontSize:22,marginBottom:4}}>{icon}</div>
            <div style={{fontSize:12,color:C.text,fontWeight:700}}>{label}</div>
          </button>
        ))}
      </div>
      {pending.length>0&&(
        <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:10,padding:14,marginBottom:12}}>
          <div style={{fontSize:13,color:C.accent,fontWeight:700,marginBottom:8}}>▶ Next Actions</div>
          {pending.map(n=>(
            <div key={n.id} style={{fontSize:12,color:C.textDim,padding:"6px 0",borderBottom:`1px solid ${C.panel2}`}}>
              {n.label}
            </div>
          ))}
        </div>
      )}
      {upcoming.length>0&&(
        <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:10,padding:14,marginBottom:12}}>
          <div style={{fontSize:13,color:C.blue,fontWeight:700,marginBottom:8}}>📅 次の大会</div>
          {upcoming.slice(0,3).map(t=>(
            <div key={t.id} style={{fontSize:12,color:C.textDim,padding:"6px 0"}}>
              {t.date} — {t.name}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function SessionsTab({tournaments,practices,trials}){
  const all=[
    ...(tournaments||[]).map(t=>({...t,_type:"tournament",_date:t.date,_icon:"🏆",_label:t.name})),
    ...(practices||[]).map(p=>({...p,_type:"practice",_date:p.date,_icon:"🏃",_label:`${p.type||"練習"} @ ${p.venue||"—"}`})),
    ...(trials||[]).map(t=>({...t,_type:"trial",_date:t.date,_icon:"🎾",_label:`${t.racketName||"—"} / ${t.stringMain||"—"}`})),
  ].sort((a,b)=>(b._date||"").localeCompare(a._date||""));
  return (
    <div style={{padding:"0 16px"}}>
      <div style={{fontSize:12,color:C.accent,marginBottom:10}}>Sessions ({all.length}件)</div>
      {all.slice(0,30).map(item=>(
        <div key={item.id} style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 12px",marginBottom:4,display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:16}}>{item._icon}</span>
          <div style={{flex:1,overflow:"hidden"}}>
            <div style={{fontSize:12,fontWeight:600,color:C.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{item._label}</div>
            <div style={{fontSize:11,color:C.textMuted}}>{item._date}</div>
          </div>
          {item._type==="tournament"&&item.overallResult&&(
            <span style={{fontSize:11,color:item.overallResult==="優勝"?C.accent:C.textMuted,fontWeight:600}}>{item.overallResult}</span>
          )}
        </div>
      ))}
      {all.length>30&&<div style={{fontSize:12,color:C.textMuted,textAlign:"center",padding:12}}>他 {all.length-30}件</div>}
    </div>
  );
}

function GearTab({rackets,strings,stringSetups}){
  return (
    <div style={{padding:"0 16px"}}>
      <div style={{fontSize:12,color:C.accent,marginBottom:10}}>Gear</div>
      <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:10,padding:14,marginBottom:12}}>
        <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:8}}>🎾 ラケット ({(rackets||[]).length})</div>
        {(rackets||[]).map(r=>(
          <div key={r.id} style={{fontSize:12,color:C.textDim,padding:"4px 0"}}>{r.name} — {r.status||"active"}</div>
        ))}
      </div>
      <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:10,padding:14,marginBottom:12}}>
        <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:8}}>🧵 ストリング ({(strings||[]).length})</div>
        {(strings||[]).map(s=>(
          <div key={s.id} style={{fontSize:12,color:C.textDim,padding:"4px 0"}}>{s.name} — {s.status||"—"}</div>
        ))}
      </div>
    </div>
  );
}

function PlanTab({next,opponents}){
  const pending=(next||[]).filter(n=>!n.done);
  return (
    <div style={{padding:"0 16px"}}>
      <div style={{fontSize:12,color:C.accent,marginBottom:10}}>Plan</div>
      <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:10,padding:14,marginBottom:12}}>
        <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:8}}>▶ Next ({pending.length}件)</div>
        {pending.slice(0,10).map(n=>(
          <div key={n.id} style={{fontSize:12,color:C.textDim,padding:"4px 0",display:"flex",gap:6}}>
            <span style={{color:n.priority==="高"?C.red:n.priority==="中"?C.yellow:C.textMuted,fontWeight:700,minWidth:20}}>{n.priority}</span>
            {n.label}
          </div>
        ))}
      </div>
      <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:10,padding:14}}>
        <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:8}}>🆚 対戦相手 ({(opponents||[]).length}人)</div>
        {(opponents||[]).map(o=>(
          <div key={o.id} style={{fontSize:12,color:C.textDim,padding:"4px 0"}}>{o.name}{o.nickname?` (${o.nickname})`:""}</div>
        ))}
      </div>
    </div>
  );
}

function InsightsTab({tournaments,practices,trials,mental,profile}){
  const wins=(tournaments||[]).flatMap(t=>(t.matches||[]).filter(m=>m.result==="勝利")).length;
  const losses=(tournaments||[]).flatMap(t=>(t.matches||[]).filter(m=>m.result==="敗北")).length;
  return (
    <div style={{padding:"0 16px"}}>
      <div style={{fontSize:12,color:C.accent,marginBottom:10}}>Insights</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:12}}>
        {[["大会",(tournaments||[]).length],["練習",(practices||[]).length],["試打",(trials||[]).length]].map(([label,count])=>(
          <div key={label} style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:8,padding:"12px 10px",textAlign:"center"}}>
            <div style={{fontSize:20,fontWeight:800,color:C.accent}}>{count}</div>
            <div style={{fontSize:11,color:C.textMuted}}>{label}</div>
          </div>
        ))}
      </div>
      <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:8,padding:14,marginBottom:12}}>
        <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:6}}>戦績</div>
        <div style={{fontSize:14,color:C.textDim}}>{wins}勝 {losses}敗</div>
      </div>
      <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:8,padding:14}}>
        <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:6}}>🧠 メンタル ({(mental||[]).length}件)</div>
        {(mental||[]).slice(0,5).map(m=>(
          <div key={m.id} style={{fontSize:12,color:C.textDim,padding:"4px 0"}}>{m.title}</div>
        ))}
      </div>
    </div>
  );
}

// ── TAB BAR ──────────────────────────────────────
const TABS=[
  {id:"home",icon:"🏠",label:"ホーム"},
  {id:"sessions",icon:"📋",label:"Sessions"},
  {id:"gear",icon:"🔧",label:"Gear"},
  {id:"plan",icon:"📝",label:"Plan"},
  {id:"insights",icon:"📊",label:"Insights"},
];

function TabBar({active,onChange}){
  return (
    <div style={{position:"fixed",bottom:0,left:0,right:0,background:C.panel,borderTop:`1px solid ${C.border}`,display:"flex",zIndex:100,minHeight:56,paddingBottom:"env(safe-area-inset-bottom)"}}>
      {TABS.map(t=>(
        <button key={t.id} onClick={()=>onChange(t.id)} style={{flex:1,background:"none",border:"none",cursor:"pointer",padding:"6px 0 4px",display:"flex",flexDirection:"column",alignItems:"center",gap:2,color:active===t.id?C.accent:C.textMuted,transition:"color 0.15s"}}>
          <span style={{fontSize:20}}>{t.icon}</span>
          <span style={{fontSize:10,fontWeight:active===t.id?700:400}}>{t.label}</span>
        </button>
      ))}
    </div>
  );
}

// ── MAIN APP ─────────────────────────────────────
function TennisDB(){
  const toast=useToast();
  const [user,setUser]=useState(null);
  const [loading,setLoading]=useState(true);
  const [tab,setTab]=useState("home");

  // State (v2 identical keys)
  const [tournaments,setTournaments]=useState([]);
  const [practices,setPractices]=useState([]);
  const [trials,setTrials]=useState([]);
  const [rackets,setRackets]=useState([]);
  const [strings,setStrings]=useState([]);
  const [stringSetups,setStringSetups]=useState([]);
  const [measurements,setMeasurements]=useState([]);
  const [mental,setMental]=useState([]);
  const [next,setNext]=useState([]);
  const [profile,setProfile]=useState({});
  const [venues,setVenues]=useState([]);
  const [quickTrialCards,setQuickTrialCards]=useState([]);
  const [opponents,setOpponents]=useState([]);

  // Auth + data load (v2 identical flow)
  useEffect(()=>{
    const unsub=fbAuth.onAuthStateChanged(async(u)=>{
      if(u){
        setUser(u);
        // Load from Firestore first, fallback to localStorage
        const cloud=await cloudLoadAll(u.uid);
        if(cloud){
          const s=(k,setter,def)=>{const v=cloud[k];if(v){setter(v);lsSave(k,v);}else{const ls=lsLoad(k);if(ls)setter(ls);}};
          s(KEYS.tournaments,setTournaments,[]);
          s(KEYS.practices,setPractices,[]);
          s(KEYS.trials,setTrials,[]);
          s(KEYS.rackets,setRackets,[]);
          s(KEYS.strings,setStrings,[]);
          s(KEYS.stringSetups,setStringSetups,[]);
          s(KEYS.measurements,setMeasurements,[]);
          s(KEYS.mental,setMental,[]);
          s(KEYS.next,setNext,[]);
          s(KEYS.profile,setProfile,{});
          s(KEYS.venues,setVenues,[]);
          s(KEYS.quickTrialCards,setQuickTrialCards,[]);
          s(KEYS.opponents,setOpponents,[]);
        } else {
          // Fallback: localStorage only
          setTournaments(lsLoad(KEYS.tournaments)||[]);
          setPractices(lsLoad(KEYS.practices)||[]);
          setTrials(lsLoad(KEYS.trials)||[]);
          setRackets(lsLoad(KEYS.rackets)||[]);
          setStrings(lsLoad(KEYS.strings)||[]);
          setStringSetups(lsLoad(KEYS.stringSetups)||[]);
          setMeasurements(lsLoad(KEYS.measurements)||[]);
          setMental(lsLoad(KEYS.mental)||[]);
          setNext(lsLoad(KEYS.next)||[]);
          setProfile(lsLoad(KEYS.profile)||{});
          setVenues(lsLoad(KEYS.venues)||[]);
          setQuickTrialCards(lsLoad(KEYS.quickTrialCards)||[]);
          setOpponents(lsLoad(KEYS.opponents)||[]);
        }
      } else {
        setUser(null);
      }
      setLoading(false);
    });
    return ()=>unsub();
  },[]);

  // Login
  const handleLogin=async()=>{
    try{
      const provider=new firebase.auth.GoogleAuthProvider();
      await fbAuth.signInWithPopup(provider);
    }catch(e){
      try{await fbAuth.signInWithRedirect(new firebase.auth.GoogleAuthProvider());}catch(e2){toast.show("❌ ログイン失敗",C.red);}
    }
  };

  // Loading screen
  if(loading){
    return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",color:C.accent,fontSize:14}}>読み込み中...</div>;
  }

  // Login screen
  if(!user){
    return (
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",gap:16}}>
        <div style={{fontSize:24,fontWeight:800,color:C.accent}}>🎾 Tennis DB v3</div>
        <div style={{fontSize:12,color:C.textMuted}}>ゆっけ専用テニス管理アプリ</div>
        <button onClick={handleLogin} style={{background:C.accent,border:"none",color:"#fff",borderRadius:8,padding:"14px 32px",fontSize:14,fontWeight:700,cursor:"pointer",marginTop:12}}>
          Googleでログイン
        </button>
      </div>
    );
  }

  // Data props
  const data={tournaments,practices,trials,rackets,strings,stringSetups,measurements,mental,next,profile,venues,quickTrialCards,opponents};

  return (
    <div style={{maxWidth:960,margin:"0 auto",paddingTop:8}}>
      {toast.el}
      {/* Header */}
      <div style={{padding:"8px 16px 12px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <div style={{fontSize:16,fontWeight:800,color:C.accent}}>🎾 Tennis DB</div>
          <div style={{fontSize:11,color:C.textMuted}}>
            大会 {tournaments.length} / 練習 {practices.length} / 試打 {trials.length}
            <span style={{color:"#999",marginLeft:6}}>v{APP_VERSION}</span>
          </div>
        </div>
        <button onClick={()=>fbAuth.signOut()} style={{background:"none",border:`1px solid ${C.border}`,color:C.textMuted,borderRadius:6,padding:"6px 12px",fontSize:11,cursor:"pointer"}}>
          ログアウト
        </button>
      </div>

      {/* Tab content */}
      {tab==="home"&&(
        <ErrorBoundary name="ホーム">
          <HomeTab tournaments={tournaments} practices={practices} trials={trials} next={next}/>
        </ErrorBoundary>
      )}
      {tab==="sessions"&&(
        <ErrorBoundary name="Sessions">
          <SessionsTab tournaments={tournaments} practices={practices} trials={trials}/>
        </ErrorBoundary>
      )}
      {tab==="gear"&&(
        <ErrorBoundary name="Gear">
          <GearTab rackets={rackets} strings={strings} stringSetups={stringSetups}/>
        </ErrorBoundary>
      )}
      {tab==="plan"&&(
        <ErrorBoundary name="Plan">
          <PlanTab next={next} opponents={opponents}/>
        </ErrorBoundary>
      )}
      {tab==="insights"&&(
        <ErrorBoundary name="Insights">
          <InsightsTab tournaments={tournaments} practices={practices} trials={trials} mental={mental} profile={profile}/>
        </ErrorBoundary>
      )}

      {/* Tab bar */}
      <TabBar active={tab} onChange={setTab}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<TennisDB/>);
</script>
</body>
</html>
