// ── TOAST ─────────────────────────────────────────
function useToast(){
  const[msg,setMsg]=useState(null);
  const t=useRef(null);
  const show=(text,color)=>{clearTimeout(t.current);setMsg({text,color:color||C.accent});t.current=setTimeout(()=>setMsg(null),2500);};
  const el=msg?<div style={{position:"fixed",bottom:80,left:"50%",transform:"translateX(-50%)",background:msg.color||C.accent,color:"#fff",padding:"8px 20px",borderRadius:8,fontSize:13,fontWeight:600,zIndex:9999,boxShadow:"0 2px 12px rgba(0,0,0,0.15)",whiteSpace:"nowrap"}}>{msg.text}</div>:null;
  return{show,el};
}

// ── ERROR BOUNDARY ────────────────────────────────
class ErrorBoundary extends React.Component{
  constructor(props){super(props);this.state={hasError:false,error:null};}
  static getDerivedStateFromError(error){return{hasError:true,error};}
  componentDidCatch(error,info){console.error("ErrorBoundary caught:",this.props.label,error,info);}
  render(){
    if(this.state.hasError){
      return <div style={{padding:24,textAlign:"center"}}>
        <div style={{fontSize:14,color:C.red,fontWeight:600,marginBottom:8}}>「{this.props.label}」でエラーが発生しました</div>
        <div style={{fontSize:11,color:C.textMuted,marginBottom:12,wordBreak:"break-all"}}>{String(this.state.error)}</div>
        <button onClick={()=>this.setState({hasError:false,error:null})} style={{background:C.accent,color:"#fff",border:"none",borderRadius:6,padding:"8px 20px",fontSize:13,fontWeight:600,cursor:"pointer"}}>リトライ</button>
      </div>;
    }
    return this.props.children;
  }
}

// ── RACKET AUTO-FILL ──────────────────────────────
const autoFillFromRacket=(racketName,rackets,stringSetups)=>{
  const rac=(rackets||[]).find(r=>r.name===racketName);
  if(!rac)return{};
  const result={};
  if(rac.string){
    const parts=rac.string.split("/").map(s=>s.trim());
    if(parts[0])result.stringMain=parts[0];
    if(parts[1])result.stringCross=parts[1];
  }
  if(rac.tension){
    const tm=rac.tension.match(/(\d+)/);
    if(tm)result.tensionMain=tm[1];
    const tc=rac.tension.match(/\/(\d+)/)||rac.tension.match(/(\d+)p/);
    if(tc)result.tensionCross=tc[1];
  }
  return result;
};

// ── SESSIONS TAB ──────────────────────────────────
function SessionsTab({tournaments,setTournaments,practices,setPractices,trials,setTrials,rackets,strings,stringSetups,venues,setVenues,opponents,toast,uid,pendingRecord,onPendingRecordDone}){
  const[filter,setFilter]=useState("all");
  const[selected,setSelected]=useState(null); // {type,id}
  const[modal,setModal]=useState(null); // {type:"tournament"|"practice"|"trial",data}
  const[matchModal,setMatchModal]=useState(null);

  // Handle pending record from Home tab
  useEffect(()=>{
    if(pendingRecord){
      const blanks={tournaments:{type:"tournament",data:blankTournament(),isNew:true},practices:{type:"practice",data:blankPractice(),isNew:true},trials:{type:"trial",data:blankTrial(),isNew:true}};
      if(blanks[pendingRecord])setModal(blanks[pendingRecord]);
      if(onPendingRecordDone)onPendingRecordDone();
    }
  },[pendingRecord]);

  // Build unified timeline
  const allItems=useMemo(()=>{
    const items=[];
    (tournaments||[]).forEach(t=>items.push({type:"tournament",id:t.id,date:t.date,title:t.name||"（大会名未入力）",sub:`${t.level||""} ${t.type==="singles"?"S":t.type==="doubles"?"D":"Mix"}`,result:t.overallResult,racket:t.racketName,st:`${t.stringMain||""}${t.stringCross?"/"+t.stringCross:""}`,tension:fmtTension(t.tensionMain,t.tensionCross),matchCount:(t.matches||[]).length,data:t}));
    (practices||[]).forEach(p=>items.push({type:"practice",id:p.id,date:p.date,title:`${p.type||"練習"} @ ${p.venue||"未入力"}`,sub:`${p.duration||""}分`,racket:p.racketName,st:`${p.stringMain||""}${p.stringCross?"/"+p.stringCross:""}`,tension:fmtTension(p.tensionMain,p.tensionCross),data:p}));
    (trials||[]).forEach(t=>items.push({type:"trial",id:t.id,date:t.date,title:`${t.racketName||"未入力"}`,sub:`${t.stringMain||""}${t.stringCross?"/"+t.stringCross:""} ${fmtTension(t.tensionMain,t.tensionCross)}`,judgment:t.judgment,data:t}));
    return items.sort((a,b)=>(normDate(b.date)||"").localeCompare(normDate(a.date)||""));
  },[tournaments,practices,trials]);

  const filtered=filter==="all"?allItems:allItems.filter(i=>i.type==={tournament:"tournament",practice:"practice",trial:"trial"}[filter]);

  // Group by month
  const grouped=useMemo(()=>{
    const g={};
    filtered.forEach(item=>{
      const nd=normDate(item.date);
      const mk=nd?nd.substring(0,7):"不明";
      if(!g[mk])g[mk]=[];
      g[mk].push(item);
    });
    return Object.entries(g).sort((a,b)=>b[0].localeCompare(a[0]));
  },[filtered]);

  const fmtMonth=m=>{if(m==="不明")return"日付不明";const[y,mo]=m.split("-");return`${y}年${parseInt(mo)}月`;};

  // Save handlers
  const saveTournament=(t,isNew)=>{
    const updated=isNew?[t,...tournaments]:tournaments.map(x=>x.id===t.id?t:x);
    setTournaments(updated);save(KEYS.tournaments,updated,uid);
    setModal(null);
    toast.show(isNew?"🏆 大会を記録しました":"🏆 更新しました");
  };
  const savePractice=(p,isNew)=>{
    const updated=isNew?[p,...practices]:practices.map(x=>x.id===p.id?p:x);
    setPractices(updated);save(KEYS.practices,updated,uid);
    setModal(null);
    toast.show(isNew?"🏃 練習を記録しました":"🏃 更新しました");
  };
  const saveTrial=(t,isNew)=>{
    // Auto-link to same-day practice
    if(isNew&&!t.linkedPracticeId){
      const sameDayP=(practices||[]).find(p=>normDate(p.date)===normDate(t.date));
      if(sameDayP)t.linkedPracticeId=sameDayP.id;
    }
    if(isNew&&!t.linkedMatchId){
      const sameDayT=(tournaments||[]).find(tr=>normDate(tr.date)===normDate(t.date));
      if(sameDayT&&(sameDayT.matches||[]).length>0)t.linkedMatchId=sameDayT.matches[sameDayT.matches.length-1].id;
    }
    const updated=isNew?[t,...trials]:trials.map(x=>x.id===t.id?t:x);
    setTrials(updated);save(KEYS.trials,updated,uid);
    setModal(null);
    toast.show(isNew?"🎾 試打を記録しました":"🎾 更新しました");
  };
  const saveMatch=(trn,match,isNew)=>{
    const matches=isNew?[...(trn.matches||[]),match]:(trn.matches||[]).map(m=>m.id===match.id?match:m);
    const updated={...trn,matches};
    setTournaments(tournaments.map(t=>t.id===trn.id?updated:t));
    save(KEYS.tournaments,tournaments.map(t=>t.id===trn.id?updated:t),uid);
    setMatchModal(null);
    toast.show(isNew?"試合を追加しました":"試合を更新しました");
  };

  // Delete handlers
  const deleteTournament=id=>{if(!confirm("この大会を削除しますか？"))return;const updated=tournaments.filter(t=>t.id!==id);setTournaments(updated);save(KEYS.tournaments,updated,uid);setSelected(null);toast.show("削除しました",C.red);};
  const deletePractice=id=>{if(!confirm("この練習を削除しますか？"))return;const updated=practices.filter(p=>p.id!==id);setPractices(updated);save(KEYS.practices,updated,uid);setSelected(null);toast.show("削除しました",C.red);};
  const deleteTrial=id=>{if(!confirm("この試打を削除しますか？"))return;const updated=trials.filter(t=>t.id!==id);setTrials(updated);save(KEYS.trials,updated,uid);setSelected(null);toast.show("削除しました",C.red);};
  const deleteMatch=(trn,matchId)=>{if(!confirm("この試合を削除しますか？"))return;const updated={...trn,matches:(trn.matches||[]).filter(m=>m.id!==matchId)};setTournaments(tournaments.map(t=>t.id===trn.id?updated:t));save(KEYS.tournaments,tournaments.map(t=>t.id===trn.id?updated:t),uid);toast.show("試合を削除しました",C.red);};

  // Icon helpers
  const typeIcon=t=>({tournament:"🏆",practice:"🏃",trial:"🎾"}[t]||"📋");

  // Detail view
  if(selected){
    const item=allItems.find(i=>i.id===selected.id&&i.type===selected.type);
    if(!item)return <div style={{padding:16}}><button onClick={()=>setSelected(null)} style={{background:"none",border:"none",color:C.accent,fontSize:13,cursor:"pointer"}}>← 戻る</button><div style={{marginTop:12,color:C.textMuted}}>レコードが見つかりません</div></div>;

    if(selected.type==="tournament"){
      return <TournamentDetailView trn={item.data} onBack={()=>setSelected(null)} onEdit={()=>setModal({type:"tournament",data:item.data})} onDelete={()=>deleteTournament(item.data.id)} onAddMatch={()=>setMatchModal({trn:item.data,match:blankMatch(item.data),isNew:true})} onEditMatch={(m)=>setMatchModal({trn:item.data,match:m,isNew:false})} onDeleteMatch={(mId)=>deleteMatch(item.data,mId)} trials={trials} modal={matchModal} onSaveMatch={(m,isNew)=>saveMatch(item.data,m,isNew)} onCloseMatch={()=>setMatchModal(null)} toast={toast}/>;
    }
    if(selected.type==="practice"){
      const linkedTrials=(trials||[]).filter(t=>t.linkedPracticeId===item.data.id);
      return <PracticeDetailView p={item.data} onBack={()=>setSelected(null)} onEdit={()=>setModal({type:"practice",data:item.data})} onDelete={()=>deletePractice(item.data.id)} linkedTrials={linkedTrials} onTrialTap={t=>setSelected({type:"trial",id:t.id})}/>;
    }
    if(selected.type==="trial"){
      return <TrialDetailView t={item.data} onBack={()=>setSelected(null)} onEdit={()=>setModal({type:"trial",data:item.data})} onDelete={()=>deleteTrial(item.data.id)}/>;
    }
  }

  // List view
  return(
    <div style={{padding:12}}>
      {/* Filter */}
      <div style={{display:"flex",gap:6,marginBottom:12,overflowX:"auto"}}>
        {[["all","全て"],["tournament","🏆 大会"],["practice","🏃 練習"],["trial","🎾 試打"]].map(([k,l])=>(
          <button key={k} onClick={()=>setFilter(k)} style={{padding:"6px 14px",borderRadius:20,border:`1px solid ${filter===k?C.accent:C.border}`,background:filter===k?"#e6f9f0":C.panel,color:filter===k?C.accent:C.textMuted,fontSize:12,fontWeight:filter===k?600:400,cursor:"pointer",whiteSpace:"nowrap"}}>{l}</button>
        ))}
        <div style={{flex:1}}/>
        <button onClick={()=>setModal({type:"tournament",data:blankTournament(),isNew:true})} style={{padding:"6px 12px",borderRadius:6,background:C.accent,color:"#fff",border:"none",fontSize:12,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap"}}>＋ 記録</button>
      </div>

      {/* Monthly groups */}
      {grouped.length===0&&<div style={{textAlign:"center",padding:40,color:C.textMuted,fontSize:13}}>レコードがありません</div>}
      {grouped.map(([month,items])=>(
        <div key={month} style={{marginBottom:16}}>
          <div style={{fontSize:12,fontWeight:600,color:C.textMuted,marginBottom:6,paddingLeft:4}}>{fmtMonth(month)} ({items.length})</div>
          {items.map(item=>(
            <div key={item.type+item.id} onClick={()=>setSelected({type:item.type,id:item.id})} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",background:C.panel,borderRadius:8,marginBottom:4,cursor:"pointer",border:`1px solid ${C.border}`}}>
              <span style={{fontSize:18}}>{typeIcon(item.type)}</span>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:13,fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.title}</div>
                <div style={{fontSize:11,color:C.textMuted,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{fmtDate(item.date)} · {item.racket||""} {item.sub||""}</div>
              </div>
              {item.result&&<Badge color={resultColor(item.result)} sm>{item.result}</Badge>}
              {item.judgment&&<Badge color={item.judgment==="採用候補"?"green":item.judgment==="却下"?"red":"gray"} sm>{item.judgment}</Badge>}
              {item.matchCount>0&&<span style={{fontSize:10,color:C.textMuted}}>{item.matchCount}試合</span>}
            </div>
          ))}
        </div>
      ))}

      {/* Record Modal */}
      {modal&&modal.type==="tournament"&&<RecordTournamentModal data={modal.data} isNew={modal.isNew!==false} onSave={saveTournament} onClose={()=>setModal(null)} rackets={rackets} strings={strings} venues={venues}/>}
      {modal&&modal.type==="practice"&&<RecordPracticeModal data={modal.data} isNew={modal.isNew!==false} onSave={savePractice} onClose={()=>setModal(null)} rackets={rackets} strings={strings} venues={venues}/>}
      {modal&&modal.type==="trial"&&<RecordTrialModal data={modal.data} isNew={modal.isNew!==false} onSave={saveTrial} onClose={()=>setModal(null)} rackets={rackets} strings={strings}/>}
    </div>
  );
}

        {p.focus&&<div style={{fontSize:12,marginBottom:4}}><span style={{color:C.textMuted}}>フォーカス:</span> {p.focus}</div>}
        {p.coachNote&&<div style={{fontSize:12,marginBottom:4}}><span style={{color:C.textMuted}}>コーチ:</span> {p.coachNote}</div>}
        {p.goodNote&&<div style={{fontSize:12,marginBottom:4}}><span style={{color:C.accent}}>✅ よかった:</span> {p.goodNote}</div>}

        <div style={{fontSize:12,fontWeight:600,marginBottom:4}}>Apple Watch</div>
        <InfoRow label="HR平均" value={p.heartRateAvg?p.heartRateAvg+"bpm":""}/>
        <InfoRow label="HR最大" value={p.heartRateMax?p.heartRateMax+"bpm":""}/>
        <InfoRow label="カロリー" value={p.calories?p.calories+"kcal":""}/>
        <InfoRow label="合計" value={p.totalCalories?p.totalCalories+"kcal":""}/>
        <InfoRow label="時間帯" value={p.timeRange}/>
      </div>}
      {/* Linked Trials */}
      {linkedTrials.length>0&&<div>
        <div style={{fontSize:12,fontWeight:600,color:C.textMuted,marginBottom:4}}>練習中の試打 ({linkedTrials.length})</div>
        {linkedTrials.map(t=>(
          <div key={t.id} onClick={()=>onTrialTap(t)} style={{background:C.panel,borderRadius:6,padding:8,marginBottom:4,border:`1px solid ${C.border}`,cursor:"pointer"}}>

// ── HOME TAB ──────────────────────────────────────
function HomeTab({next,setNext,tournaments,practices,trials,daysSinceExport,onExport,onRecord,onGoToNext,toast,uid}){
  const undoRef=useRef(null);
  const toggleNext=(id)=>{
    const item=next.find(n=>n.id===id);
    if(!item)return;
    if(!item.done){
      const updated=next.map(n=>n.id===id?{...n,done:true,doneAt:new Date().toISOString()}:n);
      setNext(updated);save(KEYS.next,updated,uid);
      undoRef.current=id;
      toast.show("✅ 完了");
      setTimeout(()=>{if(undoRef.current===id)undoRef.current=null;},5000);
    }else{
      const updated=next.map(n=>n.id===id?{...n,done:false,doneAt:null}:n);
      setNext(updated);save(KEYS.next,updated,uid);
    }
  };

  const pendingNext=(next||[]).filter(n=>!n.done).slice(0,3);
  const todayStr=today();
  const futureTournaments=(tournaments||[]).filter(t=>normDate(t.date)>=todayStr).sort((a,b)=>normDate(a.date).localeCompare(normDate(b.date)));
  const futurePractices=(practices||[]).filter(p=>normDate(p.date)>=todayStr).sort((a,b)=>normDate(a.date).localeCompare(normDate(b.date))).slice(0,2);
  const pastTournaments=(tournaments||[]).filter(t=>normDate(t.date)<todayStr).slice(0,2);

  return(
    <div style={{padding:12}}>
      {/* Big 3 buttons */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:14}}>
        {[["🏆","大会を記録","tournaments"],["🏃","練習を記録","practices"],["🎾","試打を記録","trials"]].map(([icon,label,t])=>(
          <button key={t} onClick={()=>onRecord(t)} style={{background:C.accent,color:"#fff",border:"none",borderRadius:10,padding:"14px 6px",textAlign:"center",fontSize:13,fontWeight:600,cursor:"pointer",minHeight:56,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2}}>
            <span style={{fontSize:22}}>{icon}</span>
            <span>{label}</span>
          </button>
        ))}
      </div>

      {/* Next actions */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
        <span style={{fontSize:11,color:C.accent,fontWeight:600,letterSpacing:"0.05em"}}>Next actions</span>
        <button onClick={onGoToNext} style={{fontSize:10,color:C.accent,background:"none",border:"none",cursor:"pointer",fontWeight:500}}>全て見る →</button>
      </div>
      {pendingNext.length===0?(
        <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:8,padding:14,textAlign:"center",fontSize:12,color:C.textMuted,marginBottom:10}}>未完了のアクションはありません</div>
      ):(
        <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:8,padding:"6px 10px",marginBottom:10}}>
          {pendingNext.map((n,i)=>(
            <div key={n.id} onClick={()=>toggleNext(n.id)} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 0",borderBottom:i<pendingNext.length-1?`0.5px solid ${C.border}`:"none",cursor:"pointer"}}>
              <div style={{width:20,height:20,border:`1.5px solid ${n.done?C.accent:C.border}`,borderRadius:4,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",background:n.done?C.accent:"none"}}>
                {n.done&&<span style={{color:"#fff",fontSize:12,fontWeight:700}}>✓</span>}
              </div>
              <span style={{fontSize:12,color:C.text,flex:1}}>{n.label||n.detail||"—"}</span>
              {n.category&&<Badge color={nextBadgeCat(n.category)} sm>{n.category}</Badge>}
            </div>
          ))}
        </div>
      )}

      {/* Next tournament */}
      {futureTournaments.length>0&&(
        <>
          <div style={{fontSize:11,color:C.accent,fontWeight:600,letterSpacing:"0.05em",marginBottom:4}}>次の試合</div>
          {futureTournaments.slice(0,1).map(t=>(
            <div key={t.id} style={{background:C.panel,border:`1px solid ${C.border}`,borderLeft:`3px solid ${C.accent}`,borderRadius:"0 8px 8px 0",padding:"8px 10px",marginBottom:10}}>
              <div style={{fontSize:12,fontWeight:600,color:C.text}}>{fmtDate(t.date)} {t.name||"（大会名未入力）"}</div>
              <div style={{fontSize:10,color:C.textMuted,marginTop:2}}>
                {[t.racketName,t.stringMain&&t.stringCross?`${t.stringMain}+${t.stringCross}`:t.stringMain,fmtTension(t.tensionMain,t.tensionCross)].filter(Boolean).join(" / ")||"機材未設定"}
              </div>
            </div>
          ))}
        </>
      )}

      {/* Next practices */}
      {futurePractices.length>0&&(
        <>
          <div style={{fontSize:11,color:C.accent,fontWeight:600,letterSpacing:"0.05em",marginBottom:4}}>次の練習</div>
          {futurePractices.map(p=>(
            <div key={p.id} style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:8,padding:"6px 10px",marginBottom:4}}>
              <div style={{display:"flex",justifyContent:"space-between"}}>
                <span style={{fontSize:12,fontWeight:500,color:C.text}}>{fmtDate(p.date)} {p.venue||""}</span>
                <span style={{fontSize:10,color:C.textMuted}}>{p.type||""}</span>
              </div>
            </div>
          ))}
          <div style={{marginBottom:10}}/>
        </>
      )}

      {/* Recent tournaments */}
      {pastTournaments.length>0&&(
        <>
          <div style={{fontSize:11,color:C.accent,fontWeight:600,letterSpacing:"0.05em",marginBottom:4}}>最近の大会</div>
          {pastTournaments.map(t=>(
            <div key={t.id} style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:8,padding:"6px 10px",marginBottom:4}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <span style={{fontSize:12,fontWeight:500,color:C.text}}>{fmtDate(t.date)} {t.name||"—"}</span>
                  {t.overallResult&&<Badge color={resultColor(t.overallResult)} sm>{t.overallResult}</Badge>}
                </div>
                <span style={{fontSize:10,color:C.textMuted}}>{(t.matches||[]).length}試合</span>
              </div>
            </div>
          ))}
        </>
      )}

      {/* Export warning */}
      {daysSinceExport>=3&&(
        <div onClick={onExport} style={{marginTop:10,padding:"8px 12px",background:"#fef2f2",borderRadius:6,fontSize:11,color:C.red,textAlign:"center",cursor:"pointer",fontWeight:500}}>
          📤 {daysSinceExport>=365?"このデバイスでバックアップ未実施":`最終バックアップ: ${daysSinceExport}日前`} — タップしてエクスポート
        </div>
      )}

      {/* Stats summary */}
      <div style={{marginTop:12,display:"flex",gap:6,justifyContent:"center",flexWrap:"wrap"}}>
        {[["大会",(tournaments||[]).length],["練習",(practices||[]).length],["試打",(trials||[]).length]].map(([l,v])=>(
          <div key={l} style={{background:C.panel2,borderRadius:6,padding:"4px 10px",fontSize:10,color:C.textMuted}}>{l} {v}件</div>
        ))}
        <div style={{background:C.panel2,borderRadius:6,padding:"4px 10px",fontSize:10,color:C.textMuted}}>v{APP_VERSION}</div>
      </div>
    </div>
  );
}

// ── PLACEHOLDER TABS ──────────────────────────────

  <div style={{padding:24,textAlign:"center"}}>
    <div style={{fontSize:36,marginBottom:8}}>{icon}</div>
    <div style={{fontSize:16,fontWeight:500,color:C.text,marginBottom:4}}>{name}</div>
    <div style={{fontSize:12,color:C.textMuted,marginBottom:8}}>Phase 2で実装予定{count!=null?` · ${count}件のデータあり`:""}</div>
    <div style={{fontSize:11,color:C.textDim}}>v2のデータはFirestore経由で共有されています</div>
  </div>
);

// ── TAB BAR ───────────────────────────────────────
function TabBar({tab,setTab}){
  const tabs=[
    {id:"home",icon:"🏠",label:"ホーム"},
    {id:"sessions",icon:"📋",label:"Sessions"},
    {id:"gear",icon:"🔧",label:"Gear"},
    {id:"plan",icon:"📝",label:"Plan"},
    {id:"insights",icon:"📊",label:"Insights"},
  ];
  return(
    <div style={{display:"flex",borderTop:`1px solid ${C.border}`,background:C.panel,flexShrink:0}}>
      {tabs.map(t=>(
        <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,background:tab===t.id?"rgba(0,184,122,0.08)":"none",border:"none",color:tab===t.id?C.accent:C.textMuted,padding:"6px 4px",fontSize:12,fontWeight:tab===t.id?600:400,cursor:"pointer",minHeight:48,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:1}}>
          <span style={{fontSize:20}}>{t.icon}</span>
          <span>{t.label}</span>
        </button>
      ))}
    </div>
  );
}

// ── MAIN APP ──────────────────────────────────────
function TennisDB(){
  const[tab,setTab]=useState("home");
  const[uid,setUid]=useState(null);
  const[loading,setLoading]=useState(true);
  const toast=useToast();

  const[tournaments,setTournaments]=useState(()=>lsLoad(KEYS.tournaments)||[]);
  const[practices,setPractices]=useState(()=>lsLoad(KEYS.practices)||[]);
  const[trials,setTrials]=useState(()=>lsLoad(KEYS.trials)||[]);
  const[rackets,setRackets]=useState(()=>lsLoad(KEYS.rackets)||[]);
  const[strings,setStrings]=useState(()=>lsLoad(KEYS.strings)||[]);
  const[stringSetups,setStringSetups]=useState(()=>lsLoad(KEYS.stringSetups)||[]);
  const[mental,setMental]=useState(()=>lsLoad(KEYS.mental)||[]);
  const[next,setNext]=useState(()=>lsLoad(KEYS.next)||[]);
  const[profile,setProfile]=useState(()=>lsLoad(KEYS.profile)||{});
  const[venues,setVenues]=useState(()=>lsLoad(KEYS.venues)||[]);
  const[opponents,setOpponents]=useState(()=>lsLoad(KEYS.opponents)||[]);
  const[measurements,setMeasurements]=useState(()=>lsLoad(KEYS.measurements)||[]);
  const[quickTrialCards,setQuickTrialCards]=useState(()=>lsLoad(KEYS.quickTrialCards)||[]);

  const[lastExport,setLastExport]=useState(()=>lsLoad("lastExport")||null);
  const daysSinceExport=lastExport?daysBetween(new Date(lastExport),new Date()):999;

  useEffect(()=>{
    const unsub=fbAuth.onAuthStateChanged(async user=>{
      if(user){
        setUid(user.uid);
        try{
          const cloud=await cloudLoadAll(user.uid);
          if(cloud){
            const setters={tournaments:setTournaments,practices:setPractices,trials:setTrials,rackets:setRackets,strings:setStrings,stringSetups:setStringSetups,mental:setMental,next:setNext,profile:setProfile,venues:setVenues,opponents:setOpponents,measurements:setMeasurements,quickTrialCards:setQuickTrialCards};
            Object.entries(KEYS).forEach(([name,key])=>{
              if(cloud[key]!=null){
                const val=cloud[key];
                lsSave(key,val);
                if(setters[name]){
                  if(Array.isArray(val)&&val[0]?.date){setters[name](ds(val));}
                  else{setters[name](val);}
                }
              }
            });
          }
        }catch(e){console.error("Cloud load failed:",e);}
        const dataRef=fbDb.collection("users").doc(user.uid).collection("data");
        dataRef.onSnapshot(snap=>{
          snap.docChanges().forEach(change=>{
            if(change.type==="modified"){
              const key=change.doc.id;const d=change.doc.data();const val=d.items||d.obj;
              if(!val)return;
              const name=Object.entries(KEYS).find(([,v])=>v===key)?.[0];
              if(!name)return;
              lsSave(key,val);
              const setters={tournaments:setTournaments,practices:setPractices,trials:setTrials,rackets:setRackets,strings:setStrings,stringSetups:setStringSetups,mental:setMental,next:setNext,profile:setProfile,venues:setVenues,opponents:setOpponents,measurements:setMeasurements,quickTrialCards:setQuickTrialCards};
              if(setters[name]){
                if(Array.isArray(val)&&val[0]?.date){setters[name](ds(val));}
                else{setters[name](val);}
              }
            }
          });
        });
      }else{
        fbAuth.signInAnonymously().catch(()=>{});
      }
      setLoading(false);
    });
    return()=>unsub();
  },[]);

  const handleExport=async()=>{
    const data={tournaments,practices,trials,rackets,strings,stringSetups,mental,next,profile,venues,opponents,measurements,quickTrialCards};
    const result=await exportAll(data);
    if(result!=="cancelled"){
      const now=new Date().toISOString();
      setLastExport(now);lsSave("lastExport",now);
      toast.show("📤 エクスポート完了");
    }
  };

  const[pendingRecord,setPendingRecord]=useState(null);
  const handleRecord=(type)=>{
    setPendingRecord(type);
    setTab("sessions");
  };

  if(loading){
    return <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100dvh",flexDirection:"column",gap:8}}>
      <div style={{fontSize:24}}>🎾</div>
      <div style={{fontSize:13,color:C.textMuted}}>Tennis DB v3 を読み込み中...</div>
    </div>;
  }

  return(
    <div style={{display:"flex",flexDirection:"column",minHeight:"100dvh",background:C.bg}}>
      <div style={{background:C.panel,borderBottom:`1px solid ${C.border}`,padding:"8px 14px",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
        <span style={{fontSize:16,fontWeight:600,color:C.accent}}>Tennis DB</span>
        <span style={{fontSize:10,color:C.textMuted}}>v{APP_VERSION}{uid?" · 同期中":""}</span>
      </div>
      <div style={{flex:1,overflowY:"auto",WebkitOverflowScrolling:"touch"}}>
        <ErrorBoundary label="ホーム">
          {tab==="home"&&<HomeTab next={next} setNext={setNext} tournaments={tournaments} practices={practices} trials={trials} daysSinceExport={daysSinceExport} onExport={handleExport} onRecord={handleRecord} onGoToNext={()=>setTab("plan")} toast={toast} uid={uid}/>}
        </ErrorBoundary>
        <ErrorBoundary label="Sessions">
          {tab==="sessions"&&<SessionsTab tournaments={tournaments} setTournaments={setTournaments} practices={practices} setPractices={setPractices} trials={trials} setTrials={setTrials} rackets={rackets} strings={strings} stringSetups={stringSetups} venues={venues} setVenues={setVenues} opponents={opponents} toast={toast} uid={uid} pendingRecord={pendingRecord} onPendingRecordDone={()=>setPendingRecord(null)}/>}
        </ErrorBoundary>
        <ErrorBoundary label="Gear">
          {tab==="gear"&&<PlaceholderTab name="Gear" icon="🔧" count={(rackets||[]).length+(strings||[]).length}/>}
        </ErrorBoundary>
        <ErrorBoundary label="Plan">
          {tab==="plan"&&<PlaceholderTab name="Plan" icon="📝" count={(next||[]).length+(opponents||[]).length}/>}
        </ErrorBoundary>
        <ErrorBoundary label="Insights">
          {tab==="insights"&&<PlaceholderTab name="Insights" icon="📊"/>}
        </ErrorBoundary>
      </div>
      <TabBar tab={tab} setTab={setTab}/>
      {toast.el}
    </div>
  );
}

const _cw=console.warn;
console.warn=(...a)=>{if(typeof a[0]==="string"&&a[0].includes("in-browser Babel"))return;_cw.apply(console,a);};
ReactDOM.createRoot(document.getElementById("root")).render(<TennisDB/>);
</script>
