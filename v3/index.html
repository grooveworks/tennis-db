// ── ERROR BOUNDARY ────────────────────────────────
class ErrorBoundary extends React.Component{
  constructor(p){super(p);this.state={hasError:false,error:null};}
  static getDerivedStateFromError(e){return{hasError:true,error:e};}
  render(){
    if(this.state.hasError)return<div style={{padding:20,textAlign:"center"}}>
      <div style={{fontSize:16,marginBottom:8}}>⚠️</div>
      <div style={{fontSize:13,color:C.red,fontWeight:600,marginBottom:4}}>{this.props.label}でエラーが発生しました</div>
      <div style={{fontSize:11,color:C.textMuted,marginBottom:12}}>{this.state.error?.message}</div>
      <button onClick={()=>this.setState({hasError:false,error:null})} style={{background:C.accent,border:"none",color:"#fff",borderRadius:6,padding:"8px 16px",fontSize:12,fontWeight:700,cursor:"pointer"}}>リトライ</button>
    </div>;
    return this.props.children;
  }
}

// ── MERGE & IMPORT ────────────────────────────────
const trnDup=(a,b)=>normDate(a.date)===normDate(b.date)&&a.name===b.name;
const pracDup=(a,b)=>normDate(a.date)===normDate(b.date)&&(a.venue||"")===(b.venue||"");
const mergeArr=(exist,incoming,isDup)=>{
  const merged=[...exist];
  (incoming||[]).forEach(item=>{
    if(!merged.find(e=>e.id===item.id||isDup(e,item)))merged.push(item);
  });
  return merged;
};
const mergeData=(current,incoming)=>{
  const r={...current};
  r.tournaments=mergeArr(current.tournaments||[],incoming.tournaments,trnDup);
  r.practices=mergeArr(current.practices||[],incoming.practices,pracDup);
  r.trials=mergeArr(current.trials||[],incoming.trials,(a,b)=>a.id===b.id);
  ["rackets","strings","measurements","mental","next","opponents","stringSetups","quickTrialCards"].forEach(k=>{
    if(incoming[k]){r[k]=mergeArr(current[k]||[],incoming[k],(a,b)=>a.id===b.id);}
  });
  if(incoming.venues){r.venues=[...new Set([...(current.venues||[]),...incoming.venues])];}
  if(incoming.profile&&!current.profile?.name){r.profile=incoming.profile;}
  return r;
};
const autoOpponents=(tournaments,opponents)=>{
  const existing=new Set((opponents||[]).map(o=>o.name));
  const newOpps=[];
  (tournaments||[]).forEach(t=>{
    (t.matches||[]).forEach(m=>{
      if(m.opponent&&!existing.has(m.opponent)&&!newOpps.find(n=>n.name===m.opponent)){
        newOpps.push({id:genId(),name:m.opponent,nickname:"",gender:"",style:"",strengths:"",weaknesses:"",note:""});
        existing.add(m.opponent);
      }
      if(m.opponent2&&!existing.has(m.opponent2)&&!newOpps.find(n=>n.name===m.opponent2)){
        newOpps.push({id:genId(),name:m.opponent2,nickname:"",gender:"",style:"",strengths:"",weaknesses:"",note:""});
        existing.add(m.opponent2);
      }
    });
  });
  return[...(opponents||[]),...newOpps];
};

// ── MIGRATION ─────────────────────────────────────
const migrateToV2=data=>{
  if(lsLoad("migrated_v2"))return data;
  console.log("🔄 v2 migration starting...");
  const r={...data};
  // Normalize trial fields
  (r.trials||[]).forEach(t=>{
    if(t.string&&!t.stringMain){t.stringMain=t.string;delete t.string;}
    if(t.tension&&!t.tensionMain){
      const m=String(t.tension).match(/(\d+)/);
      if(m){t.tensionMain=parseInt(m[1]);t.tensionCross=t.tensionCross||parseInt(m[1]);}
      delete t.tension;
    }
  });
  // Normalize practice/tournament fields
  [...(r.tournaments||[]),...(r.practices||[])].forEach(item=>{
    if(item.string&&!item.stringSetup){item.stringSetup=item.string;delete item.string;}
  });
  lsSave("migrated_v2",true);
  console.log("✅ v2 migration complete");
  return r;
};
const fixMeasurements=data=>{
  if(lsLoad("migrated_v2_measurements"))return data;
  const ms=data.measurements||[];
  if(ms.length===0){lsSave("migrated_v2_measurements",true);return data;}
  const rackets=data.rackets||[];
  ms.forEach(m=>{
    if(m.racket&&!m.racketId){
      const found=rackets.find(r=>r.name.includes(m.racket)||m.racket.includes(r.name));
      if(found)m.racketId=found.id;
    }
  });
  lsSave("migrated_v2_measurements",true);
  return data;
};

const formatMatchForClaude=(m,trn)=>{
  let s=`## 試合: ${trn?.name||""} ${m.round||""}\n`;
  s+=`日付: ${fmtDateFull(trn?.date)}\n`;
  s+=`対戦相手: ${m.opponent||"不明"}${m.opponent2?" / "+m.opponent2:""}\n`;
  s+=`結果: ${m.result||""} ${(m.setScores||[]).join(", ")}\n`;
  s+=`メンタル: ${m.mental||"-"}/5 (${MENTAL_LABELS[m.mental]||""}) / フィジカル: ${m.physical||"-"}/5 (${PHYSICAL_LABELS[m.physical]||""})\n`;
  if(m.note)s+=`メモ: ${m.note}\n`;
  if(m.games?.length){s+=`ゲーム推移: ${m.games.map(g=>g.winner==="me"?"●":"○").join("")}\n`;}
  if(m.changeovers?.length){
    s+="チェンジオーバー:\n";
    m.changeovers.forEach(co=>{s+=`  ${co.afterGame}G後: M${co.mental}/P${co.physical} ${co.note||""}\n`;});
  }
  return s;
};
const formatTournamentAllForClaude=trn=>{
  let s=`# 大会: ${trn.name} (${fmtDateFull(trn.date)})\n`;
  s+=`レベル: ${trn.level||""} / 種目: ${trn.type||""}\n`;
  s+=`結果: ${trn.overallResult||""}\n`;
  s+=`機材: ${trn.racketName||""} / ${trn.stringSetup||""} / ${trn.tension||""}\n`;
  if(trn.generalNote)s+=`総評: ${trn.generalNote}\n`;
  s+="\n";
  (trn.matches||[]).forEach(m=>{s+=formatMatchForClaude(m,trn)+"\n";});
  return s;
};
const formatPracticeForClaude=p=>{
  let s=`# 練習: ${fmtDateFull(p.date)} @ ${p.venue||""}\n`;
  s+=`種類: ${p.type||""} / 時間: ${p.duration||""}分\n`;
  if(p.racketName)s+=`機材: ${p.racketName} / ${p.stringSetup||""} / ${p.tension||""}\n`;
  if(p.focus)s+=`フォーカス: ${p.focus}\n`;
  if(p.coachNote)s+=`コーチメモ: ${p.coachNote}\n`;
  if(p.goodNote)s+=`良かった点: ${p.goodNote}\n`;
  if(p.improveNote)s+=`改善点: ${p.improveNote}\n`;
  if(p.generalNote)s+=`メモ: ${p.generalNote}\n`;
  return s;
};
const formatTrialForClaude=t=>{
  let s=`# 試打: ${t.racketName||""} / ${t.stringMain||""}${t.stringCross?" × "+t.stringCross:""}\n`;
  s+=`日付: ${fmtDateFull(t.date)} / テンション: ${t.tensionMain||t.tension||""}${t.tensionCross?"/"+t.tensionCross:""}p\n`;
  s+=`判定: ${t.judgment||""}\n`;
  const items=[["スピン",t.spin],["推進力",t.power],["コントロール",t.control],["打感情報",t.info],["操作性",t.maneuver],["振り抜き",t.swingThrough]];
  items.forEach(([l,v])=>{if(v)s+=`${l}: ${v}/5\n`;});
  if(t.strokeNote)s+=`ストローク: ${t.strokeNote}\n`;
  if(t.serveNote)s+=`サーブ: ${t.serveNote}\n`;
  if(t.volleyNote)s+=`ボレー: ${t.volleyNote}\n`;
  if(t.generalNote)s+=`総評: ${t.generalNote}\n`;
  return s;
};

const RESTORE_IDS=["trn01","trn02","trn03"];
const restoreIfMissing=(tournaments)=>{
  if(lsLoad("restored-trn-v225"))return tournaments;
  const missing=RESTORE_IDS.filter(id=>!tournaments.find(t=>t.id===id));
  if(missing.length===0){lsSave("restored-trn-v225",true);return tournaments;}
  const restored=[...tournaments];
  missing.forEach(id=>{const init=INIT.tournaments.find(t=>t.id===id);if(init)restored.push(init);});
  lsSave("restored-trn-v225",true);
  return ds(restored);
};

function ClaudeShareModal({onClose,data,toast}){
  const[tab,setTab]=useState("all");
  const tabs=[{id:"all",label:"全データ"},{id:"tournaments",label:"大会"},{id:"practices",label:"練習"},{id:"trials",label:"試打"},{id:"mental",label:"メンタル"},{id:"profile",label:"プロフィール"}];
  const getText=()=>{
    if(tab==="all"){
      let s="# Tennis DB エクスポート\n\n";
      s+="## 大会\n";(data.tournaments||[]).forEach(t=>{s+=formatTournamentAllForClaude(t)+"\n";});
      s+="## 練習\n";(data.practices||[]).forEach(p=>{s+=formatPracticeForClaude(p)+"\n";});
      s+="## 試打\n";(data.trials||[]).forEach(t=>{s+=formatTrialForClaude(t)+"\n";});
      return s;
    }
    if(tab==="tournaments")return(data.tournaments||[]).map(formatTournamentAllForClaude).join("\n");
    if(tab==="practices")return(data.practices||[]).map(formatPracticeForClaude).join("\n");
    if(tab==="trials")return(data.trials||[]).map(formatTrialForClaude).join("\n");
    if(tab==="mental")return(data.mental||[]).map(m=>`[${m.category}] ${m.title}: ${m.content}`).join("\n");
    if(tab==="profile"){const p=data.profile||{};return Object.entries(p).map(([k,v])=>Array.isArray(v)?`${k}: ${v.join(", ")}`:`${k}: ${v}`).join("\n");}
    return "";
  };
  const text=getText();
  const handleCopy=async()=>{await copyToClipboard(text);toast.show("📋 コピーしました");onClose();};
  return <div style={{position:"fixed",inset:0,background:"#0006",zIndex:400,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
    <div style={{background:C.panel,borderRadius:"16px 16px 0 0",width:"100%",maxHeight:"80vh",display:"flex",flexDirection:"column"}}>
      <div style={{padding:"16px 16px 8px",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:`1px solid ${C.border}`}}>
        <span style={{fontSize:15,fontWeight:700}}>📋 Claude共有</span>
        <button onClick={onClose} style={{background:"none",border:"none",fontSize:18,cursor:"pointer",color:C.textMuted}}>✕</button>
      </div>
      <div style={{display:"flex",gap:4,padding:"8px 16px",overflowX:"auto",flexShrink:0}}>
        {tabs.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{padding:"4px 10px",borderRadius:6,border:`1px solid ${tab===t.id?C.accent:C.border}`,background:tab===t.id?C.accentBg:C.panel2,color:tab===t.id?C.accent:C.textMuted,fontSize:11,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap"}}>{t.label}</button>)}
      </div>
      <div style={{padding:16,flex:1,overflowY:"auto"}}>
        <div style={{fontSize:11,color:C.textMuted,marginBottom:8}}>{text.length.toLocaleString()} 文字</div>
        <pre style={{fontSize:11,color:C.text,whiteSpace:"pre-wrap",wordBreak:"break-all",maxHeight:300,overflow:"auto",background:C.panel2,padding:10,borderRadius:6}}>{text.slice(0,2000)}{text.length>2000?"...":""}</pre>
      </div>
      <div style={{padding:16,borderTop:`1px solid ${C.border}`}}>
        <button onClick={handleCopy} style={{width:"100%",padding:12,borderRadius:8,background:C.accent,border:"none",color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer"}}>📋 コピー</button>
      </div>
    </div>
  </div>;
}

// ── GAME TRACKER ──────────────────────────────────
function GameTracker({match,onChange}){
  const games=match.games||[];
  const addGame=winner=>{const ng=[...games,{id:genId(),winner}];onChange({...match,games:ng});};
  const removeLast=()=>{if(games.length){onChange({...match,games:games.slice(0,-1)});}};
  const meCount=games.filter(g=>g.winner==="me").length;
  const oppCount=games.filter(g=>g.winner==="opp").length;
  return <div>
    <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:8}}>
      <span style={{fontSize:16,fontWeight:700,color:C.accent}}>{meCount}</span>
      <span style={{fontSize:12,color:C.textMuted}}>-</span>
      <span style={{fontSize:16,fontWeight:700,color:C.red}}>{oppCount}</span>
    </div>
    <div style={{display:"flex",gap:6,marginBottom:8}}>
      <button onClick={()=>addGame("me")} style={{flex:1,padding:10,borderRadius:8,background:C.accentBg,border:`1px solid ${C.accent}`,color:C.accent,fontSize:13,fontWeight:700,cursor:"pointer",minHeight:44}}>自分 +1</button>
      <button onClick={()=>addGame("opp")} style={{flex:1,padding:10,borderRadius:8,background:C.redBg,border:`1px solid ${C.red}`,color:C.red,fontSize:13,fontWeight:700,cursor:"pointer",minHeight:44}}>相手 +1</button>
      {games.length>0&&<button onClick={removeLast} style={{padding:10,borderRadius:8,background:C.panel2,border:`1px solid ${C.border}`,color:C.textMuted,fontSize:12,cursor:"pointer",minHeight:44}}>↩</button>}
    </div>
    {games.length>0&&<div style={{display:"flex",gap:1,flexWrap:"wrap"}}>
      {games.map((g,i)=><div key={g.id||i} style={{width:12,height:12,borderRadius:2,background:g.winner==="me"?C.accent:C.red}}/>)}
    </div>}
  </div>;
}
const GameBar=({games})=>{
  if(!games?.length)return null;
  return <div style={{display:"flex",gap:1}}>
    {games.map((g,i)=><div key={i} style={{width:8,height:8,borderRadius:1,background:g.winner==="me"?C.accent:C.red}}/>)}
  </div>;

// ── MINI CALENDAR ────────────────────────────────
function MiniCalendar({tournaments,practices}){
  const[month,setMonth]=useState(()=>{const d=new Date();return{y:d.getFullYear(),m:d.getMonth()};});
  const[selectedDay,setSelectedDay]=useState(null);
  const todayStr=today();
  const daysInMonth=new Date(month.y,month.m+1,0).getDate();
  const firstDow=new Date(month.y,month.m,1).getDay();
  const monthLabel=`${month.y}年${month.m+1}月`;
  const prev=()=>setMonth(p=>p.m===0?{y:p.y-1,m:11}:{y:p.y,m:p.m-1});
  const next=()=>setMonth(p=>p.m===11?{y:p.y+1,m:0}:{y:p.y,m:p.m+1});

  // Build date→events map
  const eventMap=useMemo(()=>{
    const map={};
    const prefix=`${month.y}-${String(month.m+1).padStart(2,"0")}`;
    (tournaments||[]).forEach(t=>{const nd=normDate(t.date);if(nd.startsWith(prefix)){if(!map[nd])map[nd]=[];map[nd].push({type:"tournament",data:t});}});
    (practices||[]).forEach(p=>{const nd=normDate(p.date);if(nd.startsWith(prefix)){if(!map[nd])map[nd]=[];map[nd].push({type:"practice",data:p});}});
    return map;
  },[tournaments,practices,month]);

  const dayEvents=selectedDay?eventMap[selectedDay]||[]:[];

  return <Card>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
      <button onClick={prev} style={{background:"none",border:"none",fontSize:16,cursor:"pointer",color:C.textMuted,padding:"4px 8px"}}>◀</button>
      <span style={{fontSize:13,fontWeight:700,color:C.text}}>{monthLabel}</span>
      <button onClick={next} style={{background:"none",border:"none",fontSize:16,cursor:"pointer",color:C.textMuted,padding:"4px 8px"}}>▶</button>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,textAlign:"center"}}>
      {["日","月","火","水","木","金","土"].map((d,i)=><div key={d} style={{fontSize:10,fontWeight:600,color:i===0?"#dc2626":i===6?C.blue:C.textMuted,padding:"2px 0"}}>{d}</div>)}
      {Array.from({length:firstDow}).map((_,i)=><div key={"e"+i}/>)}
      {Array.from({length:daysInMonth}).map((_,i)=>{
        const day=i+1;
        const dateStr=`${month.y}-${String(month.m+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
        const events=eventMap[dateStr]||[];
        const hasTrn=events.some(e=>e.type==="tournament");

// ── TOURNAMENT DETAIL (full-screen, matches + GameTracker) ──
// ── CSV STATS PARSER & CALCULATOR (ATP-style stats from datatennis CSV) ──
const parsePattern=code=>{
  if(!code)return null;
  if(code==="Ace")return{shotType:"Ace",result:"W",hand:null,forced:null};
  if(code==="DbF")return{shotType:"DbF",result:"L",hand:null,forced:null};
  const shotType=code.slice(0,2);
  const result=code[2]||null;
  const hand=code[3]||null;
  const forced=code[4]||null;
  return{shotType,result,hand,forced};
};
const parseScoreVal=s=>{
  if(s==="Bk"||s==="Kp")return"game";
  if(s==="0")return 0;if(s==="15")return 1;if(s==="30")return 2;if(s==="40")return 3;
  const n=parseInt(s);return isNaN(n)?0:n;
};
const parseStatsCSV=(text,myPlayerName)=>{
  const lines=text.replace(/\r/g,"").split("\n").filter(l=>l.trim());
  if(lines.length<2)throw new Error("CSVが空です");
  const header=lines[0].split(",").map(s=>s.trim());
  const rows=lines.slice(1).map(l=>{
    const cols=l.split(",");
    const obj={};header.forEach((h,i)=>{obj[h]=(cols[i]||"").trim();});
    return obj;
  });
  if(!rows[0].PlayerA||!rows[0].PlayerB)throw new Error("PlayerA/PlayerBカラムが見つかりません");
  const playerA=rows[0].PlayerA,playerB=rows[0].PlayerB;
  const myIsA=myPlayerName?(myPlayerName===playerA):(playerA==="古川"||playerA==="ゆっけ");
  const points=[];
  let gPtsA=0,gPtsB=0,curGame=0;
  rows.forEach(row=>{
    const g=parseInt(row.Game);
    if(g!==curGame){curGame=g;gPtsA=0;gPtsB=0;}
    const serverIsA=row.Server===playerA;
    const serverPts=serverIsA?gPtsA:gPtsB,returnerPts=serverIsA?gPtsB:gPtsA;
    const isBP=returnerPts>=3&&returnerPts>=serverPts;
    const totalPts=gPtsA+gPtsB;
    const side=totalPts%2===0?"deuce":"ad";
    const fault=row.Fault||"";
    const serveNum=(fault==="F"||fault==="DF")?2:1;
    const nextA=parseScoreVal(row.ScoreA),nextB=parseScoreVal(row.ScoreB);
    const aWon=(nextA==="game"&&(row.ScoreA==="Bk"||row.ScoreA==="Kp"))||(typeof nextA==="number"&&nextA===gPtsA+1);
    const winner=aWon?"A":"B";
    const pattern=parsePattern(row.PatternA||row.PatternB||"");
    const patternOwner=row.PatternA?"A":(row.PatternB?"B":null);
    points.push({
      num:parseInt(row.Num),game:g,
      server:serverIsA?"A":"B",
      serverIsMe:myIsA?serverIsA:!serverIsA,
      serveNum,isDoubleFault:fault==="DF",fault,
      side,isBreakPoint:isBP,
      winner,winnerIsMe:myIsA?(winner==="A"):(winner==="B"),
      pattern,patternOwner,
      gameEnd:nextA==="game"||nextB==="game",
      gameWonBy:nextA==="game"?"A":(nextB==="game"?"B":null),
    });
    if(aWon)gPtsA++;else gPtsB++;
  });
  return{points,playerA,playerB,myIsA,rows};
};

// Compute match stats (データテニス値に一致 + ATP準拠2項目 + Tennis DB独自分析)
const computeMatchStats=(parsed)=>{
  const{points,myIsA}=parsed;
  const meTag=myIsA?"A":"B",oppTag=myIsA?"B":"A";
  const fraq=(w,t)=>({won:w,total:t,pct:t>0?Math.round(100*w/t):0});

  // Service/Return splits
  const mySPts=points.filter(p=>p.server===meTag);
  const oppSPts=points.filter(p=>p.server===oppTag);
  const myRPts=points.filter(p=>p.server===oppTag);
  const oppRPts=points.filter(p=>p.server===meTag);
  // Side splits (server-side)
  const splitSide=(arr,s)=>arr.filter(p=>p.side===s);

  // Aces: 自分のサーブで、pattern.Ace & winner=me
  const countAces=(sp,tag)=>sp.filter(p=>p.pattern?.shotType==="Ace"&&p.patternOwner===tag&&p.winner===tag).length;
  const myAces=countAces(mySPts,meTag);
  const oppAces=countAces(oppSPts,oppTag);

  // Double faults
  const myDF=mySPts.filter(p=>p.isDoubleFault).length;
  const oppDF=oppSPts.filter(p=>p.isDoubleFault).length;

  // Helper: compute serve stats with side split (1st In / 1st Pts Won / 2nd Pts Won)
  const serveStats=(sp,tag)=>{
    const stat=(arr)=>{
      const first=arr.filter(p=>p.fault==="");
      const firstWon=first.filter(p=>p.winner===tag);
      const second=arr.filter(p=>p.fault==="F"||p.fault==="DF");
      const secondIn=second.filter(p=>!p.isDoubleFault);
      const secondWon=secondIn.filter(p=>p.winner===tag);
      return{
        firstIn:fraq(first.length,arr.length),
        firstWon:fraq(firstWon.length,first.length),
        secondWon:fraq(secondWon.length,second.length),
      };
    };
    return{
      total:stat(sp),
      deuce:stat(splitSide(sp,"deuce")),
      ad:stat(splitSide(sp,"ad")),
    };
  };

  // Helper: return-in rate (データテニス定義:相手のサーブがInでこちらがリターンをInできた率)
  // リターンInできない要因: 自分のリターンエラー + サーバーのAce（返球不能）
  const retInStats=(rp,meTag2)=>{
    const serverTag=meTag2==="A"?"B":"A";
    const notInFilter=p=>{
      const isAce=p.pattern?.shotType==="Ace"&&p.patternOwner===serverTag&&p.winner===serverTag;
      const isRetErr=p.pattern?.shotType==="Rt"&&p.pattern.result==="E"&&p.patternOwner===serverTag&&p.winner===serverTag;
      return isAce||isRetErr;
    };
    const stat=(arr)=>{
      const first=arr.filter(p=>p.fault==="");
      const firstNotIn=first.filter(notInFilter);
      const second=arr.filter(p=>p.fault==="F"||p.fault==="DF");
      const secondIn=second.filter(p=>!p.isDoubleFault);
      const secondNotIn=secondIn.filter(notInFilter);
      return{
        firstReturnIn:fraq(first.length-firstNotIn.length,first.length),
        secondReturnIn:fraq(secondIn.length-secondNotIn.length,secondIn.length),
      };
    };
    return{
      total:stat(rp),
      deuce:stat(splitSide(rp,"deuce")),
      ad:stat(splitSide(rp,"ad")),
    };
  };

  // Helper: return points won (ATP定義: DF除く)
  const retWonStats=(rp,tag)=>{
    const first=rp.filter(p=>p.fault==="");
    const firstWon=first.filter(p=>p.winner===tag);
    const second=rp.filter(p=>(p.fault==="F"||p.fault==="DF")&&!p.isDoubleFault);
    const secondWon=second.filter(p=>p.winner===tag);
    return{
      firstReturnWon:fraq(firstWon.length,first.length),
      secondReturnWon:fraq(secondWon.length,second.length),
    };
  };

  // Side split for アイド/デュース サーブイン率 (データテニス値: サイド別 1stサーブIN率)
  const my1stSide={deuce:fraq(splitSide(mySPts,"deuce").filter(p=>p.fault==="").length,splitSide(mySPts,"deuce").length),ad:fraq(splitSide(mySPts,"ad").filter(p=>p.fault==="").length,splitSide(mySPts,"ad").length)};
  const opp1stSide={deuce:fraq(splitSide(oppSPts,"deuce").filter(p=>p.fault==="").length,splitSide(oppSPts,"deuce").length),ad:fraq(splitSide(oppSPts,"ad").filter(p=>p.fault==="").length,splitSide(oppSPts,"ad").length)};

  const myServe=serveStats(mySPts,meTag);
  const oppServe=serveStats(oppSPts,oppTag);
  const myRetIn=retInStats(myRPts,meTag);
  const oppRetIn=retInStats(oppRPts,oppTag);
  const myRetWon=retWonStats(myRPts,meTag);
  const oppRetWon=retWonStats(oppRPts,oppTag);

  // Break Points
  const myBPFaced=mySPts.filter(p=>p.isBreakPoint);
  const oppBPFaced=oppSPts.filter(p=>p.isBreakPoint);
  const myBPSaved=myBPFaced.filter(p=>p.winner===meTag);
  const oppBPSaved=oppBPFaced.filter(p=>p.winner===oppTag);
  const myBPChances=myRPts.filter(p=>p.isBreakPoint);
  const oppBPChances=oppRPts.filter(p=>p.isBreakPoint);
  const myBPConv=myBPChances.filter(p=>p.winner===meTag);
  const oppBPConv=oppBPChances.filter(p=>p.winner===oppTag);

  // Games Won
  const gameEnds=points.filter(p=>p.gameEnd);
  const myServiceGames=gameEnds.filter(p=>p.server===meTag);
  const myServiceGamesWon=myServiceGames.filter(p=>p.gameWonBy===meTag);
  const oppServiceGames=gameEnds.filter(p=>p.server===oppTag);
  const oppServiceGamesWon=oppServiceGames.filter(p=>p.gameWonBy===oppTag);
  const myReturnGamesWon=oppServiceGames.filter(p=>p.gameWonBy===meTag);
  const oppReturnGamesWon=myServiceGames.filter(p=>p.gameWonBy===oppTag);

  // Winners (by shot type + forehand/backhand)
  const countWinners=tag=>{
    const shots=["Rt","St","Vl","Sm","Dr"];
    const r={total:0,fTotal:0,bTotal:0};
    shots.forEach(s=>{
      const arr=points.filter(p=>p.pattern?.shotType===s&&p.pattern.result==="W"&&p.patternOwner===tag&&p.winner===tag);
      const f=arr.filter(p=>p.pattern.hand==="f").length;
      const b=arr.filter(p=>p.pattern.hand==="b").length;
      r[s]={count:arr.length,f,b,fPct:arr.length>0?Math.round(100*f/arr.length):0,bPct:arr.length>0?Math.round(100*b/arr.length):0};
      r.total+=arr.length;r.fTotal+=f;r.bTotal+=b;
    });
    r.fPct=r.total>0?Math.round(100*r.fTotal/r.total):0;
    r.bPct=r.total>0?Math.round(100*r.bTotal/r.total):0;
    return r;
  };
  const countErrors=(tag,forced)=>{
    const shots=["Rt","St","Vl","Sm","Dr"];
    const r={total:0,fTotal:0,bTotal:0};
    const ownerOfError=tag===meTag?oppTag:meTag;
    shots.forEach(s=>{
      const arr=points.filter(p=>p.pattern?.shotType===s&&p.pattern.result==="E"&&p.pattern.forced===forced&&p.patternOwner===ownerOfError&&p.winner===ownerOfError);
      const f=arr.filter(p=>p.pattern.hand==="f").length;
      const b=arr.filter(p=>p.pattern.hand==="b").length;
      r[s]={count:arr.length,f,b,fPct:arr.length>0?Math.round(100*f/arr.length):0,bPct:arr.length>0?Math.round(100*b/arr.length):0};
      r.total+=arr.length;r.fTotal+=f;r.bTotal+=b;
    });
    r.fPct=r.total>0?Math.round(100*r.fTotal/r.total):0;
    r.bPct=r.total>0?Math.round(100*r.bTotal/r.total):0;
    return r;
  };
  const myWinners=countWinners(meTag),oppWinners=countWinners(oppTag);
  const myUE=countErrors(meTag,"U"),oppUE=countErrors(oppTag,"U");
  const myFE=countErrors(meTag,"F"),oppFE=countErrors(oppTag,"F");

  // Total points won
  const myTotalWon=points.filter(p=>p.winner===meTag).length;
  const oppTotalWon=points.filter(p=>p.winner===oppTag).length;

  // Net points (Vl/Sm/Dr = ネット系)
  const netShots=["Vl","Sm","Dr"];
  const myNetPts=points.filter(p=>p.pattern&&netShots.includes(p.pattern.shotType)&&p.patternOwner===meTag&&p.winner===meTag);
  const oppNetPts=points.filter(p=>p.pattern&&netShots.includes(p.pattern.shotType)&&p.patternOwner===oppTag&&p.winner===oppTag);

  // Tennis DB独自: W/UE, UE Rate, Winner Rate, Keep/Break Rate, Serve/Return Rating
  const div=(a,b)=>b>0?+(a/b).toFixed(2):null;
  const pct=(a,b)=>b>0?Math.round(100*a/b):0;
  const myWUE=div(myWinners.total,myUE.total);
  const oppWUE=div(oppWinners.total,oppUE.total);
  const myUERate=pct(myUE.total,points.length);
  const oppUERate=pct(oppUE.total,points.length);
  const myWinnerRate=pct(myWinners.total,points.length);
  const oppWinnerRate=pct(oppWinners.total,points.length);
  const myKeep=pct(myServiceGamesWon.length,myServiceGames.length);
  const oppKeep=pct(oppServiceGamesWon.length,oppServiceGames.length);
  const myBreak=pct(myReturnGamesWon.length,oppServiceGames.length);
  const oppBreak=pct(oppReturnGamesWon.length,myServiceGames.length);

  // Serve Rating = 1st% + 1stWon% + 2ndWon% + BPSaved% + SvcPtsWon%
  const myServePtsWon=fraq(mySPts.filter(p=>p.winner===meTag).length,mySPts.length);
  const oppServePtsWon=fraq(oppSPts.filter(p=>p.winner===oppTag).length,oppSPts.length);
  const myReturnPtsWon=fraq(myRPts.filter(p=>p.winner===meTag).length,myRPts.length);
  const oppReturnPtsWon=fraq(oppRPts.filter(p=>p.winner===oppTag).length,oppRPts.length);
  const myServeRating=myServe.total.firstIn.pct+myServe.total.firstWon.pct+myServe.total.secondWon.pct+(myBPFaced.length>0?pct(myBPSaved.length,myBPFaced.length):100)+myServePtsWon.pct;
  const oppServeRating=oppServe.total.firstIn.pct+oppServe.total.firstWon.pct+oppServe.total.secondWon.pct+(oppBPFaced.length>0?pct(oppBPSaved.length,oppBPFaced.length):100)+oppServePtsWon.pct;
  // Return Rating = 1stRetWon% + 2ndRetWon% + BPConv% + RetPtsWon%
  const myReturnRating=myRetWon.firstReturnWon.pct+myRetWon.secondReturnWon.pct+(myBPChances.length>0?pct(myBPConv.length,myBPChances.length):0)+myReturnPtsWon.pct;
  const oppReturnRating=oppRetWon.firstReturnWon.pct+oppRetWon.secondReturnWon.pct+(oppBPChances.length>0?pct(oppBPConv.length,oppBPChances.length):0)+oppReturnPtsWon.pct;

  return{
    service:{
      aces:{me:myAces,opp:oppAces},
      doubleFaults:{me:myDF,opp:oppDF},
      firstServeIn:{me:myServe.total.firstIn,opp:oppServe.total.firstIn,meDeuce:my1stSide.deuce,meAd:my1stSide.ad,oppDeuce:opp1stSide.deuce,oppAd:opp1stSide.ad},
      firstServeWon:{me:myServe.total.firstWon,opp:oppServe.total.firstWon,meDeuce:myServe.deuce.firstWon,meAd:myServe.ad.firstWon,oppDeuce:oppServe.deuce.firstWon,oppAd:oppServe.ad.firstWon},
      secondServeWon:{me:myServe.total.secondWon,opp:oppServe.total.secondWon,meDeuce:myServe.deuce.secondWon,meAd:myServe.ad.secondWon,oppDeuce:oppServe.deuce.secondWon,oppAd:oppServe.ad.secondWon},
      breakPointsSaved:{me:fraq(myBPSaved.length,myBPFaced.length),opp:fraq(oppBPSaved.length,oppBPFaced.length)},
      servicePointsWon:{me:myServePtsWon,opp:oppServePtsWon},
      serviceGamesWon:{me:fraq(myServiceGamesWon.length,myServiceGames.length),opp:fraq(oppServiceGamesWon.length,oppServiceGames.length)},
    },
    returnStats:{
      firstReturnIn:{me:myRetIn.total.firstReturnIn,opp:oppRetIn.total.firstReturnIn,meDeuce:myRetIn.deuce.firstReturnIn,meAd:myRetIn.ad.firstReturnIn,oppDeuce:oppRetIn.deuce.firstReturnIn,oppAd:oppRetIn.ad.firstReturnIn},
      secondReturnIn:{me:myRetIn.total.secondReturnIn,opp:oppRetIn.total.secondReturnIn,meDeuce:myRetIn.deuce.secondReturnIn,meAd:myRetIn.ad.secondReturnIn,oppDeuce:oppRetIn.deuce.secondReturnIn,oppAd:oppRetIn.ad.secondReturnIn},
      firstReturnWon:{me:myRetWon.firstReturnWon,opp:oppRetWon.firstReturnWon},
      secondReturnWon:{me:myRetWon.secondReturnWon,opp:oppRetWon.secondReturnWon},
      breakPointsConverted:{me:fraq(myBPConv.length,myBPChances.length),opp:fraq(oppBPConv.length,oppBPChances.length)},
      returnPointsWon:{me:myReturnPtsWon,opp:oppReturnPtsWon},
      returnGamesWon:{me:fraq(myReturnGamesWon.length,oppServiceGames.length),opp:fraq(oppReturnGamesWon.length,myServiceGames.length)},
    },
    pointsStats:{
      totalPointsWon:{me:fraq(myTotalWon,points.length),opp:fraq(oppTotalWon,points.length)},
      winners:{me:myWinners,opp:oppWinners},
      unforcedErrors:{me:myUE,opp:oppUE},
      forcedErrors:{me:myFE,opp:oppFE},
      netPointsWon:{me:fraq(myNetPts.length,points.filter(p=>p.pattern&&netShots.includes(p.pattern.shotType)&&p.patternOwner===meTag).length),opp:fraq(oppNetPts.length,points.filter(p=>p.pattern&&netShots.includes(p.pattern.shotType)&&p.patternOwner===oppTag).length)},
    },
    derived:{
      wueRatio:{me:myWUE,opp:oppWUE},
      ueRate:{me:myUERate,opp:oppUERate},
      winnerRate:{me:myWinnerRate,opp:oppWinnerRate},
      keepRate:{me:myKeep,opp:oppKeep},
      breakRate:{me:myBreak,opp:oppBreak},
      serveRating:{me:myServeRating,opp:oppServeRating},
      returnRating:{me:myReturnRating,opp:oppReturnRating},
    },
  };
};

// ── MATCH STATS DISPLAY (ATP-style 2-column comparison) ──
const fmtPct=v=>v==null?"—":v+"%";
const fmtFraq=f=>!f||f.total===0?"—":`${f.pct}%(${f.won}/${f.total})`;
const StatRow=({label,me,opp,higher="me",sub,fmt="fraq",small=false})=>{
  const pad=sub?"6px 10px":"10px 12px";
  const left=fmt==="fraq"?fmtFraq(me):fmt==="pct"?fmtPct(me):fmt==="num"?(me==null?"—":me):fmt==="ratio"?(me==null?"—":me.toFixed(2)):me;
  const right=fmt==="fraq"?fmtFraq(opp):fmt==="pct"?fmtPct(opp):fmt==="num"?(opp==null?"—":opp):fmt==="ratio"?(opp==null?"—":opp.toFixed(2)):opp;
  const mePct=fmt==="fraq"?(me?.pct||0):fmt==="pct"?(me||0):0;
  const oppPct=fmt==="fraq"?(opp?.pct||0):fmt==="pct"?(opp||0):0;
  const meWin=fmt==="num"?(me>opp):fmt==="ratio"?(me>opp):(mePct>oppPct);
  const oppWin=fmt==="num"?(opp>me):fmt==="ratio"?(opp>me):(oppPct>mePct);
  const cME=meWin?C.accent:C.text,cOPP=oppWin?C.accent:C.text;
  const barW=v=>Math.max(2,Math.min(100,v));
  return <div style={{display:"grid",gridTemplateColumns:"1fr auto 1fr",gap:8,padding:pad,borderBottom:`1px solid ${C.border}22`,alignItems:"center"}}>
    <div style={{textAlign:"right"}}>
      <div style={{fontSize:small?11:13,fontWeight:meWin?700:600,color:cME,fontFamily:"monospace"}}>{left}</div>
      {fmt==="fraq"&&me?.total>0&&<div style={{height:3,background:C.border,borderRadius:2,marginTop:3,overflow:"hidden"}}>
        <div style={{width:`${barW(me.pct)}%`,height:"100%",background:meWin?C.accent:C.textMuted,marginLeft:"auto",float:"right"}}/>
      </div>}
    </div>
    <div style={{fontSize:small?10:11,color:C.textMuted,fontWeight:sub?400:600,minWidth:90,textAlign:"center",padding:"0 4px"}}>{label}</div>
    <div style={{textAlign:"left"}}>
      <div style={{fontSize:small?11:13,fontWeight:oppWin?700:600,color:cOPP,fontFamily:"monospace"}}>{right}</div>
      {fmt==="fraq"&&opp?.total>0&&<div style={{height:3,background:C.border,borderRadius:2,marginTop:3,overflow:"hidden"}}>
        <div style={{width:`${barW(opp.pct)}%`,height:"100%",background:oppWin?C.accent:C.textMuted}}/>
      </div>}
    </div>
  </div>;
};
const ShotRow=({label,me,opp})=>{
  const fmt=v=>v.count===0?"0":`${v.count}(${v.fPct}%/${v.bPct}%)`;
  return <div style={{display:"grid",gridTemplateColumns:"1fr auto 1fr",gap:8,padding:"5px 10px",alignItems:"center"}}>
    <div style={{fontSize:12,color:C.text,fontFamily:"monospace",textAlign:"right"}}>{fmt(me)}</div>
    <div style={{fontSize:10,color:C.textMuted,minWidth:90,textAlign:"center"}}>{label}</div>
    <div style={{fontSize:12,color:C.text,fontFamily:"monospace",textAlign:"left"}}>{fmt(opp)}</div>
  </div>;
};

function CsvImportModal({onImport,onClose,myPlayerName}){
  const[csvText,setCsvText]=useState("");
  const[preview,setPreview]=useState(null);
  const[error,setError]=useState("");
  const handleFile=e=>{
    const f=e.target.files[0];if(!f)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      setCsvText(ev.target.result);
      try{
        const parsed=parseStatsCSV(ev.target.result,myPlayerName);
        const stats=computeMatchStats(parsed);
        setPreview({parsed,stats});setError("");
      }catch(err){setError(err.message);setPreview(null);}
    };
    reader.readAsText(f);
  };
  const handleImport=()=>{
    if(!preview)return;
    onImport({source:"datatennis",importedAt:new Date().toISOString(),raw:preview.parsed.rows,points:preview.parsed.points,stats:preview.stats,playerA:preview.parsed.playerA,playerB:preview.parsed.playerB,myIsA:preview.parsed.myIsA});
  };
  return <div style={{position:"fixed",inset:0,background:"#0006",zIndex:600,display:"flex",alignItems:"flex-start",justifyContent:"center",overflowY:"auto",padding:20}} onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:12,width:"100%",maxWidth:500,padding:20}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <span style={{fontSize:14,fontWeight:700,color:C.text}}>📊 データテニスCSV取込</span>
        <button onClick={onClose} style={{background:"none",border:"none",fontSize:18,cursor:"pointer",color:C.textMuted,padding:4}}>✕</button>
      </div>
      <div style={{fontSize:12,color:C.textMuted,marginBottom:12,padding:"8px 10px",background:C.panel2,borderRadius:6,borderLeft:`2px solid ${C.accent}`}}>データテニスアプリから出力したCSVファイルを選択してください。</div>
      <input type="file" accept=".csv" onChange={handleFile} style={{width:"100%",padding:"10px",border:`1px dashed ${C.border}`,borderRadius:6,marginBottom:12,fontSize:12}}/>
      {error&&<div style={{fontSize:12,color:C.red,padding:"8px 10px",background:C.redBg,borderRadius:6,marginBottom:12}}>❌ {error}</div>}
      {preview&&<div style={{marginBottom:12,fontSize:12,color:C.text,padding:"8px 10px",background:C.accentBg,borderRadius:6}}>
        ✅ プレビュー: {preview.parsed.playerA} vs {preview.parsed.playerB} ({preview.parsed.points.length}ポイント)<br/>
        <span style={{fontSize:11,color:C.textMuted}}>自分: {preview.parsed.myIsA?preview.parsed.playerA:preview.parsed.playerB}</span>
      </div>}
      {preview&&<div style={{maxHeight:300,overflowY:"auto",background:C.panel2,borderRadius:6,padding:10,marginBottom:12}}>
        <MatchStatsView stats={preview.stats} playerA={preview.parsed.playerA} playerB={preview.parsed.playerB} myIsA={preview.parsed.myIsA}/>
      </div>}
      <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
        <button onClick={onClose} style={{padding:"10px 20px",borderRadius:8,background:C.panel2,border:`1px solid ${C.border}`,color:C.textMuted,fontSize:13,fontWeight:600,cursor:"pointer"}}>キャンセル</button>

      </div>
    </div>

}

const ROUND_OPTS=[{value:"1回戦",label:"1回戦"},{value:"2回戦",label:"2回戦"},{value:"3回戦",label:"3回戦"},{value:"準々決勝",label:"準々決勝"},{value:"準決勝",label:"準決勝"},{value:"決勝",label:"決勝"},{value:"予選",label:"予選"},{value:"エキシビション",label:"エキシビション"}];

const fmtTensionV3=(m,c)=>{const a=m||"";const b=c||"";if(!a&&!b)return"";if(a&&b&&a!==b)return`${a}/${b}`;return a||b;};

      <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:14}}>

function MatchRow({match,trn,opponents,onUpdate,onEditMatch,onDeleteMatch}){
  const[expanded,setExpanded]=useState(false);
  const[showGames,setShowGames]=useState(false);
  const[showStats,setShowStats]=useState(false);
  const[csvModal,setCsvModal]=useState(false);
  const handleCsvImport=data=>{onUpdate({...match,matchStats:data});setCsvModal(false);setShowStats(true);};
  const handleStatsRemove=()=>{const{matchStats,...rest}=match;onUpdate(rest);};
  const games=match.games||[];
  const score=games.reduce((a,g)=>({me:a.me+(g.winner==="me"?1:0),opp:a.opp+(g.winner==="opp"?1:0)}),{me:0,opp:0});

      <div style={{display:"flex",gap:1,flexShrink:0}}>
        {[1,2,3,4,5].map(n=><div key={n} style={{width:2,height:10,borderRadius:1,background:n<=match.mental?mc:C.border}}/>)}
      </div>
      <div style={{color:C.textMuted,fontSize:12,transform:expanded?"rotate(90deg)":"none",transition:"transform 0.2s"}}>▶</div>
    </div>
    {expanded&&<div style={{padding:"12px 14px",background:C.panel2,borderTop:`1px solid ${C.border}`}}>
      {/* スコア & 情報 */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
        <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:6,padding:"8px 12px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:11,color:C.accent}}>私</div>
            <div style={{fontSize:22,fontWeight:800,color:C.accent,fontFamily:"monospace"}}>{score.me}</div>
          </div>
          <div style={{fontSize:12,color:C.textMuted}}>—</div>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:11,color:C.red}}>相手</div>
            <div style={{fontSize:22,fontWeight:800,color:C.red,fontFamily:"monospace"}}>{score.opp}</div>
          </div>
        </div>
        <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:6,padding:"8px 12px"}}>
          <div style={{fontSize:11,color:C.textMuted,marginBottom:4}}>セットスコア</div>
          <div style={{fontSize:14,color:C.text,fontWeight:700}}>{(match.setScores||[]).join(", ")||"—"}</div>
          {match.racketName&&<div style={{fontSize:11,color:C.accent,marginTop:4}}>🖊 {match.racketName}{[match.stringMain,match.stringCross].filter(Boolean).length?` / ${[match.stringMain,match.stringCross].filter(Boolean).join(" / ")}`:""}{(match.tensionMain||match.tensionCross)?` / ${fmtTensionV3(match.tensionMain,match.tensionCross)}p`:""}</div>}
        </div>
      </div>
      {/* メンタル/フィジカル */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
        {[["メンタル",match.mental],["フィジカル",match.physical]].map(([l,v])=>(
          <div key={l} style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:6,padding:"7px 10px"}}>
            <div style={{fontSize:11,color:C.textMuted,marginBottom:4}}>{l}</div>
            <div style={{display:"flex",gap:2,marginBottom:2}}>
              {[1,2,3,4,5].map(n=><div key={n} style={{flex:1,height:4,borderRadius:2,background:n<=v?scColor(v):C.border}}/>)}

        {showGames?"▲ ゲーム記録を閉じる":`▼ ゲーム記録を開く（${games.length}ゲーム）`}

      {showGames&&<div style={{marginTop:8,padding:10,background:C.panel,borderRadius:6,border:`1px solid ${C.border}`}}><GameTracker match={match} onChange={onUpdate}/></div>}

          <div style={{display:"flex",gap:8,marginTop:10}}>

          </div>
        </div>}
      </>:<button onClick={()=>setCsvModal(true)} style={{width:"100%",background:C.panel,border:`1px dashed ${C.border}`,color:C.textMuted,borderRadius:6,padding:"8px",fontSize:12,cursor:"pointer",marginTop:8,fontWeight:600}}>📊 データテニスCSV取込</button>}

      <div style={{display:"flex",gap:8,marginTop:10}}>
        <button onClick={onEditMatch} style={{flex:1,padding:10,borderRadius:6,background:C.panel,border:`1px solid ${C.border}`,color:C.text,fontSize:12,fontWeight:600,cursor:"pointer"}}>✏️ 編集</button>
        <button onClick={onDeleteMatch} style={{padding:"10px 16px",borderRadius:6,background:C.redBg,border:`1px solid ${C.red}`,color:C.red,fontSize:12,fontWeight:700,cursor:"pointer"}}>🗑</button>

function TournamentDetail({tournament,rackets,strings,stringSetups,venues,onAddVenue,opponents,onSave,onDelete,onClose}){
  const[f,setF]=useState({...tournament});
  const[matchModal,setMatchModal]=useState(null);
  const s=k=>v=>setF(p=>({...p,[k]:v}));
  const cfm=useConfirm();
  const matches=f.matches||[];
  const wins=matches.filter(m=>m.result==="勝利").length;

  const blankMatch=()=>({id:genId(),round:`${matches.length+1}回戦`,opponent:"",opponent2:"",racketName:f.racketName||"",stringMain:f.stringMain||"",stringCross:f.stringCross||"",tensionMain:f.tensionMain||"",tensionCross:f.tensionCross||"",result:"勝利",setScores:[],mental:3,physical:3,mentalNote:"",techNote:"",opponentNote:"",note:"",games:[],changeovers:[]});

  const handleAddMatch=()=>setMatchModal({match:blankMatch()});
  const handleSaveMatch=form=>{
    const exists=matches.find(m=>m.id===form.id);
    const newMatches=exists?matches.map(m=>m.id===form.id?form:m):[...matches,form];
    setF(p=>({...p,matches:newMatches}));
    setMatchModal(null);
  };
  const handleUpdateMatch=updated=>{
    setF(p=>({...p,matches:matches.map(m=>m.id===updated.id?updated:m)}));
  };
  const handleDeleteMatch=id=>{
    cfm.ask("この試合記録を削除しますか？",()=>{
      setF(p=>({...p,matches:matches.filter(m=>m.id!==id)}));
    });
  };
  const handleDelete=()=>cfm.ask("この大会記録を削除しますか？",()=>onDelete(f.id));

  return <div style={{position:"fixed",inset:0,background:C.bg,zIndex:500,display:"flex",flexDirection:"column"}}>
    {cfm.el}
    <div style={{padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",background:C.panel,borderBottom:`1px solid ${C.border}`,flexShrink:0}}>
      <button onClick={onClose} style={{background:"none",border:"none",fontSize:14,cursor:"pointer",color:C.accent,padding:4,fontWeight:600}}>← 戻る</button>
      <span style={{fontSize:15,fontWeight:700}}>🏆 大会</span>
      <button onClick={handleDelete} style={{background:"none",border:"none",fontSize:14,cursor:"pointer",color:C.red,padding:4,fontWeight:600}}>🗑</button>
    </div>
    <div style={{flex:1,overflowY:"auto",padding:16}}>
      {/* 大会基本情報 */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
        <Field label="日付" value={f.date} onChange={s("date")} type="date"/>
        <Field label="大会名" value={f.name||""} onChange={s("name")} placeholder="インスピ 中上級S"/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
        <FSelect label="クラス" value={f.level||""} onChange={s("level")} options={[{value:"中上級",label:"中上級"},{value:"オープン",label:"オープン"},{value:"中級",label:"中級"},{value:"市民大会",label:"市民大会"},{value:"一般",label:"一般"},{value:"交流戦",label:"交流戦"},{value:"草トー",label:"草トー"}]}/>
        <FSelect label="種目" value={f.type||"singles"} onChange={s("type")} options={[{value:"singles",label:"シングルス"},{value:"doubles",label:"ダブルス"},{value:"mixed",label:"ミックス"}]}/>
      </div>
      <VenueSelect label="会場" value={f.venue||""} onChange={s("venue")} venues={venues} onAddVenue={onAddVenue}/>
      <FSelect label="結果" value={f.overallResult||""} onChange={s("overallResult")} options={[{value:"",label:"— 未定 —"},{value:"優勝",label:"優勝🏆"},{value:"準優勝",label:"準優勝🥈"},{value:"予選突破",label:"予選突破"},{value:"準決勝敗退",label:"準決勝敗退"},{value:"決勝敗退",label:"決勝敗退"},{value:"予選敗退",label:"予選敗退"},{value:"敗退",label:"敗退"}]}/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"0 10px"}}>
        <Field label="気温（℃）" value={f.temp||""} onChange={s("temp")} placeholder="15"/>
        <Field label="テンション縦" value={f.tensionMain||""} onChange={s("tensionMain")} placeholder="46"/>
        <Field label="テンション横" value={f.tensionCross||""} onChange={s("tensionCross")} placeholder="43"/>
      </div>
      <FSelect label="天気" value={f.weather||""} onChange={s("weather")} options={[{value:"",label:"—"},{value:"晴",label:"☀ 晴"},{value:"曇",label:"☁ 曇"},{value:"雨",label:"🌧 雨"},{value:"屋内",label:"🏠 屋内"}]}/>

      <div style={{fontSize:12,color:C.accent,margin:"10px 0 8px",paddingBottom:5,borderBottom:`1px solid ${C.border}`}}>▶ 機材</div>
      <FSelect label="ラケット" value={f.racketName||""} onChange={s("racketName")} options={getRacketOpts(rackets)}/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
        <FSelect label="縦糸" value={f.stringMain||""} onChange={s("stringMain")} options={getStringOpts(strings)}/>
        <FSelect label="横糸" value={f.stringCross||""} onChange={s("stringCross")} options={[{value:"",label:"-- 同じ --"},...getStringOpts(strings).slice(1)]}/>
      </div>

      <Field label="📝 大会総括" value={f.generalNote||""} onChange={s("generalNote")} multiline placeholder="その日の大会を通じての気づき..."/>

      {/* サマリー */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:10,marginBottom:10}}>
        <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:6,padding:"8px 12px",textAlign:"center"}}>
          <div style={{fontSize:11,color:C.textMuted}}>試合数</div>
          <div style={{fontSize:18,fontWeight:700,color:C.text}}>{matches.length}</div>
        </div>
        <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:6,padding:"8px 12px",textAlign:"center"}}>
          <div style={{fontSize:11,color:C.textMuted}}>勝敗</div>
          <div style={{fontSize:18,fontWeight:700,color:C.accent}}>{wins}<span style={{fontSize:12,color:C.textMuted}}>勝</span>{matches.length-wins}<span style={{fontSize:12,color:C.textMuted}}>敗</span></div>
        </div>
      </div>

      {/* 試合一覧 */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",margin:"14px 0 8px",paddingBottom:5,borderBottom:`1px solid ${C.border}`}}>
        <span style={{fontSize:12,color:C.accent,fontWeight:700}}>▶ 試合記録</span>
        <button onClick={handleAddMatch} style={{background:C.accent,border:"none",color:"#fff",borderRadius:5,padding:"4px 12px",fontSize:12,fontWeight:700,cursor:"pointer"}}>＋ 試合を追加</button>
      </div>
      {matches.length===0?<div style={{padding:16,textAlign:"center",color:C.textMuted,fontSize:12,background:C.panel2,borderRadius:6,border:`1px dashed ${C.border}`}}>「＋ 試合を追加」から各試合を記録できます</div>
      :<div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:8,overflow:"hidden"}}>
        {matches.map(m=><MatchRow key={m.id} match={m} trn={f} opponents={opponents} onUpdate={handleUpdateMatch} onEditMatch={()=>setMatchModal({match:m})} onDeleteMatch={()=>handleDeleteMatch(m.id)}/>)}
      </div>}
    </div>
    <div style={{padding:16,paddingBottom:"calc(16px + env(safe-area-inset-bottom))",borderTop:`1px solid ${C.border}`,background:C.panel,flexShrink:0}}>
      <button onClick={()=>onSave(f)} style={{width:"100%",padding:14,borderRadius:10,background:C.accent,border:"none",color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer"}}>💾 保存</button>
    </div>
    {matchModal&&<MatchEditModal match={matchModal.match} trnType={f.type} rackets={rackets} strings={strings} opponents={opponents} onSave={handleSaveMatch} onClose={()=>setMatchModal(null)}/>}
  </div>;
}

// ── PRACTICE DETAIL (full-screen, edit/delete) ────
function PracticeDetail({practice,rackets,strings,stringSetups,venues,onAddVenue,onSave,onDelete,onClose}){
  const[f,setF]=useState({...practice});
  const s=k=>v=>setF(p=>{
    const n={...p,[k]:v};
    if((k==="startTime"||k==="endTime")&&n.startTime&&n.endTime){
      const[sh,sm]=n.startTime.split(":").map(Number);
      const[eh,em]=n.endTime.split(":").map(Number);
      if(!isNaN(sh)&&!isNaN(eh)){
        const mins=(eh*60+em)-(sh*60+sm);
        if(mins>0)n.duration=String(mins);
      }
    }
    return n;
  });
  const cfm=useConfirm();
  const handleDelete=()=>{cfm.ask("この練習記録を削除しますか？",()=>{onDelete(f.id);});};
  const typeOpts=[{value:"",label:"--"},{value:"スクール",label:"🏫 スクール"},{value:"自主練",label:"🎾 自主練"},{value:"練習会",label:"👥 練習会"},{value:"ゲーム練習",label:"⚔️ ゲーム練習"},{value:"球出し",label:"🏐 球出し"},{value:"練習試合",label:"🎯 練習試合"},{value:"フィジカル",label:"💪 フィジカル"}];
  const hasWatch=f.calories||f.heartRateAvg||f.hrZone1;
  return <div style={{position:"fixed",inset:0,background:C.bg,zIndex:500,display:"flex",flexDirection:"column"}}>
    {cfm.el}
    <div style={{padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",background:C.panel,borderBottom:`1px solid ${C.border}`,flexShrink:0}}>
      <button onClick={onClose} style={{background:"none",border:"none",fontSize:14,cursor:"pointer",color:C.accent,padding:4,fontWeight:600}}>← 戻る</button>
      <span style={{fontSize:15,fontWeight:700}}>🏃 練習記録</span>
      <button onClick={handleDelete} style={{background:"none",border:"none",fontSize:14,cursor:"pointer",color:C.red,padding:4,fontWeight:600}}>🗑</button>
    </div>
    <div style={{flex:1,overflowY:"auto",padding:16}}>
      {/* 基本情報 */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
        <Field label="日付" value={f.date} onChange={s("date")} type="date"/>
        <VenueSelect label="場所" value={f.venue||""} onChange={s("venue")} venues={venues} onAddVenue={onAddVenue}/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
        <FSelect label="種別" value={f.type||""} onChange={s("type")} options={typeOpts}/>
        <Field label="気温（℃）" value={f.temp||""} onChange={s("temp")} placeholder="18"/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"0 10px"}}>
        <Field label="開始時刻" value={f.startTime||""} onChange={s("startTime")} type="time"/>
        <Field label="終了時刻" value={f.endTime||""} onChange={s("endTime")} type="time"/>
        <Field label="時間（分）" value={f.duration||""} onChange={s("duration")} placeholder="90"/>
      </div>
      <FSelect label="天気" value={f.weather||""} onChange={s("weather")} options={[{value:"",label:"—"},{value:"晴",label:"☀ 晴"},{value:"曇",label:"☁ 曇"},{value:"雨",label:"🌧 雨"},{value:"屋内",label:"🏠 屋内"}]}/>

      {/* Watch連携 */}
      {hasWatch&&<div style={{marginBottom:10,background:"#fff7ed",border:"1px solid #f97316",borderRadius:8,padding:"10px 12px"}}>
        <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap",marginBottom:8}}>
          <span style={{fontSize:13,color:"#f97316",fontWeight:700}}>⌚ Apple Watch</span>
          {f.timeRange&&<span style={{fontSize:12,color:C.textMuted}}>{f.timeRange}</span>}
          {f.workoutLocation&&<span style={{fontSize:12,color:C.textMuted}}>📍{f.workoutLocation}</span>}
          {f.difficulty&&<span style={{fontSize:12,color:C.purple}}>難易度{f.difficulty}</span>}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,marginBottom:f.hrZone1?10:0}}>
          {f.duration&&<div style={{background:C.panel,borderRadius:5,padding:"6px 10px"}}><div style={{fontSize:10,color:C.textMuted}}>⏱ 時間</div><div style={{fontSize:14,fontWeight:700,color:C.text}}>{f.duration}分</div></div>}
          {f.calories&&<div style={{background:C.panel,borderRadius:5,padding:"6px 10px"}}><div style={{fontSize:10,color:C.textMuted}}>🔥 Active</div><div style={{fontSize:14,fontWeight:700,color:"#f97316"}}>{f.calories}</div></div>}
          {f.heartRateAvg&&<div style={{background:C.panel,borderRadius:5,padding:"6px 10px"}}><div style={{fontSize:10,color:C.textMuted}}>💓 平均</div><div style={{fontSize:14,fontWeight:700,color:"#fca5a5"}}>{f.heartRateAvg}</div></div>}
          {f.totalCalories&&<div style={{background:C.panel,borderRadius:5,padding:"6px 10px"}}><div style={{fontSize:10,color:C.textMuted}}>🔥 合計</div><div style={{fontSize:14,fontWeight:700,color:"#f97316"}}>{f.totalCalories}</div></div>}
        </div>
        {f.hrZone1&&(()=>{
          const parseMin=s=>{if(!s)return 0;const p=String(s).split(":");return(parseInt(p[0])||0)+(parseInt(p[1])||0)/60;};
          const toMinLabel=s=>{if(!s)return"0分";const p=String(s).split(":");const m=parseInt(p[0])||0;const sec=parseInt(p[1])||0;return sec>0?`${m}分${sec}秒`:`${m}分`;};
          const zones=[
            {label:"ウォームアップ",bpm:"<122",time:f.hrZone1,color:"#3b82f6",raw:parseMin(f.hrZone1)},
            {label:"脂肪燃焼",bpm:"123-134",time:f.hrZone2,color:"#06b6d4",raw:parseMin(f.hrZone2)},
            {label:"有酸素",bpm:"135-147",time:f.hrZone3,color:"#eab308",raw:parseMin(f.hrZone3)},
            {label:"無酸素",bpm:"148-159",time:f.hrZone4,color:"#f97316",raw:parseMin(f.hrZone4)},
            {label:"最大心拍",bpm:"160+",time:f.hrZone5,color:"#ef4444",raw:parseMin(f.hrZone5)},
          ];
          const total=zones.reduce((s,z)=>s+z.raw,0)||1;
          return <div>
            <div style={{fontSize:12,color:"#f97316",marginBottom:8,fontWeight:700}}>💓 心拍ゾーン</div>
            <div style={{display:"flex",height:8,borderRadius:4,overflow:"hidden",marginBottom:10}}>
              {zones.map((z,i)=><div key={i} style={{width:`${(z.raw/total)*100}%`,background:z.color,minWidth:z.raw>0?2:0}}/>)}
            </div>
            {zones.map((z,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:6,marginBottom:5}}>
              <div style={{width:10,height:10,borderRadius:2,background:z.color,flexShrink:0}}/>
              <div style={{width:70,fontSize:11,color:C.text,fontWeight:600,flexShrink:0}}>{z.label}</div>
              <div style={{width:48,fontSize:10,color:C.textMuted,flexShrink:0}}>{z.bpm}</div>
              <div style={{flex:1,background:"#e5e7eb",borderRadius:3,height:16,overflow:"hidden",minWidth:0}}>
                <div style={{width:`${(z.raw/total)*100}%`,height:"100%",background:z.color,borderRadius:3,minWidth:z.raw>0?3:0,display:"flex",alignItems:"center",justifyContent:"flex-end",paddingRight:4}}>
                  {z.raw/total>0.12&&<span style={{fontSize:10,color:"#000",fontWeight:700}}>{Math.round(z.raw/total*100)}%</span>}
                </div>
              </div>
              <div style={{width:50,fontSize:10,color:z.color,fontWeight:700,textAlign:"right",flexShrink:0}}>{toMinLabel(z.time)}</div>
            </div>)}
            {f.recoveryHR&&<div style={{marginTop:8,fontSize:12,color:C.textMuted,display:"flex",alignItems:"center",gap:6}}>🫀 回復心拍 <span style={{color:"#86efac",fontWeight:700,fontSize:12}}>{f.recoveryHR}</span></div>}
          </div>;
        })()}
      </div>}

      {/* 機材 */}
      <div style={{fontSize:12,color:C.accent,margin:"12px 0 8px",paddingBottom:5,borderBottom:`1px solid ${C.border}`}}>▶ 機材</div>
      <FSelect label="ラケット" value={f.racketName||""} onChange={s("racketName")} options={getRacketOpts(rackets)}/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
        <FSelect label="縦糸" value={f.stringMain||""} onChange={s("stringMain")} options={getStringOpts(strings)}/>
        <FSelect label="横糸" value={f.stringCross||""} onChange={s("stringCross")} options={[{value:"",label:"-- 同じ --"},...getStringOpts(strings).slice(1)]}/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
        <Field label="テンション縦" value={f.tensionMain||""} onChange={s("tensionMain")} placeholder="46"/>
        <Field label="テンション横" value={f.tensionCross||""} onChange={s("tensionCross")} placeholder="43"/>
      </div>

      {/* 評価 */}
      <div style={{fontSize:12,color:C.accent,margin:"12px 0 8px",paddingBottom:5,borderBottom:`1px solid ${C.border}`}}>▶ 内容・評価</div>
      <Stars label="フィジカルコンディション" value={f.physical||0} onChange={s("physical")}/>
      <Field label="🎯 フォーカスポイント" value={f.focus||""} onChange={s("focus")} multiline placeholder="ラケットダウン / フォロースルー拡大 / セミオープンスタンス..."/>
      <Field label="📋 コーチメモ" value={f.coachNote||""} onChange={s("coachNote")} multiline placeholder="コーチから言われたこと..."/>
      <Field label="✅ よかった点" value={f.goodNote||""} onChange={s("goodNote")} multiline placeholder="できるようになったこと..."/>
      <Field label="🔧 改善点" value={f.improveNote||""} onChange={s("improveNote")} multiline placeholder="次回意識したいこと..."/>
      <Field label="📝 メモ" value={f.generalNote||""} onChange={s("generalNote")} multiline placeholder="その他気づき..."/>
    </div>
    <div style={{padding:16,paddingBottom:"calc(16px + env(safe-area-inset-bottom))",borderTop:`1px solid ${C.border}`,background:C.panel,flexShrink:0}}>
      <button onClick={()=>onSave(f)} style={{width:"100%",padding:14,borderRadius:10,background:C.accent,border:"none",color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer"}}>💾 保存</button>
    </div>
  </div>;
}

// ── SESSIONS TAB (B+C: 3 months default + jump selector) ──
function SessionsTab({tournaments,setTournaments,practices,setPractices,trials,setTrials,rackets,strings,stringSetups,venues,setVenues,opponents,toast,pendingRecord,onPendingRecordDone,onDetailOpenChange}){
  const[filter,setFilter]=useState("all");
  const[modal,setModal]=useState(null);
  const[detailPractice,setDetailPractice]=useState(null);
  const[detailTournament,setDetailTournament]=useState(null);
  useEffect(()=>{if(onDetailOpenChange)onDetailOpenChange(!!detailPractice||!!detailTournament);},[detailPractice,detailTournament]);
  const[expandedMonths,setExpandedMonths]=useState(()=>{try{const v=localStorage.getItem("yuke-session-months");return v?JSON.parse(v):{};}catch{return{};}});
  const[expandedYears,setExpandedYears]=useState(()=>{try{const v=localStorage.getItem("yuke-session-years");return v?JSON.parse(v):{};}catch{return{};}});
  const[showAllMonths,setShowAllMonths]=useState(false);
  const[jumpTarget,setJumpTarget]=useState("");

  useEffect(()=>{
    if(pendingRecord){
      setModal({type:pendingRecord,isNew:true,data:pendingRecord==="tournaments"?{id:genId(),date:today(),name:"",level:"",type:"singles",venue:"",racketName:"",stringSetup:"",tension:"",temp:"",overallResult:"",generalNote:"",matches:[]}:pendingRecord==="practices"?{id:genId(),date:today(),type:"",venue:"",duration:"",racketName:"",stringSetup:"",tension:"",temp:"",focus:"",coachNote:"",goodNote:"",improveNote:"",generalNote:""}:{id:genId(),date:today(),racketName:"",stringMain:"",stringCross:"",tensionMain:"",tensionCross:"",temp:"",venue:"",judgment:"",spin:0,control:0,power:0,feel:0,info:0,maneuver:0,swingThrough:0,trajectory:0,stiffness:0,shotForeAtk:0,shotForeDef:0,shotBackAtk:0,shotBackDef:0,shotSlice:0,shotServe:0,shotVolley:0,shotReturn:0,confidence:0,generalNote:""}});
      onPendingRecordDone();
    }
  },[pendingRecord]);

  useEffect(()=>{try{localStorage.setItem("yuke-session-months",JSON.stringify(expandedMonths));}catch{}},[expandedMonths]);
  useEffect(()=>{try{localStorage.setItem("yuke-session-years",JSON.stringify(expandedYears));}catch{}},[expandedYears]);

  const toggleMonth=key=>{setExpandedMonths(prev=>({...prev,[key]:!prev[key]}));};
  const toggleYear=year=>{setExpandedYears(prev=>({...prev,[year]:!prev[year]}));};

  // Build all items
  const allItems=useMemo(()=>{
    let items=[];
    if(filter==="all"||filter==="tournaments")(tournaments||[]).forEach(t=>items.push({type:"tournament",id:t.id,date:t.date,data:t}));
    if(filter==="all"||filter==="practices")(practices||[]).forEach(p=>items.push({type:"practice",id:p.id,date:p.date,data:p}));
    if(filter==="all"||filter==="trials")(trials||[]).forEach(t=>items.push({type:"trial",id:t.id,date:t.date,data:t}));
    return items.sort((a,b)=>(normDate(b.date)||"").localeCompare(normDate(a.date)||""));
  },[tournaments,practices,trials,filter]);

  // Group by year-month
  const allMonths=useMemo(()=>{
    const monthMap={};
    allItems.forEach(item=>{
      const nd=normDate(item.date);const m=nd.match(/(\d{4})-(\d{2})/);if(!m)return;
      const ym=`${m[1]}-${m[2]}`;
      if(!monthMap[ym])monthMap[ym]={label:`${parseInt(m[1])}年${parseInt(m[2])}月`,items:[],key:ym};
      monthMap[ym].items.push(item);
    });
    return Object.values(monthMap).sort((a,b)=>b.key.localeCompare(a.key));
  },[allItems]);

  // B+C: Show only 3 most recent months by default, or all if toggled / jumped
  const recentMonths=allMonths.slice(0,3);
  const olderMonths=allMonths.slice(3);
  // Group older months by year for 2-level hierarchy
  const olderByYear=useMemo(()=>{
    const yearMap={};
    olderMonths.forEach(m=>{
      const year=m.key.split("-")[0];
      if(!yearMap[year])yearMap[year]={year,label:year+"年",months:[],totalItems:0};
      yearMap[year].months.push(m);
      yearMap[year].totalItems+=m.items.length;
    });
    return Object.values(yearMap).sort((a,b)=>b.year.localeCompare(a.year));
  },[olderMonths]);

  // Jump selector options
  const jumpOptions=useMemo(()=>[{value:"",label:"📅 月を選択してジャンプ"},...allMonths.map(m=>({value:m.key,label:`${m.label} (${m.items.length}件)`}))]
  ,[allMonths]);

  // Handle jump
  const handleJump=ym=>{
    if(!ym)return;
    const year=ym.split("-")[0];
    setShowAllMonths(true);
    setExpandedYears(prev=>({...prev,[year]:true}));
    setExpandedMonths(prev=>({...prev,[ym]:true}));
    setJumpTarget(ym);
    // Scroll to target after render
    setTimeout(()=>{
      const el=document.getElementById("month-"+ym);
      if(el)el.scrollIntoView({behavior:"smooth",block:"start"});
    },100);
  };

  const ResultBadge=({result})=>{
    if(!result)return null;
    const isHigh=result==="優勝"||result==="準優勝";
    if(isHigh){
      const ic=result==="優勝"?"🏆":"🥈";
      const c=result==="優勝"?C.accent:C.blue;
      const bg=result==="優勝"?C.accentBg:C.blueBg;
      return<span style={{display:"inline-flex",alignItems:"center",gap:4,fontSize:13,fontWeight:800,color:c,background:bg,border:`1.5px solid ${c}`,borderRadius:6,padding:"4px 10px",letterSpacing:"0.02em"}}>{ic} {result}</span>;
    }
    return<Badge color={RESULT_BADGE[result]||"gray"}>{result}</Badge>;
  };
  const TrialBadge=({judgment})=>{
    if(!judgment)return null;
    const c=judgment==="採用候補"?"green":judgment==="保留"?"yellow":"red";
    return<Badge color={c}>{judgment}</Badge>;
  };
  const renderItem=item=>{
    const d=item.data;
    const icon=item.type==="tournament"?"🏆":item.type==="practice"?"🏃":"🎾";
    const title=item.type==="tournament"?d.name:item.type==="practice"?(d.type||"練習")+(d.venue?" @ "+d.venue:""):`${d.racketName||""}${d.stringMain?" / "+d.stringMain:""}`;
    const timeStr=item.type==="practice"&&d.startTime?d.startTime+(d.endTime?"-"+d.endTime:""):"";
    const sub=item.type==="tournament"?`${d.level||""} · ${(d.matches||[]).length}試合`:item.type==="practice"?`${timeStr}${timeStr&&d.duration?" ("+d.duration+"分)":d.duration?d.duration+"分":""}${d.focus?" · "+d.focus:""}`:d.judgment||"";
    const handleClick=()=>{
      if(item.type==="practice")setDetailPractice(d);
      else if(item.type==="tournament")setDetailTournament(d);
    };
    const clickable=item.type==="practice"||item.type==="tournament";
    return <div key={item.id} onClick={clickable?handleClick:undefined} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 0",borderBottom:`1px solid ${C.border}22`,cursor:clickable?"pointer":"default"}}>
      <span style={{fontSize:16,flexShrink:0}}>{icon}</span>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontSize:12,fontWeight:600,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{title}</div>
        <div style={{fontSize:10,color:C.textMuted}}>{fmtDate(item.date)} {sub}</div>
        {item.type==="tournament"&&d.matches?.length>0&&<GameBar games={d.matches[d.matches.length-1]?.games}/>}
      </div>
      {item.type==="tournament"&&<ResultBadge result={d.overallResult}/>}
      {item.type==="trial"&&<TrialBadge judgment={d.judgment}/>}
      {clickable&&<span style={{fontSize:11,color:C.textMuted,flexShrink:0}}>›</span>}
    </div>;
  };

  const handleSave=(type,form)=>{
    if(type==="tournaments"){
      const arr=ds(form.id&&tournaments.find(t=>t.id===form.id)?tournaments.map(t=>t.id===form.id?form:t):[form,...(tournaments||[])]);
      setTournaments(arr);save(KEYS.tournaments,arr);
    }else if(type==="practices"){
      const arr=ds(form.id&&practices.find(p=>p.id===form.id)?practices.map(p=>p.id===form.id?form:p):[form,...(practices||[])]);
      setPractices(arr);save(KEYS.practices,arr);
    }else if(type==="trials"){
      const arr=ds(form.id&&trials.find(t=>t.id===form.id)?trials.map(t=>t.id===form.id?form:t):[form,...(trials||[])]);
      setTrials(arr);save(KEYS.trials,arr);
    }
    setModal(null);toast.show("💾 保存しました");
  };

  return <div style={{padding:10}}>
    {/* Filter + Jump Selector */}
    <div style={{display:"flex",gap:4,marginBottom:6}}>
      {[["all","全て"],["tournaments","🏆 大会"],["practices","🏃 練習"],["trials","🎾 試打"]].map(([k,l])=>
        <button key={k} onClick={()=>setFilter(k)} style={{padding:"6px 10px",borderRadius:6,border:`1px solid ${filter===k?C.accent:C.border}`,background:filter===k?C.accentBg:C.panel,color:filter===k?C.accent:C.textMuted,fontSize:11,fontWeight:600,cursor:"pointer"}}>{l}</button>
      )}
    </div>
    <select value="" onChange={e=>handleJump(e.target.value)} style={{width:"100%",padding:"8px 10px",borderRadius:6,border:`1px solid ${C.border}`,background:C.panel,color:C.text,fontSize:12,marginBottom:8,cursor:"pointer",minHeight:40}}>
      {jumpOptions.map(o=><option key={o.value} value={o.value}>{o.label}</option>)}
    </select>

    {/* Recent months (flat, no year header) */}
    {recentMonths.map(month=><div key={month.key} id={"month-"+month.key} style={{marginBottom:4}}>
      <div onClick={()=>toggleMonth(month.key)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 10px",background:C.panel,borderRadius:8,cursor:"pointer",border:`1px solid ${C.border}`}}>
        <span style={{fontSize:13,fontWeight:600,color:C.text}}>{month.label}</span>
        <span style={{fontSize:11,color:C.textMuted}}>({month.items.length}件) {expandedMonths[month.key]?"▼":"▶"}</span>
      </div>
      {expandedMonths[month.key]&&<div style={{padding:"4px 8px"}}>{month.items.map(renderItem)}</div>}
    </div>)}

    {/* Show older / collapse */}
    {!showAllMonths&&olderMonths.length>0&&<button onClick={()=>setShowAllMonths(true)} style={{width:"100%",padding:12,borderRadius:8,background:C.panel2,border:`1px solid ${C.border}`,color:C.textMuted,fontSize:12,fontWeight:600,cursor:"pointer",marginTop:8}}>📂 過去のデータを表示（{olderMonths.length}ヶ月分）</button>}

    {/* Older months: year > month 2-level hierarchy */}
    {showAllMonths&&olderByYear.map(yearGroup=><div key={yearGroup.year} style={{marginBottom:6}}>
      <div onClick={()=>toggleYear(yearGroup.year)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 12px",background:C.panel2,borderRadius:8,cursor:"pointer",border:`1px solid ${C.border}`,marginBottom:4}}>
        <span style={{fontSize:14,fontWeight:700,color:C.text}}>{yearGroup.label}</span>
        <span style={{fontSize:11,color:C.textMuted}}>({yearGroup.totalItems}件) {expandedYears[yearGroup.year]?"▼":"▶"}</span>
      </div>
      {expandedYears[yearGroup.year]&&<div style={{paddingLeft:8}}>
        {yearGroup.months.map(month=><div key={month.key} id={"month-"+month.key} style={{marginBottom:4}}>
          <div onClick={()=>toggleMonth(month.key)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 10px",background:C.panel,borderRadius:8,cursor:"pointer",border:`1px solid ${C.border}`}}>
            <span style={{fontSize:13,fontWeight:600,color:C.text}}>{parseInt(month.key.split("-")[1])}月</span>
            <span style={{fontSize:11,color:C.textMuted}}>({month.items.length}件) {expandedMonths[month.key]?"▼":"▶"}</span>
          </div>
          {expandedMonths[month.key]&&<div style={{padding:"4px 8px"}}>{month.items.map(renderItem)}</div>}
        </div>)}
      </div>}
    </div>)}

    {showAllMonths&&olderMonths.length>0&&<button onClick={()=>setShowAllMonths(false)} style={{width:"100%",padding:10,borderRadius:8,background:"none",border:`1px solid ${C.border}`,color:C.textMuted,fontSize:11,cursor:"pointer",marginTop:8}}>▲ 直近3ヶ月のみ表示</button>}

    {allItems.length===0&&<div style={{textAlign:"center",padding:40,color:C.textMuted,fontSize:13}}>データがありません</div>}

    {modal&&<RecordModal type={modal.type} data={modal.data} isNew={modal.isNew} rackets={rackets} strings={strings} stringSetups={stringSetups} venues={venues} onAddVenue={v=>{const nv=[...(venues||[]),v];setVenues(nv);save(KEYS.venues,nv);}} onSave={form=>handleSave(modal.type,form)} onClose={()=>setModal(null)}/>}
    {detailPractice&&<PracticeDetail practice={detailPractice} rackets={rackets} strings={strings} stringSetups={stringSetups} venues={venues} onAddVenue={v=>{const nv=[...(venues||[]),v];setVenues(nv);save(KEYS.venues,nv);}} onSave={form=>{const arr=ds((practices||[]).map(p=>p.id===form.id?form:p));setPractices(arr);save(KEYS.practices,arr);setDetailPractice(null);toast.show("💾 保存しました");}} onDelete={id=>{const arr=(practices||[]).filter(p=>p.id!==id);setPractices(arr);save(KEYS.practices,arr);setDetailPractice(null);toast.show("🗑 削除しました",C.red);}} onClose={()=>setDetailPractice(null)}/>}
    {detailTournament&&<TournamentDetail tournament={detailTournament} rackets={rackets} strings={strings} stringSetups={stringSetups} venues={venues} onAddVenue={v=>{const nv=[...(venues||[]),v];setVenues(nv);save(KEYS.venues,nv);}} opponents={opponents} onSave={form=>{const arr=ds((tournaments||[]).map(t=>t.id===form.id?form:t));setTournaments(arr);save(KEYS.tournaments,arr);setDetailTournament(null);toast.show("💾 保存しました");}} onDelete={id=>{const arr=(tournaments||[]).filter(t=>t.id!==id);setTournaments(arr);save(KEYS.tournaments,arr);setDetailTournament(null);toast.show("🗑 削除しました",C.red);}} onClose={()=>setDetailTournament(null)}/>}
  </div>;
}

// ── RECORD MODAL (unified) ────────────────────────

  const[f,setF]=useState({...data});
  const s=key=>val=>setF(prev=>({...prev,[key]:val}));
  const title=type==="tournaments"?"🏆 大会":type==="practices"?"🏃 練習":"🎾 試打";
  return <div style={{position:"fixed",inset:0,background:"#0008",zIndex:300,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
    <div style={{background:C.panel,borderRadius:"16px 16px 0 0",width:"100%",maxHeight:"85vh",overflowY:"auto",padding:16}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <span style={{fontSize:15,fontWeight:700}}>{title}{isNew?" 新規":"編集"}</span>
        <button onClick={onClose} style={{background:"none",border:"none",fontSize:18,cursor:"pointer",color:C.textMuted}}>✕</button>
      </div>
      <Field label="日付" value={f.date} onChange={s("date")} type="date"/>
      {type==="tournaments"&&<>
        <Field label="大会名" value={f.name||""} onChange={s("name")} placeholder="大会名"/>
        <FSelect label="レベル" value={f.level||""} onChange={s("level")} options={[{value:"",label:"--"},{value:"中級",label:"中級"},{value:"中上級",label:"中上級"},{value:"オープン",label:"オープン"},{value:"草トー",label:"草トー"},{value:"市民大会",label:"市民大会"},{value:"交流戦",label:"交流戦"}]}/>
        <FSelect label="種目" value={f.type||""} onChange={s("type")} options={[{value:"singles",label:"シングルス"},{value:"doubles",label:"ダブルス"},{value:"mixed",label:"ミックスダブルス"}]}/>
      </>}
      {type==="practices"&&<>
        <FSelect label="種類" value={f.type||""} onChange={s("type")} options={[{value:"",label:"--"},{value:"スクール",label:"スクール"},{value:"練習会",label:"練習会"},{value:"ゲーム練習",label:"ゲーム練習"},{value:"自主練",label:"自主練"}]}/>
        <Field label="時間（分）" value={f.duration||""} onChange={s("duration")} placeholder="120"/>
      </>}
      {type==="trials"&&<>
        <FSelect label="ラケット" value={f.racketName||""} onChange={s("racketName")} options={getRacketOpts(rackets)}/>
        <FSelect label="縦糸" value={f.stringMain||""} onChange={s("stringMain")} options={getStringOpts(strings)}/>
        <FSelect label="横糸" value={f.stringCross||""} onChange={s("stringCross")} options={[{value:"",label:"-- なし（単張り）--"},...getStringOpts(strings).slice(1)]}/>
        <div style={{display:"flex",gap:8}}>
          <Field label="縦テンション" value={f.tensionMain||""} onChange={s("tensionMain")} placeholder="43"/>
          <Field label="横テンション" value={f.tensionCross||""} onChange={s("tensionCross")} placeholder="43"/>
        </div>
      </>}
      {(type==="tournaments"||type==="practices")&&<>
        <VenueSelect label="会場" value={f.venue||""} onChange={s("venue")} venues={venues} onAddVenue={onAddVenue}/>
        <FSelect label="ラケット" value={f.racketName||""} onChange={s("racketName")} options={getRacketOpts(rackets)}/>
        <FSelect label="セッティング" value={f.stringSetup||""} onChange={s("stringSetup")} options={getSetupOpts(stringSetups,strings)}/>
        <Field label="テンション" value={f.tension||""} onChange={s("tension")} placeholder="43p"/>
      </>}
      <Field label="気温" value={f.temp||""} onChange={s("temp")} placeholder="18"/>
      {type==="tournaments"&&<FSelect label="結果" value={f.overallResult||""} onChange={s("overallResult")} options={[{value:"",label:"--"},{value:"優勝",label:"優勝"},{value:"準優勝",label:"準優勝"},{value:"決勝敗退",label:"決勝敗退"},{value:"準決勝敗退",label:"準決勝敗退"},{value:"敗退",label:"敗退"},{value:"予選敗退",label:"予選敗退"}]}/>}
      {type==="trials"&&<FSelect label="判定" value={f.judgment||""} onChange={s("judgment")} options={[{value:"",label:"--"},{value:"採用候補",label:"採用候補"},{value:"保留",label:"保留"},{value:"却下",label:"却下"}]}/>}
      {type==="practices"&&<Field label="フォーカス" value={f.focus||""} onChange={s("focus")} placeholder="今日の練習テーマ"/>}
      <Field label="メモ" value={f.generalNote||""} onChange={s("generalNote")} multiline placeholder="メモ"/>
      <button onClick={()=>onSave(f)} style={{width:"100%",padding:12,borderRadius:8,background:C.accent,border:"none",color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer",marginTop:8}}>💾 保存</button>
    </div>
  </div>;
}

// ── PLACEHOLDER TABS ──────────────────────────────

// ── TAB BAR ───────────────────────────────────────
function TabBar({tab,setTab}){
