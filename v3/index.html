// ═══ CLAUDE FORMATTERS ═══
const claudeFormatters={
profile:(d)=>{if(!d||!d.name)return"";const l=["# プロフィール",`${d.name} / ${d.level||""} / ${d.career||""}`];if(d.playStyle)l.push(`スタイル: ${d.playStyle}`);if(d.strengths)l.push(`強み: ${d.strengths}`);if(d.weaknesses)l.push(`課題: ${d.weaknesses}`);return l.join("\n");},
rackets:(list)=>{if(!list?.length)return"";const l=["# ラケット"];list.forEach(r=>{l.push(`\n## ${r.name}（${r.role||""}）[id:${r.id}]`,`${r.weight||""} / ${r.balance||""}`);if(r.note)l.push(r.note);});return l.join("\n");},
strings:(list)=>{if(!list?.length)return"";const l=["# ストリング在庫"];list.forEach(s=>l.push(`[${s.status}] ${s.name}(${s.qty}) ${s.note||""} [id:${s.id}]`));return l.join("\n");},
measurements:(list)=>{if(!list?.length)return"";const l=["# 実測値"];list.forEach(m=>l.push(`${m.current?"▶":"　"}${m.racket} ${m.state}: ${m.weight} / BP${m.balance} / G:${m.gripW}×${m.gripT} [id:${m.id}]`));return l.join("\n");},
tournaments:(list)=>{if(!list?.length)return"";const l=["# 大会記録"];list.forEach(t=>{const type=t.type==="singles"?"S":t.type==="doubles"?"D":"MIX";l.push(`\n## ${t.date} ${t.name||""} ${t.level}${type} → ${t.overallResult||"—"} [id:${t.id}]`);if(t.racketName)l.push(`機材: ${t.racketName}`);(t.matches||[]).forEach((m,i)=>l.push(`  ${m.round||`${i+1}回戦`} ${m.result} vs ${m.opponent||"?"} M${m.mental||3}/P${m.physical||3} [id:${m.id}]`));if(t.generalNote)l.push(`総括: ${t.generalNote}`);});return l.join("\n");},
practices:(list)=>{if(!list?.length)return"";const l=["# 練習記録"];list.forEach(p=>{l.push(`\n${p.date} ${p.type} ${p.duration||""}分 @${p.venue||"—"} [id:${p.id}]`);if(p.focus)l.push(`テーマ: ${p.focus}`);if(p.generalNote)l.push(`メモ: ${p.generalNote}`);});return l.join("\n");},
trials:(list)=>{if(!list?.length)return"";const l=["# 試打ノート"];[...list].sort((a,b)=>b.date.localeCompare(a.date)).forEach(t=>{const ten=fmtTension(t.tensionMain,t.tensionCross,t.tension);l.push(`\n## ${t.date} ${t.racketName||"—"} / ${t.stringMain||"—"}${t.stringCross?` × ${t.stringCross}`:""} / ${ten} → ${t.judgment} [id:${t.id}]`);l.push(`スピン${t.spin}/推進力${t.power}/コントロール${t.control}/打感情報${t.info}/操作性${t.maneuver||3}/振り抜き${t.swingThrough||3}`);if(t.generalNote)l.push(`総括: ${t.generalNote}`);});return l.join("\n");},
mental:(list)=>{if(!list?.length)return"";const l=["# メンタルノート"];list.forEach(m=>l.push(`[${m.category||m.tag}] ${m.title}: ${m.content} [id:${m.id}]`));return l.join("\n");},
next:(list)=>{if(!list?.length)return"";const l=["# Next Actions"];list.forEach(n=>l.push(`${n.done?"✅":"☐"} [${n.priority||"中"}] ${n.label}${n.detail?` — ${n.detail}`:""} [id:${n.id}]`));return l.join("\n");},
};
const formatTrialForClaude=t=>{const ten=[t.tensionMain,t.tensionCross].filter(Boolean).join("/")||t.tension||"—";const avg=((t.spin+t.power+t.control+t.info+(t.maneuver||3)+(t.swingThrough||3))/6).toFixed(1);const lines=[`## ${t.date} ${t.racketName||"—"} / ${t.stringMain||"—"}${t.stringCross?` × ${t.stringCross}`:""} / ${ten} → ${t.judgment}${t.linkedPracticeId?" [練習中]":""}${t.linkedMatchId?" [実戦]":""} [id:${t.id}]`];lines.push(`スピン${t.spin}/推進力${t.power}/コントロール${t.control}/打感情報${t.info}/操作性${t.maneuver||3}/振り抜き${t.swingThrough||3} (avg ${avg}) ${t.temp?t.temp+"℃":""}`);const tj=t.trajectory||3,sf=t.stiffness||3,cf=t.confidence||3;lines.push(`弾道${tj}(${tj<=2?"低め":tj>=4?"高め":"中間"}) 打感${sf}(${sf<=2?"柔らかめ":sf>=4?"硬め":"中間"}) 安心感${cf}`);const shots=[t.shotForeAtk&&`フォア攻${t.shotForeAtk}`,t.shotForeDef&&`フォア守${t.shotForeDef}`,t.shotBackAtk&&`バック攻${t.shotBackAtk}`,t.shotBackDef&&`バック守${t.shotBackDef}`,t.shotSlice&&`スライス${t.shotSlice}`,t.shotServe&&`サーブ${t.shotServe}`,t.shotVolley&&`ボレー${t.shotVolley}`,t.shotReturn&&`リターン${t.shotReturn}`].filter(Boolean);if(shots.length)lines.push(`ショット: ${shots.join("/")}`);if(t.strokeNote)lines.push(`ストローク: ${t.strokeNote}`);if(t.serveNote)lines.push(`サーブ: ${t.serveNote}`);if(t.volleyNote)lines.push(`ボレー: ${t.volleyNote}`);if(t.generalNote)lines.push(`総括: ${t.generalNote}`);return lines.join("\n");};
const formatMultipleTrialsForClaude=trials=>trials.map(t=>formatTrialForClaude(t)).join("\n\n---\n\n");
const formatMatchForClaude=(trn,match)=>{const type=trn.type==="singles"?"S":trn.type==="doubles"?"D":"MIX";const games=match.games||[];const score=games.reduce((a,g)=>({me:a.me+(g.winner==="me"?1:0),opp:a.opp+(g.winner==="opp"?1:0)}),{me:0,opp:0});return[`# 試合共有 [id:${trn.id}]`,`${trn.date} ${trn.name||""} ${trn.level}${type}`,`機材: ${trn.racketName||"—"} / ${fmtTension(trn.tensionMain,trn.tensionCross)}`,``,`## ${match.round||"—"} vs ${match.opponent||"?"} → ${match.result} [id:${match.id}]`,`ゲーム: ${score.me}-${score.opp}`,`メンタル: ${match.mental}/5 フィジカル: ${match.physical}/5`,games.length>0?`推移: ${games.map(g=>g.winner==="me"?"○":"×").join("")}`:"",match.note?`📝 ${match.note}`:""].filter(Boolean).join("\n");};
const formatTournamentAllForClaude=(trn)=>{const type=trn.type==="singles"?"S":trn.type==="doubles"?"D":"MIX";const l=[`# 大会全体 [id:${trn.id}]`,`${trn.date} ${trn.name||""} ${trn.level}${type} → ${trn.overallResult||"—"}`,`機材: ${trn.racketName||"—"} / ${fmtTension(trn.tensionMain,trn.tensionCross)}`];(trn.matches||[]).forEach(m=>{const games=m.games||[];const sc=games.reduce((a,g)=>({me:a.me+(g.winner==="me"?1:0),opp:a.opp+(g.winner==="opp"?1:0)}),{me:0,opp:0});l.push(`\n## ${m.round||"—"} vs ${m.opponent||"?"} → ${m.result} ${sc.me}-${sc.opp} [id:${m.id}]`);if(m.note)l.push(`📝 ${m.note}`);});if(trn.generalNote)l.push(`\n総括: ${trn.generalNote}`);return l.join("\n");};
const formatPracticeForClaude=(p)=>{const l=[`# 練習共有 [id:${p.id}]`,`${p.date} ${p.type} ${p.duration||""}分 @${p.venue||"—"}`];if(p.focus)l.push(`テーマ: ${p.focus}`);if(p.goodNote)l.push(`良: ${p.goodNote}`);if(p.improveNote)l.push(`改善: ${p.improveNote}`);if(p.coachNote)l.push(`コーチ: ${p.coachNote}`);if(p.generalNote)l.push(`メモ: ${p.generalNote}`);return l.join("\n");};

// ═══ #20 CLAUDE SHARE MODAL ═══
function ClaudeShareModal({onClose,data,toast}){
const cats=[["profile","プロフィール",data.profile],["rackets","ラケット",data.rackets],["strings","ストリング",data.strings],["measurements","実測値",data.measurements],["tournaments","大会",data.tournaments],["practices","練習",data.practices],["trials","試打",data.trials],["mental","メンタル",data.mental],["next","Next",data.next]];
const[sel,setSel]=useState(()=>Object.fromEntries(cats.map(([k])=>[k,true])));
const toggle=k=>setSel(p=>({...p,[k]:!p[k]}));
const selectAll=v=>setSel(Object.fromEntries(cats.map(([k])=>[k,v])));
const catSizes=cats.map(([k,label,d])=>{let t=claudeFormatters[k]?claudeFormatters[k](d):"";return[k,label,t?t.length:0];});
const fullText=cats.map(([k,,d])=>sel[k]&&claudeFormatters[k]?claudeFormatters[k](d):null).filter(Boolean).join("\n\n---\n\n");
const charCount=fullText.length;const tooLarge=charCount>80000;
const handleCopy=async()=>{await copyToClipboard(fullText,toast,`${(charCount/1000).toFixed(1)}k文字コピー完了 → Claudeに貼り付け`);onClose();};
return(<div style={{position:"fixed",inset:0,background:"#0004",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={e=>e.target===e.currentTarget&&onClose()}><div style={{background:C.panel,border:`1px solid ${C.purple}`,borderRadius:12,width:"100%",maxWidth:400,padding:20}} onClick={e=>e.stopPropagation()}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}><span style={{fontSize:15,fontWeight:700,color:C.purple}}>📋 Claude共有</span><button onClick={onClose} style={{background:"none",border:"none",color:C.textMuted,fontSize:18,cursor:"pointer"}}>✕</button></div><div style={{fontSize:12,color:C.textMuted,marginBottom:10}}>共有するカテゴリを選択 → コピー → Claudeに貼り付け</div><div style={{display:"flex",gap:6,marginBottom:10}}><button onClick={()=>selectAll(true)} style={{background:"none",border:`1px solid ${C.border}`,color:C.textDim,borderRadius:5,padding:"4px 10px",fontSize:12,cursor:"pointer"}}>全選択</button><button onClick={()=>selectAll(false)} style={{background:"none",border:`1px solid ${C.border}`,color:C.textDim,borderRadius:5,padding:"4px 10px",fontSize:12,cursor:"pointer"}}>全解除</button></div>{catSizes.map(([k,label,size])=>(<label key={k} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 10px",background:sel[k]?"#f5f3ff":"transparent",border:`1px solid ${sel[k]?C.purple:C.border}`,borderRadius:7,marginBottom:4,cursor:"pointer"}}><input type="checkbox" checked={sel[k]} onChange={()=>toggle(k)} style={{accentColor:C.purple,width:18,height:18}}/><span style={{flex:1,fontSize:13,color:sel[k]?C.text:C.textMuted,fontWeight:sel[k]?600:400}}>{label}</span><span style={{fontSize:12,color:C.textMuted,fontFamily:"monospace"}}>{size>0?`${(size/1000).toFixed(1)}k`:"-"}</span></label>))}<div style={{marginTop:12,padding:"10px 12px",background:C.panel2,borderRadius:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{fontSize:12,color:tooLarge?C.red:C.text,fontWeight:700}}>{(charCount/1000).toFixed(1)}k 文字</div></div><button onClick={handleCopy} disabled={tooLarge||charCount===0} style={{background:tooLarge||charCount===0?"#333":C.purple,border:"none",color:tooLarge?"#666":"#fff",borderRadius:8,padding:"10px 20px",fontSize:14,fontWeight:700,cursor:tooLarge?"not-allowed":"pointer"}}>📋 コピー</button></div></div></div>);
}

const[quickText,setQuickText]=useState("");
const addQuick=()=>{if(!quickText.trim())return;persistNext([{id:`nx${Date.now()}`,priority:"中",category:"準備",label:quickText.trim(),detail:"",done:false,doneAt:"",checklist:[],linkedTrialId:"",linkedType:""},...(next||[])]);setQuickText("");toast.show("✅ 追加 → 詳細はPlanタブで編集");};
const pending=(next||[]).filter(n=>!n.done).slice(0,5);
const todayStr=today();
const upcoming=[...(tournaments||[]).filter(t=>t.date>=todayStr).map(t=>({...t,_type:"trn"})),...(practices||[]).filter(p=>p.date>todayStr).map(p=>({...p,_type:"prac"}))].sort((a,b)=>a.date.localeCompare(b.date)).slice(0,5);
const pastTrn=(tournaments||[]).filter(t=>t.date<=todayStr).slice(0,5);
const catColor={検証:C.blue,準備:C.accent,買い物:C.orange,チェックリスト:C.purple};
return(<div style={{display:"grid",gap:14,gridTemplateColumns:"minmax(0,1fr)"}}>

<div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
{[["🏆","大会","tournaments"],["🏃","練習","practices"],["🎾","試打","trials"]].map(([icon,label,t])=>(<button key={t} onClick={()=>onRecord(t)} style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:10,padding:"16px 8px",textAlign:"center",cursor:"pointer"}}><div style={{fontSize:22,marginBottom:4}}>{icon}</div><div style={{fontSize:12,color:C.text,fontWeight:700}}>{label}を記録</div></button>))}

{pastTrn.map(t=>(<div key={t.id} style={{display:"flex",alignItems:"center",gap:8,marginBottom:5,fontSize:12}}><span style={{color:C.textMuted,fontFamily:"monospace",width:76}}>{t.date}</span><span style={{color:C.text,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.name}</span><span style={{color:t.overallResult==="優勝"?C.accent:t.overallResult==="準優勝"?C.yellow:C.textMuted,fontWeight:600}}>{t.overallResult}</span></div>))}

// ═══ #29-30 SESSIONS TAB ═══
function SessionsTab({tournaments,setTournaments,practices,setPractices,trials,setTrials,rackets,strings,stringSetups,opponents,onNewOpponent,venues,setVenues,toast,quickAdd,onQuickAddDone,pendingExpand,onExpandDone}){
const cfm=useConfirm();
const[filter,setFilter]=useState("all");
const[expanded,setExpanded]=useState(null);
const[modal,setModal]=useState(null); // {type:"tournament"|"practice"|"trial", data:{...}}
const[openMonths,setOpenMonths]=useState(()=>{try{const v=localStorage.getItem("yuke-practice-months");return v?JSON.parse(v):{};}catch{return{};}});

// Handle quickAdd
useEffect(()=>{if(quickAdd==="tournaments"){setModal({type:"tournament",data:blankTournament()});onQuickAddDone();}else if(quickAdd==="practices"){setModal({type:"practice",data:blankPractice()});onQuickAddDone();}else if(quickAdd==="trials"){setModal({type:"trial",data:blankTrial()});onQuickAddDone();}},[quickAdd]);
// Handle pendingExpand
useEffect(()=>{if(pendingExpand){setExpanded(pendingExpand);onExpandDone();}},[pendingExpand]);

// Build unified timeline
const allItems=useMemo(()=>{
const items=[];
(tournaments||[]).forEach(t=>items.push({...t,_type:"tournament",_sortDate:t.date}));
(practices||[]).forEach(p=>items.push({...p,_type:"practice",_sortDate:p.date}));
(trials||[]).forEach(t=>items.push({...t,_type:"trial",_sortDate:t.date}));
return items.filter(i=>filter==="all"||i._type===filter.replace(/s$/,"")).sort((a,b)=>(b._sortDate||"").localeCompare(a._sortDate||""));
},[tournaments,practices,trials,filter]);

// #79 2-tier fold: recent 12 months by month, older by year>month
const grouped=useMemo(()=>{
const now=new Date();const cutoff=new Date(now.getFullYear()-1,now.getMonth(),1);
const groups=new Map();
allItems.forEach(item=>{
const d=item._sortDate||"";const parts=d.split("/");
if(parts.length<2)return;
const y=parts[0],m=parts[1];
const itemDate=new Date(parseInt(y),parseInt(m)-1,1);
const key=itemDate>=cutoff?`${y}/${m}`:`${y}`;
if(!groups.has(key))groups.set(key,[]);
groups.get(key).push(item);
});
return[...groups.entries()];
},[allItems]);

const toggleMonth=key=>{const next={...openMonths,[key]:!openMonths[key]};setOpenMonths(next);try{localStorage.setItem("yuke-practice-months",JSON.stringify(next));}catch{}};

const resultColor=r=>r==="優勝"?"green":r==="準優勝"?"yellow":r==="敗退"||r==="予選敗退"?"red":"gray";
const jc={採用候補:"green",保留:"yellow",却下:"red"};

// Save handlers
const saveTournament=form=>{const isNew=!tournaments.find(t=>t.id===form.id);const updated=isNew?[form,...tournaments]:tournaments.map(t=>t.id===form.id?form:t);const sorted=ds(updated);setTournaments(sorted);save(KEYS.tournaments,sorted);setModal(null);toast.show(isNew?"✅ 大会を追加":"✅ 更新しました");};
const savePractice=form=>{const isNew=!practices.find(p=>p.id===form.id);const updated=isNew?[form,...practices]:practices.map(p=>p.id===form.id?form:p);const sorted=ds(updated);setPractices(sorted);save(KEYS.practices,sorted);setModal(null);toast.show(isNew?"✅ 練習を追加":"✅ 更新しました");};
const saveTrial=form=>{const isNew=!trials.find(t=>t.id===form.id);const updated=isNew?[form,...trials]:trials.map(t=>t.id===form.id?form:t);const sorted=ds(updated);setTrials(sorted);save(KEYS.trials,sorted);setModal(null);toast.show(isNew?"✅ 試打を追加":"✅ 更新しました");};
const deleteTournament=id=>{const bk=[...tournaments];cfm.ask("この大会記録を削除しますか？",()=>{const updated=tournaments.filter(t=>t.id!==id);setTournaments(updated);save(KEYS.tournaments,updated);setExpanded(null);toast.show("🗑 削除しました",C.red,()=>{setTournaments(bk);save(KEYS.tournaments,bk);});});};
const deletePractice=id=>{const bk=[...practices];cfm.ask("この練習記録を削除しますか？",()=>{const updated=practices.filter(p=>p.id!==id);setPractices(updated);save(KEYS.practices,updated);setExpanded(null);toast.show("🗑 削除しました",C.red,()=>{setPractices(bk);save(KEYS.practices,bk);});});};
const deleteTrial=id=>{const bk=[...trials];cfm.ask("この試打記録を削除しますか？",()=>{const updated=trials.filter(t=>t.id!==id);setTrials(updated);save(KEYS.trials,updated);setExpanded(null);toast.show("🗑 削除しました",C.red,()=>{setTrials(bk);save(KEYS.trials,bk);});});};

return(<div>
{cfm.el}
{/* Filter */}
<div style={{display:"flex",gap:4,marginBottom:12}}>
{[["all","全て"],["tournament","🏆 大会"],["practice","🏃 練習"],["trial","🎾 試打"]].map(([k,label])=>(<button key={k} onClick={()=>setFilter(k)} style={{flex:1,background:filter===k?C.accent:"none",border:`1px solid ${filter===k?C.accent:C.border}`,color:filter===k?"#fff":C.textMuted,borderRadius:6,padding:"8px 4px",fontSize:12,fontWeight:filter===k?700:400,cursor:"pointer"}}>{label}</button>))}
</div>
{/* Timeline */}
{grouped.map(([key,items])=>(<div key={key} style={{marginBottom:8}}>
<button onClick={()=>toggleMonth(key)} style={{width:"100%",textAlign:"left",background:C.panel2,border:`1px solid ${C.border}`,borderRadius:6,padding:"8px 12px",fontSize:12,fontWeight:700,color:C.textMuted,cursor:"pointer",display:"flex",justifyContent:"space-between"}}><span>{key}</span><span>{openMonths[key]?"▼":"▶"} {items.length}件</span></button>
{openMonths[key]&&items.map(item=>(
<div key={item.id} style={{background:C.panel,border:`1px solid ${expanded===item.id?C.accent:C.border}`,borderRadius:8,margin:"4px 0",overflow:"hidden"}}>
<div onClick={()=>setExpanded(expanded===item.id?null:item.id)} style={{display:"flex",alignItems:"center",gap:8,padding:"10px 12px",cursor:"pointer"}}>
<span style={{fontSize:14}}>{item._type==="tournament"?"🏆":item._type==="practice"?"🏃":"🎾"}</span>
<span style={{fontSize:12,color:C.textMuted,fontFamily:"monospace",width:72,flexShrink:0}}>{item.date}</span>
<span style={{fontSize:13,color:C.text,fontWeight:600,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
{item._type==="tournament"?item.name:item._type==="practice"?(item.type||"練習")+(item.venue?` @${item.venue}`:""):`${item.racketName||"—"} / ${item.stringMain||"—"}`}
</span>
{item._type==="tournament"&&item.overallResult&&<Badge color={resultColor(item.overallResult)} sm>{item.overallResult}</Badge>}
{item._type==="trial"&&item.judgment&&<Badge color={jc[item.judgment]||"gray"} sm>{item.judgment}</Badge>}
</div>
{/* Expanded detail */}
{expanded===item.id&&(<div style={{padding:"0 12px 12px",borderTop:`1px solid ${C.border}`}}>
{item._type==="tournament"&&<TournamentExpand trn={item} onEdit={()=>setModal({type:"tournament",data:item})} onDelete={()=>deleteTournament(item.id)} setTournaments={setTournaments} rackets={rackets} strings={strings} stringSetups={stringSetups} opponents={opponents} onNewOpponent={onNewOpponent} venues={venues} setVenues={setVenues} toast={toast}/>}
{item._type==="practice"&&<PracticeExpand prac={item} onEdit={()=>setModal({type:"practice",data:item})} onDelete={()=>deletePractice(item.id)} linkedTrials={(trials||[]).filter(t=>t.linkedPracticeId===item.id)} toast={toast}/>}
{item._type==="trial"&&<TrialExpand trial={item} onEdit={()=>setModal({type:"trial",data:item})} onDelete={()=>deleteTrial(item.id)} toast={toast}/>}
</div>)}
</div>
))}
</div>))}
{allItems.length===0&&<div style={{textAlign:"center",padding:40,color:C.textMuted,fontSize:13}}>まだ記録がありません</div>}
{/* Modals */}
{modal?.type==="tournament"&&<TournamentModal data={modal.data} onSave={saveTournament} onClose={()=>setModal(null)} rackets={rackets} strings={strings} stringSetups={stringSetups} venues={venues} setVenues={setVenues}/>}
{modal?.type==="practice"&&<PracticeModal data={modal.data} onSave={savePractice} onClose={()=>setModal(null)} rackets={rackets} strings={strings} stringSetups={stringSetups} venues={venues} setVenues={setVenues}/>}
{modal?.type==="trial"&&<TrialModal data={modal.data} onSave={saveTrial} onClose={()=>setModal(null)} rackets={rackets} strings={strings} venues={venues}/>}
</div>);
}

// #14-17 Import + merge
const handleImport=e=>{const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=ev=>{try{const d=JSON.parse(ev.target.result);const snap={tournaments:[...tournaments],practices:[...practices],trials:[...trials],rackets:[...rackets],strings:[...strings],measurements:[...measurements],mental:[...mental],next:[...next],profile:{...profile},venues:[...venues],stringSetups:[...stringSetups],opponents:[...opponents]};setImportSnapshot(snap);const merge=(existing,incoming,dupKey)=>{if(!Array.isArray(incoming))return incoming;const map=new Map(existing.map(item=>[item.id,item]));incoming.forEach(item=>{if(map.has(item.id)){map.set(item.id,{...map.get(item.id),...item});return;}if(dupKey){const dup=existing.find(e=>dupKey(e,item));if(dup)return;}map.set(item.id,item);});return[...map.values()].sort((a,b)=>(b.date||"").localeCompare(a.date||""));};const trnDup=(a,b)=>a.date&&b.date&&a.name&&b.name&&a.date===b.date&&a.name===b.name;const pracDup=(a,b)=>a.date&&b.date&&a.venue&&b.venue&&a.date===b.date&&a.venue===b.venue;const apply=(key,getter,setter,stoKey,dupKey)=>{if(d[key]){const merged=Array.isArray(d[key])?merge(getter,d[key],dupKey):({...getter,...d[key]});setter(merged);save(stoKey,merged);}};apply("tournaments",tournaments,setTournaments,KEYS.tournaments,trnDup);apply("practices",practices,setPractices,KEYS.practices,pracDup);apply("trials",trials,setTrials,KEYS.trials);apply("rackets",rackets,setRackets,KEYS.rackets);apply("strings",strings,setStrings,KEYS.strings);apply("measurements",measurements,setMeasurements,KEYS.measurements);apply("mental",mental,setMental,KEYS.mental);apply("next",next,setNext,KEYS.next);apply("profile",profile,setProfile,KEYS.profile);apply("venues",venues,setVenues,KEYS.venues);apply("stringSetups",stringSetups,setStringSetups,KEYS.stringSetups);toast.show("📥 インポート完了（↩️で取消可能）");}catch{toast.show("❌ 読み込み失敗",C.red);}};reader.readAsText(file);e.target.value="";};
const handleImportUndo=()=>{if(!importSnapshot)return;const s=importSnapshot;const restoreArr=(arr,setter,key)=>{setter(arr);save(key,arr);};restoreArr(s.tournaments,setTournaments,KEYS.tournaments);restoreArr(s.practices,setPractices,KEYS.practices);restoreArr(s.trials,setTrials,KEYS.trials);restoreArr(s.rackets,setRackets,KEYS.rackets);restoreArr(s.strings,setStrings,KEYS.strings);restoreArr(s.measurements,setMeasurements,KEYS.measurements);restoreArr(s.mental,setMental,KEYS.mental);restoreArr(s.next,setNext,KEYS.next);setProfile(s.profile);save(KEYS.profile,s.profile);restoreArr(s.venues,setVenues,KEYS.venues);restoreArr(s.stringSetups,setStringSetups,KEYS.stringSetups);restoreArr(s.opponents,setOpponents,KEYS.opponents);setImportSnapshot(null);toast.show("↩️ インポートを取り消しました");};
// #15 Paste import
const handlePasteImport=()=>{try{const d=JSON.parse(pasteText);const snap={tournaments:[...tournaments],practices:[...practices],trials:[...trials],rackets:[...rackets],strings:[...strings],measurements:[...measurements],mental:[...mental],next:[...next],profile:{...profile},venues:[...venues],stringSetups:[...stringSetups],opponents:[...opponents]};setImportSnapshot(snap);const merge=(existing,incoming,dupKey)=>{if(!Array.isArray(incoming))return incoming;const map=new Map(existing.map(item=>[item.id,item]));incoming.forEach(item=>{if(map.has(item.id)){map.set(item.id,{...map.get(item.id),...item});return;}if(dupKey){const dup=existing.find(e=>dupKey(e,item));if(dup)return;}map.set(item.id,item);});return[...map.values()].sort((a,b)=>(b.date||"").localeCompare(a.date||""));};const trnDup=(a,b)=>a.date&&b.date&&a.name&&b.name&&a.date===b.date&&a.name===b.name;const pracDup=(a,b)=>a.date&&b.date&&a.venue&&b.venue&&a.date===b.date&&a.venue===b.venue;const apply=(key,getter,setter,stoKey,dupKey)=>{if(d[key]){const merged=Array.isArray(d[key])?merge(getter,d[key],dupKey):({...getter,...d[key]});setter(merged);save(stoKey,merged);}};apply("tournaments",tournaments,setTournaments,KEYS.tournaments,trnDup);apply("practices",practices,setPractices,KEYS.practices,pracDup);apply("trials",trials,setTrials,KEYS.trials);apply("rackets",rackets,setRackets,KEYS.rackets);apply("strings",strings,setStrings,KEYS.strings);apply("measurements",measurements,setMeasurements,KEYS.measurements);apply("mental",mental,setMental,KEYS.mental);apply("next",next,setNext,KEYS.next);apply("profile",profile,setProfile,KEYS.profile);apply("venues",venues,setVenues,KEYS.venues);apply("stringSetups",stringSetups,setStringSetups,KEYS.stringSetups);setPasteImport(false);setPasteText("");toast.show("📥 貼り付けインポート完了（↩️で取消可能）");}catch{toast.show("❌ JSON解析失敗",C.red);}};

if(!ready)return<div style={{background:C.bg,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:C.textMuted,fontFamily:"sans-serif"}}>読み込み中...</div>;

return(<div style={{minHeight:"100vh",background:C.bg,color:C.text,fontFamily:"'DM Sans','Noto Sans JP',sans-serif",padding:"16px 14px"}}>
<style>{`@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap');*{box-sizing:border-box;margin:0;padding:0;}::-webkit-scrollbar{width:4px;height:4px;}::-webkit-scrollbar-track{background:${C.bg};}::-webkit-scrollbar-thumb{background:${C.border};border-radius:2px;}input,textarea,select{color-scheme:light;}button:hover{opacity:0.82;}`}</style>
{toast.el}
{/* Paste import modal */}
{pasteImport&&(<div style={{position:"fixed",inset:0,background:"#0004",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:20}} onClick={e=>e.target===e.currentTarget&&setPasteImport(false)}><div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:12,width:"100%",maxWidth:500,padding:20}}><div style={{fontSize:14,fontWeight:700,marginBottom:10}}>📋→📥 JSON貼り付けインポート</div><textarea value={pasteText} onChange={e=>setPasteText(e.target.value)} placeholder='{"tournaments":[...],...}' rows={10} style={{width:"100%",background:C.panel2,border:`1px solid ${C.border}`,borderRadius:8,padding:12,color:C.text,fontSize:12,fontFamily:"monospace",resize:"vertical",outline:"none"}}/><div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:10}}><button onClick={()=>{setPasteImport(false);setPasteText("");}} style={{background:C.panel2,border:`1px solid ${C.border}`,color:C.textMuted,borderRadius:8,padding:"10px 20px",fontSize:13,cursor:"pointer"}}>キャンセル</button><button onClick={handlePasteImport} disabled={!pasteText.trim()} style={{background:pasteText.trim()?C.accent:C.border,border:"none",color:"#fff",borderRadius:8,padding:"10px 20px",fontSize:13,fontWeight:700,cursor:pasteText.trim()?"pointer":"not-allowed"}}>インポート実行</button></div></div></div>)}
{showClaudeShare&&<ClaudeShareModal onClose={()=>setShowClaudeShare(false)} data={{profile,rackets,strings,measurements,tournaments,practices,trials,mental,next}} toast={toast}/>}
{/* #26 Backup warning */}
{daysSinceExport>=3&&(<div onClick={handleExport} style={{background:"#fef2f2",border:"1px solid #dc2626",borderRadius:8,padding:"10px 14px",marginBottom:12,display:"flex",alignItems:"center",gap:10,cursor:"pointer"}}><span style={{fontSize:16}}>⚠️</span><div style={{flex:1}}><div style={{fontSize:12,color:C.red,fontWeight:700}}>バックアップしてください</div><div style={{fontSize:12,color:"#fca5a5"}}>{lastExport?`最終: ${new Date(lastExport).toLocaleDateString("ja-JP")}`:"まだバックアップしていません"}（タップで📤）</div></div></div>)}
{/* Header */}
<div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12,flexWrap:"wrap",gap:6}}>
<div style={{minWidth:0}}>
<h1 style={{fontSize:19,fontWeight:800,letterSpacing:"-0.02em",background:`linear-gradient(90deg,${C.accent},#0891b2)`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",margin:0}}>ゆっけ Tennis DB</h1>
<div style={{fontSize:12,color:C.textMuted,marginTop:2}}>
{user?<span style={{color:syncing?"#fbbf24":"#60a5fa"}}>{syncing?"☁️ 同期中...":"☁️ "+user.email.split("@")[0]}</span>:<span style={{color:C.red}}>⚠ オフライン</span>}
{" · "}大会 {tournaments.length} / 練習 {practices.length} / 試打 {trials.length} <span style={{color:"#444",marginLeft:4}}>v{APP_VERSION}</span>
</div>
</div>
<div style={{display:"flex",gap:6,flexWrap:"wrap",justifyContent:"flex-end"}}>
<button onClick={toggleLarge} style={{background:large?"#ecfdf5":"#ffffff",border:`1px solid ${large?C.accent:C.border}`,color:large?C.accent:C.textMuted,borderRadius:6,padding:"6px 10px",fontSize:13,fontWeight:700,cursor:"pointer"}}>{large?"A↓":"A↑"}</button>
<button onClick={handleExport} style={{background:"#eff6ff",border:`1px solid ${C.blue}`,color:C.blue,borderRadius:6,padding:"6px 12px",fontSize:12,fontWeight:600,cursor:"pointer"}}>📤</button>
<button onClick={()=>setShowClaudeShare(true)} style={{background:"#f5f3ff",border:`1px solid ${C.purple}`,color:C.purple,borderRadius:6,padding:"6px 8px",fontSize:12,fontWeight:600,cursor:"pointer"}}>📋</button>
<button onClick={()=>importRef.current.click()} style={{background:"#ecfdf5",border:`1px solid ${C.accentDim}`,color:C.accent,borderRadius:6,padding:"6px 12px",fontSize:12,fontWeight:600,cursor:"pointer"}}>📥</button>
<button onClick={()=>setPasteImport(true)} style={{background:"#ecfdf5",border:`1px solid ${C.accentDim}`,color:C.accent,borderRadius:6,padding:"6px 8px",fontSize:12,fontWeight:600,cursor:"pointer"}}>📋→📥</button>
{importSnapshot&&<button onClick={handleImportUndo} style={{background:"#fef2f2",border:`1px solid ${C.red}`,color:C.red,borderRadius:6,padding:"6px 8px",fontSize:12,fontWeight:600,cursor:"pointer"}}>↩️</button>}
<input ref={importRef} type="file" accept=".json" onChange={handleImport} style={{display:"none"}}/>
{user?<button onClick={handleLogout} style={{background:"#f5f3ff",border:`1px solid ${C.purple}`,color:C.purple,borderRadius:6,padding:"6px 8px",fontSize:12,fontWeight:600,cursor:"pointer"}}>👤</button>:<button onClick={handleLogin} style={{background:"#ecfdf5",border:`1px solid ${C.accent}`,color:C.accent,borderRadius:6,padding:"6px 8px",fontSize:12,fontWeight:600,cursor:"pointer"}}>☁️</button>}
</div>
</div>
{/* Tab bar */}
<div style={{display:"flex",gap:2,background:C.panel,border:`1px solid ${C.border}`,borderRadius:8,padding:3,marginBottom:12}}>
{TABS.map(t=>(<button key={t.id} onClick={()=>setTab(t.id)} style={{flex:"1 1 auto",background:tab===t.id?C.accent:"none",border:"none",color:tab===t.id?"#fff":C.textMuted,borderRadius:5,padding:"10px 6px",fontSize:12,fontWeight:tab===t.id?700:400,cursor:"pointer",transition:"all 0.12s",whiteSpace:"nowrap",minHeight:44}}>{t.icon} {t.label}</button>))}
</div>
{/* Tab content */}
<div style={{zoom:large?1.22:1}}>
<ErrorBoundary>
{tab==="home"&&<HomeTab next={next} setNext={setNext} tournaments={tournaments} practices={practices} trials={trials} daysSinceExport={daysSinceExport} lastExport={lastExport} onExport={handleExport} onRecord={t=>{setTab("sessions");setQuickAdd(t);}} onGoToNext={()=>setTab("plan")} onNavigate={navigateTo} toast={toast}/>}
</ErrorBoundary>
<ErrorBoundary>
{tab==="sessions"&&<SessionsTab tournaments={tournaments} setTournaments={setTournaments} practices={practices} setPractices={setPractices} trials={trials} setTrials={setTrials} rackets={rackets} strings={strings} stringSetups={stringSetups} opponents={opponents} onNewOpponent={addOpponent} venues={venues} setVenues={v=>{setVenues(v);save(KEYS.venues,v);}} toast={toast} quickAdd={quickAdd} onQuickAddDone={()=>setQuickAdd(null)} pendingExpand={pendingExpand} onExpandDone={()=>setPendingExpand(null)}/>}
</ErrorBoundary>
<ErrorBoundary>{tab==="gear"&&<GearStub/>}</ErrorBoundary>
<ErrorBoundary>{tab==="plan"&&<PlanStub/>}</ErrorBoundary>
<ErrorBoundary>{tab==="insights"&&<InsightsStub/>}</ErrorBoundary>
</div>
</div>);
}
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(TennisDB));
</script>
</body>
</html>
