// ── SESSIONS TAB (B+C: 3 months default + jump selector) ──
function SessionsTab({tournaments,setTournaments,practices,setPractices,trials,setTrials,rackets,strings,stringSetups,venues,setVenues,opponents,profile,toast,pendingRecord,onPendingRecordDone,pendingDetail,onPendingDetailDone,onDetailOpenChange}){
  const[filter,setFilter]=useState("all");
  const[modal,setModal]=useState(null);
  const[editMode,setEditMode]=useState(false);
  const[selectedIds,setSelectedIds]=useState(new Set());
  const[expandedItem,setExpandedItem]=useState(null);
  const[detailPractice,setDetailPractice]=useState(null);
  const[detailTournament,setDetailTournament]=useState(null);
  const[detailTrial,setDetailTrial]=useState(null);
  useEffect(()=>{if(onDetailOpenChange)onDetailOpenChange(!!detailPractice||!!detailTournament||!!detailTrial);},[detailPractice,detailTournament,detailTrial]);
  useEffect(()=>{
    if(!pendingDetail)return;
    const{type,data}=pendingDetail;
    // 展開UIで開く（全画面編集ではなく）
    if(data?.id){
      setExpandedItem(data.id);
      // 該当月を展開
      const nd=normDate(data.date);
      const m=nd.match(/(\d{4})-(\d{2})/);
      if(m){
        const ym=`${m[1]}-${m[2]}`;
        setExpandedMonths(prev=>({...prev,[ym]:true}));
        // 古い月なら表示する
        setShowAllMonths(true);
        // 年も展開
        setExpandedYears(prev=>({...prev,[m[1]]:true}));
        // スクロール
        setTimeout(()=>{const el=document.getElementById("month-"+ym);if(el)el.scrollIntoView({behavior:"smooth",block:"start"});},200);
      }
    }
    if(onPendingDetailDone)onPendingDetailDone();
  },[pendingDetail]);
  const[expandedMonths,setExpandedMonths]=useState(()=>{try{const v=localStorage.getItem("yuke-session-months");return v?JSON.parse(v):{};}catch{return{};}});
  const[expandedYears,setExpandedYears]=useState(()=>{try{const v=localStorage.getItem("yuke-session-years");return v?JSON.parse(v):{};}catch{return{};}});
  const[showAllMonths,setShowAllMonths]=useState(false);
  const[jumpTarget,setJumpTarget]=useState("");

  useEffect(()=>{
    if(pendingRecord){
      setModal({type:pendingRecord,isNew:true,data:pendingRecord==="tournaments"?{id:genId(),date:today(),name:"",level:"",type:"singles",venue:"",racketName:"",stringSetup:"",tension:"",temp:"",overallResult:"",generalNote:"",matches:[]}:pendingRecord==="practices"?{id:genId(),date:today(),type:"",venue:"",duration:"",racketName:"",stringSetup:"",tension:"",temp:"",focus:"",coachNote:"",goodNote:"",improveNote:"",generalNote:""}:{id:genId(),date:today(),racketName:"",stringMain:"",stringCross:"",tensionMain:"",tensionCross:"",temp:"",venue:"",judgment:"",spin:0,control:0,power:0,feel:0,info:0,maneuver:0,swingThrough:0,trajectory:0,stiffness:0,shotForeAtk:0,shotForeDef:0,shotBackAtk:0,shotBackDef:0,shotSlice:0,shotServe:0,shotVolley:0,shotReturn:0,confidence:0,generalNote:""}});
      onPendingRecordDone();
    }
  },[pendingRecord]);

  useEffect(()=>{try{localStorage.setItem("yuke-session-months",JSON.stringify(expandedMonths));}catch{}},[expandedMonths]);
  useEffect(()=>{try{localStorage.setItem("yuke-session-years",JSON.stringify(expandedYears));}catch{}},[expandedYears]);

  const toggleMonth=key=>{setExpandedMonths(prev=>({...prev,[key]:!prev[key]}));};
  const toggleYear=year=>{setExpandedYears(prev=>({...prev,[year]:!prev[year]}));};

  // Build all items
  const allItems=useMemo(()=>{
    let items=[];
    if(filter==="all"||filter==="tournaments")(tournaments||[]).forEach(t=>items.push({type:"tournament",id:t.id,date:t.date,data:t}));
    if(filter==="all"||filter==="practices")(practices||[]).forEach(p=>items.push({type:"practice",id:p.id,date:p.date,data:p}));
    if(filter==="all"||filter==="trials")(trials||[]).forEach(t=>items.push({type:"trial",id:t.id,date:t.date,data:t}));
    return items.sort((a,b)=>(normDate(b.date)||"").localeCompare(normDate(a.date)||""));
  },[tournaments,practices,trials,filter]);

  // Group by year-month
  const allMonths=useMemo(()=>{
    const monthMap={};
    allItems.forEach(item=>{
      const nd=normDate(item.date);const m=nd.match(/(\d{4})-(\d{2})/);if(!m)return;
      const ym=`${m[1]}-${m[2]}`;
      if(!monthMap[ym])monthMap[ym]={label:`${parseInt(m[1])}年${parseInt(m[2])}月`,items:[],key:ym};
      monthMap[ym].items.push(item);
    });
    return Object.values(monthMap).sort((a,b)=>b.key.localeCompare(a.key));
  },[allItems]);

  // B+C: Show only 3 most recent months by default, or all if toggled / jumped
  const recentMonths=allMonths.slice(0,3);
  const olderMonths=allMonths.slice(3);
  // Group older months by year for 2-level hierarchy
  const olderByYear=useMemo(()=>{
    const yearMap={};
    olderMonths.forEach(m=>{
      const year=m.key.split("-")[0];
      if(!yearMap[year])yearMap[year]={year,label:year+"年",months:[],totalItems:0};
      yearMap[year].months.push(m);
      yearMap[year].totalItems+=m.items.length;
    });
    return Object.values(yearMap).sort((a,b)=>b.year.localeCompare(a.year));
  },[olderMonths]);

  // Jump selector options
  const jumpOptions=useMemo(()=>[{value:"",label:"📅 月を選択してジャンプ"},...allMonths.map(m=>({value:m.key,label:`${m.label} (${m.items.length}件)`}))]
  ,[allMonths]);

  // Handle jump
  const handleJump=ym=>{
    if(!ym)return;
    const year=ym.split("-")[0];
    setShowAllMonths(true);
    setExpandedYears(prev=>({...prev,[year]:true}));
    setExpandedMonths(prev=>({...prev,[ym]:true}));
    setJumpTarget(ym);
    // Scroll to target after render
    setTimeout(()=>{
      const el=document.getElementById("month-"+ym);
      if(el)el.scrollIntoView({behavior:"smooth",block:"start"});
    },100);
  };

  const ResultBadge=({result})=>{
    if(!result)return null;
    const isHigh=result==="優勝"||result==="準優勝";
    if(isHigh){
      const ic=result==="優勝"?"🏆":"🥈";
      const c=result==="優勝"?C.accent:C.blue;
      const bg=result==="優勝"?C.accentBg:C.blueBg;
      return<span style={{display:"inline-flex",alignItems:"center",gap:4,fontSize:13,fontWeight:800,color:c,background:bg,border:`1.5px solid ${c}`,borderRadius:6,padding:"4px 10px",letterSpacing:"0.02em"}}>{ic} {result}</span>;
    }
    return<Badge color={RESULT_BADGE[result]||"gray"}>{result}</Badge>;
  };
  const TrialBadge=({judgment})=>{
    if(!judgment)return null;
    const c=judgment==="採用候補"?"green":judgment==="保留"?"yellow":"red";
    return<Badge color={c}>{judgment}</Badge>;
  };
  const cfmBulk=useConfirm();
  const toggleSelect=id=>{setSelectedIds(prev=>{const n=new Set(prev);if(n.has(id))n.delete(id);else n.add(id);return n;});};
  const handleDetectDuplicates=()=>{
    const dupIds=new Set();
    const seen=new Map();
    allItems.forEach(item=>{
      let key=null;
      const d=item.data;
      const nd=normDate(item.date);
      if(item.type==="tournament")key=`t:${nd}:${d.name||""}`;
      else if(item.type==="practice")key=`p:${nd}:${normalizeVenue(d.venue||"")}`;
      else if(item.type==="trial")key=`tr:${nd}:${d.racketName||""}:${d.stringMain||""}`;
      if(!key)return;
      if(seen.has(key)){
        dupIds.add(item.id);
        dupIds.add(seen.get(key));
      }else{
        seen.set(key,item.id);
      }
    });
    setSelectedIds(dupIds);
    if(dupIds.size===0)toast.show("重複候補は見つかりませんでした",C.accent);
    else toast.show(`🔍 ${dupIds.size}件の重複候補を検出`,C.yellow);
  };
  const handleBulkDelete=()=>{
    if(selectedIds.size===0)return;
    cfmBulk.ask(`${selectedIds.size}件のデータを削除しますか？この操作は取り消せません。`,()=>{
      const ids=selectedIds;
      const newT=(tournaments||[]).filter(t=>!ids.has(t.id));
      const newP=(practices||[]).filter(p=>!ids.has(p.id));
      const newTr=(trials||[]).filter(t=>!ids.has(t.id));
      if(newT.length!==(tournaments||[]).length){setTournaments(newT);save(KEYS.tournaments,newT);}
      if(newP.length!==(practices||[]).length){setPractices(newP);save(KEYS.practices,newP);}
      if(newTr.length!==(trials||[]).length){setTrials(newTr);save(KEYS.trials,newTr);}
      toast.show(`🗑 ${ids.size}件を削除しました`,C.red);
      setSelectedIds(new Set());setEditMode(false);
    });
  };
  const typeLabel2={singles:"S",doubles:"D",mixed:"Mix"};
  const typeColor2={singles:"gray",doubles:"blue",mixed:"purple"};
  const renderItem=item=>{
    const d=item.data;
    const icon=item.type==="tournament"?"🏆":item.type==="practice"?"🏃":"🎾";
    const isExpanded=expandedItem===item.id;
    const isSelected=selectedIds.has(item.id);
    const handleClick=()=>{
      if(editMode){toggleSelect(item.id);return;}
      setExpandedItem(isExpanded?null:item.id);
    };
    // 大会の一覧行
    if(item.type==="tournament"){
      const wins=(d.matches||[]).filter(m=>m.result==="勝利").length;
      return <div key={item.id}>
        <div onClick={handleClick} style={{display:"flex",alignItems:"center",gap:4,padding:"8px 4px",borderBottom:`1px solid ${C.border}22`,cursor:"pointer",background:isSelected?C.redBg:isExpanded?"#f0f0f5":"transparent",borderLeft:isExpanded?`3px solid ${C.accent}`:"3px solid transparent"}}>
          {editMode&&<div style={{width:20,height:20,borderRadius:4,border:`2px solid ${isSelected?C.red:C.border}`,background:isSelected?C.red:"transparent",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>{isSelected&&<span style={{color:"#fff",fontSize:12,fontWeight:700}}>✓</span>}</div>}
          <span style={{fontSize:12,color:C.textMuted,fontFamily:"monospace",minWidth:52,flexShrink:0}}>{fmtDate(item.date)}</span>
          <Badge color={typeColor2[d.type]||"gray"} minWidth={32}>{typeLabel2[d.type]||d.type||"-"}</Badge>
          {!editMode&&(d.overallResult?<Badge color={RESULT_BADGE[d.overallResult]||"gray"} minWidth={60}>{d.overallResult==="優勝"?"🏆 優勝":d.overallResult==="準優勝"?"🥈 準優勝":d.overallResult}</Badge>:<span style={{minWidth:60,display:"inline-block",flexShrink:0}}/>)}
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:12,fontWeight:700,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{d.name}</div>
            <div style={{fontSize:10,color:C.textMuted}}>{wins}勝{(d.matches||[]).length-wins}敗{d.racketName?" · "+d.racketName:""}</div>
          </div>
          <span title={d.visibility==="private"?"非公開":"公開"} style={{fontSize:11,flexShrink:0,opacity:d.visibility==="private"?1:0.45}}>{d.visibility==="private"?"🔒":"🌐"}</span>
          <div style={{color:C.textMuted,fontSize:12,transform:isExpanded?"rotate(90deg)":"none",transition:"transform 0.2s",flexShrink:0}}>▶</div>
        </div>
        {isExpanded&&!editMode&&<TournamentExpanded trn={d} rackets={rackets} strings={strings} opponents={opponents} profile={profile} trials={trials} toast={toast} onUpdate={updated=>{const arr=ds((tournaments||[]).map(t=>t.id===updated.id?updated:t));setTournaments(arr);save(KEYS.tournaments,arr);}} onEdit={()=>setDetailTournament(d)} onDelete={()=>{const arr=(tournaments||[]).filter(t=>t.id!==d.id);setTournaments(arr);save(KEYS.tournaments,arr);setExpandedItem(null);toast.show("🗑 削除しました",C.red);}}/>}
      </div>;
    }
    // 練習の一覧行
    if(item.type==="practice"){
      const timeStr=d.startTime?d.startTime+(d.endTime?"-"+d.endTime:""):"";
      const pracTypeIcon={スクール:"🏫",自主練:"🎾",練習会:"👥",ゲーム練習:"⚔️",球出し:"🏐",練習試合:"🎯",フィジカル:"💪"};
      const pracTypeColor={スクール:"blue",自主練:"green",練習会:"gray",ゲーム練習:"purple",球出し:"yellow",練習試合:"purple",フィジカル:"orange"};
      return <div key={item.id}>
        <div onClick={handleClick} style={{display:"flex",alignItems:"center",gap:4,padding:"8px 4px",borderBottom:`1px solid ${C.border}22`,cursor:"pointer",background:isSelected?C.redBg:isExpanded?"#f0f0f5":"transparent",borderLeft:isExpanded?`3px solid ${C.blue}`:"3px solid transparent"}}>
          {editMode&&<div style={{width:20,height:20,borderRadius:4,border:`2px solid ${isSelected?C.red:C.border}`,background:isSelected?C.red:"transparent",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>{isSelected&&<span style={{color:"#fff",fontSize:12,fontWeight:700}}>✓</span>}</div>}
          <span style={{fontSize:12,color:C.textMuted,fontFamily:"monospace",minWidth:52,flexShrink:0}}>{fmtDate(item.date)}</span>
          <Badge color={pracTypeColor[d.type]||"gray"} minWidth={96}>{(pracTypeIcon[d.type]||"") + (d.type||"練習")}</Badge>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:12,fontWeight:600,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{d.venue||"（場所未入力）"}</div>
            <div style={{fontSize:10,color:C.textMuted}}>{timeStr}{timeStr&&d.duration?" ("+d.duration+"分)":d.duration?d.duration+"分":""}{d.racketName?" · "+d.racketName:""}{d.focus?" · "+d.focus.slice(0,20):""}</div>
          </div>
          {!editMode&&<PhysicalBar value={d.physical}/>}
          <span title={d.visibility==="private"?"非公開":"公開"} style={{fontSize:11,flexShrink:0,opacity:d.visibility==="private"?1:0.45}}>{d.visibility==="private"?"🔒":"🌐"}</span>
          <div style={{color:C.textMuted,fontSize:12,transform:isExpanded?"rotate(90deg)":"none",transition:"transform 0.2s",flexShrink:0}}>▶</div>
        </div>
        {isExpanded&&!editMode&&<PracticeExpanded practice={d} trials={trials} toast={toast} onEdit={()=>setDetailPractice(d)} onDelete={()=>{const arr=(practices||[]).filter(p=>p.id!==d.id);setPractices(arr);save(KEYS.practices,arr);setExpandedItem(null);toast.show("🗑 削除しました",C.red);}}/>}
      </div>;
    }
    // 試打の一覧行
    const jc3={採用候補:"green",保留:"yellow",却下:"red"};
    return <div key={item.id}>
      <div onClick={handleClick} style={{display:"flex",alignItems:"center",gap:4,padding:"8px 4px",borderBottom:`1px solid ${C.border}22`,cursor:"pointer",background:isSelected?C.redBg:isExpanded?"#f0f0f5":"transparent",borderLeft:isExpanded?`3px solid ${C.purple}`:"3px solid transparent"}}>
        {editMode&&<div style={{width:20,height:20,borderRadius:4,border:`2px solid ${isSelected?C.red:C.border}`,background:isSelected?C.red:"transparent",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>{isSelected&&<span style={{color:"#fff",fontSize:12,fontWeight:700}}>✓</span>}</div>}
        <span style={{fontSize:12,color:C.textMuted,fontFamily:"monospace",minWidth:52,flexShrink:0}}>{fmtDate(item.date)}</span>
        {!editMode&&(d.judgment?<Badge color={d.judgment==="採用候補"?"green":d.judgment==="保留"?"yellow":"red"} minWidth={96}>{d.judgment}</Badge>:<span style={{minWidth:96,display:"inline-block",flexShrink:0}}/>)}
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:12,fontWeight:600,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{d.racketName||"ラケット未選択"}</div>
          <div style={{fontSize:10,color:C.textMuted}}>{[d.stringMain,d.stringCross].filter(Boolean).join(" / ")}{d.tensionMain?" / "+fmtTensionV3(d.tensionMain,d.tensionCross)+"p":""}</div>
        </div>
        {!editMode&&<TrialAvg trial={d}/>}
        <div style={{color:C.textMuted,fontSize:12,transform:isExpanded?"rotate(90deg)":"none",transition:"transform 0.2s",flexShrink:0}}>▶</div>
      </div>
      {isExpanded&&!editMode&&<TrialExpanded trial={d} toast={toast} onEdit={()=>setDetailTrial(d)} onDelete={()=>{const arr=(trials||[]).filter(t=>t.id!==d.id);setTrials(arr);save(KEYS.trials,arr);setExpandedItem(null);toast.show("🗑 削除しました",C.red);}}/>}
    </div>;
  };

  const handleSave=(type,form)=>{
    if(type==="tournaments"){
      const arr=ds(form.id&&tournaments.find(t=>t.id===form.id)?tournaments.map(t=>t.id===form.id?form:t):[form,...(tournaments||[])]);
      setTournaments(arr);save(KEYS.tournaments,arr);
    }else if(type==="practices"){
      const arr=ds(form.id&&practices.find(p=>p.id===form.id)?practices.map(p=>p.id===form.id?form:p):[form,...(practices||[])]);
      setPractices(arr);save(KEYS.practices,arr);
    }else if(type==="trials"){
      const arr=ds(form.id&&trials.find(t=>t.id===form.id)?trials.map(t=>t.id===form.id?form:t):[form,...(trials||[])]);
      setTrials(arr);save(KEYS.trials,arr);
    }
    setModal(null);toast.show("💾 保存しました");
  };

  return <div style={{padding:10}}>
    {cfmBulk.el}
    {/* Filter + Edit Mode */}
    <div style={{display:"flex",gap:4,marginBottom:6,alignItems:"center"}}>
      {[["all","全て"],["tournaments","🏆 大会"],["practices","🏃 練習"],["trials","🎾 試打"]].map(([k,l])=>
        <button key={k} onClick={()=>{setFilter(k);if(editMode){setSelectedIds(new Set());}}} style={{padding:"6px 10px",borderRadius:6,border:`1px solid ${filter===k?C.accent:C.border}`,background:filter===k?C.accentBg:C.panel,color:filter===k?C.accent:C.textMuted,fontSize:11,fontWeight:600,cursor:"pointer"}}>{l}</button>
      )}
      <div style={{flex:1}}/>
      {editMode?<button onClick={()=>{setEditMode(false);setSelectedIds(new Set());}} style={{padding:"6px 10px",borderRadius:6,border:`1px solid ${C.accent}`,background:C.accentBg,color:C.accent,fontSize:11,fontWeight:600,cursor:"pointer"}}>完了</button>
      :<button onClick={()=>setEditMode(true)} style={{padding:"6px 10px",borderRadius:6,border:`1px solid ${C.border}`,background:C.panel,color:C.textMuted,fontSize:11,fontWeight:600,cursor:"pointer"}}>✏️ 編集</button>}
    </div>
    {/* Edit mode: bulk actions */}
    {editMode&&<div style={{display:"flex",gap:8,marginBottom:8,alignItems:"center"}}>
      <button onClick={()=>{const visible=allItems.map(i=>i.id);setSelectedIds(prev=>prev.size===visible.length?new Set():new Set(visible));}} style={{padding:"6px 10px",borderRadius:6,border:`1px solid ${C.border}`,background:C.panel,color:C.textMuted,fontSize:11,fontWeight:600,cursor:"pointer"}}>{selectedIds.size===allItems.length?"全解除":"全選択"}</button>
      <button onClick={handleDetectDuplicates} style={{padding:"6px 10px",borderRadius:6,border:`1px solid ${C.yellow}`,background:C.yellowBg,color:C.yellow,fontSize:11,fontWeight:600,cursor:"pointer"}}>🔍 重複検出</button>
      <span style={{fontSize:11,color:C.textMuted,flex:1}}>{selectedIds.size}件選択中</span>
      {selectedIds.size>0&&<button onClick={handleBulkDelete} style={{padding:"6px 14px",borderRadius:6,background:C.redBg,border:`1px solid ${C.red}`,color:C.red,fontSize:11,fontWeight:700,cursor:"pointer"}}>🗑 {selectedIds.size}件を削除</button>}
    </div>}
    <select value="" onChange={e=>handleJump(e.target.value)} style={{width:"100%",padding:"8px 10px",borderRadius:6,border:`1px solid ${C.border}`,background:C.panel,color:C.text,fontSize:12,marginBottom:8,cursor:"pointer",minHeight:40}}>
      {jumpOptions.map(o=><option key={o.value} value={o.value}>{o.label}</option>)}
    </select>

    {/* Recent months (flat, no year header) */}
    {recentMonths.map(month=><div key={month.key} id={"month-"+month.key} style={{marginBottom:4}}>
      <div onClick={()=>toggleMonth(month.key)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 10px",background:C.panel,borderRadius:8,cursor:"pointer",border:`1px solid ${C.border}`}}>
        <span style={{fontSize:13,fontWeight:600,color:C.text}}>{month.label}</span>
        <span style={{fontSize:11,color:C.textMuted}}>({month.items.length}件) {expandedMonths[month.key]?"▼":"▶"}</span>
      </div>
      {expandedMonths[month.key]&&<div style={{padding:"4px 8px"}}>{month.items.map(renderItem)}</div>}
    </div>)}

    {/* Show older / collapse */}
    {!showAllMonths&&olderMonths.length>0&&<button onClick={()=>setShowAllMonths(true)} style={{width:"100%",padding:12,borderRadius:8,background:C.panel2,border:`1px solid ${C.border}`,color:C.textMuted,fontSize:12,fontWeight:600,cursor:"pointer",marginTop:8}}>📂 過去のデータを表示（{olderMonths.length}ヶ月分）</button>}

    {/* Older months: year > month 2-level hierarchy */}
    {showAllMonths&&olderByYear.map(yearGroup=><div key={yearGroup.year} style={{marginBottom:6}}>
      <div onClick={()=>toggleYear(yearGroup.year)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 12px",background:C.panel2,borderRadius:8,cursor:"pointer",border:`1px solid ${C.border}`,marginBottom:4}}>
        <span style={{fontSize:14,fontWeight:700,color:C.text}}>{yearGroup.label}</span>
        <span style={{fontSize:11,color:C.textMuted}}>({yearGroup.totalItems}件) {expandedYears[yearGroup.year]?"▼":"▶"}</span>
      </div>
      {expandedYears[yearGroup.year]&&<div style={{paddingLeft:8}}>
        {yearGroup.months.map(month=><div key={month.key} id={"month-"+month.key} style={{marginBottom:4}}>
          <div onClick={()=>toggleMonth(month.key)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 10px",background:C.panel,borderRadius:8,cursor:"pointer",border:`1px solid ${C.border}`}}>
            <span style={{fontSize:13,fontWeight:600,color:C.text}}>{parseInt(month.key.split("-")[1])}月</span>
            <span style={{fontSize:11,color:C.textMuted}}>({month.items.length}件) {expandedMonths[month.key]?"▼":"▶"}</span>
          </div>
          {expandedMonths[month.key]&&<div style={{padding:"4px 8px"}}>{month.items.map(renderItem)}</div>}
        </div>)}
      </div>}
    </div>)}

    {showAllMonths&&olderMonths.length>0&&<button onClick={()=>setShowAllMonths(false)} style={{width:"100%",padding:10,borderRadius:8,background:"none",border:`1px solid ${C.border}`,color:C.textMuted,fontSize:11,cursor:"pointer",marginTop:8}}>▲ 直近3ヶ月のみ表示</button>}

    {allItems.length===0&&<div style={{textAlign:"center",padding:40,color:C.textMuted,fontSize:13}}>データがありません</div>}

    {modal&&<RecordModal type={modal.type} data={modal.data} isNew={modal.isNew} rackets={rackets} strings={strings} stringSetups={stringSetups} venues={venues} onAddVenue={v=>{const nv=[...(venues||[]),v];setVenues(nv);save(KEYS.venues,nv);}} onSave={form=>handleSave(modal.type,form)} onClose={()=>setModal(null)}/>}
    {detailPractice&&<PracticeDetail practice={detailPractice} rackets={rackets} strings={strings} stringSetups={stringSetups} venues={venues} onAddVenue={v=>{const nv=[...(venues||[]),v];setVenues(nv);save(KEYS.venues,nv);}} onSave={form=>{const arr=ds((practices||[]).map(p=>p.id===form.id?form:p));setPractices(arr);save(KEYS.practices,arr);setDetailPractice(null);toast.show("💾 保存しました");}} onDelete={id=>{const arr=(practices||[]).filter(p=>p.id!==id);setPractices(arr);save(KEYS.practices,arr);setDetailPractice(null);toast.show("🗑 削除しました",C.red);}} onClose={()=>setDetailPractice(null)}/>}
    {detailTournament&&<TournamentDetail tournament={detailTournament} rackets={rackets} strings={strings} stringSetups={stringSetups} venues={venues} onAddVenue={v=>{const nv=[...(venues||[]),v];setVenues(nv);save(KEYS.venues,nv);}} opponents={opponents} profile={profile} onSave={form=>{const arr=ds((tournaments||[]).map(t=>t.id===form.id?form:t));setTournaments(arr);save(KEYS.tournaments,arr);setDetailTournament(null);toast.show("💾 保存しました");}} onDelete={id=>{const arr=(tournaments||[]).filter(t=>t.id!==id);setTournaments(arr);save(KEYS.tournaments,arr);setDetailTournament(null);toast.show("🗑 削除しました",C.red);}} onClose={()=>setDetailTournament(null)}/>}
    {detailTrial&&<TrialDetail trial={detailTrial} rackets={rackets} strings={strings} venues={venues} onAddVenue={v=>{const nv=[...(venues||[]),v];setVenues(nv);save(KEYS.venues,nv);}} onSave={form=>{const arr=ds((trials||[]).map(t=>t.id===form.id?form:t));setTrials(arr);save(KEYS.trials,arr);setDetailTrial(null);toast.show("💾 保存しました");}} onDelete={id=>{const arr=(trials||[]).filter(t=>t.id!==id);setTrials(arr);save(KEYS.trials,arr);setDetailTrial(null);toast.show("🗑 削除しました",C.red);}} onClose={()=>setDetailTrial(null)}/>}
  </div>;
}

        <FSelect label="種目" value={f.type||""} onChange={s("type")} options={[{value:"singles",label:"シングルス"},{value:"doubles",label:"ダブルス"},{value:"mixed",label:"ミックスダブルス"}]}/>

        <Field label="時間（分）" value={f.duration||""} onChange={s("duration")} placeholder="120"/>

        <FSelect label="縦糸" value={f.stringMain||""} onChange={s("stringMain")} options={getStringOpts(strings)}/>
        <FSelect label="横糸" value={f.stringCross||""} onChange={s("stringCross")} options={[{value:"",label:"-- なし（単張り）--"},...getStringOpts(strings).slice(1)]}/>
        <div style={{display:"flex",gap:8}}>
          <Field label="縦テンション" value={f.tensionMain||""} onChange={s("tensionMain")} placeholder="43"/>
          <Field label="横テンション" value={f.tensionCross||""} onChange={s("tensionCross")} placeholder="43"/>

        <FSelect label="ラケット" value={f.racketName||""} onChange={s("racketName")} options={getRacketOpts(rackets)}/>

      {type==="tournaments"&&<FSelect label="結果" value={f.overallResult||""} onChange={s("overallResult")} options={[{value:"",label:"--"},{value:"優勝",label:"🏆 優勝"},{value:"準優勝",label:"🥈 準優勝"},{value:"3位",label:"🥉 3位"},{value:"ベスト8",label:"ベスト8"},{value:"ベスト16",label:"ベスト16"},{value:"予選突破",label:"✅ 予選突破"},{value:"予選敗退",label:"予選敗退"},{value:"敗退",label:"敗退"}]}/>}
      {type==="trials"&&<FSelect label="判定" value={f.judgment||""} onChange={s("judgment")} options={[{value:"",label:"--"},{value:"採用候補",label:"採用候補"},{value:"保留",label:"保留"},{value:"却下",label:"却下"}]}/>}

// ── MAIN APP (v2-style: no login blocking) ────────
function TennisDB(){
  const toast=useToast();
  const cfm=useConfirm();
  const[ready,setReady]=useState(false);
  const[user,setUser]=useState(null);
  const[syncing,setSyncing]=useState(false);
  const[tab,setTab]=useState("home");
  const[large,setLarge]=useState(false);
  const[showDataMenu,setShowDataMenu]=useState(false);
  const[showClaudeShare,setShowClaudeShare]=useState(false);
  const[pasteImport,setPasteImport]=useState(false);
  const[importPreview,setImportPreview]=useState(null);
  const[pasteText,setPasteText]=useState("");
  const importSnapshot=useRef(null);
  const[pendingRecord,setPendingRecord]=useState(null);
  const[pendingDetail,setPendingDetail]=useState(null);
  const navigateToDetail=(type,data)=>{setPendingDetail({type,data});setTab("sessions");};
  const[loginError,setLoginError]=useState("");
  const[saveError,setSaveError]=useState(null);
  useEffect(()=>onSaveError(err=>setSaveError(err)),[]);
  const[detailOpen,setDetailOpen]=useState(false);

  const[tournaments,setTournaments]=useState([]);
  const[practices,setPractices]=useState([]);
  const[trials,setTrials]=useState([]);
  const[rackets,setRackets]=useState([]);
  const[strings,setStrings]=useState([]);
  const[stringSetups,setStringSetups]=useState([]);
  const[measurements,setMeasurements]=useState([]);
  const[mental,setMental]=useState([]);
  const[next,setNext]=useState([]);
  const[profile,setProfile]=useState({});
  const[venues,setVenues]=useState([]);
  const[opponents,setOpponents]=useState([]);
  const[quickTrialCards,setQuickTrialCards]=useState([]);
  const[lastExport,setLastExport]=useState(()=>{try{return localStorage.getItem("yuke-last-export")||"";}catch{return"";}});
  const daysSinceExport=lastExport?Math.floor((Date.now()-new Date(lastExport).getTime())/(1000*60*60*24)):999;

  const applyData=data=>{
    const sets={tournaments:setTournaments,practices:setPractices,trials:setTrials,rackets:setRackets,strings:setStrings,stringSetups:setStringSetups,measurements:setMeasurements,mental:setMental,next:setNext,venues:setVenues,opponents:setOpponents,quickTrialCards:setQuickTrialCards};
    Object.entries(sets).forEach(([k,setter])=>{
      if(data[k]){
        const val=data[k];
        if(Array.isArray(val)&&val[0]?.date)setter(ds(val));
        else setter(val);
      }
    });
    if(data.profile)setProfile(data.profile);
  };

  // Initial load: always from localStorage first (never blocks)
  useEffect(()=>{
    const raw={};
    Object.entries(KEYS).forEach(([name,key])=>{raw[name]=lsLoad(key)||INIT[name]||[];});
    raw.profile=lsLoad("profile")||INIT.profile;
    const migrated=fixMeasurements(migrateToV2(raw));
    migrated.tournaments=restoreIfMissing(migrated.tournaments||[]);
    applyData(migrated);
    setReady(true);
  },[]);

  // Auth listener: cloud sync when logged in
  useEffect(()=>{
    const unsub=fbAuth.onAuthStateChanged(async u=>{
      setUser(u);
      if(u){
        setSyncing(true);
        try{
          const cloud=await cloudLoadAll(u.uid);
          if(cloud&&Object.keys(cloud).length>0){
            const merged={};
            Object.entries(KEYS).forEach(([name,key])=>{
              if(cloud[key]){merged[name]=cloud[key];lsSave(key,cloud[key]);}
            });
            if(cloud.profile){merged.profile=cloud.profile;lsSave("profile",cloud.profile);}
            applyData(merged);
            toast.show("☁️ クラウドから同期しました");
          }else{
            // No cloud data → push local to cloud
            const allLocal={};
            Object.entries(KEYS).forEach(([name,key])=>{allLocal[key]=lsLoad(key);});
            allLocal.profile=lsLoad("profile");
            const hasLocal=Object.values(allLocal).some(v=>v!==null);
            if(hasLocal){
              await cloudSaveAll(u.uid,allLocal);
              toast.show("☁️ ローカルデータをクラウドに移行しました");
            }
          }
        }catch(e){
          console.error("Cloud sync error:",e);
          toast.show("⚠️ クラウド同期エラー（ローカルデータで動作中）",C.yellow);
        }
        setSyncing(false);
        // Realtime listener
        try{
          const dataRef=fbDb.collection("users").doc(u.uid).collection("data");
          dataRef.onSnapshot(snap=>{
            snap.docChanges().forEach(change=>{
              if(change.type==="modified"){
                const key=change.doc.id;const data=change.doc.data();const val=data.items||data.obj;
                if(!val)return;
                const name=Object.entries(KEYS).find(([,v])=>v===key)?.[0];
                if(!name)return;
                lsSave(key,val);
                const setters={tournaments:setTournaments,practices:setPractices,trials:setTrials,rackets:setRackets,strings:setStrings,stringSetups:setStringSetups,mental:setMental,next:setNext,venues:setVenues,opponents:setOpponents,measurements:setMeasurements,quickTrialCards:setQuickTrialCards};
                if(setters[name]){if(Array.isArray(val)&&val[0]?.date)setters[name](ds(val));else setters[name](val);}
              }
            });
          });
        }catch(e){console.error("Snapshot listener error:",e);}
        // Auto-opponents
        if(!lsLoad("auto-opponents-v227")){
          try{
            const updatedOpps=autoOpponents(tournaments,opponents);
            if(updatedOpps.length>(opponents||[]).length){setOpponents(updatedOpps);save(KEYS.opponents,updatedOpps);}
            lsSave("auto-opponents-v227",true);
          }catch(e){console.error("Auto-opponents error:",e);}
        }
      }
    });
    return()=>unsub();
  },[]);

  const handleExport=async()=>{
    const data={tournaments,practices,trials,rackets,strings,stringSetups,mental,next,profile,venues,opponents,measurements,quickTrialCards};
    const result=await exportAll(data);
    if(result!=="cancelled"){
      const now=new Date().toISOString();setLastExport(now);
      try{localStorage.setItem("yuke-last-export",now);}catch{}
      toast.show("📤 エクスポート完了");
    }
  };
  const executeImport=(data,mode="merge")=>{
    importSnapshot.current={tournaments,practices,trials,rackets,strings,stringSetups,mental,next,profile,venues,opponents,measurements,quickTrialCards};
    const current={tournaments,practices,trials,rackets,strings,stringSetups,mental,next,profile,venues,opponents,measurements,quickTrialCards};
    const merged=mergeData(current,data,mode);applyData(merged);
    Object.entries(KEYS).forEach(([name,key])=>{if(merged[name])save(key,merged[name]);});
    if(merged.profile)save("profile",merged.profile);
    setImportPreview(null);setPasteImport(false);setPasteText("");
    toast.show(`📥 インポート完了（${mode==="overwrite"?"上書き":mode==="skip"?"スキップ":"マージ"}）`,C.blue);
  };
  const handleImport=()=>{
    const inp=document.createElement("input");inp.type="file";inp.accept=".json";
    inp.onchange=async e=>{
      try{
        const text=await e.target.files[0].text();const data=JSON.parse(text);
        const current={tournaments,practices,trials,rackets,strings,stringSetups,mental,next,profile,venues,opponents,measurements,quickTrialCards};
        const analysis=analyzeImport(current,data);
        setImportPreview({analysis,incoming:data});
      }catch(err){toast.show("❌ インポートエラー: "+err.message,C.red);}
    };
    inp.click();
  };
  const handlePasteImport=()=>{
    try{
      const data=JSON.parse(pasteText);
      const current={tournaments,practices,trials,rackets,strings,stringSetups,mental,next,profile,venues,opponents,measurements,quickTrialCards};
      const analysis=analyzeImport(current,data);
      setImportPreview({analysis,incoming:data});
    }catch(err){toast.show("❌ JSONエラー: "+err.message,C.red);}
  };
  const handleImportUndo=()=>{
    if(!importSnapshot.current)return;
    applyData(importSnapshot.current);
    Object.entries(KEYS).forEach(([name,key])=>{if(importSnapshot.current[name])save(key,importSnapshot.current[name]);});
    importSnapshot.current=null;toast.show("↩️ インポートを元に戻しました",C.yellow);
  };
  // handleRecord is no longer used for home 3-buttons (they open modal in HomeTab directly)
  // Kept for potential future use from other contexts
  const handleRecord=type=>{setPendingRecord(type);setTab("sessions");};
  const handleLogin=async()=>{
    setLoginError("");
    try{
      const provider=new firebase.auth.GoogleAuthProvider();
      await fbAuth.signInWithPopup(provider);
    }catch(e){
      if(e.code==="auth/popup-blocked"){
        try{await fbAuth.signInWithRedirect(new firebase.auth.GoogleAuthProvider());}
        catch(e2){setLoginError("ログイン失敗: "+e2.message);toast.show("❌ ログイン失敗",C.red);}
      }else{
        setLoginError("ログイン失敗: "+e.message);
        toast.show("❌ ログイン失敗: "+e.message,C.red);
      }
    }
  };
  const handleLogout=async()=>{await fbAuth.signOut();toast.show("ログアウトしました");};

  if(!ready)return<div style={{background:C.bg,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:C.textMuted}}>読み込み中...</div>;

  return <div style={{display:"flex",flexDirection:"column",minHeight:"100dvh",background:C.bg,zoom:large?1.22:1}}>
    {/* Header */}
    <div style={{background:C.panel,borderBottom:`1px solid ${C.border}`,padding:"8px 14px",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
      <div onClick={()=>setTab("home")} style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",userSelect:"none"}}>
        <span style={{fontSize:18}}>🎾</span>
        <span style={{fontSize:20,letterSpacing:"0.03em"}}><span style={{fontWeight:400,color:C.text}}>Tennis</span><span style={{fontWeight:800,color:C.accent,marginLeft:3}}>DB</span></span>
        <span style={{fontSize:9,color:C.textMuted,alignSelf:"flex-end",marginBottom:2}}>v{APP_VERSION}{syncing?" · 同期中...":user?" · ☁️":""}</span>
      </div>
      <div style={{display:"flex",gap:6}}>
        <button onClick={()=>setLarge(!large)} style={{background:"none",border:`1px solid ${large?C.accent:C.border}`,borderRadius:6,padding:"4px 8px",fontSize:11,color:large?C.accent:C.textMuted,cursor:"pointer",fontWeight:600}}>{large?"A↓":"A↑"}</button>
        <button onClick={()=>setShowDataMenu(!showDataMenu)} style={{background:"none",border:`1px solid ${C.border}`,borderRadius:6,padding:"4px 8px",fontSize:12,cursor:"pointer"}}>📤</button>
        {user?<button onClick={handleLogout} style={{background:"#f5f3ff",border:`1px solid ${C.purple}`,color:C.purple,borderRadius:6,padding:"4px 8px",fontSize:12,cursor:"pointer",fontWeight:600}}>👤</button>
        :<button onClick={handleLogin} style={{background:"#ecfdf5",border:`1px solid ${C.accent}`,color:C.accent,borderRadius:6,padding:"4px 8px",fontSize:12,cursor:"pointer",fontWeight:600}}>☁️</button>}
      </div>
    </div>

    {/* Login error banner */}
    {loginError&&<div style={{background:C.redBg,border:`1px solid ${C.red}`,padding:"8px 14px",display:"flex",alignItems:"center",gap:8}}>
      <span style={{fontSize:12,color:C.red,flex:1}}>{loginError}</span>
      <button onClick={()=>setLoginError("")} style={{background:"none",border:"none",color:C.red,cursor:"pointer",fontSize:14}}>✕</button>
    </div>}

    {/* Save Error Banner */}
    {saveError&&<div style={{background:"#fef2f2",border:`1px solid ${C.red}`,padding:"8px 14px",display:"flex",alignItems:"center",gap:8}}>
      <span style={{fontSize:11,color:C.red,flex:1}}>☁️ クラウド保存エラー [{saveError.key}]: {saveError.message}</span>
      <button onClick={()=>setSaveError(null)} style={{background:"none",border:"none",color:C.red,cursor:"pointer",fontSize:14}}>✕</button>
    </div>}

    {/* Data Menu */}
    {showDataMenu&&<div style={{background:C.panel,borderBottom:`1px solid ${C.border}`,padding:10,display:"flex",gap:6,flexWrap:"wrap"}}>
      <button onClick={()=>{handleExport();setShowDataMenu(false);}} style={{padding:"6px 12px",borderRadius:6,background:C.accentBg,border:`1px solid ${C.accent}`,color:C.accent,fontSize:11,fontWeight:600,cursor:"pointer"}}>📤 エクスポート</button>
      <button onClick={()=>{handleImport();setShowDataMenu(false);}} style={{padding:"6px 12px",borderRadius:6,background:C.blueBg,border:`1px solid ${C.blue}`,color:C.blue,fontSize:11,fontWeight:600,cursor:"pointer"}}>📥 JSON</button>
      <button onClick={()=>{setPasteImport(true);setShowDataMenu(false);}} style={{padding:"6px 12px",borderRadius:6,background:C.purpleBg,border:`1px solid ${C.purple}`,color:C.purple,fontSize:11,fontWeight:600,cursor:"pointer"}}>📋→📥</button>
      <button onClick={()=>{setShowClaudeShare(true);setShowDataMenu(false);}} style={{padding:"6px 12px",borderRadius:6,background:C.yellowBg,border:`1px solid ${C.yellow}`,color:C.yellow,fontSize:11,fontWeight:600,cursor:"pointer"}}>📋 Claude</button>
      {importSnapshot.current&&<button onClick={()=>{handleImportUndo();setShowDataMenu(false);}} style={{padding:"6px 12px",borderRadius:6,background:C.redBg,border:`1px solid ${C.red}`,color:C.red,fontSize:11,fontWeight:600,cursor:"pointer"}}>↩️ 取消</button>}
    </div>}

    {/* Content */}
    <div style={{flex:1,overflowY:tab==="home"?"hidden":"auto",WebkitOverflowScrolling:"touch",paddingBottom:tab==="home"?0:60,display:"flex",flexDirection:"column"}}>
      <ErrorBoundary label="ホーム">
        {tab==="home"&&<HomeTab next={next} setNext={setNext} tournaments={tournaments} setTournaments={setTournaments} practices={practices} setPractices={setPractices} trials={trials} setTrials={setTrials} rackets={rackets} strings={strings} stringSetups={stringSetups} venues={venues} setVenues={setVenues} quickTrialCards={quickTrialCards} setQuickTrialCards={setQuickTrialCards} daysSinceExport={daysSinceExport} lastExport={lastExport} onExport={handleExport} onGoToSessions={()=>setTab("sessions")} onGoToPlan={()=>setTab("plan")} onNavigateDetail={navigateToDetail} toast={toast}/>}
      </ErrorBoundary>
      <ErrorBoundary label="Sessions">
        {tab==="sessions"&&<SessionsTab tournaments={tournaments} setTournaments={setTournaments} practices={practices} setPractices={setPractices} trials={trials} setTrials={setTrials} rackets={rackets} strings={strings} stringSetups={stringSetups} venues={venues} setVenues={setVenues} opponents={opponents} profile={profile} toast={toast} pendingRecord={pendingRecord} onPendingRecordDone={()=>setPendingRecord(null)} pendingDetail={pendingDetail} onPendingDetailDone={()=>setPendingDetail(null)} onDetailOpenChange={setDetailOpen}/>}
      </ErrorBoundary>
      <ErrorBoundary label="Gear">
        {tab==="gear"&&<PlaceholderTab name="Gear" icon="🎾" count={(rackets||[]).length+(strings||[]).length}/>}
      </ErrorBoundary>
      <ErrorBoundary label="Plan">
        {tab==="plan"&&<PlaceholderTab name="Plan" icon="📝" count={(next||[]).length+(opponents||[]).length}/>}
      </ErrorBoundary>
      <ErrorBoundary label="Insights">
        {tab==="insights"&&<PlaceholderTab name="Insights" icon="📊"/>}
      </ErrorBoundary>
    </div>

    {!detailOpen&&<TabBar tab={tab} setTab={setTab}/>}

    {showClaudeShare&&<ClaudeShareModal onClose={()=>setShowClaudeShare(false)} data={{tournaments,practices,trials,rackets,strings,stringSetups,mental,next,profile,venues,opponents,measurements,quickTrialCards}} toast={toast}/>}
    {importPreview&&<ImportPreviewModal analysis={importPreview.analysis} incoming={importPreview.incoming} onConfirm={mode=>executeImport(importPreview.incoming,mode)} onClose={()=>setImportPreview(null)}/>}
    {pasteImport&&<div style={{position:"fixed",inset:0,background:"#0008",zIndex:400,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:C.panel,borderRadius:12,padding:20,width:"100%",maxWidth:400}}>
        <div style={{fontSize:14,fontWeight:700,marginBottom:10}}>📋→📥 JSONを貼り付け</div>
        <textarea value={pasteText} onChange={e=>setPasteText(e.target.value)} placeholder='{"tournaments":[...],...}' rows={8} style={{width:"100%",fontSize:12,fontFamily:"monospace",padding:10,borderRadius:6,border:`1px solid ${C.border}`,background:C.panel2,color:C.text,outline:"none",resize:"vertical"}}/>
        <div style={{display:"flex",gap:8,marginTop:10}}>
          <button onClick={handlePasteImport} style={{flex:1,padding:10,borderRadius:6,background:C.accent,border:"none",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer"}}>📥 インポート</button>
          <button onClick={()=>{setPasteImport(false);setPasteText("");}} style={{padding:10,borderRadius:6,background:C.panel2,border:`1px solid ${C.border}`,color:C.textMuted,fontSize:13,cursor:"pointer"}}>キャンセル</button>
        </div>
      </div>
    </div>}
    {cfm.el}
    {toast.el}
  </div>;
}

// ── RENDER ────────────────────────────────────────
ReactDOM.createRoot(document.getElementById("root")).render(<TennisDB/>);
</script></body></html>
