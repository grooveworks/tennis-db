                        <span style={{fontSize:12,color:C.textMuted,fontFamily:"monospace",minWidth:76}}>{t.date}</span>
                        <span style={{fontSize:12,color:C.textMuted}}>{fmtTension(t.tensionMain,t.tensionCross)}</span>
                        {t.linkedPracticeId&&<Badge color="blue" sm>練</Badge>}
                        {t.linkedMatchId&&<Badge color="purple" sm>戦</Badge>}
                        <div style={{flex:1}}/>
                        <div style={{display:"flex",gap:2}}>{[t.spin,t.control,t.power,t.feel,t.info].map((v,vi)=><div key={vi} style={{width:6,height:16,borderRadius:2,background:v>=4?C.accent:v>=3?C.yellow:C.red,opacity:0.3+v*0.14}}/>)}</div>
                        <span style={{fontSize:13,fontWeight:700,color:ac2,fontFamily:"monospace",minWidth:28,textAlign:"right"}}>{ac}</span>
                      </div>
                    </div>
                  );
                })}
              </div>
            );
          })}
        </div>
      )}
      {/* Flat view */}
      {viewMode==="flat"&&<div style={{background:filtered.length?C.panel:"transparent",border:filtered.length?`1px solid ${C.border}`:"none",borderRadius:8,overflow:"hidden"}}>
        {filtered.map((t,i)=>{
          const isOpen=expanded===t.id; const ac=avg(t); const ac2=parseFloat(ac)>=4?C.accent:parseFloat(ac)>=3?C.yellow:C.red;
          return (
            <div key={t.id} style={{borderBottom:i<filtered.length-1?`1px solid ${C.border}`:"none"}}>
              <div onClick={()=>setExpanded(isOpen?null:t.id)} style={{padding:"10px 12px",background:isOpen?"#f0f0f5":"transparent",cursor:"pointer",borderLeft:isOpen?`3px solid ${t.linkedPracticeId?C.blue:t.linkedMatchId?"#2563eb":C.orange}`:"3px solid transparent",transition:"all 0.1s"}}>
                <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}>
                  <span style={{fontSize:12,color:C.textMuted,fontFamily:"monospace"}}>{t.date}</span>
                  <Badge color={jc[t.judgment]||"gray"} sm>{"採用候補"===t.judgment?"✓ 採用候補":"却下"===t.judgment?"× 却下":"- "+t.judgment}</Badge>
                  {t.linkedPracticeId&&<Badge color="blue" sm>練</Badge>}
                  {t.linkedMatchId&&<Badge color="purple" sm>戦</Badge>}
                  <div style={{flex:1}}/>
                  <span style={{fontSize:15,fontWeight:800,color:ac2,fontFamily:"monospace"}}>{ac}</span>
                  <span style={{color:C.textMuted,fontSize:12,transform:isOpen?"rotate(90deg)":"none",transition:"transform 0.2s"}}>▶</span>
                </div>
                <div style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontSize:13,color:C.text,fontWeight:600}}>{t.racketName||"（ラケット未入力）"}</div>
                <div style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontSize:12,color:C.textMuted,marginTop:1}}>{[t.stringMain,t.stringCross].filter(Boolean).join(" / ")}{t.tensionMain?` ${fmtTension(t.tensionMain,t.tensionCross)}`:""}{t.temp?` ${t.temp}℃`:""}</div>
              </div>
              {isOpen&&(
                <div style={{padding:"12px 14px 14px",borderTop:`1px solid ${C.border}`,background:"#f0f0f5"}}>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
                    {[["ラケット",t.racketName||"—"],["縦糸",t.stringMain||"—"],["横糸",t.stringCross||"同じ"],["テンション",fmtTension(t.tensionMain,t.tensionCross)||"—"],["気温",t.temp?`${t.temp}℃`:"—"],["場所",t.venue||"—"]].map(([k,v])=>(
                      <div key={k} style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:6,padding:"6px 10px"}}>
                        <div style={{fontSize:12,color:C.textMuted,marginBottom:2}}>{k}</div>
                        <div style={{fontSize:12,color:C.textDim,fontWeight:600}}>{v}</div>
                      </div>
                    ))}
                  </div>
                  <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 14px",marginBottom:10}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                      <span style={{fontSize:12,color:C.textMuted}}>打感評価</span>
                      <span style={{fontSize:13,fontWeight:700,color:C.accent,fontFamily:"monospace"}}>平均 {ac}/5</span>
                    </div>
                    {[["🌀 スピン","spin"],["🚀 推進力","power"],["🎯 コントロール","control"],["📡 打感情報","info"],["🔧 操作性","maneuver"],["💨 振り抜き","swingThrough"]].map(([label,key])=>{
                      const v=t[key];if(!v&&v!==0)return null;
                      return(
                      <div key={key} style={{display:"flex",alignItems:"center",gap:8,marginBottom:5}}>
                        <span style={{fontSize:12,color:C.textMuted,minWidth:88}}>{label}</span>
                        <div style={{flex:1,background:C.border,borderRadius:3,height:6,overflow:"hidden"}}>
                          <div style={{width:`${v*20}%`,height:"100%",background:scColor(v),borderRadius:3}}/>
                        </div>
                        <span style={{fontSize:12,color:scColor(v),fontWeight:700}}>{v}</span>
                      </div>);})}
                  </div>
                  {(t.trajectory||t.stiffness)&&<div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 14px",marginBottom:10}}>
                    <div style={{fontSize:12,color:C.textMuted,marginBottom:8}}>特性</div>
                    {[["📐 弾道 (低↔高)","trajectory"],["🪨 打感 (柔↔硬)","stiffness"]].map(([label,key])=>{
                      const v=t[key];if(!v&&v!==0)return null;
                      const clr=v===3?"#888":v<=2?"#3498db":"#e67e22";
                      return(
                      <div key={key} style={{display:"flex",alignItems:"center",gap:8,marginBottom:5}}>
                        <span style={{fontSize:12,color:C.textMuted,minWidth:110}}>{label}</span>
                        <div style={{flex:1,background:C.border,borderRadius:3,height:6,overflow:"hidden"}}>
                          <div style={{width:`${v*20}%`,height:"100%",background:clr,borderRadius:3}}/>
                        </div>
                        <span style={{fontSize:12,color:clr,fontWeight:700}}>{v}</span>
                      </div>);})}
                  </div>}
                  {(t.shotForeAtk||t.shotForeDef||t.shotBackAtk||t.shotBackDef||t.shotSlice||t.shotServe||t.shotVolley||t.shotReturn||t.shotFore||t.shotBack)&&<div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 14px",marginBottom:10}}>
                    <div style={{fontSize:12,color:C.textMuted,marginBottom:8}}>ショット別</div>
                    {[["🎾 フォア（攻）","shotForeAtk"],["🛡 フォア（守）","shotForeDef"],["🔄 バック（攻）","shotBackAtk"],["🛡 バック（守）","shotBackDef"],["↗ スライス","shotSlice"],["💥 サーブ","shotServe"],["🥅 ボレー","shotVolley"],["↩ リターン","shotReturn"]].map(([label,key])=>{
                      const v=t[key];if(!v&&v!==0)return null;
                      return(
                      <div key={key} style={{display:"flex",alignItems:"center",gap:8,marginBottom:5}}>
                        <span style={{fontSize:12,color:C.textMuted,minWidth:88}}>{label}</span>
                        <div style={{flex:1,background:C.border,borderRadius:3,height:6,overflow:"hidden"}}>
                          <div style={{width:`${v*20}%`,height:"100%",background:scColor(v),borderRadius:3}}/>
                        </div>
                        <span style={{fontSize:12,color:scColor(v),fontWeight:700}}>{v}</span>
                      </div>);})}
                  </div>}
                  {t.confidence&&<div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 14px",marginBottom:10}}>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <span style={{fontSize:12,color:C.textMuted,minWidth:88}}>🛡 安心感</span>
                      <div style={{flex:1,background:C.border,borderRadius:3,height:6,overflow:"hidden"}}>
                        <div style={{width:`${t.confidence*20}%`,height:"100%",background:scColor(t.confidence),borderRadius:3}}/>
                      </div>
                      <span style={{fontSize:12,color:scColor(t.confidence),fontWeight:700}}>{t.confidence}</span>
                    </div>
                  </div>}
                  {[["🎾 ストローク",t.strokeNote],["🏐 サーブ",t.serveNote],["🥅 ボレー",t.volleyNote],["📝 総括",t.generalNote]].filter(([,v])=>v).map(([l,v])=>(
                    <div key={l} style={{marginBottom:7}}>
                      <div style={{fontSize:12,color:C.textMuted,marginBottom:3}}>{l}</div>
                      <div style={{fontSize:12,color:C.textDim,lineHeight:1.7,background:C.panel,borderRadius:6,padding:"7px 10px",borderLeft:`2px solid ${C.border}`}}>{v}</div>
                    </div>
                  ))}
                  {(t.sessions||[]).length>0&&(
                    <div style={{marginBottom:10}}>
                      <div style={{fontSize:12,color:C.purple,letterSpacing:"0.08em",marginBottom:6}}>📅 セッション履歴（{t.sessions.length}回）</div>
                      {t.sessions.map((sess,si)=>(
                        <div key={sess.id} style={{background:C.panel,border:`1px solid #2d1f4e`,borderRadius:7,padding:"8px 12px",marginBottom:6,borderLeft:`2px solid ${C.purple}`}}>
                          <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:sess.note?5:0,flexWrap:"wrap"}}>
                            <span style={{fontSize:12,color:C.purple,fontWeight:700}}>#{si+1}</span>
                            <span style={{fontSize:12,color:C.textMuted,fontFamily:"monospace"}}>{sess.date}</span>
                            {sess.temp&&<span style={{fontSize:12,color:C.textDim}}>{sess.temp}℃</span>}
                            {sess.tension&&<span style={{fontSize:12,color:C.accent,fontWeight:700}}>{sess.tension}</span>}
                          </div>
                          {sess.note&&<div style={{fontSize:12,color:C.textDim,lineHeight:1.6}}>{sess.note}</div>}
                        </div>
                      ))}
                    </div>
                  )}
                  <div style={{display:"flex",gap:8,marginTop:10}}>
                    <Btn onClick={()=>setModal({trial:t})} style={{flex:1}}>✏️ 編集</Btn>
                    <Btn onClick={()=>copyToClipboard(formatTrialForClaude(t),toast,"Claudeに貼り付けできます")} style={{flex:1}}>📋 Claude共有</Btn>
                    <Btn onClick={()=>handleDelete(t.id)} variant="danger">🗑</Btn>
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>}
      {modal&&<Modal trial={modal.trial}/>}
    </div>
  );
}

// ── RACKETS TAB ───────────────────────────────────
function RacketsTab({data,setData,toast}){
  const cfm=useConfirm();
  const [expanded,setExpanded]=useState(null);
  const [modal,setModal]=useState(null);
  const [mModal,setMModal]=useState(null);
  const statusMap={active:["green","✓ エース"],sub:["blue","② サブ"],candidate:["yellow","★ 候補"],considering:["purple","? 検討"],support:["gray","○ 補助"],retired:["gray","× 引退"]};
  const persist=list=>{setData(list);save(KEYS.rackets,list);};
  const handleSave=form=>{const isNew=!data.find(r=>r.id===form.id);persist(isNew?[...data,form]:data.map(r=>r.id===form.id?form:r));setModal(null);toast.show("✅ 更新しました");};
  const handleDelete=id=>{const bk=[...data];cfm.ask("このラケットを削除しますか？",()=>{persist(data.filter(r=>r.id!==id));setExpanded(null);toast.show("🗑 削除しました",C.red,()=>persist(bk));});};
  // Measurement helpers
  const saveMeasurement=(rId,m)=>{
    const updated=data.map(r=>{
      if(r.id!==rId)return r;
      const ms=[...(r.measurements||[])];
      if(m.current){ms.forEach(x=>{x.current=false;});}
      const idx=ms.findIndex(x=>x.id===m.id);
      if(idx>=0)ms[idx]=m; else ms.push(m);
      return {...r,measurements:ms};
    });
    persist(updated);setMModal(null);toast.show("✅ 実測値を更新しました");
  };
  const delMeasurement=(rId,mId)=>cfm.ask("この実測値を削除しますか？",()=>{
    persist(data.map(r=>r.id===rId?{...r,measurements:(r.measurements||[]).filter(m=>m.id!==mId)}:r));
    toast.show("🗑 削除しました",C.red);
  });
  const getCurrent=(r)=>(r.measurements||[]).find(m=>m.current);
  const Modal=({item})=>{
    const [f,setF]=useState({...item}); const s=k=>v=>setF(p=>({...p,[k]:v}));
    const fields=[["name","ラケット名","HEAD Boom Pro 2026"],["role","役割","次期エース候補"],["weight","重量","333.9g"],["balance","バランス","321.5mm"],["face","フェイス","98in²"],["beam","ビーム","薄ビーム"],["string","現在のストリング","Blast 1.25 / PTP 1.25"],["tension","テンション","43p"]];
    return (
      <div style={{position:"fixed",inset:0,background:"#0004",zIndex:200,display:"flex",alignItems:"flex-start",justifyContent:"center",overflowY:"auto",padding:"20px 12px"}} onClick={e=>e.target===e.currentTarget&&setModal(null)}>
        <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:12,width:"100%",maxWidth:500,padding:20}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <span style={{fontSize:14,fontWeight:700,color:C.text}}>ラケット</span>
            <Btn onClick={()=>setModal(null)} variant="ghost" style={{fontSize:18,padding:"0 6px"}}>✕</Btn>
          </div>
          <FSelect label="ステータス" value={f.status||"candidate"} onChange={s("status")} options={[{value:"active",label:"エース"},{value:"sub",label:"サブ"},{value:"candidate",label:"候補"},{value:"considering",label:"検討"},{value:"support",label:"補助"},{value:"retired",label:"引退"}]}/>
          {fields.map(([k,l,p])=><Field key={k} label={l} value={f[k]||""} onChange={s(k)} placeholder={p}/>)}
          <Field label="メモ・評価" value={f.note||""} onChange={s("note")} multiline placeholder="フレーム特性..."/>
          <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:14}}>
            <Btn onClick={()=>setModal(null)}>キャンセル</Btn>
            <Btn onClick={()=>handleSave(f)} variant="primary">保存</Btn>
          </div>
        </div>
      </div>
    );
  };
  const MModal=({rId,item})=>{
    const [f,setF]=useState({...item}); const s=k=>v=>setF(p=>({...p,[k]:v}));
    return (
      <div style={{position:"fixed",inset:0,background:"#0004",zIndex:200,display:"flex",alignItems:"flex-start",justifyContent:"center",overflowY:"auto",padding:"20px 12px"}} onClick={e=>e.target===e.currentTarget&&setMModal(null)}>
        <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:12,width:"100%",maxWidth:500,padding:20}}>
          <div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:16}}>実測値</div>
          <Field label="状態（例: PPシム＋KGL164＋OG込み）" value={f.state||""} onChange={s("state")} placeholder="ゲームレディ"/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
            <Field label="重量(g)" value={f.weight||""} onChange={s("weight")} placeholder="333.9"/>
            <Field label="バランス(mm)" value={f.balance||""} onChange={s("balance")} placeholder="321.5"/>
            <Field label="グリップ幅(mm)" value={f.gripW||""} onChange={s("gripW")} placeholder="33.5"/>
            <Field label="グリップ厚(mm)" value={f.gripT||""} onChange={s("gripT")} placeholder="29.7"/>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8,margin:"10px 0"}}>
            <label style={{fontSize:12,color:C.text}}>現行ゲームレディ</label>

            {on&&(

                      <div>

                        <div style={{fontSize:12,color:C.textMuted,marginTop:2}}>{m.weight||"—"} / {m.balance||"—"} / {m.gripW&&m.gripT?m.gripW+"×"+m.gripT:"—"}</div>
                      </div>
                      <div style={{display:"flex",gap:4}}>
                        <button onClick={()=>setMModal({rId:r.id,item:m})} style={{background:"none",border:"none",color:C.textMuted,cursor:"pointer",fontSize:14,padding:"10px 8px",minWidth:44,minHeight:44,display:"inline-flex",alignItems:"center",justifyContent:"center"}}>✏️</button>
                        <button onClick={()=>delMeasurement(r.id,m.id)} style={{background:"none",border:"none",color:C.red,cursor:"pointer",fontSize:14,padding:"10px 8px",minWidth:44,minHeight:44,display:"inline-flex",alignItems:"center",justifyContent:"center"}}>🗑</button>
                      </div>
                    </div>
                    {m.note&&<div style={{fontSize:12,color:C.textDim,marginTop:3}}>{m.note}</div>}

}

// ── STRINGS TAB ───────────────────────────────────
function StringsTab({data,setData,stringSetups,setStringSetups,toast}){
  const cfm=useConfirm();
  const [showAll,setShowAll]=useState(false);
  const [modal,setModal]=useState(null);
  const [showSetups,setShowSetups]=useState(false);
  const [addingSetup,setAddingSetup]=useState(false);
  const [sf,setSf]=useState({stringMain:"",stringCross:""});
  const persist=list=>{setData(list);save(KEYS.strings,list);};
  const persistSS=list=>{setStringSetups(list);save(KEYS.stringSetups,list);};
  const handleAddSetup=()=>{
    if(!sf.stringMain){toast.show("縦糸を選択してください",C.red);return;}
    const label=sf.stringCross?`${sf.stringMain} + ${sf.stringCross}`:sf.stringMain;
    if((stringSetups||[]).some(s=>s.label===label)){toast.show("同じ組み合わせが既に存在します",C.red);return;}
    persistSS([...(stringSetups||[]),{id:`ss${Date.now()}`,label,stringMain:sf.stringMain,stringCross:sf.stringCross,status:"active"}]);
    setSf({stringMain:"",stringCross:""});setAddingSetup(false);toast.show("✅ セッティング追加");
  };
  const handleDeleteSetup=id=>cfm.ask("このセッティングを削除しますか？",()=>{persistSS((stringSetups||[]).filter(s=>s.id!==id));toast.show("🗑 削除しました",C.red);});
  const toggleArchiveSetup=s=>{persistSS((stringSetups||[]).map(x=>x.id===s.id?{...x,status:x.status==="archived"?"active":"archived"}:x));};
  const handleSave=form=>{const isNew=!data.find(s=>s.id===form.id);persist(isNew?[form,...data]:data.map(s=>s.id===form.id?form:s));setModal(null);toast.show("✅ 更新しました");};
  const handleDelete=id=>{const bk=[...data];cfm.ask("この記録を削除しますか？",()=>{persist(data.filter(s=>s.id!==id));toast.show("🗑 削除しました",C.red,()=>persist(bk));});};
  const ss={confirmed:{color:C.accent,label:"✓ 確定"},good:{color:"#2563eb",label:"↑ 好印象"},testing:{color:C.orange,label:"~ 検証中"},candidate:{color:C.purple,label:"★ 候補"},hold:{color:C.textMuted,label:"- 保留"},rejected:{color:C.red,label:"× 除外"},active:{color:C.accent,label:"✓ 確定"},key:{color:"#2563eb",label:"↑ 好印象"}};
  const rejected=data.filter(s=>s.status==="rejected");
  const list=showAll?data:data.filter(s=>s.status!=="rejected");
  const Modal=({item})=>{
    const [f,setF]=useState({...item}); const s=k=>v=>setF(p=>({...p,[k]:v}));
    return (
      <div style={{position:"fixed",inset:0,background:"#0004",zIndex:200,display:"flex",alignItems:"flex-start",justifyContent:"center",overflowY:"auto",padding:"20px 12px"}} onClick={e=>e.target===e.currentTarget&&setModal(null)}>
        <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:12,width:"100%",maxWidth:460,padding:20}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <span style={{fontSize:14,fontWeight:700,color:C.text}}>ストリング</span>
            <Btn onClick={()=>setModal(null)} variant="ghost" style={{fontSize:18,padding:"0 6px"}}>✕</Btn>
          </div>
          <Field label="ストリング名" value={f.name||""} onChange={s("name")} placeholder="Babolat Blast 1.25"/>
          <Field label="在庫量" value={f.qty||""} onChange={s("qty")} placeholder="大量 / 1張り / 200m"/>
          <FSelect label="ステータス" value={f.status||"hold"} onChange={s("status")} options={[{value:"confirmed",label:"✅ 確定"},{value:"good",label:"👍 好印象"},{value:"testing",label:"🔬 検証中"},{value:"candidate",label:"💡 候補"},{value:"hold",label:"⏸ 保留"},{value:"rejected",label:"❌ 除外"}]}/>
          <Field label="メモ" value={f.note||""} onChange={s("note")} multiline placeholder="使用用途、評価など..."/>
          <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:14}}>
            <Btn onClick={()=>setModal(null)}>キャンセル</Btn>
            <Btn onClick={()=>handleSave(f)} variant="primary">保存</Btn>
          </div>
        </div>
      </div>
    );
  };
  return (
    <div style={{display:"grid",gap:12}}>
      {cfm.el}
      <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:8,overflow:"hidden"}}>
        <div style={{padding:"10px 14px",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:12,color:C.accent}}>在庫リスト</span>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>setShowAll(!showAll)} style={{background:"none",border:`1px solid ${C.border}`,color:C.textMuted,borderRadius:4,padding:"2px 10px",fontSize:12,cursor:"pointer"}}>{showAll?"除外分を隠す":`除外分も表示（${rejected.length}件）`}</button>

          </div>
        </div>
        {list.map((s,i)=>(
          <div key={s.id} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 14px",borderBottom:i<list.length-1?`1px solid ${C.border}`:"none",opacity:s.status==="rejected"?0.5:1}}>
            <span style={{minWidth:46,fontSize:12,color:ss[s.status]?.color,fontWeight:700}}>{ss[s.status]?.label}</span>
            <div style={{flex:1}}><div style={{fontSize:12,color:C.text,fontWeight:600}}>{s.name}</div><div style={{fontSize:12,color:C.textMuted,marginTop:1}}>{s.note}</div></div>
            <span style={{fontSize:12,color:C.textMuted}}>{s.qty}</span>
            <div style={{display:"flex",gap:4}}><button onClick={()=>setModal({item:s})} style={{background:"none",border:"none",color:C.textMuted,cursor:"pointer",fontSize:14,padding:"10px 8px",minWidth:44,minHeight:44,display:"inline-flex",alignItems:"center",justifyContent:"center"}}>✏️</button><button onClick={()=>handleDelete(s.id)} style={{background:"none",border:"none",color:C.red,cursor:"pointer",fontSize:14,padding:"10px 8px",minWidth:44,minHeight:44,display:"inline-flex",alignItems:"center",justifyContent:"center"}}>🗑</button></div>
          </div>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:8,padding:14}}>
          <div style={{fontSize:12,color:C.accent,marginBottom:10}}>原則</div>
          {["横糸 = 打感情報の主経路 → PTP 1.25 を原則維持","縦糸 = スピン性能必須 → Blast採用理由","テンション：縦 ≧ 横（横＞縦はNG）","好む打感：「面に乗ってビヨーンと全体が伸びて戻る振動」"].map((p,i)=>(
            <div key={i} style={{fontSize:12,color:C.textDim,lineHeight:1.7,paddingLeft:8,borderLeft:`2px solid ${C.border}`,marginBottom:5}}>{p}</div>
          ))}
        </div>
        <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:8,padding:14}}>
          <div style={{fontSize:12,color:C.accent,marginBottom:10}}>テンション基準</div>
          {[["〜12℃","43p","確認済み"],["〜18℃","46p","推定最適"],["20℃×オープン","49p+","46pは制御不能"],["強打者対戦","-1〜2p","相手エネルギー加算"]].map((t,i)=>(
            <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <span style={{fontSize:12,color:C.textMuted}}>{t[0]}</span>

              <span style={{fontSize:12,color:C.textMuted}}>{t[2]}</span>
            </div>
          ))}
        </div>
      </div>
      <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:8,overflow:"hidden"}}>
        <button onClick={()=>setShowSetups(!showSetups)} style={{background:"none",border:"none",width:"100%",padding:"10px 14px",display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}}>
          <span style={{fontSize:12,color:C.yellow,fontWeight:700}}>⚡ セッティングマスター（{(stringSetups||[]).filter(s=>s.status!=="archived").length}件）</span>
          <span style={{fontSize:12,color:C.textMuted}}>{showSetups?"▼":"▶"}</span>
        </button>
        {showSetups&&(
          <div style={{padding:"0 14px 14px"}}>
            <div style={{fontSize:12,color:C.textMuted,marginBottom:8}}>縦糸×横糸×テンションの組み合わせ。大会・練習のドロップダウンに表示されます。</div>
            {(stringSetups||[]).map(s=>(
              <div key={s.id} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 0",borderBottom:`1px solid ${C.border}`,opacity:s.status==="archived"?0.4:1}}>
                <div style={{flex:1,fontSize:12,color:C.text,fontWeight:600}}>{s.label}</div>
                <button onClick={()=>toggleArchiveSetup(s)} style={{background:"none",border:"none",color:s.status==="archived"?C.accent:C.textMuted,cursor:"pointer",fontSize:12,padding:"8px 10px"}}>{s.status==="archived"?"復元":"非表示"}</button>
                <button onClick={()=>handleDeleteSetup(s.id)} style={{background:"none",border:"none",color:C.red,cursor:"pointer",fontSize:14,padding:"10px 8px",minWidth:44,minHeight:44,display:"inline-flex",alignItems:"center",justifyContent:"center"}}>🗑</button>
              </div>
            ))}
            {!addingSetup?(
              <button onClick={()=>setAddingSetup(true)} style={{background:C.accent,border:"none",color:"#fff",borderRadius:5,padding:"5px 14px",fontSize:12,fontWeight:700,cursor:"pointer",marginTop:8}}>＋ 追加</button>

              <div style={{marginTop:8,background:C.panel2,borderRadius:8,padding:12}}>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 10px"}}>
                  <FSelect label="縦糸" value={sf.stringMain} onChange={v=>setSf(p=>({...p,stringMain:v}))} options={[{value:"",label:"-- 選択 --"},...data.filter(s=>s.status!=="rejected").map(s=>({value:s.name,label:s.name}))]}/>
                  <FSelect label="横糸（単張りは空欄）" value={sf.stringCross} onChange={v=>setSf(p=>({...p,stringCross:v}))} options={[{value:"",label:"-- なし（単張り） --"},...data.filter(s=>s.status!=="rejected").map(s=>({value:s.name,label:s.name}))]}/>
                </div>
                <div style={{display:"flex",gap:8,marginTop:4}}>
                  <Btn onClick={()=>setAddingSetup(false)}>キャンセル</Btn>
                  <Btn onClick={handleAddSetup} variant="primary">追加</Btn>
                </div>
              </div>
            )}
          </div>
        )}
      </div>
      {modal&&<Modal item={modal.item}/>}
    </div>
  );
}

function NextTab({data,setData,trials,toast}){
  const cfm=useConfirm();
  const [modal,setModal]=useState(null);
  const [showDone,setShowDone]=useState(false);
  const [showTpl,setShowTpl]=useState(false);
  const catColor={検証:C.blue,準備:C.accent,買い物:C.orange,チェックリスト:C.purple};
  const catIcon={検証:"🔬",準備:"📋",買い物:"🛒",チェックリスト:"✅"};
  const persist=list=>{setData(list);save(KEYS.next,list);};
  const toggleCheck=id=>{
    const item=data.find(n=>n.id===id);if(!item)return;
    const wasDone=item.done;
    persist(data.map(n=>n.id===id?{...n,done:!n.done,doneAt:!n.done?new Date().toISOString():""}:n));
    if(!wasDone){toast.show("✅ 完了",C.accent,()=>{persist(data.map(n=>n.id===id?{...n,done:false,doneAt:""}:n));});}
  };
  const toggleSubCheck=(itemId,idx)=>{persist(data.map(n=>{
    if(n.id!==itemId)return n;
    const cl=[...(n.checklist||[])];cl[idx]={...cl[idx],done:!cl[idx].done};return{...n,checklist:cl};
  }));};
  const handleSave=form=>{const isNew=!data.find(n=>n.id===form.id);persist(isNew?[...data,form]:data.map(n=>n.id===form.id?form:n));setModal(null);toast.show("✅ 更新しました");};
  const handleDelete=id=>{const bk=[...data];cfm.ask("削除しますか？",()=>{persist(data.filter(n=>n.id!==id));toast.show("🗑 削除しました",C.red,()=>persist(bk));});};
  const clearDone=()=>cfm.ask("完了済みを全て削除？",()=>{persist(data.filter(n=>!n.done));toast.show("🗑 削除しました",C.red);});

  const TEMPLATES={
    試合持ち物:{cat:"チェックリスト",items:["ラケット（エース＋サブ）","タオル×2","水筒（2本）","サングラス","替えグリップテープ","帽子","日焼け止め","着替え","テーピング","サプリ（塩分・エネルギー）"]},
    試合前準備:{cat:"準備",items:["ストリングのテンション確認","グリップテープ交換","天気・気温チェック","ウォームアップメニュー決定","メンタルルーティン確認"]},
    張り替え:{cat:"準備",items:["ストリング在庫確認","テンション決定（気温考慮）","クランプ・工具点検","張り上がり後の玉突きチェック"]},
  };
  const addTemplate=name=>{
    const tpl=TEMPLATES[name];
    const item={id:`nx${Date.now()}`,priority:"中",category:tpl.cat,label:name,detail:"",done:false,doneAt:"",checklist:tpl.items.map(t=>({text:t,done:false})),linkedTrialId:"",linkedType:""};
    persist([item,...data]);setShowTpl(false);
    toast.show(`📋 ${name}を追加しました`);
  };

  const PRIO_ORDER={"最高":0,"高":1,"中":2,"低":3};
  const pending=data.filter(n=>!n.done).sort((a,b)=>(PRIO_ORDER[a.priority]??2)-(PRIO_ORDER[b.priority]??2));
  const done=data.filter(n=>n.done).sort((a,b)=>(b.doneAt||"").localeCompare(a.doneAt||""));
  const moveItem=(id,dir)=>{
    const list=[...data];
    const idx=list.findIndex(n=>n.id===id);
    if(idx<0)return;
    const item=list[idx];
    const samePrio=list.filter(n=>!n.done&&n.priority===item.priority);
    const posInPrio=samePrio.findIndex(n=>n.id===id);
    if(dir==="up"&&posInPrio<=0)return;
    if(dir==="down"&&posInPrio>=samePrio.length-1)return;
    const swapWith=samePrio[posInPrio+(dir==="up"?-1:1)];
    const idxA=list.findIndex(n=>n.id===id);
    const idxB=list.findIndex(n=>n.id===swapWith.id);
    [list[idxA],list[idxB]]=[list[idxB],list[idxA]];
    persist(list);
  };

  const Modal=({item})=>{
    const [f,setF]=useState({...item,checklist:item.checklist||[]}); const s=k=>v=>setF(p=>({...p,[k]:v}));
    const [newCl,setNewCl]=useState("");
    const addCl=()=>{if(newCl.trim()){setF(p=>({...p,checklist:[...p.checklist,{text:newCl.trim(),done:false}]}));setNewCl("");}};
    const rmCl=i=>setF(p=>({...p,checklist:p.checklist.filter((_,j)=>j!==i)}));
    return (
      <div style={{position:"fixed",inset:0,background:"#0004",zIndex:200,display:"flex",alignItems:"flex-start",justifyContent:"center",overflowY:"auto",padding:"20px 12px"}} onClick={e=>e.target===e.currentTarget&&setModal(null)}>
        <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:12,width:"100%",maxWidth:460,padding:20}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <span style={{fontSize:15,fontWeight:700,color:C.text}}>Nextアクション</span>
            <button onClick={()=>setModal(null)} style={{background:"none",border:`1px solid ${C.border}`,color:C.textMuted,borderRadius:6,padding:"8px 14px",fontSize:14,cursor:"pointer"}}>✕ 閉じる</button>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
            <FSelect label="カテゴリ" value={f.category||"検証"} onChange={s("category")} options={[{value:"検証",label:"🔬 検証"},{value:"準備",label:"📋 準備"},{value:"買い物",label:"🛒 買い物"},{value:"チェックリスト",label:"✅ チェックリスト"}]}/>
            <FSelect label="優先度" value={f.priority||"中"} onChange={s("priority")} options={[{value:"最高",label:"最高"},{value:"高",label:"高"},{value:"中",label:"中"},{value:"低",label:"低"}]}/>
          </div>
          <Field label="アクション名" value={f.label||""} onChange={s("label")} placeholder="Boom Pro × Phantom Spin 17 で実打"/>
          <Field label="詳細" value={f.detail||""} onChange={s("detail")} multiline placeholder="背景、条件、期待する結果..."/>
          <FSelect label="関連する試打（任意）" value={f.linkedTrialId||""} onChange={s("linkedTrialId")} options={[{value:"",label:"-- なし --"},...(trials||[]).map(t=>({value:t.id,label:`${t.date} ${t.racketName||""} ${t.stringMain||""} ${t.judgment||""}`}))]}/>
          <div style={{fontSize:12,color:C.purple,margin:"10px 0 6px",fontWeight:600}}>📋 チェックリスト（任意）</div>
          {f.checklist.map((cl,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
              <span style={{fontSize:12,color:C.text,flex:1}}>{cl.text}</span>
              <button onClick={()=>rmCl(i)} style={{background:"none",border:"none",color:C.red,cursor:"pointer",fontSize:14,padding:"8px",minWidth:44,minHeight:44,display:"inline-flex",alignItems:"center",justifyContent:"center"}}>✕</button>
            </div>
          ))}
          <div style={{display:"flex",gap:6,marginTop:4}}>
            <input value={newCl} onChange={e=>setNewCl(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addCl()} placeholder="チェック項目を追加..." style={{flex:1,background:C.panel2,border:`1px solid ${C.border}`,borderRadius:6,padding:"8px 10px",color:C.text,fontSize:12,outline:"none"}}/>
            <button onClick={addCl} style={{background:C.purple,border:"none",color:"#fff",borderRadius:6,padding:"8px 14px",fontSize:12,fontWeight:700,cursor:"pointer"}}>追加</button>
          </div>
          <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:16}}>
            <button onClick={()=>setModal(null)} style={{background:C.panel2,border:`1px solid ${C.border}`,color:C.textMuted,borderRadius:8,padding:"10px 20px",fontSize:13,cursor:"pointer"}}>キャンセル</button>
            <button onClick={()=>handleSave(f)} style={{background:C.accent,border:"none",color:"#fff",borderRadius:8,padding:"10px 20px",fontSize:13,fontWeight:700,cursor:"pointer"}}>保存</button>
          </div>
        </div>
      </div>
    );
  };

  const ItemCard=({a})=>{
    const [open,setOpen]=useState(false);
    const bc=catColor[a.category]||C.blue;
    const cl=a.checklist||[];
    const clDone=cl.filter(c=>c.done).length;
    const hasCl=cl.length>0;
    return (
      <div style={{background:a.done?"#f0f0f5":C.panel,border:`1px solid ${a.done?"#d1d5db":C.border}`,borderLeft:`4px solid ${a.done?C.textMuted:bc}`,borderRadius:10,padding:"12px 14px",opacity:a.done?0.5:1}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <button onClick={()=>toggleCheck(a.id)} style={{width:32,height:32,borderRadius:6,border:`2px solid ${a.done?C.accent:bc}`,background:a.done?C.accent:"transparent",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0,fontSize:16,color:"#fff",fontWeight:700}}>{a.done?"✓":""}</button>
          <div onClick={()=>!a.done&&setOpen(!open)} style={{flex:1,minWidth:0,cursor:hasCl&&!a.done?"pointer":"default"}}>
            <div style={{fontSize:14,color:a.done?C.textMuted:C.text,fontWeight:700,textDecoration:a.done?"line-through":"none"}}>{a.label}</div>
            {!a.done&&a.detail&&<div style={{fontSize:12,color:C.textMuted,marginTop:2}}>{a.detail}</div>}
            {!a.done&&hasCl&&<div style={{fontSize:12,color:bc,marginTop:3}}>{catIcon[a.category]||""} {clDone}/{cl.length}完了 {open?"▲":"▼"}</div>}
          </div>
          <div style={{display:"flex",gap:4,flexShrink:0}}>
            {!a.done&&<div style={{display:"flex",flexDirection:"column",gap:1}}>
              <button onClick={()=>moveItem(a.id,"up")} style={{background:"none",border:`1px solid ${C.border}`,color:C.textMuted,cursor:"pointer",fontSize:12,borderRadius:3,padding:"2px 6px",lineHeight:1}}>▲</button>
              <button onClick={()=>moveItem(a.id,"down")} style={{background:"none",border:`1px solid ${C.border}`,color:C.textMuted,cursor:"pointer",fontSize:12,borderRadius:3,padding:"2px 6px",lineHeight:1}}>▼</button>
            </div>}
            {!a.done&&<span style={{fontSize:12,color:bc,background:bc+"18",padding:"4px 8px",borderRadius:4,fontWeight:600}}>{a.priority}</span>}
            <button onClick={()=>setModal({item:a})} style={{background:C.panel2,border:`1px solid ${C.border}`,color:C.textMuted,cursor:"pointer",fontSize:14,borderRadius:6,padding:"6px 10px",minWidth:36,textAlign:"center"}}>✏️</button>
            <button onClick={()=>handleDelete(a.id)} style={{background:C.panel2,border:`1px solid ${C.border}`,color:C.red,cursor:"pointer",fontSize:14,borderRadius:6,padding:"6px 10px",minWidth:36,textAlign:"center"}}>🗑</button>
          </div>
        </div>
        {open&&hasCl&&!a.done&&(
          <div style={{marginTop:10,marginLeft:42,display:"grid",gap:4}}>
            {cl.map((c,i)=>(
              <div key={i} onClick={()=>toggleSubCheck(a.id,i)} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 10px",background:c.done?"#ecfdf5":C.panel2,border:`1px solid ${C.border}`,borderRadius:6,cursor:"pointer"}}>
                <div style={{width:22,height:22,borderRadius:4,border:`2px solid ${c.done?C.accent:C.border}`,background:c.done?C.accent:"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,color:"#fff",fontWeight:700,flexShrink:0}}>{c.done?"✓":""}</div>
                <span style={{fontSize:13,color:c.done?C.textMuted:C.text,textDecoration:c.done?"line-through":"none"}}>{c.text}</span>
              </div>
            ))}
          </div>
        )}
      </div>
    );
  };

  return (
    <div style={{display:"grid",gap:8}}>

    </div>
  );

function QuickTrialMode({rackets,stringSetups,strings,trials,setTrials,tournaments,practices,setPractices,cards,setCards,onClose,toast}){
  const [selected,setSelected]=useState(null);
  const [adding,setAdding]=useState(false);
  const [addF,setAddF]=useState({racket:"",stringMain:"",stringCross:"",tensionMain:"",tensionCross:""});
  const [eval_,setEval]=useState({spin:3,power:3,control:3,info:3,maneuver:3,swingThrough:3,trajectory:3,stiffness:3,shotForeAtk:3,shotForeDef:3,shotBackAtk:3,shotBackDef:3,shotSlice:3,shotServe:3,shotVolley:3,shotReturn:3,confidence:3,memo:""});

  const persistCards=list=>{setCards(list);save(KEYS.quickTrialCards,list);};
  const selectCard=id=>{
    // 現在のカードにeval_を保存してから切り替え
    if(selected){
      persistCards(cards.map(c=>c.id===selected?{...c,eval:{...eval_}}:c));
    }
    // 新しいカードのevalを読み込む
    const card=cards.find(c=>c.id===id);
    if(card?.eval){
      setEval({spin:3,power:3,control:3,info:3,maneuver:3,swingThrough:3,trajectory:3,stiffness:3,shotForeAtk:3,shotForeDef:3,shotBackAtk:3,shotBackDef:3,shotSlice:3,shotServe:3,shotVolley:3,shotReturn:3,confidence:3,memo:"",...card.eval});
    }else{
      setEval({spin:3,power:3,control:3,info:3,maneuver:3,swingThrough:3,trajectory:3,stiffness:3,shotForeAtk:3,shotForeDef:3,shotBackAtk:3,shotBackDef:3,shotSlice:3,shotServe:3,shotVolley:3,shotReturn:3,confidence:3,memo:""});
    }
    setSelected(id);
  };
  const backToList=()=>{
    // カードにeval_を保存してから一覧に戻る
    if(selected){
      persistCards(cards.map(c=>c.id===selected?{...c,eval:{...eval_}}:c));
    }
    setSelected(null);
  };
  const activeRackets=rackets.filter(r=>r.status!=="retired");
  const rOpts=[{value:"",label:"-- ラケット --"},...activeRackets.map(r=>({value:r.name,label:r.name}))];
  const statusColor={active:"#e74c3c",candidate:"#3498db",considering:"#95a5a6",support:"#27ae60"};

  const handleAddCard=()=>{
    if(!addF.racket){toast.show("ラケットを選択",C.red);return;}
    const r=activeRackets.find(x=>x.name===addF.racket);
    const sc=statusColor[r?.status]||"#888";
    persistCards([...cards,{id:`qc${Date.now()}`,racket:addF.racket,stringMain:addF.stringMain,stringCross:addF.stringCross,tensionMain:addF.tensionMain,tensionCross:addF.tensionCross,color:sc}]);
    setAddF({racket:"",stringMain:"",stringCross:"",tensionMain:"",tensionCross:""});setAdding(false);
  };

  const criteriaGroups=[
    {title:"性能評価",desc:"高い方が良い",items:[
      {key:"spin",label:"スピン",low:"弱い",high:"強い"},
      {key:"power",label:"推進力",low:"飛ばない",high:"飛ぶ"},
      {key:"control",label:"コントロール",low:"散る",high:"狙える"},
      {key:"info",label:"打感情報",low:"感じない",high:"クリア"},
      {key:"maneuver",label:"操作性",low:"重い",high:"軽快"},
      {key:"swingThrough",label:"振り抜き",low:"悪い",high:"良い"},
    ]},
    {title:"特性",desc:"中央が基準",items:[
      {key:"trajectory",label:"弾道の高さ",low:"低い",high:"高い"},
      {key:"stiffness",label:"打感",low:"柔らかい",high:"硬い"},
    ]},
    {title:"ショット別",desc:"高い方が良い",items:[
      {key:"shotForeAtk",label:"フォア（攻撃）",low:"",high:""},
      {key:"shotForeDef",label:"フォア（守備）",low:"",high:""},
      {key:"shotBackAtk",label:"バック（攻撃）",low:"",high:""},
      {key:"shotBackDef",label:"バック（守備）",low:"",high:""},
      {key:"shotSlice",label:"スライス",low:"",high:""},
      {key:"shotServe",label:"サーブ",low:"",high:""},
      {key:"shotVolley",label:"ボレー",low:"",high:""},
      {key:"shotReturn",label:"リターン",low:"",high:""},
    ]},
    {title:"総合",desc:"",items:[
      {key:"confidence",label:"安心感",low:"不安",high:"振り切れる"},
    ]},
  ];


  const handleSave=()=>{
    const card=cards.find(c=>c.id===selected);if(!card)return;
    const todayDate=new Date().toLocaleDateString("ja-JP",{year:"numeric",month:"2-digit",day:"2-digit"});
    // 同じ日の練習レコードを検索
    const matchingPractice=(practices||[]).find(p=>p.date===todayDate);
    const linkedPracId=matchingPractice?.id||"";
    // 同じ日の試合レコードを検索（大会の中から）
    let linkedMtchId="";
    (tournaments||[]).forEach(trn=>{
      if(trn.date===todayDate){
        const lastMatch=(trn.matches||[]).slice(-1)[0];
        if(lastMatch)linkedMtchId=lastMatch.id;
      }
    });
    const trial={id:`t${Date.now()}`,date:todayDate,racketName:card.racket,stringMain:card.stringMain||"",stringCross:card.stringCross||"",tensionMain:card.tensionMain||"",tensionCross:card.tensionCross||"",temp:matchingPractice?.temp||"",venue:matchingPractice?.venue||"",judgment:"保留",spin:eval_.spin,power:eval_.power,control:eval_.control,info:eval_.info,maneuver:eval_.maneuver,swingThrough:eval_.swingThrough,trajectory:eval_.trajectory,stiffness:eval_.stiffness,shotForeAtk:eval_.shotForeAtk,shotForeDef:eval_.shotForeDef,shotBackAtk:eval_.shotBackAtk,shotBackDef:eval_.shotBackDef,shotSlice:eval_.shotSlice,shotServe:eval_.shotServe,shotVolley:eval_.shotVolley,shotReturn:eval_.shotReturn,confidence:eval_.confidence,strokeNote:"",serveNote:"",volleyNote:"",generalNote:eval_.memo,sessions:[],linkedPracticeId:linkedPracId,linkedMatchId:linkedMtchId};
    const updatedTrials=[trial,...(trials||[])];
    setTrials(updatedTrials);save(KEYS.trials,updatedTrials);
    let linked=!!matchingPractice||!!linkedMtchId;
    const linkMsg=linkedMtchId&&matchingPractice?"練習＋試合と紐づけ":linkedMtchId?"試合と紐づけ":matchingPractice?"練習と紐づけ":"";
    persistCards(cards.filter(c=>c.id!==selected));
    toast.show(linked?`✅ 試打タブに保存 → ${linkMsg}`:"✅ 試打タブに保存",C.accent,null,linked?4000:2600);
    setSelected(null);setEval({spin:3,power:3,control:3,info:3,maneuver:3,swingThrough:3,trajectory:3,stiffness:3,shotForeAtk:3,shotForeDef:3,shotBackAtk:3,shotBackDef:3,shotSlice:3,shotServe:3,shotVolley:3,shotReturn:3,confidence:3,memo:""});
  };

  const bg="#f5f0e8",txt="#222",muted="#444",bdr="#bbb";

  // Evaluation view
  if(selected){
    const card=cards.find(c=>c.id===selected);
    const sc=card?.color||"#888";
    return (
      <div style={{position:"fixed",inset:0,background:bg,zIndex:500,overflowY:"auto",fontFamily:"'Noto Sans JP',sans-serif"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 16px",borderBottom:"1px solid "+bdr}}>
          <button onClick={backToList} style={{background:"none",border:"none",fontSize:14,color:txt,cursor:"pointer",fontWeight:600}}>← 一覧</button>
          <span style={{fontSize:13,color:muted}}>試打ノート</span>
          <div style={{width:40}}></div>
        </div>
        <div style={{background:sc,borderRadius:12,margin:"12px 16px",padding:"16px 20px"}}>
          <div style={{fontSize:20,fontWeight:800,color:"#fff"}}>{card?.racket}</div>
          <div style={{fontSize:13,color:"rgba(255,255,255,0.8)",marginTop:4}}>{[card?.stringMain,card?.stringCross].filter(Boolean).join(" / ")}{card?.tensionMain?" / "+fmtTension(card?.tensionMain,card?.tensionCross):""}</div>
        </div>
        <div style={{padding:"0 16px 20px"}}>
          {criteriaGroups.map(grp=>(
            <div key={grp.title} style={{marginBottom:16}}>
              <div style={{display:"flex",alignItems:"baseline",gap:8,marginBottom:10,borderBottom:"1px solid "+bdr,paddingBottom:6}}>
                <span style={{fontSize:15,fontWeight:800,color:txt}}>{grp.title}</span>
                {grp.desc&&<span style={{fontSize:11,color:muted}}>{grp.desc}</span>}
              </div>
              {grp.items.map(c=>(
                <div key={c.key} style={{marginBottom:16}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
                    <span style={{fontSize:15,fontWeight:700,color:txt}}>{c.label}</span>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    {c.low&&<span style={{fontSize:10,color:muted,minWidth:44,textAlign:"right"}}>{c.low}</span>}
                    {[1,2,3,4,5].map(n=>(
                      <button key={n} onClick={()=>setEval(p=>({...p,[c.key]:n}))} style={{flex:1,height:44,borderRadius:8,border:"2px solid "+(eval_[c.key]===n?sc:bdr),background:eval_[c.key]===n?sc:"#fff",color:eval_[c.key]===n?"#fff":muted,fontSize:17,fontWeight:700,cursor:"pointer"}}>{n}</button>
                    ))}
                    {c.high&&<span style={{fontSize:10,color:muted,minWidth:44}}>{c.high}</span>}
                  </div>
                </div>
              ))}
            </div>
          ))}
          <div style={{marginBottom:20}}>
            <div style={{fontSize:16,fontWeight:700,color:txt,marginBottom:8}}>メモ（一言）</div>
            <textarea value={eval_.memo} onChange={e=>setEval(p=>({...p,memo:e.target.value}))} placeholder="気づいたことを一言..." rows={3} style={{width:"100%",borderRadius:8,border:"1px solid "+bdr,padding:"12px",fontSize:14,fontFamily:"inherit",resize:"vertical",color:txt,background:"#fff"}}/>
          </div>
          <button onClick={handleSave} style={{width:"100%",background:sc,border:"none",borderRadius:10,padding:"14px",fontSize:16,fontWeight:700,color:"#fff",cursor:"pointer"}}>保存して試打タブに転送する</button>
        </div>
      </div>
    );
  }

  // Card list view
  return (
    <div style={{position:"fixed",inset:0,background:bg,zIndex:500,overflowY:"auto",fontFamily:"'Noto Sans JP',sans-serif"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 16px",borderBottom:"1px solid "+bdr}}>
        <button onClick={onClose} style={{background:"none",border:"none",fontSize:20,color:txt,cursor:"pointer"}}>✕</button>
        <span style={{fontSize:15,fontWeight:700,color:txt}}>試打ノート</span>
        <div style={{width:30}}></div>
      </div>
      <div style={{padding:"12px 16px"}}>
        {cards.length===0&&!adding&&(
          <div style={{textAlign:"center",padding:"30px 0",color:muted,fontSize:13}}>
            「＋ 追加」で今日試打するラケット×セッティングを登録
          </div>
        )}
        {cards.map(card=>(
          <button key={card.id} onClick={()=>selectCard(card.id)} style={{display:"block",width:"100%",textAlign:"left",background:"#fff",border:"2px solid "+card.color+"30",borderLeft:"4px solid "+card.color,borderRadius:10,padding:"16px 20px",marginBottom:10,cursor:"pointer"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{fontSize:18,fontWeight:800,color:card.color}}>{card.racket}</div>
              {card.eval&&<span style={{fontSize:12,color:muted,background:"#eee",padding:"2px 8px",borderRadius:4}}>評価済み</span>}
            </div>
            <div style={{fontSize:13,color:muted,marginTop:4}}>{[card.stringMain,card.stringCross].filter(Boolean).join(" / ")}{card.tensionMain?" / "+fmtTension(card.tensionMain,card.tensionCross):""}</div>
          </button>
        ))}
        {!adding?(
          <button onClick={()=>setAdding(true)} style={{width:"100%",background:"#fff",border:"2px dashed "+bdr,borderRadius:10,padding:"14px",fontSize:14,color:muted,cursor:"pointer",fontWeight:600}}>＋ 追加</button>
        ):(
          <div style={{background:"#fff",border:"1px solid "+bdr,borderRadius:10,padding:16}}>
            <select value={addF.racket} onChange={e=>setAddF(p=>({...p,racket:e.target.value}))} style={{width:"100%",border:"1px solid "+bdr,borderRadius:6,padding:"10px",fontSize:14,marginBottom:8,color:txt,background:"#fff"}}>
              {rOpts.map(o=><option key={o.value} value={o.value}>{o.label}</option>)}
            </select>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
              <select value={addF.stringMain} onChange={e=>setAddF(p=>({...p,stringMain:e.target.value}))} style={{width:"100%",border:"1px solid "+bdr,borderRadius:6,padding:"10px",fontSize:14,color:txt,background:"#fff"}}>
                {getStringOpts(strings).map(o=><option key={o.value} value={o.value}>{o.label}</option>)}
              </select>
              <select value={addF.stringCross} onChange={e=>setAddF(p=>({...p,stringCross:e.target.value}))} style={{width:"100%",border:"1px solid "+bdr,borderRadius:6,padding:"10px",fontSize:14,color:txt,background:"#fff"}}>
                {[{value:"",label:"-- 横糸（同じ）--"},...getStringOpts(strings).slice(1)].map(o=><option key={o.value} value={o.value}>{o.label}</option>)}
              </select>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
              <input value={addF.tensionMain} onChange={e=>setAddF(p=>({...p,tensionMain:e.target.value}))} placeholder="縦テンション（例：46）" style={{width:"100%",border:"1px solid "+bdr,borderRadius:6,padding:"10px",fontSize:14,color:txt,background:"#fff"}}/>
              <input value={addF.tensionCross} onChange={e=>setAddF(p=>({...p,tensionCross:e.target.value}))} placeholder="横テンション（同じなら空欄）" style={{width:"100%",border:"1px solid "+bdr,borderRadius:6,padding:"10px",fontSize:14,color:txt,background:"#fff"}}/>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setAdding(false)} style={{flex:1,background:"#eee",border:"none",borderRadius:6,padding:"10px",fontSize:13,cursor:"pointer",color:txt}}>キャンセル</button>
              <button onClick={handleAddCard} style={{flex:1,background:txt,border:"none",borderRadius:6,padding:"10px",fontSize:13,color:"#fff",cursor:"pointer",fontWeight:700}}>追加</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── OPPONENTS TAB ─────────────────────────────────
function OpponentsTab({data,setData,tournaments,setTournaments,toast}){
  const cfm=useConfirm();
  const [modal,setModal]=useState(null);
  const [expanded,setExpanded]=useState(null);
  const persist=list=>{setData(list);save(KEYS.opponents,list);};
  const handleSave=form=>{
    const isNew=!data.find(o=>o.id===form.id);
    const old=data.find(o=>o.id===form.id);
    // Cascade name change to all matches
    if(!isNew&&old&&old.name!==form.name&&old.name){
      const updated=(tournaments||[]).map(t=>{
        const newMatches=(t.matches||[]).map(m=>m.opponent===old.name?{...m,opponent:form.name}:m);
        const hasChange=newMatches.some((m,i)=>m!==(t.matches||[])[i]);
        return hasChange?{...t,matches:newMatches}:t;
      });
      const changed=updated.some((t,i)=>t!==tournaments[i]);
      if(changed){setTournaments(updated);save(KEYS.tournaments,updated);}
    }
    persist(isNew?[...data,form]:data.map(o=>o.id===form.id?form:o));
    setModal(null);toast.show("✅ 更新しました");
  };
  const handleDelete=id=>{const bk=[...data];cfm.ask("この対戦相手を削除しますか？",()=>{persist(data.filter(o=>o.id!==id));setExpanded(null);toast.show("🗑 削除しました",C.red,()=>persist(bk));});};
  const Modal=({item})=>{
    const [f,setF]=useState({...item}); const s=k=>v=>setF(p=>({...p,[k]:v}));
    return (
      <div style={{position:"fixed",inset:0,background:"#0004",zIndex:200,display:"flex",alignItems:"flex-start",justifyContent:"center",overflowY:"auto",padding:"20px 12px"}} onClick={e=>e.target===e.currentTarget&&setModal(null)}>
        <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:12,width:"100%",maxWidth:500,padding:20}}>
          <div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:16}}>🆚 対戦相手</div>
          <Field label="名前" value={f.name||""} onChange={s("name")} placeholder="ヤスアキさん"/>
          <Field label="ニックネーム" value={f.nickname||""} onChange={s("nickname")} placeholder="任意"/>
          <Field label="プレースタイル" value={f.playStyle||""} onChange={s("playStyle")} multiline placeholder="ストロークが安定、ネットプレーが上手い..."/>
          <Field label="強み" value={f.strengths||""} onChange={s("strengths")} multiline placeholder="ここぞという時の勝負強さ..."/>
          <Field label="弱み" value={f.weaknesses||""} onChange={s("weaknesses")} multiline placeholder="バック側のハイボール..."/>
          <Field label="メモ・対策" value={f.notes||""} onChange={s("notes")} multiline placeholder="Claude議論で判明したこと、次回の対策..."/>
          <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:14}}>
            <Btn onClick={()=>setModal(null)}>キャンセル</Btn>
            <Btn onClick={()=>handleSave(f)} variant="primary">保存</Btn>
          </div>
        </div>
      </div>
    );
  };
  return (
    <div>
      {cfm.el}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <span style={{fontSize:12,color:C.accent}}>対戦相手一覧 ({data.length}人)</span>
        <button onClick={()=>setModal({item:{id:`opp${Date.now()}`,name:"",nickname:"",playStyle:"",strengths:"",weaknesses:"",matchHistory:[],notes:"",lastMet:""}})} style={{background:C.accent,border:"none",color:"#fff",borderRadius:5,padding:"4px 12px",fontSize:12,fontWeight:700,cursor:"pointer"}}>＋ 追加</button>
      </div>
      {data.length===0&&<div style={{background:C.panel,border:`1px dashed ${C.border}`,borderRadius:8,padding:"30px 20px",textAlign:"center",color:C.textMuted,fontSize:12}}>対戦相手がまだ登録されていません</div>}
      {data.map(o=>{
        const on=expanded===o.id;
        return (
          <div key={o.id} style={{background:C.panel,border:`1px solid ${on?C.accent:C.border}`,borderRadius:8,padding:12,marginBottom:6}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <span style={{fontSize:13,fontWeight:700,color:C.text}}>{o.name}</span>
                {o.nickname&&<span style={{fontSize:12,color:C.textMuted,marginLeft:6}}>({o.nickname})</span>}
              </div>
              <div style={{display:"flex",gap:4}}>
                <button onClick={()=>setModal({item:o})} style={{background:"none",border:"none",color:C.textMuted,cursor:"pointer",fontSize:14,padding:"10px 8px",minWidth:44,minHeight:44,display:"inline-flex",alignItems:"center",justifyContent:"center"}}>✏️</button>
                <button onClick={()=>handleDelete(o.id)} style={{background:"none",border:"none",color:C.red,cursor:"pointer",fontSize:14,padding:"10px 8px",minWidth:44,minHeight:44,display:"inline-flex",alignItems:"center",justifyContent:"center"}}>🗑</button>
              </div>
            </div>
            {o.playStyle&&<div style={{fontSize:12,color:C.textMuted,marginTop:3}}>{o.playStyle}</div>}
            <button onClick={()=>setExpanded(on?null:o.id)} style={{background:"none",border:"none",color:C.accent,cursor:"pointer",fontSize:12,marginTop:4,padding:0}}>{on?"▲ 閉じる":"▼ 詳細"}</button>
            {on&&(
              <div style={{marginTop:8,paddingTop:8,borderTop:`1px solid ${C.border}`}}>
                {o.strengths&&<div style={{marginBottom:6}}><span style={{fontSize:12,color:C.accent}}>強み: </span><span style={{fontSize:12,color:C.textDim,lineHeight:1.7}}>{o.strengths}</span></div>}
                {o.weaknesses&&<div style={{marginBottom:6}}><span style={{fontSize:12,color:C.red}}>弱み: </span><span style={{fontSize:12,color:C.textDim,lineHeight:1.7}}>{o.weaknesses}</span></div>}
                {o.notes&&<div style={{marginBottom:6}}><span style={{fontSize:12,color:C.blue}}>メモ: </span><span style={{fontSize:12,color:C.textDim,lineHeight:1.7}}>{o.notes}</span></div>}
                {(()=>{const matches=[];(tournaments||[]).forEach(t=>(t.matches||[]).forEach(m=>{if(m.opponent===o.name)matches.push({...m,trnName:t.name,trnDate:t.date});}));return matches.length>0?(<div style={{marginTop:8}}><div style={{fontSize:12,color:C.purple,fontWeight:600,marginBottom:4}}>📋 対戦履歴 ({matches.length}試合)</div>{matches.map((m,i)=>(<div key={i} style={{display:"flex",gap:6,alignItems:"center",fontSize:12,marginBottom:2}}><span style={{color:C.textMuted,fontFamily:"monospace",minWidth:70}}>{m.trnDate}</span><Badge color={m.result==="勝利"?"green":"red"} sm>{m.result}</Badge><span style={{color:C.textMuted}}>{m.trnName} {m.round}</span><span style={{color:C.textDim,fontFamily:"monospace"}}>{(m.setScores||[]).join(", ")}</span></div>))}</div>):null;})()}
              </div>
            )}
          </div>
        );
      })}
      {modal&&<Modal item={modal.item}/>}
    </div>
  );
}

// ── HOME TAB ──────────────────────────────────────
function HomeTab({next,setNext,tournaments,practices,trials,daysSinceExport,lastExport,onExport,onRecord,onGoToNext,onNavigate,toast}){
  const persistNext=list=>{setNext(list);save(KEYS.next,list);};
  const toggleCheck=id=>{
    const item=(next||[]).find(n=>n.id===id);if(!item)return;
    persistNext(next.map(n=>n.id===id?{...n,done:true,doneAt:new Date().toISOString()}:n));
    toast.show("✅ 完了",C.accent,()=>{persistNext(next.map(n=>n.id===id?{...n,done:false,doneAt:""}:n));});
  };
  const [quickText,setQuickText]=useState("");
  const addQuick=()=>{if(!quickText.trim())return;persistNext([{id:`nx${Date.now()}`,priority:"中",category:"準備",label:quickText.trim(),detail:"",done:false,doneAt:"",checklist:[],linkedTrialId:"",linkedType:""},...(next||[])]);setQuickText("");toast.show("✅ 追加 → 詳細はNextタブで編集");};

  const pending=(next||[]).filter(n=>!n.done).slice(0,5);
  const todayStr=new Date().toLocaleDateString("ja-JP",{year:"numeric",month:"2-digit",day:"2-digit"});
  const upcoming=(tournaments||[]).filter(t=>t.date>=todayStr).sort((a,b)=>a.date.localeCompare(b.date));
  const upcomingPrac=(practices||[]).filter(p=>p.date>todayStr).sort((a,b)=>a.date.localeCompare(b.date)).slice(0,3);
  const pastTrn=(tournaments||[]).filter(t=>t.date<=todayStr).slice(0,5);
  const catColor={検証:C.blue,準備:C.accent,買い物:C.orange,チェックリスト:C.purple};

  return (
    <div style={{display:"grid",gap:14,gridTemplateColumns:"minmax(0,1fr)"}}>
      {/* Record buttons */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>

          <button key={t} onClick={()=>onRecord(t)} style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:10,padding:"16px 8px",textAlign:"center",cursor:"pointer",transition:"all 0.1s"}}>
            <div style={{fontSize:22,marginBottom:4}}>{icon}</div>
            <div style={{fontSize:12,color:C.text,fontWeight:700}}>{label}を記録</div>
          </button>
        ))}
      </div>

      {/* Next actions with quick add */}
      <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:10,padding:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <span style={{fontSize:13,color:C.accent,fontWeight:700}}>▶ Next Actions</span>
          <button onClick={onGoToNext} style={{background:"none",border:`1px solid ${C.border}`,color:C.textMuted,borderRadius:6,padding:"6px 12px",fontSize:12,cursor:"pointer"}}>Nextタブで編集 →</button>

// ── SEARCH TAB ────────────────────────────────────
function SearchTab({tournaments,practices,trials,rackets,strings,stringSetups,toast}){
  const [fCat,setFCat]=useState("");
  const [fRacket,setFRacket]=useState("");
  const [fString,setFString]=useState("");
  const [fPeriod,setFPeriod]=useState("");

  const allRecords=React.useMemo(()=>{
    const recs=[];
    (tournaments||[]).forEach(t=>{
      recs.push({type:"🏆",cat:"大会",date:t.date,name:t.name||"",racket:t.racketName||"",stMain:t.stringMain||"",stCross:t.stringCross||"",tension:fmtTension(t.tensionMain,t.tensionCross),temp:t.temp||"",result:t.overallResult||"",raw:t});
      (t.matches||[]).forEach(m=>{
        if(m.racketName||m.stringMain) recs.push({type:"⚔️",cat:"大会",date:t.date,name:`${t.name} ${m.round||""}`,racket:m.racketName||t.racketName||"",stMain:m.stringMain||t.stringMain||"",stCross:m.stringCross||t.stringCross||"",tension:fmtTension(m.tensionMain||t.tensionMain,m.tensionCross||t.tensionCross),temp:t.temp||"",result:m.result||"",raw:m});
      });
    });
    (practices||[]).forEach(p=>{
      recs.push({type:"🏃",cat:"練習",date:p.date,name:p.type||"練習",racket:p.racketName||"",stMain:p.stringMain||"",stCross:p.stringCross||"",tension:fmtTension(p.tensionMain,p.tensionCross),temp:p.temp||"",result:"",raw:p});
    });
    (trials||[]).forEach(t=>{
      const ac=((t.spin+t.control+t.power+t.feel+t.info)/5).toFixed(1);
      recs.push({type:"🎾",cat:"試打",date:t.date,name:`${t.racketName||"—"} ${[t.stringMain,t.stringCross].filter(Boolean).join("/")}`,racket:t.racketName||"",stMain:t.stringMain||"",stCross:t.stringCross||"",tension:fmtTension(t.tensionMain,t.tensionCross),temp:t.temp||"",result:`avg${ac} ${t.judgment||""}`,raw:t});
    });
    return recs.sort((a,b)=>(b.date||"").localeCompare(a.date||""));
  },[tournaments,practices,trials]);

  // Period filter
  const todayStr=new Date().toLocaleDateString("ja-JP",{year:"numeric",month:"2-digit",day:"2-digit"});
  const periodStart=(()=>{
    if(!fPeriod)return "";
    const d=new Date();
    if(fPeriod==="1m")d.setMonth(d.getMonth()-1);
    else if(fPeriod==="3m")d.setMonth(d.getMonth()-3);
    else if(fPeriod==="6m")d.setMonth(d.getMonth()-6);
    else if(fPeriod==="1y")d.setFullYear(d.getFullYear()-1);
    return d.toLocaleDateString("ja-JP",{year:"numeric",month:"2-digit",day:"2-digit"});
  })();

  // Unique values for dropdowns
  const racketOpts=[{value:"",label:"全ラケット"},...[...new Set(allRecords.map(r=>r.racket).filter(Boolean))].map(r=>({value:r,label:r}))];
  const stringOpts=[{value:"",label:"全ストリング"},...[...new Set(allRecords.flatMap(r=>[r.stMain,r.stCross]).filter(Boolean))].map(s=>({value:s,label:s}))];

  const filtered=allRecords.filter(r=>{
    if(fCat&&r.cat!==fCat)return false;
    if(fRacket&&r.racket!==fRacket)return false;
    if(fString&&r.stMain!==fString&&r.stCross!==fString)return false;
    if(periodStart&&r.date<periodStart)return false;
    return true;
  });
  const hasFilter=fCat||fRacket||fString||fPeriod;
  const clearAll=()=>{setFCat("");setFRacket("");setFString("");setFPeriod("");};

  // Export functions
  const exportText=()=>{
    const lines=filtered.map(r=>`${r.date} ${r.type} ${r.name} | ${r.racket} / ${[r.stMain,r.stCross].filter(Boolean).join("/")} / ${r.tension} ${r.temp?r.temp+"℃":""} ${r.result}`);
    const text=`# 検索結果（${filtered.length}件）\n${lines.join("\n")}`;
    copyToClipboard(text,toast,`${filtered.length}件をコピーしました`);
  };
  const exportSummary=()=>{
    const cats={大会:0,練習:0,試打:0};
    filtered.forEach(r=>cats[r.cat]=(cats[r.cat]||0)+1);
    const rackCounts={};
    filtered.forEach(r=>{if(r.racket)rackCounts[r.racket]=(rackCounts[r.racket]||0)+1;});
    const lines=[
      `# サマリー（${filtered.length}件）`,
      `大会:${cats.大会} 練習:${cats.練習} 試打:${cats.試打}`,
      "",
      "## ラケット別",...Object.entries(rackCounts).map(([k,v])=>`- ${k}: ${v}件`),
      "",
      "## 直近10件",...filtered.slice(0,10).map(r=>`${r.date} ${r.type} ${r.name} ${r.racket} ${r.tension} ${r.result}`)
    ];
    copyToClipboard(lines.join("\n"),toast,"サマリーをコピーしました");
  };

  const rc=r=>r&&(r.includes("優勝")||r==="勝利")?C.accent:r==="準優勝"?C.yellow:r&&(r.includes("敗")||r==="敗北")?C.red:C.textMuted;

  return (
    <div>
      <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:10,padding:14,marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <span style={{fontSize:12,color:C.accent,fontWeight:700}}>🔍 横断検索</span>
          {hasFilter&&<button onClick={clearAll} style={{background:"none",border:`1px solid ${C.border}`,color:C.textMuted,borderRadius:4,padding:"2px 10px",fontSize:12,cursor:"pointer"}}>リセット</button>}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 10px"}}>
          <FSelect label="カテゴリ" value={fCat} onChange={setFCat} options={[{value:"",label:"全て"},{value:"大会",label:"🏆 大会"},{value:"練習",label:"🏃 練習"},{value:"試打",label:"🎾 試打"}]}/>
          <FSelect label="ラケット" value={fRacket} onChange={setFRacket} options={racketOpts}/>
          <FSelect label="ストリング" value={fString} onChange={setFString} options={stringOpts}/>
          <FSelect label="期間" value={fPeriod} onChange={setFPeriod} options={[{value:"",label:"全期間"},{value:"1m",label:"直近1ヶ月"},{value:"3m",label:"直近3ヶ月"},{value:"6m",label:"直近半年"},{value:"1y",label:"直近1年"}]}/>
        </div>
      </div>

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <span style={{fontSize:12,color:C.textMuted}}>{hasFilter?`${filtered.length}件ヒット（全${allRecords.length}件）`:`全${allRecords.length}件`}</span>
        <div style={{display:"flex",gap:6}}>
          {filtered.length>0&&<button onClick={exportText} style={{background:"#f5f3ff",border:`1px solid ${C.purple}`,color:C.purple,borderRadius:5,padding:"4px 10px",fontSize:12,fontWeight:600,cursor:"pointer"}}>📋 テキスト</button>}
          {filtered.length>0&&<button onClick={exportSummary} style={{background:"#eff6ff",border:`1px solid ${C.blue}`,color:C.blue,borderRadius:5,padding:"4px 10px",fontSize:12,fontWeight:600,cursor:"pointer"}}>📊 サマリー</button>}
        </div>
      </div>

      <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:8,overflow:"hidden"}}>
        {(hasFilter?filtered:filtered.slice(0,30)).map((r,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",borderBottom:`1px solid ${C.border}`,fontSize:12}}>
            <span style={{width:22,textAlign:"center",flexShrink:0}}>{r.type}</span>
            <span style={{width:72,color:C.textMuted,fontFamily:"monospace",flexShrink:0}}>{r.date}</span>
            <div style={{flex:1,minWidth:0}}>
              <div style={{color:C.text,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.name}</div>
              <div style={{color:C.textMuted,fontSize:12,marginTop:1}}>
                {r.racket&&<span>{r.racket}</span>}
                {(r.stMain||r.stCross)&&<span style={{marginLeft:6,color:C.yellow}}>{[r.stMain,r.stCross].filter(Boolean).join(" / ")}</span>}
                {r.tension&&r.tension!=="—"&&<span style={{marginLeft:6,color:C.accent}}>{r.tension}</span>}
              </div>
            </div>
            <div style={{textAlign:"right",flexShrink:0}}>
              {r.temp&&<div style={{fontSize:12,color:C.textMuted}}>{r.temp}℃</div>}
              {r.result&&<div style={{fontSize:12,color:rc(r.result),fontWeight:600}}>{r.result}</div>}
            </div>
          </div>
        ))}
        {!hasFilter&&filtered.length>30&&<div style={{padding:"10px 14px",fontSize:12,color:C.textMuted,textAlign:"center"}}>条件を絞り込むと全件表示されます（上位30件表示中）</div>}
        {hasFilter&&filtered.length===0&&<div style={{padding:"20px 14px",fontSize:12,color:C.textMuted,textAlign:"center"}}>条件に一致する記録がありません</div>}
      </div>
    </div>
  );
}

function TennisDB(){
  const [tab,setTab]=useState("home");
  const [ready,setReady]=useState(false);
  const [quickAdd,setQuickAdd]=useState(null);
  const [showAddMenu,setShowAddMenu]=useState(false);
  const [showClaudeShare,setShowClaudeShare]=useState(false);
  const [showDataMenu,setShowDataMenu]=useState(false);
  const [quickTrial,setQuickTrial]=useState(false);
  const [tournaments,setTournaments]=useState([]);
  const [practices,setPractices]=useState([]);
  const [trials,setTrials]=useState([]);
  const [rackets,setRackets]=useState([]);
  const [strings,setStrings]=useState([]);
  const [measurements,setMeasurements]=useState([]);
  const [mental,setMental]=useState([]);
  const [next,setNext]=useState([]);
  const [profile,setProfile]=useState({});
  const [venues,setVenues]=useState([]);
  const [stringSetups,setStringSetups]=useState([]);
  const [quickTrialCards,setQuickTrialCards]=useState([]);
  const [opponents,setOpponents]=useState([]);
  const [importSnapshot,setImportSnapshot]=useState(null);
  const [pasteImport,setPasteImport]=useState(false);
  const [pasteText,setPasteText]=useState("");
  const [pendingExpand,setPendingExpand]=useState(null);
  const navigateTo=(targetTab,id)=>{setTab(targetTab);setPendingExpand(id);};
  const [large,setLarge]=useState(()=>{try{return localStorage.getItem("yuke-fs")==="large";}catch{return false;}});
  const [user,setUser]=useState(null);
  const [authReady,setAuthReady]=useState(false);
  const [syncing,setSyncing]=useState(false);
  const importRef=useRef();
  const toast=useToast();

  const toggleLarge=()=>setLarge(v=>{const n=!v;try{localStorage.setItem("yuke-fs",n?"large":"normal");}catch{}return n;});

  const ds=(a)=>a?[...a].sort((x,y)=>(y.date||"").localeCompare(x.date||"")):null;

  const applyData=(src)=>{
    if(src.tournaments)setTournaments(ds(src.tournaments)||[]);
    if(src.practices)setPractices(ds(src.practices)||[]);
    if(src.trials)setTrials(ds(src.trials)||[]);
    if(src.rackets)setRackets(src.rackets);
    if(src.strings)setStrings(src.strings);
    if(src.measurements)setMeasurements(src.measurements);
    if(src.mental)setMental(src.mental);
    if(src.next)setNext(src.next);
    if(src.profile)setProfile(src.profile);
    if(src.venues)setVenues(src.venues);
    if(src.stringSetups)setStringSetups(src.stringSetups);
    if(src.quickTrialCards)setQuickTrialCards(src.quickTrialCards);
    if(src.opponents)setOpponents(src.opponents);
  };

  // ── V2 MIGRATION ───────────────────────────────────
  const migrateToV2=(data)=>{
    if(lsLoad("migrated_v2"))return data;
    console.log("🔄 v2 migration starting...");
    const t=[...(data.tournaments||[])];
    const p=[...(data.practices||[])];
    const tr=[...(data.trials||[])];
    const r=[...(data.rackets||[])];
    const ms=[...(data.measurements||[])];
    // 1. Tournaments: stringSetup → stringMain
    t.forEach(trn=>{
      if(trn.stringSetup&&!trn.stringMain){trn.stringMain=trn.stringSetup;}
      delete trn.stringSetup;
      (trn.matches||[]).forEach(m=>{
        if(m.stringSetup&&!m.stringMain){m.stringMain=m.stringSetup;}
        delete m.stringSetup;
        if(m.tension&&!m.tensionMain){m.tensionMain=m.tension;}
        delete m.tension;
      });
    });
    // 2. Trials: string → stringMain, tension → tensionMain
    tr.forEach(trial=>{
      if(trial.string&&!trial.stringMain){trial.stringMain=trial.string;}
      delete trial.string;
      if(trial.tension&&!trial.tensionMain){trial.tensionMain=trial.tension;}
      delete trial.tension;
    });
    // 3. Practices: trial embedded data → trial records
    p.forEach(prac=>{
      if(prac.hasTrial&&prac.trialRacketName){
        const existingLink=tr.some(x=>x.linkedPracticeId===prac.id);
        if(!existingLink){
          tr.push({
            id:`t_mig_${prac.id}`,date:prac.date,racketName:prac.trialRacketName,
            stringMain:prac.trialString||"",stringCross:prac.trialStringCross||"",
            tensionMain:prac.trialTensionMain||prac.trialTension||"",tensionCross:prac.trialTensionCross||"",
            temp:prac.temp||"",venue:prac.venue||"",judgment:prac.trialJudgment||"保留",
            spin:prac.trialSpin||3,control:prac.trialControl||3,power:prac.trialPower||3,
            feel:prac.trialFeel||3,info:prac.trialInfo||3,
            strokeNote:"",serveNote:"",volleyNote:"",generalNote:prac.trialNote||"",
            sessions:[],linkedPracticeId:prac.id,linkedMatchId:""
          });
        }
      }
      // Delete trial fields from practice
      ["hasTrial","trialRacketName","trialString","trialStringCross","trialTension",
       "trialTensionMain","trialTensionCross","trialSpin","trialControl","trialPower",
       "trialFeel","trialInfo","trialJudgment","trialNote"].forEach(k=>delete prac[k]);
      // Practice: stringSetup → stringMain (if old data)
      if(prac.stringSetup&&!prac.stringMain){prac.stringMain=prac.stringSetup;}
      delete prac.stringSetup;
    });
    // 4. Measurements → racket.measurements[]
    r.forEach(rack=>{
      if(!rack.measurements||rack.measurements.length===0){
        rack.measurements=ms.filter(m=>m.racket===rack.name||m.racketId===rack.id||rack.name.includes(m.racket)||m.racket&&m.racket.includes(rack.name)).map(m=>({...m,racketId:rack.id}));
      }
    });
    // Sort trials
    tr.sort((a,b)=>(b.date||"").localeCompare(a.date||""));
    console.log("✅ v2 migration complete");
    lsSave("migrated_v2",true);
    return {...data,tournaments:t,practices:p,trials:tr,rackets:r};
  };
  // v2.1: Fix measurements integration (runs if v2 already ran but measurements weren't copied)
  const fixMeasurements=(data)=>{
    if(lsLoad("migrated_v2_measurements"))return data;
    const r=[...(data.rackets||[])];
    const ms=[...(data.measurements||[])];
    if(ms.length===0){lsSave("migrated_v2_measurements",true);return data;}
    r.forEach(rack=>{
      if(!rack.measurements||rack.measurements.length===0){
        rack.measurements=ms.filter(m=>m.racket===rack.name||m.racketId===rack.id||(m.racket&&rack.name.includes(m.racket))||(m.racket&&m.racket.includes(rack.name))).map(m=>({...m,racketId:rack.id}));
      }
    });
    console.log("✅ v2.1 measurements fix complete");
    lsSave("migrated_v2_measurements",true);
    lsSave(KEYS.rackets,r);
    return {...data,rackets:r};
  };

  // Load from localStorage first
  useEffect(()=>{
    const local={};
    Object.entries(KEYS).forEach(([name,key])=>{local[name]=lsLoad(key);});
    const raw={
      tournaments:ds(local.tournaments)||ds(INIT.tournaments),
      practices:ds(local.practices)||ds(INIT.practices),
      trials:ds(local.trials)||ds(INIT.trials),
      rackets:local.rackets||INIT.rackets,
      strings:local.strings||INIT.strings,
      measurements:local.measurements||INIT.measurements,
      mental:local.mental||INIT.mental,
      next:local.next||INIT.next,
      profile:local.profile||INIT.profile,
      venues:local.venues||INIT.venues,
      stringSetups:local.stringSetups||INIT.stringSetups,
      quickTrialCards:local.quickTrialCards||[],
      opponents:local.opponents||[],
    };

  // Auth listener
  useEffect(()=>{

        if(cloud&&Object.keys(cloud).length>0){
          // Cloud data exists → apply it
          const merged={};
          Object.entries(KEYS).forEach(([name,key])=>{
            if(cloud[key]){merged[name]=cloud[key];lsSave(key,cloud[key]);}
          });
          applyData(merged);
          setSyncing(false);
          toast.show("☁️ クラウドから同期しました");
        }else{
          // No cloud data → migrate localStorage to cloud
          const allLocal={};
          Object.entries(KEYS).forEach(([name,key])=>{allLocal[name]=lsLoad(key);});
          const hasLocal=Object.values(allLocal).some(v=>v!==null);
          if(hasLocal){
            await cloudSaveAll(u.uid,allLocal);
            toast.show("☁️ ローカルデータをクラウドに移行しました");
          }
          setSyncing(false);
        }
        // Real-time listener
        const dataRef=fbDb.collection("users").doc(u.uid).collection("data");
        const unsubSnap=dataRef.onSnapshot(snap=>{
          snap.docChanges().forEach(change=>{
            if(change.type==="modified"){
              const key=change.doc.id;
              const d=change.doc.data();
              const val=d.items||d.obj;
              if(!val)return;
              const name=Object.entries(KEYS).find(([,v])=>v===key)?.[0];
              if(!name)return;
              lsSave(key,val);
              const setters={tournaments:setTournaments,practices:setPractices,trials:setTrials,rackets:setRackets,strings:setStrings,measurements:setMeasurements,mental:setMental,next:setNext,profile:setProfile,venues:setVenues,stringSetups:setStringSetups,quickTrialCards:setQuickTrialCards,opponents:setOpponents};
              if(setters[name]){
                if(Array.isArray(val)&&val[0]?.date){setters[name](ds(val));}
                else{setters[name](val);}
              }
            }
          });
        });
        return ()=>unsubSnap();
      }
    });
    return ()=>unsub();
  },[]);

  // One-time cleanup v2.2.5: remove p_gcal_ practices + restore 3 tournaments

          {id:"trn_r_0426",date:"2026/04/26",name:"所沢市民大会ベテランシングルス",level:"ベテラン",type:"singles",venue:"",racketName:"",stringMain:"",stringCross:"",tensionMain:"",tensionCross:"",temp:"",weather:"",overallResult:"",generalNote:"",matches:[]},
          {id:"trn_r_0429",date:"2026/04/29",name:"インスピシングルス中上級",level:"中上級",type:"singles",venue:"インスピリッツ",racketName:"",stringMain:"",stringCross:"",tensionMain:"",tensionCross:"",temp:"",weather:"",overallResult:"",generalNote:"",matches:[]},

  },[syncing,user]);

  // One-time: auto-register opponents from existing match data
  useEffect(()=>{
    if(syncing||!user)return;

      if(!localStorage.getItem("yuke-auto-opponents-v227")){

        if(toAdd.length>0){
          const updated=[...opponents,...toAdd];

  const handleExport=async()=>{

    if(result==="cancelled")return;
    const now=new Date().toISOString();

  const [lastExport,setLastExport]=useState(()=>{try{return localStorage.getItem("yuke-last-export")||"";}catch{return "";}});
  const daysSinceExport=lastExport?Math.floor((Date.now()-new Date(lastExport).getTime())/(1000*60*60*24)):999;
  const handleImport=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        // Save snapshot for undo
        const snap={tournaments:[...tournaments],practices:[...practices],trials:[...trials],rackets:[...rackets],strings:[...strings],measurements:[...measurements],mental:[...mental],next:[...next],profile:{...profile},venues:[...venues],stringSetups:[...stringSetups],opponents:[...opponents]};
        setImportSnapshot(snap);
        // Date-based dedup merge
        const merge=(existing,incoming,dupKey)=>{
          if(!Array.isArray(incoming))return incoming;
          const map=new Map(existing.map(item=>[item.id,item]));
          incoming.forEach(item=>{
            if(map.has(item.id)){map.set(item.id,{...map.get(item.id),...item});return;}
            if(dupKey){const dup=existing.find(e=>dupKey(e,item));if(dup)return;}
            map.set(item.id,item);
          });
          return [...map.values()].sort((a,b)=>(b.date||"").localeCompare(a.date||""));
        };
        const trnDup=(a,b)=>a.date&&b.date&&a.name&&b.name&&a.date===b.date&&a.name===b.name;
        const pracDup=(a,b)=>a.date&&b.date&&a.venue&&b.venue&&a.date===b.date&&a.venue===b.venue;
        const apply=(key,getter,setter,stoKey,dupKey)=>{
          if(d[key]){
            const merged=Array.isArray(d[key])?merge(getter,d[key],dupKey):({...getter,...d[key]});
            setter(merged);save(stoKey,merged);
          }
        };
        apply("tournaments",tournaments,setTournaments,KEYS.tournaments,trnDup);
        apply("practices",practices,setPractices,KEYS.practices,pracDup);
        apply("trials",trials,setTrials,KEYS.trials);
        apply("rackets",rackets,setRackets,KEYS.rackets);
        apply("strings",strings,setStrings,KEYS.strings);
        apply("measurements",measurements,setMeasurements,KEYS.measurements);
        apply("mental",mental,setMental,KEYS.mental);
        apply("next",next,setNext,KEYS.next);
        apply("profile",profile,setProfile,KEYS.profile);
        apply("venues",venues,setVenues,KEYS.venues);
        apply("stringSetups",stringSetups,setStringSetups,KEYS.stringSetups);
        toast.show("📥 インポート完了（↩️で取消可能）");
      }catch{toast.show("❌ 読み込み失敗",C.red);}
    };
    reader.readAsText(file);e.target.value="";
  };
  const handleImportUndo=()=>{

    restoreArr(s.strings,setStrings,KEYS.strings);

      const apply=(key,getter,setter,stoKey,dupKey)=>{
        if(d[key]){const merged=Array.isArray(d[key])?merge(getter,d[key],dupKey):({...getter,...d[key]});setter(merged);save(stoKey,merged);}

      apply("tournaments",tournaments,setTournaments,KEYS.tournaments,trnDup);
      apply("practices",practices,setPractices,KEYS.practices,pracDup);
      apply("trials",trials,setTrials,KEYS.trials);
      apply("rackets",rackets,setRackets,KEYS.rackets);

  if(!ready) return <div style={{background:C.bg,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:C.textMuted,fontFamily:"sans-serif"}}>読み込み中...</div>;

          <div style={{position:"absolute",top:60,right:14,background:C.panel,border:`1px solid ${C.accent}`,borderRadius:12,padding:8,minWidth:160,boxShadow:"0 8px 30px #000a"}} onClick={e=>e.stopPropagation()}>

      {tab==="profile"&&<ProfileTab data={profile} setData={setProfile} toast={toast}/>}
      {tab==="opponents"&&<OpponentsTab data={opponents} setData={setOpponents} tournaments={tournaments} setTournaments={setTournaments} toast={toast}/>}
      {tab==="tournaments"&&<TournamentsTab data={tournaments} setData={setTournaments} rackets={rackets} strings={strings} stringSetups={stringSetups} trials={trials} opponents={opponents} onNewOpponent={addOpponent} venues={venues} setVenues={v=>{setVenues(v);save(KEYS.venues,v);}} toast={toast} quickAdd={quickAdd==="tournaments"} onQuickAddDone={()=>setQuickAdd(null)} initialExpand={pendingExpand} onExpandDone={()=>setPendingExpand(null)}/>}
      {tab==="practices"&&<PracticesTab data={practices} setData={setPractices} rackets={rackets} strings={strings} stringSetups={stringSetups} trials={trials} venues={venues} setVenues={v=>{setVenues(v);save(KEYS.venues,v);}} toast={toast} quickAdd={quickAdd==="practices"} onQuickAddDone={()=>setQuickAdd(null)} initialExpand={pendingExpand} onExpandDone={()=>setPendingExpand(null)}/>}
      {tab==="trials"&&<TrialsTab data={trials} setData={setTrials} tournaments={tournaments} practices={practices} rackets={rackets} strings={strings} venues={venues} setVenues={v=>{setVenues(v);save(KEYS.venues,v);}} toast={toast} quickAdd={quickAdd==="trials"} onQuickAddDone={()=>setQuickAdd(null)}/>}
      {tab==="search"&&<SearchTab tournaments={tournaments} practices={practices} trials={trials} rackets={rackets} strings={strings} stringSetups={stringSetups} toast={toast}/>}
      {tab==="rackets"&&<RacketsTab data={rackets} setData={setRackets} toast={toast}/>}
      {tab==="strings"&&<StringsTab data={strings} setData={setStrings} stringSetups={stringSetups} setStringSetups={setStringSetups} toast={toast}/>}
      {tab==="mental"&&<MentalTab data={mental} setData={setMental} tournaments={tournaments} practices={practices} toast={toast}/>}
      {tab==="next"&&<NextTab data={next} setData={setNext} trials={trials} toast={toast}/>}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(TennisDB));
</script>
</body>
</html>
