const Badge = ({ color="gray", children, sm }) => {
  const m={green:["#052e1a",C.accent,"#00b87a"],red:["#2e0505",C.red,"#b45252"],yellow:["#2e2005",C.yellow,"#b88a24"],blue:["#051828",C.blue,"#3b82f6"],purple:["#130528",C.purple,"#7c3aed"],orange:["#2e1505",C.orange,"#c2410c"],gray:["#1a1d24",C.textDim,"#374151"]};

const Btn=({onClick,children,variant="default",style:ext={}})=>{
  const s={default:{background:C.panel,border:`1px solid ${C.border}`,color:C.textDim},primary:{background:C.accent,border:`1px solid ${C.accent}`,color:"#000",fontWeight:700},danger:{background:"#2e0505",border:`1px solid #b45252`,color:C.red},ghost:{background:"none",border:"none",color:C.textMuted}};
  return <button onClick={onClick} style={{...(s[variant]||s.default),borderRadius:6,padding:"6px 14px",fontSize:12,cursor:"pointer",...ext}}>{children}</button>;
};
// ── CONFIRM DIALOG ────────────────────────────────
function ConfirmDialog({message,onYes,onNo}){
  return (
    <div style={{position:"fixed",inset:0,background:"#000a",zIndex:400,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:C.panel,border:`1px solid #b45252`,borderRadius:12,padding:24,maxWidth:300,width:"100%",textAlign:"center"}}>
        <div style={{fontSize:22,marginBottom:10}}>🗑</div>
        <div style={{fontSize:13,color:C.text,marginBottom:6,fontWeight:600}}>削除の確認</div>
        <div style={{fontSize:12,color:C.textMuted,marginBottom:18,lineHeight:1.6}}>{message}</div>
        <div style={{display:"flex",gap:10}}>
          <button onClick={onNo} style={{flex:1,background:C.panel2,border:`1px solid ${C.border}`,color:C.textDim,borderRadius:7,padding:"10px",fontSize:13,cursor:"pointer",fontWeight:600}}>キャンセル</button>
          <button onClick={onYes} style={{flex:1,background:"#2e0505",border:"1px solid #b45252",color:C.red,borderRadius:7,padding:"10px",fontSize:13,cursor:"pointer",fontWeight:700}}>削除する</button>
        </div>
      </div>
    </div>
  );
}
function useConfirm(){
  const [state,setState]=useState(null);
  const ask=(message,onYes)=>setState({message,onYes});
  const el=state?<ConfirmDialog message={state.message} onYes={()=>{state.onYes();setState(null);}} onNo={()=>setState(null)}/>:null;
  return {ask,el};
}

const Field=({label,value,onChange,multiline,placeholder,type="text"})=>(
  <div style={{marginBottom:10}}>
    {label&&<div style={{fontSize:10,color:C.textMuted,letterSpacing:"0.08em",marginBottom:4}}>{label}</div>}
    {multiline?<textarea value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} rows={3} style={{width:"100%",background:C.panel2,border:`1px solid ${C.border}`,borderRadius:6,padding:"8px 10px",color:C.text,fontSize:12,resize:"vertical",fontFamily:"inherit",outline:"none"}}/>
    :<input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} style={{width:"100%",background:C.panel2,border:`1px solid ${C.border}`,borderRadius:6,padding:"7px 10px",color:C.text,fontSize:12,fontFamily:"inherit",outline:"none"}}/>}

const FSelect=({label,value,onChange,options})=>(

      {options.map(o=><option key={o.value} value={o.value} style={{background:C.panel}}>{o.label}</option>)}
    </select>
  </div>
);
function VenueSelect({label,value,onChange,venues,onAddVenue}){
  const [adding,setAdding]=useState(false);
  const [newV,setNewV]=useState("");
  const opts=[{value:"",label:"-- 場所を選択 --"},...(venues||[]).map(v=>({value:v,label:v})),{value:"__new__",label:"＋ 新しい場所を追加..."}];
  const handleChange=v=>{if(v==="__new__"){setAdding(true);}else{onChange(v);}};
  const handleAdd=()=>{if(newV.trim()){onAddVenue(newV.trim());onChange(newV.trim());setAdding(false);setNewV("");}};
  return (
    <div style={{marginBottom:10}}>
      {label&&<div style={{fontSize:10,color:C.textMuted,letterSpacing:"0.08em",marginBottom:4}}>{label}</div>}
      <select value={adding?"":value} onChange={e=>handleChange(e.target.value)} style={{width:"100%",background:C.panel2,border:`1px solid ${C.border}`,borderRadius:6,padding:"7px 10px",color:C.text,fontSize:12,fontFamily:"inherit",outline:"none",cursor:"pointer"}}>
        {opts.map(o=><option key={o.value} value={o.value} style={{background:C.panel}}>{o.label}</option>)}
      </select>
      {adding&&(
        <div style={{display:"flex",gap:6,marginTop:6}}>
          <input value={newV} onChange={e=>setNewV(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleAdd()} placeholder="場所名を入力" autoFocus style={{flex:1,background:C.panel2,border:`1px solid ${C.accent}`,borderRadius:6,padding:"7px 10px",color:C.text,fontSize:12,outline:"none"}}/>

// ── TOAST ─────────────────────────────────────────
function useToast(){
  const [t,setT]=useState(null);
  const show=(msg,color=C.accent)=>{setT({msg,color});setTimeout(()=>setT(null),2600);};
  const el=t?<div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",background:C.panel,border:`1px solid ${t.color}`,color:t.color,borderRadius:8,padding:"10px 20px",fontSize:13,fontWeight:600,zIndex:300,boxShadow:"0 4px 20px #0008",whiteSpace:"nowrap"}}>{t.msg}</div>:null;
  return {show,el};
}

const load=k=>{try{const v=localStorage.getItem(k);if(v)return JSON.parse(v);}catch(_){}return null;};
const save=(k,d)=>{try{localStorage.setItem(k,JSON.stringify(d));return true;}catch(e){console.error("Storage error:",k,e);return false;}};
const exportAll=async data=>{
  const json=JSON.stringify({version:8,exportedAt:new Date().toISOString(),...data},null,2);
  const d=new Date().toLocaleDateString("ja-JP",{year:"numeric",month:"2-digit",day:"2-digit"}).replace(/\//g,"-");
  const fname=`tennis_db_${d}.json`;
  const file=new File([json],fname,{type:"application/json"});
  if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
    try{await navigator.share({files:[file],title:"Tennis DB バックアップ"});return "shared";}catch(e){if(e.name==="AbortError")return "cancelled";}
  }
  const b=new Blob([json],{type:"application/json"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download=fname;a.click();URL.revokeObjectURL(u);return "downloaded";
};

const getRacketOpts=rackets=>[{value:"",label:"-- ラケットを選択 --"},...rackets.filter(r=>r.status!=="retired").map(r=>({value:r.name,label:`${r.name}`}))];
const getStringOpts=strings=>[{value:"",label:"-- ストリングを選択 --"},...strings.filter(s=>s.status!=="rejected").map(s=>({value:s.name,label:`${s.name} [${s.qty}]`}))];
const getSetupOpts=(rackets,strings)=>{
  const activeStr=strings.filter(s=>["active","key","hold"].includes(s.status));
  const opts=[{value:"",label:"-- セッティングを選択 --"}];
  rackets.filter(r=>r.status!=="retired").forEach(r=>{
    if(r.string&&r.tension) opts.push({value:`${r.name} / ${r.string} ${r.tension}`,label:`${r.name} / ${r.string} ${r.tension}`});
    else if(r.name) opts.push({value:r.name,label:r.name});
  });
  return opts;
};

// ── GAME TRACKER ──────────────────────────────────
const scColor=v=>v>=4?C.accent:v>=3?C.yellow:C.red;
const MENTAL_LABELS={1:"最悪",2:"崩れ",3:"普通",4:"集中",5:"ゾーン"};
const PHYSICAL_LABELS={1:"限界",2:"辛い",3:"普通",4:"良好",5:"万全"};

function GameTracker({ match, onChange }) {
  const [pendingCO, setPendingCO] = useState(null); // changeover input state

  const games = match.games || [];
  const changeovers = match.changeovers || [];

  // Compute score from games
  const score = games.reduce((acc, g) => {
    if(g.winner==="me") acc.me++;
    else acc.opp++;
    return acc;
  }, {me:0, opp:0});

  const addGame = (winner) => {
    const newGames = [...games, { id:`g${Date.now()}`, winner }];
    onChange({ ...match, games: newGames });
    // Check if changeover needed (every 2 games)
    if(newGames.length % 2 === 0) {
      setPendingCO({ afterGame: newGames.length, mental: 3, physical: 3, note: "" });
    }
  };

  const removeLastGame = () => {
    if(games.length===0) return;
    const newGames = games.slice(0,-1);
    onChange({ ...match, games: newGames });
    // Remove changeover if it was after this game
    const newCOs = changeovers.filter(co => co.afterGame !== games.length);
    onChange({ ...match, games: newGames, changeovers: newCOs });
  };

  const saveCO = () => {
    if(!pendingCO) return;
    const newCOs = [...changeovers.filter(co=>co.afterGame!==pendingCO.afterGame), pendingCO];
    onChange({ ...match, changeovers: newCOs });
    setPendingCO(null);
  };

  const skipCO = () => setPendingCO(null);

  const getCO = (afterGame) => changeovers.find(co => co.afterGame === afterGame);

  // Build interleaved display
  const rows = [];
  games.forEach((g, i) => {
    rows.push({ type: "game", game: g, index: i });
    if((i+1) % 2 === 0) {
      rows.push({ type: "changeover", afterGame: i+1, co: getCO(i+1) });
    }
  });

  return (
    <div style={{marginTop:12}}>
      {/* Score display */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:C.panel2,borderRadius:8,padding:"10px 14px",marginBottom:12}}>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:10,color:C.accent,marginBottom:2}}>私</div>
          <div style={{fontSize:28,fontWeight:800,color:C.accent,fontFamily:"monospace"}}>{score.me}</div>
        </div>
        <div style={{fontSize:13,color:C.textMuted,fontWeight:600}}>—</div>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:10,color:C.red,marginBottom:2}}>相手</div>

        </div>

              <div key={g.id} style={{width:14,height:14,borderRadius:2,background:g.winner==="me"?C.accent:C.red,display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,color:"#000",fontWeight:700}}>{i+1}</div>
            ))}
          </div>
        </div>
      </div>

      {/* Game log */}
      <div style={{display:"grid",gap:4,marginBottom:10}}>
        {rows.map((row, i) => {
          if(row.type==="game") {
            const isMe = row.game.winner==="me";
            return (
              <div key={row.game.id} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 10px",background:isMe?"#0d1a10":"#1a0808",borderRadius:6,border:`1px solid ${isMe?C.accentDim:"#b45252"}`}}>

                </div>
                <div style={{fontSize:10,color:C.textMuted,fontFamily:"monospace"}}>
                  {games.slice(0,row.index+1).reduce((a,g)=>({me:a.me+(g.winner==="me"?1:0),opp:a.opp+(g.winner==="opp"?1:0)}),{me:0,opp:0}) && (() => {
                    const s=games.slice(0,row.index+1).reduce((a,g)=>({me:a.me+(g.winner==="me"?1:0),opp:a.opp+(g.winner==="opp"?1:0)}),{me:0,opp:0});
                    return `${s.me}-${s.opp}`;
                  })()}
                </div>
              </div>
            );
          } else {
            const co = row.co;
            return (
              <div key={`co-${row.afterGame}`} style={{margin:"2px 0"}}>
                <div style={{display:"flex",alignItems:"center",gap:8,padding:"6px 10px",background:co?"#0a1020":"#0d0f14",borderRadius:6,border:`1px solid ${co?C.blue:C.border}`}}>
                  <div style={{flex:1}}>
                    <div style={{fontSize:9,color:C.blue,letterSpacing:"0.08em",marginBottom:co?4:0}}>⟳ チェンジオーバー（{row.afterGame}ゲーム後）</div>
                    {co && (
                      <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
                        <div style={{display:"flex",alignItems:"center",gap:4}}>
                          <span style={{fontSize:10,color:C.textMuted}}>🧠</span>
                          <span style={{fontSize:11,color:scColor(co.mental),fontWeight:700}}>{co.mental} {MENTAL_LABELS[co.mental]}</span>
                        </div>
                        <div style={{display:"flex",alignItems:"center",gap:4}}>
                          <span style={{fontSize:10,color:C.textMuted}}>💪</span>
                          <span style={{fontSize:11,color:scColor(co.physical),fontWeight:700}}>{co.physical} {PHYSICAL_LABELS[co.physical]}</span>
                        </div>
                        {co.note&&<span style={{fontSize:11,color:C.textDim}}>「{co.note}」</span>}
                      </div>
                    )}
                  </div>
                  {!co&&<span style={{fontSize:10,color:C.textMuted}}>未記録</span>}
                </div>
              </div>
            );
          }
        })}
      </div>

      {/* Pending changeover input */}
      {pendingCO && (
        <div style={{background:C.panel2,border:`1px solid ${C.blue}`,borderRadius:8,padding:"12px 14px",marginBottom:10}}>
          <div style={{fontSize:11,color:C.blue,fontWeight:700,marginBottom:10}}>⟳ チェンジオーバー記録（{pendingCO.afterGame}ゲーム後）</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:10}}>
            <div>
              <div style={{fontSize:10,color:C.textMuted,marginBottom:6}}>🧠 メンタル</div>
              <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                {[1,2,3,4,5].map(n=>(
                  <button key={n} onClick={()=>setPendingCO(p=>({...p,mental:n}))} style={{background:pendingCO.mental===n?C.accent:C.panel,border:`1px solid ${pendingCO.mental===n?C.accent:C.border}`,borderRadius:5,padding:"5px 8px",cursor:"pointer",fontSize:10,color:pendingCO.mental===n?"#000":C.textMuted,fontWeight:600}}>
                    {n}<br/><span style={{fontSize:8}}>{MENTAL_LABELS[n]}</span>
                  </button>
                ))}
              </div>
            </div>
            <div>
              <div style={{fontSize:10,color:C.textMuted,marginBottom:6}}>💪 フィジカル</div>
              <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                {[1,2,3,4,5].map(n=>(
                  <button key={n} onClick={()=>setPendingCO(p=>({...p,physical:n}))} style={{background:pendingCO.physical===n?C.blue:C.panel,border:`1px solid ${pendingCO.physical===n?C.blue:C.border}`,borderRadius:5,padding:"5px 8px",cursor:"pointer",fontSize:10,color:pendingCO.physical===n?"#fff":C.textMuted,fontWeight:600}}>
                    {n}<br/><span style={{fontSize:8}}>{PHYSICAL_LABELS[n]}</span>
                  </button>
                ))}
              </div>
            </div>
          </div>
          <Field value={pendingCO.note} onChange={v=>setPendingCO(p=>({...p,note:v}))} placeholder="一言メモ（任意）：ここで崩れた / 立て直せた..."/>
          <div style={{display:"flex",gap:8}}>
            <button onClick={skipCO} style={{flex:1,background:"none",border:`1px solid ${C.border}`,color:C.textMuted,borderRadius:6,padding:"8px",fontSize:12,cursor:"pointer"}}>スキップ</button>
            <button onClick={saveCO} style={{flex:2,background:C.blue,border:"none",color:"#fff",borderRadius:6,padding:"8px",fontSize:12,fontWeight:700,cursor:"pointer"}}>💾 保存</button>
          </div>
        </div>
      )}

      {/* Add game buttons */}
      {!pendingCO && (
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <div style={{fontSize:10,color:C.textMuted,marginRight:4}}>次のゲーム：</div>
          <button onClick={()=>addGame("me")} style={{flex:1,background:"#052e1a",border:`1px solid ${C.accent}`,color:C.accent,borderRadius:6,padding:"10px",fontSize:13,fontWeight:700,cursor:"pointer"}}>私 ✓</button>
          <button onClick={()=>addGame("opp")} style={{flex:1,background:"#2e0505",border:`1px solid #b45252`,color:C.red,borderRadius:6,padding:"10px",fontSize:13,fontWeight:700,cursor:"pointer"}}>相手 ✓</button>

        </div>
      )}
    </div>
  );
}

function TournamentDetail({trn,onEdit,onDelete,onUpdate,rackets,strings}){
  const cfm=useConfirm();
  const [expandedMatch,setExpandedMatch]=useState(null);
  const [matchModal,setMatchModal]=useState(null);
  const wins=(trn.matches||[]).filter(m=>m.result==="勝利").length;

  const blankMatchRecord=()=>({id:`mr${Date.now()}`,round:`${(trn.matches||[]).length+1}回戦`,opponent:"",racketName:trn.racketName||"",stringSetup:trn.stringSetup||"",result:"勝利",setScores:[],mental:3,physical:3,mentalNote:"",techNote:"",opponentNote:"",note:"",games:[],changeovers:[]});

  const saveMatch=(form)=>{
    const isNew=!(trn.matches||[]).find(m=>m.id===form.id);
    const matches=isNew?[...(trn.matches||[]),form]:(trn.matches||[]).map(m=>m.id===form.id?form:m);
    onUpdate({...trn,matches});
    setMatchModal(null);
  };

  const deleteMatch=(id)=>{
    cfm.ask("この試合記録を削除しますか？",()=>{
      onUpdate({...trn,matches:(trn.matches||[]).filter(m=>m.id!==id)});
      setExpandedMatch(null);
    });
  };

  const updateMatchGames=(id,updatedMatch)=>{
    onUpdate({...trn,matches:(trn.matches||[]).map(m=>m.id===id?updatedMatch:m)});
  };

  const roundColor={"1回戦":"gray","2回戦":"gray","3回戦":"blue","準々決勝":"blue","準決勝":"purple","決勝":"yellow","予選":"gray","エキシビション":"orange"};

  return (
    <div style={{padding:"12px 14px 16px",borderTop:`1px solid ${C.border}`,background:"#0c1018"}}>
      {cfm.el}
      {/* Tournament info */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:12}}>
        {[["会場",trn.venue||"—"],["ラケット",trn.racketName||"—"],["気温",trn.temp?`${trn.temp}℃`:"—"],["セッティング",trn.stringSetup||"—"],["試合数",`${(trn.matches||[]).length}試合`],["勝利数",`${wins}勝${(trn.matches||[]).length-wins}敗`]].map(([k,v])=>(
          <div key={k} style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:6,padding:"6px 10px"}}>
            <div style={{fontSize:9,color:C.textMuted,marginBottom:2}}>{k}</div>
            <div style={{fontSize:11,color:C.textDim,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{v}</div>
          </div>
        ))}
      </div>
      {trn.generalNote&&(
        <div style={{marginBottom:12}}>
          <div style={{fontSize:9,color:C.textMuted,marginBottom:3}}>📝 大会総括</div>
          <div style={{fontSize:12,color:C.textDim,lineHeight:1.7,background:C.panel,borderRadius:6,padding:"7px 10px",borderLeft:`2px solid ${C.border}`}}>{trn.generalNote}</div>
        </div>
      )}

      {/* Match list */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <span style={{fontSize:11,color:C.accent,letterSpacing:"0.08em"}}>試合記録</span>
        <button onClick={()=>setMatchModal({match:blankMatchRecord(),mode:"add"})} style={{background:C.accent,border:"none",color:"#000",borderRadius:5,padding:"3px 12px",fontSize:11,fontWeight:700,cursor:"pointer"}}>＋ 試合を追加</button>
      </div>

      {(trn.matches||[]).length===0&&(
        <div style={{padding:"16px",textAlign:"center",color:C.textMuted,fontSize:12,background:C.panel2,borderRadius:6,border:`1px dashed ${C.border}`}}>
          「＋ 試合を追加」から各試合を記録できます
        </div>
      )}

      <div style={{background:(trn.matches||[]).length?C.panel:"transparent",border:(trn.matches||[]).length?`1px solid ${C.border}`:"none",borderRadius:8,overflow:"hidden",marginBottom:12}}>
        {(trn.matches||[]).map((m,i)=>{
          const isOpen=expandedMatch===m.id;
          const games=m.games||[];
          const score=games.reduce((a,g)=>({me:a.me+(g.winner==="me"?1:0),opp:a.opp+(g.winner==="opp"?1:0)}),{me:0,opp:0});
          const mc=m.mental>=4?C.accent:m.mental>=3?C.yellow:C.red;
          return (
            <div key={m.id} style={{borderBottom:i<(trn.matches||[]).length-1?`1px solid ${C.border}`:"none"}}>
              <div onClick={()=>setExpandedMatch(isOpen?null:m.id)} style={{display:"flex",alignItems:"center",gap:8,padding:"10px 14px",background:isOpen?"#0a0d18":"transparent",cursor:"pointer",borderLeft:isOpen?`3px solid ${C.blue}`:"3px solid transparent",transition:"all 0.1s"}}>
                <Badge color={roundColor[m.round]||"gray"} sm>{m.round}</Badge>
                <Badge color={m.result==="勝利"?"green":"red"} sm>{m.result==="勝利"?"勝利✓":"敗北"}</Badge>
                <div style={{flex:1,minWidth:0}}>
                  <span style={{fontSize:12,color:C.text,fontWeight:600}}>{m.opponent||"（相手未入力）"}</span>
                  <span style={{fontSize:11,color:C.textMuted,marginLeft:8,fontFamily:"monospace"}}>{(m.setScores||[]).join(", ")||"—"}</span>
                </div>
                {/* Game flow mini */}
                <div style={{display:"flex",gap:2,flexShrink:0}}>
                  {games.slice(0,10).map((g,gi)=>(
                    <div key={gi} style={{width:7,height:12,borderRadius:1,background:g.winner==="me"?C.accent:C.red}}/>
                  ))}
                  {games.length>10&&<span style={{fontSize:9,color:C.textMuted}}>+{games.length-10}</span>}
                </div>
                {games.length>0&&<div style={{fontSize:11,fontFamily:"monospace",color:C.textMuted,minWidth:32,textAlign:"right"}}>{score.me}-{score.opp}</div>}
                {/* Mental bar */}
                <div style={{display:"flex",gap:1,flexShrink:0}}>
                  {[1,2,3,4,5].map(n=><div key={n} style={{width:3,height:12,borderRadius:1,background:n<=m.mental?mc:C.border}}/>)}
                </div>
                <div style={{color:C.textMuted,fontSize:10,transform:isOpen?"rotate(90deg)":"none",transition:"transform 0.2s"}}>▶</div>
              </div>
              {isOpen&&<MatchDetail match={m} onEdit={()=>setMatchModal({match:m,mode:"edit"})} onDelete={()=>deleteMatch(m.id)} onUpdate={(updated)=>updateMatchGames(m.id,updated)}/>}
            </div>
          );
        })}
      </div>

      <div style={{display:"flex",gap:8}}>
        <Btn onClick={onEdit} style={{flex:1}}>✏️ 大会情報を編集</Btn>
        <Btn onClick={onDelete} variant="danger">🗑</Btn>
      </div>
      {matchModal&&<MatchModal match={matchModal.match} mode={matchModal.mode||"edit"} onSave={saveMatch} onClose={()=>setMatchModal(null)} rackets={rackets} strings={strings}/>}
    </div>
  );
}

// ── TOURNAMENTS TAB ───────────────────────────────
const resultColor=r=>r==="優勝"?"green":r==="準優勝"?"blue":(r==="予選敗退"||r.includes("敗退"))?"red":"gray";
const typeLabel={singles:"S",doubles:"D",mixed:"Mix"};
const typeColor={singles:"gray",doubles:"blue",mixed:"purple"};

function TournamentsTab({data,setData,rackets,strings,venues,setVenues,toast,quickAdd,onQuickAddDone}){
  const cfm=useConfirm();
  const [expanded,setExpanded]=useState(null);
  const [modal,setModal]=useState(null);
  const [filterLevel,setFilterLevel]=useState("all");
  const [filterType,setFilterType]=useState("all");

  const blankTournament=()=>({id:`trn${Date.now()}`,date:today(),name:"",level:"中上級",type:"singles",venue:"",racketName:"",stringSetup:"",temp:"",overallResult:"",generalNote:"",matches:[]});
  useEffect(()=>{if(quickAdd){setModal({tournament:blankTournament()});onQuickAddDone();}},[quickAdd]);

  const persist=list=>{const s=[...list].sort((a,b)=>b.date.localeCompare(a.date));setData(s);save(KEYS.tournaments,s);};
  const handleSave=form=>{const isNew=!data.find(t=>t.id===form.id);persist(isNew?[form,...data]:data.map(t=>t.id===form.id?form:t));setModal(null);toast.show(isNew?"✅ 大会を追加しました":"✅ 更新しました");};
  const handleDelete=id=>cfm.ask("この記録を削除しますか？",()=>{persist(data.filter(t=>t.id!==id));setExpanded(null);toast.show("🗑 削除しました",C.red);});
  const handleUpdate=trn=>{persist(data.map(t=>t.id===trn.id?trn:t));};

  const wins=data.filter(t=>t.overallResult==="優勝").length;
  const totalMatches=data.reduce((s,t)=>(s+(t.matches||[]).length),0);
  const totalMatchWins=data.reduce((s,t)=>(s+(t.matches||[]).filter(m=>m.result==="勝利").length),0);
  const levels=["all",...new Set(data.map(t=>t.level))];
  const filtered=data.filter(t=>(filterLevel==="all"||t.level===filterLevel)&&(filterType==="all"||t.type===filterType));
  const [showStats,setShowStats]=useState(false);

  // クラス別集計
  const byLevel={};
  data.forEach(t=>{
    if(!byLevel[t.level])byLevel[t.level]={total:0,wins:0,matches:0,matchWins:0};
    byLevel[t.level].total++;
    if(t.overallResult==="優勝")byLevel[t.level].wins++;
    (t.matches||[]).forEach(m=>{byLevel[t.level].matches++;if(m.result==="勝利")byLevel[t.level].matchWins++;});
  });

  // 種目別集計
  const byType={};
  data.forEach(t=>{
    const tl=t.type==="singles"?"シングルス":t.type==="doubles"?"ダブルス":"ミックス";
    if(!byType[tl])byType[tl]={total:0,wins:0};
    byType[tl].total++;
    if(t.overallResult==="優勝")byType[tl].wins++;
  });

  // 月別集計
  const byMonth={};
  data.forEach(t=>{
    const m=t.date?.slice(0,7);if(!m)return;
    if(!byMonth[m])byMonth[m]={total:0,wins:0,results:[]};
    byMonth[m].total++;
    if(t.overallResult==="優勝")byMonth[m].wins++;
    byMonth[m].results.push(t.overallResult);
  });
  const months=Object.keys(byMonth).sort();

  // 直近5大会
  const recent5=data.slice(0,5);
  const recentWins=recent5.filter(t=>t.overallResult==="優勝").length;
  const recentFinals=recent5.filter(t=>["優勝","準優勝","決勝敗退"].includes(t.overallResult)).length;

  // 連勝記録
  let maxStreak=0,curStreak=0;
  [...data].reverse().forEach(t=>{
    if(t.overallResult==="優勝"){curStreak++;maxStreak=Math.max(maxStreak,curStreak);}
    else curStreak=0;
  });

  return (
    <div>
      {cfm.el}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:8}}>
        {[["大会数",`${data.length}件`],["優勝",`${wins}回`],["試合記録",`${totalMatches}試合`],["試合勝率",totalMatches?`${Math.round(totalMatchWins/totalMatches*100)}%`:"—"]].map(([l,v],i)=>(
          <div key={i} style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 12px"}}>
            <div style={{fontSize:9,color:C.textMuted,marginBottom:4}}>{l}</div>
            <div style={{fontSize:16,fontWeight:800,color:i<2?C.accent:C.text,fontFamily:"monospace"}}>{v}</div>
          </div>
        ))}
      </div>
      <button onClick={()=>setShowStats(!showStats)} style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:6,padding:"6px 12px",fontSize:11,color:showStats?C.accent:C.textMuted,fontWeight:600,cursor:"pointer",marginBottom:10,width:"100%"}}>
        {showStats?"▼ 詳細統計を閉じる":"▶ 詳細統計を表示"}
      </button>
      {showStats&&(
        <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:10,padding:14,marginBottom:12}}>
          {/* 直近の調子 */}
          <div style={{marginBottom:14}}>
            <div style={{fontSize:11,color:C.accent,fontWeight:700,marginBottom:8}}>🔥 直近の調子（5大会）</div>
            <div style={{display:"flex",gap:6,marginBottom:6}}>
              {recent5.map((t,i)=>{
                const rc=t.overallResult==="優勝"?"green":["準優勝","決勝敗退"].includes(t.overallResult)?"yellow":"red";
                return <Badge key={i} color={rc}>{t.overallResult}</Badge>;
              })}
            </div>
            <div style={{fontSize:11,color:C.textDim}}>
              優勝 <span style={{color:C.accent,fontWeight:700}}>{recentWins}</span>回 / 決勝進出 <span style={{color:C.yellow,fontWeight:700}}>{recentFinals}</span>回 / 最大連続優勝 <span style={{color:C.accent,fontWeight:700}}>{maxStreak}</span>回
            </div>
          </div>

          {/* クラス別 */}
          <div style={{marginBottom:14}}>
            <div style={{fontSize:11,color:C.blue,fontWeight:700,marginBottom:8}}>📊 クラス別戦績</div>
            {Object.entries(byLevel).map(([lv,d])=>(
              <div key={lv} style={{display:"flex",alignItems:"center",gap:8,marginBottom:5}}>
                <div style={{width:60,fontSize:11,color:C.text,fontWeight:600}}>{lv}</div>
                <div style={{flex:1,background:"#1a1d24",borderRadius:3,height:16,overflow:"hidden",position:"relative"}}>
                  {d.total>0&&<div style={{width:`${(d.wins/d.total)*100}%`,height:"100%",background:C.accent,borderRadius:3,minWidth:d.wins>0?3:0}}/>}
                </div>
                <div style={{width:100,fontSize:10,color:C.textDim,textAlign:"right"}}>
                  {d.wins}優勝/{d.total}大会{d.matches>0?` (${d.matchWins}勝${d.matches-d.matchWins}敗)`:""}
                </div>
              </div>
            ))}
          </div>

          {/* 種目別 */}
          <div style={{marginBottom:14}}>
            <div style={{fontSize:11,color:C.purple,fontWeight:700,marginBottom:8}}>🎾 種目別</div>
            <div style={{display:"flex",gap:12}}>
              {Object.entries(byType).map(([tp,d])=>(
                <div key={tp} style={{background:C.panel2,borderRadius:6,padding:"8px 14px",flex:1,textAlign:"center"}}>
                  <div style={{fontSize:10,color:C.textMuted}}>{tp}</div>
                  <div style={{fontSize:14,fontWeight:800,color:C.text}}>{d.total}大会</div>
                  <div style={{fontSize:10,color:C.accent}}>優勝{d.wins}回</div>
                </div>
              ))}
            </div>
          </div>

          {/* 月別推移 */}
          <div>
            <div style={{fontSize:11,color:C.orange,fontWeight:700,marginBottom:8}}>📅 月別推移</div>
            {months.map(m=>{
              const d=byMonth[m];
              return (
                <div key={m} style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                  <div style={{width:55,fontSize:10,color:C.textMuted,fontFamily:"monospace"}}>{m}</div>
                  <div style={{display:"flex",gap:3}}>
                    {d.results.map((r,i)=>{
                      const c=r==="優勝"?C.accent:["準優勝","決勝敗退"].includes(r)?C.yellow:C.red;
                      return <div key={i} style={{width:10,height:10,borderRadius:2,background:c}} title={r}/>;
                    })}
                  </div>
                  <div style={{fontSize:10,color:C.textDim}}>
                    {d.total}大会{d.wins>0?` 🏆${d.wins}`:""}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      <div style={{display:"flex",gap:4,marginBottom:6,flexWrap:"wrap"}}>
        {[["all","全種目"],["singles","S シングルス"],["doubles","D ダブルス"],["mixed","Mix ミックス"]].map(([v,l])=>(
          <button key={v} onClick={()=>setFilterType(v)} style={{background:filterType===v?C.blue:C.panel,border:`1px solid ${filterType===v?C.blue:C.border}`,color:filterType===v?"#fff":C.textMuted,borderRadius:5,padding:"4px 10px",fontSize:11,cursor:"pointer",fontWeight:filterType===v?700:400}}>{l}</button>
        ))}
      </div>
      <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap",alignItems:"center"}}>
        <div style={{display:"flex",gap:4,flex:1,flexWrap:"wrap"}}>
          {levels.map(l=><button key={l} onClick={()=>setFilterLevel(l)} style={{background:filterLevel===l?C.accent:C.panel,border:`1px solid ${filterLevel===l?C.accent:C.border}`,color:filterLevel===l?"#000":C.textMuted,borderRadius:5,padding:"4px 10px",fontSize:11,cursor:"pointer",fontWeight:filterLevel===l?700:400}}>{l==="all"?"全て":l}</button>)}
        </div>
        <button onClick={()=>setModal({tournament:blankTournament()})} style={{background:C.accent,border:"none",color:"#000",borderRadius:6,padding:"6px 14px",fontSize:12,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>＋ 大会を追加</button>
      </div>

      <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:8,overflow:"hidden"}}>
        {filtered.map((trn,i)=>{
          const isOpen=expanded===trn.id;
          const wins2=(trn.matches||[]).filter(m=>m.result==="勝利").length;
          const total=(trn.matches||[]).length;
          const allGames=(trn.matches||[]).flatMap(m=>m.games||[]);
          const myGames=allGames.filter(g=>g.winner==="me").length;
          return (
            <div key={trn.id} style={{borderBottom:i<filtered.length-1?`1px solid ${C.border}`:"none"}}>
              <div onClick={()=>setExpanded(isOpen?null:trn.id)} style={{display:"flex",alignItems:"center",gap:10,padding:"12px 14px",background:isOpen?"#0d0f18":"transparent",cursor:"pointer",borderLeft:isOpen?`3px solid ${C.accent}`:"3px solid transparent",transition:"all 0.1s"}}>
                <div style={{minWidth:76,fontSize:10,color:C.textMuted,fontFamily:"monospace"}}>{trn.date}</div>
                <div style={{display:"flex",gap:4,flexShrink:0}}>
                  <Badge color={typeColor[trn.type]||"gray"} sm>{typeLabel[trn.type]||"S"}</Badge>
                  <Badge color={resultColor(trn.overallResult)} sm>{trn.overallResult}{trn.overallResult==="優勝"?"🏆":""}</Badge>
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,color:C.text,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{trn.name||"（大会名未入力）"}</div>
                  <div style={{fontSize:10,color:C.textMuted,marginTop:1}}>
                    {total>0?`${wins2}勝${total-wins2}敗 / ゲーム ${myGames}-${allGames.length-myGames}`:"試合記録なし"}
                    {trn.racketName&&<span style={{marginLeft:6}}>{trn.racketName}</span>}
                  </div>
                </div>
                <div style={{color:C.textMuted,fontSize:10,transform:isOpen?"rotate(90deg)":"none",transition:"transform 0.2s",flexShrink:0}}>▶</div>
              </div>
              {isOpen&&<TournamentDetail trn={trn} onEdit={()=>setModal({tournament:trn})} onDelete={()=>handleDelete(trn.id)} onUpdate={handleUpdate} rackets={rackets} strings={strings}/>}
            </div>
          );
        })}
      </div>

      {modal&&<TournamentModal tournament={modal.tournament} onSave={handleSave} onClose={()=>setModal(null)} rackets={rackets} strings={strings} venues={venues} onAddVenue={v=>setVenues([...venues,v])}/>}
    </div>
  );
}

// ── PRACTICE TAB ──────────────────────────────────
const blankPractice=()=>({id:`p${Date.now()}`,date:today(),venue:"",type:"スクール",duration:"90",racketName:"",stringSetup:"",temp:"",physical:3,focus:"",coachNote:"",goodNote:"",improveNote:"",generalNote:"",calories:"",totalCalories:"",heartRateAvg:"",heartRateMax:"",timeRange:"",workoutLocation:"",difficulty:"",hrZone1:"",hrZone2:"",hrZone3:"",hrZone4:"",hrZone5:"",recoveryHR:"",hasTrial:false,trialRacketName:"",trialString:"",trialTension:"",trialSpin:3,trialControl:3,trialPower:3,trialFeel:3,trialInfo:3,trialJudgment:"保留",trialNote:""});

function PracticesTab({data,setData,rackets,strings,venues,setVenues,toast,quickAdd,onQuickAddDone}){

  const [expanded,setExpanded]=useState(null);
  const [modal,setModal]=useState(null);
  useEffect(()=>{if(quickAdd){setModal({practice:blankPractice()});onQuickAddDone();}},[quickAdd]);
  const typeIcon={スクール:"🏫",自主練:"🎾",球出し:"🏐",練習試合:"⚔️",フィジカル:"💪"};

  const handleSave=form=>{const isNew=!data.find(p=>p.id===form.id);persist(isNew?[form,...data]:data.map(p=>p.id===form.id?form:p));setModal(null);toast.show(isNew?"✅ 練習記録を追加しました":"✅ 更新しました");};
  const handleDelete=id=>cfm.ask("この記録を削除しますか？",()=>{persist(data.filter(p=>p.id!==id));setExpanded(null);toast.show("🗑 削除しました",C.red);});
  const [guide,setGuide]=useState(false);
  const totalMin=data.reduce((s,p)=>s+(parseInt(p.duration)||0),0);
  const setupOpts=getSetupOpts(rackets,strings);

  const Modal=({practice})=>{
    const [f,setF]=useState({...practice}); const s=k=>v=>setF(p=>({...p,[k]:v}));
    const isNew=!data.find(p=>p.id===practice.id);
    const hasWatch=f.calories||f.heartRateAvg||f.hrZone1;
    return (
      <div style={{position:"fixed",inset:0,background:"#000c",zIndex:200,display:"flex",alignItems:"flex-start",justifyContent:"center",overflowY:"auto",padding:"20px 12px"}} onClick={e=>e.target===e.currentTarget&&setModal(null)}>
        <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:12,width:"100%",maxWidth:540,padding:20}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <span style={{fontSize:14,fontWeight:700,color:C.text}}>{isNew?"🏃 練習を追加":"🏃 練習記録"}</span>
            <Btn onClick={()=>setModal(null)} variant="ghost" style={{fontSize:18,padding:"0 6px"}}>✕</Btn>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
            <Field label="日付" value={f.date} onChange={s("date")} placeholder="2026/04/05"/>
            <VenueSelect label="場所" value={f.venue||""} onChange={s("venue")} venues={venues} onAddVenue={v=>setVenues([...venues,v])}/>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"0 12px"}}>

            <Field label="時間（分）" value={f.duration} onChange={s("duration")} type="number" placeholder="90"/>
            <Field label="気温（℃）" value={f.temp||""} onChange={s("temp")} type="number" placeholder="18"/>

                {f.timeRange&&<span style={{color:C.textDim}}>⏱{f.timeRange}</span>}
                {f.calories&&<span style={{color:C.orange}}>🔥{f.calories}kcal</span>}
                {f.heartRateAvg&&<span style={{color:"#fca5a5"}}>💓avg{f.heartRateAvg}</span>}
                {f.hrZone1&&<span style={{color:C.textMuted}}>ゾーンデータあり</span>}
              </div>
            </div>
          )}
          <FSelect label="セッティング" value={f.stringSetup||""} onChange={s("stringSetup")} options={setupOpts}/>
          <div style={{fontSize:11,color:C.accent,margin:"8px 0 8px",paddingBottom:5,borderBottom:`1px solid ${C.border}`}}>▶ 内容・評価</div>
          <Stars label="フィジカルコンディション" value={f.physical} onChange={s("physical")}/>
          <Field label="🎯 フォーカスポイント" value={f.focus||""} onChange={s("focus")} multiline placeholder="ラケットダウン / フォロースルー拡大 / セミオープンスタンス..."/>
          <Field label="📋 コーチメモ" value={f.coachNote||""} onChange={s("coachNote")} multiline placeholder="コーチから言われたこと..."/>
          <Field label="✅ よかった点" value={f.goodNote||""} onChange={s("goodNote")} multiline placeholder="できるようになったこと..."/>
          <Field label="🔧 改善点" value={f.improveNote||""} onChange={s("improveNote")} multiline placeholder="次回意識したいこと..."/>
          <Field label="📝 メモ" value={f.generalNote||""} onChange={s("generalNote")} multiline placeholder="その他気づき..."/>
          <div style={{fontSize:11,color:C.yellow,margin:"8px 0 8px",paddingBottom:5,borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:8}}>
            <span>⚔️ 試打あり</span>
            <button onClick={()=>setF(p=>({...p,hasTrial:!p.hasTrial}))} style={{background:f.hasTrial?C.yellow:"#1a1d24",border:`1px solid ${f.hasTrial?C.yellow:C.border}`,borderRadius:12,width:40,height:22,cursor:"pointer",position:"relative",transition:"all 0.2s"}}>
              <div style={{position:"absolute",top:2,left:f.hasTrial?20:2,width:16,height:16,borderRadius:"50%",background:f.hasTrial?"#000":"#666",transition:"all 0.2s"}}/>
            </button>
          </div>
          {f.hasTrial&&(
            <div style={{background:"#1a1805",border:`1px solid #6b5b10`,borderRadius:8,padding:"12px 14px",marginBottom:10}}>
              <FSelect label="試打ラケット" value={f.trialRacketName||""} onChange={s("trialRacketName")} options={[{value:"",label:"-- ラケットを選択 --"},...rackets.map(r=>({value:r.name,label:r.name}))]}/>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
                <FSelect label="ストリング" value={f.trialString||""} onChange={s("trialString")} options={[{value:"",label:"-- 選択 --"},...strings.map(st=>({value:st.name,label:st.name}))]}/>
                <Field label="テンション" value={f.trialTension||""} onChange={s("trialTension")} placeholder="43p"/>
              </div>
              <div style={{fontSize:10,color:C.yellow,marginBottom:6}}>5段階評価</div>
              <Stars label="スピン" value={f.trialSpin} onChange={s("trialSpin")}/>
              <Stars label="コントロール" value={f.trialControl} onChange={s("trialControl")}/>
              <Stars label="パワー" value={f.trialPower} onChange={s("trialPower")}/>
              <Stars label="フィール" value={f.trialFeel} onChange={s("trialFeel")}/>
              <Stars label="打感情報" value={f.trialInfo} onChange={s("trialInfo")}/>
              <FSelect label="判定" value={f.trialJudgment||"保留"} onChange={s("trialJudgment")} options={[{value:"採用候補",label:"✅ 採用候補"},{value:"保留",label:"🟡 保留"},{value:"却下",label:"❌ 却下"}]}/>
              <Field label="試打メモ" value={f.trialNote||""} onChange={s("trialNote")} multiline placeholder="打感・印象・気になった点..."/>
            </div>
          )}
          </>)}
          <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:14}}>
            <Btn onClick={()=>setModal(null)}>キャンセル</Btn>
            <Btn onClick={()=>handleSave(f)} variant="primary">{isNew?"作成":"保存"}</Btn>
          </div>
        </div>
      </div>
    );
  };

  return (
    <div>
      {cfm.el}
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)"
,gap:8,marginBottom:12}}>
        {[["総記録数",`${data.length}件`],["累計練習時間",`${Math.floor(totalMin/60)}h${totalMin%60}m`],["直近",data[0]?.date||"—"]].map(([l,v],i)=>(
          <div key={i} style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 12px"}}>
            <div style={{fontSize:9,color:C.textMuted,marginBottom:4}}>{l}</div>
            <div style={{fontSize:i===0?16:13,fontWeight:800,color:C.accent,fontFamily:"monospace"}}>{v}</div>
          </div>
        ))}
      </div>
      {guide&&(
        <div style={{position:"fixed",inset:0,background:"#000c",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
          <div style={{background:C.panel,border:`1px solid ${C.blue}`,borderRadius:12,width:"100%",maxWidth:480,padding:20}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <span style={{fontSize:14,fontWeight:700,color:C.blue}}>⌚ Apple Watch 連携ガイド</span>
              <Btn onClick={()=>setGuide(false)} variant="ghost" style={{fontSize:18,padding:"0 6px"}}>✕</Btn>
            </div>
            {[
              ["1","テニス終了後","フィットネスアプリでワークアウト詳細画面を開く"],
              ["2","スクショ2枚撮影","①概要（時間・カロリー・平均心拍） ②心拍数詳細（ゾーン別時間）"],
              ["3","Claudeに送信","テニスプロジェクトのチャットにスクショ2枚を貼る"],
              ["4","JSONをインポート","ClaudeがJSON出力 → 📥ボタンで読み込み → 完了"],
            ].map(([n,title,desc])=>(
              <div key={n} style={{display:"flex",gap:12,marginBottom:14,alignItems:"flex-start"}}>
                <div style={{width:24,height:24,borderRadius:"50%",background:C.blue,color:"#fff",fontSize:11,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{n}</div>
                <div>
                  <div style={{fontSize:12,fontWeight:700,color:C.text,marginBottom:3}}>{title}</div>
                  <div style={{fontSize:11,color:C.textMuted,lineHeight:1.6}}>{desc}</div>
                </div>
              </div>
            ))}
            <div style={{background:"#0d1018",border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 12px",marginTop:4}}>
              <div style={{fontSize:10,color:C.textMuted,marginBottom:4}}>💡 ポイント</div>
              <div style={{fontSize:11,color:C.textDim,lineHeight:1.7}}>
                スクショ2枚で15項目のデータが取れます。心拍ゾーン別の滞在時間は体力分析に直結する貴重なデータです。iOSの制限でShortcut経由では取得できないため、この方法がベストです。
              </div>
            </div>
            <div style={{display:"flex",justifyContent:"flex-end",marginTop:14}}>
              <Btn onClick={()=>setGuide(false)} variant="primary">閉じる</Btn>
            </div>
          </div>
        </div>
      )}
      <div style={{display:"flex",justifyContent:"flex-end",gap:8,marginBottom:10}}>
        <button onClick={()=>setGuide(true)} style={{background:"#051828",border:`1px solid ${C.blue}`,color:C.blue,borderRadius:6,padding:"6px 12px",fontSize:12,fontWeight:600,cursor:"pointer"}}>⌚ Watch連携ガイド</button>
        <button onClick={()=>setModal({practice:blankPractice()})} style={{background:C.accent,border:"none",color:"#000",borderRadius:6,padding:"6px 14px",fontSize:12,fontWeight:700,cursor:"pointer"}}>＋ 追加</button>
      </div>
      {data.length===0&&<div style={{background:C.panel,border:`1px dashed ${C.border}`,borderRadius:8,padding:"30px 20px",textAlign:"center",color:C.textMuted,fontSize:12}}>練習記録がありません</div>}
      <div style={{background:data.length?C.panel:"transparent",border:data.length?`1px solid ${C.border}`:"none",borderRadius:8,overflow:"hidden"}}>
        {data.map((p,i)=>{
          const isOpen=expanded===p.id;
          return (
            <div key={p.id} style={{borderBottom:i<data.length-1?`1px solid ${C.border}`:"none"}}>
              <div onClick={()=>setExpanded(isOpen?null:p.id)} style={{display:"flex",alignItems:"center",gap:10,padding:"11px 14px",background:isOpen?"#0d0f18":"transparent",cursor:"pointer",borderLeft:isOpen?`3px solid ${C.blue}`:"3px solid transparent",transition:"all 0.1s"}}>
                <div style={{minWidth:76,fontSize:10,color:C.textMuted,fontFamily:"monospace"}}>{p.date}</div>
                <Badge color={typeColor2[p.type]||"gray"} sm>{typeIcon[p.type]||""} {p.type}</Badge>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:12,color:C.text,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.venue||"（場所未入力）"}</div>
                  <div style={{fontSize:10,color:C.textMuted,marginTop:1}}>{p.duration?`${p.duration}分`:""}{p.racketName?` · ${p.racketName}`:""}{p.focus?` · ${p.focus.slice(0,20)}${p.focus.length>20?"...":""}`:""}</div>
                </div>
                <div style={{display:"flex",gap:1,flexShrink:0}}>
                  {[1,2,3,4,5].map(n=><div key={n} style={{width:3,height:12,borderRadius:1,background:n<=p.physical?scColor(p.physical):C.border}}/>)}
                </div>
                <div style={{color:C.textMuted,fontSize:10,transform:isOpen?"rotate(90deg)":"none",transition:"transform 0.2s"}}>▶</div>
              </div>
              {isOpen&&(
                <div style={{padding:"12px 14px 14px",borderTop:`1px solid ${C.border}`,background:"#0c1018"}}>
                  {(p.calories||p.heartRateAvg||p.heartRateMax)&&(
                    <div style={{marginBottom:10,background:"#1a0c05",border:"1px solid #7c2d12",borderRadius:8,padding:"10px 12px"}}>
                      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8}}>
                        <span style={{fontSize:10,color:"#f97316",fontWeight:700}}>⌚ Apple Watch</span>
                        {p.timeRange&&<span style={{fontSize:10,color:C.textMuted}}>{p.timeRange}</span>}
                        {p.workoutLocation&&<span style={{fontSize:10,color:C.textMuted}}>📍{p.workoutLocation}</span>}
                        {p.difficulty&&<span style={{fontSize:10,color:C.purple}}>難易度{p.difficulty}</span>}
                      </div>
                      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,marginBottom:p.hrZone1?10:0}}>
                        {p.duration&&<div style={{background:"#111318",borderRadius:5,padding:"5px 8px"}}><div style={{fontSize:8,color:C.textMuted}}>⏱ 時間</div><div style={{fontSize:12,fontWeight:700,color:C.text}}>{p.duration}分</div></div>}
                        {p.calories&&<div style={{background:"#111318",borderRadius:5,padding:"5px 8px"}}><div style={{fontSize:8,color:C.textMuted}}>🔥 Active</div><div style={{fontSize:12,fontWeight:700,color:C.orange}}>{p.calories}</div></div>}
                        {p.heartRateAvg&&<div style={{background:"#111318",borderRadius:5,padding:"5px 8px"}}><div style={{fontSize:8,color:C.textMuted}}>💓 平均</div><div style={{fontSize:12,fontWeight:700,color:"#fca5a5"}}>{p.heartRateAvg}</div></div>}
                        {p.totalCalories&&<div style={{background:"#111318",borderRadius:5,padding:"5px 8px"}}><div style={{fontSize:8,color:C.textMuted}}>🔥 合計</div><div style={{fontSize:12,fontWeight:700,color:C.orange}}>{p.totalCalories}</div></div>}
                      </div>
                      {p.hrZone1&&(()=>{
                        const parseMin=s=>{if(!s)return 0;const p=s.split(":");return(parseInt(p[0])||0)+(parseInt(p[1])||0)/60;};
                        const toMinLabel=s=>{if(!s)return "0分";const p=s.split(":");const m=parseInt(p[0])||0;const sec=parseInt(p[1])||0;return sec>0?`${m}分${sec}秒`:`${m}分`;};
                        const zones=[
                          {label:"ウォームアップ",bpm:"<122",time:p.hrZone1,color:"#3b82f6",raw:parseMin(p.hrZone1)},
                          {label:"脂肪燃焼",bpm:"123-134",time:p.hrZone2,color:"#06b6d4",raw:parseMin(p.hrZone2)},
                          {label:"有酸素",bpm:"135-147",time:p.hrZone3,color:"#eab308",raw:parseMin(p.hrZone3)},
                          {label:"無酸素",bpm:"148-159",time:p.hrZone4,color:"#f97316",raw:parseMin(p.hrZone4)},
                          {label:"最大心拍",bpm:"160+",time:p.hrZone5,color:"#ef4444",raw:parseMin(p.hrZone5)},
                        ];
                        const total=zones.reduce((s,z)=>s+z.raw,0)||1;
                        return (
                          <div>
                            <div style={{fontSize:10,color:"#f97316",marginBottom:8,fontWeight:600}}>💓 心拍ゾーン</div>
                            <div style={{display:"flex",height:8,borderRadius:4,overflow:"hidden",marginBottom:10}}>
                              {zones.map((z,i)=><div key={i} style={{width:`${(z.raw/total)*100}%`,background:z.color,minWidth:z.raw>0?2:0}}/>)}
                            </div>
                            {zones.map((z,i)=>(
                              <div key={i} style={{display:"flex",alignItems:"center",gap:8,marginBottom:5}}>
                                <div style={{width:10,height:10,borderRadius:2,background:z.color,flexShrink:0}}/>
                                <div style={{width:72,fontSize:11,color:C.text,fontWeight:600,flexShrink:0}}>{z.label}</div>
                                <div style={{width:52,fontSize:9,color:C.textMuted,flexShrink:0}}>{z.bpm}</div>
                                <div style={{flex:1,background:"#1a1d24",borderRadius:3,height:18,overflow:"hidden"}}>
                                  <div style={{width:`${(z.raw/total)*100}%`,height:"100%",background:z.color,borderRadius:3,minWidth:z.raw>0?3:0,display:"flex",alignItems:"center",justifyContent:"flex-end",paddingRight:4}}>
                                    {z.raw/total>0.12&&<span style={{fontSize:9,color:"#000",fontWeight:700}}>{Math.round(z.raw/total*100)}%</span>}
                                  </div>
                                </div>
                                <div style={{width:52,fontSize:11,color:z.color,fontWeight:700,textAlign:"right",flexShrink:0}}>{toMinLabel(z.time)}</div>
                              </div>
                            ))}
                            {p.recoveryHR&&(
                              <div style={{marginTop:8,fontSize:11,color:C.textMuted,display:"flex",alignItems:"center",gap:6}}>
                                🫀 回復心拍 <span style={{color:"#86efac",fontWeight:700,fontSize:12}}>{p.recoveryHR}</span>
                              </div>
                            )}
                          </div>
                        );
                      })()}
                    </div>
                  )}
                  <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:10}}>
                    {[["ラケット",p.racketName||"—"],["セッティング",p.stringSetup||"—"],["時間",p.duration?`${p.duration}分`:"—"],["気温",p.temp?`${p.temp}℃`:"—"],["場所",p.venue||"—"],["種別",p.type||"—"]].map(([k,v])=>(
                      <div key={k} style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:6,padding:"6px 10px"}}>
                        <div style={{fontSize:9,color:C.textMuted,marginBottom:2}}>{k}</div>
                        <div style={{fontSize:11,color:C.textDim,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{v}</div>
                      </div>
                    ))}
                  </div>
                  {[["🎯 フォーカス",p.focus],["📋 コーチメモ",p.coachNote],["✅ よかった点",p.goodNote],["🔧 改善点",p.improveNote],["📝 メモ",p.generalNote]].filter(([,v])=>v).map(([l,v])=>(
                    <div key={l} style={{marginBottom:6}}>
                      <div style={{fontSize:9,color:C.textMuted,marginBottom:2}}>{l}</div>
                      <div style={{fontSize:11,color:C.textDim,lineHeight:1.6,background:C.panel,borderRadius:5,padding:"6px 10px",borderLeft:`2px solid ${C.border}`}}>{v}</div>
                    </div>
                  ))}
                  {p.hasTrial&&p.trialRacketName&&(
                    <div style={{background:"#1a1805",border:`1px solid #6b5b10`,borderRadius:8,padding:"10px 12px",marginBottom:8}}>
                      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8}}>
                        <span style={{fontSize:11,color:C.yellow,fontWeight:700}}>⚔️ 試打評価</span>
                        <Badge color={{採用候補:"green",保留:"yellow",却下:"red"}[p.trialJudgment]||"gray"} sm>{p.trialJudgment}</Badge>
                      </div>
                      <div style={{fontSize:12,color:C.text,fontWeight:700,marginBottom:4}}>{p.trialRacketName}</div>
                      {(p.trialString||p.trialTension)&&<div style={{fontSize:10,color:C.textMuted,marginBottom:8}}>{[p.trialString,p.trialTension].filter(Boolean).join(" / ")}</div>}
                      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:p.trialNote?8:0}}>
                        {[["SP",p.trialSpin],["CT",p.trialControl],["PW",p.trialPower],["FL",p.trialFeel],["IF",p.trialInfo]].map(([l,v])=>(
                          <div key={l} style={{display:"flex",alignItems:"center",gap:3}}>
                            <span style={{fontSize:9,color:C.textMuted}}>{l}</span>
                            <div style={{display:"flex",gap:1}}>{[1,2,3,4,5].map(n=><div key={n} style={{width:6,height:6,borderRadius:1,background:n<=v?C.yellow:"#333"}}/>)}</div>
                          </div>
                        ))}
                        <span style={{fontSize:10,color:C.yellow,fontWeight:700}}>avg {((p.trialSpin+p.trialControl+p.trialPower+p.trialFeel+p.trialInfo)/5).toFixed(1)}</span>
                      </div>
                      {p.trialNote&&<div style={{fontSize:11,color:C.textDim,lineHeight:1.6,background:"#111318",borderRadius:5,padding:"6px 10px",borderLeft:`2px solid #6b5b10`}}>{p.trialNote}</div>}
                    </div>
                  )}
                  <div style={{display:"flex",gap:8,marginTop:10}}>
                    <Btn onClick={()=>setModal({practice:p})} style={{flex:1}}>✏️ 編集</Btn>
                    <Btn onClick={()=>handleDelete(p.id)} variant="danger">🗑</Btn>
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>
      {modal&&<Modal practice={modal.practice}/>}
    </div>
  );
}

// ── TRIALS TAB ────────────────────────────────────
const blankTrial=()=>({id:`t${Date.now()}`,date:today(),racketName:"",string:"",stringCross:"",tension:"",temp:"",venue:"",judgment:"保留",spin:3,control:3,power:3,feel:3,info:3,strokeNote:"",serveNote:"",volleyNote:"",generalNote:"",sessions:[]});
const blankSession=()=>({id:`s${Date.now()}`,date:today(),temp:"",tension:"",note:""});

function TrialsTab({data,setData,practices,rackets,strings,venues,setVenues,toast,quickAdd,onQuickAddDone}){
  const cfm=useConfirm();
  const [expanded,setExpanded]=useState(null);
  const [modal,setModal]=useState(null);
  useEffect(()=>{if(quickAdd){setModal({trial:blankTrial()});onQuickAddDone();}},[quickAdd]);
  const jc={採用候補:"green",保留:"yellow",却下:"red"};
  const persist=list=>{const s=[...list].sort((a,b)=>b.date.localeCompare(a.date));setData(s);save(KEYS.trials,s);};
  const handleSave=form=>{const isNew=!data.find(t=>t.id===form.id);persist(isNew?[form,...data]:data.map(t=>t.id===form.id?form:t));setModal(null);toast.show(isNew?"✅ 追加しました":"✅ 更新しました");};
  const handleDelete=id=>cfm.ask("この記録を削除しますか？",()=>{persist(data.filter(t=>t.id!==id));setExpanded(null);toast.show("🗑 削除しました",C.red);});
  const avg=t=>((t.spin+t.control+t.power+t.feel+t.info)/5).toFixed(1);
  const practiceTrials=(practices||[]).filter(p=>p.hasTrial&&p.trialRacketName).map(p=>({
    id:`pt-${p.id}`,date:p.date,racketName:p.trialRacketName,string:p.trialString||"",stringCross:"",tension:p.trialTension||"",temp:p.temp||"",venue:p.venue||"",
    judgment:p.trialJudgment||"保留",spin:p.trialSpin||3,control:p.trialControl||3,power:p.trialPower||3,feel:p.trialFeel||3,info:p.trialInfo||3,
    strokeNote:"",serveNote:"",volleyNote:"",generalNote:p.trialNote||"",sessions:[],fromPractice:true,practiceType:p.type
  }));
  const allTrials=[...data,...practiceTrials].sort((a,b)=>b.date.localeCompare(a.date));

  const Modal=({trial})=>{
    const [f,setF]=useState({...trial}); const s=k=>v=>setF(p=>({...p,[k]:v}));
    return (
      <div style={{position:"fixed",inset:0,background:"#000c",zIndex:200,display:"flex",alignItems:"flex-start",justifyContent:"center",overflowY:"auto",padding:"20px 12px"}} onClick={e=>e.target===e.currentTarget&&setModal(null)}>
        <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:12,width:"100%",maxWidth:540,padding:20}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <span style={{fontSize:14,fontWeight:700,color:C.text}}>🎾 試打ノート</span>
            <Btn onClick={()=>setModal(null)} variant="ghost" style={{fontSize:18,padding:"0 6px"}}>✕</Btn>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
            <Field label="日付" value={f.date} onChange={s("date")} placeholder="2026/04/05"/>
            <VenueSelect label="場所・コート" value={f.venue||""} onChange={s("venue")} venues={venues} onAddVenue={v=>setVenues([...venues,v])}/>
          </div>
          <FSelect label="ラケット（マスターから選択）" value={f.racketName||""} onChange={s("racketName")} options={getRacketOpts(rackets)}/>
          <Field label="気温（℃）" value={f.temp||""} onChange={s("temp")} type="number" placeholder="15"/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"0 12px"}}>
            <FSelect label="縦糸" value={f.string||""} onChange={s("string")} options={getStringOpts(strings)}/>

                  <div style={{fontSize:14,fontWeight:800,color:ac2,fontFamily:"monospace"}}>{ac}</div>
                  <div style={{fontSize:9,color:C.textMuted}}>avg/5</div>

                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
                    {[["ラケット",t.racketName||"—"],["縦糸",t.string||"—"],["横糸",t.stringCross||"同じ"],["テンション",t.tension||"—"],["気温",t.temp?`${t.temp}℃`:"—"],["場所",t.venue||"—"]].map(([k,v])=>(
                      <div key={k} style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:6,padding:"6px 10px"}}>
                        <div style={{fontSize:9,color:C.textMuted,marginBottom:2}}>{k}</div>
                        <div style={{fontSize:12,color:C.textDim,fontWeight:600}}>{v}</div>
                      </div>
                    ))}
                  </div>
                  <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 14px",marginBottom:10}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                      <span style={{fontSize:10,color:C.textMuted}}>打感評価</span>
                      <span style={{fontSize:13,fontWeight:700,color:C.accent,fontFamily:"monospace"}}>平均 {ac}/5</span>
                    </div>
                    {[["🌀 スピン","spin"],["🎯 コントロール","control"],["💥 パワー","power"],["✋ フィール","feel"],["📡 情報量","info"]].map(([label,key])=>(
                      <div key={key} style={{display:"flex",alignItems:"center",gap:8,marginBottom:5}}>
                        <span style={{fontSize:11,color:C.textMuted,minWidth:88}}>{label}</span>
                        <div style={{flex:1,background:C.border,borderRadius:3,height:6,overflow:"hidden"}}>
                          <div style={{width:`${t[key]*20}%`,height:"100%",background:scColor(t[key]),borderRadius:3}}/>
                        </div>
                        <span style={{fontSize:11,color:scColor(t[key]),fontWeight:700}}>{t[key]}</span>
                      </div>
                    ))}
                  </div>
                  {[["🎾 ストローク",t.strokeNote],["🏐 サーブ",t.serveNote],["🥅 ボレー",t.volleyNote],["📝 総括",t.generalNote]].filter(([,v])=>v).map(([l,v])=>(
                    <div key={l} style={{marginBottom:7}}>
                      <div style={{fontSize:10,color:C.textMuted,marginBottom:3}}>{l}</div>
                      <div style={{fontSize:12,color:C.textDim,lineHeight:1.7,background:C.panel,borderRadius:6,padding:"7px 10px",borderLeft:`2px solid ${C.border}`}}>{v}</div>
                    </div>
                  ))}
                  {(t.sessions||[]).length>0&&(
                    <div style={{marginBottom:10}}>
                      <div style={{fontSize:10,color:C.purple,letterSpacing:"0.08em",marginBottom:6}}>📅 セッション履歴（{t.sessions.length}回）</div>
                      {t.sessions.map((sess,si)=>(
                        <div key={sess.id} style={{background:C.panel,border:`1px solid #2d1f4e`,borderRadius:7,padding:"8px 12px",marginBottom:6,borderLeft:`2px solid ${C.purple}`}}>
                          <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:sess.note?5:0,flexWrap:"wrap"}}>
                            <span style={{fontSize:10,color:C.purple,fontWeight:700}}>#{si+1}</span>
                            <span style={{fontSize:11,color:C.textMuted,fontFamily:"monospace"}}>{sess.date}</span>
                            {sess.temp&&<span style={{fontSize:11,color:C.textDim}}>{sess.temp}℃</span>}

                    {t.fromPractice?(
                      <div style={{flex:1,textAlign:"center",fontSize:11,color:C.blue,padding:"8px 0"}}>🏃 練習タブから編集できます</div>

                      <>
                        <Btn onClick={()=>setModal({trial:t})} style={{flex:1}}>✏️ 編集</Btn>
                        <Btn onClick={()=>handleDelete(t.id)} variant="danger">🗑</Btn>
                      </>
                    )}
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>
      {modal&&<Modal trial={modal.trial}/>}
    </div>
  );
}

// ── RACKETS TAB ───────────────────────────────────
function RacketsTab({data,setData,toast}){

  const handleDelete=id=>cfm.ask("この記録を削除しますか？",()=>{persist(data.filter(r=>r.id!==id));setExpanded(null);toast.show("🗑 削除しました",C.red);});

          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <span style={{fontSize:14,fontWeight:700,color:C.text}}>ラケット</span>
            <Btn onClick={()=>setModal(null)} variant="ghost" style={{fontSize:18,padding:"0 6px"}}>✕</Btn>
          </div>
          <FSelect label="ステータス" value={f.status||"candidate"} onChange={s("status")} options={[{value:"active",label:"使用中"},{value:"candidate",label:"エース候補"},{value:"considering",label:"保険プラン"},{value:"support",label:"習得専用"},{value:"retired",label:"引退"}]}/>
          {fields.map(([k,l,p])=><Field key={k} label={l} value={f[k]||""} onChange={s(k)} placeholder={p}/>)}
          <Field label="メモ・評価" value={f.note||""} onChange={s("note")} multiline placeholder="フレーム特性..."/>

        <span style={{fontSize:11,color:C.accent}}>ラケット一覧</span>
        <button onClick={()=>setModal({item:{id:`r${Date.now()}`,name:"",role:"",status:"candidate",weight:"",balance:"",face:"",beam:"",string:"",tension:"",note:""}})} style={{background:C.accent,border:"none",color:"#000",borderRadius:5,padding:"4px 12px",fontSize:11,fontWeight:700,cursor:"pointer"}}>＋ 追加</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))",gap:10}}>
        {data.map(r=>{
          const [sc,sl]=statusMap[r.status]||["gray","—"]; const on=expanded===r.id;
          return (
            <div key={r.id} style={{background:on?"#131820":C.panel,border:`1px solid ${on?C.accent:C.border}`,borderRadius:8,padding:14,transition:"all 0.15s"}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                <Badge color={sc}>{sl}</Badge>
                <div><button onClick={()=>setModal({item:r})} style={{background:"none",border:"none",color:C.textMuted,cursor:"pointer",fontSize:13,marginRight:4}}>✏️</button><button onClick={()=>handleDelete(r.id)} style={{background:"none",border:"none",color:C.red,cursor:"pointer",fontSize:13}}>🗑</button></div>
              </div>
              <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:3,lineHeight:1.3}}>{r.name}</div>
              <div style={{fontSize:11,color:C.textMuted,marginBottom:10}}>{r.role}</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5}}>
                {[["重量",r.weight],["バランス",r.balance],["フェイス",r.face],["ビーム",r.beam]].map(([k,v])=>(
                  <div key={k} style={{background:"#0d0f14",borderRadius:4,padding:"4px 8px"}}>
                    <div style={{fontSize:9,color:C.textMuted}}>{k}</div>
                    <div style={{fontSize:11,color:C.textDim,fontWeight:600}}>{v||"—"}</div>

                ))}
              </div>
              <button onClick={()=>setExpanded(on?null:r.id)} style={{background:"none",border:"none",color:C.textMuted,cursor:"pointer",fontSize:11,marginTop:8,padding:0}}>{on?"▲ 閉じる":"▼ 詳細"}</button>
              {on&&<div style={{marginTop:8,paddingTop:8,borderTop:`1px solid ${C.border}`}}>
                <div style={{fontSize:11,color:C.textMuted,marginBottom:2}}><span style={{color:C.accent}}>ST </span>{r.string||"—"}</div>
                <div style={{fontSize:11,color:C.textMuted,marginBottom:6}}><span style={{color:C.accent}}>T  </span>{r.tension||"—"}</div>
                <div style={{fontSize:11,color:C.textDim,lineHeight:1.6}}>{r.note}</div>
              </div>}
            </div>
          );
        })}
      </div>
      {modal&&<Modal item={modal.item}/>}
    </div>
  );
}
