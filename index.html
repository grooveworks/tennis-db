          <Field label="ストリング・テンション" value={f.stringing||""} onChange={s("stringing")} placeholder="Blast 1.25 / PTP 1.25 / 43p"/>
          <div style={{fontSize:11,color:C.blue,margin:"14px 0 10px",paddingBottom:5,borderBottom:`1px solid ${C.border}`}}>▶ ダブルス取扱説明書</div>
          <Field label="担当ポジション" value={f.partnerRole||""} onChange={s("partnerRole")} placeholder="後衛メイン"/>
          <Field label="フォーメーション" value={f.partnerFormation||""} onChange={s("partnerFormation")} multiline placeholder="雁行陣ベース..."/>
          <Field label="✅ やってほしいこと" value={f.partnerDo||""} onChange={s("partnerDo")} multiline placeholder="・センターへの深いボレーで十分&#10;・..."/>
          <Field label="🚫 やめてほしいこと" value={f.partnerDont||""} onChange={s("partnerDont")} multiline placeholder="・ポイント間の声かけは最小限&#10;・..."/>
          <Field label="🧠 メンタルについて" value={f.partnerMental||""} onChange={s("partnerMental")} multiline placeholder="試合中は沈黙がベスト..."/>
          <Field label="📝 その他パートナーへ" value={f.partnerNote||""} onChange={s("partnerNote")} multiline placeholder="序盤は動きが悪いが徐々に上がる..."/>
          <div style={{fontSize:11,color:C.purple,margin:"14px 0 10px",paddingBottom:5,borderBottom:`1px solid #3d2060`}}>🔒 自己分析（本人のみ・取扱説明書には表示されません）</div>
          <Field label="タイプ（MBTI等）" value={f.mbti||""} onChange={s("mbti")} placeholder="INTJ × 高O × 高H"/>
          <Field label="タイプの一言まとめ" value={f.mbtiSummary||""} onChange={s("mbtiSummary")} multiline placeholder="探索は反射・採用は熟考・報告は正直..."/>
          <Field label="タイプ × テニスへの影響" value={f.mbtiTennis||""} onChange={s("mbtiTennis")} multiline placeholder="INTJ：戦略的設計、原因を内因帰属..."/>
          <Field label="⚡ メンタルが崩れるトリガー" value={f.mentalTriggers||""} onChange={s("mentalTriggers")} multiline placeholder="・目標が大きすぎる&#10;・変則球でリズムを崩される..."/>
          <Field label="🔄 立て直し方" value={f.mentalRecovery||""} onChange={s("mentalRecovery")} multiline placeholder="・動作細分化ルーティン&#10;・発声を最小限に..."/>
          <Field label="💪 自分の内面的強み" value={f.selfStrengths||""} onChange={s("selfStrengths")} multiline placeholder="原因分析精度が高い、粘り強さ..."/>
          <Field label="🩹 自分の内面的課題" value={f.selfWeaknesses||""} onChange={s("selfWeaknesses")} multiline placeholder="序盤の動き出し、スタミナ..."/>
          <Field label="📓 個人メモ（自由記述）" value={f.personalNote||""} onChange={s("personalNote")} multiline placeholder="気づき、今後の課題など..."/>
          <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:16}}>
            <button onClick={handleCancel} style={{background:C.panel2,border:`1px solid ${C.border}`,color:C.textMuted,borderRadius:6,padding:"7px 16px",fontSize:12,cursor:"pointer"}}>キャンセル</button>
            <button onClick={handleSave} style={{background:C.accent,border:"none",color:"#000",borderRadius:6,padding:"7px 16px",fontSize:12,fontWeight:700,cursor:"pointer"}}>保存</button>
          </div>
        </div>
      ):(
        <>
          {/* Profile card */}
          <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:10,padding:16}}>
            <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:14}}>
              <div style={{width:52,height:52,borderRadius:"50%",background:`linear-gradient(135deg,${C.accent},#60e0ff)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>🎾</div>
              <div>
                <div style={{fontSize:18,fontWeight:800,color:C.text}}>{data.name}</div>
                <div style={{fontSize:11,color:C.textMuted,marginTop:2}}>{data.level}</div>
                <div style={{fontSize:11,color:C.textMuted}}>テニス歴 {data.career}</div>
              </div>
            </div>
            <div style={{background:C.panel2,borderRadius:8,padding:"10px 14px",marginBottom:10}}>
              <div style={{fontSize:10,color:C.accent,marginBottom:4}}>🎾 プレースタイル</div>
              <div style={{fontSize:13,color:C.text,fontWeight:700,marginBottom:4}}>{data.playStyle}</div>
              <div style={{fontSize:11,color:C.textDim,lineHeight:1.7}}>{data.playStyleDetail}</div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
              <div style={{background:C.panel2,borderRadius:8,padding:"10px 12px"}}>
                <div style={{fontSize:10,color:C.accent,marginBottom:5}}>✅ 強み</div>
                <div style={{fontSize:11,color:C.textDim,lineHeight:1.7}}>{data.strengths}</div>
              </div>
              <div style={{background:C.panel2,borderRadius:8,padding:"10px 12px"}}>
                <div style={{fontSize:10,color:C.yellow,marginBottom:5}}>⚠ 課題</div>
                <div style={{fontSize:11,color:C.textDim,lineHeight:1.7}}>{data.weaknesses}</div>
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              <div style={{background:C.panel2,borderRadius:8,padding:"10px 12px"}}>
                <div style={{fontSize:10,color:C.textMuted,marginBottom:3}}>🖊️ ラケット</div>
                <div style={{fontSize:11,color:C.textDim,fontWeight:600}}>{data.racket||"—"}</div>
              </div>
              <div style={{background:C.panel2,borderRadius:8,padding:"10px 12px"}}>
                <div style={{fontSize:10,color:C.textMuted,marginBottom:3}}>🪢 ストリング</div>
                <div style={{fontSize:11,color:C.textDim,fontWeight:600}}>{data.stringing||"—"}</div>
              </div>
            </div>
          </div>
          {/* Partner manual preview */}
          <div style={{background:C.panel,border:`1px solid ${C.blue}`,borderRadius:10,padding:16}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <span style={{fontSize:11,color:C.blue}}>🤝 ダブルス取扱説明書（プレビュー）</span>
            </div>
            <div style={{display:"flex",gap:8,marginBottom:10,alignItems:"flex-start"}}>
              <div style={{background:"#051828",borderRadius:8,padding:"8px 12px",flex:1}}>
                <div style={{fontSize:10,color:C.blue,marginBottom:3}}>担当</div>
                <div style={{fontSize:13,color:C.text,fontWeight:700}}>{data.partnerRole||"—"}</div>
              </div>
              <div style={{background:"#051828",borderRadius:8,padding:"8px 12px",flex:2}}>
                <div style={{fontSize:10,color:C.blue,marginBottom:3}}>フォーメーション</div>
                <div style={{fontSize:11,color:C.textDim,lineHeight:1.6}}>{data.partnerFormation||"—"}</div>
              </div>
            </div>
            {[["✅ やってほしいこと",data.partnerDo,C.accent],["🚫 やめてほしいこと",data.partnerDont,C.red]].map(([label,val,col])=>(
              <div key={label} style={{background:"#051828",borderRadius:8,padding:"10px 12px",marginBottom:8}}>
                <div style={{fontSize:10,color:col,marginBottom:4}}>{label}</div>
                <div style={{fontSize:11,color:C.textDim,lineHeight:1.8,whiteSpace:"pre-line"}}>{val||"—"}</div>
              </div>
            ))}
            <div style={{marginTop:4,textAlign:"center"}}>
              <button onClick={()=>setPartnerMode(true)} style={{background:"#051828",border:`1px solid ${C.blue}`,color:C.blue,borderRadius:8,padding:"8px 20px",fontSize:12,fontWeight:700,cursor:"pointer"}}>📋 パートナーに見せる →</button>
            </div>
          </div>
          {/* Self analysis - private */}
          <div style={{background:C.panel,border:`1px solid #3d2060`,borderRadius:10,padding:16}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
              <span style={{fontSize:11,color:C.purple}}>🔒 自己分析</span>
              <span style={{fontSize:10,color:"#6b4a8f",background:"#1a0a2e",borderRadius:4,padding:"2px 7px"}}>本人のみ</span>
            </div>
            {/* MBTI badge + summary */}
            <div style={{background:"#1a0a2e",border:`1px solid #3d2060`,borderRadius:8,padding:"12px 14px",marginBottom:10}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
                <div style={{background:`linear-gradient(135deg,${C.purple},#60a5fa)`,borderRadius:6,padding:"4px 12px",fontSize:13,fontWeight:800,color:"#fff",letterSpacing:"0.05em"}}>{data.mbti||"—"}</div>
              </div>
              <div style={{fontSize:11,color:"#c4b5fd",lineHeight:1.7}}>{data.mbtiSummary}</div>
            </div>
            {/* MBTI × Tennis */}
            {data.mbtiTennis&&(
              <div style={{background:"#1a0a2e",borderRadius:8,padding:"10px 14px",marginBottom:10}}>
                <div style={{fontSize:10,color:C.purple,marginBottom:5}}>🎾 タイプ × テニスへの影響</div>
                <div style={{fontSize:11,color:"#c4b5fd",lineHeight:1.8,whiteSpace:"pre-line"}}>{data.mbtiTennis}</div>
              </div>
            )}
            {/* Triggers & Recovery */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
              <div style={{background:"#2e0a0a",borderRadius:8,padding:"10px 12px"}}>
                <div style={{fontSize:10,color:C.red,marginBottom:5}}>⚡ 崩れるトリガー</div>
                <div style={{fontSize:11,color:"#fca5a5",lineHeight:1.8,whiteSpace:"pre-line"}}>{data.mentalTriggers||"—"}</div>
              </div>
              <div style={{background:"#0a1e0a",borderRadius:8,padding:"10px 12px"}}>
                <div style={{fontSize:10,color:C.accent,marginBottom:5}}>🔄 立て直し方</div>
                <div style={{fontSize:11,color:"#86efac",lineHeight:1.8,whiteSpace:"pre-line"}}>{data.mentalRecovery||"—"}</div>
              </div>
            </div>
            {/* Self strengths / weaknesses */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:data.personalNote?10:0}}>
              <div style={{background:"#1a0a2e",borderRadius:8,padding:"10px 12px"}}>
                <div style={{fontSize:10,color:C.purple,marginBottom:5}}>💪 内面的強み</div>
                <div style={{fontSize:11,color:"#c4b5fd",lineHeight:1.8,whiteSpace:"pre-line"}}>{data.selfStrengths||"—"}</div>
              </div>
              <div style={{background:"#1a0a2e",borderRadius:8,padding:"10px 12px"}}>
                <div style={{fontSize:10,color:C.yellow,marginBottom:5}}>🩹 内面的課題</div>
                <div style={{fontSize:11,color:"#fde68a",lineHeight:1.8,whiteSpace:"pre-line"}}>{data.selfWeaknesses||"—"}</div>
              </div>
            </div>
            {data.personalNote&&(
              <div style={{background:"#1a0a2e",borderRadius:8,padding:"10px 14px"}}>
                <div style={{fontSize:10,color:C.textMuted,marginBottom:4}}>📓 個人メモ</div>
                <div style={{fontSize:11,color:C.textDim,lineHeight:1.8,whiteSpace:"pre-line"}}>{data.personalNote}</div>
              </div>
            )}
          </div>
        </>
      )}
    </div>
  );
}


const TABS=[
  {id:"profile",label:"選手",icon:"👤"},
  {id:"tournaments",label:"大会",icon:"🏆"},
  {id:"practices",label:"練習",icon:"🏃"},
  {id:"trials",label:"試打",icon:"🎾"},
  {id:"rackets",label:"ラケット",icon:"🖊️"},
  {id:"strings",label:"ST",icon:"🪢"},
  {id:"measurements",label:"実測値",icon:"📐"},
  {id:"mental",label:"メンタル",icon:"🧠"},
  {id:"next",label:"Next",icon:"▶"},
];

function TennisDB(){
  const [tab,setTab]=useState("tournaments");
  const [ready,setReady]=useState(false);
  const [quickAdd,setQuickAdd]=useState(null);
  const [showAddMenu,setShowAddMenu]=useState(false);
  const [tournaments,setTournaments]=useState([]);
  const [practices,setPractices]=useState([]);
  const [trials,setTrials]=useState([]);
  const [rackets,setRackets]=useState([]);
  const [strings,setStrings]=useState([]);
  const [measurements,setMeasurements]=useState([]);
  const [mental,setMental]=useState([]);
  const [next,setNext]=useState([]);
  const [profile,setProfile]=useState({});
  const [venues,setVenues]=useState([]);
  const [large,setLarge]=useState(()=>{try{return localStorage.getItem("yuke-fs")==="large";}catch{return false;}});
  const importRef=useRef();
  const toast=useToast();

  const toggleLarge=()=>setLarge(v=>{const n=!v;try{localStorage.setItem("yuke-fs",n?"large":"normal");}catch{}return n;});

  useEffect(()=>{
    const tr=load(KEYS.tournaments),pr=load(KEYS.practices),ti=load(KEYS.trials),r=load(KEYS.rackets),s=load(KEYS.strings),ms=load(KEYS.measurements),mn=load(KEYS.mental),nx=load(KEYS.next),pf=load(KEYS.profile),vn=load(KEYS.venues);
    const ds=(a)=>a?[...a].sort((x,y)=>y.date.localeCompare(x.date)):null;
    setTournaments(ds(tr)||ds(INIT.tournaments)); setPractices(ds(pr)||ds(INIT.practices)); setTrials(ds(ti)||ds(INIT.trials));
    setRackets(r||INIT.rackets); setStrings(s||INIT.strings); setMeasurements(ms||INIT.measurements);
    setMental(mn||INIT.mental); setNext(nx||INIT.next); setProfile(pf||INIT.profile); setVenues(vn||INIT.venues); setReady(true);
  },[]);

  const handleExport=async()=>{
    const result=await exportAll({tournaments,practices,trials,rackets,strings,measurements,mental,next,profile,venues});
    if(result==="cancelled")return;
    const now=new Date().toISOString();
    try{localStorage.setItem("yuke-last-export",now);}catch{}
    setLastExport(now);
    toast.show(result==="shared"?"📤 共有しました":"📤 ダウンロードしました");
  };
  const [lastExport,setLastExport]=useState(()=>{try{return localStorage.getItem("yuke-last-export")||"";}catch{return "";}});
  const daysSinceExport=lastExport?Math.floor((Date.now()-new Date(lastExport).getTime())/(1000*60*60*24)):999;
  const handleImport=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        const merge=(existing,incoming)=>{
          if(!Array.isArray(incoming))return incoming;
          const map=new Map(existing.map(item=>[item.id,item]));
          incoming.forEach(item=>{map.set(item.id,{...map.get(item.id),...item});});
          return [...map.values()].sort((a,b)=>(b.date||"").localeCompare(a.date||""));
        };
        const apply=(key,getter,setter,stoKey)=>{
          if(d[key]){
            const merged=Array.isArray(d[key])?merge(getter,d[key]):({...getter,...d[key]});
            setter(merged);save(stoKey,merged);
          }
        };
        apply("tournaments",tournaments,setTournaments,KEYS.tournaments);
        apply("practices",practices,setPractices,KEYS.practices);
        apply("trials",trials,setTrials,KEYS.trials);
        apply("rackets",rackets,setRackets,KEYS.rackets);
        apply("strings",strings,setStrings,KEYS.strings);
        apply("measurements",measurements,setMeasurements,KEYS.measurements);
        apply("mental",mental,setMental,KEYS.mental);
        apply("next",next,setNext,KEYS.next);
        apply("profile",profile,setProfile,KEYS.profile);
        apply("venues",venues,setVenues,KEYS.venues);
        toast.show("📥 インポート完了（統合保存済み）");
      }catch{toast.show("❌ 読み込み失敗",C.red);}
    };
    reader.readAsText(file);e.target.value="";
  };

  if(!ready) return <div style={{background:C.bg,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:C.textMuted,fontFamily:"sans-serif"}}>読み込み中...</div>;

  return (
    <div style={{minHeight:"100vh",background:C.bg,color:C.text,fontFamily:"'DM Sans','Noto Sans JP',sans-serif",padding:"16px 14px"}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap');
        *{box-sizing:border-box;margin:0;padding:0;}
        ::-webkit-scrollbar{width:4px;height:4px;}
        ::-webkit-scrollbar-track{background:${C.bg};}
        ::-webkit-scrollbar-thumb{background:${C.border};border-radius:2px;}
        input,textarea,select{color-scheme:dark;}
        button:hover{opacity:0.82;}
      `}</style>
      {toast.el}
      {daysSinceExport>=3&&(
        <div onClick={handleExport} style={{background:"#2e0505",border:"1px solid #b45252",borderRadius:8,padding:"10px 14px",marginBottom:12,display:"flex",alignItems:"center",gap:10,cursor:"pointer"}}>
          <span style={{fontSize:16}}>⚠️</span>
          <div style={{flex:1}}>
            <div style={{fontSize:12,color:C.red,fontWeight:700}}>バックアップしてください</div>
            <div style={{fontSize:10,color:"#fca5a5"}}>{lastExport?`最終: ${new Date(lastExport).toLocaleDateString("ja-JP")}`:"まだバックアップしていません"}（タップで📤）</div>
          </div>
        </div>
      )}
      {showAddMenu&&(
        <div style={{position:"fixed",inset:0,background:"#000a",zIndex:300}} onClick={()=>setShowAddMenu(false)}>
          <div style={{position:"absolute",top:60,right:14,background:C.panel,border:`1px solid ${C.accent}`,borderRadius:12,padding:8,minWidth:160,boxShadow:"0 8px 30px #000a"}} onClick={e=>e.stopPropagation()}>
            {[["practices","🏃 練習を記録","練習・スクール等"],["tournaments","🏆 大会を記録","試合結果"],["trials","🎾 試打のみ","試打専用"]].map(([t,label,sub])=>(
              <button key={t} onClick={()=>{setTab(t);setQuickAdd(t);setShowAddMenu(false);}} style={{display:"block",width:"100%",textAlign:"left",background:"none",border:"none",color:C.text,padding:"10px 14px",fontSize:13,fontWeight:600,cursor:"pointer",borderRadius:8}}>
                {label}<div style={{fontSize:10,color:C.textMuted,marginTop:2}}>{sub}</div>
              </button>
            ))}
          </div>
        </div>
      )}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
        <div>
          <h1 style={{fontSize:19,fontWeight:800,letterSpacing:"-0.02em",background:`linear-gradient(90deg,${C.accent},#60e0ff)`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>ゆっけ Tennis DB</h1>
          <div style={{fontSize:10,color:C.textMuted,marginTop:2}}>大会 {tournaments.length}件 / 練習 {practices.length}件 / 試打 {trials.length}件{lastExport&&daysSinceExport<3?` · 📤${new Date(lastExport).toLocaleDateString("ja-JP")}`:""}</div>
        </div>
        <div style={{display:"flex",gap:6}}>
          <button onClick={()=>setShowAddMenu(true)} style={{background:C.accent,border:"none",color:"#000",borderRadius:6,padding:"6px 14px",fontSize:13,fontWeight:800,cursor:"pointer"}}>＋</button>
          <button onClick={toggleLarge} style={{background:large?"#1a2e10":"#111318",border:`1px solid ${large?C.accent:C.border}`,color:large?C.accent:C.textMuted,borderRadius:6,padding:"6px 10px",fontSize:13,fontWeight:700,cursor:"pointer"}} title="文字サイズ切り替え">{large?"A↓":"A↑"}</button>
          <button onClick={handleExport} style={{background:"#051828",border:`1px solid ${C.blue}`,color:C.blue,borderRadius:6,padding:"6px 12px",fontSize:11,fontWeight:600,cursor:"pointer"}}>📤</button>
          <button onClick={()=>importRef.current.click()} style={{background:"#0d1a10",border:`1px solid ${C.accentDim}`,color:C.accent,borderRadius:6,padding:"6px 12px",fontSize:11,fontWeight:600,cursor:"pointer"}}>📥</button>
          <input ref={importRef} type="file" accept=".json" onChange={handleImport} style={{display:"none"}}/>
        </div>
      </div>
      <div style={{display:"flex",gap:2,marginBottom:12,background:C.panel,border:`1px solid ${C.border}`,borderRadius:8,padding:3,flexWrap:"wrap"}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:"1 1 auto",background:tab===t.id?C.accent:"none",border:"none",color:tab===t.id?"#000":C.textMuted,borderRadius:5,padding:"7px 6px",fontSize:10,fontWeight:tab===t.id?700:400,cursor:"pointer",transition:"all 0.12s",whiteSpace:"nowrap"}}>{t.icon} {t.label}</button>
        ))}
      </div>
      <div style={{zoom:large?1.22:1}}>
      {tab==="profile"&&<ProfileTab data={profile} setData={setProfile} toast={toast}/>}
      {tab==="tournaments"&&<TournamentsTab data={tournaments} setData={setTournaments} rackets={rackets} strings={strings} venues={venues} setVenues={v=>{setVenues(v);save(KEYS.venues,v);}} toast={toast} quickAdd={quickAdd==="tournaments"} onQuickAddDone={()=>setQuickAdd(null)}/>}
      {tab==="practices"&&<PracticesTab data={practices} setData={setPractices} rackets={rackets} strings={strings} venues={venues} setVenues={v=>{setVenues(v);save(KEYS.venues,v);}} toast={toast} quickAdd={quickAdd==="practices"} onQuickAddDone={()=>setQuickAdd(null)}/>}
      {tab==="trials"&&<TrialsTab data={trials} setData={setTrials} practices={practices} rackets={rackets} strings={strings} venues={venues} setVenues={v=>{setVenues(v);save(KEYS.venues,v);}} toast={toast} quickAdd={quickAdd==="trials"} onQuickAddDone={()=>setQuickAdd(null)}/>}
      {tab==="rackets"&&<RacketsTab data={rackets} setData={setRackets} toast={toast}/>}
      {tab==="strings"&&<StringsTab data={strings} setData={setStrings} toast={toast}/>}
      {tab==="measurements"&&<MeasurementsTab data={measurements} setData={setMeasurements} toast={toast}/>}
      {tab==="mental"&&<MentalTab data={mental} setData={setMental} toast={toast}/>}
      {tab==="next"&&<NextTab data={next} setData={setNext} toast={toast}/>}
      </div>
    </div>
  );
}
