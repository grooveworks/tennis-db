function ConfirmDialog({message,onYes,onNo}){
  return (
    <div style={{position:"fixed",inset:0,background:"#0006",zIndex:400,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>

}
function useConfirm(){
  const [state,setState]=useState(null);

// ── TOAST ─────────────────────────────────────────
function useToast(){
  const [t,setT]=useState(null);
  const tRef=useRef(null);
  const show=(msg,color=C.accent,onUndo=null,duration=0)=>{if(tRef.current)clearTimeout(tRef.current);setT({msg,color,onUndo});tRef.current=setTimeout(()=>setT(null),duration||( onUndo?5000:2600));};
  const doUndo=()=>{if(t?.onUndo){t.onUndo();setT(null);}};
  const el=t?<div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",background:C.panel,border:`1px solid ${t.color}`,color:t.color,borderRadius:8,padding:"10px 20px",fontSize:13,fontWeight:600,zIndex:600,boxShadow:"0 4px 20px #0008",display:"flex",alignItems:"center",gap:12,whiteSpace:"nowrap"}}>
    <span>{t.msg}</span>
    {t.onUndo&&<button onClick={doUndo} style={{background:t.color,border:"none",color:"#fff",borderRadius:4,padding:"5px 12px",fontSize:12,fontWeight:700,cursor:"pointer"}}>元に戻す</button>}
  </div>:null;
  return {show,el};
}

const KEYS={tournaments:"tournaments",practices:"practices",trials:"trials",rackets:"rackets",strings:"strings",measurements:"measurements",mental:"mental",next:"next",profile:"profile",venues:"venues",stringSetups:"stringSetups",quickTrialCards:"quickTrialCards",opponents:"opponents"};
const LS_PREFIX="yuke-";
const lsLoad=k=>{try{const v=localStorage.getItem(LS_PREFIX+k+"-v1");if(v)return JSON.parse(v);}catch(_){}return null;};
const lsSave=(k,d)=>{try{localStorage.setItem(LS_PREFIX+k+"-v1",JSON.stringify(d));}catch(_){}};

// Cloud save (debounced per key)
const _saveTimers={};
const save=(k,d)=>{
  lsSave(k,d);
  const user=fbAuth.currentUser;
  if(!user)return;
  if(_saveTimers[k])clearTimeout(_saveTimers[k]);
  _saveTimers[k]=setTimeout(()=>{
    fbDb.collection("users").doc(user.uid).collection("data").doc(k).set({items:Array.isArray(d)?d:null,obj:Array.isArray(d)?null:d,updatedAt:firebase.firestore.FieldValue.serverTimestamp()}).catch(e=>console.error("Firestore save error:",k,e));
  },800);
};

// Cloud load all
const cloudLoadAll=async(uid)=>{
  try{
    const snap=await fbDb.collection("users").doc(uid).collection("data").get();
    const result={};
    snap.forEach(doc=>{const d=doc.data();result[doc.id]=d.items||d.obj||null;});
    return result;
  }catch(e){console.error("Firestore load error:",e);return null;}
};

// Cloud upload all (for initial migration)
const cloudSaveAll=async(uid,allData)=>{
  const batch=fbDb.batch();
  Object.entries(KEYS).forEach(([name,key])=>{
    if(allData[name]){
      const ref=fbDb.collection("users").doc(uid).collection("data").doc(key);
      batch.set(ref,{items:Array.isArray(allData[name])?allData[name]:null,obj:Array.isArray(allData[name])?null:allData[name],updatedAt:firebase.firestore.FieldValue.serverTimestamp()});
    }
  });
  await batch.commit();
};
const exportAll=async data=>{
  const json=JSON.stringify({version:10,exportedAt:new Date().toISOString(),...data},null,2);
  const d=new Date().toLocaleDateString("ja-JP",{year:"numeric",month:"2-digit",day:"2-digit"}).replace(/\//g,"-");
  const fname=`tennis_db_${d}.json`;
  const file=new File([json],fname,{type:"application/json"});
  if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
    try{await navigator.share({files:[file],title:"Tennis DB バックアップ"});return "shared";}catch(e){if(e.name==="AbortError")return "cancelled";}
  }
  const b=new Blob([json],{type:"application/json"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download=fname;a.click();URL.revokeObjectURL(u);return "downloaded";
};

// ── GAME TRACKER ──────────────────────────────────
const scColor=v=>v>=4?C.accent:v>=3?C.yellow:C.red;
const MENTAL_LABELS={1:"最悪",2:"崩れ",3:"普通",4:"集中",5:"ゾーン"};
const PHYSICAL_LABELS={1:"限界",2:"辛い",3:"普通",4:"良好",5:"万全"};

function GameTracker({ match, onChange }) {
  const [pendingCO, setPendingCO] = useState(null); // changeover input state

  const games = match.games || [];
  const changeovers = match.changeovers || [];

  // Compute score from games
  const score = games.reduce((acc, g) => {
    if(g.winner==="me") acc.me++;
    else acc.opp++;
    return acc;
  }, {me:0, opp:0});

  const addGame = (winner) => {
    const newGames = [...games, { id:`g${Date.now()}`, winner }];
    onChange({ ...match, games: newGames });
    // Check if changeover needed (every 2 games)
    if(newGames.length % 2 === 0) {
      setPendingCO({ afterGame: newGames.length, mental: 3, physical: 3, note: "" });
    }
  };

  const removeLastGame = () => {
    if(games.length===0) return;
    const newGames = games.slice(0,-1);
    onChange({ ...match, games: newGames });
    // Remove changeover if it was after this game
    const newCOs = changeovers.filter(co => co.afterGame !== games.length);
    onChange({ ...match, games: newGames, changeovers: newCOs });
  };

  const saveCO = () => {
    if(!pendingCO) return;
    const newCOs = [...changeovers.filter(co=>co.afterGame!==pendingCO.afterGame), pendingCO];
    onChange({ ...match, changeovers: newCOs });
    setPendingCO(null);
  };

  const skipCO = () => setPendingCO(null);

  const getCO = (afterGame) => changeovers.find(co => co.afterGame === afterGame);

  // Build interleaved display
  const rows = [];
  games.forEach((g, i) => {
    rows.push({ type: "game", game: g, index: i });
    if((i+1) % 2 === 0) {
      rows.push({ type: "changeover", afterGame: i+1, co: getCO(i+1) });
    }
  });

  return (
    <div style={{marginTop:12}}>
      {/* Score display */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:C.panel2,borderRadius:8,padding:"10px 14px",marginBottom:12}}>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:12,color:C.accent,marginBottom:2}}>私</div>
          <div style={{fontSize:28,fontWeight:800,color:C.accent,fontFamily:"monospace"}}>{score.me}</div>
        </div>
        <div style={{fontSize:13,color:C.textMuted,fontWeight:600}}>—</div>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:12,color:C.red,marginBottom:2}}>相手</div>
          <div style={{fontSize:28,fontWeight:800,color:C.red,fontFamily:"monospace"}}>{score.opp}</div>
        </div>
        <div style={{flex:1,maxWidth:100,marginLeft:16}}>
          <div style={{fontSize:12,color:C.textMuted,marginBottom:4}}>ゲーム推移</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:2}}>
            {games.map((g,i)=>(
              <div key={g.id} style={{width:14,height:14,borderRadius:2,background:g.winner==="me"?C.accent:C.red,display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,color:"#fff",fontWeight:700}}>{i+1}</div>
            ))}
          </div>
        </div>
      </div>

      {/* Game log */}
      <div style={{display:"grid",gap:4,marginBottom:10}}>
        {rows.map((row, i) => {
          if(row.type==="game") {
            const isMe = row.game.winner==="me";
            return (
              <div key={row.game.id} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 10px",background:isMe?"#ecfdf5":"#fef2f2",borderRadius:6,border:`1px solid ${isMe?C.accentDim:"#dc2626"}`}}>
                <span style={{fontSize:12,color:C.textMuted,minWidth:60,fontFamily:"monospace"}}>ゲーム {row.index+1}</span>
                <div style={{flex:1,display:"flex",alignItems:"center",gap:6}}>
                  <span style={{fontSize:12,fontWeight:700,color:isMe?C.accent:C.red}}>{isMe?"✓ 私":"✓ 相手"}</span>
                </div>
                <div style={{fontSize:12,color:C.textMuted,fontFamily:"monospace"}}>
                  {games.slice(0,row.index+1).reduce((a,g)=>({me:a.me+(g.winner==="me"?1:0),opp:a.opp+(g.winner==="opp"?1:0)}),{me:0,opp:0}) && (() => {
                    const s=games.slice(0,row.index+1).reduce((a,g)=>({me:a.me+(g.winner==="me"?1:0),opp:a.opp+(g.winner==="opp"?1:0)}),{me:0,opp:0});
                    return `${s.me}-${s.opp}`;
                  })()}
                </div>
              </div>
            );
          } else {
            const co = row.co;
            return (
              <div key={`co-${row.afterGame}`} style={{margin:"2px 0"}}>
                <div style={{display:"flex",alignItems:"center",gap:8,padding:"6px 10px",background:co?"#eff6ff":"#f0f0f5",borderRadius:6,border:`1px solid ${co?C.blue:C.border}`}}>
                  <div style={{flex:1}}>
                    <div style={{fontSize:12,color:C.blue,letterSpacing:"0.08em",marginBottom:co?4:0}}>⟳ チェンジオーバー（{row.afterGame}ゲーム後）</div>
                    {co && (
                      <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
                        <div style={{display:"flex",alignItems:"center",gap:4}}>
                          <span style={{fontSize:12,color:C.textMuted}}>🧠</span>
                          <span style={{fontSize:12,color:scColor(co.mental),fontWeight:700}}>{co.mental} {MENTAL_LABELS[co.mental]}</span>
                        </div>
                        <div style={{display:"flex",alignItems:"center",gap:4}}>
                          <span style={{fontSize:12,color:C.textMuted}}>💪</span>
                          <span style={{fontSize:12,color:scColor(co.physical),fontWeight:700}}>{co.physical} {PHYSICAL_LABELS[co.physical]}</span>
                        </div>
                        {co.note&&<span style={{fontSize:12,color:C.textDim}}>「{co.note}」</span>}
                      </div>
                    )}
                  </div>
                  {!co&&<span style={{fontSize:12,color:C.textMuted}}>未記録</span>}
                </div>
              </div>
            );
          }
        })}
      </div>

      {/* Pending changeover input */}
      {pendingCO && (
        <div style={{background:C.panel2,border:`1px solid ${C.blue}`,borderRadius:8,padding:"12px 14px",marginBottom:10}}>
          <div style={{fontSize:12,color:C.blue,fontWeight:700,marginBottom:10}}>⟳ チェンジオーバー記録（{pendingCO.afterGame}ゲーム後）</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:10}}>
            <div>
              <div style={{fontSize:12,color:C.textMuted,marginBottom:6}}>🧠 メンタル</div>
              <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                {[1,2,3,4,5].map(n=>(
                  <button key={n} onClick={()=>setPendingCO(p=>({...p,mental:n}))} style={{background:pendingCO.mental===n?C.accent:C.panel,border:`1px solid ${pendingCO.mental===n?C.accent:C.border}`,borderRadius:5,padding:"5px 8px",cursor:"pointer",fontSize:12,color:pendingCO.mental===n?"#000":C.textMuted,fontWeight:600}}>
                    {n}<br/><span style={{fontSize:8}}>{MENTAL_LABELS[n]}</span>
                  </button>
                ))}
              </div>
            </div>
            <div>
              <div style={{fontSize:12,color:C.textMuted,marginBottom:6}}>💪 フィジカル</div>
              <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                {[1,2,3,4,5].map(n=>(
                  <button key={n} onClick={()=>setPendingCO(p=>({...p,physical:n}))} style={{background:pendingCO.physical===n?C.blue:C.panel,border:`1px solid ${pendingCO.physical===n?C.blue:C.border}`,borderRadius:5,padding:"5px 8px",cursor:"pointer",fontSize:12,color:pendingCO.physical===n?"#fff":C.textMuted,fontWeight:600}}>
                    {n}<br/><span style={{fontSize:8}}>{PHYSICAL_LABELS[n]}</span>
                  </button>
                ))}
              </div>
            </div>
          </div>
          <Field value={pendingCO.note} onChange={v=>setPendingCO(p=>({...p,note:v}))} placeholder="一言メモ（任意）：ここで崩れた / 立て直せた..."/>
          <div style={{display:"flex",gap:8}}>
            <button onClick={skipCO} style={{flex:1,background:"none",border:`1px solid ${C.border}`,color:C.textMuted,borderRadius:6,padding:"8px",fontSize:12,cursor:"pointer"}}>スキップ</button>
            <button onClick={saveCO} style={{flex:2,background:C.blue,border:"none",color:"#fff",borderRadius:6,padding:"8px",fontSize:12,fontWeight:700,cursor:"pointer"}}>💾 保存</button>
          </div>
        </div>
      )}

      {/* Add game buttons */}
      {!pendingCO && (
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <div style={{fontSize:12,color:C.textMuted,marginRight:4}}>次のゲーム：</div>
          <button onClick={()=>addGame("me")} style={{flex:1,background:"#ecfdf5",border:`1px solid ${C.accent}`,color:C.accent,borderRadius:6,padding:"10px",fontSize:13,fontWeight:700,cursor:"pointer"}}>私 ✓</button>
          <button onClick={()=>addGame("opp")} style={{flex:1,background:"#fef2f2",border:`1px solid #b45252`,color:C.red,borderRadius:6,padding:"10px",fontSize:13,fontWeight:700,cursor:"pointer"}}>相手 ✓</button>
          {games.length>0&&<button onClick={removeLastGame} style={{background:"none",border:`1px solid ${C.border}`,color:C.textMuted,borderRadius:6,padding:"10px",fontSize:12,cursor:"pointer"}}>↩</button>}
        </div>
      )}
    </div>
  );
}

  );
}

function TournamentDetail({trn,onEdit,onDelete,onUpdate,rackets,strings,stringSetups,trials,opponents,onNewOpponent,toast}){
  const cfm=useConfirm();
  const [expandedMatch,setExpandedMatch]=useState(null);
  const [matchModal,setMatchModal]=useState(null);
  const wins=(trn.matches||[]).filter(m=>m.result==="勝利").length;

  const blankMatchRecord=()=>({id:`mr${Date.now()}`,round:`${(trn.matches||[]).length+1}回戦`,opponent:"",racketName:trn.racketName||"",stringMain:trn.stringMain||"",stringCross:trn.stringCross||"",tensionMain:trn.tensionMain||"",tensionCross:trn.tensionCross||"",result:"勝利",setScores:[],mental:3,physical:3,mentalNote:"",techNote:"",opponentNote:"",note:"",games:[],changeovers:[]});

  const saveMatch=(form)=>{
    const isNew=!(trn.matches||[]).find(m=>m.id===form.id);
    const matches=isNew?[...(trn.matches||[]),form]:(trn.matches||[]).map(m=>m.id===form.id?form:m);
    onUpdate({...trn,matches});
    setMatchModal(null);
  };

  const deleteMatch=(id)=>{
    cfm.ask("この試合記録を削除しますか？",()=>{
      onUpdate({...trn,matches:(trn.matches||[]).filter(m=>m.id!==id)});
      setExpandedMatch(null);

  };

  const roundColor={"1回戦":"gray","2回戦":"gray","3回戦":"blue","準々決勝":"blue","準決勝":"purple","決勝":"yellow","予選":"gray","エキシビション":"orange"};

    <div style={{padding:"12px 14px 16px",borderTop:`1px solid ${C.border}`,background:"#f0f0f5"}}>

      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:12}}>
        {[["会場",trn.venue||"—"],["ラケット",trn.racketName||"—"],["気温",trn.temp?`${trn.temp}℃`:"—"],["天気",trn.weather||"—"],["ST",[trn.stringMain,trn.stringCross].filter(Boolean).join(" / ")||"—"],["テンション",fmtTension(trn.tensionMain,trn.tensionCross,trn.tensionNote)||"—"],["試合数",`${(trn.matches||[]).length}試合`],["勝利数",`${wins}勝${(trn.matches||[]).length-wins}敗`]].map(([k,v])=>(
          <div key={k} style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:6,padding:"6px 10px"}}>
            <div style={{fontSize:12,color:C.textMuted,marginBottom:2}}>{k}</div>
            <div style={{fontSize:12,color:C.textDim,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{v}</div>
          </div>
        ))}
      </div>
      {trn.generalNote&&(
        <div style={{marginBottom:12}}>
          <div style={{fontSize:12,color:C.textMuted,marginBottom:3}}>📝 大会総括</div>
          <div style={{fontSize:12,color:C.textDim,lineHeight:1.7,background:C.panel,borderRadius:6,padding:"7px 10px",borderLeft:`2px solid ${C.border}`}}>{trn.generalNote}</div>
        </div>
      )}

      {/* Match list */}

        <span style={{fontSize:12,color:C.accent,letterSpacing:"0.08em"}}>試合記録</span>
        <button onClick={()=>setMatchModal({match:blankMatchRecord(),mode:"add"})} style={{background:C.accent,border:"none",color:"#fff",borderRadius:5,padding:"3px 12px",fontSize:12,fontWeight:700,cursor:"pointer"}}>＋ 試合を追加</button>
      </div>

      {(trn.matches||[]).length===0&&(
        <div style={{padding:"16px",textAlign:"center",color:C.textMuted,fontSize:12,background:C.panel2,borderRadius:6,border:`1px dashed ${C.border}`}}>
          「＋ 試合を追加」から各試合を記録できます
        </div>
      )}

      <div style={{background:(trn.matches||[]).length?C.panel:"transparent",border:(trn.matches||[]).length?`1px solid ${C.border}`:"none",borderRadius:8,overflow:"hidden",marginBottom:12}}>
        {(trn.matches||[]).map((m,i)=>{
          const isOpen=expandedMatch===m.id;
          const games=m.games||[];
          const score=games.reduce((a,g)=>({me:a.me+(g.winner==="me"?1:0),opp:a.opp+(g.winner==="opp"?1:0)}),{me:0,opp:0});
          const mc=m.mental>=4?C.accent:m.mental>=3?C.yellow:C.red;
          return (
            <div key={m.id} style={{borderBottom:i<(trn.matches||[]).length-1?`1px solid ${C.border}`:"none"}}>
              <div onClick={()=>setExpandedMatch(isOpen?null:m.id)} style={{display:"flex",alignItems:"center",gap:4,padding:"10px 10px",background:isOpen?"#f0f0f5":"transparent",cursor:"pointer",borderLeft:isOpen?`3px solid ${C.blue}`:"3px solid transparent",transition:"all 0.1s",flexWrap:"wrap"}}>
                <Badge color={roundColor[m.round]||"gray"} sm>{m.round}</Badge>
                <Badge color={m.result==="勝利"?"green":"red"} sm>{m.result==="勝利"?"勝利✓":"敗北"}</Badge>
                <div style={{flex:1,minWidth:60,overflow:"hidden"}}>
                  <span style={{fontSize:12,color:C.text,fontWeight:600,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",display:"block"}}>{m.opponent||"（相手未入力）"}</span>
                </div>
                <span style={{fontSize:11,color:C.textMuted,fontFamily:"monospace",whiteSpace:"nowrap"}}>{(m.setScores||[]).join(", ")||"—"}</span>
                {/* Game flow mini */}
                <div style={{display:"flex",gap:1,flexShrink:0}}>
                  {games.slice(0,10).map((g,gi)=>(
                    <div key={gi} style={{width:5,height:8,borderRadius:1,background:g.winner==="me"?C.accent:C.red}}/>
                  ))}
                </div>
                {games.length>0&&<div style={{fontSize:11,fontFamily:"monospace",color:C.textMuted,textAlign:"right"}}>{score.me}-{score.opp}</div>}
                <div style={{display:"flex",gap:1,flexShrink:0}}>
                  {[1,2,3,4,5].map(n=><div key={n} style={{width:2,height:10,borderRadius:1,background:n<=m.mental?mc:C.border}}/>)}
                </div>
                <div style={{color:C.textMuted,fontSize:12,transform:isOpen?"rotate(90deg)":"none",transition:"transform 0.2s"}}>▶</div>
              </div>
              {isOpen&&<MatchDetail match={m} onEdit={()=>setMatchModal({match:m,mode:"edit"})} onDelete={()=>deleteMatch(m.id)} onUpdate={(updated)=>updateMatchGames(m.id,updated)} trn={trn} trials={trials} opponents={opponents} toast={toast}/>}
            </div>
          );
        })}
      </div>

      <div style={{display:"flex",gap:8}}>
        <Btn onClick={onEdit} style={{flex:1}}>✏️ 大会情報を編集</Btn>
        {toast&&<Btn onClick={()=>copyToClipboard(formatTournamentAllForClaude(trn),toast,"大会全体 → Claudeに貼り付け")}>📋 全試合</Btn>}
        <Btn onClick={onDelete} variant="danger">🗑</Btn>
      </div>
      {matchModal&&<MatchModal match={matchModal.match} mode={matchModal.mode||"edit"} onSave={saveMatch} onClose={()=>setMatchModal(null)} rackets={rackets} strings={strings} stringSetups={stringSetups} opponents={opponents} onNewOpponent={onNewOpponent}/>}
    </div>
  );
}

// ── TOURNAMENTS TAB ───────────────────────────────
const resultColor=r=>r==="優勝"?"green":r==="準優勝"?"blue":r==="予選突破"?"blue":(r==="予選敗退"||r.includes("敗退"))?"red":"gray";
const typeLabel={singles:"S",doubles:"D",mixed:"Mix"};
const typeColor={singles:"gray",doubles:"blue",mixed:"purple"};

function TournamentsTab({data,setData,rackets,strings,stringSetups,trials,opponents,onNewOpponent,venues,setVenues,toast,quickAdd,onQuickAddDone,initialExpand,onExpandDone}){
  const cfm=useConfirm();
  const [expanded,setExpanded]=useState(null);
  const [modal,setModal]=useState(null);
  const [filterLevel,setFilterLevel]=useState("all");
  const [filterType,setFilterType]=useState("all");

  const blankTournament=()=>({id:`trn${Date.now()}`,date:today(),name:"",level:"中上級",type:"singles",venue:"",racketName:"",stringMain:"",stringCross:"",tensionMain:"",tensionCross:"",temp:"",weather:"",overallResult:"",generalNote:"",matches:[]});
  useEffect(()=>{if(quickAdd){setModal({tournament:blankTournament()});onQuickAddDone();}},[quickAdd]);
  useEffect(()=>{if(initialExpand){setExpanded(initialExpand);if(onExpandDone)onExpandDone();}},[initialExpand]);

  const persist=list=>{const s=[...list].sort((a,b)=>b.date.localeCompare(a.date));setData(s);save(KEYS.tournaments,s);};
  const handleSave=form=>{const isNew=!data.find(t=>t.id===form.id);persist(isNew?[form,...data]:data.map(t=>t.id===form.id?form:t));setModal(null);toast.show(isNew?"✅ 大会を追加しました":"✅ 更新しました");};
  const handleDelete=id=>{const bk=[...data];cfm.ask("この記録を削除しますか？",()=>{persist(data.filter(t=>t.id!==id));setExpanded(null);toast.show("🗑 削除しました",C.red,()=>persist(bk));});};
  const handleUpdate=trn=>{persist(data.map(t=>t.id===trn.id?trn:t));};

  const wins=data.filter(t=>t.overallResult==="優勝").length;
  const totalMatches=data.reduce((s,t)=>(s+(t.matches||[]).length),0);
  const totalMatchWins=data.reduce((s,t)=>(s+(t.matches||[]).filter(m=>m.result==="勝利").length),0);
  const levels=["all",...new Set(data.map(t=>t.level))];
  const filtered=data.filter(t=>(filterLevel==="all"||t.level===filterLevel)&&(filterType==="all"||t.type===filterType));
  const [showStats,setShowStats]=useState(false);

  // クラス別集計
  const byLevel={};
  data.forEach(t=>{
    if(!byLevel[t.level])byLevel[t.level]={total:0,wins:0,matches:0,matchWins:0};
    byLevel[t.level].total++;
    if(t.overallResult==="優勝")byLevel[t.level].wins++;
    (t.matches||[]).forEach(m=>{byLevel[t.level].matches++;if(m.result==="勝利")byLevel[t.level].matchWins++;});
  });

  // 種目別集計
  const byType={};
  data.forEach(t=>{
    const tl=t.type==="singles"?"シングルス":t.type==="doubles"?"ダブルス":"ミックス";
    if(!byType[tl])byType[tl]={total:0,wins:0};
    byType[tl].total++;
    if(t.overallResult==="優勝")byType[tl].wins++;
  });

  // 月別集計
  const byMonth={};
  data.forEach(t=>{
    const m=t.date?.slice(0,7);if(!m)return;
    if(!byMonth[m])byMonth[m]={total:0,wins:0,results:[]};
    byMonth[m].total++;
    if(t.overallResult==="優勝")byMonth[m].wins++;
    byMonth[m].results.push(t.overallResult);
  });
  const months=Object.keys(byMonth).sort().reverse();

  // 直近5大会
  const recent5=data.slice(0,5);
  const recentWins=recent5.filter(t=>t.overallResult==="優勝").length;
  const recentFinals=recent5.filter(t=>["優勝","準優勝","決勝敗退"].includes(t.overallResult)).length;

  // 連勝記録
  let maxStreak=0,curStreak=0;
  [...data].reverse().forEach(t=>{
    if(t.overallResult==="優勝"){curStreak++;maxStreak=Math.max(maxStreak,curStreak);}
    else curStreak=0;
  });

  // メンタル・フィジカル平均
  const allMatches=data.flatMap(t=>(t.matches||[]));
  const mentalAvg=allMatches.length?Math.round(allMatches.reduce((s,m)=>s+(m.mental||0),0)/allMatches.length*10)/10:0;
  const physicalAvg=allMatches.length?Math.round(allMatches.reduce((s,m)=>s+(m.physical||0),0)/allMatches.length*10)/10:0;

  // 機材別
  const byRacket={};
  data.forEach(t=>{
    const rk=t.racketName||"未設定";
    if(!byRacket[rk])byRacket[rk]={total:0,wins:0,matches:0,matchWins:0};
    byRacket[rk].total++;
    if(t.overallResult==="優勝")byRacket[rk].wins++;
    (t.matches||[]).forEach(m=>{byRacket[rk].matches++;if(m.result==="勝利")byRacket[rk].matchWins++;});
  });

  return (
    <div>
      {cfm.el}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:8}}>
        {[["大会数",`${data.length}件`],["優勝",`${wins}回`],["試合記録",`${totalMatches}試合`],["試合勝率",totalMatches?`${Math.round(totalMatchWins/totalMatches*100)}%`:"—"]].map(([l,v],i)=>(
          <div key={i} style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 12px"}}>
            <div style={{fontSize:12,color:C.textMuted,marginBottom:4}}>{l}</div>
            <div style={{fontSize:16,fontWeight:800,color:i<2?C.accent:C.text,fontFamily:"monospace"}}>{v}</div>
          </div>
        ))}
      </div>
      <button onClick={()=>setShowStats(!showStats)} style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:6,padding:"6px 12px",fontSize:12,color:showStats?C.accent:C.textMuted,fontWeight:600,cursor:"pointer",marginBottom:10,width:"100%"}}>
        {showStats?"▼ 詳細統計を閉じる":"▶ 詳細統計を表示"}
      </button>
      {showStats&&(
        <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:10,padding:14,marginBottom:12}}>
          {/* 直近の調子 */}
          <div style={{marginBottom:14}}>
            <div style={{fontSize:12,color:C.accent,fontWeight:700,marginBottom:8}}>🔥 直近の調子（5大会）</div>
            <div style={{display:"flex",gap:6,marginBottom:6}}>
              {recent5.map((t,i)=>{
                const rc=t.overallResult==="優勝"?"green":["準優勝","決勝敗退"].includes(t.overallResult)?"yellow":"red";
                return <Badge key={i} color={rc}>{t.overallResult}</Badge>;
              })}
            </div>
            <div style={{fontSize:12,color:C.textDim}}>
              優勝 <span style={{color:C.accent,fontWeight:700}}>{recentWins}</span>回 / 決勝進出 <span style={{color:C.yellow,fontWeight:700}}>{recentFinals}</span>回 / 最大連続優勝 <span style={{color:C.accent,fontWeight:700}}>{maxStreak}</span>回
            </div>
          </div>

          {/* クラス別 */}
          <div style={{marginBottom:14}}>
            <div style={{fontSize:12,color:C.blue,fontWeight:700,marginBottom:8}}>📊 クラス別戦績</div>
            {Object.entries(byLevel).map(([lv,d])=>(
              <div key={lv} style={{display:"flex",alignItems:"center",gap:8,marginBottom:5}}>
                <div style={{width:60,fontSize:12,color:C.text,fontWeight:600}}>{lv}</div>
                <div style={{flex:1,background:"#e5e7eb",borderRadius:3,height:16,overflow:"hidden",position:"relative"}}>
                  {d.total>0&&<div style={{width:`${(d.wins/d.total)*100}%`,height:"100%",background:C.accent,borderRadius:3,minWidth:d.wins>0?3:0}}/>}
                </div>
                <div style={{width:100,fontSize:12,color:C.textDim,textAlign:"right"}}>
                  {d.wins}優勝/{d.total}大会{d.matches>0?` (${d.matchWins}勝${d.matches-d.matchWins}敗)`:""}
                </div>
              </div>
            ))}
          </div>

          {/* 種目別 */}
          <div style={{marginBottom:14}}>
            <div style={{fontSize:12,color:C.purple,fontWeight:700,marginBottom:8}}>🎾 種目別</div>
            <div style={{display:"flex",gap:12}}>
              {Object.entries(byType).map(([tp,d])=>(
                <div key={tp} style={{background:C.panel2,borderRadius:6,padding:"8px 14px",flex:1,textAlign:"center"}}>
                  <div style={{fontSize:12,color:C.textMuted}}>{tp}</div>
                  <div style={{fontSize:14,fontWeight:800,color:C.text}}>{d.total}大会</div>
                  <div style={{fontSize:12,color:C.accent}}>優勝{d.wins}回</div>
                </div>
              ))}
            </div>
          </div>

          {/* 月別推移 */}
          <div>
            <div style={{fontSize:12,color:C.orange,fontWeight:700,marginBottom:8}}>📅 月別推移</div>
            {months.map(m=>{
              const d=byMonth[m];
              return (
                <div key={m} style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                  <div style={{width:55,fontSize:12,color:C.textMuted,fontFamily:"monospace"}}>{m}</div>
                  <div style={{display:"flex",gap:3}}>
                    {d.results.map((r,i)=>{
                      const c=r==="優勝"?C.accent:["準優勝","決勝敗退"].includes(r)?C.yellow:C.red;
                      return <div key={i} style={{width:10,height:10,borderRadius:2,background:c}} title={r}/>;
                    })}
                  </div>
                  <div style={{fontSize:12,color:C.textDim}}>
                    {d.total}大会{d.wins>0?` 🏆${d.wins}`:""}
                  </div>
                </div>
              );
            })}
          </div>

          {/* メンタル・フィジカル平均 */}
          {allMatches.length>0&&(
            <div style={{marginTop:14}}>
              <div style={{fontSize:12,color:"#f97316",fontWeight:700,marginBottom:8}}>🧠 メンタル・フィジカル平均</div>
              <div style={{display:"flex",gap:12}}>
                {[["メンタル",mentalAvg],["フィジカル",physicalAvg]].map(([l,v])=>(
                  <div key={l} style={{background:C.panel2,borderRadius:6,padding:"8px 14px",flex:1,textAlign:"center"}}>
                    <div style={{fontSize:12,color:C.textMuted}}>{l}</div>
                    <div style={{fontSize:18,fontWeight:800,color:v>=4?C.accent:v>=3?C.yellow:C.red}}>{v||"—"}</div>
                    <div style={{fontSize:11,color:C.textDim}}>/5.0（{allMatches.length}試合）</div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* 機材別戦績 */}
          {Object.keys(byRacket).filter(k=>k!=="未設定").length>0&&(
            <div style={{marginTop:14}}>
              <div style={{fontSize:12,color:C.accent,fontWeight:700,marginBottom:8}}>🎾 ラケット別戦績</div>
              {Object.entries(byRacket).filter(([k])=>k!=="未設定").map(([rk,d])=>(
                <div key={rk} style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                  <div style={{flex:1,fontSize:12,color:C.text,fontWeight:600}}>{rk}</div>
                  <div style={{fontSize:12,color:C.textDim}}>{d.total}大会 🏆{d.wins}{d.matches>0?` (${d.matchWins}勝${d.matches-d.matchWins}敗)`:""}</div>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      <div style={{display:"flex",gap:4,marginBottom:6,flexWrap:"wrap"}}>
        {[["all","全種目"],["singles","S シングルス"],["doubles","D ダブルス"],["mixed","Mix ミックス"]].map(([v,l])=>(
          <button key={v} onClick={()=>setFilterType(v)} style={{background:filterType===v?C.blue:C.panel,border:`1px solid ${filterType===v?C.blue:C.border}`,color:filterType===v?"#fff":C.textMuted,borderRadius:5,padding:"4px 10px",fontSize:12,cursor:"pointer",fontWeight:filterType===v?700:400}}>{l}</button>
        ))}
      </div>
      <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap",alignItems:"center"}}>
        <div style={{display:"flex",gap:4,flex:1,flexWrap:"wrap"}}>
          {levels.map(l=><button key={l} onClick={()=>setFilterLevel(l)} style={{background:filterLevel===l?C.accent:C.panel,border:`1px solid ${filterLevel===l?C.accent:C.border}`,color:filterLevel===l?"#000":C.textMuted,borderRadius:5,padding:"4px 10px",fontSize:12,cursor:"pointer",fontWeight:filterLevel===l?700:400}}>{l==="all"?"全て":l}</button>)}
        </div>
        <button onClick={()=>setModal({tournament:blankTournament()})} style={{background:C.accent,border:"none",color:"#fff",borderRadius:6,padding:"6px 14px",fontSize:12,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>＋ 大会を追加</button>
      </div>

      <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:8,overflow:"hidden"}}>
        {filtered.map((trn,i)=>{
          const isOpen=expanded===trn.id;
          const wins2=(trn.matches||[]).filter(m=>m.result==="勝利").length;
          const total=(trn.matches||[]).length;
          const allGames=(trn.matches||[]).flatMap(m=>m.games||[]);
          const myGames=allGames.filter(g=>g.winner==="me").length;
          return (
            <div key={trn.id} style={{borderBottom:i<filtered.length-1?`1px solid ${C.border}`:"none"}}>
              <div onClick={()=>setExpanded(isOpen?null:trn.id)} style={{display:"flex",alignItems:"center",gap:10,padding:"12px 14px",background:isOpen?"#f0f0f5":"transparent",cursor:"pointer",borderLeft:isOpen?`3px solid ${C.accent}`:"3px solid transparent",transition:"all 0.1s"}}>
                <div style={{minWidth:76,fontSize:12,color:C.textMuted,fontFamily:"monospace"}}>{trn.date}</div>
                <div style={{display:"flex",gap:4,flexShrink:0}}>
                  <Badge color={typeColor[trn.type]||"gray"} sm>{typeLabel[trn.type]||"S"}</Badge>
                  <Badge color={resultColor(trn.overallResult)} sm>{trn.overallResult}{trn.overallResult==="優勝"?"🏆":""}</Badge>
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,color:C.text,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{trn.name||"（大会名未入力）"}</div>
                  <div style={{fontSize:12,color:C.textMuted,marginTop:1}}>
                    {total>0?`${wins2}勝${total-wins2}敗 / ゲーム ${myGames}-${allGames.length-myGames}`:"試合記録なし"}
                    {trn.racketName&&<span style={{marginLeft:6}}>{trn.racketName}</span>}
                  </div>
                </div>
                <div style={{color:C.textMuted,fontSize:12,transform:isOpen?"rotate(90deg)":"none",transition:"transform 0.2s",flexShrink:0}}>▶</div>
              </div>
              {isOpen&&<TournamentDetail trn={trn} onEdit={()=>setModal({tournament:trn})} onDelete={()=>handleDelete(trn.id)} onUpdate={handleUpdate} rackets={rackets} strings={strings} stringSetups={stringSetups} trials={trials} opponents={opponents} onNewOpponent={onNewOpponent} toast={toast}/>}
            </div>
          );
        })}
      </div>

      {modal&&<TournamentModal tournament={modal.tournament} onSave={handleSave} onClose={()=>setModal(null)} rackets={rackets} strings={strings} stringSetups={stringSetups} venues={venues} onAddVenue={v=>setVenues([...venues,v])}/>}
    </div>
  );
}

// ── PRACTICE TAB ──────────────────────────────────
const blankPractice=()=>({id:`p${Date.now()}`,date:today(),venue:"",type:"スクール",duration:"90",racketName:"",stringMain:"",stringCross:"",tensionMain:"",tensionCross:"",temp:"",weather:"",physical:3,focus:"",coachNote:"",goodNote:"",improveNote:"",generalNote:"",calories:"",totalCalories:"",heartRateAvg:"",heartRateMax:"",timeRange:"",workoutLocation:"",difficulty:"",hrZone1:"",hrZone2:"",hrZone3:"",hrZone4:"",hrZone5:"",recoveryHR:""});

function PracticesTab({data,setData,rackets,strings,stringSetups,trials,venues,setVenues,toast,quickAdd,onQuickAddDone,initialExpand,onExpandDone}){
  const cfm=useConfirm();
  const [expanded,setExpanded]=useState(null);
  const [modal,setModal]=useState(null);
  const [expandedMonths,setExpandedMonths]=useState(()=>{try{return JSON.parse(localStorage.getItem("yuke-practice-months")||"{}");} catch{return {};}});
  const toggleMonth=m=>{const next={...expandedMonths,[m]:!expandedMonths[m]};setExpandedMonths(next);try{localStorage.setItem("yuke-practice-months",JSON.stringify(next));}catch{}};
  useEffect(()=>{if(quickAdd){setModal({practice:blankPractice()});onQuickAddDone();}},[quickAdd]);
  useEffect(()=>{if(initialExpand){setExpanded(initialExpand);if(onExpandDone)onExpandDone();}},[initialExpand]);
  const typeIcon={スクール:"🏫",自主練:"🎾",球出し:"🏐",練習試合:"⚔️",フィジカル:"💪"};
  const typeColor2={スクール:"blue",自主練:"green",球出し:"yellow",練習試合:"purple",フィジカル:"orange"};
  const persist=list=>{const s=[...list].sort((a,b)=>b.date.localeCompare(a.date));setData(s);save(KEYS.practices,s);};
  const handleSave=form=>{const isNew=!data.find(p=>p.id===form.id);persist(isNew?[form,...data]:data.map(p=>p.id===form.id?form:p));setModal(null);toast.show(isNew?"✅ 練習記録を追加しました":"✅ 更新しました");};
  const handleDelete=id=>{const bk=[...data];cfm.ask("この記録を削除しますか？",()=>{persist(data.filter(p=>p.id!==id));setExpanded(null);toast.show("🗑 削除しました",C.red,()=>persist(bk));});};
  const [guide,setGuide]=useState(false);
  const totalMin=data.reduce((s,p)=>s+(parseInt(p.duration)||0),0);

  const Modal=({practice})=>{
    const [f,setF]=useState({...practice}); const s=k=>v=>setF(p=>({...p,[k]:v}));
    const isNew=!data.find(p=>p.id===practice.id);
    const hasWatch=f.calories||f.heartRateAvg||f.hrZone1;
    return (
      <div style={{position:"fixed",inset:0,background:"#0004",zIndex:200,display:"flex",alignItems:"flex-start",justifyContent:"center",overflowY:"auto",padding:"20px 12px"}} onClick={e=>e.target===e.currentTarget&&setModal(null)}>
        <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:12,width:"100%",maxWidth:540,padding:20}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <span style={{fontSize:14,fontWeight:700,color:C.text}}>{isNew?"🏃 練習を追加":"🏃 練習記録"}</span>
            <Btn onClick={()=>setModal(null)} variant="ghost" style={{fontSize:18,padding:"0 6px"}}>✕</Btn>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
            <Field label="日付" value={f.date} onChange={s("date")} placeholder="2026/04/05"/>
            <VenueSelect label="場所" value={f.venue||""} onChange={s("venue")} venues={venues} onAddVenue={v=>setVenues([...venues,v])}/>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"0 12px"}}>
            <FSelect label="種別" value={f.type} onChange={s("type")} options={[{value:"スクール",label:"🏫 スクール"},{value:"自主練",label:"🎾 自主練"},{value:"球出し",label:"🏐 球出し"},{value:"練習試合",label:"⚔️ 練習試合"},{value:"フィジカル",label:"💪 フィジカル"}]}/>
            <Field label="時間（分）" value={f.duration} onChange={s("duration")} type="number" placeholder="90"/>
            <Field label="気温（℃）" value={f.temp||""} onChange={s("temp")} type="number" placeholder="18"/>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
            <FSelect label="天気" value={f.weather||""} onChange={s("weather")} options={[{value:"",label:"—"},{value:"晴",label:"☀ 晴"},{value:"曇",label:"☁ 曇"},{value:"雨",label:"🌧 雨"},{value:"屋内",label:"🏠 屋内"}]}/>
            <TensionFields main={f.tensionMain||""} cross={f.tensionCross||""} onMainChange={s("tensionMain")} onCrossChange={s("tensionCross")}/>
          </div>
          <FSelect label="ラケット" value={f.racketName||""} onChange={s("racketName")} options={getRacketOpts(rackets)}/>
          {isNew&&(
            <div style={{fontSize:12,color:C.textMuted,marginTop:4,marginBottom:8,padding:"8px 10px",background:C.panel2,borderRadius:6,borderLeft:`2px solid ${C.accent}`}}>
              まず作成 → Watchデータ・メモ・試打は後から編集で追加
            </div>
          )}
          {!isNew&&(<>
          {(f.calories||f.heartRateAvg||f.hrZone1)&&(
            <div style={{background:"#fff7ed",border:"1px solid #f97316",borderRadius:8,padding:"10px 12px",margin:"8px 0"}}>
              <div style={{fontSize:12,color:"#f97316",marginBottom:6,fontWeight:600}}>⌚ Apple Watch（スクショ取込済み）</div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap",fontSize:12}}>
                {f.timeRange&&<span style={{color:C.textDim}}>⏱{f.timeRange}</span>}
                {f.calories&&<span style={{color:C.orange}}>🔥{f.calories}kcal</span>}
                {f.heartRateAvg&&<span style={{color:"#fca5a5"}}>💓avg{f.heartRateAvg}</span>}
                {f.hrZone1&&<span style={{color:C.textMuted}}>ゾーンデータあり</span>}
              </div>
            </div>
          )}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
            <FSelect label="縦糸" value={f.stringMain||""} onChange={s("stringMain")} options={getStringOpts(strings)}/>
            <FSelect label="横糸" value={f.stringCross||""} onChange={s("stringCross")} options={[{value:"",label:"-- 同じ --"},...getStringOpts(strings).slice(1)]}/>
          </div>
          <TensionFields main={f.tensionMain||""} cross={f.tensionCross||""} onMainChange={s("tensionMain")} onCrossChange={s("tensionCross")}/>
          <div style={{fontSize:12,color:C.accent,margin:"8px 0 8px",paddingBottom:5,borderBottom:`1px solid ${C.border}`}}>▶ 内容・評価</div>
          <Stars label="フィジカルコンディション" value={f.physical} onChange={s("physical")}/>
          <Field label="🎯 フォーカスポイント" value={f.focus||""} onChange={s("focus")} multiline placeholder="ラケットダウン / フォロースルー拡大 / セミオープンスタンス..."/>
          <Field label="📋 コーチメモ" value={f.coachNote||""} onChange={s("coachNote")} multiline placeholder="コーチから言われたこと..."/>
          <Field label="✅ よかった点" value={f.goodNote||""} onChange={s("goodNote")} multiline placeholder="できるようになったこと..."/>
          <Field label="🔧 改善点" value={f.improveNote||""} onChange={s("improveNote")} multiline placeholder="次回意識したいこと..."/>
          <Field label="📝 メモ" value={f.generalNote||""} onChange={s("generalNote")} multiline placeholder="その他気づき..."/>
          </>)}
          <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:14}}>
            <Btn onClick={()=>setModal(null)}>キャンセル</Btn>
            <Btn onClick={()=>handleSave(f)} variant="primary">{isNew?"作成":"保存"}</Btn>
          </div>
        </div>
      </div>
    );
  };

  return (
    <div>
      {cfm.el}
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)"
,gap:8,marginBottom:12}}>
        {[["総記録数",`${data.length}件`],["累計練習時間",`${Math.floor(totalMin/60)}h${totalMin%60}m`],["直近",data[0]?.date||"—"]].map(([l,v],i)=>(
          <div key={i} style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 12px"}}>
            <div style={{fontSize:12,color:C.textMuted,marginBottom:4}}>{l}</div>
            <div style={{fontSize:i===0?16:13,fontWeight:800,color:C.accent,fontFamily:"monospace"}}>{v}</div>
          </div>
        ))}
      </div>
      {guide&&(
        <div style={{position:"fixed",inset:0,background:"#0004",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
          <div style={{background:C.panel,border:`1px solid ${C.blue}`,borderRadius:12,width:"100%",maxWidth:480,padding:20}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <span style={{fontSize:14,fontWeight:700,color:C.blue}}>⌚ Apple Watch 連携ガイド</span>
              <Btn onClick={()=>setGuide(false)} variant="ghost" style={{fontSize:18,padding:"0 6px"}}>✕</Btn>
            </div>
            {[
              ["1","テニス終了後","フィットネスアプリでワークアウト詳細画面を開く"],
              ["2","スクショ2枚撮影","①概要（時間・カロリー・平均心拍） ②心拍数詳細（ゾーン別時間）"],
              ["3","Claudeに送信","テニスプロジェクトのチャットにスクショ2枚を貼る"],
              ["4","JSONをインポート","ClaudeがJSON出力 → 📥ボタンで読み込み → 完了"],
            ].map(([n,title,desc])=>(
              <div key={n} style={{display:"flex",gap:12,marginBottom:14,alignItems:"flex-start"}}>
                <div style={{width:24,height:24,borderRadius:"50%",background:C.blue,color:"#fff",fontSize:12,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{n}</div>
                <div>
                  <div style={{fontSize:12,fontWeight:700,color:C.text,marginBottom:3}}>{title}</div>
                  <div style={{fontSize:12,color:C.textMuted,lineHeight:1.6}}>{desc}</div>
                </div>
              </div>
            ))}
            <div style={{background:"#eeeef3",border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 12px",marginTop:4}}>
              <div style={{fontSize:12,color:C.textMuted,marginBottom:4}}>💡 ポイント</div>
              <div style={{fontSize:12,color:C.textDim,lineHeight:1.7}}>
                スクショ2枚で15項目のデータが取れます。心拍ゾーン別の滞在時間は体力分析に直結する貴重なデータです。iOSの制限でShortcut経由では取得できないため、この方法がベストです。
              </div>
            </div>
            <div style={{display:"flex",justifyContent:"flex-end",marginTop:14}}>
              <Btn onClick={()=>setGuide(false)} variant="primary">閉じる</Btn>
            </div>
          </div>
        </div>
      )}
      <div style={{display:"flex",justifyContent:"flex-end",gap:8,marginBottom:10}}>
        <button onClick={()=>setGuide(true)} style={{background:"#eff6ff",border:`1px solid ${C.blue}`,color:C.blue,borderRadius:6,padding:"6px 12px",fontSize:12,fontWeight:600,cursor:"pointer"}}>⌚ Watch連携ガイド</button>
        <button onClick={()=>setModal({practice:blankPractice()})} style={{background:C.accent,border:"none",color:"#fff",borderRadius:6,padding:"6px 14px",fontSize:12,fontWeight:700,cursor:"pointer"}}>＋ 追加</button>
      </div>
      {data.length===0&&<div style={{background:C.panel,border:`1px dashed ${C.border}`,borderRadius:8,padding:"30px 20px",textAlign:"center",color:C.textMuted,fontSize:12}}>練習記録がありません</div>}
      {(()=>{
        const months={};data.forEach(p=>{const mk=p.date?p.date.substring(0,7):"????/??";if(!months[mk])months[mk]=[];months[mk].push(p);});
        return Object.keys(months).sort((a,b)=>b.localeCompare(a)).map(mk=>{
          const items=months[mk];const parts=mk.split("/");const label=`${parts[0]}年${parseInt(parts[1])}月`;const isExp=expandedMonths[mk];
          return (<div key={mk} style={{marginBottom:8}}>
            <div onClick={()=>toggleMonth(mk)} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",background:C.panel2,border:`1px solid ${C.border}`,borderRadius:6,cursor:"pointer",marginBottom:isExp?4:0}}>
              <span style={{fontSize:13,color:C.text,fontWeight:700,flex:1}}>{label} ({items.length}件)</span>
              <span style={{fontSize:12,color:C.textMuted}}>{isExp?"▼":"▶"}</span>
            </div>
            {isExp&&(<div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:8,overflow:"hidden"}}>
              {items.map((p,i)=>{
          const isOpen=expanded===p.id;

                  <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:10}}>
                    {[["ラケット",p.racketName||"—"],["セッティング",[p.stringMain,p.stringCross].filter(Boolean).join(" / ")||"—"],["時間",p.duration?`${p.duration}分`:"—"],["気温",p.temp?`${p.temp}℃`:"—"],["場所",p.venue||"—"],["種別",p.type||"—"]].map(([k,v])=>(
                      <div key={k} style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:6,padding:"6px 10px"}}>

                      </div>
                    ))}
                  </div>
                  {[["🎯 フォーカス",p.focus],["📋 コーチメモ",p.coachNote],["✅ よかった点",p.goodNote],["🔧 改善点",p.improveNote],["📝 メモ",p.generalNote]].filter(([,v])=>v).map(([l,v])=>(
                    <div key={l} style={{marginBottom:6}}>
                      <div style={{fontSize:12,color:C.textMuted,marginBottom:2}}>{l}</div>

                    </div>
                  ))}
                  {/* Linked trials from trial tab (new system) */}
                  {(()=>{
                    const linkedTrials=(trials||[]).filter(t=>t.linkedPracticeId===p.id);
                    return linkedTrials.length>0&&linkedTrials.map(lt=>(
                      <div key={lt.id} style={{background:"#fffbeb",border:`1px solid #d97706`,borderRadius:8,padding:"10px 12px",marginBottom:8}}>

                        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:lt.generalNote?8:0}}>

                        </div>

                    <Btn onClick={()=>handleDelete(p.id)} variant="danger">🗑</Btn>

              })}
            </div>)}

}

const blankTrial=()=>({id:`t${Date.now()}`,date:today(),racketName:"",stringMain:"",stringCross:"",tensionMain:"",tensionCross:"",temp:"",venue:"",judgment:"保留",spin:3,power:3,control:3,info:3,maneuver:3,swingThrough:3,trajectory:3,stiffness:3,shotForeAtk:3,shotForeDef:3,shotBackAtk:3,shotBackDef:3,shotSlice:3,shotServe:3,shotVolley:3,shotReturn:3,confidence:3,strokeNote:"",serveNote:"",volleyNote:"",generalNote:"",sessions:[],linkedPracticeId:"",linkedMatchId:""});
const blankSession=()=>({id:`s${Date.now()}`,date:today(),temp:"",tensionMain:"",tensionCross:"",note:""});

// ── CLAUDE SHARE ──────────────────────────────────
const claudeFormatters={
  profile:(d)=>{
    if(!d||!d.name)return "";
    const l=["# プロフィール",`${d.name} / ${d.level||""} / ${d.career||""}`];
    if(d.playStyle)l.push(`スタイル: ${d.playStyle}`);
    if(d.playStyleDetail)l.push(d.playStyleDetail);
    if(d.strengths)l.push(`強み: ${d.strengths}`);
    if(d.weaknesses)l.push(`課題: ${d.weaknesses}`);
    if(d.racket)l.push(`ラケット: ${d.racket} / ${d.stringing||""}`);
    return l.join("\n");
  },
  rackets:(list)=>{
    if(!list||!list.length)return "";
    const l=["# ラケット"];
    list.forEach(r=>{
      l.push(`\n## ${r.name}（${r.role||""}） [id:${r.id}]`,`${r.weight||""} / ${r.balance||""} / ${r.face||""} / ${r.beam||""}`);
      if(r.string)l.push(`ST: ${r.string} / T: ${r.tension||"—"}`);
      if(r.note)l.push(r.note);
    });
    return l.join("\n");
  },
  strings:(list)=>{
    if(!list||!list.length)return "";
    const l=["# ストリング在庫"];
    const grp={active:[],key:[],hold:[],rejected:[]};
    list.forEach(s=>(grp[s.status]||grp.hold).push(s));
    const fmt=s=>`${s.name}(${s.qty})[id:${s.id}]`;
    const fmtR=s=>`${s.name}: ${s.note||""}[id:${s.id}]`;
    if(grp.active.length)l.push("【使用中】"+grp.active.map(fmt).join(" / "));
    if(grp.key.length)l.push("【注目】"+grp.key.map(s=>`${s.name}(${s.qty}) ${s.note||""}[id:${s.id}]`).join(" / "));
    if(grp.hold.length)l.push("【保留】"+grp.hold.map(fmt).join(" / "));
    if(grp.rejected.length)l.push("【除外】"+grp.rejected.map(fmtR).join(" / "));
    return l.join("\n");
  },
  measurements:(list)=>{
    if(!list||!list.length)return "";
    const l=["# 実測値"];
    list.forEach(m=>{l.push(`${m.current?"▶":"　"}${m.racket} ${m.state}: ${m.weight} / BP${m.balance} / G:${m.gripW}×${m.gripT} [id:${m.id}]`);});
    return l.join("\n");
  },
  tournaments:(list)=>{
    if(!list||!list.length)return "";
    const l=["# 大会記録"];
    list.forEach(t=>{
      const type=t.type==="singles"?"S":t.type==="doubles"?"D":"MIX";
      const ten=fmtTension(t.tensionMain,t.tensionCross);
      l.push(`\n## ${t.date} ${t.name||""} ${t.level}${type} → ${t.overallResult||"—"} [id:${t.id}]`);
      if(t.racketName)l.push(`機材: ${t.racketName} / ${[t.stringMain,t.stringCross].filter(Boolean).join(" / ")||"—"} / ${ten!=="—"?ten+"p":""} ${t.temp?t.temp+"℃":""}`);
      (t.matches||[]).forEach((m,i)=>{
        const sc=(m.setScores||[]).map(s=>`${s.me}-${s.opp}`).join(", ");
        l.push(`  ${m.round||`${i+1}回戦`} ${m.result} ${sc} vs ${m.opponent||"?"} M${m.mental||3}/P${m.physical||3} [id:${m.id}]`);
        if(m.techNote)l.push(`    技術: ${m.techNote}`);
        if(m.mentalNote)l.push(`    メンタル: ${m.mentalNote}`);
        if(m.note)l.push(`    メモ: ${m.note}`);
      });
      if(t.generalNote)l.push(`総括: ${t.generalNote}`);
    });
    return l.join("\n");
  },
  practices:(list)=>{
    if(!list||!list.length)return "";
    const l=["# 練習記録"];
    list.forEach(p=>{
      const ten=fmtTension(p.tensionMain,p.tensionCross);
      l.push(`\n${p.date} ${p.type} ${p.duration||""}分 @${p.venue||"—"} ${p.temp?p.temp+"℃":""} [id:${p.id}]`);
      if(p.racketName)l.push(`機材: ${p.racketName} / ${[p.stringMain,p.stringCross].filter(Boolean).join(" / ")||"—"} / ${ten!=="—"?ten+"p":""}`);
      if(p.calories||p.heartRateAvg)l.push(`⌚ ${p.calories?p.calories+"kcal":""} HR:${p.heartRateAvg||"—"}/${p.heartRateMax||"—"}bpm`);
      if(p.focus)l.push(`テーマ: ${p.focus}`);
      if(p.goodNote)l.push(`良: ${p.goodNote}`);
      if(p.improveNote)l.push(`改善: ${p.improveNote}`);
      if(p.coachNote)l.push(`コーチ: ${p.coachNote}`);
      if(p.generalNote)l.push(`メモ: ${p.generalNote}`);
        });
    return l.join("\n");
  },
  trials:(list,practices)=>{
    const all=[...list].sort((a,b)=>b.date.localeCompare(a.date));
    if(!all.length)return "";
    const l=["# 試打ノート"];
    all.forEach(t=>{
      const ten=fmtTension(t.tensionMain,t.tensionCross,t.tension);
      const hasNew=t.maneuver||t.swingThrough;
      const avg=hasNew?((t.spin+t.power+t.control+t.info+(t.maneuver||3)+(t.swingThrough||3))/6).toFixed(1):((t.spin+(t.control||0)+t.power+(t.feel||0)+t.info)/5).toFixed(1);
      l.push(`\n## ${t.date} ${t.racketName||"—"} / ${t.stringMain||"—"}${t.stringCross?` × ${t.stringCross}`:""} / ${ten} → ${"採用候補"===t.judgment?"✓ 採用候補":"却下"===t.judgment?"× 却下":"- "+t.judgment}${t.linkedPracticeId?" [練習中]":""}${t.linkedMatchId?" [実戦]":""} [id:${t.id}]`);
      if(hasNew){
        l.push(`スピン${t.spin}/推進力${t.power}/コントロール${t.control}/打感情報${t.info}/操作性${t.maneuver}/振り抜き${t.swingThrough} (avg ${avg}) ${t.temp?t.temp+"℃":""} ${t.venue||""}`);
        const tj=t.trajectory||3,sf=t.stiffness||3,cf=t.confidence||3;l.push(`弾道${tj}(${tj<=2?"低め":tj>=4?"高め":"中間"}) 打感${sf}(${sf<=2?"柔らかめ":sf>=4?"硬め":"中間"}) 安心感${cf}`);
        const shots=[t.shotForeAtk&&`フォア攻${t.shotForeAtk}`,t.shotForeDef&&`フォア守${t.shotForeDef}`,t.shotBackAtk&&`バック攻${t.shotBackAtk}`,t.shotBackDef&&`バック守${t.shotBackDef}`,t.shotSlice&&`スライス${t.shotSlice}`,t.shotServe&&`サーブ${t.shotServe}`,t.shotVolley&&`ボレー${t.shotVolley}`,t.shotReturn&&`リターン${t.shotReturn}`,t.shotFore&&`フォア${t.shotFore}(旧)`,t.shotBack&&`バック${t.shotBack}(旧)`].filter(Boolean);
        if(shots.length)l.push(`ショット: ${shots.join("/")}`);
      }else{
        l.push(`Sp${t.spin}/Co${t.control}/Pw${t.power}/Fe${t.feel||0}/In${t.info} (avg ${avg}) ${t.temp?t.temp+"℃":""} ${t.venue||""}`);
      };
      if(t.strokeNote)l.push(`ストローク: ${t.strokeNote}`);
      if(t.serveNote)l.push(`サーブ: ${t.serveNote}`);
      if(t.volleyNote)l.push(`ボレー: ${t.volleyNote}`);
      if(t.generalNote)l.push(`総括: ${t.generalNote}`);
      (t.sessions||[]).forEach((s,i)=>{
        const st=fmtTension(s.tensionMain,s.tensionCross);
        l.push(`  #${i+1} ${s.date||""} ${s.temp?s.temp+"℃":""} T:${st} ${s.note||""}`);
      });
    });
    return l.join("\n");
  },
  mental:(list)=>{
    if(!list||!list.length)return "";
    const l=["# メンタルノート"];
    list.forEach(m=>{l.push(`[${m.category||m.tag}] ${m.title}: ${m.content} [id:${m.id}]`);});
    return l.join("\n");
  },
  next:(list)=>{
    if(!list||!list.length)return "";
    const l=["# Next Actions"];
    list.forEach(n=>{l.push(`${n.done?"✅":"☐"} [${n.priority||"中"}] ${n.label}${n.detail?` — ${n.detail}`:""} [id:${n.id}]`);});
    return l.join("\n");
  },
};

function ClaudeShareModal({onClose,data,toast}){
  const cats=[
    ["profile","プロフィール",data.profile],
    ["rackets","ラケット",data.rackets],
    ["strings","ストリング",data.strings],
    ["measurements","実測値",data.measurements],
    ["tournaments","大会",data.tournaments],
    ["practices","練習",data.practices],
    ["trials","試打",data.trials],
    ["mental","メンタル",data.mental],
    ["next","Next",data.next],
  ];
  const [sel,setSel]=useState(()=>Object.fromEntries(cats.map(([k])=>[k,true])));
  const toggle=k=>setSel(p=>({...p,[k]:!p[k]}));
  const selectAll=v=>setSel(Object.fromEntries(cats.map(([k])=>[k,v])));

  const texts=cats.map(([k,label,d])=>{
    if(!sel[k])return null;
    if(k==="trials")return claudeFormatters.trials(data.trials,data.practices);
    return claudeFormatters[k]?claudeFormatters[k](d):null;
  }).filter(Boolean);
  const fullText=texts.join("\n\n---\n\n");
  const charCount=fullText.length;
  const tooLarge=charCount>80000;

  const catSizes=cats.map(([k,label,d])=>{
    let t;
    if(k==="trials")t=claudeFormatters.trials(data.trials,data.practices);
    else t=claudeFormatters[k]?claudeFormatters[k](d):"";
    return [k,label,t?t.length:0];
  });

  const handleCopy=async()=>{
    try{await navigator.clipboard.writeText(fullText);toast.show(`📋 ${charCount.toLocaleString()}文字コピー完了 → Claudeに貼り付け`);}catch{
      const ta=document.createElement("textarea");ta.value=fullText;ta.style.cssText="position:fixed;opacity:0";document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);toast.show(`📋 コピー完了`);
    }
    onClose();
  };

  return (
    <div style={{position:"fixed",inset:0,background:"#0004",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{background:C.panel,border:`1px solid ${C.purple}`,borderRadius:12,width:"100%",maxWidth:400,padding:20}} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <span style={{fontSize:15,fontWeight:700,color:C.purple}}>📋 Claude共有</span>
          <button onClick={onClose} style={{background:"none",border:"none",color:C.textMuted,fontSize:18,cursor:"pointer"}}>✕</button>
        </div>

}

const formatTrialForClaude=t=>{
  const ten=[t.tensionMain,t.tensionCross].filter(Boolean).join("/") || t.tension || "—";
  const hasNew=t.maneuver||t.swingThrough;
  const avg=hasNew?((t.spin+t.power+t.control+t.info+(t.maneuver||3)+(t.swingThrough||3))/6).toFixed(1):((t.spin+(t.control||0)+t.power+(t.feel||0)+t.info)/5).toFixed(1);
  const lines=[`## ${t.date} ${t.racketName||"—"} / ${t.stringMain||"—"}${t.stringCross?` × ${t.stringCross}`:""} / ${ten} → ${"採用候補"===t.judgment?"✓ 採用候補":"却下"===t.judgment?"× 却下":"- "+t.judgment}${t.linkedPracticeId?" [練習中]":""}${t.linkedMatchId?" [実戦]":""} [id:${t.id}]`];
  if(hasNew){
    lines.push(`スピン${t.spin}/推進力${t.power}/コントロール${t.control}/打感情報${t.info}/操作性${t.maneuver}/振り抜き${t.swingThrough} (avg ${avg}) ${t.temp?t.temp+"℃":""} ${t.venue||""}`);
    const tj=t.trajectory||3,sf=t.stiffness||3,cf=t.confidence||3;lines.push(`弾道${tj}(${tj<=2?"低め":tj>=4?"高め":"中間"}) 打感${sf}(${sf<=2?"柔らかめ":sf>=4?"硬め":"中間"}) 安心感${cf}`);
    const shots=[t.shotForeAtk&&`フォア攻${t.shotForeAtk}`,t.shotForeDef&&`フォア守${t.shotForeDef}`,t.shotBackAtk&&`バック攻${t.shotBackAtk}`,t.shotBackDef&&`バック守${t.shotBackDef}`,t.shotSlice&&`スライス${t.shotSlice}`,t.shotServe&&`サーブ${t.shotServe}`,t.shotVolley&&`ボレー${t.shotVolley}`,t.shotReturn&&`リターン${t.shotReturn}`,t.shotFore&&`フォア${t.shotFore}(旧)`,t.shotBack&&`バック${t.shotBack}(旧)`].filter(Boolean);
    if(shots.length)lines.push(`ショット: ${shots.join("/")}`);
  }else{
    lines.push(`Sp${t.spin}/Co${t.control}/Pw${t.power}/Fe${t.feel||0}/In${t.info} (avg ${avg}) ${t.temp?t.temp+"℃":""} ${t.venue||""}`);
  }
  if(t.strokeNote)lines.push(`ストローク: ${t.strokeNote}`);
  if(t.serveNote)lines.push(`サーブ: ${t.serveNote}`);
  if(t.volleyNote)lines.push(`ボレー: ${t.volleyNote}`);
  if(t.generalNote)lines.push(`総括: ${t.generalNote}`);
  (t.sessions||[]).forEach((s,i)=>{
    const st=[s.tensionMain,s.tensionCross].filter(Boolean).join("/");
    lines.push(`  #${i+1} ${s.date||""} ${s.temp?s.temp+"℃":""} T:${st} ${s.note||""}`);
  });
  return lines.join("\n");
};
const formatMultipleTrialsForClaude=trials=>trials.map(t=>formatTrialForClaude(t)).join("\n\n---\n\n");
const formatMatchForClaude=(trn,match)=>{
  const type=trn.type==="singles"?"S":trn.type==="doubles"?"D":"MIX";
  const games=match.games||[];
  const score=games.reduce((a,g)=>({me:a.me+(g.winner==="me"?1:0),opp:a.opp+(g.winner==="opp"?1:0)}),{me:0,opp:0});
  const l=[
    `# 試合共有 [id:${trn.id}]`,
    `${trn.date} ${trn.name||""} ${trn.level}${type} ${trn.temp?trn.temp+"℃":""}`,
    `機材: ${trn.racketName||"—"} / ${[trn.stringMain,trn.stringCross].filter(Boolean).join(" / ")||"—"} / ${fmtTension(trn.tensionMain,trn.tensionCross)}`,
    ``,
    `## ${match.round||"—"} vs ${match.opponent||"?"} → ${match.result} [id:${match.id}]`,
    `ゲーム: ${score.me}-${score.opp} セット: ${(match.setScores||[]).join(", ")||"—"}`,
    `メンタル: ${match.mental}/5 フィジカル: ${match.physical}/5`,
  ];
  if(games.length>0){
    l.push(`ゲーム推移: ${games.map(g=>g.winner==="me"?"○":"×").join("")}`);
    const changeovers=match.changeovers||[];
    if(changeovers.length>0){
      changeovers.forEach(co=>{l.push(`  CO@${co.afterGame}G: ${co.note}`);});
    }
  }
  if(match.mentalNote)l.push(`🧠メンタル: ${match.mentalNote}`);
  if(match.techNote)l.push(`🎾技術: ${match.techNote}`);
  if(match.opponentNote)l.push(`👤相手: ${match.opponentNote}`);
  if(match.note)l.push(`📝メモ: ${match.note}`);
  return l.join("\n");
};
const formatTournamentAllForClaude=(trn)=>{
  const type=trn.type==="singles"?"S":trn.type==="doubles"?"D":"MIX";
  const wins=(trn.matches||[]).filter(m=>m.result==="勝利").length;
  const l=[
    `# 大会全体 [id:${trn.id}]`,
    `${trn.date} ${trn.name||""} ${trn.level}${type} → ${trn.overallResult||"—"} ${trn.temp?trn.temp+"℃":""}`,
    `機材: ${trn.racketName||"—"} / ${[trn.stringMain,trn.stringCross].filter(Boolean).join(" / ")||"—"} / ${fmtTension(trn.tensionMain,trn.tensionCross)}`,
    `${wins}勝${(trn.matches||[]).length-wins}敗`,
  ];
  (trn.matches||[]).forEach(m=>{
    const games=m.games||[];
    const sc=games.reduce((a,g)=>({me:a.me+(g.winner==="me"?1:0),opp:a.opp+(g.winner==="opp"?1:0)}),{me:0,opp:0});
    l.push(`\n## ${m.round||"—"} vs ${m.opponent||"?"} → ${m.result} ${sc.me}-${sc.opp} [id:${m.id}]`);
    l.push(`M${m.mental}/P${m.physical} セット: ${(m.setScores||[]).join(", ")||"—"}`);
    if(games.length>0)l.push(`推移: ${games.map(g=>g.winner==="me"?"○":"×").join("")}`);
    if(m.mentalNote)l.push(`🧠 ${m.mentalNote}`);
    if(m.techNote)l.push(`🎾 ${m.techNote}`);
    if(m.opponentNote)l.push(`👤 ${m.opponentNote}`);
    if(m.note)l.push(`📝 ${m.note}`);
  });
  if(trn.generalNote)l.push(`\n総括: ${trn.generalNote}`);
  return l.join("\n");
};
const formatPracticeForClaude=(p)=>{
  const ten=fmtTension(p.tensionMain,p.tensionCross);
  const l=[
    `# 練習共有 [id:${p.id}]`,
    `${p.date} ${p.type} ${p.duration||""}分 @${p.venue||"—"} ${p.temp?p.temp+"℃":""}`,
    `機材: ${p.racketName||"—"} / ${[p.stringMain,p.stringCross].filter(Boolean).join(" / ")||"—"} / ${ten!=="—"?ten+"p":""}`,
  ];
  if(p.calories||p.heartRateAvg)l.push(`⌚ ${p.calories?p.calories+"kcal":""} HR:${p.heartRateAvg||"—"}/${p.heartRateMax||"—"}bpm`);
  if(p.focus)l.push(`テーマ: ${p.focus}`);
  if(p.goodNote)l.push(`良: ${p.goodNote}`);
  if(p.improveNote)l.push(`改善: ${p.improveNote}`);
  if(p.coachNote)l.push(`コーチ: ${p.coachNote}`);
  if(p.generalNote)l.push(`メモ: ${p.generalNote}`);

  return l.join("\n");
};

const copyToClipboard=async(text,toast,label)=>{

  }
};

  const groups=useMemo(()=>{
    const map={};
    filtered.forEach(t=>{
      const key=`${t.racketName||"—"}|${t.stringMain||"—"}|${t.stringCross||""}`;
      if(!map[key])map[key]={racket:t.racketName||"—",stringMain:t.stringMain||"—",stringCross:t.stringCross||"",trials:[],latestJudgment:"",status:getRacketStatus(t.racketName)};
      map[key].trials.push(t);
    });
    Object.values(map).forEach(g=>{
      g.trials.sort((a,b)=>b.date.localeCompare(a.date));
      g.latestJudgment=g.trials[0]?.judgment||"保留";
    });
    return Object.values(map).sort((a,b)=>b.trials[0].date.localeCompare(a.trials[0].date));
  },[filtered,rackets]);

  const statusLabel={"active":"✓ エース","sub":"② サブ","candidate":"★ 候補","considering":"? 検討","support":"○ 補助","retired":"× 引退"};
  const statusColor={"active":"green","sub":"blue","candidate":"yellow","considering":"purple","support":"gray","retired":"gray"};

  return (
    <div>
      {cfm.el}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <div><span style={{fontSize:12,color:C.accent,fontWeight:700}}>試打ノート</span><span style={{fontSize:12,color:C.textMuted,marginLeft:8}}>{hasFilter?`${filtered.length}/${allTrials.length}件`:allTrials.length+"件"}{linkedCount>0?`（リンク済${linkedCount}件）`:""}</span></div>
        <div style={{display:"flex",gap:6}}>
          <button onClick={()=>setViewMode(v=>v==="flat"?"grouped":"flat")} style={{background:viewMode==="grouped"?"#f5f3ff":"transparent",border:`1px solid ${viewMode==="grouped"?C.purple:C.border}`,color:viewMode==="grouped"?C.purple:C.textMuted,borderRadius:6,padding:"6px 10px",fontSize:12,fontWeight:600,cursor:"pointer"}}>{viewMode==="grouped"?"📊 組み合わせ":"📋 日付順"}</button>
          {filtered.length>0&&<button onClick={()=>copyToClipboard(formatMultipleTrialsForClaude(filtered),toast,`${filtered.length}件コピー → Claudeに貼り付け`)} style={{background:"#f5f3ff",border:`1px solid ${C.purple}`,color:C.purple,borderRadius:6,padding:"6px 10px",fontSize:12,fontWeight:700,cursor:"pointer"}}>📋 {hasFilter?filtered.length+"件":"全件"}</button>}
          <button onClick={()=>setModal({trial:blankTrial()})} style={{background:C.accent,border:"none",color:"#fff",borderRadius:6,padding:"6px 14px",fontSize:13,fontWeight:700,cursor:"pointer"}}>＋</button>
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"0 8px",marginBottom:10}}>
        <FSelect label="" value={fRacket} onChange={setFRacket} options={rOpts}/>
        <FSelect label="" value={fJudge} onChange={setFJudge} options={[{value:"",label:"全判定"},{value:"採用候補",label:"✅ 採用候補"},{value:"保留",label:"🟡 保留"},{value:"却下",label:"❌ 却下"}]}/>
        <FSelect label="" value={fString} onChange={setFString} options={sOpts2}/>
      </div>
      {hasFilter&&<button onClick={()=>{setFRacket("");setFJudge("");setFString("");}} style={{background:"none",border:`1px solid ${C.border}`,color:C.textMuted,borderRadius:4,padding:"4px 12px",fontSize:12,cursor:"pointer",marginBottom:8,display:"block"}}>フィルター解除</button>}
      {filtered.length===0&&<div style={{background:C.panel,border:`1px dashed ${C.border}`,borderRadius:8,padding:"30px 20px",textAlign:"center",color:C.textMuted,fontSize:12}}>{hasFilter?"条件に一致する試打がありません":"試打ノートがありません"}</div>}
      {/* Grouped view */}
      {viewMode==="grouped"&&filtered.length>0&&(
        <div style={{display:"grid",gap:10}}>
          {groups.map(g=>{
            const gKey=`${g.racket}|${g.stringMain}|${g.stringCross}`;
            const stLabel=[g.stringMain,g.stringCross].filter(Boolean).join(" / ");
            const stMainStatus=getStringStatus(g.stringMain);
            const stCrossStatus=g.stringCross?getStringStatus(g.stringCross):"";
            return (
              <div key={gKey} style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:10,overflow:"hidden"}}>
                <div style={{padding:"10px 14px",borderBottom:`1px solid ${C.border}`,background:C.panel2}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                    <span style={{fontSize:13,fontWeight:700,color:C.text}}>{g.racket}</span>
                    {g.status&&<Badge color={statusColor[g.status]||"gray"} sm>{statusLabel[g.status]||g.status}</Badge>}
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:6,marginTop:4,flexWrap:"wrap"}}>
                    <span style={{fontSize:12,color:C.textDim}}>{g.stringMain||"—"}</span>
                    {stMainStatus&&stStatusMap[stMainStatus]&&<Badge color={stStatusMap[stMainStatus].color} sm>{stStatusMap[stMainStatus].label}</Badge>}
                    {g.stringCross&&<>
                      <span style={{fontSize:12,color:C.textMuted}}>/</span>
                      <span style={{fontSize:12,color:C.textDim}}>{g.stringCross}</span>
                      {stCrossStatus&&stStatusMap[stCrossStatus]&&<Badge color={stStatusMap[stCrossStatus].color} sm>{stStatusMap[stCrossStatus].label}</Badge>}
                    </>}
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginTop:4}}>
                    <span style={{fontSize:12,color:C.textMuted}}>組み合わせ:</span>
                    <Badge color={jc[g.latestJudgment]||"gray"} sm>{"採用候補"===g.latestJudgment?"✓ 採用候補":"却下"===g.latestJudgment?"× 却下":"- "+g.latestJudgment}</Badge>
                    <span style={{fontSize:12,color:C.textMuted}}>{g.trials.length}回試打</span>
                  </div>
                </div>
                {g.trials.map((t,ti)=>{
                  const isOpen=expanded===t.id;const ac=avg(t);const ac2=parseFloat(ac)>=4?C.accent:parseFloat(ac)>=3?C.yellow:C.red;
                  return (
                    <div key={t.id} style={{borderBottom:ti<g.trials.length-1?`1px solid ${C.border}`:"none"}}>
